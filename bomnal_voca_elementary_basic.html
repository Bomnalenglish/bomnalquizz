<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>봄날 보카 · 초등 영단어 BASIC 300</title>
<script type="module" src="bn_tracker.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff7fb;--card:#ffffff;--ink:#3a3340;--soft:#9a94a3;
  --primary:#ff8fb1;--primary-d:#f26d97;--accent:#7cc6ff;--mint:#7bd8c0;
  --green:#3fb98f;--red:#ff6b6b;--bdr:#ffe0ec;--shadow:0 8px 26px rgba(255,143,177,.18);
}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#fff7fb,#f2f8ff);min-height:100vh;color:var(--ink);}

header{background:linear-gradient(135deg,#ffe3ef,#e5f1ff);padding:30px 24px 24px;text-align:center;border-bottom:3px solid #fff;}
.logo-text{font-family:'Jua',sans-serif;font-size:1.6rem;color:#f26d97;}
.logo-text .hl{color:#5aa9e6;}
.level-badge{display:inline-block;background:var(--primary);color:#fff;font-size:.8rem;font-weight:700;padding:4px 16px;border-radius:20px;margin-top:8px;letter-spacing:.5px;box-shadow:0 3px 8px rgba(242,109,151,.3);}

.screen{display:none;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:24px;}

.auth-card{background:var(--card);border-radius:28px;padding:34px 26px;width:100%;max-width:430px;box-shadow:var(--shadow);border:3px solid #fff;text-align:center;}
.auth-card h2{font-family:'Jua',sans-serif;font-size:1.4rem;margin-bottom:8px;}
.auth-card p{font-size:.86rem;color:var(--soft);margin-bottom:20px;font-family:'Gowun Dodum',serif;line-height:1.7;}
.hello{font-size:1.1rem;font-weight:700;color:var(--primary-d);margin-bottom:6px;font-family:'Jua',sans-serif;}
.hello .sch{font-size:.82rem;color:var(--soft);font-weight:400;}
.name-input{width:100%;padding:13px 16px;border:2.5px solid var(--bdr);border-radius:16px;font-size:1rem;font-family:inherit;outline:none;text-align:center;background:#fff;margin-bottom:6px;}
.name-input:focus{border-color:var(--primary);}
.name-input.err{border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.steps{display:flex;flex-direction:column;gap:10px;margin:8px 0 20px;text-align:left;}
.step-item{display:flex;align-items:center;gap:12px;background:#fff8fc;border:2px solid var(--bdr);border-radius:18px;padding:12px 14px;}
.step-num{width:34px;height:34px;flex-shrink:0;border-radius:50%;background:var(--primary);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:'Jua',sans-serif;box-shadow:0 3px 7px rgba(242,109,151,.35);}
.step-txt{font-size:.86rem;line-height:1.4;}
.step-txt b{font-size:.94rem;}
.start-btn{width:100%;margin-top:4px;padding:16px;border-radius:18px;border:none;background:linear-gradient(135deg,#ff9dbb,#f26d97);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;transition:transform .15s,box-shadow .15s;box-shadow:0 6px 16px rgba(242,109,151,.35);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 9px 20px rgba(242,109,151,.45);}

/* DAY SELECT */
.day-card{max-width:460px;}
.day-progress{margin:4px 0 16px;}
.day-progress-bar{background:#ffe0ec;border-radius:20px;height:12px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.06);}
.day-progress-fill{height:100%;width:0;background:linear-gradient(90deg,#ffd66b,#ff8fb1,#7cc6ff);border-radius:20px;transition:width .6s ease;}
.day-progress-text{font-size:.85rem;color:var(--primary-d);margin-top:8px;font-family:'Jua',sans-serif;text-align:center;}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin:6px 0 18px;}
.day-btn{position:relative;padding:13px 4px;border-radius:16px;border:2.5px solid var(--bdr);background:#fff;color:var(--ink);font-size:.95rem;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;transition:all .15s;line-height:1.2;}
.day-btn .db-n{display:block;font-size:.58rem;font-weight:400;color:var(--soft);font-family:'Gowun Dodum',serif;margin-top:2px;}
.day-btn:hover{border-color:var(--primary);background:#fff3f8;transform:translateY(-3px) scale(1.03);}
.day-btn.done{background:linear-gradient(135deg,#d6f7ec,#c7f0e4);border-color:var(--mint);color:var(--green);}
.day-btn.done .db-n{color:var(--green);}
.day-btn.done::after{content:'✅';position:absolute;top:-7px;right:-7px;font-size:.8rem;}
.day-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.reset-btn{background:none;border:2px solid var(--bdr);color:var(--soft);font-size:.72rem;padding:6px 12px;border-radius:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}
.auth-back{background:none;border:none;color:var(--soft);font-size:.82rem;cursor:pointer;text-decoration:underline;font-family:inherit;}

/* MEMORIZE */
#screen-memo{padding:20px;align-items:stretch;justify-content:flex-start;min-height:100vh;}
.memo-wrap{max-width:520px;width:100%;margin:0 auto;}
.stage-tag{text-align:center;font-size:.85rem;font-weight:700;color:var(--primary-d);margin-bottom:10px;letter-spacing:.5px;font-family:'Jua',sans-serif;}
.progress-bar{background:#ffe0ec;border-radius:20px;height:10px;margin-bottom:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#ffd66b,#ff8fb1);border-radius:20px;transition:width .4s ease;}
.progress-text{text-align:right;font-size:.78rem;color:var(--soft);margin-top:4px;margin-bottom:16px;font-family:'Gowun Dodum',serif;}
.memo-card{background:#EADCFB;border-radius:36px;padding:22px 24px 40px;text-align:center;box-shadow:0 14px 34px rgba(0,0,0,.12),inset 0 -9px 0 rgba(0,0,0,.045);border:6px solid #fff;margin-bottom:20px;position:relative;transition:background .5s ease;overflow:hidden;}
/* 카드 상단 진행바 + 번호 */
.memo-cardbar{height:9px;border-radius:20px;background:rgba(255,255,255,.55);overflow:hidden;margin:0 4px 12px;box-shadow:inset 0 1px 2px rgba(0,0,0,.08);}
.memo-cardbar-fill{height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,#ffb3cd,#ff8fb1);transition:width .45s ease;}
.memo-num{display:inline-block;font-family:'Jua',sans-serif;font-size:1rem;color:#fff;background:rgba(0,0,0,.18);padding:4px 16px;border-radius:20px;margin-bottom:24px;letter-spacing:1px;text-shadow:0 1px 2px rgba(0,0,0,.15);}
.memo-en{font-size:56px;font-weight:800;color:#2a2333;letter-spacing:-1px;word-break:break-word;line-height:1.1;font-family:'Jua',sans-serif;text-shadow:0 2px 3px rgba(255,255,255,.65);}
/* 영어: 위에서 내려오기 */
.memo-en.drop{animation:enDrop .55s cubic-bezier(.2,1.2,.35,1) both;}
@keyframes enDrop{0%{transform:translateY(-46px);opacity:0}100%{transform:translateY(0);opacity:1}}
/* 영어: TTS 재생 중 통통 튀기 */
.memo-en.pop{animation:enPop .42s cubic-bezier(.25,1.5,.4,1);}
@keyframes enPop{0%{transform:scale(1)}35%{transform:scale(1.13)}70%{transform:scale(.97)}100%{transform:scale(1)}}
.memo-pos{display:inline-block;font-size:.92rem;font-weight:800;margin:14px 0 4px;padding:5px 16px;border-radius:20px;letter-spacing:.3px;background:#fff;color:var(--soft);box-shadow:0 3px 8px rgba(0,0,0,.12);}
.memo-pos.pos-n{color:#2f86e0;background:#e3f0ff;}
.memo-pos.pos-v{color:#f2564b;background:#ffe6e3;}
.memo-pos.pos-adj{color:#a066e6;background:#f2e8ff;}
.memo-pos.pos-adv{color:#12a594;background:#dbf5f0;}
.memo-pos.pos-num{color:#f08c00;background:#fff0d6;}
.memo-ko{font-size:40px;color:#e8557f;font-weight:800;margin:14px 0 26px;font-family:'Gowun Dodum',serif;line-height:1.35;text-shadow:0 1px 2px rgba(255,255,255,.6);opacity:0;}
/* 한글 뜻: 영어 먼저 보고 0.8초 뒤 아래에서 올라오기 */
.memo-ko.rise{animation:koRise .5s ease .8s both;}
@keyframes koRise{0%{transform:translateY(28px);opacity:0}100%{transform:translateY(0);opacity:1}}
.sound-btn{background:#fff;border:none;border-radius:50%;width:64px;height:64px;cursor:pointer;font-size:1.7rem;transition:transform .15s;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 5px 14px rgba(0,0,0,.12);}
.sound-btn:hover{transform:translateY(-2px) scale(1.05);}
.sound-btn.playing{background:var(--primary);color:#fff;animation:pulse .6s infinite;}
.memo-dots{display:flex;justify-content:center;gap:12px;margin-top:18px;}
.memo-dot{width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:inset 0 0 0 2px rgba(0,0,0,.10);transition:transform .2s,background .2s,box-shadow .2s;}
.memo-dot.on{background:var(--primary);box-shadow:0 2px 8px rgba(242,109,151,.5);transform:scale(1.3);}
.memo-dot.pulse{animation:pulse .6s infinite;}
.play-count{font-size:.8rem;color:var(--primary-d);margin-top:12px;font-family:'Jua',sans-serif;min-height:18px;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.memo-nav{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.nav-btn{padding:16px;border-radius:18px;border:2.5px solid var(--bdr);background:#fff;color:var(--ink);font-size:1rem;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;transition:all .15s;}
.nav-btn:hover:not(:disabled){border-color:var(--primary);background:#fff3f8;}
.nav-btn:disabled{opacity:.4;cursor:default;}
.nav-btn.primary{background:linear-gradient(135deg,#ff9dbb,#f26d97);color:#fff;border-color:transparent;box-shadow:0 5px 14px rgba(242,109,151,.35);}
.memo-tofinish{grid-column:1 / -1;}

/* QUIZ */
#screen-quiz{padding:20px;align-items:stretch;justify-content:flex-start;min-height:100vh;}
.quiz-wrap{max-width:520px;width:100%;margin:0 auto;}
.word-card{background:#fff;border-radius:28px;padding:36px 24px 28px;text-align:center;box-shadow:var(--shadow);border:4px solid #fff;margin-bottom:20px;position:relative;}
.round-badge{position:absolute;top:14px;left:16px;font-size:.72rem;background:#fff0c9;color:#e08e00;padding:3px 12px;border-radius:20px;font-weight:800;font-family:'Jua',sans-serif;}
.word-en{font-size:2.6rem;font-weight:800;color:var(--ink);letter-spacing:-1px;margin-bottom:16px;font-family:'Jua',sans-serif;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.choice-btn{background:#fff;border:2.5px solid var(--bdr);border-radius:18px;padding:17px 14px;font-size:1rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4;color:var(--ink);font-weight:700;}
.choice-btn:hover:not(:disabled){border-color:var(--primary);background:#fff3f8;transform:translateY(-2px);}
.choice-btn.correct{border-color:var(--green);background:#e2f7ef;color:var(--green);}
.choice-btn.wrong{border-color:var(--red);background:#ffecec;color:var(--red);}
.choice-btn:disabled{cursor:default;}
.feedback{text-align:center;font-size:.95rem;font-weight:700;min-height:24px;margin-bottom:14px;font-family:'Jua',sans-serif;}
.feedback.ok{color:var(--green);}
.feedback.bad{color:var(--red);}
.next-btn{width:100%;padding:16px;border-radius:18px;border:none;background:linear-gradient(135deg,#ff9dbb,#f26d97);color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;display:none;box-shadow:0 5px 14px rgba(242,109,151,.35);}
.next-btn.show{display:block;}

/* ROUND / DONE */
.round-card,.done-card{background:#fff;border-radius:28px;padding:40px 28px;width:100%;max-width:390px;box-shadow:var(--shadow);border:4px solid #fff;text-align:center;}
.round-emoji,.done-emoji{font-size:3.6rem;margin-bottom:12px;}
.round-title,.done-title{font-family:'Jua',sans-serif;font-size:1.5rem;margin-bottom:8px;}
.round-sub,.done-sub{font-size:.9rem;color:var(--soft);font-family:'Gowun Dodum',serif;line-height:1.7;margin-bottom:22px;white-space:pre-line;}
.score-big{font-size:3rem;font-weight:800;color:var(--primary-d);line-height:1;font-family:'Jua',sans-serif;}
.score-label{font-size:.85rem;color:var(--soft);margin-top:4px;font-family:'Gowun Dodum',serif;margin-bottom:22px;}
.retry-btn{width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,#ffd66b,#ffb84d);color:#7a5200;font-size:1.05rem;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;margin-bottom:10px;box-shadow:0 5px 12px rgba(255,184,77,.4);}
.done-btn{width:100%;padding:14px;border-radius:16px;border:2.5px solid var(--bdr);background:#fff;color:var(--soft);font-size:1rem;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;}
.stat-row{display:flex;justify-content:center;gap:20px;margin-bottom:22px;}
.stat-box{text-align:center;}
.stat-n{font-size:2rem;font-weight:800;color:var(--primary-d);font-family:'Jua',sans-serif;}
.stat-l{font-size:.72rem;color:var(--soft);font-family:'Gowun Dodum',serif;}
.done-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
.home-btn{width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,#9bd4ff,#7cc6ff);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;box-shadow:0 5px 12px rgba(124,198,255,.4);}

footer{text-align:center;padding:24px;color:#d9b8c8;font-size:.78rem;font-family:'Gowun Dodum',serif;}
@media(max-width:400px){.memo-en{font-size:46px;}.memo-ko{font-size:33px;}.day-grid{gap:7px;}}
</style>
</head>
<body>

<header>
  <div class="logo-text">봄날 <span class="hl">BOMNAL</span> 보카</div>
  <div class="level-badge">🌈 초등 영단어 BASIC · 300단어</div>
</header>

<!-- INTRO -->
<div id="screen-intro" class="screen active">
  <div class="auth-card">
    <div class="hello" id="helloBox"></div>
    <p id="introDesc">3단계로 단어를 재미있게 외워봐요! 😊</p>
    <input type="text" class="name-input" id="nameInput" placeholder="이름을 입력하세요" maxlength="12"
           style="display:none" onkeydown="if(event.key==='Enter')startFromIntro()"/>
    <div class="steps">
      <div class="step-item"><div class="step-num">1</div><div class="step-txt"><b>암기</b><br>단어·뜻·품사를 보며 발음 3번 듣기 🔊</div></div>
      <div class="step-item"><div class="step-num">2</div><div class="step-txt"><b>4지선다 퀴즈</b><br>영어 보고 알맞은 뜻 고르기 ✏️</div></div>
      <div class="step-item"><div class="step-num">3</div><div class="step-txt"><b>오답 반복</b><br>틀린 단어만 0개 될 때까지! 🔁</div></div>
    </div>
    <button class="start-btn" onclick="startFromIntro()">시작하기 →</button>
  </div>
</div>

<!-- DAY SELECT -->
<div id="screen-day" class="screen">
  <div class="auth-card day-card">
    <h2>📅 Day를 선택하세요</h2>
    <p>Day마다 단어 10개씩 · 총 30일 🌟</p>
    <div class="day-progress">
      <div class="day-progress-bar"><div class="day-progress-fill" id="dayProgFill"></div></div>
      <div class="day-progress-text" id="dayProgText">30일 중 0일 완료</div>
    </div>
    <div class="day-grid" id="dayGrid"></div>
    <div class="day-foot">
      <button class="auth-back" onclick="showScreen('screen-intro')">← 처음으로</button>
      <button class="reset-btn" onclick="resetProgress()">🗑 전체 초기화</button>
    </div>
  </div>
</div>

<!-- STAGE 1: 암기 -->
<div id="screen-memo" class="screen">
  <div class="memo-wrap">
    <div class="stage-tag">STEP 1 · 암기 ✨</div>
    <div class="progress-bar"><div class="progress-fill" id="memoFill"></div></div>
    <div class="progress-text" id="memoText"></div>
    <div class="memo-card" id="memoCard">
      <div class="memo-cardbar"><div class="memo-cardbar-fill" id="memoCardFill"></div></div>
      <div class="memo-num" id="memoNum"></div>
      <div class="memo-en" id="memoEn"></div>
      <div class="memo-pos" id="memoPos"></div>
      <div class="memo-ko" id="memoKo"></div>
      <button class="sound-btn" id="memoSound" onclick="replayMemo()" title="발음 듣기">🔊</button>
      <div class="memo-dots" id="memoDots" aria-hidden="true">
        <span class="memo-dot" data-i="1"></span>
        <span class="memo-dot" data-i="2"></span>
        <span class="memo-dot" data-i="3"></span>
      </div>
      <div class="play-count" id="memoCount"></div>
    </div>
    <div class="memo-nav">
      <button class="nav-btn" id="memoPrev" onclick="memoPrev()">← 이전</button>
      <button class="nav-btn primary" id="memoNext" onclick="memoNext()">다음 →</button>
      <button class="nav-btn primary memo-tofinish" id="memoToQuiz" style="display:none" onclick="startQuizStage()">2단계 퀴즈 시작 ✏️</button>
    </div>
  </div>
</div>

<!-- STAGE 2 & 3: 퀴즈 -->
<div id="screen-quiz" class="screen">
  <div class="quiz-wrap">
    <div class="stage-tag" id="quizStageTag">STEP 2 · 4지선다 퀴즈</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
    <div class="word-card">
      <div class="round-badge" id="roundBadge">1라운드</div>
      <div class="word-en" id="wordEn"></div>
      <button class="sound-btn" id="soundBtn" onclick="speakWord()" title="발음 듣기" style="width:50px;height:50px;font-size:1.4rem">🔊</button>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextWord()">다음 →</button>
  </div>
</div>

<!-- ROUND COMPLETE -->
<div id="screen-round" class="screen">
  <div class="round-card">
    <div class="round-emoji" id="roundEmoji"></div>
    <div class="round-title" id="roundTitle"></div>
    <div class="round-sub" id="roundSub"></div>
    <div class="score-big" id="roundScore"></div>
    <div class="score-label" id="roundScoreLabel"></div>
    <button class="retry-btn" onclick="startRetry()">오답 다시 풀기 🔄</button>
    <button class="done-btn" onclick="finishEarly()">완료하기</button>
  </div>
</div>

<!-- DONE -->
<div id="screen-done" class="screen">
  <div class="done-card">
    <div class="done-emoji">🏆</div>
    <div class="done-title" id="doneTitle">완벽해요!</div>
    <div class="done-sub" id="doneSub"></div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-n" id="statRounds"></div><div class="stat-l">총 라운드</div></div>
      <div class="stat-box"><div class="stat-n" id="statWords"></div><div class="stat-l">총 단어</div></div>
      <div class="stat-box"><div class="stat-n" id="statWrong"></div><div class="stat-l">최초 오답</div></div>
    </div>
    <div class="done-actions">
      <button class="retry-btn" onclick="restartSame()">🔄 다시 하기 (<span id="doneSameCount"></span>)</button>
      <button class="nav-btn" onclick="chooseAnother()" style="width:100%">📅 다른 Day 선택</button>
    </div>
    <button class="home-btn" onclick="location.href='index.html'">허브로 돌아가기</button>
  </div>
</div>

<footer>🌸 봄날 BOMNAL ENGLISH · 초등 영단어 BASIC <b style="color:#f26d97">v2 ✨</b></footer>

<!-- Firebase (bomnalvaca) -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyCxS524S8KAaF87DomPtl9sJdF-eqes404",authDomain:"bomnalvaca.firebaseapp.com",projectId:"bomnalvaca",storageBucket:"bomnalvaca.firebasestorage.app",messagingSenderId:"115868052300",appId:"1:115868052300:web:765c08867b6f1ce0987de9"};
const app=initializeApp(cfg);
const db=getFirestore(app);
window._fbReady=true;

const WORDS_PER_DAY = 10;
const TOTAL_DAYS = Math.ceil(WORDS.length / WORDS_PER_DAY);   // 30
const MEMO_REPEAT = 3;

// bn_name / bn_school : 봄날 허브에서 localStorage 로 전달
let studentName  = (localStorage.getItem('bn_name')   || sessionStorage.getItem('bn_name')   || '').trim();
let studentSchool= (localStorage.getItem('bn_school') || sessionStorage.getItem('bn_school') || '').trim();

// ── 상태 변수 ──
let chosenDay = 1;
let sessionWords = [];
// 암기 상태
let memoIdx = 0;
let memoTimer = null;
let memoToken = 0;       // 단어 바뀔 때마다 증가 → 이전 재생 세션 무효화
let memoAudio = null;    // 현재 암기 Audio 컨트롤러
// 퀴즈 상태
let queue = [], currentIdx = 0, currentWord = null, answered = false;
let wrongWords = [], allWrong = [], round = 1, startTime = null;

/* ===== 화면 전환 ===== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

}

/* ===== 인트로 ===== */
function initIntro(){
  const hello=document.getElementById('helloBox');
  const input=document.getElementById('nameInput');

    hello.innerHTML=studentName+' 학생'+(studentSchool?' <span class="sch">('+studentSchool+')</span>':'')+' 안녕! 👋';

}
function startFromIntro(){
  if(!studentName){
    const val=document.getElementById('nameInput').value.trim();
    if(!val){
      const el=document.getElementById('nameInput');
      el.classList.add('err'); el.placeholder='이름을 입력해주세요!';
      setTimeout(()=>{el.classList.remove('err');el.placeholder='이름을 입력하세요';},1400);

    studentName=val;
    try{localStorage.setItem('bn_name',val);}catch(e){}
  }

}

/* ===== 학습 이력 (localStorage) ===== */
function progressKey(){ return 'bomnal_elementary_basic_진행_' + (studentName || '익명'); }
function loadDoneDays(){
  try{ const a=JSON.parse(localStorage.getItem(progressKey())||'[]'); return Array.isArray(a)?a:[]; }catch(e){ return []; }
}
function saveDoneDays(a){ try{ localStorage.setItem(progressKey(),JSON.stringify(a)); }catch(e){} }
function markDayDone(d){ const a=loadDoneDays(); if(!a.includes(d)){ a.push(d); a.sort((x,y)=>x-y); saveDoneDays(a); } }
function resetProgress(){
  if(!confirm('학습 이력을 모두 초기화할까요?')) return;
  try{ localStorage.removeItem(progressKey()); }catch(e){}
  renderDayGrid();
}

/* ===== Day 선택 ===== */
function showDayScreen(){
  stopAllAudio();
  renderDayGrid();
  showScreen('screen-day');
}
function renderDayGrid(){
  const done=loadDoneDays();
  const grid=document.getElementById('dayGrid');
  grid.innerHTML='';
  for(let d=1; d<=TOTAL_DAYS; d++){
    const isDone=done.includes(d);
    const s=(d-1)*WORDS_PER_DAY+1, e=Math.min(d*WORDS_PER_DAY,WORDS.length);
    const btn=document.createElement('button');
    btn.className='day-btn'+(isDone?' done':'');
    btn.innerHTML='Day '+d+'<span class="db-n">'+s+'~'+e+'</span>';
    btn.onclick=()=>selectDay(d);
    grid.appendChild(btn);
  }
  const n=done.length, pct=Math.round(n/TOTAL_DAYS*100);
  document.getElementById('dayProgFill').style.width=pct+'%';
  document.getElementById('dayProgText').textContent='30일 중 '+n+'일 완료 ('+pct+'%)';
}

// Day N = words[(N-1)*10] ~ words[(N-1)*10+9]
function selectDay(d){
  resetAllState();                 // 이전 Day 상태 완전 초기화
  chosenDay = d;
  const startIndex = (d-1)*WORDS_PER_DAY;
  const endIndex   = startIndex + WORDS_PER_DAY - 1;
  sessionWords = WORDS.slice(startIndex, endIndex+1);
  startTime = new Date();
  console.log('[Day 선택] Day '+d+' | idx '+startIndex+'~'+endIndex
    +' | 첫 단어='+(sessionWords[0]?sessionWords[0].en+'('+sessionWords[0].ko+')':'없음')
    +' | 단어수='+sessionWords.length);
  startMemorize();
}
function dayLabel(){ return 'Day '+chosenDay; }

/* ===== 상태/오디오 초기화 ===== */
function stopAllAudio(){
  memoToken++;                     // 진행 중 재생 세션 무효화
  if(memoTimer){ clearTimeout(memoTimer); memoTimer=null; }
  if(memoAudio){ try{ memoAudio.stop(); }catch(e){} memoAudio=null; }
  if(quizAudio){ try{ quizAudio.stop(); }catch(e){} quizAudio=null; }
}
function resetAllState(){
  stopAllAudio();
  memoIdx=0;
  queue=[]; currentIdx=0; currentWord=null; answered=false;
  wrongWords=[]; allWrong=[]; round=1;
}

/* ===== 발음 재생 (new Audio + Youdao, 5초 타임아웃 fallback) ===== */
function youdaoUrl(word){
  return 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(String(word||'').toLowerCase()) + '&type=2';
}
// 한 번 재생. onDone은 (ended/error/timeout 중 먼저) 정확히 한 번 호출. .stop()으로 정지.
function playOnce(word, onDone){
  let audio=null, done=false, stopped=false, timer=null;
  function cleanup(){ if(audio){ try{audio.pause();}catch(e){} audio.onended=audio.onerror=null; audio=null; } if(timer){ clearTimeout(timer); timer=null; } }
  function finish(){ if(done||stopped) return; done=true; cleanup(); onDone(); }
  timer=setTimeout(finish, 5000);            // 5초 타임아웃 fallback
  try{ audio=new Audio(youdaoUrl(word)); }catch(e){ finish(); return { stop:function(){ stopped=true; cleanup(); } }; }
  audio.onended=finish;
  audio.onerror=finish;                       // 재생 실패 → 그냥 넘어감
  const p=audio.play();
  if(p&&p.catch) p.catch(function(){ finish(); });
  return { stop:function(){ stopped=true; cleanup(); } };
}

/* ===== STAGE 1 : 암기 ===== */
const DAY_COLORS=[
  '#EADCFB','#D6EAFF','#D6F5E0','#FFF3C7','#FFE0EC',
  '#E0F7F4','#FDE4CF','#E7E0FF','#DFF2D0','#FCE0F5',
  '#FFEAD6','#D9EEFF','#EDE0FB','#D8F3E6','#FFF6D0',
  '#FFE2E2','#DFF0FA','#E5F5D6','#F5E0EE','#E0EEFF',
  '#FCEBD2','#E2E4FB','#D6F0E4','#FFE7CF','#EFE2F7',
  '#DCEEFF','#FFF0E0','#DEF6D9','#FDDFE8','#E8E1FA'
];
const POS_CLASS={'n.':'pos-n','v.':'pos-v','adj.':'pos-adj','adv.':'pos-adv','num.':'pos-num'};
const POS_KO={'n.':'명사','v.':'동사','adj.':'형용사','adv.':'부사','num.':'수사'};
function dayColor(d){ return DAY_COLORS[(d-1)%DAY_COLORS.length]; }

function setMemoPos(pos){
  const el=document.getElementById('memoPos');
  el.className='memo-pos '+(POS_CLASS[pos]||'');
  el.textContent=pos?(pos+(POS_KO[pos]?' '+POS_KO[pos]:'')):'';
  el.style.display=pos?'inline-block':'none';
}
// 재생 표시: cur=0 전부 끔 / 1~3 해당 번호만 채움 ●○○ ○●○ ○○● / 4 전부 채움 ●●●
function setDots(cur){
  document.querySelectorAll('#memoDots .memo-dot').forEach(function(dot){
    const i=+dot.dataset.i;
    const on = (cur>=4) ? true : (i===cur);
    dot.classList.toggle('on', on);
    dot.classList.toggle('pulse', i===cur && cur<4);
  });
}

function startMemorize(){ memoIdx=0; showScreen('screen-memo'); loadMemo(); }

function loadMemo(){
  const w=sessionWords[memoIdx];
  document.getElementById('memoCard').style.background=dayColor(chosenDay);   // Day별 배경
  document.getElementById('memoNum').textContent=(memoIdx+1)+' / '+sessionWords.length;

  // 카드 상단 진행바 (현재 단어 기준)
  document.getElementById('memoCardFill').style.width=Math.round((memoIdx+1)/sessionWords.length*100)+'%';

  // 영어: 위에서 내려오기 (애니메이션 재시작)
  const en=document.getElementById('memoEn');
  en.textContent=w.en;
  en.classList.remove('drop','pop'); void en.offsetWidth; en.classList.add('drop');

  setMemoPos(w.pos);

  // 한글 뜻: 0.8초 뒤 아래에서 올라오기 (애니메이션 재시작)
  const ko=document.getElementById('memoKo');
  ko.textContent=w.ko;
  ko.classList.remove('rise'); void ko.offsetWidth; ko.classList.add('rise');

  const pct=Math.round(memoIdx/sessionWords.length*100);
  document.getElementById('memoFill').style.width=pct+'%';
  document.getElementById('memoText').textContent='Day '+chosenDay+' · '+(memoIdx+1)+' / '+sessionWords.length;
  document.getElementById('memoPrev').disabled=(memoIdx===0);
  const last=(memoIdx===sessionWords.length-1);
  document.getElementById('memoNext').style.display=last?'none':'block';
  document.getElementById('memoToQuiz').style.display=last?'block':'none';
  setDots(0);
  autoSpeak3(w.en);
}

// TTS 재생마다 영어 단어 통통 튀기 (drop 애니메이션과 겹치지 않게 pop 재적용)
function bounceEn(){
  const en=document.getElementById('memoEn');
  if(!en) return;
  en.classList.remove('drop','pop'); void en.offsetWidth; en.classList.add('pop');
}

function setMemoNavEnabled(on){
  document.getElementById('memoNext').disabled=!on;
  document.getElementById('memoToQuiz').disabled=!on;
}

// 1번→2번→3번 재생, 각 재생 5초 타임아웃, 3번 완료 후에만 다음 버튼 활성화
function autoSpeak3(text){
  const token=++memoToken;
  if(memoTimer){ clearTimeout(memoTimer); memoTimer=null; }
  if(memoAudio){ try{ memoAudio.stop(); }catch(e){} memoAudio=null; }
  setMemoNavEnabled(false);
  const cnt=document.getElementById('memoCount');
  const btn=document.getElementById('memoSound');

  function playN(n){
    if(token!==memoToken) return;             // 단어 바뀜 → 중단
    cnt.textContent='🔊 발음 '+n+' / 3';
    setDots(n);
    btn.classList.add('playing');
    if(n>=2) bounceEn();                        // 1번째는 내려오기(drop), 2·3번째는 통통(pop)
    memoAudio = playOnce(text, function(){
      if(token!==memoToken) return;
      btn.classList.remove('playing');
      if(n>=MEMO_REPEAT){
        cnt.textContent='✅ 3번 듣기 완료!';
        setDots(4);
        setMemoNavEnabled(true);              // 3번 완료 후에만 활성화
      }else{
        memoTimer=setTimeout(function(){ playN(n+1); }, 700);  // 0.7초 후 다음
      }
    });
  }
  playN(1);
}
function replayMemo(){ autoSpeak3(sessionWords[memoIdx].en); }
function memoNext(){ if(memoIdx<sessionWords.length-1){ memoIdx++; loadMemo(); } }
function memoPrev(){ if(memoIdx>0){ memoIdx--; loadMemo(); } }

/* ===== STAGE 2 & 3 : 퀴즈 + 오답 반복 ===== */
function startQuizStage(){
  stopAllAudio();
  queue=shuffle([...sessionWords]);
  wrongWords=[]; allWrong=[]; round=1; currentIdx=0;
  showScreen('screen-quiz');
  loadWord();
}
function loadWord(){
  if(currentIdx>=queue.length){ showRoundResult(); return; }
  answered=false;
  currentWord=queue[currentIdx];
  const total=queue.length, pct=Math.round(currentIdx/total*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=(currentIdx+1)+' / '+total;
  document.getElementById('roundBadge').textContent=round+'라운드';
  document.getElementById('quizStageTag').textContent=round===1?'STEP 2 · 4지선다 퀴즈':'STEP 3 · 오답 반복 ('+round+'라운드)';
  document.getElementById('wordEn').textContent=currentWord.en;
  document.getElementById('feedback').textContent=''; document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').classList.remove('show');
  buildChoices();
  setTimeout(speakWord,300);
}
function speakWord(){
  if(quizAudio){ try{ quizAudio.stop(); }catch(e){} quizAudio=null; }
  const btn=document.getElementById('soundBtn');
  btn.classList.add('playing');
  quizAudio=playOnce(currentWord.en, function(){ btn.classList.remove('playing'); });
}
// 정답은 id로 판정, 보기는 뜻(ko) 중복 없이
function buildChoices(){
  const container=document.getElementById('choices');
  container.innerHTML='';
  const pool=[]; const seen=new Set([currentWord.ko]);
  for(const w of shuffle(WORDS.filter(w=>w.id!==currentWord.id))){
    if(seen.has(w.ko)) continue;
    seen.add(w.ko); pool.push(w);
    if(pool.length===3) break;
  }
  shuffle([currentWord,...pool]).forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=opt.ko;
    btn.onclick=()=>selectAnswer(btn,opt.id===currentWord.id);
    container.appendChild(btn);
  });
}
function selectAnswer(btn,isCorrect){
  if(answered) return; answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===currentWord.ko) b.classList.add('correct');
  });
  const fb=document.getElementById('feedback');
  if(isCorrect){ btn.classList.add('correct'); fb.textContent='✅ 정답!'; fb.className='feedback ok'; }
  else{
    btn.classList.add('wrong');
    fb.textContent='❌ 내 답: '+btn.textContent+' / 정답: '+currentWord.ko;
    fb.className='feedback bad';
    if(!wrongWords.find(w=>w.id===currentWord.id)) wrongWords.push(currentWord);
    if(!allWrong.find(w=>w.id===currentWord.id)) allWrong.push(currentWord);
  }
  document.getElementById('nextBtn').classList.add('show');
}
function nextWord(){ currentIdx++; loadWord(); }
function showRoundResult(){
  const correct=queue.length-wrongWords.length, pct=Math.round(correct/queue.length*100);
  if(wrongWords.length===0){ showDone(true); return; }   // 오답 0개 → 완료
  document.getElementById('roundEmoji').textContent=pct>=80?'😊':'💪';
  document.getElementById('roundTitle').textContent=round+'라운드 완료!';
  document.getElementById('roundScore').textContent=correct+' / '+queue.length;
  document.getElementById('roundScoreLabel').textContent=pct+'점 · 오답 '+wrongWords.length+'개';
  document.getElementById('roundSub').textContent='오답 '+wrongWords.length+'개가 남았어요.\n다시 풀어서 완벽하게! 💪';
  showScreen('screen-round');
  saveResult(false);
}
// 오답만 다음 라운드로
function startRetry(){
  round++;
  queue=shuffle([...wrongWords]); wrongWords=[]; currentIdx=0;
  showScreen('screen-quiz'); loadWord();
}
function finishEarly(){ showDone(false); }
function showDone(full){
  const elapsed=Math.max(1,Math.round((new Date()-startTime)/60000));
  if(full){ markDayDone(chosenDay); }             // 3단계까지 끝내면 Day 완료 기록
  const msg=full
    ? studentName+' 학생, '+dayLabel()+' 단어를 완벽하게 외웠어요! 🎉'
    : studentName+' 학생, '+dayLabel()+' 학습을 마쳤어요.';
  document.getElementById('doneTitle').textContent=full?'완벽해요!':'수고했어요!';
  document.getElementById('doneSub').textContent=msg+'\n총 '+round+'라운드 · 약 '+elapsed+'분 소요';
  document.getElementById('statRounds').textContent=round;
  document.getElementById('statWords').textContent=sessionWords.length;
  document.getElementById('statWrong').textContent=allWrong.length;
  document.getElementById('doneSameCount').textContent=dayLabel();
  showScreen('screen-done');
  saveResult(full);
}
function restartSame(){ resetAllState(); startTime=new Date(); startMemorize(); }
function chooseAnother(){ showDayScreen(); }

/* ===== Firebase 저장 ===== */
function saveResult(completed){
  const data={
    studentName, school:studentSchool,
    quizType:LEVEL_INFO.quizType, level:LEVEL_INFO.name,
    score:completed?100:Math.round((sessionWords.length-allWrong.length)/sessionWords.length*100),
    correct:sessionWords.length-allWrong.length, wrong:allWrong.length, total:sessionWords.length,
    day:chosenDay, round, completed,
    wrongWords:allWrong.map(w=>({eng:w.en,kor:w.ko})),
    userAgent:navigator.userAgent.substring(0,100)
  };
  let w=0;
  const t=setInterval(()=>{ w+=200; if(window._saveResult){ clearInterval(t); window._saveResult(data); } else if(w>=6000) clearInterval(t); },200);
}

function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

initIntro();
