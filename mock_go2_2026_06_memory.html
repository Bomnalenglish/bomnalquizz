:root{--pri:#1565c0;--acc:#f57f17;--bg:#e3f2fd;--card:#fff;--bdr:#90caf9;--muted:#757575;--green:#2e7d32;--red:#c62828;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;color:#1a1a2e;}
.hidden{display:none!important;}

/* START */
#startScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.s-card{background:var(--card);border-radius:24px;padding:36px 28px;text-align:center;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(21,101,192,.15);}

.s-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}

.start-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1565c0,#f57f17);color:white;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* PASSAGE SELECT */
#passageScreen{padding:20px;max-width:680px;margin:0 auto;}
.ps-header{background:linear-gradient(135deg,#1565c0,#1976d2);color:white;border-radius:16px;padding:18px 22px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.ps-title{font-family:'Black Han Sans',sans-serif;font-size:16px;}
.ps-sub{font-size:11px;opacity:.8;margin-top:3px;}
.user-info{background:rgba(255,255,255,.2);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}

.fb.on{background:var(--pri);color:white;}
.passage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.p-card{background:white;border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;border:2.5px solid #e0e0e0;transition:all .18s;position:relative;}
.p-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 6px 18px rgba(21,101,192,.12);}
.p-card.sel{border-color:var(--pri);background:#e3f2fd;}
.p-card.done{border-color:#4caf50;background:#e8f5e9;}
.p-no{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--pri);margin-bottom:4px;}
.p-topic{font-size:10px;color:var(--muted);line-height:1.4;}
.p-badge{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;}

.sel-all-btn{width:100%;padding:12px;border-radius:12px;border:2px solid var(--pri);background:white;color:var(--pri);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.go-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1565c0,#f57f17);color:white;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

.hdr{background:#1565c0;color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.ht{font-family:'Black Han Sans',sans-serif;font-size:15px;}
.hs{font-size:10px;opacity:.7;margin-top:2px;}
.hb{background:rgba(255,255,255,.2);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:700;}
.pw{height:4px;background:#bbdefb;}.pf{height:100%;background:linear-gradient(90deg,#1565c0,#f57f17);transition:width .4s;}

/* QUIZ AREA */
#quizArea{padding:20px;max-width:680px;margin:0 auto;}
.qc{background:white;border-radius:18px;padding:22px 20px;margin-bottom:16px;box-shadow:0 3px 16px rgba(21,101,192,.08);}
.q-no-badge{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;}
.qno{font-family:'Black Han Sans',sans-serif;font-size:13px;color:white;background:var(--pri);padding:3px 12px;border-radius:12px;}

.qtype.blank{background:#fff3e0;color:#e65100;}
.qtype.tf{background:#f3e5f5;color:#6a1b9a;}
.passage-box{background:#f8faff;border-left:4px solid var(--pri);border-radius:0 10px 10px 0;padding:14px 16px;font-size:14px;line-height:1.9;margin-bottom:14px;color:#1a237e;}
.blank{display:inline-block;min-width:80px;border-bottom:2.5px solid var(--acc);color:transparent;background:#fff3e0;border-radius:4px;padding:0 4px;font-weight:800;vertical-align:middle;}
.q-prompt{font-size:13px;font-weight:700;color:#1565c0;margin-bottom:10px;}

.cb{background:#f5f5f5;border:2px solid #e0e0e0;border-radius:11px;padding:12px 15px;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:10px;}
.cb:hover:not(:disabled){border-color:var(--pri);background:#e3f2fd;}
.cb.correct{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;}
.cb.wrong{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.cb.reveal{background:#e8f5e9;border-color:#2e7d32;}
.cn{width:22px;height:22px;border-radius:50%;background:#90caf9;color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tfb{padding:16px;border:2px solid #e0e0e0;border-radius:12px;background:#f5f5f5;font-family:'Nanum Gothic',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;}
.tfb:hover:not(:disabled){transform:translateY(-2px);}
.tfb.ob{border-color:#4caf50;color:#2e7d32;}.tfb.xb{border-color:#e91e63;color:#880e4f;}
.tfb.correct{background:#e8f5e9;}.tfb.wrong{background:#ffebee;}
.fb-msg{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:800;margin-top:10px;display:none;}
.fb-msg.ok{background:#e8f5e9;color:#1b5e20;display:block;}
.fb-msg.no{background:#ffebee;color:#b71c1c;display:block;}

/* RESULT */
#resultScreen{padding:20px;max-width:600px;margin:0 auto;}
.rc{background:white;border-radius:24px;padding:30px 22px;box-shadow:0 8px 32px rgba(21,101,192,.1);text-align:center;}
.rs{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--pri);line-height:1;}
.rsub{font-size:13px;color:var(--muted);margin-top:4px;}
.sr{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap;}
.si{text-align:center;}.sn{font-family:'Black Han Sans',sans-serif;font-size:24px;}.sl{font-size:11px;color:var(--muted);margin-top:2px;}
.wl{background:var(--bg);border-radius:14px;padding:14px;text-align:left;margin-top:14px;max-height:300px;overflow-y:auto;}
.wl h3{font-size:12px;font-weight:800;color:var(--red);margin-bottom:8px;}
.wi{background:white;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:11px;border-left:3px solid #e91e63;}
.wie{font-weight:800;color:var(--pri);}.wid{font-size:10px;color:var(--muted);margin-top:2px;}
.rbtns{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.rbtn{padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.rbtn-p{background:linear-gradient(135deg,#1565c0,#f57f17);color:white;}
.rbtn-s{background:#f5f5f5;color:#1565c0;border:2px solid #90caf9;}

@media(max-width:480px){.passage-grid{grid-template-columns:repeat(3,1fr)}.tf-btns{grid-template-columns:1fr 1fr}}

<script>

// 각 지문: blanks = 진짜 영어 빈칸 추론, topic_q = 주제/요지 선택
const PASSAGES = [
  {no:21,topic:`지문 21번`,text:`Humans [excel] at visual imagery. Our brains evolved this ability to create an internal mental picture or model of the world in which we can [rehearse] forthcoming actions, without the risks or the penalties of doing them in the real world. There are even hints from brain-imaging studies by Harvard University psychologist Steve Kosslyn showing that your brain uses the same regions to imagine a scene as when you actually view one. But evolution has seen to it that such internally generated representations are never as [authentic] as the real thing. This is a wise bit of self-restraint on your genes' part. If your internal model of the world were a perfect [substitute], then anytime you felt hungry you could simply imagine yourself at a banquet, consuming a feast. You would have no [incentive] to find real food and would soon starve to death. As the Bard said, "You cannot cloy the hungry edge of appetite by bare imagination of a feast."`,blanks:[{sentence:`_____ (~에 뛰어나다)`,opts:[`excel`,`rehearse`,`authentic`,`substitute`],ans:`excel`},{sentence:`_____ (예행연습하다)`,opts:[`rehearse`,`excel`,`authentic`,`incentive`],ans:`rehearse`},{sentence:`_____ (진짜의, 진본의)`,opts:[`authentic`,`excel`,`substitute`,`incentive`],ans:`authentic`},{sentence:`_____ (대체물)`,opts:[`substitute`,`excel`,`rehearse`,`incentive`],ans:`substitute`},{sentence:`_____ (유인, 동기 부여)`,opts:[`incentive`,`excel`,`rehearse`,`authentic`],ans:`incentive`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`evolutionary limit on the realism of mental imagery`,`the perfect substitute role of imagination in survival`,`visual imagery as proof of human cognitive evolution`,`mental images as motivation to find real food sources`,`the role of genetic mutations in human survival instincts`],ans:`evolutionary limit on the realism of mental imagery`},tf:[{stmt:`Humans can rehearse future actions through visual imagery without real-world risks.`,ans:true,exp:`본문 내용과 일치`},{stmt:`The same brain regions are involved in imagining a scene and actually viewing one.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Internally generated mental representations are as authentic as the real thing.`,ans:false,exp:`본문과 다름 (never as authentic)`},{stmt:`If imagination were a perfect substitute for reality, people might starve to death.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Bare imagination of a feast can satisfy the hungry edge of appetite.`,ans:false,exp:`본문과 다름`}]},
  {no:22,topic:`지문 22번`,text:`For each [objective] probability — from one percent to 100 percent — we want to know the [subjective] probability weight. When we make decisions, do we treat a one-percent chance just like one percent, or like something else? Events that could happen but aren't likely — low-probability events — can be defined as probabilities up to about 25 percent. Low-probability events tend to factor more into decisions than they should. That is, an event that has an objective one-percent chance of occurring could subjectively seem like it has a five-percent chance of occurring. We [overestimate] the [likelihood] of these low-probability events. In general, the smaller the probability, the more we overestimate its likelihood. For example, people who play the lottery are often [optimistic] about winning. However, the odds of a single ticket winning the largest, most popular U.S. lotteries are on the order of one in 175 million.`,blanks:[{sentence:`_____ (객관적인)`,opts:[`objective`,`subjective`,`overestimate`,`likelihood`],ans:`objective`},{sentence:`_____ (주관적인)`,opts:[`subjective`,`objective`,`overestimate`,`optimistic`],ans:`subjective`},{sentence:`_____ (과대평가하다)`,opts:[`overestimate`,`objective`,`subjective`,`likelihood`],ans:`overestimate`},{sentence:`_____ (가능성)`,opts:[`likelihood`,`objective`,`subjective`,`optimistic`],ans:`likelihood`},{sentence:`_____ (낙관적인)`,opts:[`optimistic`,`objective`,`subjective`,`overestimate`],ans:`optimistic`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`We tend to overestimate the likelihood of low-probability events.`,`Repeated irrational decisions raise an organization's failure rate.`,`Relying solely on luck hinders one's inner personal growth.`,`We are inclined to interpret simple events in complex ways.`,`Considering diverse possibilities leads to optimal decision-making.`],ans:`We tend to overestimate the likelihood of low-probability events.`},tf:[{stmt:`Low-probability events are defined as having probabilities up to about 25 percent.`,ans:true,exp:`본문 내용과 일치`},{stmt:`People give less weight to low-probability events than they actually deserve.`,ans:false,exp:`본문과 다름 (factor more than they should)`},{stmt:`The smaller the probability, the more strongly people overestimate its likelihood.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Lottery players are typically optimistic about their chance of winning.`,ans:true,exp:`본문 내용과 일치`},{stmt:`The odds of winning major U.S. lotteries are roughly one in 175 million.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:23,topic:`지문 23번`,text:`Many of the [barriers] to trade exist not because of a lack of markets or customers, but because there are major barriers to getting products to market at [competitive] prices. [transaction] costs are [significant] for companies — not only the straight exchange costs, but also the cost of converting, paying, and hedging funds just to pay for the goods and services. Having a [common currency] means that many of those transaction costs disappear and the savings can be reinvested back into firms' productivity and innovation. Basically, useless costs turn into productive costs — with longer-term benefits to the whole economy. By unifying some of the currencies, whole economies benefit and grow more than they would as independents. So a common currency provides for a strong economic foundation that all can benefit from.`,blanks:[{sentence:`_____ (장벽, 장애물)`,opts:[`barriers`,`competitive`,`transaction`,`significant`],ans:`barriers`},{sentence:`_____ (경쟁력 있는)`,opts:[`competitive`,`barriers`,`transaction`,`common currency`],ans:`competitive`},{sentence:`_____ (거래)`,opts:[`transaction`,`barriers`,`competitive`,`significant`],ans:`transaction`},{sentence:`_____ (상당한)`,opts:[`significant`,`barriers`,`competitive`,`common currency`],ans:`significant`},{sentence:`_____ (공통 화폐)`,opts:[`common currency`,`barriers`,`competitive`,`transaction`],ans:`common currency`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`economic advantages of a common currency system`,`significance of marketing strategies for multinational firms`,`current conflicts caused by globalized financial markets`,`necessity for strict regulation of cash transactions`,`various reasons for undertaking risk in investment`],ans:`economic advantages of a common currency system`},tf:[{stmt:`Many trade barriers stem from difficulties of getting products to market at competitive prices.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Transaction costs include only the direct exchange costs and nothing else.`,ans:false,exp:`본문과 다름 (also converting, paying, hedging)`},{stmt:`A common currency makes many transaction costs disappear.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Savings from reduced costs can be reinvested in productivity and innovation.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Unified currencies provide a strong economic foundation benefiting all participants.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:24,topic:`지문 24번`,text:`The light from even our nearest [stellar] neighbour takes four years to [reach] us. When we look at the stars, we are looking back in time. This is an [incredible] gift. We can see parts of space, parts of our universe, as they were many years ago. The further we can collect light from, the further back in time we can look. If you look at the bright star Betelgeuse, which [glows] in the Orion constellation, you wind time back more than six hundred years. Its reddish glow started its journey to Earth in the Middle Ages. The stars in Orion's belt are even further away. Their light, familiar to generations of humans, has travelled at least 1,000 years to reach us. This means we have a chance of understanding the history of the universe because we can see the more [distant] parts of it as they were in the past, thousands or millions or billions of years ago.`,blanks:[{sentence:`_____ (별의)`,opts:[`stellar`,`reach`,`incredible`,`glow`],ans:`stellar`},{sentence:`_____ (도달하다)`,opts:[`reach`,`stellar`,`incredible`,`distant`],ans:`reach`},{sentence:`_____ (놀라운, 믿기 힘든)`,opts:[`incredible`,`stellar`,`reach`,`glow`],ans:`incredible`},{sentence:`_____ (빛나다)`,opts:[`glows`,`stellar`,`reach`,`distant`],ans:`glows`},{sentence:`_____ (먼)`,opts:[`distant`,`stellar`,`reach`,`incredible`],ans:`distant`}],topic_q:{q:`이 글의 제목으로 가장 적절한 것은?`,opts:[`Starlight as a Window into the History of the Universe`,`How Long Does It Take for Stars to Burn Out in Space?`,`Life Beyond Earth: The Search for Unidentified Species`,`Imagination Brings Us Closer to Understanding the Universe`,`Why Stars in the Sky Look Like They're Moving`],ans:`Starlight as a Window into the History of the Universe`},tf:[{stmt:`Light from our nearest stellar neighbour takes four years to reach us.`,ans:true,exp:`본문 내용과 일치`},{stmt:`When we look at stars, we see them exactly as they are at this moment.`,ans:false,exp:`본문과 다름 (looking back in time)`},{stmt:`Betelgeuse's reddish glow began its journey during the Middle Ages.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Stars in Orion's belt are closer to Earth than Betelgeuse.`,ans:false,exp:`본문과 다름 (even further)`},{stmt:`Collecting light from farther away allows us to look further back in time.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:29,topic:`지문 29번`,text:`The [renowned] British philosopher Alfred North Whitehead asserted that "civilization advances by extending the number of operations we can perform without thinking about them." Take, for example, the "[advance]" offered to civilization by the discount coupon, which allows consumers to [assume] that they will receive a reduced purchase price by presenting the coupon. The extent to which we have learned to operate [mechanically] on that assumption is illustrated in the experience of one automobile-tire company. Mailed-out coupons that — because of a printing error — offered no savings to recipients produced just as much customer response as did error-free coupons that offered [substantial] savings. The obvious but instructive point here is that we expect discount coupons to do double duty. Not only do we expect them to save us money, we also expect them to save us the time and mental energy required to think about how to do it.`,blanks:[{sentence:`_____ (저명한)`,opts:[`renowned`,`advance`,`assume`,`mechanically`],ans:`renowned`},{sentence:`_____ (진보, 발전)`,opts:[`advance`,`renowned`,`assume`,`substantial`],ans:`advance`},{sentence:`_____ (추정하다, 가정하다)`,opts:[`assume`,`renowned`,`advance`,`mechanically`],ans:`assume`},{sentence:`_____ (기계적으로)`,opts:[`mechanically`,`renowned`,`advance`,`substantial`],ans:`mechanically`},{sentence:`_____ (상당한, 실질적인)`,opts:[`substantial`,`renowned`,`advance`,`assume`],ans:`substantial`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`Discount coupons save us not only money but also mental energy.`,`Whitehead's theory of civilization is only true for ancient societies.`,`Printing errors on coupons always reduce consumer response rates.`,`Mental laziness is the root cause of most consumer financial losses.`,`Companies should provide larger discounts to attract more customers.`],ans:`Discount coupons save us not only money but also mental energy.`},tf:[{stmt:`Whitehead claimed civilization advances by extending operations done without thinking.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Coupons with printing errors offering no savings drew fewer customer responses.`,ans:false,exp:`본문과 다름 (just as much response)`},{stmt:`We expect coupons to do double duty by saving money and mental energy.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Mental energy is one of the things coupons help us save.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Consumers always carefully verify discount coupons before using them.`,ans:false,exp:`본문과 다름 (mechanically assumed)`}]},
  {no:30,topic:`지문 30번`,text:`Usually, innovative high-tech products have low price [elasticity]. This means that high variation in price, an increase as well as a decrease, does not significantly modify [demand]. These high-tech products have few [substitutes], meaning that the costs to switch to another product are high. Additionally, at the first stage of the technology, buyers — either innovators or forerunners — are less [sensitive] to price than to additional performance; they often have deep pockets or are ready to spend a lot for a new innovative and outstanding product. For instance, with its new product range, a high-end mobile phone manufacturer is aiming at the 3% of millionaire households with assets of more than $2.5 million; those are customers who are ready to accept the price range the manufacturer has set. At that stage, the competitors are not interested in lowering their price significantly whatsoever, because they are chasing the same categories of customers, not sensitive to price. Furthermore, the high price of these products is often [perceived] as a sign of quality and reinforces a customer's confidence in the company.`,blanks:[{sentence:`_____ (탄력성)`,opts:[`elasticity`,`demand`,`substitute`,`sensitive`],ans:`elasticity`},{sentence:`_____ (수요)`,opts:[`demand`,`elasticity`,`substitute`,`perceived`],ans:`demand`},{sentence:`_____ (대체품)`,opts:[`substitutes`,`elasticity`,`demand`,`sensitive`],ans:`substitutes`},{sentence:`_____ (민감한)`,opts:[`sensitive`,`elasticity`,`demand`,`perceived`],ans:`sensitive`},{sentence:`_____ (인식되다)`,opts:[`perceived`,`elasticity`,`demand`,`sensitive`],ans:`perceived`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`why innovative high-tech products have low price elasticity`,`the importance of lowering prices in competitive markets`,`how millionaire customers shape product design choices`,`strategies to attract first-stage buyers using discounts`,`the negative impact of substitute products on innovation`],ans:`why innovative high-tech products have low price elasticity`},tf:[{stmt:`Innovative high-tech products typically show low price elasticity.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Early buyers of new technology are more sensitive to price than to performance.`,ans:false,exp:`본문과 다름 (less sensitive)`},{stmt:`High-end mobile phone makers target the wealthiest 3% of households.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Competitors significantly lower their prices to attract first-stage buyers.`,ans:false,exp:`본문과 다름 (not interested in lowering)`},{stmt:`A high price can be perceived as a sign of quality and boost customer confidence.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:31,topic:`지문 31번`,text:`One easily [underappreciated] feature of a city street or square is its "future-proof" nature. The ancient [medieval] squares in places like Marrakesh and Siena are still places where stuff is sold every day, even if the stuff itself has changed over the last five hundred years. The city square is a fairly future-proof technology, as is the shopping street, even in an age of online shopping. For example, the same [physical] store that once sold buggy whips and typewriters might now repair damaged phones and sell bubble tea. The same [infrastructure] supports evolving uses. Jane Jacobs, the great [prophet] of the city economy, made much of this fact in her books, including The Death and Life of Great American Cities and The Nature of Economies. As she pointed out, the great advantage of a city architecture is its ability to support change in uses, and Jacobs correctly predicted the persistence of the city itself, unlike those who predicted the rise of the Internet would mean the death of the city.`,blanks:[{sentence:`_____ (과소평가되는)`,opts:[`underappreciated`,`medieval`,`physical`,`infrastructure`],ans:`underappreciated`},{sentence:`_____ (중세의)`,opts:[`medieval`,`underappreciated`,`physical`,`prophet`],ans:`medieval`},{sentence:`_____ (물리적인, 실재하는)`,opts:[`physical`,`underappreciated`,`medieval`,`infrastructure`],ans:`physical`},{sentence:`_____ (기반 시설)`,opts:[`infrastructure`,`underappreciated`,`medieval`,`prophet`],ans:`infrastructure`},{sentence:`_____ (예언자)`,opts:[`prophet`,`underappreciated`,`medieval`,`physical`],ans:`prophet`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`the future-proof nature of city streets and squares`,`the inevitable decline of physical retail in the Internet age`,`the historical importance of medieval city squares in Europe`,`Jane Jacobs's contribution to modern architectural movements`,`how online shopping is transforming city infrastructure`],ans:`the future-proof nature of city streets and squares`},tf:[{stmt:`Medieval squares in Marrakesh and Siena are still active selling places today.`,ans:true,exp:`본문 내용과 일치`},{stmt:`The rise of online shopping has made shopping streets obsolete.`,ans:false,exp:`본문과 다름 (still future-proof)`},{stmt:`The same physical store building can support very different businesses over time.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Jane Jacobs predicted that the Internet would bring about the death of cities.`,ans:false,exp:`본문과 다름 (predicted persistence)`},{stmt:`City architecture's strength lies in its ability to accommodate changing uses.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:32,topic:`지문 32번`,text:`The [genomics] revolution made it possible to see just how impactful touch is to plants on a deeper level. Peering at the genes of Arabidopsis thaliana, a weedy plant in the mustard family and the lab rat of the plant biology world, researchers saw that touch quietly [triggered] such a dramatic response in their [hormones] and gene expression that it could substantially inhibit their growth. They stroked the arabidopsis with soft paintbrushes, and then analyzed the plants' genetic responses. Within thirty minutes of being touched, 10 percent of the plant's genome was [altered]. Clearly, the plant was reorganizing its priorities to deal with the [disturbance], and rerouting energy away from the hard work of getting taller. Touched multiple times, arabidopsis cut its upward growth rate by as much as 30 percent.`,blanks:[{sentence:`_____ (유전체학)`,opts:[`genomics`,`trigger`,`hormone`,`alter`],ans:`genomics`},{sentence:`_____ (촉발하다, 유발하다)`,opts:[`triggered`,`genomics`,`hormones`,`altered`],ans:`triggered`},{sentence:`_____ (호르몬)`,opts:[`hormones`,`genomics`,`triggered`,`disturbance`],ans:`hormones`},{sentence:`_____ (바뀌다, 변경되다)`,opts:[`altered`,`genomics`,`triggered`,`hormones`],ans:`altered`},{sentence:`_____ (방해, 교란)`,opts:[`disturbance`,`genomics`,`triggered`,`altered`],ans:`disturbance`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`how physical touch dramatically inhibits the growth of plants`,`the role of genomics in classifying weedy mustard plants`,`why arabidopsis is the most popular lab rat in plant biology`,`techniques for stroking plants to accelerate genome alteration`,`the dangers of paintbrushes for laboratory plant samples`],ans:`how physical touch dramatically inhibits the growth of plants`},tf:[{stmt:`Genomics allowed scientists to discover the deep impact of touch on plants.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Within 30 minutes of being touched, 10% of arabidopsis's genome was altered.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Touched plants increase their upward growth rate as a defense response.`,ans:false,exp:`본문과 다름 (cut by 30%)`},{stmt:`The plant reroutes energy away from getting taller after being touched.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Touching arabidopsis multiple times can cut its growth rate by up to 30 percent.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:33,topic:`지문 33번`,text:`Evolution will come to a [standstill] until something in the conditions changes: the [onset] of an ice age, a change in the average rainfall of the area, a shift in the [prevailing] wind. Such changes do happen when we are dealing with a timescale as long as the evolutionary one. As a consequence, evolution normally does not come to a halt, but constantly tracks the changing environment. If there is a steady downward drift in the average temperature in the area, a drift that persists over centuries, [successive] generations of animals will be [propelled] by a steady selection 'pressure' in the direction, say, of growing longer coats of hair. If after a few thousand years of reduced temperature the trend reverses and average temperatures creep up again, the animals will come under the influence of a new selection pressure, and will be pushed towards growing shorter coats again.`,blanks:[{sentence:`_____ (정지, 멈춤)`,opts:[`standstill`,`onset`,`prevailing`,`successive`],ans:`standstill`},{sentence:`_____ (시작, 도래)`,opts:[`onset`,`standstill`,`prevailing`,`propelled`],ans:`onset`},{sentence:`_____ (우세한, 지배적인)`,opts:[`prevailing`,`standstill`,`onset`,`successive`],ans:`prevailing`},{sentence:`_____ (연속적인)`,opts:[`successive`,`standstill`,`onset`,`propelled`],ans:`successive`},{sentence:`_____ (추진하다, 몰고 가다)`,opts:[`propelled`,`standstill`,`onset`,`prevailing`],ans:`propelled`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`how evolution constantly tracks the changing environment`,`why selection pressure remains identical across generations`,`the geological causes of major ice ages on Earth`,`the limits of natural selection in modern animals`,`how rainfall changes accelerate evolutionary halting`],ans:`how evolution constantly tracks the changing environment`},tf:[{stmt:`Environmental conditions can change on a timescale as long as the evolutionary one.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Evolution normally comes to a complete halt regardless of environmental changes.`,ans:false,exp:`본문과 다름 (does not come to a halt)`},{stmt:`A steady drop in temperature over centuries can drive animals toward longer coats.`,ans:true,exp:`본문 내용과 일치`},{stmt:`When trends reverse and temperatures rise, animals can be pushed toward shorter coats.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Selection pressure stays the same regardless of environmental shifts.`,ans:false,exp:`본문과 다름`}]},
  {no:34,topic:`지문 34번`,text:`The high price of land in [metropolitan] areas has [implications] for the efficient employment of resources. For example, in New York City, as in many large cities, sidewalk [vending] carts sell everything from hot dogs to ice cream. Why are these carts so popular, with over 3,000 in New York City alone? Consider the [resources] used to supply hot dogs: land, labor, capital, entrepreneurial ability, plus intermediate goods such as hot dogs, buns, and other ingredients. Which of these do you suppose is most expensive in New York City? [retail] space along Madison Avenue rents for an average of $550 a year per square foot. Because operating a hot dog cart requires about 4 square yards, it could cost as much as $20,000 a year to rent that much commercial space. Aside from the necessary public permits, however, space on the public sidewalk is free to vendors. Profit-maximizing street vendors substitute public sidewalks for costly commercial space.`,blanks:[{sentence:`_____ (대도시의)`,opts:[`metropolitan`,`implication`,`vending`,`retail`],ans:`metropolitan`},{sentence:`_____ (영향, 시사점)`,opts:[`implications`,`metropolitan`,`vending`,`resources`],ans:`implications`},{sentence:`_____ (판매(의))`,opts:[`vending`,`metropolitan`,`implications`,`retail`],ans:`vending`},{sentence:`_____ (자원)`,opts:[`resources`,`metropolitan`,`implications`,`vending`],ans:`resources`},{sentence:`_____ (소매의)`,opts:[`retail`,`metropolitan`,`implications`,`vending`],ans:`retail`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`Street vendors substitute free public sidewalks for costly commercial space.`,`Hot dog carts pollute the streets of large metropolitan cities.`,`Madison Avenue retail rents have risen too quickly in recent years.`,`Public permits should be required for all sidewalk vending carts.`,`Entrepreneurial ability is the most expensive resource in big cities.`],ans:`Street vendors substitute free public sidewalks for costly commercial space.`},tf:[{stmt:`There are more than 3,000 sidewalk vending carts in New York City.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Madison Avenue retail space rents for an average of $550 per square foot per year.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Renting 4 square yards of commercial space could cost up to $20,000 a year.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Public sidewalk space requires high rental fees from vendors.`,ans:false,exp:`본문과 다름 (free)`},{stmt:`Vendors use public sidewalks to avoid expensive commercial space costs.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:35,topic:`지문 35번`,text:`The process we go through when we look at a work of art to [determine] if we recognize and can make sense of its content is not just a visual one. It is a mental process as well, largely based on the elements within and about the work we can [identify] and [categorize]. As we look and think, we may be given [clues] about what the work means by where it is, when it was made, what culture it came from, who created it, or why it was made. Any information we can gather helps us understand the work's [context], that is, for what historical, social, personal, political, or scientific reasons the work of art was made. And then, using all the contextual information we have gathered, we interpret the work of art's content to discover what it means or symbolizes.`,blanks:[{sentence:`_____ (결정하다, 판단하다)`,opts:[`determine`,`identify`,`categorize`,`clue`],ans:`determine`},{sentence:`_____ (식별하다)`,opts:[`identify`,`determine`,`categorize`,`context`],ans:`identify`},{sentence:`_____ (분류하다)`,opts:[`categorize`,`determine`,`identify`,`clue`],ans:`categorize`},{sentence:`_____ (단서)`,opts:[`clues`,`determine`,`identify`,`context`],ans:`clues`},{sentence:`_____ (맥락, 배경)`,opts:[`context`,`determine`,`identify`,`categorize`],ans:`context`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`how viewers interpret art using visual and contextual information`,`the artistic techniques used by contemporary symbolic painters`,`the role of museums in providing visitor experiences`,`the historical contexts behind major art movements`,`the difference between visual and mental perception in daily life`],ans:`how viewers interpret art using visual and contextual information`},tf:[{stmt:`Looking at a work of art involves both visual perception and mental processing.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Clues such as where the work was made can inform what it means.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Information about the work's background helps us understand its context.`,ans:true,exp:`본문 내용과 일치`},{stmt:`To understand art, viewers should completely ignore historical context.`,ans:false,exp:`본문과 다름 (irrelevant sentence)`},{stmt:`Contextual information is used to interpret what the artwork means or symbolizes.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:36,topic:`지문 36번`,text:`For most animals the struggle to survive takes up all their time. Finding food and drink, keeping warm and clean, avoiding [predators], [migrating] and reproducing use up all their energies. If they do have any time to spare, they spend it resting or sleeping. Only very young animals, under the protection of their parents, have enough [surplus] energy to engage in lively bouts of play. This was also true for our early ancestors. The constant search for food would have put heavy demands upon them. In certain regions, at particular times of year, the prey was sufficiently plentiful and their hunting techniques sufficiently advanced for them to experience a remarkable degree of [prosperity]. They had time on their hands. But as they slowly evolved into more and more efficient hunters, the situation changed. The secret of their success was the development of much greater [intelligence]. They used brain not brawn to kill their prey. At the end of the long hunting era, before they turned to farming, they were already enjoying some degree of affluence.`,blanks:[{sentence:`_____ (포식자)`,opts:[`predators`,`migrate`,`surplus`,`prosperity`],ans:`predators`},{sentence:`_____ (이주하다)`,opts:[`migrating`,`predators`,`surplus`,`intelligence`],ans:`migrating`},{sentence:`_____ (잉여의, 남는)`,opts:[`surplus`,`predators`,`migrating`,`prosperity`],ans:`surplus`},{sentence:`_____ (번영, 번성)`,opts:[`prosperity`,`predators`,`migrating`,`intelligence`],ans:`prosperity`},{sentence:`_____ (지능)`,opts:[`intelligence`,`predators`,`migrating`,`surplus`],ans:`intelligence`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`how growing intelligence brought early humans from struggle to prosperity`,`why most adult animals do not have surplus energy for play`,`the dietary habits of early humans before farming developed`,`the importance of brawn over brain for animal survival`,`differences between predators and prey across regions`],ans:`how growing intelligence brought early humans from struggle to prosperity`},tf:[{stmt:`Most animals spend all their time on survival activities.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Young animals can engage in play because of surplus energy.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Early humans never experienced periods of prosperity.`,ans:false,exp:`본문과 다름`},{stmt:`Greater intelligence was the secret of early human success in hunting.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Early humans began farming first and then became efficient hunters.`,ans:false,exp:`본문과 다름 (hunting era came first)`}]},
  {no:37,topic:`지문 37번`,text:`Think about a time when you were [startled]. Did you come to a sudden stop, freeze all your movements, and hold your breath as you [scanned] the environment for a threat? All these responses maximize our ability to avoid detection, locate the source of possible danger, and prepare to fight or flee. As sophisticated as language has become, it is still the creation of sound that might give away our location to a potential predator. Because of this, the freeze response results in the [inhibition] of language in highly stressful and [traumatic] situations. Natural selection promoted the evolution of language but conserved the freeze rule. When the threat passes, we begin to relax and find our voices again, perhaps even to laugh at our own reactions. But what if we can never relax? What if our experiences shape our brain to be in a constant state of fear? This interference with the proper development and integration of [neural] networks can result in chronic stress and even mental illness.`,blanks:[{sentence:`_____ (놀라게 하다)`,opts:[`startled`,`scan`,`inhibition`,`traumatic`],ans:`startled`},{sentence:`_____ (살피다, 훑어보다)`,opts:[`scanned`,`startled`,`inhibition`,`neural`],ans:`scanned`},{sentence:`_____ (억제)`,opts:[`inhibition`,`startled`,`scanned`,`traumatic`],ans:`inhibition`},{sentence:`_____ (외상의, 충격적인)`,opts:[`traumatic`,`startled`,`scanned`,`neural`],ans:`traumatic`},{sentence:`_____ (신경의)`,opts:[`neural`,`startled`,`scanned`,`inhibition`],ans:`neural`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`the evolutionary freeze response and risks of chronic stress`,`why human language evolved later than the fight-or-flight system`,`techniques to overcome childhood traumatic experiences`,`how to scan one's environment quickly for hidden threats`,`the connection between laughter and fear-relief mechanisms`],ans:`the evolutionary freeze response and risks of chronic stress`},tf:[{stmt:`When startled, people often freeze movements and hold their breath.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Sound creation could give away one's location to a potential predator.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Natural selection eliminated the freeze rule once language evolved.`,ans:false,exp:`본문과 다름 (conserved it)`},{stmt:`Once the threat passes, people relax and find their voices again.`,ans:true,exp:`본문 내용과 일치`},{stmt:`A constant state of fear may cause chronic stress and mental illness.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:38,topic:`지문 38번`,text:`Video gaming is one of the most studied technologies with regard to [empathy]. Because there have been [longstanding] concerns about the impact of violent video games on youth, much research has been conducted over the last couple of decades on the topic. While measuring and documenting the impact of video game violence, scientists have formulated [credible] explanations of how video gaming could affect empathy. Part of a normal, healthy reaction to witnessing violent events is to feel negative emotions, and to experience [physiological] arousal that is connected to fear or disgust. With repeated exposure to violent events — such as what might happen when a person plays violent video games — this normal reaction might become blunted, a phenomenon known as [desensitization]. The next step in this problematic process would be having diminished emotional responses to violence, which could also interfere with the ability to recognize and/or to sympathize with others, leading to reduced empathy. A significant body of work shows an association between extensive violent video gaming and reduced empathy in people.`,blanks:[{sentence:`_____ (공감)`,opts:[`empathy`,`longstanding`,`credible`,`physiological`],ans:`empathy`},{sentence:`_____ (오래 지속된)`,opts:[`longstanding`,`empathy`,`credible`,`desensitization`],ans:`longstanding`},{sentence:`_____ (신뢰할 만한)`,opts:[`credible`,`empathy`,`longstanding`,`physiological`],ans:`credible`},{sentence:`_____ (생리적인)`,opts:[`physiological`,`empathy`,`longstanding`,`credible`],ans:`physiological`},{sentence:`_____ (둔감화)`,opts:[`desensitization`,`empathy`,`longstanding`,`physiological`],ans:`desensitization`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`Repeated exposure to violent video gaming can desensitize players and reduce empathy.`,`Video game research has produced few credible findings over the last 20 years.`,`Empathy is best developed by playing video games in moderation each day.`,`Physiological arousal is unrelated to one's normal emotional responses.`,`Violent video games can effectively teach youth about social cooperation.`],ans:`Repeated exposure to violent video gaming can desensitize players and reduce empathy.`},tf:[{stmt:`Video gaming is among the most studied technologies regarding empathy.`,ans:true,exp:`본문 내용과 일치`},{stmt:`A normal reaction to witnessing violence involves negative emotions and physiological arousal.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Repeated exposure to violent events can blunt normal reactions through desensitization.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Extensive violent video gaming is linked to higher levels of empathy.`,ans:false,exp:`본문과 다름 (reduced empathy)`},{stmt:`Diminished emotional responses can interfere with sympathizing with others.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:39,topic:`지문 39번`,text:`Realising the benefits of [differentiation], some brands broadcast their social purpose before they do much actual good. Their marketers are using social purpose to boost the brand's [reputation], rather than embracing the purpose itself. Making a real difference with social problems is hard enough; to succeed, it has to follow from an [authentic], company-wide [commitment] to the purpose. Otherwise the mission is just window-dressing, or what we call "purpose-washing" — similar to green-washing, where purpose-driven activities serve mainly for [publicity] purposes. We end up with what Anand Giridhardas describes in Winners Take All: "social purpose that just furthers the charade of elites disrupting the old order without giving much back". Purpose-washing brands gain one of the benefits of social purpose, differentiation, but only for a short while. They lose out on positioning for future markets, and they might even make employees feel worse about working for them.`,blanks:[{sentence:`_____ (차별화)`,opts:[`differentiation`,`reputation`,`authentic`,`commitment`],ans:`differentiation`},{sentence:`_____ (평판, 명성)`,opts:[`reputation`,`differentiation`,`authentic`,`publicity`],ans:`reputation`},{sentence:`_____ (진정한, 진짜의)`,opts:[`authentic`,`differentiation`,`reputation`,`commitment`],ans:`authentic`},{sentence:`_____ (헌신, 약속)`,opts:[`commitment`,`differentiation`,`reputation`,`publicity`],ans:`commitment`},{sentence:`_____ (홍보)`,opts:[`publicity`,`differentiation`,`reputation`,`authentic`],ans:`publicity`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`Real social impact requires authentic commitment, not purpose-washing.`,`Companies should focus on financial differentiation over social purpose.`,`Green-washing is more harmful to brands than purpose-washing.`,`Marketers gain little advantage from broadcasting social purposes.`,`Employees usually appreciate purpose-driven marketing strategies.`],ans:`Real social impact requires authentic commitment, not purpose-washing.`},tf:[{stmt:`Making a real difference on social problems requires authentic, company-wide commitment.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Some brands broadcast their social purpose before doing much actual good.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Purpose-washing brands gain long-lasting differentiation in the market.`,ans:false,exp:`본문과 다름 (only short while)`},{stmt:`Purpose-washing may make employees feel worse about working for the company.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Purpose-washing brands lose out on positioning for future markets.`,ans:true,exp:`본문 내용과 일치`}]},
  {no:40,topic:`지문 40번`,text:`The brain needs to create a model of a [constant] [pulse] — a [schema] — so that we know when the musicians are not conforming to it. This is similar to variations of a melody: We need to have a mental representation of what the melody is in order to know — and appreciate — when the musician is taking liberties with it. Metrical [extraction], knowing what the pulse is and when we expect it to occur, is a crucial part of musical emotion. Music communicates to us emotionally through systematic [violations] of expectations. These violations can occur in any domain — the domain of pitch, rhythm, tempo, and so on — but occur they must. Music is organized sound, but the organization has to involve some element of the unexpected or it is emotionally flat and robotic. Too much organization may technically still be music, but it would be music that no one wants to listen to.`,blanks:[{sentence:`_____ (일정한, 변함없는)`,opts:[`constant`,`pulse`,`schema`,`extraction`],ans:`constant`},{sentence:`_____ (박자, 맥박)`,opts:[`pulse`,`constant`,`schema`,`violation`],ans:`pulse`},{sentence:`_____ (도식, 스키마)`,opts:[`schema`,`constant`,`pulse`,`extraction`],ans:`schema`},{sentence:`_____ (추출)`,opts:[`extraction`,`constant`,`pulse`,`violation`],ans:`extraction`},{sentence:`_____ (위반, 어김)`,opts:[`violations`,`constant`,`pulse`,`schema`],ans:`violations`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`Music creates emotional impact when it systematically breaks expected patterns.`,`Brain schemas slow down the recognition of musical rhythm and pulse.`,`Music with too many variations becomes hard to organize and listen to.`,`Repeated listening helps the brain memorize specific musical melodies.`,`Rhythm and tempo are the only domains where musical violations occur.`],ans:`Music creates emotional impact when it systematically breaks expected patterns.`},tf:[{stmt:`The brain creates a mental model of constant pulse to detect deviations.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Mental representation of a melody is needed to appreciate the musician's liberties.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Music communicates emotion mainly through systematic violations of expectation.`,ans:true,exp:`본문 내용과 일치`},{stmt:`Music without any element of the unexpected is emotionally vivid and engaging.`,ans:false,exp:`본문과 다름 (flat and robotic)`},{stmt:`Too much organization may yield music that nobody wants to listen to.`,ans:true,exp:`본문 내용과 일치`}]}

let userName='', userSchool='', selectedNos=new Set(), doneNos=new Set();
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], allResults=[], answered=false, t0=0;
let filterMode='all';

// === 오늘 진행 기록 저장 (페이지 재진입 시 완료 표시 유지) ===
const QUIZ_ID='mock_go2_2026_03_memory';
const _DAY_KEY=(function(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
const _PROG_KEY='bn_prog_'+QUIZ_ID;
function _saveProg(){
  try{localStorage.setItem(_PROG_KEY, JSON.stringify({day:_DAY_KEY, doneNos:Array.from(doneNos)}));}catch(e){}
}
function _loadProg(){
  try{
    const raw=localStorage.getItem(_PROG_KEY); if(!raw) return;
    const data=JSON.parse(raw);
    if(data.day!==_DAY_KEY){localStorage.removeItem(_PROG_KEY); return;}
    if(Array.isArray(data.doneNos)) doneNos=new Set(data.doneNos);
  }catch(e){}
}
function _cleanupOldProgress(){
  try{
    for(let i=localStorage.length-1;i>=0;i--){
      const k=localStorage.key(i);
      if(k && (k.startsWith('bn_prog_') || k.startsWith('bn_session_'))){
        try{const v=JSON.parse(localStorage.getItem(k)); if(v.day!==_DAY_KEY) localStorage.removeItem(k);}
        catch(e){localStorage.removeItem(k);}
      }
    }
  }catch(e){}
}

// ── START ──────────────────────────────────────────
function goPassageSelect(){
  userSchool = document.getElementById('si').value;
  userName = document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('userInfo').textContent = userName + ' · ' + userSchool;
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function renderPassageGrid(){
  const grid = document.getElementById('passageGrid');
  grid.innerHTML='';
  PASSAGES.forEach(p=>{
    if(filterMode==='21-24' && (p.no<21||p.no>24)) return;
    if(filterMode==='29-40' && (p.no<29||p.no>40)) return;
    const d = document.createElement('div');
    d.className='p-card'+(selectedNos.has(p.no)?' sel':'')+(doneNos.has(p.no)?' done':'');
    d.onclick=()=>togglePassage(p.no, d);
    d.innerHTML=`<div class="p-no">${p.no}번</div><div class="p-topic">${p.topic}</div>`
      +(doneNos.has(p.no)?'<span class="p-badge done-badge">완료✓</span>':'')
      +(selectedNos.has(p.no)&&!doneNos.has(p.no)?'<span class="p-badge" style="background:#e3f2fd;color:#1565c0;">선택</span>':'');
    grid.appendChild(d);
  });
}

function togglePassage(no, el){
  if(selectedNos.has(no)){selectedNos.delete(no);el.classList.remove('sel');}
  else{selectedNos.add(no);el.classList.add('sel');}
}

function filterPassage(mode, btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPassageGrid();
}

function selectAll(){
  const visible = PASSAGES.filter(p=>{
    if(filterMode==='21-24') return p.no>=21&&p.no<=24;
    if(filterMode==='29-40') return p.no>=29&&p.no<=40;
    return true;
  });
  const allSel = visible.every(p=>selectedNos.has(p.no));
  visible.forEach(p=>{ if(allSel) selectedNos.delete(p.no); else selectedNos.add(p.no); });
  renderPassageGrid();
}

function startQuiz(){
  if(selectedNos.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  // build question list
  qs=[];
  PASSAGES.filter(p=>selectedNos.has(p.no)).forEach(p=>{
    // blanks
    p.blanks.forEach((b,i)=>qs.push({pno:p.no,topic:p.topic,type:'blank',data:b,passageText:p.text,pid:p.no+'_b'+i}));
    // topic_q
    qs.push({pno:p.no,topic:p.topic,type:'topic',data:p.topic_q,passageText:p.text,pid:p.no+'_tq'});
    // tf
    p.tf.forEach((t,i)=>qs.push({pno:p.no,topic:p.topic,type:'tf',data:t,passageText:p.text,pid:p.no+'_t'+i}));
  });
  // shuffle within each passage group is already ordered; shuffle all
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · '+selectedNos.size+'개 지문';
  showQ();
}

// ── QUIZ ──────────────────────────────────────────
function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');

  if(q.type==='blank'){
    const d=q.data;
    const shuf=arr=>{const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
    const opts=shuf(d.opts);

    // 지문에서 현재 문제의 정답만 블록 처리, 나머지 [ ]는 일반 텍스트로
    let passageDisplay = q.passageText;
    passageDisplay = passageDisplay.replace(/\[([^\]]+)\]/g,(match, inner)=>{
      if(inner === d.ans || d.ans.includes(inner) || inner.includes(d.ans)){
        return `<span style="display:inline-block;min-width:80px;background:#1565c0;color:#1565c0;border-radius:5px;padding:1px 6px;font-weight:800;letter-spacing:2px;user-select:none;">░░░░░░░</span>`;
      }
      // 나머지는 그냥 일반 텍스트로
      return inner;
    });

    // 한글 힌트 제거: "_____ (~과 상관없이)" → "_____"
    const sentenceClean = d.sentence.replace(/_____\s*\([^)]*\)/, '_____');
    // 빈칸 문장 표시 (_____ → 파란 빈칸)
    const blankSentence = sentenceClean.replace('_____',
      `<span style="display:inline-block;min-width:120px;border-bottom:3px solid #1565c0;background:#bbdefb;border-radius:4px;padding:2px 10px;font-weight:800;color:#1565c0;">_____</span>`);

    area.innerHTML=`
      <div class="qc">
        <div class="q-no-badge"><span class="qno">${q.pno}번</span><span class="qtype blank">빈칸 추론</span></div>
        <div style="font-size:11px;font-weight:700;color:#1565c0;margin-bottom:6px;">📄 지문 — 파란 빈칸에 들어갈 말을 고르세요 (${q.topic})</div>
        <div class="passage-box" style="font-size:13px;margin-bottom:14px;line-height:2;">${passageDisplay}</div>
        <div style="background:#e3f2fd;border:2px solid #1565c0;border-radius:10px;padding:12px 14px;font-size:13px;font-weight:700;color:#1a237e;margin-bottom:12px;line-height:1.9;">${blankSentence}</div>
        <div class="choices" id="qChoices"></div>
        <div class="fb-msg" id="fb"></div>
      </div>`;
    const cc=document.getElementById('qChoices');
    opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='cb';
      const escO = String(o).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      b.innerHTML=`<span class="cn">${i+1}</span><span class="ct">${escO}</span>`;
      b.addEventListener('click',()=>selBlank(b,o,d.ans));
      cc.appendChild(b);
    });
  } else if(q.type==='topic'){
    const d=q.data;
    const shuf=arr=>{const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
    const opts=shuf(d.opts);
    const cleanText = q.passageText.replace(/\[([^\]]+)\]/g,'<span style="background:#fff3e0;border-bottom:2.5px solid #f57f17;font-weight:800;padding:0 3px;border-radius:3px;">$1</span>');
    area.innerHTML=`
      <div class="qc">
        <div class="q-no-badge"><span class="qno">${q.pno}번</span><span class="qtype" style="background:#e8f5e9;color:#2e7d32;">주제/요지</span></div>
        <div style="font-size:11px;font-weight:700;color:#1565c0;margin-bottom:6px;">📄 지문 (${q.topic})</div>
        <div class="passage-box" style="font-size:13px;margin-bottom:14px;">${cleanText}</div>
        <div class="q-prompt">🎯 ${d.q}</div>
        <div class="choices" id="qChoices"></div>
        <div class="fb-msg" id="fb"></div>
      </div>`;
    const cc=document.getElementById('qChoices');
    opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='cb';
      const escO = String(o).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      b.innerHTML=`<span class="cn">${i+1}</span><span class="ct">${escO}</span>`;
      b.addEventListener('click',()=>selBlank(b,o,d.ans));
      cc.appendChild(b);
    });
  } else {
    const d=q.data;
    // 지문 원문에서 [ ] 제거해서 보여주기
    const cleanText = q.passageText.replace(/\[([^\]]+)\]/g,'$1');
    area.innerHTML=`
      <div class="qc">
        <div class="q-no-badge"><span class="qno">${q.pno}번</span><span class="qtype tf">내용 일치 T/F</span></div>
        <div style="font-size:11px;font-weight:700;color:#1565c0;margin-bottom:6px;">📄 지문 (${q.topic})</div>
        <div class="passage-box" style="font-size:13px;margin-bottom:14px;">${cleanText}</div>
        <div class="q-prompt">✅ 다음 문장이 본문 내용과 일치하면 O, 아니면 X를 선택하세요.</div>
        <div style="background:#fff8e1;border:2px solid #f57f17;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:700;color:#333;margin:10px 0 14px;">${d.stmt}</div>
        <div class="tf-btns">
          <button class="tfb ob" id="btnO" onclick="selTF(this,true,${d.ans})">⭕ 일치</button>
          <button class="tfb xb" id="btnX" onclick="selTF(this,false,${d.ans})">❌ 불일치</button>
        </div>
        <div class="fb-msg" id="fb"></div>
      </div>`;
  }
}

function selBlank(btn,sel,ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const q=qs[idx];
  const typeLabel = q.type==='topic' ? '주제' : '빈칸';
  // 방어: 양쪽 trim 비교 (공백/제로폭 문자로 인한 불일치 방지)
  const selN = String(sel).trim(), ansN = String(ans).trim();
  if(selN===ansN){
    btn.classList.add('correct');
    fb.className='fb-msg ok';fb.innerHTML='✅ 정답: <strong>'+ans+'</strong>'+(window.formatMeaningHint?window.formatMeaningHint(ans):'');
    cor++;
    allResults.push({pno:q.pno, type:typeLabel, correct:true, my:sel, ans:ans});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.cb').forEach(b=>{const ct=b.querySelector('.ct'); const t=ct?ct.textContent.trim():b.textContent.trim(); if(t===ansN)b.classList.add('reveal');});
    fb.className='fb-msg no';fb.innerHTML='❌ 내 답: <strong>'+sel+'</strong>'+(window.formatMeaningHint?window.formatMeaningHint(sel):'')+'<br>📗 정답: <strong>'+ans+'</strong>'+(window.formatMeaningHint?window.formatMeaningHint(ans):'');
    wrn++;
    wrongs.push({pid:q.pid, label:q.pno+'번 '+typeLabel, my:sel, correct:ans, exp:''});
    allResults.push({pno:q.pno, type:typeLabel, correct:false, my:sel, ans:ans});
  }
  setTimeout(()=>{idx++;_saveSession();showQ();},sel===ans?700:1800);
}

function selTF(btn,sel,ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.tfb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const correct=(sel===ans);
  btn.classList.add(correct?'correct':'wrong');
  if(!correct){
    const other=document.getElementById(sel?'btnX':'btnO');
    other.classList.add('reveal');
  }
  const q=qs[idx];
  const d=q.data;
  if(correct){
    fb.className='fb-msg ok';fb.textContent='✅ 정답! '+d.exp;
    cor++;
    allResults.push({pno:q.pno, type:'T/F', correct:true, my:sel?'O':'X', ans:ans?'O':'X', stmt:d.stmt});
  } else {
    fb.className='fb-msg no';fb.textContent='❌ 오답! '+d.exp;
    wrn++;
    wrongs.push({pid:q.pid, label:q.pno+'번 T/F', my:sel?'O':'X', correct:ans?'O':'X', exp:d.exp});
    allResults.push({pno:q.pno, type:'T/F', correct:false, my:sel?'O':'X', ans:ans?'O':'X', stmt:d.stmt});
  }
  setTimeout(()=>{idx++;_saveSession();showQ();},correct?700:1800);
}

// === 진행 중 세션 저장 (같은 날 재진입 시 이어서 풀기) ===
const _SESSION_KEY = 'bn_session_' + QUIZ_ID;
function _saveSession(){
  if(typeof qs==='undefined' || !qs.length || idx>=qs.length) return;
  try{
    const state = {
      day: _DAY_KEY,
      userName: (typeof userName!=='undefined'?userName:''),
      userSchool: (typeof userSchool!=='undefined'?userSchool:''),
      qs, idx,
      cor: (typeof cor!=='undefined'?cor:0),
      wrn: (typeof wrn!=='undefined'?wrn:0),
      wrongs: (typeof wrongs!=='undefined'?wrongs:[]),
      allResults: (typeof allResults!=='undefined'?allResults:[]),
      selectedRefs: (typeof selectedRefs!=='undefined'?Array.from(selectedRefs):[]),
      doneRefs: (typeof doneRefs!=='undefined'?Array.from(doneRefs):[]),
      selectedNos: (typeof selectedNos!=='undefined'?Array.from(selectedNos||[]):[]),
      doneNos: (typeof doneNos!=='undefined'?Array.from(doneNos):[]),
      quizMode: (typeof quizMode!=='undefined'?quizMode:''),
      filterMode: (typeof filterMode!=='undefined'?filterMode:''),
      mode: (typeof mode!=='undefined'?mode:''),
      round: (typeof round!=='undefined'?round:''),
      elapsedMs: (typeof t0!=='undefined' && t0)?(Date.now()-t0):0,
      savedAt: Date.now()
    };
    localStorage.setItem(_SESSION_KEY, JSON.stringify(state));
  }catch(e){}
}
function _loadSession(){
  try{
    const raw = localStorage.getItem(_SESSION_KEY); if(!raw) return null;
    const s = JSON.parse(raw);
    if(s.day !== _DAY_KEY){ localStorage.removeItem(_SESSION_KEY); return null; }
    if(!s.qs || !s.qs.length || s.idx >= s.qs.length){ localStorage.removeItem(_SESSION_KEY); return null; }
    return s;
  }catch(e){ return null; }
}
function _clearSession(){ try{ localStorage.removeItem(_SESSION_KEY); }catch(e){} }
function _restoreSessionState(s){
  if(typeof userName!=='undefined'){ userName = s.userName||''; }
  if(typeof userSchool!=='undefined'){ userSchool = s.userSchool||''; }
  qs = s.qs; idx = s.idx;
  if(typeof cor!=='undefined') cor = s.cor||0;
  if(typeof wrn!=='undefined') wrn = s.wrn||0;
  if(typeof wrongs!=='undefined') wrongs = s.wrongs||[];
  if(typeof allResults!=='undefined') allResults = s.allResults||[];
  if(typeof selectedRefs!=='undefined') selectedRefs = new Set(s.selectedRefs||[]);
  if(typeof doneRefs!=='undefined' && Array.isArray(s.doneRefs)) doneRefs = new Set(s.doneRefs);
  if(typeof selectedNos!=='undefined') selectedNos = new Set(s.selectedNos||[]);
  if(typeof doneNos!=='undefined' && Array.isArray(s.doneNos)) doneNos = new Set(s.doneNos);
  if(typeof quizMode!=='undefined' && s.quizMode) quizMode = s.quizMode;
  if(typeof filterMode!=='undefined' && s.filterMode) filterMode = s.filterMode;
  if(typeof mode!=='undefined' && s.mode) mode = s.mode;
  if(typeof round!=='undefined' && s.round) round = s.round;
  if(typeof t0!=='undefined') t0 = Date.now() - (s.elapsedMs||0);
  if(typeof answered!=='undefined') answered = false;
}
function _enterQuizScreen(){
  ['startScreen','passageScreen','loginScreen','passages','hubScreen','startView'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.add('hidden');
  });
  ['hdr','pw','quizArea','quizScreen','quizWrap','quizView'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.remove('hidden');
  });
}
function resumeSession(){
  const s = _loadSession(); if(!s){ const rb=document.getElementById('resumeBox'); if(rb) rb.style.display='none'; return; }
  _restoreSessionState(s);
  _enterQuizScreen();
  if(typeof showQ==='function') showQ();
  else if(typeof renderQuestion==='function') renderQuestion();
  else if(typeof drawQ==='function') drawQ();
}
function discardSession(){ _clearSession(); const rb=document.getElementById('resumeBox'); if(rb) rb.style.display='none'; }
function checkResumePrompt(){
  const s = _loadSession(); if(!s) return;
  const rb = document.getElementById('resumeBox'); if(!rb) return;
  const remain = s.qs.length - s.idx;
  const elapsedMin = Math.round((s.elapsedMs||0)/60000);
  const info = document.getElementById('resumeInfo');
  if(info) info.innerHTML =
    '<strong>'+(s.userName||'학생')+'</strong>님 · '+s.qs.length+'문제 중 <strong>'+s.idx+'번째</strong>까지 풀었어요 ('+remain+'문제 남음)<br>'+
    '진행한 시간: '+elapsedMin+'분 · 정답 '+(s.cor||0)+' / 오답 '+(s.wrn||0);
  rb.style.display='block';
}
window.resumeSession = resumeSession;
window.discardSession = discardSession;

function showResult(){
  _clearSession();
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selectedNos.forEach(n=>doneNos.add(n));
  _saveProg();
  // 오답 문제 저장 (다시풀기용)
  wrongQs = qs.filter((q,i)=>{
    // wrongs 배열의 pid와 매칭
    return wrongs.some(w=>w.pid===q.pid);
  });

  const wHTML=wrongs.length>0
    ?'<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.label+'</div><div class="wid">내 답: '+w.my+' → 정답: '+w.correct+(w.exp?' | '+w.exp:'')+'</div></div>').join('')+'</div>'
    :'<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  // 전체 문제 + 정답 목록 (채점 후 확인용)
  const escAns = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const allHTML = allResults.length>0
    ? '<div class="wl" style="margin-top:14px;"><h3 style="color:#1565c0;">📋 전체 문제 정답 (' + allResults.length + '개)</h3>'
      + allResults.map((r,i)=>{
          const okBadge = r.correct
            ? '<span style="background:#2e7d32;color:white;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:800;">O</span>'
            : '<span style="background:#c62828;color:white;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:800;">X</span>';
          return '<div class="wi" style="border-left-color:' + (r.correct?'#2e7d32':'#c62828') + ';">'
            + '<div class="wie">' + okBadge + ' ' + r.pno + '번 · ' + r.type + '</div>'
            + '<div class="wid">내 답: <strong>' + escAns(r.my) + '</strong> · 정답: <strong style="color:#1565c0;">' + escAns(r.ans) + '</strong></div>'
            + '</div>';
        }).join('')
      + '</div>'
    : '';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고2 26년 6월 본문 암기 · ${selectedNos.size}개 지문</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    ${allHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave) window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: userName,
    school: userSchool,
    score: pct,
    correct: cor,
    wrong: wrn,
    total: total,
    elapsedMin: el,
    quizType: '고2_26년6월_본문암기',
    passages: [...selectedNos].sort((a,b)=>a-b),
    // 문제별 상세 결과: 몇 번 지문, 유형(빈칸/주제/T·F), 맞음/틀림, 내 답, 정답
    details: allResults.map(r=>({
      지문: r.pno+'번',
      유형: r.type,
      결과: r.correct ? '✅정답' : '❌오답',
      내답: r.my,
      정답: r.ans,
      ...(r.stmt ? {문장: r.stmt} : {})
    })),
    wrongWords: wrongs.map(w=>({label:w.label, my:w.my, correct:w.correct}))
  });
}

function retryWrongs(){
  if(wrongQs.length===0) return;
  qs=[...wrongQs];
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · 오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selectedNos.clear();
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

// localStorage 자동입력
window.addEventListener('DOMContentLoaded',()=>{
  const n=localStorage.getItem('bomnal_name');
  const s=localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value=n;
  if(s){
    const sel=document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value&&s.includes(sel.options[i].value)){sel.value=sel.options[i].value;break;}
    }
  }
  _cleanupOldProgress();
  _loadProg();
  checkResumePrompt();
});
</script>
</body>
</html>
