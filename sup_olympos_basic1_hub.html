<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>봄날 ENGLISH | 올림포스 독해 기본 1</title>
<script type="module" src="bn_tracker.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#f0f4f8,#e3edf5);min-height:100vh;color:#1a1a2e;}
header{padding:24px 20px 14px;text-align:center;background:white;border-bottom:1px solid #cbdde9;}
.logo-title{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:#1565c0;letter-spacing:.5px;}
.subtitle{font-size:.78rem;color:#5e7791;margin-top:3px;}
.book-meta{display:inline-block;background:#1565c0;color:white;border-radius:20px;padding:3px 14px;font-size:.7rem;font-weight:700;margin-top:8px;}
main{max-width:780px;margin:24px auto;padding:0 16px 60px;}
.back-nav{display:inline-flex;align-items:center;gap:6px;background:white;border:1.5px solid #b0c4de;border-radius:10px;padding:7px 14px;font-size:.78rem;color:#5e7791;cursor:pointer;text-decoration:none;margin-bottom:18px;}
.back-nav:hover{border-color:#1565c0;color:#1565c0;}
.section-title{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:#1565c0;margin:20px 4px 12px;}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.unit-card{background:white;border:2px solid #cbdde9;border-radius:14px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .15s;text-decoration:none;color:inherit;display:block;}
.unit-card.available:hover{border-color:#1565c0;background:#e3f2fd;transform:translateY(-2px);box-shadow:0 4px 12px rgba(21,101,192,.15);}
.unit-card.coming{opacity:.55;cursor:not-allowed;background:#f0f4f8;}
.unit-no{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;color:#1565c0;line-height:1;}
.unit-title{font-size:.74rem;color:#5e7791;margin-top:6px;line-height:1.3;}
.intro-box{background:white;border:1px solid #cbdde9;border-radius:12px;padding:16px 18px;margin-bottom:18px;font-size:.83rem;line-height:1.7;color:#1565c0;}
.intro-box strong{color:#1a1a2e;font-weight:800;}
.types-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.type-pill{display:inline-flex;align-items:center;gap:4px;background:#e3f2fd;color:#1565c0;padding:4px 10px;border-radius:14px;font-size:.7rem;font-weight:700;}
.empty-hint{grid-column:1/-1;text-align:center;padding:40px 12px;color:#a0b4c7;font-size:.82rem;}
</style>
</head>
<body>
<header>
  <div class="logo-title">📘 올림포스 독해 기본 1</div>
  <div class="subtitle">EBS · 어휘·본문암기·어법·총괄</div>
  <div class="book-meta">EBS 올림포스 시리즈</div>
</header>
<main>
  <a class="back-nav" href="supplements_hub.html">← 부교재 허브로</a>
  <div class="intro-box">
    각 Unit별로 <strong>어휘퀴즈 · 본문암기 · 어법·어휘 · 총괄퀴즈</strong>를 학습할 수 있습니다.
    모의고사와 같은 형식·채점 방식으로 진행됩니다.
  </div>

  <div class="section-title">🎯 유형별 보기 (Unit 한꺼번에 보기)</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:10px;">
    <a href="sup_olympos_basic1_voca_hub.html" style="display:block;background:#e3f2fd;border:2px solid #90caf9;border-radius:14px;padding:14px 16px;text-decoration:none;color:#1565c0;font-weight:800;text-align:center;transition:all .15s;">
      <div style="font-size:1.6rem;">🔤</div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:1rem;margin-top:4px;">어휘퀴즈</div>
      <div style="font-size:.7rem;color:#5e7791;margin-top:3px;font-weight:600;">Unit 1~18</div>
    </a>
    <a href="sup_olympos_basic1_memory_hub.html" style="display:block;background:#fff8e6;border:2px solid #f5d2a0;border-radius:14px;padding:14px 16px;text-decoration:none;color:#b8860b;font-weight:800;text-align:center;transition:all .15s;">
      <div style="font-size:1.6rem;">📖</div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:1rem;margin-top:4px;">본문암기</div>
      <div style="font-size:.7rem;color:#8d6e3e;margin-top:3px;font-weight:600;">Unit 1~16</div>
    </a>
    <div style="display:block;background:#f5f0e8;border:2px solid #e0d8ce;border-radius:14px;padding:14px 16px;color:#a09890;font-weight:800;text-align:center;opacity:.6;cursor:not-allowed;">
      <div style="font-size:1.6rem;">📐</div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:1rem;margin-top:4px;">어법·어휘</div>
      <div style="font-size:.7rem;margin-top:3px;font-weight:600;">준비 중</div>
    </div>
    <div style="display:block;background:#f5f0e8;border:2px solid #e0d8ce;border-radius:14px;padding:14px 16px;color:#a09890;font-weight:800;text-align:center;opacity:.6;cursor:not-allowed;">
      <div style="font-size:1.6rem;">🎯</div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:1rem;margin-top:4px;">총괄퀴즈</div>
      <div style="font-size:.7rem;margin-top:3px;font-weight:600;">준비 중</div>
    </div>
  </div>

  <div class="section-title">📚 Unit별 보기 (한 Unit의 모든 유형)</div>
  <div class="unit-grid" id="unit-grid"></div>
</main>

<script>
// ============================================================
// Unit 목록 (콘텐츠가 준비된 Unit만 available:true)
// ============================================================
const BOOK_PREFIX = 'sup_olympos_basic1';
const UNITS = [
  { no:1, title:'Unit 1', sub:'어휘퀴즈',  available:true },
  { no:2, title:'Unit 2', sub:'어휘퀴즈',  available:true },
  { no:3, title:'Unit 3', sub:'어휘퀴즈',  available:true },
  { no:4, title:'Unit 4', sub:'어휘퀴즈',  available:true },
  { no:5, title:'Unit 5', sub:'어휘퀴즈',  available:true },
  { no:6, title:'Unit 6', sub:'어휘퀴즈',  available:true },
  { no:7, title:'Unit 7', sub:'어휘퀴즈',  available:true },
  { no:8, title:'Unit 8', sub:'어휘퀴즈',  available:true },
  { no:9, title:'Unit 9', sub:'어휘퀴즈',  available:true },
  { no:10, title:'Unit 10', sub:'어휘퀴즈',  available:true },
  { no:11, title:'Unit 11', sub:'어휘퀴즈',  available:true },
  { no:12, title:'Unit 12', sub:'어휘퀴즈',  available:true },
  { no:13, title:'Unit 13', sub:'어휘퀴즈',  available:true },
  { no:14, title:'Unit 14', sub:'어휘퀴즈',  available:true },
  { no:15, title:'Unit 15', sub:'어휘퀴즈',  available:true },
  { no:16, title:'Unit 16', sub:'어휘퀴즈',  available:true },
  { no:17, title:'Unit 17', sub:'어휘퀴즈',  available:true },
  { no:18, title:'Unit 18', sub:'어휘퀴즈',  available:true }
];

const grid = document.getElementById('unit-grid');
UNITS.forEach(u => {
  const card = document.createElement(u.available ? 'a' : 'div');
  card.className = 'unit-card ' + (u.available ? 'available' : 'coming');
  if (u.available) {
    card.href = `${BOOK_PREFIX}_u${u.no}_picker.html`;
  }
  card.innerHTML = `
    <div class="unit-no">U${u.no}</div>
    <div class="unit-title">${u.title}${u.sub?'<br>'+u.sub:''}</div>
    ${!u.available ? '<div style="font-size:.62rem;color:#a0b4c7;margin-top:4px;">콘텐츠 준비 중</div>' : ''}
  `;
  grid.appendChild(card);
});

if (!UNITS.some(u=>u.available)) {
  const hint = document.createElement('div');
  hint.className = 'empty-hint';
  hint.innerHTML = '🔧 콘텐츠 준비 중입니다.<br>관리자 페이지에서 Unit별 지문·어휘·어법 문제를 등록하면<br>이곳에 자동으로 표시됩니다.';
  grid.appendChild(hint);
}
</script>
</body>
</html>
