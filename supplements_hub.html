<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>봄날 ENGLISH | 부교재 허브</title>
<script type="module" src="bn_tracker.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#f5efe6,#ede4d5);min-height:100vh;color:#2a2a2a;}
header{padding:24px 20px 14px;text-align:center;background:white;border-bottom:1px solid #e0d8ce;}
.logo-title{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:#5c3d1e;letter-spacing:.5px;}
.subtitle{font-size:.78rem;color:#7a7570;margin-top:3px;}
main{max-width:740px;margin:24px auto;padding:0 16px 60px;}
.back-nav{display:inline-flex;align-items:center;gap:6px;background:white;border:1.5px solid #d0c8bc;border-radius:10px;padding:7px 14px;font-size:.78rem;color:#7a7570;cursor:pointer;text-decoration:none;margin-bottom:18px;}
.back-nav:hover{border-color:#3d3d3d;color:#3d3d3d;}
.section-title{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:#5c3d1e;margin:24px 4px 12px;display:flex;align-items:center;gap:8px;}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.book-card{background:white;border:2px solid #e0d8ce;border-radius:14px;padding:18px 16px;text-decoration:none;color:#2a2a2a;display:flex;flex-direction:column;gap:6px;transition:all .15s;cursor:pointer;}
.book-card.available:hover{border-color:#5c3d1e;background:#fdf8f0;transform:translateY(-2px);box-shadow:0 6px 16px rgba(92,61,30,.12);}
.book-card.coming{opacity:.55;cursor:not-allowed;background:#f5f0e8;}
.book-emoji{font-size:1.6rem;}
.book-title{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:#3d3d3d;}
.book-sub{font-size:.72rem;color:#7a7570;line-height:1.4;}
.book-badge{display:inline-block;font-size:.62rem;background:#5c3d1e;color:#f7f0e6;padding:2px 8px;border-radius:20px;margin-top:4px;width:fit-content;font-weight:700;}
.book-badge.coming{background:#a09890;color:white;}
.intro-box{background:white;border:1px solid #e0d8ce;border-radius:12px;padding:16px 18px;margin-bottom:18px;font-size:.83rem;line-height:1.7;color:#5c3d1e;}
.intro-box strong{color:#3d3d3d;font-weight:800;}
.empty-hint{text-align:center;padding:30px 12px;color:#a09890;font-size:.78rem;}
</style>
</head>
<body>
<header>
  <div class="logo-title">📚 부교재 허브</div>
  <div class="subtitle">교재별 어휘·본문암기·어법·총괄 학습</div>
</header>
<main>
  <a class="back-nav" href="index.html">← 메인 허브로</a>
  <div class="intro-box">
    학교 부교재·시중 교재의 <strong>어휘퀴즈 · 본문암기 · 어법·어휘 · 총괄퀴즈</strong>를 학습할 수 있습니다.
    모의고사와 같은 형식·채점 방식·결과 표시를 그대로 사용합니다.
  </div>

  <div class="section-title">📖 시중 교재</div>
  <div class="book-grid" id="books-published"></div>

  <div class="section-title">🏫 학교 자체 자료</div>
  <div class="book-grid" id="books-school">
    <div class="empty-hint">아직 등록된 자체 자료가 없습니다.</div>
  </div>

  <div class="section-title">📝 향후 추가 예정</div>
  <div class="book-grid" id="books-coming"></div>
</main>

<script>
// ============================================================
// 부교재 목록 (확장 시 이 데이터만 추가)
// ============================================================
const BOOKS = [
  // === 시중 교재 (이용 가능) ===
  {
    section: 'published',
    file: 'sup_olympos_basic1_hub.html',
    title: '올림포스 독해 기본 1',
    sub: 'EBS · Unit별 어휘·본문·어법·총괄',
    emoji: '📘',
    badge: 'NEW',
    available: true
  },
  // === 시중 교재 (예정) ===
  {
    section: 'coming',
    file: '',
    title: '올림포스 독해 기본 2',
    sub: 'EBS · 준비 중',
    emoji: '📗',
    badge: '예정',
    available: false
  },
  {
    section: 'coming',
    file: '',
    title: '올림포스 영어독해',
    sub: 'EBS · 준비 중',
    emoji: '📙',
    badge: '예정',
    available: false
  },
  {
    section: 'coming',
    file: '',
    title: '리더스뱅크',
    sub: '비상 · 준비 중',
    emoji: '📕',
    badge: '예정',
    available: false
  },
  {
    section: 'coming',
    file: '',
    title: '수능특강',
    sub: 'EBS · 준비 중',
    emoji: '📔',
    badge: '예정',
    available: false
  },
  {
    section: 'coming',
    file: '',
    title: '수능완성',
    sub: 'EBS · 준비 중',
    emoji: '📓',
    badge: '예정',
    available: false
  }
];

const SECTION_MAP = {
  'published': 'books-published',
  'school': 'books-school',
  'coming': 'books-coming'
};

BOOKS.forEach(b => {
  const grid = document.getElementById(SECTION_MAP[b.section]);
  if (!grid) return;
  const card = document.createElement(b.available ? 'a' : 'div');
  card.className = 'book-card ' + (b.available ? 'available' : 'coming');
  if (b.available) {
    card.href = b.file;
  }
  const badgeClass = b.available ? '' : 'coming';
  card.innerHTML = `
    <div class="book-emoji">${b.emoji}</div>
    <div class="book-title">${b.title}</div>
    <div class="book-sub">${b.sub}</div>
    ${b.badge ? `<span class="book-badge ${badgeClass}">${b.badge}</span>` : ''}
  `;
  // Clear empty hint if any
  const empty = grid.querySelector('.empty-hint');
  if (empty) empty.remove();
  grid.appendChild(card);
});
</script>
</body>
</html>
