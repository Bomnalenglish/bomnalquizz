<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:#f3e5f5;min-height:100vh;}

/* ── 시작 화면 ── */
#pg-start{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.start-box{background:#fff;border-radius:24px;padding:40px 32px;max-width:460px;width:100%;box-shadow:0 8px 32px rgba(74,20,140,.12);text-align:center;}
.start-box h1{font-family:'Black Han Sans',sans-serif;font-size:22px;color:#4a148c;margin-bottom:4px;}
.start-box p{font-size:13px;color:#888;margin-bottom:22px;}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;}
.info-chip{background:#f3e5f5;border-radius:10px;padding:9px;font-size:12px;color:#6a1b9a;font-weight:700;}
.year-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.year-btn{border:2px solid #ce93d8;border-radius:14px;padding:14px 12px;background:#f3e5f5;cursor:pointer;text-align:center;transition:.15s;font-family:'Nanum Gothic',sans-serif;}
.year-btn.on{border-color:#6a1b9a;background:#ede7f6;box-shadow:0 0 0 3px #ce93d8;}
.year-btn .icon{font-size:22px;margin-bottom:4px;}
.year-btn .name{font-size:13px;font-weight:800;color:#4a148c;}
.year-btn .desc{font-size:11px;color:#888;margin-top:2px;}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.mode-btn{border:2px solid #ce93d8;border-radius:14px;padding:16px 12px;background:#f3e5f5;cursor:pointer;text-align:left;transition:.15s;}
.mode-btn.on{border-color:#6a1b9a;background:#ede7f6;box-shadow:0 0 0 3px #ce93d8;}
.mode-btn .icon{font-size:24px;margin-bottom:6px;}
.mode-btn .name{font-size:13px;font-weight:800;color:#4a148c;}
.mode-btn .desc{font-size:11px;color:#888;margin-top:3px;line-height:1.5;}
.inp{width:100%;padding:12px 14px;border:2px solid #ce93d8;border-radius:12px;font-size:14px;font-family:'Nanum Gothic',sans-serif;outline:none;margin-bottom:10px;background:#fff;}
.inp:focus{border-color:#6a1b9a;}
select.inp{color:#4a148c;font-weight:700;cursor:pointer;}
.btn-start{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#6a1b9a,#ff6f00);color:#fff;font-size:16px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;}
.btn-start:hover{opacity:.9;}
.section-label{font-size:12px;font-weight:800;color:#6a1b9a;text-align:left;margin-bottom:8px;}

/* ── 퀴즈 화면 ── */
#pg-quiz{display:none;}
.top-bar{background:#4a148c;color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.top-title{font-family:'Black Han Sans',sans-serif;font-size:15px;}
.top-sub{font-size:11px;opacity:.6;margin-top:2px;}
.top-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;}
.prog-bar{height:4px;background:#e1bee7;}
.prog-fill{height:100%;background:linear-gradient(90deg,#7b1fa2,#ff6f00);transition:width .3s;}
.q-wrap{padding:18px;max-width:580px;margin:0 auto;}
.q-card{background:#fff;border-radius:20px;padding:24px 20px;box-shadow:0 4px 18px rgba(74,20,140,.08);}
.q-tag{display:inline-block;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:800;margin-bottom:10px;}
.q-tag.m{background:#e8f5e9;color:#2e7d32;}
.q-tag.s{background:#e3f2fd;color:#1565c0;}
.q-tag.j{background:#fce4ec;color:#880e4f;}
.q-step{font-size:12px;color:#999;margin-bottom:6px;font-weight:700;}
.q-word{font-family:'Black Han Sans',sans-serif;font-size:30px;color:#4a148c;margin-bottom:4px;}
.q-kor{font-size:13px;color:#999;margin-bottom:14px;}
.q-prompt{font-size:14px;font-weight:700;color:#5c3d47;background:#f3e5f5;padding:10px 14px;border-radius:10px;margin-bottom:14px;}
.choices{display:grid;gap:9px;}
.c-btn{display:flex;align-items:center;gap:10px;width:100%;padding:13px 15px;background:#f3e5f5;border:2px solid #ce93d8;border-radius:12px;font-size:14px;font-weight:700;font-family:'Nanum Gothic',sans-serif;cursor:pointer;text-align:left;transition:.12s;}
.c-btn:hover:not(:disabled){border-color:#6a1b9a;background:#ede7f6;}
.c-btn.ok{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;}
.c-btn.no{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.c-btn.ans{background:#e8f5e9;border-color:#2e7d32;}
.c-num{width:24px;height:24px;border-radius:50%;background:#ce93d8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.j-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.j-btn{padding:18px;border:2px solid #ce93d8;border-radius:14px;background:#f3e5f5;font-size:15px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:.12s;}
.j-btn:hover:not(:disabled){transform:translateY(-2px);}
.j-btn.syn{border-color:#4caf50;color:#2e7d32;}
.j-btn.ant{border-color:#e91e63;color:#880e4f;}
.j-btn.ok{background:#e8f5e9;}
.j-btn.no{background:#ffebee;}
.fb-box{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:14px;font-weight:800;display:none;}
.fb-box.ok{background:#e8f5e9;color:#1b5e20;display:block;}
.fb-box.no{background:#ffebee;color:#b71c1c;display:block;}
.next-btn{width:100%;margin-top:13px;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#6a1b9a,#ff6f00);color:#fff;font-size:15px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;display:none;}
.next-btn.show{display:block;}

/* ── 결과 화면 ── */
#pg-result{display:none;padding:20px;max-width:580px;margin:0 auto;}
.r-card{background:#fff;border-radius:24px;padding:28px 22px;box-shadow:0 8px 28px rgba(74,20,140,.1);margin-bottom:14px;text-align:center;}
.r-score{font-family:'Black Han Sans',sans-serif;font-size:56px;color:#4a148c;line-height:1;}
.r-name{font-size:13px;color:#888;margin-top:4px;}
.r-stats{display:flex;justify-content:center;gap:24px;margin-top:18px;}
.r-stat .n{font-family:'Black Han Sans',sans-serif;font-size:26px;}
.r-stat .l{font-size:11px;color:#888;margin-top:2px;}
.wrong-box{background:#f3e5f5;border-radius:14px;padding:14px;text-align:left;margin-top:14px;}
.wrong-box h3{font-size:13px;font-weight:800;color:#b71c1c;margin-bottom:10px;}
.w-item{background:#fff;border-radius:9px;padding:9px 13px;margin-bottom:7px;font-size:13px;border-left:3px solid #e91e63;}
.w-eng{font-weight:800;color:#4a148c;}
.w-detail{font-size:11px;color:#888;margin-top:3px;}
.r-btns{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.r-btn{padding:12px 24px;border:none;border-radius:12px;font-size:14px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;}
.r-btn.primary{background:linear-gradient(135deg,#6a1b9a,#ff6f00);color:#fff;}
.r-btn.ghost{background:#f3e5f5;color:#6a1b9a;border:2px solid #ce93d8;}

@media(max-width:480px){
  .mode-row{grid-template-columns:1fr;}
  .year-row{grid-template-columns:1fr 1fr;}
  .q-word{font-size:24px;}
}
</style>

<script>
// 봄날 허브에서 전달된 학생 이름 자동 적용
(function(){
  var saved = sessionStorage.getItem('bn_name') || localStorage.getItem('bn_name');
  if(saved){
    window._hubStudentName = saved;
    // 이름 입력란이 있으면 자동 입력
    window.addEventListener('DOMContentLoaded', function(){
      var inputs = document.querySelectorAll('input#student-name, input#nameInput, .name-input');
      inputs.forEach(function(el){ if(!el.value) el.value = saved; });
    });
  }
})();
</script>

// ── 전역 상태 ──
var mode = 'A';
var yearSel = '2024';
var studentName = '';
var school = '';
var questions = [];
var qIdx = 0;
var numCorrect = 0;
var numWrong = 0;
var wrongList = [];
var startTime = 0;
var isRetry = false;
var WORDS = WORDS_2024;

// ── 연도 선택 ──
function pickYear(y) {
  yearSel = y;
  document.getElementById('y24').className = 'year-btn' + (y === '2024' ? ' on' : '');
  document.getElementById('y25').className = 'year-btn' + (y === '2025' ? ' on' : '');
  WORDS = y === '2024' ? WORDS_2024 : WORDS_2025;
  // 단어 수 업데이트
  var cnt = WORDS.filter(function(w){ return w.syn.length > 0; }).length;
  document.getElementById('wordCount').textContent = '📚 ' + WORDS.length + '개 단어';
}

// ── 모드 선택 ──
function pickMode(m) {
  mode = m;
  document.getElementById('mA').className = 'mode-btn' + (m === 'A' ? ' on' : '');
  document.getElementById('mB').className = 'mode-btn' + (m === 'B' ? ' on' : '');
}

// ── 유틸 ──
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

// ── 시작 ──
document.getElementById('startBtn').onclick = function() {
  WORDS = yearSel === '2024' ? WORDS_2024 : WORDS_2025;
  school = document.getElementById('schoolSel').value;
  studentName = document.getElementById('nameInp').value.trim();
  if (!school) { alert('학교를 선택해주세요!'); return; }
  if (!studentName) { alert('이름을 입력해주세요!'); return; }
  buildQuestions(WORDS);
  beginQuiz();
};

function buildQuestions(wordList) {
  var valid = wordList.filter(function(w) { return w.syn.length > 0; });
  if (mode === 'A') {
    var picked = shuffle(valid).slice(0, Math.min(valid.length, 20));
    questions = [];
    picked.forEach(function(w) {
      questions.push({ type: 'M', word: w });
      questions.push({ type: 'S', word: w });
    });
  } else {
    var pairs = [];
    wordList.forEach(function(w) {
      if (w.syn.length > 0) pairs.push({ type: 'J', w1: w.eng, w2: w.syn[0], rel: 'syn', kor: w.kor });
      if (w.ant.length > 0) pairs.push({ type: 'J', w1: w.eng, w2: w.ant[0], rel: 'ant', kor: w.kor });
    });
    questions = shuffle(pairs).slice(0, Math.min(pairs.length, 20));
  }
}

function beginQuiz() {
  qIdx = 0; numCorrect = 0; numWrong = 0; wrongList = []; startTime = Date.now();
  document.getElementById('pg-start').style.display = 'none';
  document.getElementById('pg-quiz').style.display = 'block';
  document.getElementById('pg-result').style.display = 'none';
  var yearLabel = yearSel === '2024' ? '24년 3월' : '25년 3월';
  document.getElementById('topTitle').textContent = '🌸 고2 ' + yearLabel;
  document.getElementById('topSub').textContent = studentName + ' · ' + (mode === 'A' ? '유의어 찾기' : '관계 판별');
  renderQ();
}

// ── 문제 렌더링 ──
function renderQ() {
  if (qIdx >= questions.length) { showResult(); return; }
  var q = questions[qIdx];
  var pct = Math.round(qIdx / questions.length * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('topBadge').textContent = (qIdx + 1) + '/' + questions.length;

  var card = document.getElementById('qCard');
  card.innerHTML = '';

  if (q.type === 'M') renderMeaning(card, q);
  else if (q.type === 'S') renderSynonym(card, q);
  else renderJudge(card, q);
}

function renderMeaning(card, q) {
  var ck = q.word.kor;
  var dists = shuffle(WORDS.filter(function(w){ return w.kor !== ck && w.kor; }).map(function(w){ return w.kor; })).slice(0, 3);
  var choices = shuffle([ck].concat(dists));

  card.innerHTML =
    '<div class="q-tag m">1단계 · 뜻 찾기</div>' +
    '<div class="q-step">' + (qIdx+1) + ' / ' + questions.length + '</div>' +
    '<div class="q-word">' + q.word.eng + '</div>' +
    '<div class="q-prompt">이 단어의 뜻은?</div>' +
    '<div class="choices" id="choiceArea"></div>' +
    '<div class="fb-box" id="fbBox"></div>' +
    '<button class="next-btn" id="nextBtn">다음 →</button>';

  var area = document.getElementById('choiceArea');
  choices.forEach(function(c, i) {
    var btn = document.createElement('button');
    btn.className = 'c-btn';
    btn.innerHTML = '<span class="c-num">' + (i+1) + '</span>' + c;
    btn.addEventListener('click', function() { onMeaning(btn, c, ck, q); });
    area.appendChild(btn);
  });
}

function onMeaning(btn, sel, ans, q) {
  disableAll();
  var fb = document.getElementById('fbBox');
  var nb = document.getElementById('nextBtn');
  if (sel === ans) {
    btn.classList.add('ok');
    fb.className = 'fb-box ok'; fb.textContent = '✅ 정답!';
    numCorrect++;
    nb.textContent = '다음 →';
    nb.className = 'next-btn show';
    nb.onclick = function() { qIdx++; renderQ(); };
  } else {
    btn.classList.add('no');
    markAnswer(ans);
    fb.className = 'fb-box no'; fb.textContent = '❌ 내 답: ' + sel + ' / 정답: ' + ans;
    numWrong++;
    wrongList.push({ eng: q.word.eng, kor: ans, type: '뜻', my: sel, correct: ans });
    nb.textContent = '다음 →';
    nb.className = 'next-btn show';
    nb.onclick = function() { qIdx += 2; renderQ(); };
  }
}

function renderSynonym(card, q) {
  var syns = q.word.syn;
  var allS = [];
  WORDS.forEach(function(w) { w.syn.forEach(function(s) { if (syns.indexOf(s) < 0) allS.push(s); }); });
  var dists = shuffle(allS).slice(0, 3);
  var choices = shuffle([syns[0]].concat(dists));

  card.innerHTML =
    '<div class="q-tag s">2단계 · 유의어 찾기</div>' +
    '<div class="q-step">' + (qIdx+1) + ' / ' + questions.length + '</div>' +
    '<div class="q-word">' + q.word.eng + '</div>' +
    '<div class="q-kor">' + q.word.kor + '</div>' +
    '<div class="q-prompt">이 단어의 유의어는?</div>' +
    '<div class="choices" id="choiceArea"></div>' +
    '<div class="fb-box" id="fbBox"></div>' +
    '<button class="next-btn" id="nextBtn">다음 →</button>';

  var area = document.getElementById('choiceArea');
  choices.forEach(function(c, i) {
    var btn = document.createElement('button');
    btn.className = 'c-btn';
    btn.innerHTML = '<span class="c-num">' + (i+1) + '</span>' + c;
    btn.addEventListener('click', function() { onSynonym(btn, c, syns, q); });
    area.appendChild(btn);
  });
}

function onSynonym(btn, sel, syns, q) {
  disableAll();
  var fb = document.getElementById('fbBox');
  var nb = document.getElementById('nextBtn');
  var isOk = syns.indexOf(sel) >= 0;
  if (isOk) {
    btn.classList.add('ok');
    fb.className = 'fb-box ok'; fb.textContent = '✅ 정답!';
    numCorrect++;
  } else {
    btn.classList.add('no');
    markSynAnswer(syns);
    fb.className = 'fb-box no'; fb.textContent = '❌ 내 답: ' + sel + ' / 유의어: ' + syns.join(', ');
    numWrong++;
    wrongList.push({ eng: q.word.eng, kor: q.word.kor, type: '유의어', my: sel, correct: syns[0] });
  }
  nb.textContent = (qIdx + 1 >= questions.length) ? '결과 보기 →' : '다음 →';
  nb.className = 'next-btn show';
  nb.onclick = function() { qIdx++; renderQ(); };
}

function renderJudge(card, q) {
  card.innerHTML =
    '<div class="q-tag j">관계 판별</div>' +
    '<div class="q-step">' + (qIdx+1) + ' / ' + questions.length + '</div>' +
    '<div style="display:flex;gap:14px;justify-content:center;align-items:center;margin:14px 0 6px;">' +
      '<div class="q-word" style="font-size:22px;">' + q.w1 + '</div>' +
      '<div style="font-size:22px;color:#ce93d8;font-weight:800;">↔</div>' +
      '<div class="q-word" style="font-size:22px;">' + q.w2 + '</div>' +
    '</div>' +
    '<div class="q-kor" style="text-align:center;">(' + q.kor + ')</div>' +
    '<div class="q-prompt" style="margin-top:14px;">두 단어의 관계는?</div>' +
    '<div class="j-row">' +
      '<button class="j-btn syn" id="jSyn">🟢 유의어</button>' +
      '<button class="j-btn ant" id="jAnt">🔴 반의어</button>' +
    '</div>' +
    '<div class="fb-box" id="fbBox"></div>' +
    '<button class="next-btn" id="nextBtn">다음 →</button>';

  document.getElementById('jSyn').addEventListener('click', function() { onJudge('syn', q); });
  document.getElementById('jAnt').addEventListener('click', function() { onJudge('ant', q); });
}

function onJudge(sel, q) {
  document.getElementById('jSyn').disabled = true;
  document.getElementById('jAnt').disabled = true;
  var fb = document.getElementById('fbBox');
  var nb = document.getElementById('nextBtn');
  var la = q.rel === 'syn' ? '유의어' : '반의어';
  var ls = sel === 'syn' ? '유의어' : '반의어';
  var isOk = sel === q.rel;
  var selBtn = document.getElementById(sel === 'syn' ? 'jSyn' : 'jAnt');
  var ansBtn = document.getElementById(q.rel === 'syn' ? 'jSyn' : 'jAnt');
  if (isOk) {
    selBtn.classList.add('ok');
    fb.className = 'fb-box ok'; fb.textContent = '✅ 정답! ' + la;
    numCorrect++;
  } else {
    selBtn.classList.add('no');
    ansBtn.classList.add('ok');
    fb.className = 'fb-box no'; fb.textContent = '❌ 내 답: ' + ls + ' / 정답: ' + la;
    numWrong++;
    wrongList.push({ eng: q.w1 + ' ↔ ' + q.w2, kor: q.kor, type: '관계', my: ls, correct: la });
  }
  nb.textContent = (qIdx + 1 >= questions.length) ? '결과 보기 →' : '다음 →';
  nb.className = 'next-btn show';
  nb.onclick = function() { qIdx++; renderQ(); };
}

// ── 헬퍼 ──
function disableAll() {
  document.querySelectorAll('.c-btn').forEach(function(b) { b.disabled = true; });
}
function markAnswer(ans) {
  document.querySelectorAll('.c-btn').forEach(function(b) {
    if (b.textContent.trim().indexOf(ans) >= 0) b.classList.add('ans');
  });
}
function markSynAnswer(syns) {
  document.querySelectorAll('.c-btn').forEach(function(b) {
    var txt = b.textContent.trim();
    syns.forEach(function(s) { if (txt.indexOf(s) >= 0) b.classList.add('ans'); });
  });
}

// ── 결과 ──
function showResult() {
  document.getElementById('pg-quiz').style.display = 'none';
  var total = questions.length;
  var pct = total > 0 ? Math.round(numCorrect / total * 100) : 0;
  var elapsed = Math.round((Date.now() - startTime) / 60000);
  var yearLabel = yearSel === '2024' ? '24년 3월' : '25년 3월';

  var wrongHTML = '';
  if (wrongList.length > 0) {
    wrongHTML = '<div class="wrong-box"><h3>❌ 오답 (' + wrongList.length + '개)</h3>';
    wrongList.forEach(function(w) {
      wrongHTML += '<div class="w-item"><div class="w-eng">' + w.eng + '</div><div class="w-detail">[' + w.type + '] 내 답: ' + w.my + ' → 정답: ' + w.correct + '</div></div>';
    });
    wrongHTML += '</div>';
  } else {
    wrongHTML = '<div style="color:#2e7d32;font-weight:800;padding:16px;text-align:center;font-size:16px;">🎉 전부 정답! 완벽해요!</div>';
  }

  var retryBtn = wrongList.length > 0
    ? '<button class="r-btn ghost" id="retryBtn">오답만 다시 풀기 🔁</button>'
    : '';

  var res = document.getElementById('pg-result');
  res.style.display = 'block';
  res.innerHTML =
    '<div class="r-card">' +
      '<div style="font-size:12px;color:#888;margin-bottom:4px;">고2 ' + yearLabel + ' · ' + (mode==='A'?'유의어 찾기':'관계 판별') + (isRetry?' · 오답 재시도':'') + '</div>' +
      '<div class="r-score">' + pct + '점</div>' +
      '<div class="r-name">' + studentName + '의 결과</div>' +
      '<div class="r-stats">' +
        '<div class="r-stat"><div class="n" style="color:#2e7d32;">' + numCorrect + '</div><div class="l">정답</div></div>' +
        '<div class="r-stat"><div class="n" style="color:#b71c1c;">' + numWrong + '</div><div class="l">오답</div></div>' +
        '<div class="r-stat"><div class="n" style="color:#6a1b9a;">' + total + '</div><div class="l">총문제</div></div>' +
        '<div class="r-stat"><div class="n" style="color:#ff6f00;">' + elapsed + '분</div><div class="l">소요</div></div>' +
      '</div>' +
      wrongHTML +
      '<div class="r-btns">' +
        retryBtn +
        '<button class="r-btn primary" onclick="location.reload()">처음부터 🔄</button>' +
      '</div>' +
    '</div>';

  if (wrongList.length > 0) {
    document.getElementById('retryBtn').addEventListener('click', function() { retryWrong(); });
  }

  saveFirebase(pct, numCorrect, numWrong, total, elapsed, yearLabel);
}

// ── 오답 재시도 ──
function retryWrong() {
  isRetry = true;
  if (mode === 'A') {
    var wrongWords = WORDS.filter(function(w) {
      return wrongList.some(function(wl) { return wl.eng === w.eng; });
    });
    if (wrongWords.length === 0) wrongWords = WORDS.filter(function(w){ return w.syn.length > 0; }).slice(0,5);
    questions = [];
    shuffle(wrongWords).forEach(function(w) {
      questions.push({ type: 'M', word: w });
      questions.push({ type: 'S', word: w });
    });
  } else {
    var wrongPairs = wrongList.map(function(wl) {
      var parts = wl.eng.split(' ↔ ');
      return { type:'J', w1: parts[0] ? parts[0].trim() : wl.eng, w2: parts[1] ? parts[1].trim() : '', rel: wl.correct === '유의어' ? 'syn' : 'ant', kor: wl.kor };
    });
    questions = shuffle(wrongPairs);
  }

  qIdx = 0; numCorrect = 0; numWrong = 0; wrongList = []; startTime = Date.now();
  document.getElementById('pg-result').style.display = 'none';
  document.getElementById('pg-quiz').style.display = 'block';
  renderQ();
}
