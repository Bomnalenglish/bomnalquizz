<script>
(function(){
  var saved = sessionStorage.getItem('bn_name') || localStorage.getItem('bn_name');
  if(saved){
    window._hubStudentName = saved;
    window.addEventListener('DOMContentLoaded', function(){
      var inputs = document.querySelectorAll('input#student-name, input#nameInput, .name-input');
      inputs.forEach(function(el){ if(!el.value) el.value = saved; });
    });
  }
})();
</script>

      <div class="mt-sub">선택해서 시험보기</div>

    </button>
  </div>
</div>

<!-- ====== 대화문 선택 화면 ====== -->
<div id="dialogue-screen">
  <div class="header">
    <h1>💬 5과 대화문 선택</h1>
    <div class="subtitle">어떤 대화문을 시험볼까요?</div>
  </div>
  <p class="tip">💡 카드를 누르면 바로 시험이 시작돼요.</p>
  <div class="dialogue-grid" id="dialogue-grid"></div>
  <button class="back-btn" onclick="backToStart()">← 처음으로</button>
</div>

<!-- ====== 시험 화면 ====== -->
<div id="test-screen">
  <div class="header">
    <h1>📚 종촌중학교 1학년 5과</h1>
    <div class="subtitle" id="test-subtitle">영어 빈칸 시험</div>
    <div class="datetime" id="test-datetime"></div>
  </div>
  <div class="test-info-bar" id="test-info-bar"></div>
  <div id="resume-notice"></div>
  <p class="tip">💡 각 칸에 글자를 하나씩 입력하세요. 자동완성은 지원되지 않습니다.</p>
  <div id="questions-container"></div>
  <div class="submit-wrap">
    <button class="submit-btn" onclick="submitTest()">✅ 제출하고 채점받기</button>
  </div>
  <button class="back-btn" onclick="backToStart()">← 처음으로</button>
</div>

<!-- ====== 결과 화면 ====== -->
<div id="result-screen">
  <div id="result-header-block"></div>
  <div class="screenshot-guide">
    <strong>📸 선생님께 결과를 보내주세요!</strong>
    이 화면을 캡처(스크린샷)해서 선생님께 전송해 주세요.<br>
    📱 아이폰: 전원 + 볼륨 올리기 버튼 / 안드로이드: 전원 + 볼륨 내리기 버튼
  </div>
  <div id="result-details"></div>
  <button class="retry-btn" onclick="restartTest()">🔄 같은 파트 다시 시험</button>
  <button class="back-btn" onclick="backToStart()">← 처음으로</button>
</div>

let SENTENCES = [];
let selectedSection = null;
let currentBlanks = [];
let startDateTime = null;
let tabSwitchCount = 0;
let attemptCount = 0;

// ===== 날짜·키 유틸 =====
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function draftKey(sectionKey) { return CHAPTER_KEY + '_draft_' + todayStr() + '_' + sectionKey; }
function blankPosKey(sectionKey) { return CHAPTER_KEY + '_blankpos_' + todayStr() + '_' + sectionKey; }
function tabExitKey() { return CHAPTER_KEY + '_tabexit_' + todayStr(); }
function attemptKey(sectionKey) { return CHAPTER_KEY + '_attempt_' + sectionKey; }

function formatDT(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// ===== 화면 전환 =====
function showScreen(id) {
  ['start-screen', 'dialogue-screen', 'test-screen', 'result-screen'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
  window.scrollTo(0, 0);
}
function backToStart() {
  showScreen('start-screen');
  renderProgressBadges();
}

// ===== 본문 진입 =====
function enterPassage() {
  startTestForSection('main');
}

// ===== 대화문 선택 화면 =====
function enterDialogueSelect() {
  renderDialogueGrid();
  showScreen('dialogue-screen');
}
function renderDialogueGrid() {
  const grid = document.getElementById('dialogue-grid');
  grid.innerHTML = '';

    const s = SECTIONS[key];

    card.type = 'button';

      <div class="d-title">${s.title}</div>

      <div class="d-count">📝 ${s.sentences.length}문장</div>
      ${hasDraft ? '<div class="d-progress">📝 풀던 답안 있음</div>' : ''}
    `;
    card.onclick = () => startTestForSection(key);
    grid.appendChild(card);

}

// 시작 화면에 본문 풀던 답안 표시
function renderProgressBadges() {
  const draftMain = localStorage.getItem(draftKey('main'));
  const hasMainDraft = draftMain && Object.keys(JSON.parse(draftMain) || {}).filter(k => k !== '__name__').length > 0;
  const pBadge = document.getElementById('passage-count-badge');
  if (pBadge) pBadge.textContent = hasMainDraft ? '30문장 · 📝 풀던 답안 있음' : '30문장';

  let dialogueDraftCount = 0;
  Object.keys(SECTIONS).filter(k => k !== 'main').forEach(key => {
    const draft = localStorage.getItem(draftKey(key));
    if (draft && Object.keys(JSON.parse(draft) || {}).filter(k => k !== '__name__').length > 0) {
      dialogueDraftCount++;
    }
  });

  if (dBadge) dBadge.textContent = dialogueDraftCount > 0 ? `10개 대화문 · 📝 ${dialogueDraftCount}개 풀던 중` : '10개 대화문';

// ===== 시험 시작 =====
function startTestForSection(key) {
  const name = document.getElementById('student-name').value.trim();
  if (!name) {
    alert('이름을 먼저 입력해 주세요!');
    document.getElementById('student-name').focus();
    return;
  }
  try { localStorage.setItem('bn_name', name); } catch(e) {}

  selectedSection = key;
  const sec = SECTIONS[key];
  SENTENCES = sec.sentences;

  document.getElementById('test-subtitle').textContent = `${sec.emoji} ${sec.tag} · ${sec.title}`;
  document.getElementById('test-info-bar').textContent = `📝 ${sec.tag} · 총 ${SENTENCES.length}문장 · 빈칸을 채워보세요`;

  startDateTime = new Date();
  document.getElementById('test-datetime').textContent = '시험 시작: ' + formatDT(startDateTime);

  attemptCount = parseInt(localStorage.getItem(attemptKey(key)) || '0') + 1;
  localStorage.setItem(attemptKey(key), attemptCount);

  renderQuestions();
  showResumeNotice();
  showScreen('test-screen');
}

function showResumeNotice() {
  const notice = document.getElementById('resume-notice');
  const draft = localStorage.getItem(draftKey(selectedSection));
  if (draft) {
    try {
      const data = JSON.parse(draft);
      const filled = Object.keys(data).filter(k => k !== '__name__' && data[k]).length;
      if (filled > 0) {
        notice.innerHTML = `<div class="resume-banner">📝 오늘 풀던 답안을 자동으로 불러왔어요 (${filled}칸)</div>`;
        return;
      }
    } catch(e) {}
  }
  notice.innerHTML = '';
}

// ===== 토큰화·빈칸 선정 (그날은 위치 고정) =====
function tokenize(sentence) {
  return sentence.trim().split(/\s+/).map(function(tok) {
    var word = tok.replace(/[^A-Za-z]+$/, '');
    var punct = tok.slice(word.length);
    if (!word) { return { word: tok, punct: '' }; }
    return { word: word, punct: punct };
  });
}

function pickBlanksForSentence(tokens, sentIdx) {
  // 그날은 같은 빈칸 위치 유지 (localStorage), 새 회차는 새 위치
  // 단, 사용자가 restartTest로 재시작하면 새 위치 생성
  const eligible = tokens.map((t, i) => i).filter(i => tokens[i].word.length >= 3);
  for (let i = eligible.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [eligible[i], eligible[j]] = [eligible[j], eligible[i]];
  }
  return eligible.slice(0, Math.min(2, eligible.length)).sort((a,b)=>a-b);
}

function getOrCreateBlankPositions() {
  const key = blankPosKey(selectedSection);
  const saved = localStorage.getItem(key);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  const positions = SENTENCES.map((sent, si) => pickBlanksForSentence(tokenize(sent.en), si));
  localStorage.setItem(key, JSON.stringify(positions));
  return positions;
}

function regenerateBlankPositions() {
  localStorage.removeItem(blankPosKey(selectedSection));
  return getOrCreateBlankPositions();
}

function buildLetterBoxes(blankId, word) {
  let html = `<span class="blank-group" data-blank="${blankId}">`;
  let inputIdx = 0;
  for (let c = 0; c < word.length; c++) {
    const ch = word[c];
    if (ch === '-' || ch === '.' || ch === "'") {
      html += `<span style="display:inline-flex;align-items:center;justify-content:center;width:10px;font-size:16px;font-weight:700;color:#3B82F6;">${ch}</span>`;
    } else {
      html += `<input class="letter-box" type="text" maxlength="2"
        id="${blankId}_${inputIdx}" data-blank="${blankId}" data-idx="${inputIdx}" data-charpos="${c}"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text"/>`;
      inputIdx++;
    }
  }
  html += `</span>`;
  return html;
}

function renderQuestions() {
  currentBlanks = [];
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  const positions = getOrCreateBlankPositions();
  SENTENCES.forEach((sent, si) => {
    const tokens = tokenize(sent.en);
    const blankSet = new Set(positions[si] || []);
    let engHtml = '';
    tokens.forEach((tok, ti) => {
      if (blankSet.has(ti)) {
        const blankId = `q${si}_b${currentBlanks.length}`;
        currentBlanks.push({ blankId, word: tok.word, sentIdx: si });
        engHtml += buildLetterBoxes(blankId, tok.word);
        if (tok.punct) engHtml += `<span>${tok.punct}</span>`;
        engHtml += ' ';
      } else {
        engHtml += `<span>${tok.word}${tok.punct}</span> `;
      }
    });
    const card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = `<div class="q-num">문제 ${si + 1}</div><div class="english-line">${engHtml}</div><div class="korean-line">🇰🇷 ${sent.ko}</div>`;
    container.appendChild(card);
  });
  container.querySelectorAll('.letter-box').forEach(box => {
    box.addEventListener('input', onLetterInput);
    box.addEventListener('keydown', onLetterKeydown);
    box.addEventListener('paste', e => e.preventDefault());
  });
  restoreAnswers();
}

function onLetterInput(e) {
  const box = e.target;
  let val = box.value;
  if (val.length > 1) val = val[0];
  val = val.replace(/[^A-Za-z0-9']/g, '');
  box.value = val;
  if (val.length === 1) {
    box.classList.add('filled');
    const next = document.getElementById(`${box.dataset.blank}_${parseInt(box.dataset.idx) + 1}`);
    if (next) next.focus();
  } else {
    box.classList.remove('filled');
  }
  saveAnswers();
}

function onLetterKeydown(e) {
  const box = e.target;
  if (e.key === 'Backspace' && box.value === '') {
    const prev = document.getElementById(`${box.dataset.blank}_${parseInt(box.dataset.idx) - 1}`);
    if (prev) { prev.value = ''; prev.classList.remove('filled'); prev.focus(); saveAnswers(); }
  }
}

function collectAnswer(blankInfo) {
  let ans = '';
  let inputIdx = 0;
  for (let c = 0; c < blankInfo.word.length; c++) {
    const ch = blankInfo.word[c];
    if (ch === '-' || ch === '.' || ch === "'") { ans += ch; }
    else {
      const box = document.getElementById(`${blankInfo.blankId}_${inputIdx}`);
      ans += box ? (box.value || ' ') : ' ';
      inputIdx++;
    }
  }
  return ans.trim();
}

function saveAnswers() {
  if (!selectedSection) return;
  var data = {};
  var nameEl = document.getElementById('student-name');
  if (nameEl) data['__name__'] = nameEl.value;
  currentBlanks.forEach(function(b) {
    var inputIdx = 0;
    for (var c = 0; c < b.word.length; c++) {
      var ch = b.word[c];
      if (ch !== '-' && ch !== '.' && ch !== "'") {
        var box = document.getElementById(b.blankId + '_' + inputIdx);
        if (box && box.value) data[b.blankId + '_' + inputIdx] = box.value;
        inputIdx++;
      }
    }
  });
  localStorage.setItem(draftKey(selectedSection), JSON.stringify(data));
}

function restoreAnswers() {
  var saved = localStorage.getItem(draftKey(selectedSection));
  if (!saved) return;
  try {
    var data = JSON.parse(saved);
    if (data['__name__']) {
      var nameEl = document.getElementById('student-name');
      if (nameEl && !nameEl.value) nameEl.value = data['__name__'];
    }
    Object.keys(data).forEach(function(key) {
      if (key === '__name__') return;
      var box = document.getElementById(key);
      if (box && data[key]) { box.value = data[key]; box.classList.add('filled'); }
    });
  } catch(e) {}
}

function clearDraft() {
  if (selectedSection) localStorage.removeItem(draftKey(selectedSection));
}

// ===== 제출 =====
function submitTest(auto) {
  const name = document.getElementById('student-name').value.trim() || (auto ? '(자동제출)' : '');
  if (!name) { alert('이름을 먼저 입력해 주세요!'); return; }

  const incomplete = currentBlanks.some(b => {
    const ans = collectAnswer(b);
    const inputLen = b.word.split('').filter(ch => ch !== '-' && ch !== '.' && ch !== "'").length;
    return ans.replace(/[\s\-\.']/g, '').length < inputLen;
  });
  if (!auto && incomplete) {
    if (!confirm('아직 채우지 않은 칸이 있습니다. 그래도 제출할까요?')) return;
  }

  const endDT = new Date();
  let correct = 0;
  let detailsHtml = '';
  const sentResults = {};

  currentBlanks.forEach(b => {
    const userAns = collectAnswer(b);
    const ok = userAns.toLowerCase() === b.word.toLowerCase();
    if (ok) correct++;
    if (!sentResults[b.sentIdx]) sentResults[b.sentIdx] = [];
    sentResults[b.sentIdx].push({ word: b.word, blankId: b.blankId, userAns, ok });
  });

  SENTENCES.forEach((sent, si) => {
    if (!sentResults[si]) return;
    const tokens = tokenize(sent.en);
    let usedBlanks = {};
    let engResult = '';
    tokens.forEach((tok) => {
      const match = sentResults[si].find(r => !usedBlanks[r.blankId] && r.word === tok.word);
      if (match) {
        usedBlanks[match.blankId] = true;
        const cls = match.ok ? 'ok' : 'bad';
        engResult += `<span class="${cls}"><u>${tok.word}</u>${tok.punct}</span> `;
      } else {
        engResult += `${tok.word}${tok.punct} `;
      }
    });
    let answerRows = sentResults[si].map(r =>
      r.ok ? `<span class="ok">✅ "${r.word}" 정답!</span>`
           : `<span class="bad">❌ 정답: <b>${r.word}</b> / 내 답: <b>${r.userAns || '(공백)'}</b></span>`
    ).join('<br>');
    detailsHtml += `<div class="result-card"><div class="q-num">문제 ${si + 1}</div><div class="result-eng">${engResult}</div><div class="result-kor">🇰🇷 ${sent.ko}</div><div class="answer-row">${answerRows}</div></div>`;
  });

  const total = currentBlanks.length;
  const pct   = total > 0 ? Math.round(correct / total * 100) : 0;
  const emoji = pct === 100 ? '🏆' : pct >= 70 ? '😊' : '😢';
  const isPass = pct >= 70;
  const sec = SECTIONS[selectedSection];
  const totalTabExit = parseInt(localStorage.getItem(tabExitKey()) || '0');

  document.getElementById('result-header-block').innerHTML = `
    <div class="result-header ${isPass ? '' : 'fail-header'}">
      <div style="font-size:36px;">${emoji}</div>
      <div class="score-big">${correct} / ${total}</div>
      <div class="score-label">${pct}점 &nbsp;·&nbsp; ${isPass ? '통과 🎉' : '다시 도전!'}</div>
      <div style="font-size:13px;margin-top:8px;opacity:.9;">${sec.emoji} ${sec.tag} · ${sec.title}</div>
      <div class="result-meta">👤 ${name} &nbsp;|&nbsp; 📅 ${formatDT(endDT)} &nbsp;|&nbsp; 📝 ${attemptCount}회차 응시 &nbsp;|&nbsp; ${tabSwitchCount > 0 ? '⚠️ 이번 시험 중 탭이탈 ' + tabSwitchCount + '회' : '✅ 이번 시험 중 탭이탈 없음'} &nbsp;|&nbsp; 📊 오늘 누적 탭이탈 ${totalTabExit}회</div>
    </div>`;
  document.getElementById('result-details').innerHTML = detailsHtml;

  var wrongList = [];
  Object.keys(sentResults).forEach(function(si) {
    if (sentResults[si].some(function(r){ return !r.ok; })) {
      wrongList.push({ num: parseInt(si)+1, en: SENTENCES[parseInt(si)].en });
    }
  });

  submitToFirebase(name, correct, total, pct, wrongList, totalTabExit);
  clearDraft();
  showScreen('result-screen');
}

function submitToFirebase(name, correct, total, pct, wrongList, totalTabExit) {
  var wrongNumbers = wrongList.map(function(w){ return w.num + '번'; }).join(', ');
  var wrongSentences = wrongList.map(function(w){ return w.num + '번: ' + w.en; }).join(' / ');
  var sec = SECTIONS[selectedSection];

  var data = {
    studentName: name,
    school: QUIZ_INFO.school,
    grade: QUIZ_INFO.grade,
    chapter: QUIZ_INFO.chapter,
    section: sec.tag + ' - ' + sec.title,
    quizType: QUIZ_INFO.school + '_' + QUIZ_INFO.grade + '_' + QUIZ_INFO.chapter + '_빈칸시험_' + sec.tag,
    score: pct,
    correct: correct,
    wrong: total - correct,
    total: total,
    tabSwitchCount: tabSwitchCount,
    tabExitTotalToday: totalTabExit,
    attemptCount: attemptCount,
    wrongNumbers: wrongNumbers,
    wrongSentences: wrongSentences,
    userAgent: navigator.userAgent.substring(0, 100)
  };

  var waited = 0;
  var timer = setInterval(function() {
    waited += 200;
    if (window._saveResult) {
      clearInterval(timer);
      window._saveResult(data);
    } else if (waited >= 6000) {
      clearInterval(timer);
      console.log('Firebase 준비 안됨 - 저장 실패');
    }
  }, 200);
}

function restartTest() {
  // 같은 파트 다시 시험 → 빈칸 위치 새로 생성
  regenerateBlankPositions();
  tabSwitchCount = 0;
  startDateTime = new Date();
  document.getElementById('test-datetime').textContent = '시험 시작: ' + formatDT(startDateTime);
  attemptCount = parseInt(localStorage.getItem(attemptKey(selectedSection)) || '0') + 1;
  localStorage.setItem(attemptKey(selectedSection), attemptCount);
  clearDraft();
  renderQuestions();
  document.getElementById('resume-notice').innerHTML = '';
  showScreen('test-screen');
}

// ===== 탭 이탈 누적 카운터 =====
function incrementTabExitToday() {
  const key = tabExitKey();
  const cur = parseInt(localStorage.getItem(key) || '0') + 1;
  localStorage.setItem(key, cur);
  return cur;
}

(function init() {
  document.getElementById('start-datetime').textContent = '오늘 ' + formatDT(new Date());
  renderProgressBadges();
  var nameInput = document.getElementById('student-name');
  if (nameInput) nameInput.addEventListener('input', function() { saveAnswers(); });

  // 탭 이탈 감지 - 시험 화면에서만 카운트 + 누적 저장
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      const totalToday = incrementTabExitToday();
      if (document.getElementById('test-screen').classList.contains('active')) {
        tabSwitchCount++;
        if (tabSwitchCount >= 3) {
          setTimeout(function() {
            alert('🚨 탭 이탈 3회 초과!\n\n부정행위 방지를 위해 시험이 자동 제출됩니다.\n오늘 누적 탭이탈: ' + totalToday + '회');
            submitTest(true);
          }, 100);
        } else {
          setTimeout(function() {
            alert('⚠️ 다른 탭/창으로 이동이 감지되었습니다!\n\n이번 시험 이탈 횟수: ' + tabSwitchCount + '회 / 3회\n오늘 누적 탭이탈: ' + totalToday + '회\n3회 초과 시 자동 제출됩니다.');
          }, 100);
        }
      }
    }
  });

  // 복사·붙여넣기·잘라내기 차단
  document.addEventListener('copy',  function(e) { e.preventDefault(); });
  document.addEventListener('cut',   function(e) { e.preventDefault(); });
  document.addEventListener('paste', function(e) { e.preventDefault(); });
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && ['c','v','x','a'].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.metaKey && ['c','v','x','a'].includes(e.key.toLowerCase())) e.preventDefault();
  });
})();
</script>
</body>
</html>
