<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025년 03월 고2 동반의어 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1f2733;
    --border: #2d3748;
    --accent: #e2a84b;
    --accent2: #c97d2e;
    --correct: #34d399;
    --wrong: #f87171;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #3d444d;
    --gold: #fbbf24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(226,168,75,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 100%, rgba(201,125,46,0.05) 0%, transparent 55%);
  }

  /* Header */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(13,17,23,0.93);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between; gap:16px;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo {
    width:38px; height:38px; flex-shrink:0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace; font-size:13px; font-weight:600; color:#fff;
  }
  .header-title { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:700; color:var(--text); }
  .header-sub { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .score-badge {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:6px 16px;
    font-size:13px; color:var(--text-dim); white-space:nowrap;
  }
  .score-badge span { color:var(--accent); font-weight:700; font-family:'JetBrains Mono',monospace; }

  /* Nav */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex; gap:0; overflow-x:auto;
  }
  nav::-webkit-scrollbar { height:3px; }
  nav::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .nav-btn {
    background:none; border:none; cursor:pointer;
    color:var(--text-dim); font-size:12px; font-family:'JetBrains Mono',monospace;
    padding:12px 20px; white-space:nowrap;
    border-bottom:2px solid transparent;
    transition:all 0.2s; flex-shrink:0;
  }
  .nav-btn:hover { color:var(--text); }
  .nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

  /* Main */
  main { max-width:920px; margin:0 auto; padding:32px 24px 80px; }
  .section { display:none; }
  .section.visible { display:block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Section header */
  .section-header {
    display:flex; align-items:flex-start; gap:16px;
    margin-bottom:24px; padding-bottom:18px;
    border-bottom:1px solid var(--border);
  }
  .section-num {
    width:46px; height:46px; flex-shrink:0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius:12px; display:grid; place-items:center;
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px; color:#fff;
  }
  .section-meta h2 { font-family:'Noto Serif KR',serif; font-size:17px; font-weight:700; }
  .section-meta p  { font-size:12px; color:var(--text-dim); margin-top:4px; }

  /* Passage */
  .passage {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:24px 28px;
    font-size:14.5px; line-height:2.05;
    margin-bottom:24px;
    position:relative;
  }
  .passage::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius:14px 14px 0 0;
  }

  /* Choice */
  .choice-group {
    display:inline-flex; align-items:center;
    background:var(--surface2);
    border:1.5px solid var(--border);
    border-radius:6px; overflow:hidden;
    vertical-align:middle; margin:0 2px;
    transition:border-color 0.2s;
  }
  .choice-group.correct { border-color:var(--correct); background:rgba(52,211,153,0.07); }
  .choice-group.wrong   { border-color:var(--wrong);   background:rgba(248,113,113,0.07); }

  .choice-btn {
    background:none; border:none; cursor:pointer;
    padding:3px 10px;
    font-size:13px; font-family:'Noto Sans KR',sans-serif;
    color:var(--text-dim);
    transition:all 0.15s;
    position:relative; white-space:nowrap;
  }
  .choice-btn:not(:last-child)::after {
    content:''; position:absolute; right:0; top:20%; height:60%;
    width:1px; background:var(--border);
  }
  .choice-btn:hover { background:rgba(226,168,75,0.12); color:var(--accent); }
  .choice-btn.selected { background:var(--accent); color:#fff; font-weight:500; }
  .choice-group.correct .choice-btn.selected  { background:var(--correct); }
  .choice-group.wrong   .choice-btn.selected  { background:var(--wrong); }
  .choice-group.wrong   .choice-btn.answer-key { background:rgba(52,211,153,0.2); color:var(--correct); font-weight:600; }

  .num-label {
    display:inline-block;
    font-family:'JetBrains Mono',monospace;
    font-size:10px; color:var(--accent);
    vertical-align:super; margin-right:1px; opacity:0.75;
  }

  /* Controls */
  .controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:6px; }
  .btn {
    border:none; cursor:pointer; border-radius:10px;
    font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:500;
    padding:10px 20px; transition:all 0.2s;
  }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
  .btn-ghost { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); }
  .btn-ghost:hover { color:var(--text); border-color:var(--accent); }

  /* Result */
  .result-banner {
    display:none;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:16px 20px;
    margin-top:18px;
    align-items:center; gap:16px; flex-wrap:wrap;
  }
  .result-banner.show { display:flex; animation:fadeUp 0.3s ease; }
  .result-score { font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:700; }
  .result-score.perfect { color:var(--gold); }
  .result-score.good    { color:var(--correct); }
  .result-score.ok      { color:var(--accent); }
  .result-score.bad     { color:var(--wrong); }
  .result-detail { font-size:13px; color:var(--text-dim); }
  .result-detail strong { color:var(--text); }

  /* Summary */
  #summary-view { display:none; }
  #summary-view.visible { display:block; }
  .overall-score-box {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:16px; padding:32px; text-align:center; margin-bottom:28px;
  }
  .overall-score-box h3 { font-family:'Noto Serif KR',serif; font-size:16px; color:var(--text-dim); margin-bottom:12px; }
  .overall-num {
    font-family:'JetBrains Mono',monospace; font-size:54px; font-weight:700;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .overall-sub { font-size:14px; color:var(--text-dim); margin-top:8px; }
  .summary-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:12px; margin-bottom:28px;
  }
  .summary-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:16px;
    cursor:pointer; transition:all 0.2s;
  }
  .summary-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .summary-card h4 { font-size:13px; font-weight:600; margin-bottom:8px; }
  .summary-card .sc-score { font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; margin-bottom:3px; }
  .summary-card .sc-label { font-size:11px; color:var(--text-dim); }
  .sc-perfect .sc-score { color:var(--gold); }
  .sc-good    .sc-score { color:var(--correct); }
  .sc-ok      .sc-score { color:var(--accent); }
  .sc-bad     .sc-score { color:var(--wrong); }
  .sc-none    .sc-score { color:var(--text-muted); }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">G2</div>
    <div>
      <div class="header-title">2025년 03월 고2 동반의어 테스트</div>
      <div class="header-sub">학력평가 21~24번, 29~40번 | 문맥상 적절한 어휘를 선택하시오</div>

  </div>
</header>

<nav id="main-nav"></nav>

<main>
  <div id="sections-container"></div>
  <div id="summary-view">
    <div class="overall-score-box">

</main>

const state = {};
UNITS.forEach(u => { state[u.id] = {}; });

function buildNav() {
  const nav = document.getElementById('main-nav');
  UNITS.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.dataset.id = u.id;
    btn.textContent = u.label;
    btn.onclick = () => showUnit(u.id);
    nav.appendChild(btn);
  });
  // 총정리 버튼
  const sb = document.createElement('button');
  sb.className = 'nav-btn';
  sb.textContent = '📊 총정리';
  sb.onclick = showSummary;
  nav.appendChild(sb);
}

function showUnit(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.querySelector(`[data-id="${id}"]`);
  if (nb) nb.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById('summary-view').classList.remove('visible');
  document.getElementById('sec-' + id).classList.add('visible');
}

function showSummary() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById('summary-view').classList.add('visible');
  buildSummary();
}

function buildPassage(unit) {
  let html = '';
  unit.text.forEach(part => {
    if (typeof part === 'string') {
      html += part;
    } else {
      const q = part.q;
      html += `<sup class="num-label">${q}</sup><span class="choice-group" id="cg-${unit.id}-${q}" data-unit="${unit.id}" data-q="${q}">`;
      part.opts.forEach(opt => {
        html += `<button class="choice-btn" onclick="select('${unit.id}',${q},'${opt.replace(/'/g,"\\'")}',this)">${opt}</button>`;
      });
      html += `</span>`;
    }
  });
  return html;
}

function buildSections() {
  const container = document.getElementById('sections-container');
  UNITS.forEach(unit => {
    const totalQ = Object.keys(unit.answers).length;
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'sec-' + unit.id;
    sec.innerHTML = `
      <div class="section-header">
        <div class="section-num">${unit.label}</div>
        <div class="section-meta">
          <h2>2025년 03월 고2 학력평가 [${unit.title}]</h2>
          <p>문항 수: ${totalQ}개 | 문맥상 적절한 어휘를 선택하세요</p>
        </div>
      </div>
      <div class="passage" id="passage-${unit.id}">${buildPassage(unit)}</div>
      <div class="controls">
        <button class="btn btn-primary" onclick="gradeUnit('${unit.id}')">채점하기</button>
        <button class="btn btn-ghost" onclick="resetUnit('${unit.id}')">다시 풀기</button>
      </div>
      <div class="result-banner" id="result-${unit.id}"></div>
    `;
    container.appendChild(sec);
  });
}

function select(unitId, q, opt, btn) {
  const cg = document.getElementById(`cg-${unitId}-${q}`);
  if (cg.classList.contains('correct') || cg.classList.contains('wrong')) return;
  cg.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state[unitId][q] = opt;
  updateTotalScore();
}

function gradeUnit(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  let correct = 0, total = 0;
  Object.entries(unit.answers).forEach(([q, ans]) => {
    total++;
    const cg = document.getElementById(`cg-${unitId}-${q}`);
    const selected = state[unitId][q];
    if (selected === ans) {
      correct++;
      cg.classList.add('correct');
    } else {
      cg.classList.add('wrong');
      cg.querySelectorAll('.choice-btn').forEach(b => {
        if (b.textContent === ans) b.classList.add('answer-key');
      });
    }
  });
  const pct = Math.round(correct / total * 100);
  const banner = document.getElementById(`result-${unitId}`);
  const cls = pct === 100 ? 'perfect' : pct >= 80 ? 'good' : pct >= 60 ? 'ok' : 'bad';
  const msg = pct === 100 ? '🎉 완벽합니다!' : pct >= 80 ? '👍 잘했어요!' : pct >= 60 ? '📚 조금 더 노력해요' : '💪 다시 도전해보세요';
  banner.innerHTML = `
    <div class="result-score ${cls}">${correct}/${total}</div>
    <div class="result-detail"><strong>${pct}점</strong> — ${msg}</div>
  `;
  banner.classList.add('show');
  updateTotalScore();
}

function resetUnit(unitId) {
  state[unitId] = {};
  const unit = UNITS.find(u => u.id === unitId);
  document.getElementById(`passage-${unitId}`).innerHTML = buildPassage(unit);
  document.getElementById(`result-${unitId}`).classList.remove('show');
  updateTotalScore();
}

function resetAll() {
  UNITS.forEach(u => resetUnit(u.id));
  buildSummary();
}

function updateTotalScore() {
  let total = 0, possible = 0;
  UNITS.forEach(u => {
    Object.entries(u.answers).forEach(([q, ans]) => {
      possible++;
      if (state[u.id][q] === ans) total++;
    });
  });
  document.getElementById('total-score').textContent = total;
  document.getElementById('total-possible').textContent = possible;
}

function buildSummary() {
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';
  let grandCorrect = 0, grandTotal = 0, allGraded = true;
  UNITS.forEach(u => {
    const total = Object.keys(u.answers).length;
    const graded = document.getElementById(`result-${u.id}`).classList.contains('show');
    let correct = 0;
    if (graded) {
      Object.entries(u.answers).forEach(([q, ans]) => {
        if (state[u.id][q] === ans) correct++;
      });
    } else { allGraded = false; }
    grandTotal += total;
    if (graded) grandCorrect += correct;
    const pct = graded ? Math.round(correct / total * 100) : null;
    const cls = pct === null ? 'sc-none' : pct === 100 ? 'sc-perfect' : pct >= 80 ? 'sc-good' : pct >= 60 ? 'sc-ok' : 'sc-bad';
    const card = document.createElement('div');
    card.className = `summary-card ${cls}`;
    card.innerHTML = `
      <h4>${u.title}</h4>
      <div class="sc-score">${pct !== null ? correct + '/' + total : '—'}</div>
      <div class="sc-label">${pct !== null ? pct + '점' : '미채점'}</div>
    `;
    card.onclick = () => showUnit(u.id);
    grid.appendChild(card);
  });
  document.getElementById('overall-num').textContent = allGraded ? grandCorrect + ' / ' + grandTotal : grandCorrect + ' / ?';
  document.getElementById('overall-sub').textContent = allGraded
    ? Math.round(grandCorrect / grandTotal * 100) + '점 — 전체 ' + UNITS.length + '문항 채점 완료'
    : '아직 채점되지 않은 문항이 있습니다';
}

buildNav();
buildSections();
updateTotalScore();
showUnit('q21');
</script>
