  {pno:`32`,sn:5,ko:`그 책에서 Dewey는 미적 경험을 인간 삶의 생물학적, 문화적 조건에 기반하여 예술과 삶의 분리에 맞서는 주장을 펼쳤다.`,sentence:`In that book Dewey argued against the separation of art from life by {{ANSWER}} aesthetic experience on the biological and cultural conditions of human life.`,options:[`basing`,`being based`],ans:1,correct:`basing`},
  {pno:`32`,sn:6,ko:`그는 미적인 것을 감각과 감정의 내면화된 인식이 아니라 “자아와 사물 및 사건의 세계의 완전한 상 호 침투”에서 찾았다.`,sentence:`He {{ANSWER}} the aesthetic, not in an internalized awareness of sensation and feeling but in “a complete interpenetration of self and the world of objects and events.”`,options:[`located`,`was located`],ans:1,correct:`located`},
  {pno:`32`,sn:7,ko:`더 나아가, 듀이는 “미적인 것이란 모든 일상적으로 완전한 경험에 속하는 특성들이 명확해지고 강화 되어 발전된 형태이다.”라는 입장을 유지했다.`,sentence:`Further, Dewey maintained {{ANSWER}} “the aesthetic is the clarified and intensified development of traits that belong to every normally complete experience.”`,options:[`what`,`that`],ans:2,correct:`that`},
  {pno:`32`,sn:7,ko:`더 나아가, 듀이는 “미적인 것이란 모든 일상적으로 완전한 경험에 속하는 특성들이 명확해지고 강화 되어 발전된 형태이다.”라는 입장을 유지했다.`,sentence:`Further, Dewey maintained that “the aesthetic is the clarified and intensified development of traits {{ANSWER}} belong to every normally complete experience.”`,options:[`that`,`whose`],ans:1,correct:`that`},
  {pno:`32`,sn:7,ko:`더 나아가, 듀이는 “미적인 것이란 모든 일상적으로 완전한 경험에 속하는 특성들이 명확해지고 강화 되어 발전된 형태이다.”라는 입장을 유지했다.`,sentence:`Further, Dewey maintained that “the aesthetic is the clarified and intensified development of traits that {{ANSWER}} to every normally complete experience.”`,options:[`belong`,`belongs`],ans:1,correct:`belong`},
  {pno:`33`,sn:1,ko:`인간이 도덕적 행위자의 능력을 지니고 있는 반면, 다른 존재들은 (그러한 능력이) 부족하다는 근거로 인간이 도덕적으로 우월한 존재라고 타당하게 주장할 수 없다.`,sentence:`One cannot validly argue {{ANSWER}} humans are morally superior beings on the ground that they possess, while others lack, the capacities of a moral agent.`,options:[`that`,`what`],ans:1,correct:`that`},
  {pno:`33`,sn:1,ko:`인간이 도덕적 행위자의 능력을 지니고 있는 반면, 다른 존재들은 (그러한 능력이) 부족하다는 근거로 인간이 도덕적으로 우월한 존재라고 타당하게 주장할 수 없다.`,sentence:`One cannot validly argue that humans are morally {{ANSWER}} beings on the ground that they possess, while others lack, the capacities of a moral agent.`,options:[`inferior`,`superior`],ans:2,correct:`superior`},
  {pno:`33`,sn:1,ko:`인간이 도덕적 행위자의 능력을 지니고 있는 반면, 다른 존재들은 (그러한 능력이) 부족하다는 근거로 인간이 도덕적으로 우월한 존재라고 타당하게 주장할 수 없다.`,sentence:`One cannot validly argue that humans are morally superior beings on the ground {{ANSWER}} they possess, while others lack, the capacities of a moral agent.`,options:[`that`,`what`],ans:1,correct:`that`},
  {pno:`33`,sn:2,ko:`그 이유는, 도덕적 기준에 관해서는, 도덕적 행위자의 능력을 지닌 존재만이 유의미하게 도덕적으로 선하‘거나’ 도덕적으로 악하‘다고’ 말할 수 있기 때문이다.`,sentence:`The reason is {{ANSWER}}, as far as moral standards are concerned, only beings that have the capacities of a moral agent can meaningfully be said to be either morally good or morally bad.`,options:[`that`,`what`],ans:1,correct:`that`},
  {pno:`33`,sn:2,ko:`그 이유는, 도덕적 기준에 관해서는, 도덕적 행위자의 능력을 지닌 존재만이 유의미하게 도덕적으로 선하‘거나’ 도덕적으로 악하‘다고’ 말할 수 있기 때문이다.`,sentence:`The reason is that, as far as moral standards are concerned, only beings {{ANSWER}} have the capacities of a moral agent can meaningfully be said to be either morally good or morally bad.`,options:[`that`,`whose`],ans:1,correct:`that`},
  {pno:`33`,sn:2,ko:`그 이유는, 도덕적 기준에 관해서는, 도덕적 행위자의 능력을 지닌 존재만이 유의미하게 도덕적으로 선하‘거나’ 도덕적으로 악하‘다고’ 말할 수 있기 때문이다.`,sentence:`The reason is that, as far as moral standards are concerned, only beings that {{ANSWER}} the capacities of a moral agent can meaningfully be said to be either morally good or morally bad.`,options:[`have`,`has`],ans:1,correct:`have`},
  {pno:`33`,sn:2,ko:`그 이유는, 도덕적 기준에 관해서는, 도덕적 행위자의 능력을 지닌 존재만이 유의미하게 도덕적으로 선하‘거나’ 도덕적으로 악하‘다고’ 말할 수 있기 때문이다.`,sentence:`The reason is that, as far as moral standards are concerned, only beings that have the capacities of a moral agent can meaningfully {{ANSWER}} to be either morally good or morally bad.`,options:[`say`,`be said`],ans:2,correct:`be said`},
  {pno:`33`,sn:3,ko:`오직 도덕적 행위자만이 다른 존재들보다 도덕적으로 더 낫거나 더 나쁘다고 판단될 수 있으며, (비 교의) 대상이 되는 다른 존재들도 그 자체로 도덕적 행위자여야 한다.`,sentence:`Only moral agents can {{ANSWER}} to be morally better or worse than others, and the others in question must be moral agents themselves.`,options:[`judge`,`be judged`],ans:2,correct:`be judged`},
  {pno:`33`,sn:3,ko:`오직 도덕적 행위자만이 다른 존재들보다 도덕적으로 더 낫거나 더 나쁘다고 판단될 수 있으며, (비 교의) 대상이 되는 다른 존재들도 그 자체로 도덕적 행위자여야 한다.`,sentence:`Only moral agents can be judged {{ANSWER}} morally better or worse than others, and the others in question must be moral agents themselves.`,options:[`being`,`to be`],ans:2,correct:`to be`},
  {pno:`33`,sn:4,ko:`도덕적 우월성에 대한 판단은 (도덕적) 판단 대상이 되는 존재들의 상대적인 장점이나 결함에 근거하 며, 이러한 장점과 결함은 모두 도덕적인 것들, 즉, 도덕적 기준에 의해 결정되는 것들이다.`,sentence:`Judgments of moral superiority {{ANSWER}} based on the comparative merits or deficiencies of the entities being judged, and these merits and deficiencies are all moral ones, that is, ones determined by moral standards.`,options:[`is`,`are`],ans:2,correct:`are`},
  {pno:`33`,sn:4,ko:`도덕적 우월성에 대한 판단은 (도덕적) 판단 대상이 되는 존재들의 상대적인 장점이나 결함에 근거하 며, 이러한 장점과 결함은 모두 도덕적인 것들, 즉, 도덕적 기준에 의해 결정되는 것들이다.`,sentence:`Judgments of moral superiority are based on the {{ANSWER}} merits or deficiencies of the entities being judged, and these merits and deficiencies are all moral ones, that is, ones determined by moral standards.`,options:[`absolute`,`comparative`],ans:2,correct:`comparative`},
  {pno:`33`,sn:4,ko:`도덕적 우월성에 대한 판단은 (도덕적) 판단 대상이 되는 존재들의 상대적인 장점이나 결함에 근거하 며, 이러한 장점과 결함은 모두 도덕적인 것들, 즉, 도덕적 기준에 의해 결정되는 것들이다.`,sentence:`Judgments of moral superiority are based on the comparative merits or deficiencies of the entities {{ANSWER}}, and these merits and deficiencies are all moral ones, that is, ones determined by moral standards.`,options:[`judging`,`being judged`],ans:2,correct:`being judged`},
  {pno:`33`,sn:4,ko:`도덕적 우월성에 대한 판단은 (도덕적) 판단 대상이 되는 존재들의 상대적인 장점이나 결함에 근거하 며, 이러한 장점과 결함은 모두 도덕적인 것들, 즉, 도덕적 기준에 의해 결정되는 것들이다.`,sentence:`Judgments of moral superiority are based on the comparative merits or deficiencies of the entities being judged, and these merits and deficiencies are all moral ones, that is, ones {{ANSWER}} by moral standards.`,options:[`determining`,`determined`],ans:2,correct:`determined`},
  {pno:`33`,sn:5,ko:`타당한 도덕적 기준을 두 존재 모두에게 적용했을 때, 첫 번째 존재가 두 번째 존재보다 그것(기준)들 을 더 높은 정도로 충족하는 경우에만, 앞의 존재가 또 다른 존재보다 도덕적으로 우월하다고 정확하 게 판단된다.`,sentence:`One entity is correctly {{ANSWER}} morally superior to another if it is the case that, when valid moral standards are applied to both entities, the first fulfills them to a greater degree than the second.`,options:[`judging`,`judged`],ans:2,correct:`judged`},
  {pno:`33`,sn:5,ko:`타당한 도덕적 기준을 두 존재 모두에게 적용했을 때, 첫 번째 존재가 두 번째 존재보다 그것(기준)들 을 더 높은 정도로 충족하는 경우에만, 앞의 존재가 또 다른 존재보다 도덕적으로 우월하다고 정확하 게 판단된다.`,sentence:`One entity is correctly judged morally superior to another if it is the case {{ANSWER}}, when valid moral standards are applied to both entities, the first fulfills them to a greater degree than the second.`,options:[`what`,`that`],ans:2,correct:`that`},
  {pno:`33`,sn:5,ko:`타당한 도덕적 기준을 두 존재 모두에게 적용했을 때, 첫 번째 존재가 두 번째 존재보다 그것(기준)들 을 더 높은 정도로 충족하는 경우에만, 앞의 존재가 또 다른 존재보다 도덕적으로 우월하다고 정확하 게 판단된다.`,sentence:`One entity is correctly judged morally superior to another if it is the case that, when valid moral standards are {{ANSWER}} to both entities, the first fulfills them to a greater degree than the second.`,options:[`applying`,`applied`],ans:2,correct:`applied`},
  {pno:`33`,sn:6,ko:`따라서, 두 존재 모두 도덕적 기준의 적용 범위 안에 속해야 한다.`,sentence:`Both entities, {{ANSWER}}, must fall within the range of application of moral standards.`,options:[`therefore`,`however`],ans:1,correct:`therefore`},
  {pno:`33`,sn:6,ko:`따라서, 두 존재 모두 도덕적 기준의 적용 범위 안에 속해야 한다.`,sentence:`Both entities, therefore, must {{ANSWER}} within the range of application of moral standards.`,options:[`fall`,`be fallen`],ans:1,correct:`fall`},
  {pno:`33`,sn:7,ko:`그러나, 인간이 동물이나 식물보다 우월하다고 판단되는 경우에는 이것이 성립되지 않는데, 왜냐하면 후자들은 도덕적 행위자가 아니기 때문이다.`,sentence:`This would not be the case, {{ANSWER}}, if humans were being judged superior to animals and plants, since the latter are not moral agents.`,options:[`however`,`for example`],ans:1,correct:`however`},
  {pno:`33`,sn:7,ko:`그러나, 인간이 동물이나 식물보다 우월하다고 판단되는 경우에는 이것이 성립되지 않는데, 왜냐하면 후자들은 도덕적 행위자가 아니기 때문이다.`,sentence:`This would not be the case, however, if humans were {{ANSWER}} superior to animals and plants, since the latter are not moral agents.`,options:[`judging`,`being judged`],ans:2,correct:`being judged`},
  {pno:`34`,sn:1,ko:`기계가 생성하는 침묵의 보완 요소로서의 인공적인 ‘pause filler(대화나 발표 중 잠시 멈추는 순간에 사용하는 의미 없는 단어나 어구)’는 기계가 만들어 낸 발화 패턴에서 좀 더 자연스럽게 들리도록 억 양을 만드는 데 도움이 될 수 있으며 그 결과 AI의 인간 대화 상대에게 자신이 또 다른 인간과 (대화 를) 함께하고 있다고 확신시키는 데에 도움을 준다.`,sentence:`Such artificial ‘pause fillers’ as machine‑generated supplements for silence may help {{ANSWER}} a more natural‑sounding cadence in machine‑generated speech patterns and so help to convince the AI’s human interlocutors that they are engaging with another human.`,options:[`producing`,`to produce`],ans:2,correct:`to produce`},
  {pno:`34`,sn:1,ko:`기계가 생성하는 침묵의 보완 요소로서의 인공적인 ‘pause filler(대화나 발표 중 잠시 멈추는 순간에 사용하는 의미 없는 단어나 어구)’는 기계가 만들어 낸 발화 패턴에서 좀 더 자연스럽게 들리도록 억 양을 만드는 데 도움이 될 수 있으며 그 결과 AI의 인간 대화 상대에게 자신이 또 다른 인간과 (대화 를) 함께하고 있다고 확신시키는 데에 도움을 준다.`,sentence:`Such artificial ‘pause fillers’ as machine‑generated supplements for silence may help to produce a more natural‑sounding cadence in machine‑generated speech patterns and so {{ANSWER}} to convince the AI’s human interlocutors that they are engaging with another human.`,options:[`help`,`helping`],ans:1,correct:`help`},
  {pno:`34`,sn:1,ko:`기계가 생성하는 침묵의 보완 요소로서의 인공적인 ‘pause filler(대화나 발표 중 잠시 멈추는 순간에 사용하는 의미 없는 단어나 어구)’는 기계가 만들어 낸 발화 패턴에서 좀 더 자연스럽게 들리도록 억 양을 만드는 데 도움이 될 수 있으며 그 결과 AI의 인간 대화 상대에게 자신이 또 다른 인간과 (대화 를) 함께하고 있다고 확신시키는 데에 도움을 준다.`,sentence:`Such artificial ‘pause fillers’ as machine‑generated supplements for silence may help to produce a more natural‑sounding cadence in machine‑generated speech patterns and so help {{ANSWER}} the AI’s human interlocutors that they are engaging with another human.`,options:[`convincing`,`to convince`],ans:2,correct:`to convince`},
  {pno:`34`,sn:1,ko:`기계가 생성하는 침묵의 보완 요소로서의 인공적인 ‘pause filler(대화나 발표 중 잠시 멈추는 순간에 사용하는 의미 없는 단어나 어구)’는 기계가 만들어 낸 발화 패턴에서 좀 더 자연스럽게 들리도록 억 양을 만드는 데 도움이 될 수 있으며 그 결과 AI의 인간 대화 상대에게 자신이 또 다른 인간과 (대화 를) 함께하고 있다고 확신시키는 데에 도움을 준다.`,sentence:`Such artificial ‘pause fillers’ as machine‑generated supplements for silence may help to produce a more natural‑sounding cadence in machine‑generated speech patterns and so help to convince the AI’s human interlocutors {{ANSWER}} they are engaging with another human.`,options:[`that`,`what`],ans:1,correct:`that`},
  {pno:`34`,sn:2,ko:`침묵에 대한 AI의 ‘인간다움’은 이러한 맥락에서 나타나는데 특히 이것은 짧은 침묵의 기간이 ‘생각을 위한 멈춤’으로 해석될 가능성이 크기 때문이며, 이로 인해 인간이 (그렇게) 하듯이 기계가 응답하기 전에 ‘생각’을 하고 있다는 환상을 강화한다.`,sentence:`AI’s ‘humanity’ of silence {{ANSWER}} in these contexts not least because a short period of silence is likely to be interpreted as a ‘pause for thought’, therefore reinforcing the illusion that the machine is ‘thinking’ before responding, just as a human might.`,options:[`emerges`,`is emerged`],ans:1,correct:`emerges`},
  {pno:`34`,sn:2,ko:`침묵에 대한 AI의 ‘인간다움’은 이러한 맥락에서 나타나는데 특히 이것은 짧은 침묵의 기간이 ‘생각을 위한 멈춤’으로 해석될 가능성이 크기 때문이며, 이로 인해 인간이 (그렇게) 하듯이 기계가 응답하기 전에 ‘생각’을 하고 있다는 환상을 강화한다.`,sentence:`AI’s ‘humanity’ of silence emerges in these contexts not least because a short period of silence is likely {{ANSWER}} interpreted as a ‘pause for thought’, therefore reinforcing the illusion that the machine is ‘thinking’ before responding, just as a human might.`,options:[`being`,`to be`],ans:2,correct:`to be`},
  {pno:`34`,sn:2,ko:`침묵에 대한 AI의 ‘인간다움’은 이러한 맥락에서 나타나는데 특히 이것은 짧은 침묵의 기간이 ‘생각을 위한 멈춤’으로 해석될 가능성이 크기 때문이며, 이로 인해 인간이 (그렇게) 하듯이 기계가 응답하기 전에 ‘생각’을 하고 있다는 환상을 강화한다.`,sentence:`AI’s ‘humanity’ of silence emerges in these contexts not least because a short period of silence is likely to be {{ANSWER}} as a ‘pause for thought’, therefore reinforcing the illusion that the machine is ‘thinking’ before responding, just as a human might.`,options:[`interpreting`,`interpreted`],ans:2,correct:`interpreted`},
  {pno:`34`,sn:2,ko:`침묵에 대한 AI의 ‘인간다움’은 이러한 맥락에서 나타나는데 특히 이것은 짧은 침묵의 기간이 ‘생각을 위한 멈춤’으로 해석될 가능성이 크기 때문이며, 이로 인해 인간이 (그렇게) 하듯이 기계가 응답하기 전에 ‘생각’을 하고 있다는 환상을 강화한다.`,sentence:`AI’s ‘humanity’ of silence emerges in these contexts not least because a short period of silence is likely to be interpreted as a ‘pause for thought’, therefore {{ANSWER}} the illusion that the machine is ‘thinking’ before responding, just as a human might.`,options:[`reinforcing`,`weakening`],ans:1,correct:`reinforcing`},

  {pno:`43-45`,sn:7,ko:`들어가자마자, 칭찬을 기대하며, Aiden은 자신의 최고의 풍경화들을 간절한 마음으로 펼쳤다.`,sentence:`On entering, Aiden eagerly spread his best landscape drawings, {{ANSWER}} for praise.`,options:[`waiting`,`waited`],ans:1,correct:`waiting`},
  {pno:`43-45`,sn:7,ko:`들어가자마자, 칭찬을 기대하며, Aiden은 자신의 최고의 풍경화들을 간절한 마음으로 펼쳤다.`,sentence:`On entering, Aiden eagerly spread his best landscape drawings, waiting for {{ANSWER}}.`,options:[`praise`,`blame`],ans:1,correct:`praise`},

  {pno:`43-45`,sn:9,ko:`Aiden이 기대했던 평가를 하지 않고, 그는 그의 정원으로 걸어갔다.`,sentence:`Not giving any comments {{ANSWER}} Aiden expected, he walked to his garden.`,options:[`that`,`what`],ans:1,correct:`that`},
  {pno:`43-45`,sn:10,ko:`그는 평범한, 회색 돌 하나를 집어 들고 그것을 Aiden에게 건넸다. “이것을 그리게,” Rowan이 말했다.`,sentence:`He picked up a plain, gray stone and {{ANSWER}} it to Aiden. “Paint this,” Rowan said.`,options:[`hands`,`handed`],ans:2,correct:`handed`},
  {pno:`43-45`,sn:10,ko:`그는 평범한, 회색 돌 하나를 집어 들고 그것을 Aiden에게 건넸다. “이것을 그리게,” Rowan이 말했다.`,sentence:`He picked up a plain, gray stone and handed it {{ANSWER}}. “Paint this,” Rowan said.`,options:[`Aiden`,`to Aiden`],ans:2,correct:`to Aiden`},
  {pno:`43-45`,sn:11,ko:`“하지만 자네의 화려한 기교를 잊게. 그 안에 진정으로 담겨 있는 것을 그리게.”`,sentence:`“But {{ANSWER}} your fancy techniques. Paint what is truly inside.”`,options:[`remember`,`forget`],ans:2,correct:`forget`},
  {pno:`43-45`,sn:11,ko:`“하지만 자네의 화려한 기교를 잊게. 그 안에 진정으로 담겨 있는 것을 그리게.”`,sentence:`“But forget your fancy techniques. Paint {{ANSWER}} is truly inside.”`,options:[`that`,`what`],ans:2,correct:`what`},
  {pno:`43-45`,sn:12,ko:`Aiden은 파도처럼 밀려드는 실망감을 느꼈다.`,sentence:`Aiden felt a wave of {{ANSWER}}.`,options:[`satisfaction`,`disappointment`],ans:2,correct:`disappointment`},
  {pno:`43-45`,sn:13,ko:`그는 거장이 자신을 조롱하고 있다고 생각했다. 어떻게 칙칙한, 못생긴 돌이 무언가를 그 안에 가질 수 있단 말인가?`,sentence:`He thought the master was {{ANSWER}} him. How could a dull, ugly rock have anything inside?`,options:[`mocking`,`mocked`],ans:1,correct:`mocking`},
  {pno:`43-45`,sn:14,ko:`마지못해, Aiden은 그 돌을 그가 머무는 곳으로 가져갔다.`,sentence:`{{ANSWER}}, Aiden took the stone to his place.`,options:[`Willingly`,`Reluctantly`],ans:2,correct:`Reluctantly`},
  {pno:`43-45`,sn:15,ko:`며칠 밤낮으로, 좌절한 채, 그는 돌을 응시했다. 그것은 그저 거친, 회색 덩어리로만 보였다.`,sentence:`For days and nights, he stared at it, {{ANSWER}}. It seemed just a rough, gray lump.`,options:[`frustrating`,`frustrated`],ans:2,correct:`frustrated`},
  {pno:`43-45`,sn:16,ko:`하지만 그가 시간이 지나면서 일출과 일몰의 변화하는 빛에 비친 돌을 바라보던 중, 무언가가 달라졌다.`,sentence:`But as he watched the stone in the changing light of sunrise and sunset over time, something {{ANSWER}}.`,options:[`remained`,`changed`],ans:2,correct:`changed`},
  {pno:`43-45`,sn:17,ko:`Aiden은 그 회색 돌이 빛을 받은 작은 석영 조각들과 시간의 이야기를 전하는 말라붙은 이끼 자국 들을 지니고 있다는 것을 알아차렸다.`,sentence:`Aiden noticed the gray stone held tiny pieces of quartz catching light and patches of dried moss {{ANSWER}} a story of time.`,options:[`telling`,`told`],ans:1,correct:`telling`},
  {pno:`43-45`,sn:18,ko:`그 돌을 더 많이 들여다볼수록, 그는 거친 표면에서 더 많은 아름다움을 발견했다.`,sentence:`The more he looked at the stone, the {{ANSWER}} beauty he found in the rough surface.`,options:[`more`,`most`],ans:1,correct:`more`},

  {pno:`43-45`,sn:21,ko:`거장에게 캔버스를 건네줄 때 그의 손은 떨렸다.`,sentence:`His hands shook as he handed the canvas {{ANSWER}}.`,options:[`the master`,`to the master`],ans:2,correct:`to the master`},
  {pno:`43-45`,sn:22,ko:`거장이 Aiden의 그림 속 돌을 오랫동안 바라본 후에, 따뜻한 미소가 그의 얼굴에 번졌다.`,sentence:`After the master looked at the stone in Aiden’s painting for a long time, a {{ANSWER}} smile broke across his face.`,options:[`warm`,`cold`],ans:1,correct:`warm`},
  {pno:`43-45`,sn:23,ko:`Aiden의 해석에서, 그 돌은 파란색, 녹색, 그리고 금색의 숨겨진 색들로 반짝였다.`,sentence:`In Aiden’s interpretation, the stone {{ANSWER}} with hidden colors of blue, green, and gold.`,options:[`sparkling`,`sparkled`],ans:2,correct:`sparkled`},
  {pno:`43-45`,sn:24,ko:`“예술가가 된다는 것은 창조하는 것이 아니라, 관찰하는 것이라네,” 거장이 부드럽게 말했다. Aiden 은 그 가르침이 그림 그리는 것에 관한 것이 아니라, (세상을) 보는 것에 관한 것임을 깨달았다.`,sentence:`“{{ANSWER}} an artist is not to invent, but to observe,” the master said softly. Aiden realized the lesson was not about painting, but about seeing.`,options:[`Be`,`To be`],ans:2,correct:`To be`}
];

const PASSAGES_BY_REF = {};
QUESTIONS.forEach(q=>{
  if(!PASSAGES_BY_REF[q.pno]) PASSAGES_BY_REF[q.pno]=[];
  PASSAGES_BY_REF[q.pno].push(q);
});
const PASSAGE_ORDER = Object.keys(PASSAGES_BY_REF).sort((a,b)=>parseInt(a.split('-')[0])-parseInt(b.split('-')[0]));

let userName='', userSchool='', selectedRefs=new Set(), doneRefs=new Set();
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], allResults=[], answered=false, t0=0;
let filterMode='all';

function goPassageSelect(){
  userSchool = document.getElementById('si').value;
  userName = document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  try{localStorage.setItem('bomnal_name',userName);localStorage.setItem('bomnal_school',userSchool);}catch(e){}
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('userInfo').textContent = userName + ' · ' + userSchool;
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function refInRange(ref, mode){
  if(mode==='all') return true;
  if(mode==='long') return ref.includes('-');
  const n = parseInt(ref);
  if(mode==='18-24') return n>=18&&n<=24;
  if(mode==='26-30') return n>=26&&n<=30;
  if(mode==='31-40') return n>=31&&n<=40;
  return true;
}

function renderPassageGrid(){
  const grid = document.getElementById('passageGrid');
  grid.innerHTML='';
  PASSAGE_ORDER.forEach(ref=>{
    if(!refInRange(ref, filterMode)) return;
    const count = PASSAGES_BY_REF[ref].length;
    const d = document.createElement('div');
    d.className='p-card'+(selectedRefs.has(ref)?' sel':'')+(doneRefs.has(ref)?' done':'');
    d.onclick=()=>togglePassage(ref);
    d.innerHTML=`<div class="p-no">${ref}번</div><div class="p-count">${count}문항</div>`
      +(doneRefs.has(ref)?'<span class="p-badge done-badge">완료✓</span>':'')
      +(selectedRefs.has(ref)&&!doneRefs.has(ref)?'<span class="p-badge" style="background:#e3f2fd;color:#1565c0;">선택</span>':'');
    grid.appendChild(d);
  });
}

function togglePassage(ref){
  if(selectedRefs.has(ref))selectedRefs.delete(ref);
  else selectedRefs.add(ref);
  renderPassageGrid();
}

function filterPassage(mode, btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPassageGrid();
}

function selectAll(){
  const visible = PASSAGE_ORDER.filter(r=>refInRange(r, filterMode));
  const allSel = visible.every(r=>selectedRefs.has(r));
  visible.forEach(r=>{ if(allSel) selectedRefs.delete(r); else selectedRefs.add(r); });
  renderPassageGrid();
}

function shuffle(arr){const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startQuiz(){
  if(selectedRefs.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  qs=[];
  PASSAGE_ORDER.forEach(ref=>{
    if(selectedRefs.has(ref)) PASSAGES_BY_REF[ref].forEach(q=>qs.push(q));
  });
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · '+selectedRefs.size+'개 지문 · '+qs.length+'문항';
  showQ();
}

function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');
  const sentHTML = escHTML(q.sentence).replace('{{ANSWER}}', '<span class="blank">?</span>');
  const choiceHTML = q.options.map((opt,i)=>`<button class="cb" data-idx="${i+1}"><span class="cn">${i+1}</span><span>${escHTML(opt)}</span></button>`).join('');
  area.innerHTML=`
    <div class="qc">
      <div class="q-no-badge">
        <span class="qno">지문 ${q.pno}번 (${q.sn}번 문장)</span>
        <span class="qtype">어법·어휘 선택</span>
      </div>
      <div class="ko-box">📌 ${escHTML(q.ko)}</div>
      <div class="en-box">${sentHTML}</div>
      <div class="q-prompt">⬛ 빈칸에 들어갈 알맞은 표현은?</div>
      <div class="choices" id="qChoices">${choiceHTML}</div>
      <div class="fb-msg" id="fb"></div>
    </div>`;
  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click',()=>selChoice(b, parseInt(b.dataset.idx), q.ans));
  });
}

function selChoice(btn, sel, ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const q=qs[idx];
  if(sel===ans){
    btn.classList.add('correct');
    fb.className='fb-msg ok';fb.textContent='✅ 정답!';
    cor++;
    allResults.push({pno:q.pno, sn:q.sn, correct:true, my:q.options[sel-1], ans:q.correct});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.cb').forEach(b=>{if(parseInt(b.dataset.idx)===ans)b.classList.add('reveal');});
    fb.className='fb-msg no';fb.textContent='❌ 오답! 정답: '+q.correct;
    wrn++;
    wrongs.push({label:'지문 '+q.pno+'번 ('+q.sn+')', my:q.options[sel-1], correct:q.correct});
    allResults.push({pno:q.pno, sn:q.sn, correct:false, my:q.options[sel-1], ans:q.correct});
  }
  setTimeout(()=>{idx++;showQ();},sel===ans?800:1900);
}

let wrongQs = [];

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selectedRefs.forEach(r=>doneRefs.add(r));
  const wrongSet = new Set(allResults.filter(r=>!r.correct).map(r=>r.pno+'_'+r.sn+'_'+r.ans));
  wrongQs = qs.filter(q=>wrongSet.has(q.pno+'_'+q.sn+'_'+q.correct));

  const wHTML=wrongs.length>0
    ?'<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.label+'</div><div class="wid">내 답: '+w.my+' → 정답: '+w.correct+'</div></div>').join('')+'</div>'
    :'<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고2 26년 3월 어법·어휘 · ${selectedRefs.size}개 지문 · ${total}문항</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${total}</div><div class="sl">총문항</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave) window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: userName,
    school: userSchool,
    score: pct,
    correct: cor,
    wrong: wrn,
    total: total,
    elapsedMin: el,
    quizType: '고2_26년3월_어법어휘선택',
    passages: [...selectedRefs].sort(),
    details: allResults.map(r=>({
      지문: r.pno+'번',
      문장: r.sn+'번',
      결과: r.correct?'✅정답':'❌오답',
      내답: r.my,
      정답: r.ans
    })),
    wrongWords: wrongs.map(w=>({label:w.label, my:w.my, correct:w.correct}))
  });
}

function retryWrongs(){
  if(wrongQs.length===0) return;
  qs=[...wrongQs];
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · 오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selectedRefs.clear();
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

window.addEventListener('DOMContentLoaded',()=>{
  const n=localStorage.getItem('bomnal_name');
  const s=localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value=n;
  if(s){
    const sel=document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value&&s.includes(sel.options[i].value)){sel.value=sel.options[i].value;break;}
    }
  }
});
</script>
