<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날 퀴즈 | 고2 24년 6월 본문 암기 (4유형 통합)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
:root{--pri:#1565c0;--acc:#f57f17;--bg:#e3f2fd;--card:#fff;--bdr:#90caf9;--muted:#757575;--green:#2e7d32;--red:#c62828;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;color:#1a1a2e;}
.hidden{display:none!important;}

#startScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.s-card{background:var(--card);border-radius:24px;padding:36px 28px;text-align:center;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(21,101,192,.15);}
.s-card h1{font-family:'Black Han Sans',sans-serif;font-size:19px;color:var(--pri);margin-bottom:6px;}
.s-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.info-item{background:var(--bg);border-radius:10px;padding:10px;text-align:center;font-size:12px;color:var(--pri);font-weight:700;}
.ni{width:100%;padding:11px 14px;border:2px solid var(--bdr);border-radius:12px;font-size:14px;font-family:'Nanum Gothic',sans-serif;outline:none;margin-bottom:10px;}
.ni:focus{border-color:var(--pri);}
.start-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1565c0,#f57f17);color:white;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

#passageScreen{padding:20px;max-width:680px;margin:0 auto;}
.ps-header{background:linear-gradient(135deg,#1565c0,#1976d2);color:white;border-radius:16px;padding:18px 22px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.ps-title{font-family:'Black Han Sans',sans-serif;font-size:16px;}
.ps-sub{font-size:11px;opacity:.8;margin-top:3px;}
.user-info{background:rgba(255,255,255,.2);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;}

.type-section{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 3px 12px rgba(21,101,192,.06);}
.type-label{font-size:12px;font-weight:800;color:var(--pri);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.type-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;}
.tb{padding:11px 12px;border:2px solid #e0e0e0;border-radius:11px;background:white;color:#555;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;line-height:1.4;}
.tb:hover{border-color:var(--pri);background:#f5faff;}
.tb.on{border-color:var(--pri);background:#1565c0;color:white;}
.tb-emoji{font-size:18px;display:block;margin-bottom:3px;}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.fb{padding:7px 16px;border:2px solid var(--pri);border-radius:20px;background:white;color:var(--pri);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.fb.on{background:var(--pri);color:white;}
.passage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:20px;}
.p-card{background:white;border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;border:2.5px solid #e0e0e0;transition:all .18s;position:relative;}
.p-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 6px 18px rgba(21,101,192,.12);}
.p-card.sel{border-color:var(--pri);background:#e3f2fd;}
.p-card.done{border-color:#4caf50;background:#e8f5e9;}
.p-no{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--pri);margin-bottom:2px;}
.p-count{font-size:10px;color:var(--muted);}
.p-badge{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;}
.done-badge{background:#e8f5e9;color:#2e7d32;}
.sel-all-btn{width:100%;padding:12px;border-radius:12px;border:2px solid var(--pri);background:white;color:var(--pri);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.go-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1565c0,#f57f17);color:white;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

.hdr{background:#1565c0;color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.ht{font-family:'Black Han Sans',sans-serif;font-size:15px;}
.hs{font-size:10px;opacity:.7;margin-top:2px;}
.hb{background:rgba(255,255,255,.2);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:700;}
.pw{height:4px;background:#bbdefb;}.pf{height:100%;background:linear-gradient(90deg,#1565c0,#f57f17);transition:width .4s;}

#quizArea{padding:20px;max-width:780px;margin:0 auto;}
.qc{background:white;border-radius:18px;padding:22px 20px;margin-bottom:16px;box-shadow:0 3px 16px rgba(21,101,192,.08);}
.q-no-badge{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.qno{font-family:'Black Han Sans',sans-serif;font-size:13px;color:white;background:var(--pri);padding:3px 12px;border-radius:12px;}
.qtype{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;}
.qtype-1{background:#fff3e0;color:#e65100;}
.qtype-2{background:#e8f5e9;color:#1b5e20;}
.qtype-3{background:#fce4ec;color:#880e4f;}
.qtype-4{background:#e1f5fe;color:#01579b;}
.def-box{background:#f3e5f5;border-left:4px solid #9c27b0;border-radius:0 10px 10px 0;padding:12px 14px;font-size:13px;line-height:1.6;margin-bottom:12px;color:#4a148c;font-style:italic;}
.def-label{font-size:10px;font-weight:800;color:#7b1fa2;margin-bottom:4px;letter-spacing:.5px;}
.statement-box{background:#fff8e1;border-left:4px solid var(--acc);border-radius:0 10px 10px 0;padding:14px 16px;font-size:14px;line-height:1.7;margin-bottom:12px;color:#1a1a2e;font-weight:700;}
.statement-label{font-size:10px;font-weight:800;color:#e65100;margin-bottom:4px;letter-spacing:.5px;}
.en-label{font-size:10px;font-weight:800;color:#999;margin-bottom:4px;letter-spacing:.5px;}
.en-box{background:#f8faff;border-left:4px solid var(--pri);border-radius:0 10px 10px 0;padding:14px 16px;font-size:14px;line-height:2;margin-bottom:14px;color:#1a237e;}
.blank{display:inline-block;min-width:60px;background:#fff59d;border-bottom:3px solid #f57f17;border-radius:4px;padding:1px 10px;font-weight:800;color:#e65100;text-align:center;font-style:italic;margin:0 2px;}
.binary-pair{display:inline-block;background:#fce4ec;border:1.5px dashed #c2185b;border-radius:6px;padding:2px 10px;font-size:14px;color:#880e4f;font-weight:700;margin:0 3px;}
.base-form{display:inline-block;background:#fff3e0;border:1px dashed #e65100;border-radius:6px;padding:2px 10px;font-size:14px;color:#e65100;font-weight:800;margin:0 4px;}
.q-prompt{font-size:13px;font-weight:700;color:#1565c0;margin-bottom:10px;text-align:center;padding:8px;background:#f5faff;border-radius:8px;}
.choices{display:grid;gap:10px;}
.cb{background:#f5f5f5;border:2px solid #e0e0e0;border-radius:11px;padding:13px 16px;font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px;line-height:1.4;}
.cb:hover:not(:disabled){border-color:var(--pri);background:#e3f2fd;}
.cb.correct{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;}
.cb.wrong{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.cb.reveal{background:#e8f5e9;border-color:#2e7d32;}
.cn{width:24px;height:24px;border-radius:50%;background:#90caf9;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.text-input-wrap{display:flex;gap:8px;align-items:center;}
.text-input{flex:1;padding:13px 16px;border:2px solid var(--bdr);border-radius:11px;font-family:'Nanum Gothic',sans-serif;font-size:15px;font-weight:700;outline:none;}
.text-input:focus{border-color:var(--pri);}
.text-input.correct{border-color:#2e7d32;background:#e8f5e9;color:#1b5e20;}
.text-input.wrong{border-color:#c62828;background:#ffebee;color:#b71c1c;}
.submit-btn{padding:13px 22px;border-radius:11px;border:none;background:linear-gradient(135deg,#1565c0,#f57f17);color:white;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.fb-msg{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:800;margin-top:12px;display:none;}
.fb-msg.ok{background:#e8f5e9;color:#1b5e20;display:block;}
.fb-msg.no{background:#ffebee;color:#b71c1c;display:block;}

#resultScreen{padding:20px;max-width:600px;margin:0 auto;}
.rc{background:white;border-radius:24px;padding:30px 22px;box-shadow:0 8px 32px rgba(21,101,192,.1);text-align:center;}
.rs{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--pri);line-height:1;}
.rsub{font-size:13px;color:var(--muted);margin-top:4px;}
.sr{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap;}
.si{text-align:center;}.sn{font-family:'Black Han Sans',sans-serif;font-size:24px;}.sl{font-size:11px;color:var(--muted);margin-top:2px;}
.wl{background:var(--bg);border-radius:14px;padding:14px;text-align:left;margin-top:14px;max-height:300px;overflow-y:auto;}
.wl h3{font-size:12px;font-weight:800;color:var(--red);margin-bottom:8px;}
.wi{background:white;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:11px;border-left:3px solid #e91e63;}
.wie{font-weight:800;color:var(--pri);}.wid{font-size:10px;color:var(--muted);margin-top:2px;}
.rbtns{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.rbtn{padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.rbtn-p{background:linear-gradient(135deg,#1565c0,#f57f17);color:white;}
.rbtn-s{background:#f5f5f5;color:#1565c0;border:2px solid #90caf9;}

@media(max-width:480px){.passage-grid{grid-template-columns:repeat(3,1fr)}}
</style>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyCxS524S8KAaF87DomPtl9sJdF-eqes404",authDomain:"bomnalvaca.firebaseapp.com",projectId:"bomnalvaca",storageBucket:"bomnalvaca.firebasestorage.app",messagingSenderId:"115868052300",appId:"1:115868052300:web:765c08867b6f1ce0987de9"};
const app=initializeApp(cfg);const db=getFirestore(app);
window._fbSave=async function(data){
  try{await addDoc(collection(db,'quiz_results'),{...data,timestamp:serverTimestamp()});}

};
</script>
</head>
<body>

<div id="startScreen">
  <div class="s-card">
    <h1>🧠 고2 24년 6월 본문 암기 (4유형 통합)</h1>
    <div class="s-sub">2024년 6월 고2 모의고사 · 빈칸 · 어형변화 · 옳고그른 · 영영풀이</div>
    <div class="info-grid">
      <div class="info-item">📝 18~24, 29~34번</div>
      <div class="info-item">🎯 4유형 자유 선택</div>
      <div class="info-item">📖 본문 통째로 제시</div>
      <div class="info-item">📊 자동채점 + 오답노트</div>
    </div>
    <select class="ni" id="si" style="background:white;color:#1565c0;font-weight:700;cursor:pointer;">
      <option value="">학교 선택</option>
      <option value="종촌고">종촌고</option>
      <option value="고운고">고운고</option>
      <option value="대성고">대성고</option>
      <option value="기타">기타</option>
    </select>
    <input type="text" class="ni" id="ni" placeholder="이름 입력" maxlength="10">
    <button class="start-btn" onclick="goPassageSelect()">다음 → 지문 선택</button>
  </div>
</div>

<div id="passageScreen" class="hidden">
  <div class="ps-header">
    <div>
      <div class="ps-title">📖 지문 & 유형 선택</div>
      <div class="ps-sub">풀고 싶은 유형과 지문을 선택하세요</div>
    </div>
    <div class="user-info" id="userInfo"></div>
  </div>

  <div class="type-section">
    <div class="type-label">🎯 문제 유형 (복수 선택)</div>
    <div class="type-grid">
      <button class="tb on" data-t="1" onclick="toggleType(1, this)"><span class="tb-emoji">🔡</span>빈칸 추론<br><span style="font-size:10px;opacity:.7;">핵심 어휘 4지선다</span></button>
      <button class="tb on" data-t="2" onclick="toggleType(2, this)"><span class="tb-emoji">✏️</span>어형 변화<br><span style="font-size:10px;opacity:.7;">주관식 (원형→변화형)</span></button>
      <button class="tb on" data-t="3" onclick="toggleType(3, this)"><span class="tb-emoji">⚖️</span>옳고 그른<br><span style="font-size:10px;opacity:.7;">2지선다 문맥 판단</span></button>
      <button class="tb on" data-t="4" onclick="toggleType(4, this)"><span class="tb-emoji">📖</span>영영 풀이<br><span style="font-size:10px;opacity:.7;">정의 → 단어 추론</span></button>
    </div>
  </div>

  <div class="type-section">
    <div class="type-label">📚 지문 선택</div>
    <div class="passage-grid" id="passageGrid"></div>
    <button class="sel-all-btn" onclick="selectAll()">전체 선택 / 해제</button>
  </div>
  <button class="go-btn" onclick="startQuiz()">선택한 문제 풀기 🚀</button>
</div>

<div id="hdr" class="hdr hidden">
  <div><div class="ht">🧠 고2 24년 6월 본문암기</div><div class="hs" id="hs"></div></div>
  <div class="hb" id="hb">0/0</div>
</div>
<div id="pw" class="pw hidden"><div class="pf" id="pf" style="width:0%"></div></div>

<script>
// =================================================================
// PASSAGES (18~20번 프로토타입)
// - fullKo: 전체 한국어 해석
// - fullEn: 전체 영어 본문
// - q1~q4: 각 유형별 문제 (target = 본문에서 빈칸 처리할 부분)
// 빈칸 위치는 본문 전체에 골고루 분포되도록 배치
// =================================================================
const PASSAGES = {
  '18': {
    title: '목적 추론 - Gardening Day',
    fullKo: `주민들께, 제 이름은 Kari Patterson이고, 저는 River View 아파트의 관리인입니다. 우리의 커뮤니티를 더욱 아름답게 만들기 위해 화창한 날씨를 이용할 때입니다. 7월 13일 토요일 오전 9시에, 주민들은 북쪽 주차장에서 만날 예정입니다. 우리는 팀을 나누어 꽃과 작은 나무를 심고, 잡초를 뽑고, 잔디밭에 다채로운 장식을 할 것입니다. 올해 정원가꾸기 날에 우리와 함께 해 주시고, 특별한 기술이나 도구는 필요하지 않다는 것을 기억하세요. 작년에, 우리는 함께 일하며 즐거운 시간을 보냈으니, 오셔서 올해 행사도 더 멋지게 만들어 주세요!`,
    fullEn: `Dear Residents, My name is Kari Patterson, and I'm the manager of the River View Apartments. It's time to take advantage of the sunny weather to make our community more beautiful. On Saturday, July 13 at 9 a.m., residents will meet in the north parking lot. We will divide into teams to plant flowers and small trees, pull weeds, and put colorful decorations on the lawn. Please join us for this year's Gardening Day, and remember no special skills or tools are required. Last year, we had a great time working together, so come out and make this year's event even better! Warm regards, Kari Patterson`,
    q1: [
      {target:'beautiful', options:['beautiful','crowded','quiet','modern']},
      {target:'weeds', options:['weeds','seeds','leaves','roots']},
      {target:'parking lot', options:['parking lot','playground','driveway','garage']}
    ],
    q2: [
      {target:'to take', base:'take'},
      {target:'required', base:'require'},
      {target:'working', base:'work'}
    ],
    q3: [
      {statement:`Gardening Day is organized to encourage residents to participate in beautifying the community.`, isTrue:true},
      {statement:`Residents must bring special tools and have prior gardening skills to join.`, isTrue:false},
      {statement:`The activities include planting flowers and small trees, pulling weeds, and placing decorations on the lawn.`, isTrue:true}
    ],
    q4: [
      {target:'manager', def:`a person who is in charge of running a business or organization`, options:['manager','resident','visitor','customer']},
      {target:'Residents', def:`people who live in a particular place, especially permanently`, options:['Residents','Managers','Owners','Workers']},
      {target:'decorations', def:`things added to something to make it look more attractive`, options:['decorations','instructions','reservations','restrictions']}
    ]
  },
  '19': {
    title: '심경 추론 - Emma의 결승전',
    fullKo: `결승전 경주였다. Emma는 그녀의 계주 팀의 마지막 주자였다. 그녀는 그녀의 자리에서 팀 동료가 그녀에게 바통을 건네주기를 초조하게 기다렸다. Emma는 그녀가 실수를 하지 않고 자신의 역할을 수행할 수 있을지 확신하지 못했다. "만약 내가 바통을 떨어뜨리면 어떡하지?"라고 생각하면서 그녀의 손이 떨렸다. 그녀는 그녀의 팀 동료가 다가올수록 심박수가 증가하는 것을 느꼈다. 하지만 그녀가 달리기 시작했을 때, 그녀는 순조롭게 바통을 받았다. 마지막 10미터에서, 그녀는 두 명의 다른 주자를 제치고 1위로 결승선을 통과했다! 그녀는 두 손을 하늘로 치켜들고, 얼굴에 큰 미소를 지었다. 팀 동료들이 그녀를 안아주자, 그녀는 "우리가 해냈어!"라고 소리쳤다. 그녀의 모든 힘든 훈련이 그럴만한 가치가 있었다.`,
    fullEn: `It was the championship race. Emma was the final runner on her relay team. She anxiously waited in her spot for her teammate to pass her the baton. Emma wasn't sure she could perform her role without making a mistake. Her hands shook as she thought, "What if I drop the baton?" She felt her heart rate increasing as her teammate approached. But as she started running, she received the baton smoothly. In the final 10 meters, she passed two other runners and crossed the finish line in first place! She raised her hands in the air, and a huge smile came across her face. As her teammates hugged her, she shouted, "We did it!" All of her hard training had been worth it.`,
    q1: [
      {target:'anxiously', options:['anxiously','calmly','loudly','happily']},
      {target:'smoothly', options:['smoothly','roughly','barely','slowly']},
      {target:'worth', options:['worth','worthless','useless','pointless']}
    ],
    q2: [
      {target:'to pass', base:'pass'},
      {target:'making', base:'make'},
      {target:'shook', base:'shake'}
    ],
    q3: [
      {statement:`Emma was nervous before the race because she was unsure she could perform without making a mistake.`, isTrue:true},
      {statement:`Emma dropped the baton during the race and her team finished last.`, isTrue:false},
      {statement:`After winning the race, Emma felt that all of her hard training had been worth it.`, isTrue:true}
    ],
    q4: [
      {target:'championship', def:`a competition to find the best player or team in a particular sport`, options:['championship','practice','rehearsal','tryout']},

  '20': {
    title: '주장 추론 - 자기 평가',
    fullKo: `대부분의 사람들은 그것(진정한 자기 평가)이 그들이 누구인지, 무엇을 할 수 있는지에 대한 믿음을 낮추는 것을 의미할지도 모른다고 두려워하기 때문에, 진정한 자기 평가에 대한 생각을 거부한다. Goethe의 격언처럼, "너 자신을 현재의 너의 모습 이상으로 보는 것"은 큰 실수이다. 네가 너의 단점을 생각해 보기를 거부한다면 어떻게 너 자신을 인식하고 있다고 여겨질 수 있을까? 네가 너 자신에 대해 몇 가지를 인정해야 할지도 모른다는 걱정 때문에 자기를 평가하는 것을 두려워하지 마라. Goethe 격언의 후반부도 역시 중요하다. 그는 "너의 진정한 가치보다 너 자신을 낮게 평가하는 것"도 똑같이 해롭다고 말한다. 우리는 다른 능력들을 과대평가하는 것만큼 많이 그리고 위험하게 우리의 능력을 과소평가한다. 너 자신을 정확하게 그리고 정직하게 판단하는 능력을 길러라. 네가 할 수 있는 것과 너의 잠재력을 열기 위해 필요한 것을 파악하기 위해 내면을 들여다 봐라.`,
    fullEn: `Most people resist the idea of a true self-estimate, probably because they fear it might mean downgrading some of their beliefs about who they are and what they're capable of. As Goethe's maxim goes, it is a great failing "to see yourself as more than you are." How could you really be considered self-aware if you refuse to consider your weaknesses? Don't fear self-assessment because you're worried you might have to admit some things about yourself. The second half of Goethe's maxim is important too. He states that it is equally damaging to "value yourself at less than your true worth." We underestimate our capabilities just as much and just as dangerously as we overestimate other abilities. Cultivate the ability to judge yourself accurately and honestly. Look inward to discern what you're capable of and what it will take to unlock that potential.`,

  '21': {
    title: '함축 의미 추론 - Slavery under marble and gold',
    fullKo: `세계에서 가장 힘있고, 부유하며, 유명한 사람들 중 몇몇을 살펴봐라. 그들의 성공의 장식과 그들이 살 수 있는 것을 무시해라. 대신 그들이 맞바꿔야 하는 것을 봐라 ― 성공이 그들에게 치르게 한 것을 봐라. 대부분은? 자유이다. 그들의 업무는 그들이 정장을 입는 것을 요구한다. 그들의 성공은 특정 파티에 참석하여, 그들이 좋아하지 않는 사람들에게 아첨하는 것에 달려 있다. 그것은 요구할 것이다 ― 필연적으로 ― 그들이 실제로 생각하는 것을 말할 수 없다는 사실을 깨닫는 것을. 더 나쁜 것은, 그것은 그들이 다른 유형의 사람이 되거나 부당한 일을 하도록 요구한다는 것이다. 물론, 그것은 많은 이익이 될지도 모른다 ― 그러나 그들은 그 거래를 제대로 고찰한 적이 없다. Seneca가 말했듯이, "대리석과 황금 아래에 노예 상태가 존재한다." 너무 많은 성공한 사람들은 그들이 스스로 만든 감옥의 죄수들이다. 그것이 당신이 원하는 것인가? 그것이 당신이 목표로 하여 열심히 일하고 있는 것인가? 그렇지 않기를 바라자.`,
    fullEn: `Take a look at some of the most powerful, rich, and famous people in the world. Ignore the trappings of their success and what they're able to buy. Look instead at what they're forced to trade in return ― look at what success has cost them. Mostly? Freedom. Their work demands they wear a suit. Their success depends on attending certain parties, kissing up to people they don't like. It will require ― inevitably ― realizing they are unable to say what they actually think. Worse, it demands that they become a different type of person or do bad things. Sure, it might pay well — but they haven't truly examined the transaction. As Seneca put it, "Slavery resides under marble and gold." Too many successful people are prisoners in jails of their own making. Is that what you want? Is that what you're working hard toward? Let's hope not.`,

  '22': {
    title: '요지 추론 - Moral Hazard',
    fullKo: `기업이 정부로부터 구제받으려면, 장기적으로 수익성이 나고 성장할 수 있도록 회사를 구조조정하는 어려운 결정을 내리기보다는 더 많은 돈을 받기 위해 정부에 로비하는 것에 집중하는 것이 더 쉬울지도 모른다. 이것은 도덕적 해이라고 알려진 것의 한 예이다 ― 정부의 지원이 기업이 내리는 결정을 바꿀 때. 예를 들어, 2007-08년 신용 위기 때 그들이 그랬던 것처럼, 만약 정부가 어려움에 처한 은행을 구제한다면, 이것은 은행이 앞으로 더 큰 위험을 감수하도록 조장하는데 그 이유는 그들이 손해를 보는 경우 정부가 개입할 가능성이 있다는 것을 그들이 알기 때문이다. 정부의 구제는 좋은 의도일지라도, 그것은 은행의 행동에 부정적으로 영향을 미쳐, 위험하고 형편없는 의사 결정을 조장할 수 있다.`,
    fullEn: `If a firm is going to be saved by the government, it might be easier to concentrate on lobbying the government for more money rather than taking the harder decision of restructuring the company to be able to be profitable and viable in the long term. This is an example of something known as moral hazard ― when government support alters the decisions firms take. For example, if governments rescue banks who get into difficulty, as they did during the credit crisis of 2007-08, this could encourage banks to take greater risks in the future because they know there is a possibility that governments will intervene if they lose money. Although the government rescue may be well intended, it can negatively affect the behavior of banks, encouraging risky and poor decision making.`,
    q1: [
      {target:'profitable', options:['profitable','unprofitable','predictable','permanent']},
      {target:'intervene', options:['intervene','withdraw','ignore','reward']},
      {target:'risky', options:['risky','rational','reliable','careful']}
    ],
    q2: [

  '23': {
    title: '주제 추론 - 과학의 다양성',
    fullKo: `만약 견해의 다양성이 거의 없거나 전혀 없고, 모든 과학자들이 비슷한 방식으로 세상을 보고, 생각하고, 의문을 제기한다면, 그러면 그들은, 하나의 공동체로서, 자신들이 주장하는 것만큼, 혹은 적어도 그렇게 되기를 열망하는 것만큼, 객관적이지 않을 것이다. 해결책은 과학의 실행에 있어 훨씬 더 많은 다양성이 있어야 한다는 것이다: 성별, 인종, 그리고 사회적 문화적 배경에서. 과학은 그것이 자연 세계에 대한 호기심을 추구하고 가능한 한 다양한 관점과 각도에서 그들의 그리고 서로의 아이디어를 검증하는 사람들에 의해 수행되기 때문에 작동한다. 과학이 다양한 집단의 사람들에 의해 행해질 때, 그리고 만약 과학 지식의 특정 영역에 대한 의견 일치가 이루어진다면, 그러면 우리는 그것의 객관성과 진실성에 있어서 더 큰 자신감을 가질 수 있다.`,
    fullEn: `If there is little or no diversity of views, and all scientists see, think, and question the world in a similar way, then they will not, as a community, be as objective as they maintain they are, or at least aspire to be. The solution is that there should be far greater diversity in the practice of science: in gender, ethnicity, and social and cultural backgrounds. Science works because it is carried out by people who pursue their curiosity about the natural world and test their and each other's ideas from as many varied perspectives and angles as possible. When science is done by a diverse group of people, and if consensus builds up about a particular area of scientific knowledge, then we can have more confidence in its objectivity and truth.`,
    q1: [

  '24': {
    title: '제목 추론 - Trick Your Mind to Get Work Done',
    fullKo: `우리는 시간을 주, 월, 계절과 같은 단위로 나누는 경향이 있다; 인도의 농부들과 북미의 학생들을 대상으로 한 일련의 연구에서, 심리학자들은 마감일이 "나뉨" ― 새해와 같이 ― 의 반대편에 있는 경우, 우리는 그것을 멀리 있는 것으로 여기고, 그 결과, 실행에 옮길 준비를 덜 할 가능성이 더 많다는 사실을 발견했다. 그러한 상황에서 당신이 해야 할 일은 그 시간 틀에 대해 생각하는 또 다른 방식을 찾는 것이다. 예를 들어, 지금이 11월이고 마감일이 1월이라면, 네가 "내년"보다는 "이번 겨울"에 일을 끝내야 한다고 너 자신에게 말하는 것이 더 좋다. 최고의 접근법은 마감일을 임박한 기간 내에 맞춰야 하는 도전으로 여기는 것이다. 그런 식으로 스트레스는 더 잘 관리될 수 있고, 적시에 작업을 시작 ― 따라서 마무리 ― 할 수 있는 가능성이 높아진다.`,
    fullEn: `We tend to break up time into units, such as weeks, months, and seasons; in a series of studies among farmers in India and students in North America, psychologists found that if a deadline is on the other side of a "break" ― such as in the New Year ― we're more likely to see it as remote, and, as a result, be less ready to jump into action. What you need to do in that situation is find another way to think about the timeframe. For example, if it's November and the deadline is in January, it's better to tell yourself you have to get it done "this winter" rather than "next year." The best approach is to view deadlines as a challenge that you have to meet within a period that's imminent. That way the stress is more manageable, and you have a better chance of starting ― and therefore finishing ― in good time.`,

  '29': {
    title: '어법 추론 - Smiling Babies',
    fullKo: `미소 짓기에 대한 선천적인 능력은 선천적으로 청각장애와 시각장애가 있고, 사람 얼굴을 한 번도 본 적이 없는 아기들도, 약 2개월 즈음에 미소를 짓기 시작한다는 놀라운 관찰에 의해 증명된다. 그러나, 시각장애를 가진 아기의 미소 짓기는 그것을 강화하기 위해 아무것도 행해지지 않으면 결국 사라진다. 적절한 피드백이 없으면, 미소 짓기는 사라진다. 하지만 여기에 흥미로운 사실이 있다: 만약 그들이 어른에 의해서 안기고, 흔들리고, 슬쩍 찔리고, 간지럽혀지면 ― 그들이 혼자가 아니며 누군가 그들에게 관심을 갖고 있다는 것을 알게 하는 것 ― 시각장애를 가진 아기들은 계속 미소를 지을 것이다. 이러한 사회적 피드백은 그 아기가 계속 미소를 지을 수 있도록 조장한다. 이런 방식으로, 초기 경험은 우리의 생리 작용과 함께 작용하여 사회적 행동을 형성한다. 사실, 당신은 이를 설명하기 위해 시각장애를 가진 아기의 사례들을 필요로 하지 않는다. 시력이 있는 아기들은 당신이 그들을 바라볼 때나, 더 나아가, 당신이 그들에게 미소를 지어줄 때, 당신에게 더 많이 미소 짓는다.`,
    fullEn: `The built-in capacity for smiling is proven by the remarkable observation that babies who are congenitally both deaf and blind, who have never seen a human face, also start to smile at around 2 months. However, smiling in blind babies eventually disappears if nothing is done to reinforce it. Without the right feedback, smiling dies out. But here's a fascinating fact: blind babies will continue to smile if they are cuddled, bounced, nudged, and tickled by an adult ― anything to let them know that they are not alone and that someone cares about them. This social feedback encourages the baby to continue smiling. In this way, early experience operates with our biology to establish social behaviors. In fact, you don't need the cases of blind babies to make the point. Babies with sight smile more at you when you look at them or, better still, smile back at them.`,

  '30': {
    title: '어휘 추론 - Adaptation and Chocolate Chips',
    fullKo: `사람들은 적응하는 경향이 있기 때문에, 긍정적인 것을 부정적인 것으로 방해하는 것이 실제로는 즐거움을 향상시킬 수 있다. 광고를 예로 들어 보자. 대부분의 사람들은 그것들을 싫어해서, 그것들을 제거하는 것이 쇼나 다른 오락물을 더 즐겁게 만들 수 있다. 하지만 그 반대가 사실이다. 쇼는 그것들이 성가신 광고들에 의해 중단될 때 실제로 더 즐거워진다. 왜냐하면 이러한 덜 즐거운 순간들이 쇼의 긍정적인 경험에 대한 적응을 깨뜨리기 때문이다. 초콜릿 칩을 먹는 것을 생각해 보라. 첫 번째 칩은 맛있다: 달콤하고, 입안에서 살살 녹는 좋은 맛. 두 번째 칩도 꽤 맛있다. 하지만 네 번째, 다섯 번째, 혹은 열 번째 칩을 연속으로 먹으면 그 좋은 맛은 더 이상 즐겁지 않다. 우리는 적응한다. 그러나, 긍정적인 경험들에 덜 긍정적인 경험들을 간격을 두고 배치하는 것은 적응을 늦출 수 있다. 초콜릿 칩 사이에 방울양배추를 먹거나 TV 쇼의 파트 사이에 광고를 보는 것은 이 과정을 방해한다. 덜 긍정적인 순간은 뒤에 오는 긍정적인 순간을 다시 새롭게 만들어서 더 즐겁게 만든다.`,
    fullEn: `Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment more enjoyable. But the opposite is true. Shows are actually more enjoyable when they're broken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. Interspersing positive experiences with less positive ones, however, can slow down adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows disrupts the process. The less positive moment makes the following positive one new again and thus more enjoyable.`,

  '31': {
    title: '빈칸 추론 - Reactance',
    fullKo: `우리는 그것들이 실용적인 목적을 수행하지 않더라도 우표, 동전, 빈티지 자동차들을 수집한다. 우체국은 오래된 우표를 받지 않고, 은행은 오래된 동전을 받지 않으며, 그리고 빈티지 자동차는 더 이상 도로에서 허용되지 않는다. 이런 것들은 모두 부수적인 문제이다; 매력은 그들이 부족한 공급에 있다는 것이다. 한 연구에서, 학생들은 포스터 10장을 매력도의 순서대로 배열하도록 요청받았다 ― 나중에 그들의 참여에 대한 보상으로 포스터 1장을 간직할 수 있다는 합의와 함께. 5분 후, 그들은 세 번째 높은 평가의 포스터가 더 이상 이용 가능하지 않다는 것을 들었다. 그런 다음 그들은 10개의 포스터를 모두 처음부터 평가하라고 요청을 받았다. 더 이상 이용할 수 없는 포스터가 갑자기 가장 아름다운 것으로 분류되었다. 심리학에서, 이러한 현상은 리액턴스라고 불린다: 우리가 선택지를 빼앗겼을 때, 우리는 그것을 갑자기 더 매력적으로 여긴다.`,
    fullEn: `We collect stamps, coins, vintage cars even when they serve no practical purpose. The post office doesn't accept the old stamps, the banks don't take old coins, and the vintage cars are no longer allowed on the road. These are all side issues; the attraction is that they are in short supply. In one study, students were asked to arrange ten posters in order of attractiveness ― with the agreement that afterward they could keep one poster as a reward for their participation. Five minutes later, they were told that the poster with the third highest rating was no longer available. Then they were asked to judge all ten from scratch. The poster that was no longer available was suddenly classified as the most beautiful. In psychology, this phenomenon is called reactance: when we are deprived of an option, we suddenly deem it more attractive.`,

  '32': {
    title: '빈칸 추론 - Sunk Cost Fallacy',
    fullKo: `우리에게 보답해 주지 않는 것에 우리가 투자해 왔다면 ― 실패한 사업에 투자한 돈이거나, 불행한 인간관계에 투자한 시간이던지 간에 ― 우리는 벗어나기가 매우 어렵다는 것을 안다. 이것은 매몰 비용 오류이다. 우리의 본능은 결국에는 우리의 투자가 가치 있는 것으로 입증될 것이라고 희망하면서 돈이나 시간에 투자를 계속하는 것이다. 포기한다는 것은 우리가 돌이킬 수 없는 무언가를 낭비해왔다고 인정하는 것을 의미하고, 그런 생각은 너무 고통스러워서 우리가 할 수 있다면 그것을 피하기를 선호한다. 물론, 문제는 어떤 것이 정말 나쁜 투자라면, 그것을 계속하는 것은 우리가 잃는 총액을 증가시킬 뿐이라는 것이다. 예를 들어, 5년의 나쁜 관계에서 벗어나기보다는 우리는 그것을 10년의 나쁜 관계로 바꾸고; 천 달러를 잃었다는 사실을 받아들이기보다는, 또 다른 천 달러를 내놓고 그것도 역시 잃는다. 결국, 우리의 문제를 인정하는 고통을 미룸으로써 우리는 그것에 보탤 뿐이다. 때때로 우리는 손실을 끊어야만 한다.`,
    fullEn: `If we've invested in something that hasn't repaid us ― be it money in a failing venture, or time in an unhappy relationship ― we find it very difficult to walk away. This is the sunk cost fallacy. Our instinct is to continue investing money or time as we hope that our investment will prove to be worthwhile in the end. Giving up would mean acknowledging that we've wasted something we can't get back, and that thought is so painful that we prefer to avoid it if we can. The problem, of course, is that if something really is a bad bet, then staying with it simply increases the amount we lose. Rather than walk away from a bad five-year relationship, for example, we turn it into a bad 10-year relationship; rather than accept that we've lost a thousand dollars, we lay down another thousand and lose that too. In the end, by delaying the pain of admitting our problem, we only add to it. Sometimes we just have to cut our losses.`,

  '33': {
    title: '빈칸 추론 - Light from Stars',
    fullKo: `우리의 작은 세상에서, 실제로는 빛은 순간적으로 이동한다. 전구가 켜져 있다면, 당연히 그것은 우리가 보는 그 자리에서 빛을 내고 있다. 우리는 손을 뻗어 그것을 만진다: 그것은 바로 거기에 있고, 불쾌할 정도로 뜨겁다. 필라멘트가 나가면, 그때 빛은 꺼진다. 전구가 망가져서 소켓에서 제거된 몇 년 후, 그 자리에 빛을 내고 방을 밝히고 있는 그것을 우리는 보지 못한다. 바로 그 개념은 말도 안 되는 것처럼 보인다. 하지만 우리가 충분히 멀리 떨어져 있다면, 항성 전체는 꺼질 수 있지만 우리는 그것이 밝게 빛나는 것을 계속 볼 것이다; 우리는 아마도 오랜 세월동안 ― 사실, 빠르지만 무한히 빠르지는 않게, 이동하는 빛이 그 사이에 낀 광대함을 가로지르는데 걸리는 시간 동안 그것의 소멸을 알지 못할 것이다. 별과 은하까지의 엄청난 거리는 우리가 우주 공간의 모든 것을 과거의 모습으로 보고 있다는 것을 의미한다.`,
    fullEn: `On our little world, light travels, for all practical purposes, instantaneously. If a lightbulb is glowing, then of course it's physically where we see it, shining away. We reach out our hand and touch it: It's there all right, and unpleasantly hot. If the filament fails, then the light goes out. We don't see it in the same place, glowing, illuminating the room years after the bulb breaks and it's removed from its socket. The very notion seems nonsensical. But if we're far enough away, an entire sun can go out and we'll continue to see it shining brightly; we won't learn of its death, it may be, for ages to come ― in fact, for how long it takes light, which travels fast but not infinitely fast, to cross the intervening vastness. The immense distances to the stars and the galaxies mean that we see everything in space in the past.`,

  '34': {
    title: '빈칸 추론 - Financial Markets',
    fullKo: `금융 시장은 부자들로부터 자본을 받아 다른 모든 사람들에게 그것을 빌려주는 것 이상을 한다. 그것들은 우리 각자가 평생에 걸쳐 소비를 원활하게 하도록 해주며, 그리고 이는 우리가 그것(소득)을 얻는 동시에 소득을 소비할 필요가 없다는 것을 말하는 멋진 방식이다. 셰익스피어는 우리가 빌리는 사람도 빌려주는 사람도 되지 말라고 충고했을지도 모른다; 사실 우리 대부분은 어떤 때에는 둘 다 될 것이다. 만약 우리가 농경 사회에 산다면, 우리는 우리의 농작물을 수확 직후에 합리적으로 먹거나 또는 그것들을 저장할 어떤 방법을 찾아야 할 것이다. 금융 시장은 수확을 관리하는 더 정교한 방법이다. 우리는 우리가 아직 벌지 않은 소득을 지금 소비할 수도 있고 ― 대학이나 주택을 위해 빌리는 것처럼 ― 혹은 우리는 은퇴를 위해 저축하는 것처럼, 지금 소득을 벌어서 나중에 그것을 소비할 수도 있다. 중요한 점은 소득을 버는 것이 그것을 소비하는 것과 분리되어 있다는 것이고, 이는 우리에게 삶에서 훨씬 더 많은 유연성을 허용해준다.`,
    fullEn: `Financial markets do more than take capital from the rich and lend it to everyone else. They enable each of us to smooth consumption over our lifetimes, which is a fancy way of saying that we don't have to spend income at the same time we earn it. Shakespeare may have admonished us to be neither borrowers nor lenders; the fact is that most of us will be both at some point. If we lived in an agrarian society, we would have to eat our crops reasonably soon after the harvest or find some way to store them. Financial markets are a more sophisticated way of managing the harvest. We can spend income now that we have not yet earned ― as by borrowing for college or a home ― or we can earn income now and spend it later, as by saving for retirement. The important point is that earning income has been divorced from spending it, allowing us much more flexibility in life.`,

const PASSAGE_ORDER = Object.keys(PASSAGES).sort((a,b)=>parseInt(a)-parseInt(b));

let userName='', userSchool='';
let selectedRefs = new Set();
let selectedTypes = new Set([1,2,3,4]);
let doneRefs = new Set();
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], allResults=[], answered=false, t0=0;

const QUIZ_ID = 'mock_go2_2024_06_memory_v3';
const _DAY_KEY = (function(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
const _PROG_KEY = 'bn_prog_'+QUIZ_ID;
function _saveProg(){try{localStorage.setItem(_PROG_KEY, JSON.stringify({day:_DAY_KEY, doneRefs:Array.from(doneRefs)}));}catch(e){}}
function _loadProg(){
  try{
    const raw = localStorage.getItem(_PROG_KEY); if(!raw) return;
    const data = JSON.parse(raw);
    if(data.day !== _DAY_KEY){localStorage.removeItem(_PROG_KEY); return;}
    if(Array.isArray(data.doneRefs)) doneRefs = new Set(data.doneRefs);
  }catch(e){}
}
function _cleanupOldProgress(){
  try{
    for(let i=localStorage.length-1;i>=0;i--){
      const k = localStorage.key(i);
      if(k && k.startsWith('bn_prog_')){
        try{const v=JSON.parse(localStorage.getItem(k)); if(v.day!==_DAY_KEY) localStorage.removeItem(k);}
        catch(e){localStorage.removeItem(k);}
      }
    }
  }catch(e){}
}

function goPassageSelect(){
  userSchool = document.getElementById('si').value;
  userName = document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!'); return;}
  if(!userName){alert('이름을 입력해주세요!'); return;}
  try{localStorage.setItem('bomnal_name',userName); localStorage.setItem('bomnal_school',userSchool);}catch(e){}
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('userInfo').textContent = userName+' · '+userSchool;
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function toggleType(t, btn){
  if(selectedTypes.has(t)) selectedTypes.delete(t);
  else selectedTypes.add(t);
  btn.classList.toggle('on');
}

function renderPassageGrid(){
  const grid = document.getElementById('passageGrid');
  grid.innerHTML = '';
  PASSAGE_ORDER.forEach(ref=>{
    const p = PASSAGES[ref];
    let count = 0;
    [1,2,3,4].forEach(t=>{ if(selectedTypes.has(t) && p['q'+t]) count += p['q'+t].length; });
    const d = document.createElement('div');
    d.className = 'p-card'+(selectedRefs.has(ref)?' sel':'')+(doneRefs.has(ref)?' done':'');
    d.onclick = ()=>togglePassage(ref);
    d.innerHTML = `<div class="p-no">${ref}번</div><div class="p-count">${count}문항</div>`
      +(doneRefs.has(ref)?'<span class="p-badge done-badge">완료✓</span>':'')
      +(selectedRefs.has(ref)&&!doneRefs.has(ref)?'<span class="p-badge" style="background:#e3f2fd;color:#1565c0;">선택</span>':'');
    grid.appendChild(d);
  });
}

function togglePassage(ref){
  if(selectedRefs.has(ref)) selectedRefs.delete(ref);
  else selectedRefs.add(ref);
  renderPassageGrid();
}

function selectAll(){
  const allSel = PASSAGE_ORDER.every(r=>selectedRefs.has(r));
  PASSAGE_ORDER.forEach(r=>{ if(allSel) selectedRefs.delete(r); else selectedRefs.add(r); });
  renderPassageGrid();
}

function shuffle(arr){const b=[...arr]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b;}

function startQuiz(){
  if(selectedRefs.size === 0){alert('지문을 하나 이상 선택하세요!'); return;}
  if(selectedTypes.size === 0){alert('문제 유형을 하나 이상 선택하세요!'); return;}
  qs = [];
  PASSAGE_ORDER.forEach(ref=>{
    if(!selectedRefs.has(ref)) return;
    const p = PASSAGES[ref];
    [1,2,3,4].forEach(t=>{
      if(!selectedTypes.has(t)) return;
      const arr = p['q'+t] || [];
      arr.forEach((q,qi)=>{
        qs.push({...q, type:t, pno:ref, qi:qi+1, passageTitle:p.title, fullKo:p.fullKo, fullEn:p.fullEn});
      });
    });
  });
  qs = shuffle(qs);
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent = userName+' · '+selectedRefs.size+'개 지문 · '+qs.length+'문항';
  showQ();
}

function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 본문 안에서 target 위치를 찾아 replacement HTML로 치환 (첫 매치만)
function injectMarker(fullEn, target, replacementHTML){
  const escapedFull = escHTML(fullEn);
  const escapedTarget = escHTML(target);
  const idx = escapedFull.indexOf(escapedTarget);
  if(idx === -1) return escapedFull + ' <span style="color:#c62828;font-size:10px;">[⚠️ target 찾기 실패: '+escapedTarget+']</span>';
  return escapedFull.substring(0, idx) + replacementHTML + escapedFull.substring(idx + escapedTarget.length);
}

function showQ(){
  if(idx >= qs.length){showResult(); return;}
  answered = false;
  const q = qs[idx];
  document.getElementById('pf').style.width = (idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent = (idx+1)+'/'+qs.length;
  const area = document.getElementById('quizArea');

  if(q.type === 1) renderType1(area, q);
  else if(q.type === 2) renderType2(area, q);
  else if(q.type === 3) renderType3(area, q);
  else if(q.type === 4) renderType4(area, q);
}

// ====== Type 1: 빈칸 추론 4지선다 ======
function renderType1(area, q){
  const enHTML = injectMarker(q.fullEn, q.target, '<span class="blank">?</span>');
  const choiceHTML = q.options.map((opt,i)=>`<button class="cb" data-idx="${i}"><span class="cn">${i+1}</span><span>${escHTML(opt)}</span></button>`).join('');
  area.innerHTML = `
    <div class="qc">
      <div class="q-no-badge">
        <span class="qno">지문 ${q.pno}번</span>
        <span class="qtype qtype-1">🔡 빈칸 추론</span>
      </div>
      <div class="en-box"><div class="en-label">📖 PASSAGE</div>${enHTML}</div>
      <div class="q-prompt">⬛ Choose the word that best fills the blank</div>
      <div class="choices" id="qChoices">${choiceHTML}</div>
      <div class="fb-msg" id="fb"></div>
    </div>`;
  const correctIdx = q.options.indexOf(q.target);
  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click', ()=>checkChoice(b, parseInt(b.dataset.idx), correctIdx, q.target));
  });
}

// ====== Type 2: 어형변화 주관식 (힌트 없음) ======
function renderType2(area, q){
  const enHTML = injectMarker(q.fullEn, q.target, '<span class="blank">?</span>');
  area.innerHTML = `
    <div class="qc">
      <div class="q-no-badge">
        <span class="qno">지문 ${q.pno}번</span>
        <span class="qtype qtype-2">✏️ Word Form</span>
      </div>
      <div class="en-box"><div class="en-label">📖 PASSAGE</div>${enHTML}</div>
      <div class="q-prompt">⬛ Change <span class="base-form">${escHTML(q.base)}</span> to the correct form for the blank</div>
      <div class="text-input-wrap">
        <input type="text" class="text-input" id="textAns" placeholder="Type your answer..." autocomplete="off" autocapitalize="none">
        <button class="submit-btn" id="submitBtn" onclick="submitText()">Submit</button>
      </div>
      <div class="fb-msg" id="fb"></div>
    </div>`;
  const inp = document.getElementById('textAns');
  inp.focus();
  inp.addEventListener('keypress', e=>{ if(e.key==='Enter') submitText(); });
}

window.submitText = function(){
  if(answered) return;
  const q = qs[idx];
  const inp = document.getElementById('textAns');
  const userAns = inp.value.trim();
  if(!userAns){alert('답을 입력하세요!'); return;}
  answered = true;
  document.getElementById('submitBtn').disabled = true;
  inp.disabled = true;
  const fb = document.getElementById('fb');
  const isCorrect = userAns.toLowerCase() === q.target.toLowerCase();
  if(isCorrect){
    inp.classList.add('correct');
    fb.className = 'fb-msg ok'; fb.textContent = '✅ 정답!';
    cor++;
    allResults.push({pno:q.pno, type:q.type, qi:q.qi, correct:true, my:userAns, ans:q.target});
  } else {
    inp.classList.add('wrong');
    fb.className = 'fb-msg no'; fb.textContent = '❌ 오답! 정답: '+q.target;
    wrn++;
    wrongs.push({label:'지문 '+q.pno+' · 어형변화', my:userAns, correct:q.target});
    allResults.push({pno:q.pno, type:q.type, qi:q.qi, correct:false, my:userAns, ans:q.target});
  }
  setTimeout(()=>{idx++; showQ();}, isCorrect?900:2200);
};

// ====== Type 3: True / False (지문 전체 내용 판단) ======
function renderType3(area, q){
  const enHTML = escHTML(q.fullEn);
  // T/F 버튼 위치도 랜덤 셔플
  const shouldSwap = Math.random() < 0.5;
  const buttons = shouldSwap
    ? [{label:'False', val:false},{label:'True', val:true}]
    : [{label:'True', val:true},{label:'False', val:false}];
  const correctIdx = buttons.findIndex(b=>b.val === q.isTrue);
  const choiceHTML = buttons.map((b,i)=>{
    const color = b.val ? '#2e7d32' : '#c62828';
    const bg = b.val ? '#e8f5e9' : '#ffebee';
    return `<button class="cb" data-idx="${i}" style="border-color:${color};background:${bg};color:${color};font-weight:800;"><span class="cn" style="background:${color};">${b.val?'T':'F'}</span><span>${b.label}</span></button>`;
  }).join('');
  area.innerHTML = `
    <div class="qc">
      <div class="q-no-badge">
        <span class="qno">지문 ${q.pno}번</span>
        <span class="qtype qtype-3">⚖️ True or False</span>
      </div>
      <div class="en-box"><div class="en-label">📖 PASSAGE</div>${enHTML}</div>
      <div class="statement-box"><div class="statement-label">📝 STATEMENT</div>${escHTML(q.statement)}</div>
      <div class="q-prompt">⬛ Is the statement TRUE or FALSE based on the passage?</div>
      <div class="choices" id="qChoices">${choiceHTML}</div>
      <div class="fb-msg" id="fb"></div>
    </div>`;
  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click', ()=>checkChoice(b, parseInt(b.dataset.idx), correctIdx, q.isTrue?'True':'False'));
  });
}

// ====== Type 4: 영영풀이 4지선다 ======
function renderType4(area, q){
  const enHTML = injectMarker(q.fullEn, q.target, '<span class="blank">?</span>');
  const choiceHTML = q.options.map((opt,i)=>`<button class="cb" data-idx="${i}"><span class="cn">${i+1}</span><span>${escHTML(opt)}</span></button>`).join('');
  area.innerHTML = `
    <div class="qc">
      <div class="q-no-badge">
        <span class="qno">지문 ${q.pno}번</span>
        <span class="qtype qtype-4">📖 Definition</span>
      </div>
      <div class="en-box"><div class="en-label">📖 PASSAGE</div>${enHTML}</div>
      <div class="def-box"><div class="def-label">📚 DEFINITION FOR THE BLANK</div>${escHTML(q.def)}</div>
      <div class="q-prompt">⬛ Choose the word matching the definition</div>
      <div class="choices" id="qChoices">${choiceHTML}</div>
      <div class="fb-msg" id="fb"></div>
    </div>`;
  const correctIdx = q.options.indexOf(q.target);
  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click', ()=>checkChoice(b, parseInt(b.dataset.idx), correctIdx, q.target));
  });
}

// 공통 채점 (선택형 1·3·4)
function checkChoice(btn, sel, correctIdx, correctVal){
  if(answered) return;
  answered = true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled = true);
  const fb = document.getElementById('fb');
  const q = qs[idx];
  // sel 단어 추출
  const myAns = btn.querySelector('span:last-child').textContent;
  if(sel === correctIdx){
    btn.classList.add('correct');
    fb.className = 'fb-msg ok'; fb.textContent = '✅ 정답!';
    cor++;
    allResults.push({pno:q.pno, type:q.type, qi:q.qi, correct:true, my:myAns, ans:correctVal});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.cb').forEach(b=>{ if(parseInt(b.dataset.idx) === correctIdx) b.classList.add('reveal'); });
    fb.className = 'fb-msg no'; fb.textContent = '❌ 오답! 정답: '+correctVal;
    wrn++;
    const typeLabel = {1:'빈칸',2:'어형',3:'옳고그른',4:'영영풀이'}[q.type];
    wrongs.push({label:'지문 '+q.pno+' · '+typeLabel, my:myAns, correct:correctVal});
    allResults.push({pno:q.pno, type:q.type, qi:q.qi, correct:false, my:myAns, ans:correctVal});
  }
  setTimeout(()=>{idx++; showQ();}, sel===correctIdx?800:1900);
}

let wrongQs = [];

function showResult(){
  document.getElementById('pf').style.width = '100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total = idx, pct = total>0?Math.round(cor/total*100):0;
  const el = Math.round((Date.now()-t0)/60000);
  selectedRefs.forEach(r=>doneRefs.add(r));
  _saveProg();

  const wrongSet = new Set(allResults.filter(r=>!r.correct).map(r=>r.pno+'_'+r.type+'_'+r.qi));
  wrongQs = qs.filter(q=>wrongSet.has(q.pno+'_'+q.type+'_'+q.qi));

  const wHTML = wrongs.length>0
    ? '<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.label+'</div><div class="wid">내 답: '+w.my+' → 정답: '+w.correct+'</div></div>').join('')+'</div>'
    : '<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const rs = document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML = `<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고2 24년 6월 본문암기 · ${selectedRefs.size}개 지문 · ${total}문항</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${total}</div><div class="sl">총문항</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave) window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: userName,
    school: userSchool,
    score: pct,
    correct: cor,
    wrong: wrn,
    total: total,
    elapsedMin: el,
    quizType: '고2_24년6월_본문암기_4유형',
    passages: [...selectedRefs].sort(),
    types: [...selectedTypes].sort(),
    details: allResults.map(r=>({
      지문: r.pno+'번',
      유형: {1:'빈칸',2:'어형',3:'옳고그른',4:'영영풀이'}[r.type],
      번호: r.qi,
      결과: r.correct?'✅정답':'❌오답',
      내답: r.my,
      정답: r.ans
    })),
    wrongWords: wrongs.map(w=>({label:w.label, my:w.my, correct:w.correct}))
  });
}

function retryWrongs(){
  if(wrongQs.length === 0) return;
  qs = [...wrongQs];
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('hs').textContent = userName+' · 오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selectedRefs.clear();
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

window.goPassageSelect = goPassageSelect;
window.toggleType = toggleType;
window.selectAll = selectAll;
window.startQuiz = startQuiz;
window.retryWrongs = retryWrongs;
window.goBack = goBack;

window.addEventListener('DOMContentLoaded', ()=>{
  const n = localStorage.getItem('bomnal_name');
  const s = localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value = n;
  if(s){
    const sel = document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value && s.includes(sel.options[i].value)){sel.value = sel.options[i].value; break;}
    }
  }
  _cleanupOldProgress();
  _loadProg();
});
</script>
