  {pno:`23`,sn:2,ko:`해결책은 과학의 실행에 있어 훨씬 더 많은 다양성이 있어야 한다는 것이다: 성별, 인종, 그리고 사회 적 문화적 배경에서.`,sentence:`The solution is that there should be far greater {{ANSWER}} in the practice of science: in gender, ethnicity, and social and cultural backgrounds.`,options:[`diversity`,`uniformity`],ans:1,correct:`diversity`},
  {pno:`23`,sn:3,ko:`과학은 그것이 자연 세계에 대한 호기심을 추구하고 가능한 한 다양한 관점과 각도에서 그들의 그리 고 서로의 아이디어를 검증하는 사람들에 의해 수행되기 때문에 작동한다.`,sentence:`Science works {{ANSWER}} it is carried out by people who pursue their curiosity about the natural world and test their and each other’s ideas from as many varied perspectives and angles as possible.`,options:[`because of`,`because`],ans:2,correct:`because`},

  {pno:`23`,sn:4,ko:`과학이 다양한 집단의 사람들에 의해 행해질 때, 그리고 만약 과학 지식의 특정 영역에 대한 의견 일 치가 이루어진다면, 그러면 우리는 그것의 객관성과 진실성에 있어서 더 큰 자신감을 가질 수 있다.`,sentence:`When science is {{ANSWER}} by a diverse group of people, and if consensus builds up about a particular area of scientific knowledge, then we can have more confidence in its objectivity and truth.`,options:[`doing`,`done`],ans:2,correct:`done`},

  {pno:`24`,sn:1,ko:`우리는 시간을 주, 월, 계절과 같은 단위로 나누는 경향이 있다; 인도의 농부들과 북미의 학생들을 대 상으로 한 일련의 연구에서, 심리학자들은 마감일이 “나뉨”—새해와 같이—의 반대편에 있는 경우, 우리는 그것을 멀리 있는 것으로 여기고, 그 결과, 실행에 옮길 준비를 덜 할 가능성이 더 많다는 사 실을 발견했다.`,sentence:`We tend {{ANSWER}} up time into units, such as weeks, months, and seasons; in a series of studies among farmers in India and students in North America, psychologists found that if a deadline is on the other side of a “break”—such as in the New Year—we’re more likely to see it as remote, and, as a result, be less ready to jump into action.`,options:[`breaking`,`to break`],ans:2,correct:`to break`},

const PASSAGES_BY_REF = {};
QUESTIONS.forEach(q=>{
  if(!PASSAGES_BY_REF[q.pno]) PASSAGES_BY_REF[q.pno]=[];
  PASSAGES_BY_REF[q.pno].push(q);
});
const PASSAGE_ORDER = Object.keys(PASSAGES_BY_REF).sort((a,b)=>parseInt(a.split('-')[0])-parseInt(b.split('-')[0]));

let userName='', userSchool='', selectedRefs=new Set(), doneRefs=new Set();
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], allResults=[], answered=false, t0=0;
let filterMode='all';

function goPassageSelect(){
  userSchool = document.getElementById('si').value;
  userName = document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  try{localStorage.setItem('bomnal_name',userName);localStorage.setItem('bomnal_school',userSchool);}catch(e){}
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('userInfo').textContent = userName + ' · ' + userSchool;
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function refInRange(ref, mode){
  if(mode==='all') return true;
  if(mode==='long') return ref.includes('-');
  const n = parseInt(ref);
  if(mode==='18-24') return n>=18&&n<=24;
  if(mode==='26-30') return n>=26&&n<=30;
  if(mode==='31-40') return n>=31&&n<=40;
  return true;
}

function renderPassageGrid(){
  const grid = document.getElementById('passageGrid');
  grid.innerHTML='';
  PASSAGE_ORDER.forEach(ref=>{
    if(!refInRange(ref, filterMode)) return;
    const count = PASSAGES_BY_REF[ref].length;
    const d = document.createElement('div');
    d.className='p-card'+(selectedRefs.has(ref)?' sel':'')+(doneRefs.has(ref)?' done':'');
    d.onclick=()=>togglePassage(ref);
    d.innerHTML=`<div class="p-no">${ref}번</div><div class="p-count">${count}문항</div>`
      +(doneRefs.has(ref)?'<span class="p-badge done-badge">완료✓</span>':'')
      +(selectedRefs.has(ref)&&!doneRefs.has(ref)?'<span class="p-badge" style="background:#e3f2fd;color:#1565c0;">선택</span>':'');
    grid.appendChild(d);
  });
}

function togglePassage(ref){
  if(selectedRefs.has(ref))selectedRefs.delete(ref);
  else selectedRefs.add(ref);
  renderPassageGrid();
}

function filterPassage(mode, btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPassageGrid();
}

function selectAll(){
  const visible = PASSAGE_ORDER.filter(r=>refInRange(r, filterMode));
  const allSel = visible.every(r=>selectedRefs.has(r));
  visible.forEach(r=>{ if(allSel) selectedRefs.delete(r); else selectedRefs.add(r); });
  renderPassageGrid();
}

function shuffle(arr){const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startQuiz(){
  if(selectedRefs.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  qs=[];
  PASSAGE_ORDER.forEach(ref=>{
    if(selectedRefs.has(ref)) PASSAGES_BY_REF[ref].forEach(q=>qs.push(q));
  });
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · '+selectedRefs.size+'개 지문 · '+qs.length+'문항';
  showQ();
}

function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');
  const sentHTML = escHTML(q.sentence).replace('{{ANSWER}}', '<span class="blank">?</span>');
  const choiceHTML = q.options.map((opt,i)=>`<button class="cb" data-idx="${i+1}"><span class="cn">${i+1}</span><span>${escHTML(opt)}</span></button>`).join('');
  area.innerHTML=`
    <div class="qc">
      <div class="q-no-badge">
        <span class="qno">지문 ${q.pno}번 (${q.sn}번 문장)</span>
        <span class="qtype">어법·어휘 선택</span>
      </div>
      <div class="ko-box">📌 ${escHTML(q.ko)}</div>
      <div class="en-box">${sentHTML}</div>
      <div class="q-prompt">⬛ 빈칸에 들어갈 알맞은 표현은?</div>
      <div class="choices" id="qChoices">${choiceHTML}</div>
      <div class="fb-msg" id="fb"></div>
    </div>`;
  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click',()=>selChoice(b, parseInt(b.dataset.idx), q.ans));
  });
}

function selChoice(btn, sel, ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const q=qs[idx];
  if(sel===ans){
    btn.classList.add('correct');
    fb.className='fb-msg ok';fb.textContent='✅ 정답!';
    cor++;
    allResults.push({pno:q.pno, sn:q.sn, correct:true, my:q.options[sel-1], ans:q.correct});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.cb').forEach(b=>{if(parseInt(b.dataset.idx)===ans)b.classList.add('reveal');});
    fb.className='fb-msg no';fb.textContent='❌ 오답! 정답: '+q.correct;
    wrn++;
    wrongs.push({label:'지문 '+q.pno+'번 ('+q.sn+')', my:q.options[sel-1], correct:q.correct});
    allResults.push({pno:q.pno, sn:q.sn, correct:false, my:q.options[sel-1], ans:q.correct});
  }
  setTimeout(()=>{idx++;showQ();},sel===ans?800:1900);
}

let wrongQs = [];

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selectedRefs.forEach(r=>doneRefs.add(r));
  const wrongSet = new Set(allResults.filter(r=>!r.correct).map(r=>r.pno+'_'+r.sn+'_'+r.ans));
  wrongQs = qs.filter(q=>wrongSet.has(q.pno+'_'+q.sn+'_'+q.correct));

  const wHTML=wrongs.length>0
    ?'<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.label+'</div><div class="wid">내 답: '+w.my+' → 정답: '+w.correct+'</div></div>').join('')+'</div>'
    :'<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고2 26년 3월 어법·어휘 · ${selectedRefs.size}개 지문 · ${total}문항</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${total}</div><div class="sl">총문항</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave) window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: userName,
    school: userSchool,
    score: pct,
    correct: cor,
    wrong: wrn,
    total: total,
    elapsedMin: el,
    quizType: '고2_24년6월_어법어휘선택',
    passages: [...selectedRefs].sort(),
    details: allResults.map(r=>({
      지문: r.pno+'번',
      문장: r.sn+'번',
      결과: r.correct?'✅정답':'❌오답',
      내답: r.my,
      정답: r.ans
    })),
    wrongWords: wrongs.map(w=>({label:w.label, my:w.my, correct:w.correct}))
  });
}

function retryWrongs(){
  if(wrongQs.length===0) return;
  qs=[...wrongQs];
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · 오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selectedRefs.clear();
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

window.addEventListener('DOMContentLoaded',()=>{
  const n=localStorage.getItem('bomnal_name');
  const s=localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value=n;
  if(s){
    const sel=document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value&&s.includes(sel.options[i].value)){sel.value=sel.options[i].value;break;}
    }
  }
});
</script>
</body>
</html>
