<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날 | 대성고 1학년 교과서 1과 동반의어</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:#e3f2fd;min-height:100vh;}

/* ── 시작 화면 ── */
#pg-start{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#e3f2fd,#ede7f6,#e8eaf6);}
.start-box{background:#fff;border-radius:24px;padding:40px 32px;max-width:460px;width:100%;box-shadow:0 8px 32px rgba(21,101,192,.13);text-align:center;}
.start-box h1{font-family:'Black Han Sans',sans-serif;font-size:22px;color:#1565c0;margin-bottom:4px;}
.start-box p{font-size:13px;color:#888;margin-bottom:22px;}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;}
.info-chip{background:#e3f2fd;border-radius:10px;padding:9px;font-size:12px;color:#1565c0;font-weight:700;}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.mode-btn{border:2px solid #90caf9;border-radius:14px;padding:16px 12px;background:#e3f2fd;cursor:pointer;text-align:left;transition:.15s;}
.mode-btn.on{border-color:#1565c0;background:#bbdefb;box-shadow:0 0 0 3px #90caf9;}
.mode-btn .icon{font-size:24px;margin-bottom:6px;}
.mode-btn .name{font-size:13px;font-weight:800;color:#0d47a1;}
.mode-btn .desc{font-size:11px;color:#888;margin-top:3px;line-height:1.5;}
.inp{width:100%;padding:12px 14px;border:2px solid #90caf9;border-radius:12px;font-size:14px;font-family:'Nanum Gothic',sans-serif;outline:none;margin-bottom:10px;background:#fff;}
.inp:focus{border-color:#1565c0;}
select.inp{color:#1565c0;font-weight:700;cursor:pointer;}
.btn-start{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#1565c0,#283593);color:#fff;font-size:16px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;}
.btn-start:hover{opacity:.9;}
.section-label{font-size:12px;font-weight:800;color:#1565c0;text-align:left;margin-bottom:8px;}

/* ── 퀴즈 화면 ── */
#pg-quiz{display:none;}
.top-bar{background:#1565c0;color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.top-title{font-family:'Black Han Sans',sans-serif;font-size:15px;}
.top-sub{font-size:11px;opacity:.6;margin-top:2px;}
.top-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;}
.prog-bar{height:4px;background:#bbdefb;}
.prog-fill{height:100%;background:linear-gradient(90deg,#1565c0,#7986cb);transition:width .3s;}
.q-wrap{padding:18px;max-width:580px;margin:0 auto;}
.q-card{background:#fff;border-radius:20px;padding:24px 20px;box-shadow:0 4px 18px rgba(21,101,192,.09);}
.q-tag{display:inline-block;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:800;margin-bottom:10px;}
.q-tag.m{background:#e3f2fd;color:#1565c0;}
.q-tag.s{background:#ede7f6;color:#4527a0;}
.q-tag.j{background:#fce4ec;color:#880e4f;}
.q-step{font-size:12px;color:#999;margin-bottom:6px;font-weight:700;}
.q-word{font-family:'Black Han Sans',sans-serif;font-size:30px;color:#0d47a1;margin-bottom:4px;}
.q-kor{font-size:13px;color:#999;margin-bottom:14px;}
.q-prompt{font-size:14px;font-weight:700;color:#1565c0;background:#e3f2fd;padding:10px 14px;border-radius:10px;margin-bottom:14px;}
.choices{display:grid;gap:9px;}
.c-btn{display:flex;align-items:center;gap:10px;width:100%;padding:13px 15px;background:#f1f5ff;border:2px solid #90caf9;border-radius:12px;font-size:14px;font-weight:700;font-family:'Nanum Gothic',sans-serif;cursor:pointer;text-align:left;transition:.12s;}
.c-btn:hover:not(:disabled){border-color:#1565c0;background:#bbdefb;}
.c-btn.ok{background:#e3f2fd;border-color:#1565c0;color:#0d47a1;}
.c-btn.no{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.c-btn.ans{background:#e3f2fd;border-color:#1565c0;}
.c-num{width:24px;height:24px;border-radius:50%;background:#90caf9;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.j-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.j-btn{padding:18px;border:2px solid #90caf9;border-radius:14px;background:#e3f2fd;font-size:15px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:.12s;}
.j-btn:hover:not(:disabled){transform:translateY(-2px);}
.j-btn.syn{border-color:#1565c0;color:#0d47a1;}
.j-btn.ant{border-color:#e91e63;color:#880e4f;}
.j-btn.ok{background:#e3f2fd;}
.j-btn.no{background:#ffebee;}
.fb-box{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:14px;font-weight:800;display:none;}
.fb-box.ok{background:#e3f2fd;color:#0d47a1;display:block;}
.fb-box.no{background:#ffebee;color:#b71c1c;display:block;}
.next-btn{width:100%;margin-top:13px;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#1565c0,#283593);color:#fff;font-size:15px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;display:none;}
.next-btn.show{display:block;}

/* ── 결과 화면 ── */
#pg-result{display:none;padding:20px;max-width:580px;margin:0 auto;}
.r-card{background:#fff;border-radius:24px;padding:28px 22px;box-shadow:0 8px 28px rgba(21,101,192,.1);margin-bottom:14px;text-align:center;}
.r-score{font-family:'Black Han Sans',sans-serif;font-size:56px;color:#1565c0;line-height:1;}
.r-name{font-size:13px;color:#888;margin-top:4px;}
.r-stats{display:flex;justify-content:center;gap:24px;margin-top:18px;}
.r-stat .n{font-family:'Black Han Sans',sans-serif;font-size:26px;}
.r-stat .l{font-size:11px;color:#888;margin-top:2px;}
.wrong-box{background:#e3f2fd;border-radius:14px;padding:14px;text-align:left;margin-top:14px;}
.wrong-box h3{font-size:13px;font-weight:800;color:#b71c1c;margin-bottom:10px;}
.w-item{background:#fff;border-radius:9px;padding:9px 13px;margin-bottom:7px;font-size:13px;border-left:3px solid #1565c0;}
.w-eng{font-weight:800;color:#0d47a1;}
.w-detail{font-size:11px;color:#888;margin-top:3px;}
.r-btns{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.r-btn{padding:12px 24px;border:none;border-radius:12px;font-size:14px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;}
.r-btn.primary{background:linear-gradient(135deg,#1565c0,#283593);color:#fff;}
.r-btn.ghost{background:#e3f2fd;color:#1565c0;border:2px solid #90caf9;}

@media(max-width:480px){.mode-row{grid-template-columns:1fr;}.q-word{font-size:24px;}}
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="pg-start">
  <div class="start-box">
    <h1>📘 대성고 1학년 동반의어</h1>
    <p>YBM(김은형) 공통영어1 · 교과서 1과<br>Synonym + Antonym</p>
    <div class="info-row">
      <div class="info-chip">📖 교과서 1과</div>
      <div class="info-chip">🏆 기록 저장</div>
      <div class="info-chip">🔄 4지선다</div>
      <div class="info-chip">👆 직접 넘기기</div>
    </div>
    <div class="section-label">🎮 모드 선택</div>
    <div class="mode-row">
      <div class="mode-btn on" id="mA" onclick="pickMode('A')">
        <div class="icon">🔵</div>
        <div class="name">모드 A</div>
        <div class="desc">뜻 맞히기 →<br>유의어 찾기</div>
      </div>
      <div class="mode-btn" id="mB" onclick="pickMode('B')">
        <div class="icon">🟣</div>
        <div class="name">모드 B</div>
        <div class="desc">유의어 / 반의어<br>관계 판별</div>
      </div>
    </div>
    <select class="inp" id="schoolSel">
      <option value="">학교 선택</option>
      <option value="대성고">대성고</option>
      <option value="고운고">고운고</option>
      <option value="종촌고">종촌고</option>
    </select>
    <input type="text" class="inp" id="nameInp" placeholder="이름 입력" maxlength="10">
    <button class="btn-start" id="startBtn">시작하기 🚀</button>
  </div>
</div>

<!-- 퀴즈 화면 -->
<div id="pg-quiz">
  <div class="top-bar">
    <div>
      <div class="top-title">📘 대성고1 교과서 1과</div>
      <div class="top-sub" id="topSub"></div>
    </div>
    <div class="top-badge" id="topBadge">0/0</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0"></div></div>
  <div class="q-wrap">
    <div class="q-card" id="qCard"></div>
  </div>
</div>

<!-- 결과 화면 -->
<div id="pg-result"></div>

<script>
// ── READING 본문 단어 (CONVERSATION 제외, 본문 외 지문 제외) ──
// 유의어/반의어 정보 포함
const WORDS = [
  // READING 본문
  {eng:"ordinary",kor:"보통의, 평범한",syn:["common","normal"],ant:[]},
  {eng:"rush",kor:"서두르다, 돌진하다",syn:["hurry","dash"],ant:["slow down","stroll"]},
  {eng:"challenge",kor:"도전(하다)",syn:["difficulty","obstacle"],ant:["effortless","simple"]},
  {eng:"match",kor:"경기",syn:["game","competition"],ant:[]},
  {eng:"excited",kor:"신난, 흥분한",syn:["thrilled","enthusiastic"],ant:["bored","calm"]},
  {eng:"join",kor:"~에 가입하다, ~에 합류하다",syn:["participate in","take part in"],ant:["leave","quit"]},
  {eng:"practice",kor:"연습하다",syn:["train","rehearse"],ant:[]},
  {eng:"pause",kor:"잠시 멈추다, 일시 중지하다",syn:["stop","halt"],ant:["continue","resume"]},
  {eng:"face",kor:"직면하다",syn:["confront","encounter"],ant:["avoid","escape"]},
  {eng:"choice",kor:"선택",syn:["option","selection"],ant:[]},
  {eng:"choose",kor:"선택하다",syn:["select","pick"],ant:["reject","refuse"]},
  {eng:"grow",kor:"성장하다",syn:["develop","increase"],ant:["shrink","decrease"]},
  {eng:"difficulty",kor:"어려움",syn:["hardship","challenge"],ant:["ease","simplicity"]},
  {eng:"endurance",kor:"인내",syn:["perseverance","patience"],ant:["weakness","surrender"]},
  {eng:"courage",kor:"용기",syn:["bravery","boldness"],ant:["cowardice","fear"]},
  {eng:"avoid",kor:"피하다",syn:["escape","evade"],ant:["embrace","face","confront"]},
  {eng:"challenging",kor:"도전적인",syn:["tough","difficult"],ant:["simple","straightforward","effortless"]},
  {eng:"experience",kor:"경험",syn:["encounter","exposure"],ant:[]},
  {eng:"familiar",kor:"익숙한, 친숙한",syn:["usual","common"],ant:["unfamiliar","new","unknown"]},
  {eng:"path",kor:"길",syn:["route","way"],ant:[]},
  {eng:"avoidance",kor:"회피",syn:["evasion","dodging"],ant:["confrontation"]},
  {eng:"concentrate",kor:"집중하다",syn:["focus","pay attention"],ant:["distract","lose focus"]},
  {eng:"rapidly",kor:"빠르게",syn:["quickly","swiftly"],ant:["slowly","gradually"]},
  {eng:"miss",kor:"놓치다",syn:["fail to catch","overlook"],ant:["catch","get"]},
  {eng:"suggest",kor:"제안하다",syn:["propose","recommend"],ant:[]},
  {eng:"turn ~ down",kor:"~를 거절하다",syn:["refuse","reject"],ant:["take ~ up","accept","embrace"]},
  {eng:"suggestion",kor:"제안",syn:["proposal","recommendation"],ant:[]},
  {eng:"tough",kor:"강인한, 굳센",syn:["strong","resilient"],ant:["weak","fragile"]},
  {eng:"nothing more than ~",kor:"단지 ~에 불과한",syn:["only","merely","no more than"],ant:[]},
  {eng:"obstacle",kor:"장애, 장애물",syn:["barrier","hurdle","difficulty"],ant:["advantage","support"]},
  {eng:"hold onto ~",kor:"~을 고수하다",syn:["adhere to ~","stick to ~"],ant:["let go of ~","give up","abandon"]},
  {eng:"belief",kor:"믿음",syn:["faith","conviction"],ant:["doubt","disbelief"]},
  {eng:"embrace",kor:"받아들이다, 수용하다",syn:["accept","seize"],ant:["avoid","reject"]},
  {eng:"rewind",kor:"되감다, 되돌리다",syn:["go back","reverse"],ant:["fast forward"]},
  {eng:"attempt",kor:"시도",syn:["try","effort"],ant:[]},
  {eng:"decent",kor:"괜찮은, 꽤 좋은",syn:["reasonable","acceptable"],ant:["poor","terrible"]},
  {eng:"eventually",kor:"결국",syn:["finally","in the end"],ant:["immediately","at first"]},
  {eng:"participate in ~",kor:"~에 참가하다",syn:["take part in ~","enter ~"],ant:[]},
  {eng:"national",kor:"전국적인",syn:["countrywide","nationwide"],ant:["local","regional"]},
  {eng:"opponent",kor:"(경기, 대회 등의) 상대",syn:["rival","competitor"],ant:["ally","teammate"]},
  {eng:"skillful",kor:"숙련된",syn:["skilled","expert"],ant:["unskilled","amateur"]},
  {eng:"audience",kor:"관중",syn:["spectators","crowd"],ant:[]},
  {eng:"realize",kor:"깨닫다",syn:["understand","recognize"],ant:["ignore","overlook"]},
  {eng:"fictional",kor:"허구의",syn:["imaginary","made-up","invented"],ant:["real","actual"]},
  {eng:"tale",kor:"이야기",syn:["story","narrative"],ant:[]},
  {eng:"former",kor:"전(前)의, 이전의",syn:["previous","one-time"],ant:["future","next"]},
  {eng:"passion",kor:"열정",syn:["enthusiasm","eagerness"],ant:["indifference","apathy"]},
  {eng:"growth",kor:"성장",syn:["development","progress"],ant:["decline","decrease"]},
  {eng:"mindset",kor:"사고방식, 태도",syn:["attitude","perspective"],ant:[]},
  {eng:"desire",kor:"바라다, 원하다",syn:["wish for","want"],ant:["dislike","reject"]},
  {eng:"personal",kor:"개인적인",syn:["individual","private"],ant:["public","general"]},
  {eng:"goal",kor:"목표",syn:["aim","objective"],ant:[]},
  {eng:"give up on ~",kor:"~을 포기하다",syn:["give ~ up","abandon ~"],ant:["hold onto ~","stick to ~","adhere to ~"]},
  {eng:"achieve",kor:"달성하다, 성취하다",syn:["accomplish","attain"],ant:["fail","give up"]},
  // 유의어/반의어 섹션 추가 단어
  {eng:"start with ~",kor:"~로 시작하다",syn:["begin with ~"],ant:["stop with ~"]},
  {eng:"take ~ up",kor:"~에 응하다, 받아들이다",syn:["accept ~","embrace ~"],ant:["turn ~ down","refuse"]},
  {eng:"every now and then",kor:"때때로",syn:["sometimes","at times","from time to time","occasionally"],ant:[]},
  {eng:"later on",kor:"나중에",syn:["afterwards","subsequently"],ant:[]},
  {eng:"awesome",kor:"대단한, 최고의",syn:["fantastic","excellent"],ant:["awful","terrible"]},
];

// ── 전역 상태 ──
var mode = 'A';
var studentName = '';
var school = '';
var questions = [];
var qIdx = 0;
var numCorrect = 0;
var numWrong = 0;
var wrongList = [];
var startTime = 0;
var isRetry = false;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function pickMode(m) {
  mode = m;
  document.getElementById('mA').className = 'mode-btn' + (m === 'A' ? ' on' : '');
  document.getElementById('mB').className = 'mode-btn' + (m === 'B' ? ' on' : '');
}

document.getElementById('startBtn').onclick = function() {
  school = document.getElementById('schoolSel').value;
  studentName = document.getElementById('nameInp').value.trim();
  if (!school) { alert('학교를 선택해주세요!'); return; }
  if (!studentName) { alert('이름을 입력해주세요!'); return; }

  isRetry = false;
  retryCount = 0;
  buildQuestions();
  startTime = Date.now();
  totalStartTime = Date.now();
  document.getElementById('pg-start').style.display = 'none';
  document.getElementById('pg-quiz').style.display = 'block';
  renderQ();
};

function buildQuestions() {
  questions = [];
  numCorrect = 0; numWrong = 0; wrongList = []; qIdx = 0;

  if (mode === 'A') {
    // 모드A: 뜻 맞히기 + 유의어 찾기 (syn있는 단어만)
    var wordsWithSyn = WORDS.filter(function(w){ return w.syn.length > 0; });
    shuffle(wordsWithSyn).forEach(function(w) {
      questions.push({ type: 'M', word: w });
      questions.push({ type: 'S', word: w });
    });
  } else {
    // 모드B: 유의어/반의어 관계 판별
    var pairs = [];
    WORDS.forEach(function(w) {
      w.syn.forEach(function(s) {
        pairs.push({ type:'J', w1: w.eng, w2: s, rel:'syn', kor: w.kor });
      });
      w.ant.forEach(function(a) {
        pairs.push({ type:'J', w1: w.eng, w2: a, rel:'ant', kor: w.kor });
      });
    });
    questions = shuffle(pairs);
  }
}

function renderQ() {
  if (qIdx >= questions.length) { showResult(); return; }
  var q = questions[qIdx];
  var total = questions.length;
  document.getElementById('topBadge').textContent = (qIdx + 1) + '/' + total;
  document.getElementById('progFill').style.width = Math.round(qIdx / total * 100) + '%';

  var modeLabel = mode === 'A' ? '유의어 찾기' : '관계 판별';
  document.getElementById('topSub').textContent = modeLabel + (isRetry ? ' · 오답 재시도' : '');

  if (q.type === 'M') renderMeaning(q.word);
  else if (q.type === 'S') renderSynonym(q.word);
  else if (q.type === 'J') renderJudge(q);
}

function getAllWords() { return WORDS; }

function renderMeaning(w) {
  var others = shuffle(getAllWords().filter(function(x){ return x.eng !== w.eng; })).slice(0, 3);
  var opts = shuffle([w].concat(others));
  var card = document.getElementById('qCard');
  card.innerHTML =
    '<div class="q-tag m">📖 뜻 맞히기</div>' +
    '<div class="q-step">' + (qIdx+1) + ' / ' + questions.length + '</div>' +
    '<div class="q-word">' + w.eng + '</div>' +
    '<div class="q-prompt">이 단어의 우리말 뜻은?</div>' +
    '<div class="choices">' +
      opts.map(function(o, i) {
        return '<button class="c-btn" data-ans="' + (o.eng === w.eng ? '1' : '0') + '">' +
          '<span class="c-num">' + (i+1) + '</span>' + o.kor + '</button>';
      }).join('') +
    '</div>' +
    '<div class="fb-box" id="fbBox"></div>' +
    '<button class="next-btn" id="nextBtn">다음 →</button>';
  card.querySelectorAll('.c-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { onMeaning(btn, w); });
  });
}

function onMeaning(btn, w) {
  disableAll();
  var isOk = btn.dataset.ans === '1';
  var fb = document.getElementById('fbBox');
  var nb = document.getElementById('nextBtn');
  if (isOk) {
    btn.classList.add('ok');
    fb.className = 'fb-box ok'; fb.textContent = '✅ 정답!';
    numCorrect++;
  } else {
    btn.classList.add('no');
    markAnswer(w.kor);
    fb.className = 'fb-box no'; fb.textContent = '❌ 오답! 정답: ' + w.kor;
    numWrong++;
    wrongList.push({ eng: w.eng, kor: w.kor, type: '뜻', my: btn.textContent.trim().slice(1), correct: w.kor });
  }
  nb.textContent = (qIdx + 1 >= questions.length) ? '결과 보기 →' : '다음 →';
  nb.className = 'next-btn show';
  nb.onclick = function() { qIdx++; renderQ(); };
}

function renderSynonym(w) {
  var correctSyn = w.syn[Math.floor(Math.random() * w.syn.length)];
  var allSyns = [];
  getAllWords().forEach(function(x) { allSyns = allSyns.concat(x.syn); });
  var distractors = shuffle(allSyns.filter(function(s){ return w.syn.indexOf(s) < 0; })).slice(0, 3);
  var opts = shuffle([correctSyn].concat(distractors));
  var card = document.getElementById('qCard');
  card.innerHTML =
    '<div class="q-tag s">🔗 유의어 찾기</div>' +
    '<div class="q-step">' + (qIdx+1) + ' / ' + questions.length + '</div>' +
    '<div class="q-word">' + w.eng + '</div>' +
    '<div class="q-kor">' + w.kor + '</div>' +
    '<div class="q-prompt">유의어(synonym)는?</div>' +
    '<div class="choices">' +
      opts.map(function(o, i) {
        return '<button class="c-btn" data-syn="' + o + '" data-correct="' + (w.syn.indexOf(o) >= 0 ? '1' : '0') + '">' +
          '<span class="c-num">' + (i+1) + '</span>' + o + '</button>';
      }).join('') +
    '</div>' +
    '<div class="fb-box" id="fbBox"></div>' +
    '<button class="next-btn" id="nextBtn">다음 →</button>';
  card.querySelectorAll('.c-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { onSynonym(btn, w, correctSyn); });
  });
}

function onSynonym(btn, w, correctSyn) {
  disableAll();
  var isOk = btn.dataset.correct === '1';
  var fb = document.getElementById('fbBox');
  var nb = document.getElementById('nextBtn');
  if (isOk) {
    btn.classList.add('ok');
    fb.className = 'fb-box ok'; fb.textContent = '✅ 정답! 유의어: ' + btn.dataset.syn;
    numCorrect++;
  } else {
    btn.classList.add('no');
    markSynAnswer(w.syn);
    fb.className = 'fb-box no'; fb.textContent = '❌ 오답! 유의어: ' + w.syn.join(', ');
    numWrong++;
    wrongList.push({ eng: w.eng, kor: w.kor, type: '유의어', my: btn.dataset.syn, correct: w.syn.join(' / ') });
  }
  nb.textContent = (qIdx + 1 >= questions.length) ? '결과 보기 →' : '다음 →';
  nb.className = 'next-btn show';
  nb.onclick = function() { qIdx++; renderQ(); };
}

function renderJudge(q) {
  var card = document.getElementById('qCard');
  card.innerHTML =
    '<div class="q-tag j">⚖️ 관계 판별</div>' +
    '<div class="q-step">' + (qIdx+1) + ' / ' + questions.length + '</div>' +
    '<div class="q-word">' + q.w1 + '</div>' +
    '<div class="q-kor">' + q.kor + '</div>' +
    '<div class="q-prompt">↔ <strong>' + q.w2 + '</strong></div>' +
    '<div class="q-prompt" style="margin-top:14px;">두 단어의 관계는?</div>' +
    '<div class="j-row">' +
      '<button class="j-btn syn" id="jSyn">🔵 유의어</button>' +
      '<button class="j-btn ant" id="jAnt">🔴 반의어</button>' +
    '</div>' +
    '<div class="fb-box" id="fbBox"></div>' +
    '<button class="next-btn" id="nextBtn">다음 →</button>';
  document.getElementById('jSyn').addEventListener('click', function() { onJudge('syn', q); });
  document.getElementById('jAnt').addEventListener('click', function() { onJudge('ant', q); });
}

function onJudge(sel, q) {
  document.getElementById('jSyn').disabled = true;
  document.getElementById('jAnt').disabled = true;
  var fb = document.getElementById('fbBox');
  var nb = document.getElementById('nextBtn');
  var la = q.rel === 'syn' ? '유의어' : '반의어';
  var ls = sel === 'syn' ? '유의어' : '반의어';
  var isOk = sel === q.rel;
  var selBtn = document.getElementById(sel === 'syn' ? 'jSyn' : 'jAnt');
  var ansBtn = document.getElementById(q.rel === 'syn' ? 'jSyn' : 'jAnt');
  if (isOk) {
    selBtn.classList.add('ok');
    fb.className = 'fb-box ok'; fb.textContent = '✅ 정답! ' + la;
    numCorrect++;
  } else {
    selBtn.classList.add('no'); ansBtn.classList.add('ok');
    fb.className = 'fb-box no'; fb.textContent = '❌ 오답! 정답: ' + la;
    numWrong++;
    wrongList.push({ eng: q.w1 + ' ↔ ' + q.w2, kor: q.kor, type: '관계', my: ls, correct: la });
  }
  nb.textContent = (qIdx + 1 >= questions.length) ? '결과 보기 →' : '다음 →';
  nb.className = 'next-btn show';
  nb.onclick = function() { qIdx++; renderQ(); };
}

function disableAll() {
  document.querySelectorAll('.c-btn').forEach(function(b) { b.disabled = true; });
}
function markAnswer(ans) {
  document.querySelectorAll('.c-btn').forEach(function(b) {
    if (b.textContent.trim().indexOf(ans) >= 0) b.classList.add('ans');
  });
}
function markSynAnswer(syns) {
  document.querySelectorAll('.c-btn').forEach(function(b) {
    var txt = b.textContent.trim();
    syns.forEach(function(s) { if (txt.indexOf(s) >= 0) b.classList.add('ans'); });
  });
}

var retryCount = 0;
var totalStartTime = 0;

function showResult() {
  document.getElementById('pg-quiz').style.display = 'none';
  var total = questions.length;
  var pct = total > 0 ? Math.round(numCorrect / total * 100) : 0;
  var elapsed = Math.round((Date.now() - startTime) / 60000);
  var isPerfect = wrongList.length === 0;

  // 오답이 있으면 Firebase에 중간 기록 저장 후 자동 재시도
  if (!isPerfect) {
    saveFirebase(pct, numCorrect, numWrong, total, elapsed);
    // 오답 목록 보여주고 3초 후 자동 재시도
    showRetryScreen(pct, elapsed, total);
    return;
  }

  // 오답 0개 달성! 완료 화면
  var totalElapsed = Math.round((Date.now() - totalStartTime) / 60000);
  var res = document.getElementById('pg-result');
  res.style.display = 'block';
  res.innerHTML =
    '<div class="r-card">' +
      '<div style="font-size:12px;color:#888;margin-bottom:4px;">대성고1 교과서 1과 · ' + (mode==='A'?'유의어 찾기':'관계 판별') + '</div>' +
      '<div style="font-size:40px;margin-bottom:8px;">🏆</div>' +
      '<div class="r-score" style="font-size:40px;color:#0d47a1;">오답 0개 달성!</div>' +
      '<div class="r-name" style="margin-top:8px;">' + studentName + ' · ' + retryCount + '회 재시도 · 총 ' + totalElapsed + '분</div>' +
      '<div style="margin-top:16px;padding:16px;background:#e3f2fd;border-radius:14px;font-size:15px;font-weight:800;color:#0d47a1;">🎉 완벽하게 마스터했어요!</div>' +
      '<div class="r-btns" style="margin-top:18px;"><button class="r-btn primary" onclick="location.reload()">처음부터 🔄</button></div>' +
    '</div>';
  saveFirebase(100, total, 0, total, totalElapsed);
}

function showRetryScreen(pct, elapsed, total) {
  var wrongHTML = '<div class="wrong-box"><h3>❌ 오답 (' + wrongList.length + '개) — 잠시 후 자동으로 재시도합니다</h3>';
  wrongList.forEach(function(w) {
    wrongHTML += '<div class="w-item"><div class="w-eng">' + w.eng + '</div><div class="w-detail">[' + w.type + '] 내 답: ' + w.my + ' → 정답: ' + w.correct + '</div></div>';
  });
  wrongHTML += '</div>';

  var res = document.getElementById('pg-result');
  res.style.display = 'block';
  res.innerHTML =
    '<div class="r-card">' +
      '<div style="font-size:12px;color:#888;margin-bottom:4px;">대성고1 교과서 1과 · ' + (mode==='A'?'유의어 찾기':'관계 판별') + ' · ' + (retryCount > 0 ? retryCount+'번째 재시도' : '1회차') + '</div>' +
      '<div class="r-score">' + pct + '점</div>' +
      '<div class="r-name">' + studentName + '의 결과</div>' +
      '<div class="r-stats">' +
        '<div class="r-stat"><div class="n" style="color:#1565c0;">' + numCorrect + '</div><div class="l">정답</div></div>' +
        '<div class="r-stat"><div class="n" style="color:#b71c1c;">' + wrongList.length + '</div><div class="l">오답</div></div>' +
        '<div class="r-stat"><div class="n" style="color:#0d47a1;">' + total + '</div><div class="l">총문제</div></div>' +
        '<div class="r-stat"><div class="n" style="color:#283593;">' + elapsed + '분</div><div class="l">소요</div></div>' +
      '</div>' +
      wrongHTML +
      '<div style="margin-top:14px;padding:12px;background:#fff3e0;border-radius:10px;font-size:13px;font-weight:800;color:#e65100;" id="countdownMsg">🔁 3초 후 오답만 다시 풀기...</div>' +
      '<div class="r-btns" style="margin-top:12px;">' +
        '<button class="r-btn ghost" id="retryNowBtn">지금 바로 재시도 🔁</button>' +
        '<button class="r-btn primary" onclick="location.reload()">처음부터 🔄</button>' +
      '</div>' +
    '</div>';

  document.getElementById('retryNowBtn').addEventListener('click', function() {
    clearInterval(countdownTimer);
    res.style.display = 'none';
    retryWrong();
  });

  var sec = 3;
  var countdownTimer = setInterval(function() {
    sec--;
    var msg = document.getElementById('countdownMsg');
    if (msg) {
      if (sec > 0) {
        msg.textContent = '🔁 ' + sec + '초 후 오답만 다시 풀기...';
      } else {
        clearInterval(countdownTimer);
        res.style.display = 'none';
        retryWrong();
      }
    } else {
      clearInterval(countdownTimer);
    }
  }, 1000);
}

function retryWrong() {
  retryCount++;
  if (mode === 'A') {
    var wrongWords = WORDS.filter(function(w) {
      return wrongList.some(function(wl) { return wl.eng === w.eng; });
    });
    if (wrongWords.length === 0) wrongWords = WORDS.filter(function(w){ return w.syn.length > 0; }).slice(0,5);
    questions = [];
    shuffle(wrongWords).forEach(function(w) {
      questions.push({ type: 'M', word: w });
      questions.push({ type: 'S', word: w });
    });
  } else {
    var wrongPairs = wrongList.map(function(wl) {
      var parts = wl.eng.split(' ↔ ');
      return { type:'J', w1: parts[0]?parts[0].trim():wl.eng, w2: parts[1]?parts[1].trim():'', rel: wl.correct==='유의어'?'syn':'ant', kor: wl.kor };
    });
    questions = shuffle(wrongPairs);
  }
  qIdx = 0; numCorrect = 0; numWrong = 0; wrongList = []; startTime = Date.now();
  document.getElementById('pg-result').style.display = 'none';
  document.getElementById('pg-quiz').style.display = 'block';
  renderQ();
}

function saveFirebase(score, correct, wrong, total, elapsed) {
  var isPerfect = wrong === 0 && correct === total;
  var qType = '대성고1_교과서1과_동반의어_' + mode + '모드' + (isPerfect ? '_오답완료' : (retryCount > 0 ? '_오답재시도' : ''));
  try {
    var s1 = document.createElement('script');
    s1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
    s1.onload = function() {
      var s2 = document.createElement('script');
      s2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
      s2.onload = function() {
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp({
              apiKey:"AIzaSyCxS524S8KAaF87DomPtl9sJdF-eqes404",
              authDomain:"bomnalvaca.firebaseapp.com",
              projectId:"bomnalvaca",
              storageBucket:"bomnalvaca.firebasestorage.app",
              messagingSenderId:"115868052300",
              appId:"1:115868052300:web:765c08867b6f1ce0987de9"
            });
          }
          firebase.firestore().collection('quiz_results').add({
            submittedAt: new Date().toISOString(),
            studentName: studentName,
            school: school,
            score: score,
            correct: correct,
            wrong: wrong,
            total: total,
            elapsedMin: elapsed,
            retryCount: retryCount,
            quizType: qType,
            wrongWords: wrongList.map(function(w) {
              return { eng: w.eng||'', kor: w.kor||'', my: w.my||'', src: w.type||'' };
            })
          });
        } catch(e) { console.warn('FB 저장 실패:', e); }
      };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  } catch(e) {}
}
</script>
