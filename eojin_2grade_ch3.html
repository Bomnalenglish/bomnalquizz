  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .main-tab { background: white; border: 3px solid #CBD5E1; border-radius: 18px; padding: 26px 16px; cursor: pointer; transition: all .2s; box-shadow: 0 3px 10px rgba(0,0,0,0.07); text-align: center; }
    .main-tab:hover { border-color: #3B82F6; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(59,130,246,0.18); }
    .main-tab:active { transform: scale(0.97); }
    .main-tab.passage { background: linear-gradient(135deg, #FEF3C7, #FDE68A); border-color: #F59E0B; }
    .main-tab.passage:hover { border-color: #B45309; box-shadow: 0 8px 20px rgba(245,158,11,0.25); }
    .main-tab.dialogue { background: linear-gradient(135deg, #DBEAFE, #BFDBFE); border-color: #3B82F6; }
    .main-tab.dialogue:hover { border-color: #1D4ED8; box-shadow: 0 8px 20px rgba(29,78,216,0.25); }

    .mt-title { font-size: 18px; font-weight: 800; color: #0f172a; letter-spacing: -0.3px; }
    .mt-sub { font-size: 12px; color: #64748b; margin-top: 4px; line-height: 1.4; }
    .mt-count { font-size: 11px; color: #475569; margin-top: 6px; font-weight: 700; background: rgba(255,255,255,0.55); display: inline-block; padding: 3px 10px; border-radius: 10px; }
    .passage .mt-count { color: #92400E; }
    .dialogue .mt-count { color: #1E40AF; }

    /* 대화문 선택 화면용 카드 그리드 */
    .dialogue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 14px 0; }
    .d-card { background: white; border: 2px solid #BFDBFE; border-radius: 12px; padding: 14px 12px; cursor: pointer; transition: all .18s; box-shadow: 0 2px 6px rgba(0,0,0,0.05); text-align: left; }
    .d-card:hover { border-color: #1D4ED8; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(29,78,216,0.18); }
    .d-card:active { transform: scale(0.97); }
    .d-tag { display: inline-block; font-size: 10px; font-weight: 700; color: #1E40AF; background: #DBEAFE; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px; }
    .d-title { font-size: 14px; font-weight: 700; color: #0f172a; }
    .d-sub { font-size: 11px; color: #64748b; margin-top: 4px; }
    .d-count { font-size: 10px; color: #94A3B8; margin-top: 6px; }
    .d-progress { display: inline-block; font-size: 10px; color: #16A34A; background: #F0FDF4; padding: 2px 8px; border-radius: 10px; margin-top: 4px; font-weight: 700; }

    .question-card { background: white; margin: 12px 14px 0; border-radius: 14px; padding: 18px 18px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .q-num { font-size: 12px; font-weight: 700; color: #3B82F6; background: #EFF6FF; padding: 3px 10px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }
    .english-line { font-size: 17px; line-height: 2.2; color: #0f172a; font-weight: 500; word-break: break-word; }
    .korean-line { font-size: 14px; color: #64748b; margin-top: 6px; padding-top: 8px; border-top: 1px dashed #E2E8F0; }
    .blank-group { display: inline-flex; gap: 4px; vertical-align: middle; margin: 0 2px; }
    .letter-box { width: 28px; height: 34px; border: 2px solid #3B82F6; border-radius: 6px; text-align: center; font-size: 16px; font-weight: 600; color: #1e40af; outline: none; padding: 0; background: #F8FAFF; -webkit-user-select: text; user-select: text; }
    .letter-box:focus { border-color: #1D4ED8; background: #DBEAFE; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .letter-box.filled { background: #EFF6FF; }
    .letter-box.correct-box { border-color: #22C55E; background: #F0FDF4; color: #15803D; }
    .letter-box.wrong-box  { border-color: #EF4444; background: #FEF2F2; color: #DC2626; }
    .submit-wrap { padding: 22px 14px 0; }
    .submit-btn { width: 100%; background: linear-gradient(135deg, #3B82F6, #1D4ED8); color: white; border: none; border-radius: 14px; padding: 17px; font-size: 18px; font-weight: 700; cursor: pointer; letter-spacing: -0.3px; box-shadow: 0 4px 14px rgba(29,78,216,0.35); }
    .submit-btn:active { transform: scale(0.98); }
    #start-screen, #dialogue-screen, #test-screen, #result-screen { display: none; }
    #start-screen.active, #dialogue-screen.active, #test-screen.active, #result-screen.active { display: block; }
    .result-header { background: linear-gradient(135deg, #10B981, #059669); color: white; padding: 28px 20px; text-align: center; box-shadow: 0 4px 12px rgba(5,150,105,0.3); }
    .result-header.fail-header { background: linear-gradient(135deg, #F59E0B, #D97706); box-shadow: 0 4px 12px rgba(217,119,6,0.3); }
    .score-big { font-size: 64px; font-weight: 800; line-height: 1; }
    .score-label { font-size: 15px; opacity: 0.9; margin-top: 6px; }
    .result-meta { font-size: 12px; opacity: 0.8; margin-top: 10px; }
    .result-card { background: white; margin: 12px 14px 0; border-radius: 14px; padding: 16px 16px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .result-card .q-num { margin-bottom: 8px; }
    .result-eng { font-size: 15px; line-height: 2; color: #0f172a; font-weight: 500; }
    .result-kor { font-size: 13px; color: #64748b; margin-top: 6px; }
    .answer-row { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #E2E8F0; font-size: 13px; }
    .answer-row span { font-weight: 700; }
    .ok  { color: #16A34A; }
    .bad { color: #DC2626; }
    .screenshot-guide { margin: 14px 14px 0; background: #FFFBEB; border: 2px solid #FCD34D; border-radius: 14px; padding: 16px 16px; font-size: 14px; color: #78350F; line-height: 1.6; }
    .screenshot-guide strong { display: block; font-size: 15px; margin-bottom: 6px; }
    .retry-btn { width: calc(100% - 28px); margin: 16px 14px 0; background: white; border: 2px solid #3B82F6; color: #3B82F6; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .back-btn { width: calc(100% - 28px); margin: 8px 14px 0; background: #F1F5F9; border: 2px solid #94A3B8; color: #475569; border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .tip { text-align: center; font-size: 12px; color: #94A3B8; margin: 12px 14px 0; }
    .test-info-bar { background: #DBEAFE; margin: 14px 14px 0; border-radius: 12px; padding: 10px 14px; font-size: 13px; color: #1E40AF; font-weight: 600; text-align: center; }
    .resume-banner { background: #FEF3C7; margin: 12px 14px 0; border-radius: 12px; padding: 10px 14px; font-size: 12px; color: #92400E; font-weight: 600; text-align: center; border: 1px solid #FCD34D; }
  </style>

<script>
(function(){
  var saved = sessionStorage.getItem('bn_name') || localStorage.getItem('bn_name');
  if(saved){
    window._hubStudentName = saved;
    window.addEventListener('DOMContentLoaded', function(){
      var inputs = document.querySelectorAll('input#student-name, input#nameInput, .name-input');
      inputs.forEach(function(el){ if(!el.value) el.value = saved; });
    });
  }
})();
</script>

<body>

<!-- ====== 시작 화면 (본문/대화문 두 탭) ====== -->
<div id="start-screen" class="active">
  <div class="header">
    <h1>📚 어진중학교 2학년 3과</h1>
    <div class="subtitle">영어 빈칸 시험</div>
    <div class="datetime" id="start-datetime"></div>
  </div>
  <div class="name-section">
    <label for="student-name">이름</label>
    <input type="text" id="student-name" placeholder="이름을 입력하세요"
      autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  </div>
  <p class="tip">💡 본문 또는 대화문을 골라서 시험을 시작하세요.</p>
  <div class="main-tabs">
    <button type="button" class="main-tab passage" onclick="enterPassage()">
      <div class="mt-emoji">📖</div>
      <div class="mt-title">본문</div>
      <div class="mt-sub">Creative Minds of Teens</div>
      <div class="mt-count" id="passage-count-badge">39문장</div>
    </button>
    <button type="button" class="main-tab dialogue" onclick="enterDialogueSelect()">
      <div class="mt-emoji">💬</div>
      <div class="mt-title">대화문</div>
      <div class="mt-sub">선택해서 시험보기</div>
      <div class="mt-count" id="dialogue-count-badge">8개 대화문</div>
    </button>
  </div>
</div>

<!-- ====== 대화문 선택 화면 ====== -->
<div id="dialogue-screen">
  <div class="header">
    <h1>💬 3과 대화문 선택</h1>
    <div class="subtitle">어떤 대화문을 시험볼까요?</div>
  </div>
  <p class="tip">💡 카드를 누르면 바로 시험이 시작돼요.</p>
  <div class="dialogue-grid" id="dialogue-grid"></div>
  <button class="back-btn" onclick="backToStart()">← 처음으로</button>
</div>

<!-- ====== 시험 화면 ====== -->
<div id="test-screen">
  <div class="header">
    <h1>📚 어진중학교 2학년 3과</h1>
    <div class="subtitle" id="test-subtitle">영어 빈칸 시험</div>
    <div class="datetime" id="test-datetime"></div>
  </div>
  <div class="test-info-bar" id="test-info-bar"></div>
  <div id="resume-notice"></div>
  <p class="tip">💡 각 칸에 글자를 하나씩 입력하세요. 자동완성은 지원되지 않습니다.</p>
  <div id="questions-container"></div>
  <div class="submit-wrap">
    <button class="submit-btn" onclick="submitTest()">✅ 제출하고 채점받기</button>
  </div>
  <button class="back-btn" onclick="backToStart()">← 처음으로</button>
</div>

<!-- ====== 결과 화면 ====== -->
<div id="result-screen">
  <div id="result-header-block"></div>
  <div id="result-details"></div>
  <button class="retry-btn" id="retryWrongBtn" onclick="startRetryWrong()" style="display:none;background:#FEF2F2;border-color:#EF4444;color:#DC2626;">❌ 오답 다시 풀기 (<span id="wrongCount">0</span>문제)</button>
  <div id="retryDoneMsg" style="display:none;text-align:center;padding:14px;color:#15803D;font-weight:700;">🎊 오답 0개 달성! 선생님께 전송 완료</div>
  <button class="retry-btn" onclick="restartTest()">🔄 같은 파트 다시 시험</button>
  <button class="back-btn" onclick="backToStart()">← 처음으로</button>
</div>

<!-- Firebase -->
<script type="module">

import{getFirestore,collection,addDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyCxS524S8KAaF87DomPtl9sJdF-eqes404",authDomain:"bomnalvaca.firebaseapp.com",projectId:"bomnalvaca",storageBucket:"bomnalvaca.firebasestorage.app",messagingSenderId:"115868052300",appId:"1:115868052300:web:765c08867b6f1ce0987de9"};
const app=initializeApp(cfg);
const db=getFirestore(app);
window._fbReady=true;
window._saveResult=async(data)=>{

  'main': {

    sentences: [

// ===== 날짜·키 유틸 =====
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function draftKey(sectionKey) { return CHAPTER_KEY + '_draft_' + todayStr() + '_' + sectionKey; }
function blankPosKey(sectionKey) { return CHAPTER_KEY + '_blankpos_' + todayStr() + '_' + sectionKey; }
function tabExitKey() { return CHAPTER_KEY + '_tabexit_' + todayStr(); }
function attemptKey(sectionKey) { return CHAPTER_KEY + '_attempt_' + sectionKey; }


// === 어제 이전 draft / blankpos / tabexit 정리 (그날 것만 남김) ===
function _bnCleanupOldChapterData(){
  try{
    var today = todayStr();
    // 이 챕터의 모든 키를 검사. 날짜가 들어간 키(_draft_/_blankpos_/_tabexit_) 중 오늘이 아닌 것 삭제
    var prefix = CHAPTER_KEY + '_';
    var todayMarker = '_' + today + '_';
    var tabExitToday = CHAPTER_KEY + '_tabexit_' + today;
    var toRemove = [];
    for(var i=0; i<localStorage.length; i++){
      var k = localStorage.key(i);
      if(!k || k.indexOf(prefix) !== 0) continue;
      var isDraft = k.indexOf('_draft_') >= 0;
      var isBlankpos = k.indexOf('_blankpos_') >= 0;
      var isTabexit = k.indexOf('_tabexit_') >= 0;
      if(isDraft || isBlankpos){
        // 키 형식: <CHAPTER_KEY>_draft_<YYYY-MM-DD>_<section> 또는 _blankpos_<...>
        if(k.indexOf(todayMarker) < 0) toRemove.push(k);
      } else if(isTabexit){
        if(k !== tabExitToday) toRemove.push(k);
      }
    }
    toRemove.forEach(function(k){ localStorage.removeItem(k); });
  }catch(e){}
}
_bnCleanupOldChapterData();
function formatDT(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// ===== 토큰화·빈칸 선정 (그날은 위치 고정) =====
function tokenize(sentence) {
  return sentence.trim().split(/\s+/).map(function(tok) {
    var trailMatch = tok.match(/[^A-Za-z0-9]+$/);
    var trail = trailMatch ? trailMatch[0] : '';
    var rest = trail ? tok.slice(0, -trail.length) : tok;
    var leadMatch = rest.match(/^[^A-Za-z0-9]+/);
    var lead = leadMatch ? leadMatch[0] : '';
    var word = rest.slice(lead.length);
    if (!word) { return { word: tok, punct: '', leadPunct: '' }; }
    return { word: word, punct: trail, leadPunct: lead };
  });
}

function pickBlanksForSentence(tokens, sentIdx) {
  // 그날은 같은 빈칸 위치 유지 (localStorage), 새 회차는 새 위치
  // 단, 사용자가 restartTest로 재시작하면 새 위치 생성
  const eligible = tokens.map((t, i) => i).filter(i => tokens[i].word.length >= 3);
  for (let i = eligible.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [eligible[i], eligible[j]] = [eligible[j], eligible[i]];
  }
  return eligible.slice(0, Math.min(2, eligible.length)).sort((a,b)=>a-b);
}

function getOrCreateBlankPositions() {
  const key = blankPosKey(selectedSection);
  const saved = localStorage.getItem(key);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  const positions = SENTENCES.map((sent, si) => pickBlanksForSentence(tokenize(sent.en), si));
  localStorage.setItem(key, JSON.stringify(positions));
  return positions;
}

function regenerateBlankPositions() {
  localStorage.removeItem(blankPosKey(selectedSection));
  return getOrCreateBlankPositions();
}

function buildLetterBoxes(blankId, word) {
  let html = `<span class="blank-group" data-blank="${blankId}">`;
  let inputIdx = 0;
  for (let c = 0; c < word.length; c++) {
    const ch = word[c];
    if (/[^A-Za-z0-9]/.test(ch)) {
      html += `<span style="display:inline-flex;align-items:center;justify-content:center;width:10px;font-size:16px;font-weight:700;color:#3B82F6;">${ch}</span>`;
    } else {
      html += `<input class="letter-box" type="text" maxlength="2"
        id="${blankId}_${inputIdx}" data-blank="${blankId}" data-idx="${inputIdx}" data-charpos="${c}"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text"/>`;
      inputIdx++;
    }
  }
  html += `</span>`;
  return html;
}

function renderQuestions() {
  currentBlanks = [];
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  const positions = getOrCreateBlankPositions();
  const __indices = retryMode ? retryIndices : SENTENCES.map((_, i) => i);
  __indices.forEach(si => {
    const sent = SENTENCES[si];
    const tokens = tokenize(sent.en);
    const blankSet = new Set(positions[si] || []);
    let engHtml = '';
    tokens.forEach((tok, ti) => {
      if (blankSet.has(ti)) {
        const blankId = `q${si}_b${currentBlanks.length}`;
        currentBlanks.push({ blankId, word: tok.word, sentIdx: si });
        if (tok.leadPunct) engHtml += `<span>${tok.leadPunct}</span>`;
        engHtml += buildLetterBoxes(blankId, tok.word);
        if (tok.punct) engHtml += `<span>${tok.punct}</span>`;
        engHtml += ' ';
      } else {
        engHtml += `<span>${tok.leadPunct||''}${tok.word}${tok.punct}</span> `;
      }
    });
    const card = document.createElement('div');
    card.className = 'question-card';
    const __tag = retryMode ? `<span style="margin-left:6px;font-size:11px;background:#FEF2F2;color:#DC2626;padding:2px 8px;border-radius:12px;">오답 재도전</span>` : '';
    card.innerHTML = `<div class="q-num">문제 ${si + 1}${__tag}</div><div class="english-line">${engHtml}</div><div class="korean-line">🇰🇷 ${sent.ko}</div>`;
    container.appendChild(card);
  });
  container.querySelectorAll('.letter-box').forEach(box => {
    box.addEventListener('input', onLetterInput);
    box.addEventListener('keydown', onLetterKeydown);
    box.addEventListener('paste', e => e.preventDefault());
  });
  if (!retryMode) restoreAnswers();
}

function onLetterInput(e) {
  const box = e.target;
  let val = box.value;
  if (val.length > 1) val = val[0];
  val = val.replace(/[^A-Za-z0-9']/g, '');
  box.value = val;
  if (val.length === 1) {
    box.classList.add('filled');
    const next = document.getElementById(`${box.dataset.blank}_${parseInt(box.dataset.idx) + 1}`);
    if (next) next.focus();
  } else {
    box.classList.remove('filled');
  }
  saveAnswers();
}

function onLetterKeydown(e) {
  const box = e.target;
  if (e.key === 'Backspace' && box.value === '') {
    const prev = document.getElementById(`${box.dataset.blank}_${parseInt(box.dataset.idx) - 1}`);
    if (prev) { prev.value = ''; prev.classList.remove('filled'); prev.focus(); saveAnswers(); }
  }
}

function collectAnswer(blankInfo) {
  let ans = '';
  let inputIdx = 0;
  for (let c = 0; c < blankInfo.word.length; c++) {
    const ch = blankInfo.word[c];
    if (/[^A-Za-z0-9]/.test(ch)) { ans += ch; }
    else {
      const box = document.getElementById(`${blankInfo.blankId}_${inputIdx}`);
      ans += box ? (box.value || ' ') : ' ';
      inputIdx++;
    }
  }
  return ans.trim();
}

function saveAnswers() {
  if (!selectedSection) return;
  var data = {};
  var nameEl = document.getElementById('student-name');
  if (nameEl) data['__name__'] = nameEl.value;
  currentBlanks.forEach(function(b) {
    var inputIdx = 0;
    for (var c = 0; c < b.word.length; c++) {
      var ch = b.word[c];
      if (!(/[^A-Za-z0-9]/.test(ch))) {
        var box = document.getElementById(b.blankId + '_' + inputIdx);
        if (box && box.value) data[b.blankId + '_' + inputIdx] = box.value;
        inputIdx++;
      }
    }
  });
  localStorage.setItem(draftKey(selectedSection), JSON.stringify(data));
}

function restoreAnswers() {
  var saved = localStorage.getItem(draftKey(selectedSection));
  if (!saved) return;
  try {
    var data = JSON.parse(saved);
    if (data['__name__']) {
      var nameEl = document.getElementById('student-name');
      if (nameEl && !nameEl.value) nameEl.value = data['__name__'];
    }
    Object.keys(data).forEach(function(key) {
      if (key === '__name__') return;
      var box = document.getElementById(key);
      if (box && data[key]) { box.value = data[key]; box.classList.add('filled'); }
    });
  } catch(e) {}
}

function clearDraft() {
  if (selectedSection) localStorage.removeItem(draftKey(selectedSection));
}

// ===== 제출 =====
function submitTest(auto) {
  const name = document.getElementById('student-name').value.trim() || (auto ? '(자동제출)' : '');
  if (!name) { alert('이름을 먼저 입력해 주세요!'); return; }

  const incomplete = currentBlanks.some(b => {
    const ans = collectAnswer(b);
    const inputLen = b.word.split('').filter(ch => !(/[^A-Za-z0-9]/.test(ch))).length;
    return ans.replace(/[\s\-\.']/g, '').length < inputLen;
  });
  if (!auto && incomplete) {
    if (!confirm('아직 채우지 않은 칸이 있습니다. 그래도 제출할까요?')) return;
  }

  const endDT = new Date();
  let correct = 0;
  let detailsHtml = '';
  const sentResults = {};

  currentBlanks.forEach(b => {
    const userAns = collectAnswer(b);
    const ok = userAns.toLowerCase() === b.word.toLowerCase();
    if (ok) correct++;
    if (!sentResults[b.sentIdx]) sentResults[b.sentIdx] = [];
    sentResults[b.sentIdx].push({ word: b.word, blankId: b.blankId, userAns, ok });
  });

  SENTENCES.forEach((sent, si) => {
    if (!sentResults[si]) return;
    const tokens = tokenize(sent.en);
    let usedBlanks = {};
    let engResult = '';
    tokens.forEach((tok) => {
      const match = sentResults[si].find(r => !usedBlanks[r.blankId] && r.word === tok.word);
      if (match) {
        usedBlanks[match.blankId] = true;
        const cls = match.ok ? 'ok' : 'bad';
        engResult += `<span class="${cls}"><u>${tok.word}</u>${tok.punct}</span> `;
      } else {
        engResult += `${tok.word}${tok.punct} `;
      }
    });
    let answerRows = sentResults[si].map(r =>
      r.ok ? `<span class="ok">✅ "${r.word}" 정답!</span>`
           : `<span class="bad">❌ 정답: <b>${r.word}</b> / 내 답: <b>${r.userAns || '(공백)'}</b></span>`
    ).join('<br>');
    detailsHtml += `<div class="result-card"><div class="q-num">문제 ${si + 1}</div><div class="result-eng">${engResult}</div><div class="result-kor">🇰🇷 ${sent.ko}</div><div class="answer-row">${answerRows}</div></div>`;
  });

  const total = currentBlanks.length;
  const pct   = total > 0 ? Math.round(correct / total * 100) : 0;
  const emoji = pct === 100 ? '🏆' : pct >= 70 ? '😊' : '😢';
  const isPass = pct >= 70;
  const sec = SECTIONS[selectedSection];
  const totalTabExit = parseInt(localStorage.getItem(tabExitKey()) || '0');

  document.getElementById('result-header-block').innerHTML = `
    <div class="result-header ${isPass ? '' : 'fail-header'}">
      <div style="font-size:36px;">${emoji}</div>
      <div class="score-big">${correct} / ${total}</div>
      <div class="score-label">${pct}점 &nbsp;·&nbsp; ${isPass ? '통과 🎉' : '다시 도전!'}</div>
      <div style="font-size:13px;margin-top:8px;opacity:.9;">${sec.emoji} ${sec.tag} · ${sec.title}</div>
      <div class="result-meta">👤 ${name} &nbsp;|&nbsp; 📅 ${formatDT(endDT)} &nbsp;|&nbsp; 📝 ${attemptCount}회차 응시 &nbsp;|&nbsp; ${tabSwitchCount > 0 ? '⚠️ 이번 시험 중 탭이탈 ' + tabSwitchCount + '회' : '✅ 이번 시험 중 탭이탈 없음'} &nbsp;|&nbsp; 📊 오늘 누적 탭이탈 ${totalTabExit}회</div>
    </div>`;
  document.getElementById('result-details').innerHTML = detailsHtml;

  var wrongList = [];
  var wrongIdxList = [];
  Object.keys(sentResults).forEach(function(si) {
    if (sentResults[si].some(function(r){ return !r.ok; })) {
      wrongList.push({ num: parseInt(si)+1, en: SENTENCES[parseInt(si)].en });
      wrongIdxList.push(parseInt(si));
    }
  });
  lastWrongIndices = wrongIdxList;

  if (retryMode && wrongIdxList.length === 0) {
    submitToFirebase(name, correct, total, pct, wrongList, totalTabExit, true);
  } else if (!retryMode) {
    submitToFirebase(name, correct, total, pct, wrongList, totalTabExit, false);
  }

  var retryBtn = document.getElementById('retryWrongBtn');
  var doneMsg = document.getElementById('retryDoneMsg');
  if (wrongIdxList.length > 0) {
    retryBtn.style.display = 'block';
    document.getElementById('wrongCount').textContent = wrongIdxList.length;
    if (doneMsg) doneMsg.style.display = 'none';
  } else {
    retryBtn.style.display = 'none';
    if (retryMode && doneMsg) doneMsg.style.display = 'block';
  }

  clearDraft();
  showScreen('result-screen');
}

function startRetryWrong() {
  if (!lastWrongIndices.length) return;
  retryMode = true;
  retryRound++;
  retryIndices = lastWrongIndices.slice();
  renderQuestions();
  showScreen('test-screen');
}

function submitToFirebase(name, correct, total, pct, wrongList, totalTabExit, isRetryComplete) {
  var wrongNumbers = wrongList.map(function(w){ return w.num + '번'; }).join(', ');
  var wrongSentences = wrongList.map(function(w){ return w.num + '번: ' + w.en; }).join(' / ');
  var sec = SECTIONS[selectedSection];
  var baseType = QUIZ_INFO.school + '_' + QUIZ_INFO.grade + '_' + QUIZ_INFO.chapter + '_빈칸시험_' + sec.tag;

  var data = {
    studentName: name,
    school: QUIZ_INFO.school,
    grade: QUIZ_INFO.grade,
    chapter: QUIZ_INFO.chapter,
    section: sec.tag + ' - ' + sec.title,
    quizType: isRetryComplete ? baseType + '_오답완료' : baseType,
    score: pct,
    correct: correct,
    wrong: total - correct,
    total: total,
    tabSwitchCount: tabSwitchCount,
    tabExitTotalToday: totalTabExit,
    attemptCount: attemptCount,
    retryRound: isRetryComplete ? retryRound : 0,
    wrongNumbers: wrongNumbers,
    wrongSentences: wrongSentences,
    userAgent: navigator.userAgent.substring(0, 100)
  };

  var waited = 0;
  var timer = setInterval(function() {
    waited += 200;
    if (window._saveResult) {
      clearInterval(timer);
      window._saveResult(data);
    } else if (waited >= 6000) {
      clearInterval(timer);
      console.log('Firebase 준비 안됨 - 저장 실패');
    }
  }, 200);
}

function restartTest() {
  // 같은 파트 다시 시험 → 빈칸 위치 새로 생성
  retryMode = false;
  retryRound = 0;
  retryIndices = [];
  lastWrongIndices = [];
  regenerateBlankPositions();
  tabSwitchCount = 0;
  startDateTime = new Date();
  document.getElementById('test-datetime').textContent = '시험 시작: ' + formatDT(startDateTime);
  attemptCount = parseInt(localStorage.getItem(attemptKey(selectedSection)) || '0') + 1;
  localStorage.setItem(attemptKey(selectedSection), attemptCount);
  clearDraft();
  renderQuestions();
  document.getElementById('resume-notice').innerHTML = '';
  showScreen('test-screen');
}

// ===== 탭 이탈 누적 카운터 =====
function incrementTabExitToday() {
  const key = tabExitKey();
  const cur = parseInt(localStorage.getItem(key) || '0') + 1;
  localStorage.setItem(key, cur);
  return cur;
}

(function init() {
  document.getElementById('start-datetime').textContent = '오늘 ' + formatDT(new Date());
  renderProgressBadges();
  var nameInput = document.getElementById('student-name');
  if (nameInput) nameInput.addEventListener('input', function() { saveAnswers(); });

  // 탭 이탈 감지 - 시험 화면에서만 카운트 + 누적 저장
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      const totalToday = incrementTabExitToday();
      if (document.getElementById('test-screen').classList.contains('active')) {
        tabSwitchCount++;
        if (tabSwitchCount >= 3) {
          setTimeout(function() {
            alert('🚨 탭 이탈 3회 초과!\n\n부정행위 방지를 위해 시험이 자동 제출됩니다.\n오늘 누적 탭이탈: ' + totalToday + '회');
            submitTest(true);
          }, 100);
        } else {
          setTimeout(function() {
            alert('⚠️ 다른 탭/창으로 이동이 감지되었습니다!\n\n이번 시험 이탈 횟수: ' + tabSwitchCount + '회 / 3회\n오늘 누적 탭이탈: ' + totalToday + '회\n3회 초과 시 자동 제출됩니다.');
          }, 100);
        }
      }
    }
  });

  // 복사·붙여넣기·잘라내기 차단
  document.addEventListener('copy',  function(e) { e.preventDefault(); });
  document.addEventListener('cut',   function(e) { e.preventDefault(); });
  document.addEventListener('paste', function(e) { e.preventDefault(); });
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && ['c','v','x','a'].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.metaKey && ['c','v','x','a'].includes(e.key.toLowerCase())) e.preventDefault();
  });
})();
</script>
