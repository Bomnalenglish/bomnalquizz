<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날 퀴즈 | 고1 25년 6월 본문 암기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
:root{--pri:#1565c0;--acc:#f57f17;--bg:#e3f2fd;--card:#fff;--bdr:#90caf9;--muted:#757575;--green:#2e7d32;--red:#c62828;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;color:#1a1a2e;}
.hidden{display:none!important;}

/* START */
#startScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.s-card{background:var(--card);border-radius:24px;padding:36px 28px;text-align:center;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(21,101,192,.15);}
.s-card h1{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--pri);margin-bottom:6px;}
.s-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.info-item{background:var(--bg);border-radius:10px;padding:10px;text-align:center;font-size:12px;color:var(--pri);font-weight:700;}
.ni{width:100%;padding:11px 14px;border:2px solid var(--bdr);border-radius:12px;font-size:14px;font-family:'Nanum Gothic',sans-serif;outline:none;margin-bottom:10px;}
.ni:focus{border-color:var(--pri);}
.start-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1565c0,#f57f17);color:white;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* PASSAGE SELECT */
#passageScreen{padding:20px;max-width:680px;margin:0 auto;}
.ps-header{background:linear-gradient(135deg,#1565c0,#1976d2);color:white;border-radius:16px;padding:18px 22px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.ps-title{font-family:'Black Han Sans',sans-serif;font-size:16px;}
.ps-sub{font-size:11px;opacity:.8;margin-top:3px;}
.user-info{background:rgba(255,255,255,.2);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.fb{padding:7px 16px;border:2px solid var(--pri);border-radius:20px;background:white;color:var(--pri);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.fb.on{background:var(--pri);color:white;}
.passage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.p-card{background:white;border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;border:2.5px solid #e0e0e0;transition:all .18s;position:relative;}
.p-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 6px 18px rgba(21,101,192,.12);}
.p-card.sel{border-color:var(--pri);background:#e3f2fd;}
.p-card.done{border-color:#4caf50;background:#e8f5e9;}
.p-no{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--pri);margin-bottom:4px;}
.p-topic{font-size:10px;color:var(--muted);line-height:1.4;}
.p-badge{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;}
.done-badge{background:#e8f5e9;color:#2e7d32;}
.sel-all-btn{width:100%;padding:12px;border-radius:12px;border:2px solid var(--pri);background:white;color:var(--pri);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.go-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1565c0,#f57f17);color:white;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* QUIZ HEADER */
.hdr{background:#1565c0;color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.ht{font-family:'Black Han Sans',sans-serif;font-size:15px;}
.hs{font-size:10px;opacity:.7;margin-top:2px;}
.hb{background:rgba(255,255,255,.2);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:700;}
.pw{height:4px;background:#bbdefb;}.pf{height:100%;background:linear-gradient(90deg,#1565c0,#f57f17);transition:width .4s;}

/* QUIZ AREA */
#quizArea{padding:20px;max-width:680px;margin:0 auto;}
.qc{background:white;border-radius:18px;padding:22px 20px;margin-bottom:16px;box-shadow:0 3px 16px rgba(21,101,192,.08);}
.q-no-badge{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;}
.qno{font-family:'Black Han Sans',sans-serif;font-size:13px;color:white;background:var(--pri);padding:3px 12px;border-radius:12px;}
.qtype{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;}
.qtype.blank{background:#fff3e0;color:#e65100;}
.qtype.tf{background:#f3e5f5;color:#6a1b9a;}
.passage-box{background:#f8faff;border-left:4px solid var(--pri);border-radius:0 10px 10px 0;padding:14px 16px;font-size:14px;line-height:1.9;margin-bottom:14px;color:#1a237e;}
.blank{display:inline-block;min-width:80px;border-bottom:2.5px solid var(--acc);color:transparent;background:#fff3e0;border-radius:4px;padding:0 4px;font-weight:800;vertical-align:middle;}
.q-prompt{font-size:13px;font-weight:700;color:#1565c0;margin-bottom:10px;}
.choices{display:grid;gap:8px;}
.cb{background:#f5f5f5;border:2px solid #e0e0e0;border-radius:11px;padding:12px 15px;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:10px;}
.cb:hover:not(:disabled){border-color:var(--pri);background:#e3f2fd;}
.cb.correct{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;}
.cb.wrong{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.cb.reveal{background:#e8f5e9;border-color:#2e7d32;}
.cn{width:22px;height:22px;border-radius:50%;background:#90caf9;color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tfb{padding:16px;border:2px solid #e0e0e0;border-radius:12px;background:#f5f5f5;font-family:'Nanum Gothic',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;}
.tfb:hover:not(:disabled){transform:translateY(-2px);}
.tfb.ob{border-color:#4caf50;color:#2e7d32;}.tfb.xb{border-color:#e91e63;color:#880e4f;}
.tfb.correct{background:#e8f5e9;}.tfb.wrong{background:#ffebee;}
.fb-msg{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:800;margin-top:10px;display:none;}
.fb-msg.ok{background:#e8f5e9;color:#1b5e20;display:block;}
.fb-msg.no{background:#ffebee;color:#b71c1c;display:block;}

/* RESULT */
#resultScreen{padding:20px;max-width:600px;margin:0 auto;}
.rc{background:white;border-radius:24px;padding:30px 22px;box-shadow:0 8px 32px rgba(21,101,192,.1);text-align:center;}
.rs{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--pri);line-height:1;}
.rsub{font-size:13px;color:var(--muted);margin-top:4px;}
.sr{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap;}
.si{text-align:center;}.sn{font-family:'Black Han Sans',sans-serif;font-size:24px;}.sl{font-size:11px;color:var(--muted);margin-top:2px;}
.wl{background:var(--bg);border-radius:14px;padding:14px;text-align:left;margin-top:14px;max-height:300px;overflow-y:auto;}
.wl h3{font-size:12px;font-weight:800;color:var(--red);margin-bottom:8px;}
.wi{background:white;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:11px;border-left:3px solid #e91e63;}
.wie{font-weight:800;color:var(--pri);}.wid{font-size:10px;color:var(--muted);margin-top:2px;}
.rbtns{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.rbtn{padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.rbtn-p{background:linear-gradient(135deg,#1565c0,#f57f17);color:white;}
.rbtn-s{background:#f5f5f5;color:#1565c0;border:2px solid #90caf9;}

@media(max-width:480px){.passage-grid{grid-template-columns:repeat(3,1fr)}.tf-btns{grid-template-columns:1fr 1fr}}
</style>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const cfg={apiKey:"AIzaSyCxS524S8KAaF87DomPtl9sJdF-eqes404",authDomain:"bomnalvaca.firebaseapp.com",projectId:"bomnalvaca",storageBucket:"bomnalvaca.firebasestorage.app",messagingSenderId:"115868052300",appId:"1:115868052300:web:765c08867b6f1ce0987de9"};

</script>
</head>

<div id="startScreen">
  <div class="s-card">

      <div class="info-item">📝 21~24 · 29~40번</div>

  <button class="go-btn" onclick="startQuiz()">선택한 지문 풀기 🚀</button>
</div>

<!-- QUIZ HEADER (sticky) -->
<div id="hdr" class="hdr hidden">
  <div><div class="ht">📖 고1 25년 6월 본문 암기</div><div class="hs" id="hs"></div></div>
  <div class="hb" id="hb">0/0</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────
// 각 지문: blanks = 진짜 영어 빈칸 추론, topic_q = 주제/요지 선택
const PASSAGES = [
  {no:21,topic:`행동이 생각을 만든다`,text:`It is common sense that people's inner beliefs may drive their external behavior. If you're attracted to a certain person, you should be more likely to socialize with that person. If you favor a brand of toothpaste, you're more likely to buy it. Of course, our internal thoughts don't always predict our public behavior, but, overall, what we do obviously reflects what we think. But beliefs and behaviors are also related in a more [remarkable] way. It turns out that the [arrow] is as likely to point in the [reverse direction]. As social psychologist David Myers observes, "If social psychology has taught us anything during the last 25 years, it is that we are likely not only to think ourselves into a way of acting but also to [act ourselves into a way of thinking]."`,blanks:[{sentence:`Beliefs and behaviors are also related in a more _____ way.`,opts:[`remarkable`,`simple`,`logical`,`ordinary`],ans:`remarkable`},{sentence:`The _____ is as likely to point in the reverse direction.`,opts:[`arrow`,`thought`,`belief`,`behavior`],ans:`arrow`},{sentence:`The arrow is as likely to point in the _____.`,opts:[`same direction`,`reverse direction`,`wrong direction`,`right direction`],ans:`reverse direction`},{sentence:`We are likely not only to think ourselves into a way of acting but also to _____.`,opts:[`act ourselves into a way of thinking`,`think harder before acting`,`control our beliefs`,`follow our instincts`],ans:`act ourselves into a way of thinking`},{sentence:`If you favor a brand of toothpaste, you're more likely to _____ it.`,opts:[`sell`,`reject`,`buy`,`make`],ans:`buy`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`내면의 믿음과 외면의 행동은 서로 독립적으로 작용한다`,`행동은 생각을 반영할 뿐만 아니라 행동이 생각을 형성할 수도 있다`,`자신의 생각을 행동으로 옮길 때 사회적 기준이 영향을 준다`,`사람의 행동은 오직 내면의 신념과 감정에 의해 결정된다`],ans:`행동은 생각을 반영할 뿐만 아니라 행동이 생각을 형성할 수도 있다`},tf:[{stmt:`내면의 생각이 외부 행동을 이끄는 것은 상식이다.`,ans:true,exp:`common sense라고 본문에 명시됨`},{stmt:`우리의 내면 생각은 항상 공적 행동을 예측한다.`,ans:false,exp:`항상 예측하지는 않는다(don't always predict)고 함`},{stmt:`David Myers는 행동이 생각을 만들어낼 수도 있음을 보여주었다.`,ans:true,exp:`act ourselves into a way of thinking — 직접 인용됨`}]},
  {no:22,topic:`침묵의 서약과 듣기`,text:`Imagine following the spirit of a silence vow into daily life. Challenge yourself to spend an entire day saying only what you absolutely must say. It's been widely observed by behavioral psychology experts and anyone who's ever been on a first date that we too often tend to treat "conversation" as a game of [waiting for our own turn to speak]. We miss what's being said because we're mentally [rehearsing] our next utterance. What if you could eliminate the idea that the next available mini-silence is your next [opening] to express whatever is in your head? What if you were limited to, say, [fifty spoken words] tomorrow? I think you'd listen quite differently. You'd attend quite carefully to every word you heard. You might discover that [the less you say, the more you hear].`,blanks:[{sentence:`We treat conversation as a game of _____.`,opts:[`listening carefully`,`waiting for our own turn to speak`,`asking questions`,`exchanging ideas`],ans:`waiting for our own turn to speak`},{sentence:`We miss what's being said because we're mentally _____ our next utterance.`,opts:[`forgetting`,`ignoring`,`rehearsing`,`repeating`],ans:`rehearsing`},{sentence:`The next mini-silence is your next _____ to express whatever is in your head.`,opts:[`opening`,`barrier`,`punishment`,`challenge`],ans:`opening`},{sentence:`What if you were limited to, say, _____ tomorrow?`,opts:[`one hundred questions`,`fifty spoken words`,`ten conversations`,`no listening`],ans:`fifty spoken words`},{sentence:`You might discover that _____.`,opts:[`the more you say, the more you hear`,`the less you say, the more you hear`,`silence is meaningless`,`talking is always better`],ans:`the less you say, the more you hear`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`첫 데이트에서 침묵을 피해야 하는 이유`,`말을 줄이면 다른 사람의 말을 더 잘 들을 수 있다`,`심리학자들이 권하는 효과적인 대화 기술`,`침묵 서약을 평생 실천하는 방법`],ans:`말을 줄이면 다른 사람의 말을 더 잘 들을 수 있다`},tf:[{stmt:`사람들은 대화를 자기 차례를 기다리는 게임처럼 다루는 경향이 있다.`,ans:true,exp:`본문에 직접 언급됨`},{stmt:`다음 발언을 머릿속에서 연습하느라 상대의 말을 놓친다.`,ans:true,exp:`rehearsing our next utterance — 직접 언급`},{stmt:`말을 많이 할수록 더 많이 듣게 된다.`,ans:false,exp:`the less you say, the more you hear — 반대`}]},
  {no:23,topic:`지식과 행동`,text:`Science is concerned with [accumulating] and understanding observations of the physical world. That understanding alone solves no problems. Individual people have to [act] on that understanding for it to help solve problems. For instance, science has found that regular exercise can lower your risk of heart disease. Knowing this fact is interesting, but it will do nothing for your personal health unless you [act on it] and actually exercise. And that's the [hard part]. Reading an article about exercise is easy. Getting into an actual routine of regular exercise is harder. In this sense, science really solves no problems at all. In fact, many of humanity's biggest problems are caused by [lack of action], and not lack of knowledge.`,blanks:[{sentence:`Science is concerned with _____ and understanding observations of the physical world.`,opts:[`ignoring`,`accumulating`,`rejecting`,`hiding`],ans:`accumulating`},{sentence:`Individual people have to _____ on that understanding for it to help solve problems.`,opts:[`forget`,`act`,`wait`,`argue`],ans:`act`},{sentence:`It will do nothing for your health unless you _____ and actually exercise.`,opts:[`read about it`,`act on it`,`remember it`,`discuss it`],ans:`act on it`},{sentence:`And that's the _____.`,opts:[`easy part`,`fun part`,`hard part`,`useless part`],ans:`hard part`},{sentence:`Many of humanity's biggest problems are caused by _____, and not lack of knowledge.`,opts:[`lack of action`,`lack of money`,`lack of science`,`lack of leaders`],ans:`lack of action`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`과학자들이 더 많은 연구를 해야 하는 이유`,`과학적 지식은 행동으로 옮겨질 때에만 문제를 해결할 수 있다`,`심장병을 예방하는 운동의 효과`,`인류가 직면한 가장 큰 문제들의 원인`],ans:`과학적 지식은 행동으로 옮겨질 때에만 문제를 해결할 수 있다`},tf:[{stmt:`이해 그 자체만으로 문제를 해결할 수 있다.`,ans:false,exp:`understanding alone solves no problems — 반대`},{stmt:`운동에 관한 글을 읽는 것보다 실제 운동 습관을 만드는 것이 더 어렵다.`,ans:true,exp:`Reading is easy, getting into routine is harder — 직접 언급`},{stmt:`인류의 큰 문제는 주로 지식 부족 때문이다.`,ans:false,exp:`lack of action, NOT lack of knowledge`}]},
  {no:24,topic:`인간 인식의 주관성`,text:`We think we're being [logical], objective, and rational — and therefore accurate in our analysis, judgment, and decisions. So we think that if other people are logical, objective, and rational, they will agree with us and see what we see. But [the opposite is the case]. Every human brain is different. Everyone's life experience is different. Everyone's desires and knowledge are different. You might think you're being realistic — that is, that your ideas match reality, but that's impossible. It's only your [interpretation of reality], which will always be different from someone else's. When two nations play each other in the World Cup, the fans of each country [criticize the referees] for missing all the infractions that the other team commits. Without fail, each fan base believes that the referees are [biased] against their team.`,blanks:[{sentence:`We think we're being _____, objective, and rational.`,opts:[`emotional`,`logical`,`biased`,`random`],ans:`logical`},{sentence:`But _____.`,opts:[`everyone agrees`,`the opposite is the case`,`it doesn't matter`,`we are always right`],ans:`the opposite is the case`},{sentence:`It's only your _____, which will always be different from someone else's.`,opts:[`objective fact`,`interpretation of reality`,`perfect logic`,`absolute truth`],ans:`interpretation of reality`},{sentence:`The fans of each country _____ for missing all the infractions that the other team commits.`,opts:[`thank the referees`,`criticize the referees`,`ignore the referees`,`support the referees`],ans:`criticize the referees`},{sentence:`Each fan base believes that the referees are _____ against their team.`,opts:[`fair`,`neutral`,`biased`,`helpful`],ans:`biased`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`월드컵 축구의 심판 판정 기준`,`인간의 인식은 항상 주관적이며 사람마다 다르다`,`논리적이고 객관적으로 사고하는 방법`,`스포츠 팬들이 자국 팀을 응원하는 심리`],ans:`인간의 인식은 항상 주관적이며 사람마다 다르다`},tf:[{stmt:`모든 인간의 뇌, 경험, 욕구, 지식은 다르다.`,ans:true,exp:`본문에 모두 different라고 언급됨`},{stmt:`당신의 생각이 현실과 정확히 일치할 수 있다.`,ans:false,exp:`that's impossible — 불가능하다`},{stmt:`월드컵에서 양국 팬은 심판이 자기 팀에 편파적이라고 믿는다.`,ans:true,exp:`biased against their team — 직접 언급`}]},
  {no:29,topic:`전문가의 조직된 지식`,text:`Studies of experts provide insight into what it means to have deep and [flexible understanding]. Experts in a particular domain are people who have deep, [richly interconnected] ideas about the world. They are not just good thinkers or people who are exceptionally smart. Rather, experts have knowledge in a [specific domain] — such as chess, chemistry, or tennis — and are not [generalists]. However, experts do not just know "a bunch of facts." In fact, having expertise in a topic means that knowledge is organized into [coherent frameworks], and the expert understands the interrelationship between facts and can distinguish which ideas are most central.`,blanks:[{sentence:`Studies of experts provide insight into having deep and _____.`,opts:[`narrow knowledge`,`flexible understanding`,`fixed memory`,`simple ideas`],ans:`flexible understanding`},{sentence:`Experts have deep, _____ ideas about the world.`,opts:[`loosely related`,`richly interconnected`,`rarely tested`,`easily forgotten`],ans:`richly interconnected`},{sentence:`Experts have knowledge in a _____, such as chess, chemistry, or tennis.`,opts:[`general field`,`specific domain`,`random topic`,`broad area`],ans:`specific domain`},{sentence:`Experts are not _____.`,opts:[`specialists`,`thinkers`,`generalists`,`professionals`],ans:`generalists`},{sentence:`Expertise means that knowledge is organized into _____.`,opts:[`random lists`,`coherent frameworks`,`isolated facts`,`simple categories`],ans:`coherent frameworks`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`전문가가 되는 데 필요한 시간과 노력`,`전문가는 단순한 사실의 나열이 아니라 조직된 틀로 지식을 가진다`,`체스, 화학, 테니스 전문가들의 공통점`,`일반적인 사고력과 특수한 사고력의 차이`],ans:`전문가는 단순한 사실의 나열이 아니라 조직된 틀로 지식을 가진다`},tf:[{stmt:`전문가는 단순히 사고를 잘하거나 특별히 똑똑한 사람일 뿐이다.`,ans:false,exp:`단순히 그런 사람이 아니라고(not just) 했음`},{stmt:`전문가는 일반론자가 아니라 특정 영역에 지식을 가진 사람이다.`,ans:true,exp:`specific domain, not generalists — 직접 언급`},{stmt:`전문가의 지식은 정합적인 틀로 조직되어 있다.`,ans:true,exp:`coherent frameworks — 직접 언급`}]},
  {no:30,topic:`생태학적 오류`,text:`It is natural for people to observe happenings and then seek explanations for why those happenings occurred. But sometimes the reasoning is wrong because of one or more [misconceptions]. One of these is the [ecological fallacy], where an argument claims that there is a [causal relationship] between two things merely because they occur together. For example, in the 1950s it was found that crime rates were the highest in neighborhoods where immigrants were most numerous. Some people used this "co-occurrence" to argue that immigrants were a cause of crime. But a careful analysis of this situation revealed that immigrants were [forced to live] in neighborhoods where crime rates were already high; they could not afford more expensive housing in safer neighborhoods. Immigrants themselves committed very [few] of the crimes.`,blanks:[{sentence:`Sometimes the reasoning is wrong because of one or more _____.`,opts:[`misconceptions`,`facts`,`evidence`,`experts`],ans:`misconceptions`},{sentence:`One of these is the _____.`,opts:[`scientific method`,`ecological fallacy`,`logical conclusion`,`social theory`],ans:`ecological fallacy`},{sentence:`An argument claims that there is a _____ between two things merely because they occur together.`,opts:[`chance event`,`weak link`,`causal relationship`,`minor difference`],ans:`causal relationship`},{sentence:`Careful analysis revealed that immigrants were _____ in neighborhoods where crime rates were already high.`,opts:[`happy to live`,`forced to live`,`rarely seen`,`free to leave`],ans:`forced to live`},{sentence:`Immigrants themselves committed very _____ of the crimes.`,opts:[`many`,`few`,`all`,`most`],ans:`few`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`이민자 정책을 강화해야 하는 이유`,`두 현상의 동시 발생을 인과관계로 잘못 해석하는 생태학적 오류를 조심해야 한다`,`1950년대 사회 문제의 다양한 원인`,`범죄율이 높은 동네의 특징`],ans:`두 현상의 동시 발생을 인과관계로 잘못 해석하는 생태학적 오류를 조심해야 한다`},tf:[{stmt:`생태학적 오류는 동시 발생을 인과관계로 잘못 보는 오류이다.`,ans:true,exp:`본문 직접 언급`},{stmt:`1950년대 이민자들이 실제로 범죄의 큰 원인이었음이 밝혀졌다.`,ans:false,exp:`이민자들 자신은 범죄를 거의 저지르지 않았다고 함`},{stmt:`이민자들은 더 안전한 동네의 주거비를 감당할 수 없었다.`,ans:true,exp:`could not afford more expensive housing — 직접 언급`}]},
  {no:31,topic:`지능과 문화적 맥락`,text:`In everyday life, we use [previous experience] to predict where we should pay attention. Different environments create different [expectations]. This was profoundly illustrated by the scientist Jared Diamond in his book Guns, Germs, and Steel. He describes an adventure wandering through the New Guinea jungle with native New Guineans. He relates that these natives tend to perform poorly at tasks Westerners have been trained to do since childhood. But they are hardly [stupid]. They can detect the most [subtle changes] in the jungle, good for following the tracks of a predator or for finding the way back home. They know which insects to leave alone, know where food exists, can build and tear down shelters with ease. What counts as intelligence can [shift dramatically] depending on the demands of a particular setting.`,blanks:[{sentence:`In everyday life, we use _____ to predict where we should pay attention.`,opts:[`intuition only`,`previous experience`,`random guesses`,`logical proof`],ans:`previous experience`},{sentence:`Different environments create different _____.`,opts:[`dangers`,`expectations`,`habits`,`languages`],ans:`expectations`},{sentence:`The natives are hardly _____.`,opts:[`clever`,`trained`,`stupid`,`experienced`],ans:`stupid`},{sentence:`They can detect the most _____ in the jungle.`,opts:[`obvious dangers`,`subtle changes`,`loud noises`,`common animals`],ans:`subtle changes`},{sentence:`What counts as intelligence can _____ depending on the demands of a particular setting.`,opts:[`stay constant`,`disappear entirely`,`shift dramatically`,`improve slightly`],ans:`shift dramatically`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`뉴기니 부족의 독특한 생활 방식`,`지능은 고정된 특성이 아니라 환경과 문화적 맥락에 따라 달라진다`,`서구 교육 시스템의 우수성`,`정글에서 살아남는 데 필요한 기술들`],ans:`지능은 고정된 특성이 아니라 환경과 문화적 맥락에 따라 달라진다`},tf:[{stmt:`뉴기니 원주민은 서양식 과제를 잘 수행한다.`,ans:false,exp:`서양식 과제는 잘 못한다고 함(perform poorly)`},{stmt:`원주민들은 정글의 미묘한 변화를 잘 감지한다.`,ans:true,exp:`subtle changes — 직접 언급`},{stmt:`Diamond도 정글에서 원주민과 같은 능력을 발휘할 수 있다.`,ans:false,exp:`Diamond는 그런 능력이 없다(no ability)고 함`}]},
  {no:32,topic:`초기 시장 점유율과 가격`,text:`Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services and then make the mistake of [overpricing] them. They have created something they care deeply about, it's theirs, and this powerful sense of [ownership] distorts their perception of value which causes them to overprice their products. While many of them are quick to realize that their initial prices are too high, not all these people are happy or willing to drop their prices. When you launch a new product or service, your priority should be to get sufficient [market adoption] as soon as possible and you should be ready to [sacrifice] your initial prices and profits to achieve this aim. Once you have strong sales volumes, you can [increase] your prices to maximize your profits.`,blanks:[{sentence:`Most entrepreneurs make the mistake of _____ their products.`,opts:[`overpricing`,`underpricing`,`hiding`,`duplicating`],ans:`overpricing`},{sentence:`This powerful sense of _____ distorts their perception of value.`,opts:[`ownership`,`loss`,`doubt`,`freedom`],ans:`ownership`},{sentence:`Your priority should be to get sufficient _____ as soon as possible.`,opts:[`market adoption`,`advertising budget`,`expert opinion`,`raw materials`],ans:`market adoption`},{sentence:`You should be ready to _____ your initial prices and profits.`,opts:[`sacrifice`,`double`,`hide`,`lock`],ans:`sacrifice`},{sentence:`Once you have strong sales volumes, you can _____ your prices.`,opts:[`lower`,`abandon`,`freeze`,`increase`],ans:`increase`}],topic_q:{q:`이 글의 요지로 가장 적절한 것은?`,opts:[`창업가의 시간과 노력은 항상 보상받는다`,`신제품 출시 시에는 초기 가격을 낮춰 시장 점유를 우선시해야 한다`,`고가 정책이 장기적 수익을 보장한다`,`제품 가치는 창업자가 결정해야 한다`],ans:`신제품 출시 시에는 초기 가격을 낮춰 시장 점유를 우선시해야 한다`},tf:[{stmt:`강한 소유감이 창업가의 가치 인식을 왜곡한다.`,ans:true,exp:`sense of ownership distorts perception — 직접 언급`},{stmt:`창업가들은 모두 기꺼이 가격을 내릴 의향이 있다.`,ans:false,exp:`not all are happy or willing to drop prices`},{stmt:`강한 판매량이 확보된 후에는 가격을 올려 수익을 극대화할 수 있다.`,ans:true,exp:`Once you have strong sales, you can increase prices — 직접 언급`}]},
  {no:33,topic:`인간의 느린 번식 전략`,text:`In most respects, humans are one of a relatively small number of species that evolved a very different strategy of investing more energy to reproduce more [slowly]. Like apes and elephants, we mature at a [leisurely pace], grow large bodies, and have few babies but devote much time and energy to raising them well. This unusual strategy — live [long], die [old], and reproduce [slowly] — succeeds because while apes and elephants produce fewer babies than mice, a larger percentage of their offspring [survive] to then reproduce. A house mouse can become a mother when she is just five weeks old, has four to ten pups per litter, and can have a new litter every two months over the course of her approximately twelve-month life. However, the vast majority of her pups die young.`,blanks:[{sentence:`Humans evolved a strategy of investing more energy to reproduce more _____.`,opts:[`quickly`,`slowly`,`often`,`randomly`],ans:`slowly`},{sentence:`We mature at a _____.`,opts:[`rapid pace`,`leisurely pace`,`varying pace`,`delayed pace`],ans:`leisurely pace`},{sentence:`Live _____, die _____, and reproduce slowly.`,opts:[`short / young`,`long / old`,`alone / together`,`quickly / fast`],ans:`long / old`},{sentence:`A larger percentage of their offspring _____ to then reproduce.`,opts:[`die`,`survive`,`leave`,`fight`],ans:`survive`},{sentence:`A house mouse can have a new litter every _____ over her twelve-month life.`,opts:[`five weeks`,`two months`,`six months`,`year`],ans:`two months`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`쥐의 번식 능력의 우수성`,`인간과 유인원·코끼리는 느리게 자손을 적게 낳지만 잘 살아남는 번식 전략을 따른다`,`포유류의 다양한 종류와 분포`,`야생 동물의 수명을 늘리는 방법`],ans:`인간과 유인원·코끼리는 느리게 자손을 적게 낳지만 잘 살아남는 번식 전략을 따른다`},tf:[{stmt:`인간은 자손을 빨리, 많이 낳는 종에 속한다.`,ans:false,exp:`느리게 적게 낳는다(reproduce more slowly)`},{stmt:`유인원과 코끼리는 새끼 중 더 큰 비율이 살아남는다.`,ans:true,exp:`larger percentage of offspring survive — 직접 언급`},{stmt:`집쥐는 약 12개월의 수명을 갖는다.`,ans:true,exp:`approximately twelve-month life — 직접 언급`}]},
  {no:34,topic:`과학적 지식의 공유`,text:`When scientists make an important new discovery or experimentally prove some hypothesis, they do not, in general, keep that information to themselves so that they alone can consider its meaning and derive additional theories from it. Instead, they [publish] their results and make their data [available for inspection]. This makes it possible for other scientists to reconsider their data and possibly [refute] their conclusions. More important, though, it makes it possible for other scientists to use that data to [construct new hypotheses] and perform new experiments. The assumption is that society as a whole will end up knowing more if information is [spread as widely as possible], rather than being limited to a few people. In a strict sense, every scientist depends on the work of other scientists.`,blanks:[{sentence:`Scientists do not keep information to themselves; instead, they _____ their results.`,opts:[`hide`,`publish`,`destroy`,`lock up`],ans:`publish`},{sentence:`They make their data _____.`,opts:[`available for inspection`,`hidden from view`,`limited to friends`,`private property`],ans:`available for inspection`},{sentence:`Other scientists can reconsider the data and possibly _____ their conclusions.`,opts:[`accept`,`refute`,`memorize`,`publish`],ans:`refute`},{sentence:`Other scientists can use that data to _____ and perform new experiments.`,opts:[`forget old results`,`construct new hypotheses`,`stop research`,`claim ownership`],ans:`construct new hypotheses`},{sentence:`Society will end up knowing more if information is _____.`,opts:[`spread as widely as possible`,`kept secret`,`sold for profit`,`ignored entirely`],ans:`spread as widely as possible`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`과학자가 데이터를 비밀로 해야 하는 이유`,`과학자들은 발견을 공유함으로써 집단적 지식 발전에 기여한다`,`과학 출판물의 역사와 발전`,`과학자들 사이의 경쟁과 협력의 균형`],ans:`과학자들은 발견을 공유함으로써 집단적 지식 발전에 기여한다`},tf:[{stmt:`과학자들은 일반적으로 발견을 자신만의 것으로 보관한다.`,ans:false,exp:`그렇게 하지 않는다(do not keep to themselves)`},{stmt:`다른 과학자들은 공유된 데이터를 통해 새로운 가설을 세울 수 있다.`,ans:true,exp:`construct new hypotheses — 직접 언급`},{stmt:`정보를 소수에게만 제한하는 것이 사회 전체 지식 증진에 더 좋다.`,ans:false,exp:`널리 퍼뜨릴수록 사회가 더 많이 안다고 함`}]},
  {no:35,topic:`기억의 재구성 과정`,text:`In the 1930s, the British psychologist Sir Frederic Bartlett asked people to listen to folktales from other countries and then recall these stories at a later date. As you might guess, [unfamiliar] stories were not remembered as well as [familiar] stories. Surprisingly, however, errors in memory were not [random]. Rather, subjects often [rewrote] similar parts of the stories in their own minds — particularly the parts that made the least sense to them. Bartlett concluded that when facing problems, humans draw upon [mental schemata], or shelves of stored knowledge in our brains, to fill in any minor gaps in our memories. Therefore, remembering is an [imaginative process] that involves building upon past experiences.`,blanks:[{sentence:`_____ stories were not remembered as well as familiar stories.`,opts:[`Unfamiliar`,`Long`,`Simple`,`Modern`],ans:`Unfamiliar`},{sentence:`Unfamiliar stories were not remembered as well as _____ stories.`,opts:[`unfamiliar`,`familiar`,`exotic`,`boring`],ans:`familiar`},{sentence:`Surprisingly, errors in memory were not _____.`,opts:[`complete`,`random`,`important`,`few`],ans:`random`},{sentence:`Subjects often _____ similar parts of the stories in their own minds.`,opts:[`forgot`,`rewrote`,`ignored`,`verified`],ans:`rewrote`},{sentence:`Humans draw upon _____, or shelves of stored knowledge.`,opts:[`mental schemata`,`random memories`,`verbal scripts`,`physical objects`],ans:`mental schemata`},{sentence:`Remembering is an _____ that involves building upon past experiences.`,opts:[`accurate copy`,`imaginative process`,`fixed record`,`neutral act`],ans:`imaginative process`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`옛 영국 심리학자의 생애와 업적`,`기억은 정확한 복사가 아니라 도식을 활용한 재구성 과정이다`,`민간 설화를 잘 기억하는 방법`,`친숙한 이야기가 더 재미있는 이유`],ans:`기억은 정확한 복사가 아니라 도식을 활용한 재구성 과정이다`},tf:[{stmt:`친숙한 이야기는 낯선 이야기보다 더 잘 기억되었다.`,ans:true,exp:`본문 직접 언급`},{stmt:`기억의 오류는 완전히 무작위적이었다.`,ans:false,exp:`무작위가 아니었다(not random)`},{stmt:`사람들은 이해가 안 되는 부분을 자기 식대로 다시 쓴다.`,ans:true,exp:`least sense → rewrote — 직접 언급`}]},
  {no:36,topic:`역사 반복의 단순화 오류`,text:`History, people often say, [repeats itself]. And looking at the historical records of the ancient civilizations, some things do seem to happen again and again. Civilizations expand, get [overextended], and then collapse as in the cases of Rome, which went under in 476 AD, and the British Empire, which fell apart more than a thousand years later in the post-World War II era. But is this [always the case]? If so, archaeology would be pretty boring; one thing would happen again and again. But that's not what archaeologists see. Some civilizations end suddenly, like the Aztec and Inca, [conquered by invaders] in the 1520s AD. Those empires never had the chance to collapse as a result of overexpansion. So in the case of civilizations, "history repeats itself" seems to be an [oversimplification].`,blanks:[{sentence:`History, people often say, _____.`,opts:[`repeats itself`,`stays the same`,`moves backward`,`is forgotten`],ans:`repeats itself`},{sentence:`Civilizations expand, get _____, and then collapse.`,opts:[`smaller`,`overextended`,`richer`,`younger`],ans:`overextended`},{sentence:`But is this _____?`,opts:[`always the case`,`rarely true`,`impossible`,`obvious`],ans:`always the case`},{sentence:`Aztec and Inca were _____ in the 1520s AD.`,opts:[`protected by allies`,`conquered by invaders`,`forgotten by history`,`saved by science`],ans:`conquered by invaders`},{sentence:`"History repeats itself" seems to be an _____.`,opts:[`exact truth`,`ancient saying`,`oversimplification`,`untested theory`],ans:`oversimplification`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`로마와 영국 제국의 멸망 원인 비교`,`'역사는 반복된다'는 말은 모든 문명에 적용되지 않는 단순화이다`,`아즈텍과 잉카 제국의 정복 과정`,`고대 문명을 연구하는 고고학의 가치`],ans:`'역사는 반복된다'는 말은 모든 문명에 적용되지 않는 단순화이다`},tf:[{stmt:`로마와 영국 제국은 과도한 확장 후 붕괴했다.`,ans:true,exp:`expand, overextended, collapse — 직접 언급`},{stmt:`모든 문명이 동일한 방식으로 멸망한다.`,ans:false,exp:`아즈텍·잉카는 침략자에게 정복됨 — 다른 패턴`},{stmt:`아즈텍과 잉카 제국은 과도 확장으로 멸망할 기회조차 없었다.`,ans:true,exp:`never had the chance to collapse from overexpansion`}]},
  {no:37,topic:`성장 마인드셋과 노력 칭찬`,text:`Stanford psychology professor Dr. Carol Dweck is the internationally recognized pioneer of the concept of "[growth mindset]" as a way to continually grow, learn, and persevere in our efforts. Dweck found that kids who are told they're "smart" actually [underperform] in future tasks, by choosing [easier tasks] to avoid evidence that they are not smart, which Dweck calls having a "[fixed mindset]." In contrast, Dweck found, kids who are praised not for their smarts but for their [effort] develop what Dweck calls a "growth mindset." They learn that their effort is what led to their success, and if they continue to try hard, over time they'll improve and achieve more things.`,blanks:[{sentence:`Dweck pioneered the concept of "_____".`,opts:[`growth mindset`,`talent mindset`,`smart mindset`,`fixed mindset`],ans:`growth mindset`},{sentence:`Kids told they're "smart" actually _____ in future tasks.`,opts:[`overperform`,`succeed`,`underperform`,`remain stable`],ans:`underperform`},{sentence:`They choose _____ to avoid evidence that they are not smart.`,opts:[`easier tasks`,`harder tasks`,`creative tasks`,`group tasks`],ans:`easier tasks`},{sentence:`This is what Dweck calls having a "_____".`,opts:[`growth mindset`,`learning mindset`,`fixed mindset`,`open mindset`],ans:`fixed mindset`},{sentence:`Kids praised not for their smarts but for their _____ develop a growth mindset.`,opts:[`age`,`appearance`,`effort`,`luck`],ans:`effort`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`스탠퍼드 대학교의 심리학 교육 프로그램`,`지능보다 노력을 칭찬하는 것이 성장 마인드셋과 지속적 발전을 가져온다`,`어려운 과제를 회피하는 아이들의 심리`,`어린 시절의 칭찬이 인생에 미치는 다양한 영향`],ans:`지능보다 노력을 칭찬하는 것이 성장 마인드셋과 지속적 발전을 가져온다`},tf:[{stmt:`'똑똑하다'고 칭찬받은 아이들은 미래 과제에서 더 잘한다.`,ans:false,exp:`오히려 underperform한다고 함`},{stmt:`노력에 대한 칭찬은 성장 마인드셋을 발달시킨다.`,ans:true,exp:`praised for effort → growth mindset — 직접 언급`},{stmt:`성장 마인드셋을 가진 아이들은 더 어려운 일에 도전한다.`,ans:true,exp:`take on tougher things — 직접 언급`}]},
  {no:38,topic:`지하철 좌석 선택과 감정`,text:`To monitor our surroundings is to focus on what's outside of ourselves: what we see, hear, smell, feel, and perhaps even taste. But sometimes what really marks a place is something less specific — a [feeling within us]. An interesting example emerged from a study of subway passenger behavior. Researchers trying to understand why people sit where they sit or stand where they stand examined the factors that shape how riders used and navigated that space. One of their findings involved the reasons many riders like to plant themselves close to the train's [doors]. Partly this was the obvious [convenience] of being able to exit more quickly. But it was shaped partly by a more abstract sensation — the desire to avoid the sometimes uncomfortable feeling of accidentally making [eye contact] with seated passengers. We can't see feelings but they're very [real], and they influence our experience of the world.`,blanks:[{sentence:`What really marks a place is something less specific — a _____.`,opts:[`physical object`,`feeling within us`,`loud sound`,`bright light`],ans:`feeling within us`},{sentence:`Many riders like to plant themselves close to the train's _____.`,opts:[`windows`,`seats`,`doors`,`lights`],ans:`doors`},{sentence:`Partly this was the obvious _____ of being able to exit more quickly.`,opts:[`danger`,`convenience`,`cost`,`rule`],ans:`convenience`},{sentence:`The desire to avoid the uncomfortable feeling of accidentally making _____.`,opts:[`eye contact`,`loud noises`,`physical contact`,`money exchange`],ans:`eye contact`},{sentence:`We can't see feelings but they're very _____.`,opts:[`fake`,`real`,`weak`,`rare`],ans:`real`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`지하철 운영의 안전 관리 방법`,`공간에 대한 인식과 행동은 외부 자극과 내부 감정 모두에 영향을 받는다`,`도시 교통 시스템 개선의 필요성`,`승객 행동을 관찰하는 연구 방법론`],ans:`공간에 대한 인식과 행동은 외부 자극과 내부 감정 모두에 영향을 받는다`},tf:[{stmt:`어떤 장소를 특징짓는 것은 항상 외부의 구체적 요소뿐이다.`,ans:false,exp:`내면의 감정도 그 장소를 특징짓는다고 함`},{stmt:`사람들이 문 쪽에 서는 이유 중 하나는 빠르게 내릴 수 있는 편리함이다.`,ans:true,exp:`convenience of exiting quickly — 직접 언급`},{stmt:`사람들이 문 쪽을 선호하는 데에는 시선을 마주치고 싶은 욕구가 작용한다.`,ans:false,exp:`시선을 피하고 싶은 욕구임`}]},
  {no:39,topic:`잠수 반사`,text:`We have a 'diving reflex', like other marine mammals. This means that special [nerve endings] on our faces, around the mouth and nose, trigger this reflex only when the facial region goes [under the water]. If we are in the water, with our head out in the air, there is [no diving reflex]. But if we sink just our face in a bowl of water, while the whole of the rest of our body in the dry air, the diving reflex is triggered. It automatically [closes down the airway], reducing the risk of swallowing water, and it narrows the small air-passages in the lungs. At the same time the heart rate is [slowed down to half speed] and blood is shunted to the vital organs.`,blanks:[{sentence:`Special _____ on our faces trigger this reflex.`,opts:[`muscle fibers`,`nerve endings`,`skin layers`,`blood vessels`],ans:`nerve endings`},{sentence:`The reflex is triggered only when the facial region goes _____.`,opts:[`into the air`,`under the water`,`into the sun`,`near a flame`],ans:`under the water`},{sentence:`If our head is out in the air, there is _____.`,opts:[`a stronger reflex`,`no diving reflex`,`an immediate response`,`a slower heart rate`],ans:`no diving reflex`},{sentence:`It automatically _____, reducing the risk of swallowing water.`,opts:[`opens the airway wider`,`closes down the airway`,`stops the heart`,`raises blood pressure`],ans:`closes down the airway`},{sentence:`The heart rate is _____.`,opts:[`doubled`,`kept the same`,`slowed down to half speed`,`stopped completely`],ans:`slowed down to half speed`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`해양 포유류의 다양한 적응 방식`,`인간의 잠수 반사가 작동하는 조건과 신체 변화`,`심장박동을 늦추는 의학적 방법`,`물에 빠진 사람을 구하는 응급 처치`],ans:`인간의 잠수 반사가 작동하는 조건과 신체 변화`},tf:[{stmt:`물에 얼굴이 잠겨야만 잠수 반사가 발동된다.`,ans:true,exp:`facial region goes under water — 직접 언급`},{stmt:`잠수 반사가 일어나면 심박수가 반으로 느려진다.`,ans:true,exp:`slowed down to half speed — 직접 언급`},{stmt:`잠수 반사는 기도를 열어 호흡을 돕는다.`,ans:false,exp:`기도를 닫는다(closes down the airway)`}]},
  {no:40,topic:`진실 편향과 인지 경제`,text:`There is a natural assumption of truth, or a [truth bias] when humans communicate with one another. In other words, when we're listening to others or reading their words, our automatic assumption is that the other person is telling the truth. This usually works out fine. If you ask someone where the restroom is located or if it's raining outside, you can safely assume that most people will not [lie] in their responses. Imagine how difficult it would be to converse with someone if you assumed that everything they were telling you was [false]. Indeed, questioning the truth of a statement and then choosing not to believe it requires additional [mental steps]. For the most part, humans are "[cognitive misers]," which means we tend to save more mental effort than seems necessary.`,blanks:[{sentence:`There is a natural assumption of truth, or a _____ when humans communicate.`,opts:[`truth bias`,`lie detector`,`false bias`,`fact check`],ans:`truth bias`},{sentence:`Most people will not _____ in their responses.`,opts:[`speak`,`answer`,`lie`,`shout`],ans:`lie`},{sentence:`Imagine how difficult it would be to converse if you assumed everything was _____.`,opts:[`true`,`false`,`boring`,`important`],ans:`false`},{sentence:`Questioning the truth and choosing not to believe requires additional _____.`,opts:[`mental steps`,`physical effort`,`loud words`,`social skills`],ans:`mental steps`},{sentence:`Humans are "_____."`,opts:[`truth seekers`,`cognitive misers`,`logical machines`,`social butterflies`],ans:`cognitive misers`}],topic_q:{q:`이 글의 주제로 가장 적절한 것은?`,opts:[`거짓말을 탐지하는 효과적인 방법`,`인간은 인지적 노력을 줄이려는 진실 편향을 가지고 있다`,`현대 사회의 가짜 뉴스 문제`,`효과적인 의사소통을 위한 듣기 기술`],ans:`인간은 인지적 노력을 줄이려는 진실 편향을 가지고 있다`},tf:[{stmt:`인간은 보통 상대가 진실을 말한다고 가정한다.`,ans:true,exp:`truth bias — 직접 언급`},{stmt:`진술의 진위를 의심하는 데는 추가적인 정신적 단계가 필요하다.`,ans:true,exp:`additional mental steps — 직접 언급`},{stmt:`온라인에서 본 것이 가짜라도, 우리의 기본 반응은 의심부터 한다.`,ans:false,exp:`기본은 일단 믿는다(default is to believe)`}]}
];

// ── STATE ──────────────────────────────────────────
let userName='', userSchool='', selectedNos=new Set(), doneNos=new Set();
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], allResults=[], answered=false, t0=0;
let filterMode='all';

// ── START ──────────────────────────────────────────
function goPassageSelect(){
  userSchool = document.getElementById('si').value;
  userName = document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('userInfo').textContent = userName + ' · ' + userSchool;
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function renderPassageGrid(){
  const grid = document.getElementById('passageGrid');
  grid.innerHTML='';
  PASSAGES.forEach(p=>{
    if(filterMode==='21-24' && (p.no<21||p.no>24)) return;
    if(filterMode==='29-40' && (p.no<29||p.no>40)) return;
    const d = document.createElement('div');
    d.className='p-card'+(selectedNos.has(p.no)?' sel':'')+(doneNos.has(p.no)?' done':'');
    d.onclick=()=>togglePassage(p.no, d);
    d.innerHTML=`<div class="p-no">${p.no}번</div><div class="p-topic">${p.topic}</div>`
      +(doneNos.has(p.no)?'<span class="p-badge done-badge">완료✓</span>':'')
      +(selectedNos.has(p.no)&&!doneNos.has(p.no)?'<span class="p-badge" style="background:#e3f2fd;color:#1565c0;">선택</span>':'');
    grid.appendChild(d);
  });
}

function togglePassage(no, el){
  if(selectedNos.has(no)){selectedNos.delete(no);el.classList.remove('sel');}
  else{selectedNos.add(no);el.classList.add('sel');}
}

function filterPassage(mode, btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPassageGrid();
}

function selectAll(){
  const visible = PASSAGES.filter(p=>{
    if(filterMode==='21-24') return p.no>=21&&p.no<=24;
    if(filterMode==='29-40') return p.no>=29&&p.no<=40;
    return true;
  });
  const allSel = visible.every(p=>selectedNos.has(p.no));
  visible.forEach(p=>{ if(allSel) selectedNos.delete(p.no); else selectedNos.add(p.no); });
  renderPassageGrid();
}

function startQuiz(){
  if(selectedNos.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  // build question list
  qs=[];
  PASSAGES.filter(p=>selectedNos.has(p.no)).forEach(p=>{
    // blanks
    p.blanks.forEach((b,i)=>qs.push({pno:p.no,topic:p.topic,type:'blank',data:b,passageText:p.text,pid:p.no+'_b'+i}));
    // topic_q
    qs.push({pno:p.no,topic:p.topic,type:'topic',data:p.topic_q,passageText:p.text,pid:p.no+'_tq'});
    // tf
    p.tf.forEach((t,i)=>qs.push({pno:p.no,topic:p.topic,type:'tf',data:t,passageText:p.text,pid:p.no+'_t'+i}));
  });
  // shuffle within each passage group is already ordered; shuffle all
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · '+selectedNos.size+'개 지문';
  showQ();
}

// ── QUIZ ──────────────────────────────────────────
function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');

  if(q.type==='blank'){
    const d=q.data;
    const shuf=arr=>{const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
    const opts=shuf(d.opts);

    // 지문에서 현재 문제의 정답만 블록 처리, 나머지 [ ]는 일반 텍스트로
    let passageDisplay = q.passageText;
    passageDisplay = passageDisplay.replace(/\[([^\]]+)\]/g,(match, inner)=>{
      if(inner === d.ans || d.ans.includes(inner) || inner.includes(d.ans)){
        return `<span style="display:inline-block;min-width:80px;background:#1565c0;color:#1565c0;border-radius:5px;padding:1px 6px;font-weight:800;letter-spacing:2px;user-select:none;">░░░░░░░</span>`;
      }
      // 나머지는 그냥 일반 텍스트로
      return inner;
    });

    // 빈칸 문장 표시 (_____ → 파란 빈칸)
    const blankSentence = d.sentence.replace('_____',
      `<span style="display:inline-block;min-width:120px;border-bottom:3px solid #1565c0;background:#bbdefb;border-radius:4px;padding:2px 10px;font-weight:800;color:#1565c0;">_____</span>`);

    area.innerHTML=`
      <div class="qc">
        <div class="q-no-badge"><span class="qno">${q.pno}번</span><span class="qtype blank">빈칸 추론</span></div>
        <div style="font-size:11px;font-weight:700;color:#1565c0;margin-bottom:6px;">📄 지문 — 파란 빈칸에 들어갈 말을 고르세요 (${q.topic})</div>
        <div class="passage-box" style="font-size:13px;margin-bottom:14px;line-height:2;">${passageDisplay}</div>
        <div style="background:#e3f2fd;border:2px solid #1565c0;border-radius:10px;padding:12px 14px;font-size:13px;font-weight:700;color:#1a237e;margin-bottom:12px;line-height:1.9;">${blankSentence}</div>
        <div class="choices" id="qChoices"></div>
        <div class="fb-msg" id="fb"></div>
      </div>`;
    const cc=document.getElementById('qChoices');
    opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='cb';
      b.innerHTML=`<span class="cn">${i+1}</span>${o}`;
      b.addEventListener('click',()=>selBlank(b,o,d.ans));
      cc.appendChild(b);
    });
  } else if(q.type==='topic'){
    const d=q.data;
    const shuf=arr=>{const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
    const opts=shuf(d.opts);
    const cleanText = q.passageText.replace(/\[([^\]]+)\]/g,'<span style="background:#fff3e0;border-bottom:2.5px solid #f57f17;font-weight:800;padding:0 3px;border-radius:3px;">$1</span>');
    area.innerHTML=`
      <div class="qc">
        <div class="q-no-badge"><span class="qno">${q.pno}번</span><span class="qtype" style="background:#e8f5e9;color:#2e7d32;">주제/요지</span></div>
        <div style="font-size:11px;font-weight:700;color:#1565c0;margin-bottom:6px;">📄 지문 (${q.topic})</div>
        <div class="passage-box" style="font-size:13px;margin-bottom:14px;">${cleanText}</div>
        <div class="q-prompt">🎯 ${d.q}</div>
        <div class="choices" id="qChoices"></div>
        <div class="fb-msg" id="fb"></div>
      </div>`;
    const cc=document.getElementById('qChoices');
    opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='cb';
      b.innerHTML=`<span class="cn">${i+1}</span>${o}`;
      b.addEventListener('click',()=>selBlank(b,o,d.ans));
      cc.appendChild(b);
    });
  } else {
    const d=q.data;
    // 지문 원문에서 [ ] 제거해서 보여주기
    const cleanText = q.passageText.replace(/\[([^\]]+)\]/g,'$1');
    area.innerHTML=`
      <div class="qc">
        <div class="q-no-badge"><span class="qno">${q.pno}번</span><span class="qtype tf">내용 일치 T/F</span></div>
        <div style="font-size:11px;font-weight:700;color:#1565c0;margin-bottom:6px;">📄 지문 (${q.topic})</div>
        <div class="passage-box" style="font-size:13px;margin-bottom:14px;">${cleanText}</div>
        <div class="q-prompt">✅ 다음 문장이 본문 내용과 일치하면 O, 아니면 X를 선택하세요.</div>
        <div style="background:#fff8e1;border:2px solid #f57f17;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:700;color:#333;margin:10px 0 14px;">${d.stmt}</div>
        <div class="tf-btns">
          <button class="tfb ob" id="btnO" onclick="selTF(this,true,${d.ans})">⭕ 일치</button>
          <button class="tfb xb" id="btnX" onclick="selTF(this,false,${d.ans})">❌ 불일치</button>
        </div>
        <div class="fb-msg" id="fb"></div>
      </div>`;
  }
}

function selBlank(btn,sel,ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const q=qs[idx];
  const typeLabel = q.type==='topic' ? '주제' : '빈칸';
  if(sel===ans){
    btn.classList.add('correct');
    fb.className='fb-msg ok';fb.textContent='✅ 정답!';
    cor++;
    allResults.push({pno:q.pno, type:typeLabel, correct:true, my:sel, ans:ans});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.cb').forEach(b=>{if(b.textContent.trim()===ans)b.classList.add('reveal');});
    fb.className='fb-msg no';fb.textContent='❌ 오답! 정답: '+ans;
    wrn++;
    wrongs.push({pid:q.pid, label:q.pno+'번 '+typeLabel, my:sel, correct:ans, exp:''});
    allResults.push({pno:q.pno, type:typeLabel, correct:false, my:sel, ans:ans});
  }
  setTimeout(()=>{idx++;showQ();},sel===ans?700:1800);
}

function selTF(btn,sel,ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.tfb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const correct=(sel===ans);
  btn.classList.add(correct?'correct':'wrong');
  if(!correct){
    const other=document.getElementById(sel?'btnX':'btnO');
    other.classList.add('reveal');
  }
  const q=qs[idx];
  const d=q.data;
  if(correct){
    fb.className='fb-msg ok';fb.textContent='✅ 정답! '+d.exp;
    cor++;
    allResults.push({pno:q.pno, type:'T/F', correct:true, my:sel?'O':'X', ans:ans?'O':'X', stmt:d.stmt});
  } else {
    fb.className='fb-msg no';fb.textContent='❌ 오답! '+d.exp;
    wrn++;
    wrongs.push({pid:q.pid, label:q.pno+'번 T/F', my:sel?'O':'X', correct:ans?'O':'X', exp:d.exp});
    allResults.push({pno:q.pno, type:'T/F', correct:false, my:sel?'O':'X', ans:ans?'O':'X', stmt:d.stmt});
  }
  setTimeout(()=>{idx++;showQ();},correct?700:1800);
}

// ── RESULT ──────────────────────────────────────────
let wrongQs = []; // 오답 문제 저장용

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selectedNos.forEach(n=>doneNos.add(n));
  // 오답 문제 저장 (다시풀기용)
  wrongQs = qs.filter((q,i)=>{
    // wrongs 배열의 pid와 매칭
    return wrongs.some(w=>w.pid===q.pid);
  });

  const wHTML=wrongs.length>0
    ?'<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.label+'</div><div class="wid">내 답: '+w.my+' → 정답: '+w.correct+(w.exp?' | '+w.exp:'')+'</div></div>').join('')+'</div>'
    :'<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고1 25년 6월 본문 암기 · ${selectedNos.size}개 지문</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave) window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: userName,
    school: userSchool,
    score: pct,
    correct: cor,
    wrong: wrn,
    total: total,
    elapsedMin: el,
    quizType: '고1_25년6월_본문암기',
    passages: [...selectedNos].sort((a,b)=>a-b),
    // 문제별 상세 결과: 몇 번 지문, 유형(빈칸/주제/T·F), 맞음/틀림, 내 답, 정답
    details: allResults.map(r=>({
      지문: r.pno+'번',
      유형: r.type,
      결과: r.correct ? '✅정답' : '❌오답',
      내답: r.my,
      정답: r.ans,
      ...(r.stmt ? {문장: r.stmt} : {})
    })),
    wrongWords: wrongs.map(w=>({label:w.label, my:w.my, correct:w.correct}))
  });
}

function retryWrongs(){
  if(wrongQs.length===0) return;
  qs=[...wrongQs];
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · 오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selectedNos.clear();
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

// localStorage 자동입력
window.addEventListener('DOMContentLoaded',()=>{
  const n=localStorage.getItem('bomnal_name');
  const s=localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value=n;
  if(s){
    const sel=document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value&&s.includes(sel.options[i].value)){sel.value=sel.options[i].value;break;}
    }
  }
});
</script>
