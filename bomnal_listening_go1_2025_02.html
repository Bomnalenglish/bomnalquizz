<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5efe6;--card:#fdfaf6;--ink:#2a2a2a;--soft:#7a7570;
  --primary:#4a6741;--accent:#c8844a;--red:#c0392b;--green:#2e7d32;
  --bdr:#e0d8ce;--shadow:0 4px 20px rgba(0,0,0,.08);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);}

/* ── 헤더 ── */
header{background:linear-gradient(135deg,#f7efe4,#ece0d2);padding:20px 24px 16px;text-align:center;border-bottom:1px solid var(--bdr);}
.logo-text{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:#5c3d1e;}
.logo-text .hl{color:#7a4e28;}
.level-badge{display:inline-block;background:var(--primary);color:#fff;font-size:.75rem;font-weight:700;padding:2px 12px;border-radius:20px;margin-top:4px;}

/* ── 화면 ── */
.screen{display:none;}
.screen.active{display:block;}
#screen-name.active{display:flex;align-items:center;justify-content:center;min-height:78vh;padding:24px;}

/* ── 이름 입력 ── */
.auth-card{background:var(--card);border-radius:22px;padding:36px 28px;width:100%;max-width:380px;box-shadow:var(--shadow);border:1px solid var(--bdr);text-align:center;}
.auth-card h2{font-family:'Black Han Sans',sans-serif;font-size:1.25rem;margin-bottom:8px;}
.auth-card p{font-size:.85rem;color:var(--soft);margin-bottom:22px;font-family:'Gowun Dodum',serif;line-height:1.7;}
.name-input{width:100%;padding:13px 16px;border:2px solid var(--bdr);border-radius:12px;font-size:1rem;font-family:inherit;outline:none;text-align:center;background:#fff;transition:border-color .2s;}
.name-input:focus{border-color:var(--primary);}
.name-input.err{border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.start-btn{width:100%;margin-top:14px;padding:14px;border-radius:12px;border:none;background:#3d3d3d;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}
.start-btn:hover{opacity:.85;}

/* ── 오디오 바 (고정) ── */
.audio-bar{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.play-btn{background:#3d3d3d;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:.85rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;flex-shrink:0;white-space:nowrap;}
.play-btn:hover{opacity:.85;}
.play-btn.playing{background:var(--primary);}
.audio-info{flex:1;min-width:0;}
.audio-time{font-size:.72rem;color:var(--soft);font-family:'Gowun Dodum',serif;margin-bottom:4px;}
.audio-track{height:6px;background:#e0d8ce;border-radius:4px;overflow:hidden;cursor:pointer;position:relative;}
.audio-fill{height:100%;background:var(--primary);border-radius:4px;width:0%;}
.answered-badge{background:#f0ede8;border-radius:20px;padding:4px 12px;font-size:.75rem;color:var(--soft);font-family:'Gowun Dodum',serif;white-space:nowrap;flex-shrink:0;}
.answered-badge.all-done{background:#e8f0e4;color:var(--primary);font-weight:800;}

/* ── 문제 목록 ── */
#screen-quiz{padding-bottom:90px;}
.questions-wrap{max-width:640px;margin:0 auto;padding:16px 14px;}
.q-card{background:var(--card);border-radius:16px;padding:18px 16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--bdr);margin-bottom:12px;transition:border-color .2s;}
.q-card.answered{border-color:#b5d4a8;}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.q-num-badge{font-family:'Black Han Sans',sans-serif;font-size:.78rem;color:#fff;background:#888;padding:2px 11px;border-radius:20px;flex-shrink:0;transition:background .2s;}
.q-num-badge.done{background:var(--primary);}
.q-subject{font-size:.8rem;color:var(--soft);font-family:'Gowun Dodum',serif;line-height:1.5;}
.q-text{font-size:.85rem;line-height:1.8;color:var(--ink);white-space:pre-wrap;word-break:keep-all;padding:10px 12px;background:#f8f5f0;border-radius:10px;margin-bottom:12px;font-family:'Gowun Dodum',serif;border:1px solid #ede8e0;}

/* 선택지 */
.choices{display:flex;flex-direction:column;gap:7px;}
.choice-btn{background:#fff;border:1.5px solid var(--bdr);border-radius:10px;padding:10px 13px;font-size:.85rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:flex-start;gap:8px;color:var(--ink);line-height:1.5;}
.choice-num{width:22px;height:22px;border-radius:50%;background:#f0ede8;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0;margin-top:1px;}
.choice-btn:hover:not(:disabled){border-color:#888;background:#f8f5f0;}
.choice-btn.selected{border-color:#3d3d3d;background:#f0ede8;}
.choice-btn.selected .choice-num{background:#3d3d3d;color:#fff;}
.choice-btn.correct{border-color:var(--green);background:#e8f5e9;}
.choice-btn.correct .choice-num{background:var(--green);color:#fff;}
.choice-btn.wrong{border-color:var(--red);background:#ffebee;}
.choice-btn.wrong .choice-num{background:var(--red);color:#fff;}
.choice-btn:disabled{cursor:default;}

/* 표 (10번) */
.q-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-bottom:12px;font-family:'Gowun Dodum',serif;}
.q-table th{background:#f0ede8;padding:6px 8px;border:1px solid var(--bdr);text-align:center;font-weight:800;}
.q-table td{padding:6px 8px;border:1px solid var(--bdr);text-align:center;}

/* 제출 버튼 고정 */
.submit-wrap{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bdr);padding:12px 16px;z-index:100;}
.submit-btn{width:100%;max-width:640px;margin:0 auto;display:block;padding:14px;border-radius:12px;border:none;background:#bbb;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;transition:background .3s;}
.submit-btn.ready{background:#3d3d3d;cursor:pointer;}
.submit-btn.ready:hover{opacity:.85;}

/* ── 결과 ── */
#screen-result{padding:16px 14px 60px;}
.result-top{max-width:640px;margin:0 auto 16px;background:var(--card);border-radius:20px;padding:24px 20px;box-shadow:var(--shadow);border:1px solid var(--bdr);text-align:center;}
.result-emoji{font-size:3rem;margin-bottom:8px;}
.result-title{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;margin-bottom:4px;}
.score-big{font-size:3rem;font-weight:800;color:var(--primary);line-height:1.1;}
.score-sub{font-size:.85rem;color:var(--soft);font-family:'Gowun Dodum',serif;margin-top:4px;}
.result-cards{max-width:640px;margin:0 auto 16px;}
.result-q{background:var(--card);border-radius:12px;padding:14px 14px 10px;margin-bottom:8px;border-left:4px solid var(--bdr);}
.result-q.ok{border-left-color:var(--green);}
.result-q.bad{border-left-color:var(--red);}
.rq-num{font-size:.78rem;font-weight:800;margin-bottom:5px;}
.rq-num.ok{color:var(--green);}
.rq-num.bad{color:var(--red);}
.rq-ans{font-size:.8rem;color:var(--soft);font-family:'Gowun Dodum',serif;}
.result-btns{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}
.retry-btn{padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}
.home-btn{padding:14px;border-radius:12px;border:2px solid var(--bdr);background:#fff;color:var(--soft);font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* ── 완료 ── */
#screen-done.active{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:24px;}
.done-card{background:var(--card);border-radius:22px;padding:40px 28px;width:100%;max-width:380px;box-shadow:var(--shadow);border:1px solid var(--bdr);text-align:center;}
.done-emoji{font-size:3.5rem;margin-bottom:12px;}
.done-title{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;margin-bottom:8px;}
.done-sub{font-size:.85rem;color:var(--soft);font-family:'Gowun Dodum',serif;line-height:1.8;margin-bottom:20px;}
.stat-row{display:flex;justify-content:center;gap:28px;margin-bottom:20px;}
.stat-n{font-size:1.8rem;font-weight:800;color:var(--primary);}
.stat-l{font-size:.7rem;color:var(--soft);font-family:'Gowun Dodum',serif;}

@media(max-width:480px){
  .audio-bar{flex-wrap:wrap;gap:8px;}
  .answered-badge{font-size:.7rem;}
}
</style>
</head>

<header>
  <div class="logo-text">봄날 <span class="hl">Listening</span></div>
  <div class="level-badge">고등학교 1학년 듣기평가</div>
</header>

<!-- STEP 1: 이름 -->
<div id="screen-name" class="screen active">
  <div class="auth-card">
    <h2>🎧 이름을 입력하세요</h2>
    <p>듣기평가 결과가 선생님께 전송됩니다.<br>본인 이름을 정확히 입력해주세요.</p>
    <input type="text" class="name-input" id="nameInput" placeholder="예) 홍길동" maxlength="10"
           onkeydown="if(event.key==='Enter')startQuiz()"/>
    <button class="start-btn" onclick="startQuiz()">시작하기 →</button>
  </div>
</div>

<!-- STEP 2: 퀴즈 -->
<div id="screen-quiz" class="screen">
  <div class="audio-bar" style="flex-direction:column;align-items:stretch;padding:10px 16px;gap:8px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-family:'Black Han Sans',sans-serif;font-size:.88rem;color:#5c3d1e;">🎧 듣기 음성</span>
      <div class="answered-badge" id="answeredBadge">0 / 20 선택</div>
    </div>
    <iframe src="https://drive.google.com/file/d/1oOEh_H8tOj-v5FMqo9lQL0at-wMSRiwN/preview"
      width="100%" height="44" allow="autoplay"
      style="border:none;border-radius:8px;background:#f0ede8;"
      id="audioFrame"></iframe>
  </div>
  <div class="questions-wrap" id="questionsWrap"></div>
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="submitQuiz()" disabled>
      전체 선택 후 제출 가능
    </button>
  </div>
</div>

<!-- STEP 3: 결과 -->
<div id="screen-result" class="screen">
  <div class="result-top">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="score-big" id="resultScore"></div>
    <div class="score-sub" id="resultSub"></div>
  </div>
  <div class="result-cards" id="resultCards"></div>
  <div class="result-btns">
    <button class="retry-btn" id="retryBtn" onclick="startRetry()" style="display:none">오답 다시 풀기 🔄</button>
    <button class="home-btn" onclick="location.href='index.html'">허브로 돌아가기</button>
  </div>
</div>

<!-- STEP 4: 완료 -->
<div id="screen-done" class="screen">
  <div class="done-card">
    <div class="done-emoji">🏆</div>
    <div class="done-title" id="doneTitle">모두 완료!</div>
    <div class="done-sub" id="doneSub"></div>
    <div class="stat-row">
      <div><div class="stat-n" id="statRounds"></div><div class="stat-l">총 라운드</div></div>
      <div><div class="stat-n" id="statScore"></div><div class="stat-l">최종 점수</div></div>
    </div>
    <button class="home-btn" onclick="location.href='index.html'">허브로 돌아가기</button>
  </div>
</div>

let studentName='', answers={}, round=1, retryQueue=[], allWrong=[], currentQList=QUESTIONS;

const audio=new Audio();
audio.preload='none';

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(){
  const val=document.getElementById('nameInput').value.trim();
  if(!val){
    const el=document.getElementById('nameInput');
    el.classList.add('err'); el.placeholder='이름을 입력해주세요!';
    setTimeout(()=>{el.classList.remove('err');el.placeholder='예) 홍길동';},1400);
    return;
  }
  studentName=val; answers={}; round=1; allWrong=[]; currentQList=QUESTIONS;
  audio.src=AUDIO_FILE;
  audio.addEventListener('timeupdate',updateProgress);
  audio.addEventListener('ended',()=>{
    document.getElementById('playBtn').textContent='▶ 다시 듣기';
    document.getElementById('playBtn').classList.remove('playing');
  });
  renderQuestions(QUESTIONS);
  showScreen('screen-quiz');
  // 자동재생 안내 (브라우저 정책상 수동 탭 필요)
  document.getElementById('playBtn').textContent='▶ 탭해서 재생 시작';
}

function togglePlay(){
  const btn = document.getElementById('playBtn');
  if(audio.paused){
    btn.textContent='⏳ 로딩 중...';
    btn.disabled=true;
    audio.play().then(()=>{
      btn.textContent='⏸ 일시정지';
      btn.classList.add('playing');
      btn.disabled=false;
    }).catch(()=>{
      btn.textContent='▶ 재생';
      btn.disabled=false;
    });
  } else {
    audio.pause();
    btn.textContent='▶ 재생';
    btn.classList.remove('playing');
  }
}

function updateProgress(){
  if(!audio.duration) return;
  const pct=(audio.currentTime/audio.duration)*100;
  document.getElementById('audioFill').style.width=pct+'%';
  document.getElementById('audioTime').textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration);
}
function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

function seekAudio(e){
  if(!audio.duration) return;
  const bar=document.getElementById('audioTrack');
  const pct=e.offsetX/bar.offsetWidth;
  audio.currentTime=pct*audio.duration;
}

function renderQuestions(qList){
  answers={};
  const wrap=document.getElementById('questionsWrap');
  wrap.innerHTML='';
  const nums=['①','②','③','④','⑤'];

  qList.forEach(q=>{
    const card=document.createElement('div');
    card.className='q-card'; card.id='qcard-'+q.num;

    let html=`<div class="q-header">
      <div class="q-num-badge" id="qnum-${q.num}">${q.num}번</div>
      <div class="q-subject">${q.subject}</div>
    </div>`;

    // 표 (10번)
    if(q.table){
      html+=`<table class="q-table"><thead><tr>${q.table[0].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      for(let i=1;i<q.table.length;i++){
        html+=`<tr>${q.table[i].map(c=>`<td>${c}</td>`).join('')}</tr>`;
      }
      html+=`</tbody></table>`;
    }

    // 지문
    if(q.text && q.text.trim()) html+=`<div class="q-text">${q.text}</div>`;

    // 선택지
    html+=`<div class="choices" id="choices-${q.num}">`;
    q.choices.forEach((ch,i)=>{
      html+=`<button class="choice-btn" id="choice-${q.num}-${i+1}" onclick="selectAnswer(${q.num},${i+1})">
        <span class="choice-num">${nums[i]}</span><span>${ch}</span>
      </button>`;
    });
    html+=`</div>`;
    card.innerHTML=html;
    wrap.appendChild(card);
  });
  updateCount();
}

function selectAnswer(qNum,chosen){
  if(document.getElementById('choice-'+qNum+'-1').disabled) return;
  answers[qNum]=chosen;
  for(let i=1;i<=5;i++){
    const b=document.getElementById('choice-'+qNum+'-'+i);
    if(b) b.classList.remove('selected');
  }
  const sel=document.getElementById('choice-'+qNum+'-'+chosen);
  if(sel) sel.classList.add('selected');
  document.getElementById('qcard-'+qNum).classList.add('answered');
  document.getElementById('qnum-'+qNum).classList.add('done');
  updateCount();
  // 선택한 카드로 자동 스크롤 없음 (자유롭게)
}

function updateCount(){
  const total=currentQList.length;
  const done=Object.keys(answers).length;
  const badge=document.getElementById('answeredBadge');
  badge.textContent=`${done} / ${total} 선택`;
  badge.className='answered-badge'+(done===total?' all-done':'');
  const btn=document.getElementById('submitBtn');
  if(done===total){
    btn.disabled=false;
    btn.className='submit-btn ready';
    btn.textContent='✅ 제출하고 채점받기';
  } else {
    btn.disabled=true;
    btn.className='submit-btn';
    btn.textContent=`${total-done}개 더 선택해주세요`;
  }
}

function submitQuiz(){
  audio.pause();
  const nums=['①','②','③','④','⑤'];
  let correct=0; const wrongThisRound=[];
  currentQList.forEach(q=>{
    const chosen=answers[q.num];
    if(chosen===q.answer){ correct++; }
    else {
      wrongThisRound.push({...q,chosen});
      if(!allWrong.find(w=>w.num===q.num)) allWrong.push(q);
    }
  });
  const total=currentQList.length;
  const allTotal=QUESTIONS.length;
  const pct=Math.round((allTotal-allWrong.length)/allTotal*100);

  document.getElementById('resultEmoji').textContent=pct>=90?'🎉':pct>=70?'😊':'💪';
  document.getElementById('resultTitle').textContent=round>1?`${round}라운드 완료!`:'채점 완료!';
  document.getElementById('resultScore').textContent=`${correct} / ${total}`;
  document.getElementById('resultSub').textContent=`${pct}점 · 오답 ${wrongThisRound.length}개`;

  // 상세 결과
  const cards=document.getElementById('resultCards');
  cards.innerHTML='';
  currentQList.forEach(q=>{
    const chosen=answers[q.num]; const ok=chosen===q.answer;
    const d=document.createElement('div');
    d.className='result-q '+(ok?'ok':'bad');
    d.innerHTML=`<div class="rq-num ${ok?'ok':'bad'}">${ok?'✅':'❌'} ${q.num}번</div>
      <div class="rq-ans">내 답: ${nums[(chosen||1)-1]} &nbsp;·&nbsp; 정답: ${nums[q.answer-1]}</div>`;
    cards.appendChild(d);
  });

  const retryBtn=document.getElementById('retryBtn');
  if(wrongThisRound.length>0){ retryBtn.style.display='block'; retryQueue=wrongThisRound; }
  else { retryBtn.style.display='none'; retryQueue=[]; }

  saveResult(wrongThisRound.length===0, correct, total);
  showScreen('screen-result');
}

function startRetry(){
  round++; answers={}; currentQList=retryQueue;
  renderQuestions(retryQueue);
  // 오답 재시험 시 음성 다시 처음부터 재생하려면 위의 iframe을 새로고침
  showScreen('screen-quiz');
}

function saveResult(completed, correct, total){
  const data={
    studentName, quizType:QUIZ_INFO.quizType, grade:QUIZ_INFO.grade,
    score:Math.round((QUESTIONS.length-allWrong.length)/QUESTIONS.length*100),
    correct:QUESTIONS.length-allWrong.length, wrong:allWrong.length, total:QUESTIONS.length,
    round, completed,
    wrongNumbers:allWrong.map(q=>q.num+'번').join(', '),
    userAgent:navigator.userAgent.substring(0,100),
  };
  let w=0; const t=setInterval(()=>{
    w+=200;
    if(window._saveResult){clearInterval(t);window._saveResult(data);}
    else if(w>=6000) clearInterval(t);
  },200);
}
