<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5efe6;--card:#fdfaf6;--ink:#2a2a2a;--soft:#7a7570;
  --primary:#4a6741;--accent:#c8844a;--red:#c0392b;--green:#2e7d32;
  --bdr:#e0d8ce;--shadow:0 4px 20px rgba(0,0,0,.08);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);}

/* HEADER */
header{background:linear-gradient(135deg,#f7efe4,#ece0d2);padding:32px 24px 24px;text-align:center;border-bottom:1px solid var(--bdr);}
.logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px;}
.logo-img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--bdr);}
.logo-text{font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:#5c3d1e;}
.logo-text .hl{color:#7a4e28;}
.level-badge{display:inline-block;background:var(--primary);color:#fff;font-size:.78rem;font-weight:700;padding:3px 14px;border-radius:20px;margin-top:4px;letter-spacing:.5px;}

/* SCREENS */
.screen{display:none;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:24px;}

/* INTRO / STAGE MENU */
.auth-card{background:var(--card);border-radius:22px;padding:36px 28px;width:100%;max-width:400px;box-shadow:var(--shadow);border:1px solid var(--bdr);text-align:center;}
.auth-card h2{font-family:'Black Han Sans',sans-serif;font-size:1.25rem;color:var(--ink);margin-bottom:8px;}
.auth-card p{font-size:.85rem;color:var(--soft);margin-bottom:22px;font-family:'Gowun Dodum',serif;line-height:1.7;}
.hello{font-size:1.05rem;font-weight:700;color:var(--primary);margin-bottom:6px;}
.hello .sch{font-size:.82rem;color:var(--soft);font-weight:400;}
.name-input{width:100%;padding:13px 16px;border:2px solid var(--bdr);border-radius:12px;font-size:1rem;font-family:inherit;outline:none;text-align:center;background:#fff;transition:border-color .2s;margin-bottom:6px;}
.name-input:focus{border-color:var(--primary);}
.name-input.err{border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.steps{display:flex;flex-direction:column;gap:10px;margin:8px 0 20px;text-align:left;}
.step-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--bdr);border-radius:14px;padding:12px 14px;}
.step-num{width:30px;height:30px;flex-shrink:0;border-radius:50%;background:var(--primary);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.step-txt{font-size:.86rem;line-height:1.4;}
.step-txt b{font-size:.92rem;}
.start-btn{width:100%;margin-top:4px;padding:15px;border-radius:12px;border:none;background:#3d3d3d;color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:opacity .2s;}
.start-btn:hover{opacity:.85;}

/* MEMORIZE (STAGE 1) */
#screen-memo{padding:20px;align-items:stretch;justify-content:flex-start;min-height:100vh;}
.memo-wrap{max-width:520px;width:100%;margin:0 auto;}
.stage-tag{text-align:center;font-size:.8rem;font-weight:700;color:var(--accent);margin-bottom:10px;letter-spacing:.5px;}
.progress-bar{background:#e0d8ce;border-radius:20px;height:7px;margin-bottom:8px;overflow:hidden;}
.progress-fill{height:100%;background:var(--primary);border-radius:20px;transition:width .4s ease;}
.progress-text{text-align:right;font-size:.75rem;color:var(--soft);margin-top:4px;margin-bottom:16px;font-family:'Gowun Dodum',serif;}
.memo-card{background:var(--card);border-radius:22px;padding:48px 24px 40px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--bdr);margin-bottom:20px;position:relative;}
.memo-en{font-size:2.8rem;font-weight:800;color:var(--ink);letter-spacing:-1px;margin-bottom:14px;word-break:break-word;}
.memo-ko{font-size:1.35rem;color:var(--primary);font-weight:700;margin-bottom:24px;font-family:'Gowun Dodum',serif;line-height:1.5;}
.sound-btn{background:none;border:2px solid var(--bdr);border-radius:50%;width:56px;height:56px;cursor:pointer;font-size:1.5rem;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;}
.sound-btn:hover{background:var(--bg);border-color:var(--primary);}
.sound-btn.playing{background:var(--primary);border-color:var(--primary);color:#fff;animation:pulse .6s infinite;}
.play-count{font-size:.72rem;color:var(--soft);margin-top:12px;font-family:'Gowun Dodum',serif;min-height:16px;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.memo-nav{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.nav-btn{padding:15px;border-radius:14px;border:2px solid var(--bdr);background:#fff;color:var(--ink);font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;}
.nav-btn:hover:not(:disabled){border-color:var(--primary);background:#f0ede5;}
.nav-btn:disabled{opacity:.4;cursor:default;}
.nav-btn.primary{background:#3d3d3d;color:#fff;border-color:#3d3d3d;}
.memo-tofinish{grid-column:1 / -1;}

/* QUIZ (STAGE 2 & 3) */
#screen-quiz{padding:20px;align-items:stretch;justify-content:flex-start;min-height:100vh;}
.quiz-wrap{max-width:520px;width:100%;margin:0 auto;}
.word-card{background:var(--card);border-radius:22px;padding:36px 24px 28px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--bdr);margin-bottom:20px;position:relative;}
.round-badge{position:absolute;top:14px;left:16px;font-size:.7rem;background:#fde4cc;color:#c8844a;padding:2px 10px;border-radius:20px;font-weight:700;}
.word-en{font-size:2.4rem;font-weight:800;color:var(--ink);letter-spacing:-1px;margin-bottom:16px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.choice-btn{background:var(--card);border:2px solid var(--bdr);border-radius:14px;padding:16px 14px;font-size:.95rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4;color:var(--ink);font-weight:700;}
.choice-btn:hover:not(:disabled){border-color:var(--primary);background:#f0ede5;}
.choice-btn.correct{border-color:var(--green);background:#e8f5e9;color:var(--green);}
.choice-btn.wrong{border-color:var(--red);background:#ffebee;color:var(--red);}
.choice-btn:disabled{cursor:default;}
.feedback{text-align:center;font-size:.92rem;font-weight:700;min-height:24px;margin-bottom:14px;font-family:'Gowun Dodum',serif;}
.feedback.ok{color:var(--green);}
.feedback.bad{color:var(--red);}
.next-btn{width:100%;padding:15px;border-radius:14px;border:none;background:#3d3d3d;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;display:none;transition:opacity .2s;}
.next-btn:hover{opacity:.85;}
.next-btn.show{display:block;}

/* ROUND COMPLETE */
#screen-round{background:var(--bg);}
.round-card{background:var(--card);border-radius:22px;padding:40px 28px;width:100%;max-width:380px;box-shadow:var(--shadow);border:1px solid var(--bdr);text-align:center;}
.round-emoji{font-size:3.5rem;margin-bottom:12px;}
.round-title{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;color:var(--ink);margin-bottom:8px;}
.round-sub{font-size:.88rem;color:var(--soft);font-family:'Gowun Dodum',serif;line-height:1.7;margin-bottom:24px;white-space:pre-line;}
.score-big{font-size:3rem;font-weight:800;color:var(--primary);line-height:1;}
.score-label{font-size:.82rem;color:var(--soft);margin-top:4px;font-family:'Gowun Dodum',serif;margin-bottom:24px;}
.retry-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.retry-btn:hover{opacity:.88;}
.done-btn{width:100%;padding:14px;border-radius:12px;border:2px solid var(--bdr);background:#fff;color:var(--soft);font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* COMPLETE */
#screen-done{background:var(--bg);}
.done-card{background:var(--card);border-radius:22px;padding:44px 28px;width:100%;max-width:380px;box-shadow:var(--shadow);border:1px solid var(--bdr);text-align:center;}
.done-emoji{font-size:4rem;margin-bottom:14px;}
.done-title{font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:var(--ink);margin-bottom:10px;}
.done-sub{font-size:.88rem;color:var(--soft);font-family:'Gowun Dodum',serif;line-height:1.8;margin-bottom:28px;white-space:pre-line;}
.stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:24px;}
.stat-box{text-align:center;}
.stat-n{font-size:2rem;font-weight:800;color:var(--primary);}
.stat-l{font-size:.72rem;color:var(--soft);font-family:'Gowun Dodum',serif;}
.home-btn{width:100%;padding:14px;border-radius:12px;border:none;background:#3d3d3d;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

footer{text-align:center;padding:24px;color:#bbb;font-size:.75rem;font-family:'Gowun Dodum',serif;}
@media(max-width:480px){.word-en{font-size:2rem;}.memo-en{font-size:2.3rem;}}
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <img src="IMG_6063.jpg" alt="봄날" class="logo-img" onerror="this.style.display='none'"/>
    <div><div class="logo-text">봄날 <span class="hl">BOMNAL</span> 보카</div></div>
  </div>
  <div class="level-badge">워드마스터 초등 BASIC (2022) · 300단어</div>
</header>

<!-- INTRO: 학생 확인 + 3단계 안내 -->
<div id="screen-intro" class="screen active">
  <div class="auth-card">
    <div class="hello" id="helloBox"></div>
    <p id="introDesc">3단계로 단어를 완벽하게 외워봐요!</p>
    <input type="text" class="name-input" id="nameInput" placeholder="이름을 입력하세요" maxlength="12"
           style="display:none" onkeydown="if(event.key==='Enter')startFromIntro()"/>
    <div class="steps">
      <div class="step-item"><div class="step-num">1</div><div class="step-txt"><b>암기</b><br>단어·뜻을 보며 발음을 3번씩 들어요 🔊</div></div>
      <div class="step-item"><div class="step-num">2</div><div class="step-txt"><b>4지선다 퀴즈</b><br>영어를 보고 알맞은 뜻을 골라요 ✏️</div></div>
      <div class="step-item"><div class="step-num">3</div><div class="step-txt"><b>오답 반복</b><br>틀린 단어만 0개가 될 때까지 다시! 🔁</div></div>
    </div>
    <button class="start-btn" onclick="startFromIntro()">1단계 암기 시작 →</button>
  </div>
</div>

<!-- STAGE 1: 암기 -->
<div id="screen-memo" class="screen">
  <div class="memo-wrap">
    <div class="stage-tag">STEP 1 · 암기</div>
    <div class="progress-bar"><div class="progress-fill" id="memoFill"></div></div>
    <div class="progress-text" id="memoText"></div>
    <div class="memo-card">
      <div class="memo-en" id="memoEn"></div>
      <div class="memo-ko" id="memoKo"></div>
      <button class="sound-btn" id="memoSound" onclick="replayMemo()" title="발음 듣기">🔊</button>
      <div class="play-count" id="memoCount"></div>
    </div>
    <div class="memo-nav">
      <button class="nav-btn" id="memoPrev" onclick="memoPrev()">← 이전</button>
      <button class="nav-btn primary" id="memoNext" onclick="memoNext()">다음 →</button>
      <button class="nav-btn primary memo-tofinish" id="memoToQuiz" style="display:none" onclick="startQuizStage()">2단계 퀴즈 시작하기 ✏️</button>
    </div>
  </div>
</div>

<!-- STAGE 2 & 3: 퀴즈 -->
<div id="screen-quiz" class="screen">
  <div class="quiz-wrap">
    <div class="stage-tag" id="quizStageTag">STEP 2 · 4지선다 퀴즈</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
    <div class="word-card">
      <div class="round-badge" id="roundBadge">1라운드</div>
      <div class="word-en" id="wordEn"></div>
      <button class="sound-btn" id="soundBtn" onclick="speakWord()" title="발음 듣기" style="width:46px;height:46px;font-size:1.3rem">🔊</button>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextWord()">다음 →</button>
  </div>
</div>

<!-- ROUND COMPLETE -->
<div id="screen-round" class="screen">
  <div class="round-card">
    <div class="round-emoji" id="roundEmoji"></div>
    <div class="round-title" id="roundTitle"></div>
    <div class="round-sub" id="roundSub"></div>
    <div class="score-big" id="roundScore"></div>
    <div class="score-label" id="roundScoreLabel"></div>
    <button class="retry-btn" id="retryBtn" onclick="startRetry()">오답 다시 풀기 🔄</button>
    <button class="done-btn" onclick="finishEarly()">완료하기</button>
  </div>
</div>

<!-- DONE -->
<div id="screen-done" class="screen">
  <div class="done-card">
    <div class="done-emoji">🏆</div>
    <div class="done-title">완벽해요!</div>
    <div class="done-sub" id="doneSub"></div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-n" id="statRounds"></div><div class="stat-l">총 라운드</div></div>
      <div class="stat-box"><div class="stat-n" id="statWords"></div><div class="stat-l">총 단어</div></div>
      <div class="stat-box"><div class="stat-n" id="statWrong"></div><div class="stat-l">최초 오답</div></div>
    </div>
    <button class="home-btn" onclick="location.href='index.html'">허브로 돌아가기</button>
  </div>
</div>

<footer>🌸 봄날 BOMNAL ENGLISH · 봄날 보카</footer>

// bn_name / bn_school : 봄날 허브에서 localStorage 로 전달
let studentName = (localStorage.getItem('bn_name') || sessionStorage.getItem('bn_name') || '').trim();
let studentSchool = (localStorage.getItem('bn_school') || sessionStorage.getItem('bn_school') || '').trim();

// 상태
let queue = [];
let currentIdx = 0;
let wrongWords = [];
let allWrong = [];
let round = 1;
let currentWord = null;
let answered = false;
let totalQuestions = 0;
let startTime = null;
// 암기 단계 상태
let memoIdx = 0;
let memoTimer = null;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// 인트로: 학생 이름 표시 (없으면 입력 받기)
function initIntro(){
  const hello = document.getElementById('helloBox');
  const input = document.getElementById('nameInput');
  if(studentName){
    hello.innerHTML = studentName + ' 학생' +
      (studentSchool ? ' <span class="sch">(' + studentSchool + ')</span>' : '') + ' 안녕하세요! 👋';
    input.style.display='none';
  } else {
    hello.textContent = '👤 이름을 입력하세요';
    input.style.display='block';
    document.getElementById('introDesc').textContent = '결과가 선생님께 전송됩니다. 이름을 정확히 입력해주세요.';
  }
}

function startFromIntro(){
  if(!studentName){
    const val = document.getElementById('nameInput').value.trim();
    if(!val){
      const el=document.getElementById('nameInput');
      el.classList.add('err'); el.placeholder='이름을 입력해주세요!';
      setTimeout(()=>{el.classList.remove('err');el.placeholder='이름을 입력하세요';},1400);
      return;
    }
    studentName = val;
    try{ localStorage.setItem('bn_name', val); }catch(e){}
  }
  startTime = new Date();
  startMemorize();
}

/* ===== STAGE 1 : 암기 (TTS 3회 자동재생) ===== */
function startMemorize(){
  memoIdx = 0;
  showScreen('screen-memo');
  loadMemo();
}

function loadMemo(){
  const w = WORDS[memoIdx];
  document.getElementById('memoEn').textContent = w.en;
  document.getElementById('memoKo').textContent = w.ko;
  const pct = Math.round((memoIdx)/WORDS.length*100);
  document.getElementById('memoFill').style.width = pct + '%';
  document.getElementById('memoText').textContent = (memoIdx+1) + ' / ' + WORDS.length;
  document.getElementById('memoPrev').disabled = (memoIdx===0);
  const last = (memoIdx === WORDS.length-1);
  document.getElementById('memoNext').style.display = last ? 'none' : 'block';
  document.getElementById('memoToQuiz').style.display = last ? 'block' : 'none';
  // TTS 3회 자동재생
  autoSpeak3(w.en);
}

function autoSpeak3(text){
  if(memoTimer){ clearTimeout(memoTimer); memoTimer=null; }
  if(!('speechSynthesis' in window)){ document.getElementById('memoCount').textContent=''; return; }
  window.speechSynthesis.cancel();
  const btn = document.getElementById('memoSound');
  const cnt = document.getElementById('memoCount');
  let n = 0;
  function speakOnce(){
    n++;
    cnt.textContent = '🔊 발음 ' + n + ' / 3';
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.8; u.pitch=1;
    const voices = window.speechSynthesis.getVoices();
    const en = voices.find(v=>v.lang && /^en/i.test(v.lang));
    if(en) u.voice=en;
    btn.classList.add('playing');
    u.onend = function(){
      btn.classList.remove('playing');
      if(n < 3){ memoTimer = setTimeout(speakOnce, 550); }
      else { cnt.textContent = '✅ 3번 듣기 완료'; }
    };
    u.onerror = function(){ btn.classList.remove('playing'); };
    window.speechSynthesis.speak(u);
  }
  speakOnce();
}

function replayMemo(){ autoSpeak3(WORDS[memoIdx].en); }

function memoNext(){
  if(memoIdx < WORDS.length-1){ memoIdx++; loadMemo(); }
}
function memoPrev(){
  if(memoIdx > 0){ memoIdx--; loadMemo(); }
}

/* ===== STAGE 2 & 3 : 퀴즈 + 오답 반복 ===== */
function startQuizStage(){
  if(memoTimer){ clearTimeout(memoTimer); }
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  queue = shuffle([...WORDS]);
  wrongWords = [];
  allWrong = [];
  round = 1;
  currentIdx = 0;
  totalQuestions = 0;
  showScreen('screen-quiz');
  loadWord();
}

function loadWord(){
  if(currentIdx >= queue.length){ showRoundResult(); return; }
  answered = false;
  currentWord = queue[currentIdx];
  totalQuestions++;
  const total = queue.length;
  const pct = Math.round((currentIdx/total)*100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = (currentIdx+1) + ' / ' + total;
  document.getElementById('roundBadge').textContent = round + '라운드';
  document.getElementById('quizStageTag').textContent = round===1 ? 'STEP 2 · 4지선다 퀴즈' : 'STEP 3 · 오답 반복 (' + round + '라운드)';
  document.getElementById('wordEn').textContent = currentWord.en;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').classList.remove('show');
  buildChoices();
  setTimeout(()=>speakWord(), 300);
}

function speakWord(){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(currentWord.en);
  u.lang='en-US'; u.rate=0.85;
  const voices = window.speechSynthesis.getVoices();
  const en = voices.find(v=>v.lang && /^en/i.test(v.lang));
  if(en) u.voice=en;
  const btn = document.getElementById('soundBtn');
  btn.classList.add('playing');
  u.onend = ()=>btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
}

// 보기 생성: 정답과 뜻(ko)이 다른 오답 3개, 정답은 id 로 판정
function buildChoices(){
  const container = document.getElementById('choices');
  container.innerHTML = '';
  const pool = [];
  const seenKo = new Set([currentWord.ko]);
  for(const w of shuffle(WORDS.filter(w=>w.id!==currentWord.id))){
    if(seenKo.has(w.ko)) continue;
    seenKo.add(w.ko);
    pool.push(w);
    if(pool.length===3) break;
  }
  const options = shuffle([currentWord, ...pool]);
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='choice-btn';
    btn.textContent = opt.ko;
    btn.onclick = ()=>selectAnswer(btn, opt.id===currentWord.id);
    container.appendChild(btn);
  });
}

function selectAnswer(btn, isCorrect){
  if(answered) return;
  answered = true;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled = true;
    if(b.textContent === currentWord.ko) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  if(isCorrect){
    btn.classList.add('correct');
    fb.textContent = '✅ 정답!';
    fb.className='feedback ok';
  } else {
    btn.classList.add('wrong');
    fb.textContent = '❌ 내 답: ' + btn.textContent + ' / 정답: ' + currentWord.ko;
    fb.className='feedback bad';
    if(!wrongWords.find(w=>w.id===currentWord.id)) wrongWords.push(currentWord);
    if(!allWrong.find(w=>w.id===currentWord.id)) allWrong.push(currentWord);
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextWord(){ currentIdx++; loadWord(); }

function showRoundResult(){
  const correct = queue.length - wrongWords.length;
  const pct = Math.round(correct/queue.length*100);
  if(wrongWords.length === 0){ showDone(); return; }
  document.getElementById('roundEmoji').textContent = pct>=80 ? '😊' : '💪';
  document.getElementById('roundTitle').textContent = round + '라운드 완료!';
  document.getElementById('roundScore').textContent = correct + ' / ' + queue.length;
  document.getElementById('roundScoreLabel').textContent = pct + '점 · 오답 ' + wrongWords.length + '개';
  document.getElementById('roundSub').textContent =
    '오답 ' + wrongWords.length + '개가 남았어요.\n다시 풀어서 완벽하게 마무리해봐요! 💪';
  document.getElementById('retryBtn').style.display='block';
  showScreen('screen-round');
  saveResult(false);
}

function startRetry(){
  round++;
  queue = shuffle([...wrongWords]);
  wrongWords = [];
  currentIdx = 0;
  showScreen('screen-quiz');
  loadWord();
}

function finishEarly(){ showDone(); }

function showDone(){
  const elapsed = Math.max(1, Math.round((new Date()-startTime)/60000));
  document.getElementById('doneSub').textContent =
    studentName + ' 학생, 모든 단어를 완벽하게 외웠어요! 🎉\n총 ' + round + '라운드 · 약 ' + elapsed + '분 소요';
  document.getElementById('statRounds').textContent = round;
  document.getElementById('statWords').textContent = WORDS.length;
  document.getElementById('statWrong').textContent = allWrong.length;
  showScreen('screen-done');
  saveResult(true);
}

function saveResult(completed){
  const data = {
    studentName,
    school: studentSchool,
    quizType: LEVEL_INFO.quizType,
    level: LEVEL_INFO.name,
    score: completed ? 100 : Math.round((WORDS.length-allWrong.length)/WORDS.length*100),
    correct: WORDS.length - allWrong.length,
    wrong: allWrong.length,
    total: WORDS.length,
    round,
    completed,
    wrongWords: allWrong.map(w=>({eng:w.en, kor:w.ko})),
    userAgent: navigator.userAgent.substring(0,100)
  };
  let w = 0;
  const t = setInterval(()=>{
    w += 200;
    if(window._saveResult){ clearInterval(t); window._saveResult(data); }
    else if(w>=6000) clearInterval(t);
  }, 200);
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// 음성 목록 예열 + 인트로 초기화
if(window.speechSynthesis){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=function(){}; }
initIntro();
</script>
