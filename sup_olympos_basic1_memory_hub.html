<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>봄날 ENGLISH | 올림포스 독해 기본 1 · 본문암기 전체</title>
<script type="module" src="bn_tracker.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#fef3e2,#fde4c0);min-height:100vh;color:#1a1a2e;}
header{padding:24px 20px 14px;text-align:center;background:white;border-bottom:1px solid #f5d2a0;}
.book-tag{display:inline-block;background:#8d6e3e;color:white;border-radius:14px;padding:2px 10px;font-size:.65rem;font-weight:700;margin-bottom:6px;}
.type-title{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;color:#b8860b;}
.subtitle{font-size:.78rem;color:#8d6e3e;margin-top:3px;}
main{max-width:780px;margin:24px auto;padding:0 16px 60px;}
.back-nav{display:inline-flex;align-items:center;gap:6px;background:white;border:1.5px solid #d4b890;border-radius:10px;padding:7px 14px;font-size:.78rem;color:#8d6e3e;cursor:pointer;text-decoration:none;margin-bottom:18px;}
.back-nav:hover{border-color:#b8860b;color:#b8860b;}
.intro-box{background:white;border:1px solid #f5d2a0;border-radius:12px;padding:14px 16px;margin-bottom:18px;font-size:.82rem;line-height:1.65;color:#8d6e3e;}
.section-title{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:#b8860b;margin:20px 4px 12px;}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.unit-card{background:white;border:2px solid #f5d2a0;border-radius:14px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .15s;text-decoration:none;color:inherit;display:block;}
.unit-card:hover{border-color:#b8860b;background:#fff8e6;transform:translateY(-2px);box-shadow:0 4px 12px rgba(184,134,11,.15);}
.unit-card.unavailable{opacity:.45;cursor:not-allowed;background:#f5f0e8;}
.unit-no{font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:#b8860b;line-height:1;}
.unit-label{font-size:.75rem;color:#8d6e3e;margin-top:5px;line-height:1.3;}
.unit-pill{display:inline-block;background:#fff8e6;color:#b8860b;padding:2px 8px;border-radius:10px;font-size:.62rem;font-weight:700;margin-top:6px;}
</style>
</head>
<body>
<header>
  <div class="book-tag">📘 올림포스 독해 기본 1</div>
  <div class="type-title">📖 본문암기</div>
  <div class="subtitle">Unit을 선택해 지문 학습을 시작하세요</div>
</header>
<main>
  <a class="back-nav" href="sup_olympos_basic1_hub.html">← 올림포스 메인으로</a>
  <div class="intro-box">
    <strong>모의고사와 동일한 본문암기 형식</strong><br>
    지문(ANALYSIS / Practice 01·02·03) 선택 → 빈칸 추론 문항 풀기 → 채점.
    채점 후 정답·오답 영단어의 한국어 뜻이 함께 표시됩니다.
  </div>
  <div class="section-title">📚 Unit 선택</div>
  <div class="unit-grid" id="unit-grid"></div>
</main>
<script>
// available: 본문 데이터가 추출된 Unit (1~16)
const UNITS = [
  {no:1, theme:'글의 목적', av:true},
  {no:2, theme:'심경 · 분위기', av:true},
  {no:3, theme:'주장 · 요지', av:true},
  {no:4, theme:'함축적 의미', av:true},
  {no:5, theme:'주제 · 제목', av:true},
  {no:6, theme:'도표 · 실용문', av:true},
  {no:7, theme:'학술문 불일치', av:true},
  {no:8, theme:'어법 정확성', av:true},
  {no:9, theme:'어휘 적절성', av:true},
  {no:10, theme:'단어 빈칸 추론', av:true},
  {no:11, theme:'짧은 어구 빈칸', av:true},
  {no:12, theme:'긴 어구 빈칸', av:true},
  {no:13, theme:'무관한 문장', av:true},
  {no:14, theme:'글의 순서', av:true},
  {no:15, theme:'문장 삽입', av:true},
  {no:16, theme:'요약문 완성', av:true},
  {no:17, theme:'장문 Ⅰ (1지문 2문항)', av:false},
  {no:18, theme:'장문 Ⅱ (1지문 3문항)', av:false}
];
const grid = document.getElementById('unit-grid');
UNITS.forEach(u => {
  const el = document.createElement(u.av ? 'a' : 'div');
  el.className = 'unit-card' + (u.av ? '' : ' unavailable');
  if (u.av) el.href = `sup_olympos_basic1_u${u.no}_memory.html`;
  el.innerHTML = `
    <div class="unit-no">U${u.no}</div>
    <div class="unit-label">${u.theme}</div>
    <span class="unit-pill">${u.av ? '📖 본문암기' : '준비 중'}</span>
  `;
  grid.appendChild(el);
});
</script>
</body>
</html>
