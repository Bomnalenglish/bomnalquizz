, especially Romantic poets and those in Asian traditions, the aesthetic in everyday situations has also been recognized by novelists. It may be most convenient, though, to locate its contemporary intellectual origins in John Dewey’s Art as Experience. In that book Dewey argued against the separation of art from life by basing aesthetic experience on the biological and cultural conditions of human life. He located the aesthetic, not in an internalized awareness of sensation and feeling but in “a complete interpenetration of self and the world of objects and events.” Further, Dewey maintained that “the aesthetic is the clarified and intensified development of traits that belong to every normally complete experience.” * gratification: 만족감 ** interpenetration: 상호 침투","choices":["While studying everyday aesthetics is a recent trend, recognizing the beauty of ordinary things is not.","Common philosophical theories usually respected and supported the aesthetic value of ordinary object and events.","Poets and novelists have both acknowledged the aesthetic significance","Dewey rooted aesthetic experience in the biological and cultural contexts of life.","Dewy thought the aesthetic develops from qualities already found in every complete human experience."],"ans":2},{"school":"","internal":35,"type":"문장 위치","stem":"글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.","body":"Widely Valued by poets, especially Romantic poets and those in Asian traditions, the aesthetic in everyday situations has also been recognized by novelists. Perhaps the best-known development to emerge from the liberation and expansion of aesthetic experience is the aesthetics of everyday life. (","choices":[") Although there is presently a flowering of work on everyday aesthetics, the possibility of aesthetic gratification in ordinary objects and events has long been recognized, even if degraded and dismissed by prevalent philosophical theory. (",") It may be most convenient, though, to locate its contemporary int e technical issues flagged in AI’s poor handling of higher duration and frequency silences, no less than the machine inference that silence can be filled with","relevant sounds in some conversational situations, are both significant. In this context at least, the AI may be starting to recognise silence not as an absence but as","meaningful data. Yet the AI’s confusion when presented with substantial silences, and its understanding that short break tags are equivalent to vocal markers such as ‘uh’s’ and ‘ah’s’ indicate the AI’s","continuing preferences for sound over silence, for presence over absence."],"ans":2},{"school":"","internal":37,"type":"글의 순서","stem":"주어진 글 다음에 이어질 글의 순서로 가장 적절 한 것을 고르시오.","body":"Such artificial ‘pause fillers’ as machine­generated supplements for silence may help to produce a more natural­sounding cadence in machine­generated speech patterns and so help to convince the AI’s human interlocutors that they are engaging with another human.\n\n(A) However, the technical issues flagged in AI’s poor handling of higher duration and frequency silences, no less than the machine inference that silence can be filled with relevant sounds in some conversational situations, are both significant. In this context at least, the AI may be starting to recognise silence not as an absence but as meaningful data.\n\n(B) AI’s ‘humanity’ of silence emerges in these contexts not least because a short period of silence is likely to be interpreted as a ‘pause for thought’, therefore reinforcing the illusion that the machine is ‘thinking’ before responding, just as a human might.\n\n(C) Yet the AI’s confusion when presented with substantial silences, and its understanding that short break tags are equivalent to vocal markers such as ‘uh’s’ and ‘ah’s’ indicate the AI’s continuing preferences for sound over silence, for presence over absence. * cadence: 억양 ** interlocutor: 대화 상대 *** equivalent: 상응하는","choices":["(A)-(C)-(B)","(B)-(A)-(C)","(B)-(C)-(A)","(C)-(A)-(B)","(C)-(B)-(A)"],"ans":2},{"school":"","internal":61,"type":"요지","stem":"다음 글의 요지로 가장 적절한 것은?","body":"Such artificial ‘pause fillers’ as machine­generated supplements for silence may help to produce a more natural­sounding cadence in machine­generated speech patterns and so help to convince the AI’s human interlocutors that they are engaging with another human. AI’s ‘humanity’ of silence emerges in these contexts not least because a short period of silence is likely to be interpreted as a ‘pause for thought’, therefore reinforcing the illusion that the machine is ‘thinking’ before responding, just as a human might. However, the technical issues flagged in AI’s poor handling of higher duration and frequency silences, no less than the machine inference that silence can be filled with relevant sounds in some conversational situations, are both significant. In this context at least, the AI may be starting to recognise silence not as an absence but as meaningful data. Yet the AI’s confusion when presented with substantial silences, and its understanding that short break tags are equivalent to vocal markers such as ‘uh’s’ and ‘ah’s’ indicate the AI’s continuing preferences for sound over silence, for presence over absence. * cadence: 억양 ** interlocutor: 대화 상대 *** equivalent: 상응하는","choices":["AI의 대화 능력은 인간의 언어 처리 능력을 이미 능가 했다.","인간은 침묵보다 소리를 더 선호하므로 AI도 이를 따 라야 한다.","기술의 발전으로 AI와 인간의 대화를 구별하는 것이 불가능해졌다.","AI는 긴 침묵을 완벽하게 처리하지만 짧은 멈춤에서 오류를 보인다.","AI가 침묵을 데이터로 인식하기 시작했으나, 여전히 소리 로 채우려는 경향이 지배적이다."],"ans":5},{"school":"","internal":81,"type":"빈칸추론","stem":"다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?","body":"Such artificial ‘pause fillers’ as machine­generated supplements for silence may help to produce a more natural­sounding cadence in machine­generated speech patterns and so help to convince the AI’s human interlocutors that they are engaging with another human. AI’s ‘humanity’ of silence emerges in these contexts not least because a short period of silence is let studentName='', studentSchool='';
let selectedNos = new Set();
let currentRound = 0;
let activeNos = [];
let roundQuestions = {};
let usedQs = {};
let userAnswers = {};
let perNoHistory = {};
let t0 = 0;

function show(id){
  ['loginScreen','selectScreen','roundScreen','resultScreen','doneScreen'].forEach(x=>{
    const el=document.getElementById(x); if(el) el.classList.toggle('hidden', x!==id);
  });
  window.scrollTo(0,0);
}

function goSelect(){
  studentName = document.getElementById('nameInput').value.trim();
  studentSchool = document.getElementById('schoolSel').value;
  if(!studentSchool){alert('학교를 선택해주세요!');return;}
  if(!studentName){alert('이름을 입력해주세요!');return;}
  renderNoGrid();
  const nos = Object.keys(POOL).sort((a,b)=>+a-+b);
  const totalQ = nos.reduce((s,n)=>s+POOL[n].length,0);
  document.getElementById('poolTotal').textContent = totalQ;
  document.getElementById('poolNos').textContent = nos.length;
  show('selectScreen');
  t0 = Date.now();
}
window.goSelect = goSelect;

function renderNoGrid(){
  const g = document.getElementById('noGrid');
  g.innerHTML = '';
  Object.keys(POOL).sort((a,b)=>+a-+b).forEach(n=>{
    const cnt = POOL[n].length;
    const div = document.createElement('div');
    div.className = 'no-card';
    div.dataset.no = n;
    div.innerHTML = `<div>${n}</div><div class="cnt">${cnt}문제</div>`;
    div.onclick = ()=>toggleNo(n);
    g.appendChild(div);
  });
}

function toggleNo(n){
  if(selectedNos.has(n)) selectedNos.delete(n); else selectedNos.add(n);
  document.querySelectorAll('.no-card').forEach(c=>{ c.classList.toggle('sel', selectedNos.has(c.dataset.no)); });
  document.getElementById('startBtn').disabled = selectedNos.size===0;
}
window.toggleNo = toggleNo;

function selectAllNos(){
  Object.keys(POOL).forEach(n=>selectedNos.add(n));
  document.querySelectorAll('.no-card').forEach(c=>c.classList.add('sel'));
  document.getElementById('startBtn').disabled = false;
}
window.selectAllNos = selectAllNos;

function startRound1(){
  currentRound = 1;
  activeNos = Array.from(selectedNos).sort((a,b)=>+a-+b);
  usedQs = {}; perNoHistory = {};
  activeNos.forEach(n=>{ usedQs[n] = new Set(); perNoHistory[n] = []; });
  buildRound();
}
window.startRound1 = startRound1;

function buildRound(){
  roundQuestions = {}; userAnswers = {};
  activeNos.forEach(n=>{
    const pool = POOL[n] || [];
    let pickIdx = -1;
    // pick random unused
    const unused = [];
    for(let i=0;i<pool.length;i++){ if(!usedQs[n].has(i)) unused.push(i); }
    if(unused.length > 0){
      pickIdx = unused[Math.floor(Math.random()*unused.length)];
      usedQs[n].add(pickIdx);
      roundQuestions[n] = { ...pool[pickIdx], _idx: pickIdx };
    } else {
      pickIdx = 0;
      roundQuestions[n] = { ...pool[pickIdx], _exhausted: true, _idx: pickIdx };
    }
  });
  renderRoundQuestions();
  document.getElementById('roundLabel').textContent = `⏰ ${currentRound}차 세트 — 풀이`;
  document.getElementById('roundInfo').textContent = `번호 ${activeNos.length}개 · 각 1문제씩`;
  updateHudProgress();
  show('roundScreen');
}

function escHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// 빈칸 시각화 보강 — body 텍스트에서 빈칸 누락 위치 추정해 시각화
function reviveBlanks(body, type, stem){
  let t = body;
  const isBlank = /빈칸|cloze|함축|문장 위치|순서/.test((type||'') + ' ' + (stem||''));
  // 0) explicit [BLANK_위치] marker → blank
  t = t.replace(/\[BLANK_위치\]/g, '<span class="blk"></span>');
  // 1) underscores (already-visible blanks)
  t = t.replace(/_{3,}/g, '<span class="blk"></span>');
  // 2) empty parens or single space inside () → 빈칸
  t = t.replace(/\(\s*\)/g, '(<span class="blk"></span>)');
  t = t.replace(/\(\s{2,}\)/g, '(<span class="blk"></span>)');
  if(isBlank){
    // 3) " . " 또는 trailing " ." 패턴 (콤마/마침표 직전 공백 큰) → 빈칸
    t = t.replace(/\s{2,}\./g, ' <span class="blk"></span>.');
    t = t.replace(/(\s)\.(\s)/g, '$1<span class="blk"></span>.$2');
    t = t.replace(/\s{4,}/g, ' <span class="blk"></span> ');
  }
  return t;
}

    const typeBadge = q.type ? `<span class="q-type-badge">${escHtml(q.type)}</span>` : '';
    const schoolBadge = q.school ? `<span class="q-school">${escHtml(q.school)}</span>` : '';
    const bodyHtml = reviveBlanks(escHtml(q.body), q.type||'', q.stem||'');
    card.innerHTML = `
      <div class="q-meta">
        <span class="q-no-badge">${n}번 · ${currentRound}차</span>
        ${typeBadge}
        ${schoolBadge}
        ${exhaustedNote}
      </div>
      <div class="q-stem">${escHtml(q.stem)}</div>
      <div class="q-body">${bodyHtml}</div>
      <div class="choices" id="ch-${n}">
        ${q.choices.map((opt,i)=>`<button class="opt-btn" data-pick="${i+1}" onclick="pickAnswer('${n}',${i+1})">
          <span class="opt-num">${i+1}</span>
          <span>${escHtml(opt)}</span>
        </button>`).join('')}
      </div>
      <div class="fb-line" id="fb-${n}"></div>
    `;
    c.appendChild(card);
  });
}

function pickAnswer(n, idx){
  if(userAnswers[n] !== undefined) return;
  userAnswers[n] = idx;
  const card = document.querySelector(`.q-card[data-no="${n}"]`);
  card.querySelectorAll('.opt-btn').forEach(b=>{
    if(parseInt(b.dataset.pick) === idx) b.classList.add('sel');
  });
  updateHudProgress();
}
window.pickAnswer = pickAnswer;

function updateHudProgress(){
  const answered = Object.keys(userAnswers).length;
  document.getElementById('hudProgress').textContent = `${answered} / ${activeNos.length} 답함`;
  document.getElementById('submitBtn').disabled = answered < activeNos.length;
}

function submitRound(){
  if(Object.keys(userAnswers).length < activeNos.length){ alert('모든 번호의 답을 선택해주세요!'); return; }
  const stillWrong = [];
  const roundResults = [];
  activeNos.forEach(n=>{
    const q = roundQuestions[n];
    const picked = userAnswers[n];
    const correct = picked === q.ans;
    const exhausted = !!q._exhausted;
    const finalCorrect = correct || exhausted;
    perNoHistory[n].push({ round: currentRound, qInternal: q.internal, school: q.school||'', type:q.type||'', picked, ans: q.ans, correct, exhausted });
    if(!finalCorrect) stillWrong.push(n);
    const card = document.querySelector(`.q-card[data-no="${n}"]`);
    card.classList.add('answered', correct ? 'ok' : 'bad');
    card.querySelectorAll('.opt-btn').forEach(b=>{
      const i = parseInt(b.dataset.pick);
      b.disabled = true;
      if(i === q.ans) b.classList.add('correct');
      if(i === picked && !correct) b.classList.add('wrong');
    });
    const fb = document.getElementById('fb-'+n);
    if(correct){ fb.className='fb-line show ok'; fb.textContent='✅ 정답!'; }
    else if(exhausted){ fb.className='fb-line show ok'; fb.textContent=`⚠️ 더 이상 변형 없음 → 통과 (정답: ${q.ans}번)`; }
    else { fb.className='fb-line show bad'; fb.textContent=`❌ 오답 (정답: ${q.ans}번)`; }
    roundResults.push({ no:n, picked, ans:q.ans, correct, exhausted, school:q.school||'', type:q.type||'' });
  });
  if(window._fbSave){
    const elapsedMin = Math.round((Date.now()-t0)/60000);
    window._fbSave({
      submittedAt: new Date().toISOString(),
      studentName, school: studentSchool,
      score: Math.round((activeNos.length-stillWrong.length)/activeNos.length*100),
      correct: activeNos.length-stillWrong.length, wrong: stillWrong.length, total: activeNos.length,
      elapsedMin, quizType: QUIZ_TYPE_PREFIX + '_' + currentRound + '차',
      round: currentRound, activeNos: [...activeNos], wrongNos: stillWrong, details: roundResults,
    });
  }
  showResult(stillWrong);
}
window.submitRound = submitRound;

function showResult(stillWrong){
  document.getElementById('resultTitle').textContent = `📊 ${currentRound}차 세트 결과`;
  const passedCount = activeNos.length - stillWrong.length;
  document.getElementById('resultSummary').innerHTML = `통과 <strong>${passedCount} / ${activeNos.length}</strong> 번호 · 누적 라운드 <strong>${currentRound}</strong> · 다음 차시 풀 번호 <strong>${stillWrong.length}</strong>개`;
  const board = document.getElementById('resultBoard');
  board.innerHTML = '';
  activeNos.forEach(n=>{
    const hist = perNoHistory[n];
    const last = hist[hist.length-1];
    const passed = last.correct || last.exhausted;
    const div = document.createElement('div');
    div.className = 'no-result ' + (passed ? 'pass' : 'again');
    const attempts = hist.map(h=> h.correct?'✅':(h.exhausted?'⚪':'❌')).join('');
    div.innerHTML = `<div class="big">${n}번</div><div class="attempt-list">${attempts}</div><div class="lbl">${passed ? '통과!' : '다음 차시'}</div>`;
    board.appendChild(div);
  });
  const nextBtn = document.getElementById('nextRoundBtn');
  const finishBtn = document.getElementById('finishBtn');
  if(stillWrong.length === 0){
    nextBtn.style.display = 'none';
    finishBtn.style.display = 'block';
    finishBtn.textContent = '🏆 모든 번호 통과! 결과 보기 →';
    finishBtn.style.background = '';
  } else {
    nextBtn.style.display = 'block';
    nextBtn.textContent = `▶️ ${stillWrong.length}개 번호 다시 도전 (${currentRound+1}차)`;
    finishBtn.style.display = 'block';
    finishBtn.textContent = '중단하고 결과 보기';
  }
  window._pendingNext = stillWrong;
  show('resultScreen');
}

function startNextRound(){
  const stillWrong = window._pendingNext || [];
  if(stillWrong.length === 0){ finishAll(); return; }
  activeNos = stillWrong.slice();
  currentRound++;
  buildRound();
}
window.startNextRound = startNextRound;

function finishAll(){
  const board = document.getElementById('finalBoard');
  board.innerHTML = '';
  Array.from(selectedNos).sort((a,b)=>+a-+b).forEach(n=>{
    const hist = perNoHistory[n] || [];
    if(hist.length === 0) return;
    const last = hist[hist.length-1];
    const passed = last.correct || last.exhausted;
    const attempts = hist.map(h=> h.correct?'✅':(h.exhausted?'⚪':'❌')).join('');
    const div = document.createElement('div');
    div.className = 'no-result ' + (passed ? 'pass' : 'again');
    div.innerHTML = `<div class="big">${n}번</div><div class="attempt-list">${attempts}</div><div class="lbl">${passed ? '통과!' : `${hist.length}회 시도`}</div>`;
    board.appendChild(div);
  });
  if(window._fbSave){
    const elapsedMin = Math.round((Date.now()-t0)/60000);
    const passed = Array.from(selectedNos).filter(n=>{
      const h = perNoHistory[n] || [];
      const last = h[h.length-1];
      return last && (last.correct || last.exhausted);
    }).length;
    window._fbSave({
      submittedAt: new Date().toISOString(),
      studentName, school: studentSchool,
      score: Math.round(passed/selectedNos.size*100),
      correct: passed, wrong: selectedNos.size - passed, total: selectedNos.size,
      elapsedMin, quizType: QUIZ_TYPE_PREFIX + '_최종',
      totalRounds: currentRound, history: perNoHistory,
    });
  }
  show('doneScreen');
}
window.finishAll = finishAll;
</script>

</body>
