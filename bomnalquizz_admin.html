<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날 English | 통합 관리자</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
:root{--primary:#1a237e;--accent:#ff6f00;--green:#2e7d32;--red:#c62828;--bg:#eef0f8;--card:#fff;--border:#c5cae9;--muted:#757575;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);color:#1a1a2e;min-height:100vh;overflow:hidden;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
.login-card{background:var(--card);border-radius:20px;padding:44px 36px;text-align:center;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(26,35,126,.13);}
.login-card h1{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--primary);margin-bottom:6px;}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.7;}
.pw-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:15px;outline:none;font-family:'Nanum Gothic',sans-serif;transition:border-color .2s;margin-bottom:14px;}
.pw-input:focus{border-color:var(--primary);}
.pw-input.err{border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.app{height:100vh;display:flex;flex-direction:column;}
.header{background:var(--primary);color:white;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.2);flex-shrink:0;}
.header-title{font-family:'Black Han Sans',sans-serif;font-size:18px;letter-spacing:1px;}
.header-sub{font-size:11px;opacity:.65;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.refresh-info{font-size:11px;opacity:.6;}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:white;padding:6px 14px;border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;cursor:pointer;font-weight:700;}
.logout-btn:hover{background:rgba(255,255,255,.25);}
.tab-bar{background:var(--primary);border-top:1px solid rgba(255,255,255,.1);display:flex;padding:0 20px;flex-shrink:0;}
.tab-btn{background:none;border:none;color:rgba(255,255,255,.55);padding:11px 22px;font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab-btn:hover{color:rgba(255,255,255,.9);}
.tab-btn.active{color:white;border-bottom-color:var(--accent);}
.panels{flex:1;overflow:hidden;position:relative;}
.panel{position:absolute;inset:0;display:none;overflow-y:auto;}
.panel.active{display:block;}
.panel-iframe{overflow:hidden;}
.panel-iframe iframe{width:100%;height:100%;border:none;display:block;}
.quiz-inner{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:24px;}
.sum-card{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:0 2px 10px rgba(26,35,126,.07);}
.sum-n{font-family:'Black Han Sans',sans-serif;font-size:30px;color:var(--primary);line-height:1;}
.sum-l{font-size:11px;color:var(--muted);margin-top:4px;}
.sum-card.g .sum-n{color:var(--green);}
.sum-card.r .sum-n{color:var(--red);}
.sum-card.o .sum-n{color:#e65100;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.chart-card{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:0 2px 10px rgba(26,35,126,.07);}
.chart-card h3{font-size:12px;font-weight:800;color:var(--primary);margin-bottom:12px;}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:7px;}
.bar-lbl{width:84px;color:var(--muted);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:#f0f2f8;border-radius:3px;height:18px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3949ab,#ff6f00);transition:width .5s;}
.bar-val{width:32px;font-weight:700;color:var(--primary);text-align:right;}
.controls{background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;box-shadow:0 2px 8px rgba(26,35,126,.06);}
.ctrl-label{font-size:11px;font-weight:800;color:var(--primary);}
.ctrl-sel,.ctrl-inp{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;outline:none;}
.ctrl-sel:focus,.ctrl-inp:focus{border-color:var(--primary);}
.spacer{flex:1;}
.btn-export{background:#e8eaf6;color:var(--primary);border:none;padding:8px 16px;border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.btn-refresh{background:var(--primary);color:white;border:none;padding:8px 16px;border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.btn-refresh:hover{opacity:.85;}
.tbl-wrap{background:var(--card);border-radius:14px;box-shadow:0 2px 10px rgba(26,35,126,.07);overflow:hidden;}
.tbl-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.tbl-title{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--primary);}
.cnt-badge{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:var(--muted);}
.tbl-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--primary);color:white;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid #f0f2f8;font-size:12px;vertical-align:middle;}
td.nw{white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8f9ff;}
.sp{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800;}
.sS{background:#fff8e1;color:#f57f17;}.sA{background:#e8f5e9;color:#2e7d32;}
.sB{background:#e3f2fd;color:#1565c0;}.sC{background:#fff3e0;color:#e65100;}.sD{background:#ffebee;color:#c62828;}
.wt-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;color:var(--muted);}
.wt-btn:hover{border-color:var(--primary);color:var(--primary);}
.wt-detail{display:none;padding:8px 12px 12px;background:#fafbff;border-top:1px solid #f0f2f8;}
.wt-detail.open{display:block;}
.wt-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.wt-chip{background:#ffebee;color:var(--red);border-radius:5px;padding:2px 7px;font-size:10px;}
.wt-chip .wa{color:var(--green);margin-left:3px;}
.empty-msg{text-align:center;padding:40px;color:var(--muted);}
.loading-msg{text-align:center;padding:36px;color:var(--muted);}
.btn{display:inline-block;padding:12px 28px;border:none;border-radius:10px;font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.btn-primary{background:var(--primary);color:white;}
.section-dash{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
.sec-controls{background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;box-shadow:0 2px 8px rgba(26,35,126,.06);}
.student-cards{display:flex;flex-direction:column;gap:14px;}
.student-card{background:var(--card);border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(26,35,126,.07);}
.student-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.student-name{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--primary);}
.student-summary{display:flex;gap:8px;flex-wrap:wrap;}
.sum-pill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
.sum-pill.done{background:#e8f5e9;color:var(--green);}
.sum-pill.todo{background:#ffebee;color:var(--red);}
.sum-pill.warn{background:#fff3e0;color:#e65100;}
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.sec-cell{border-radius:10px;padding:10px 12px;font-size:12px;text-align:center;border:2px solid transparent;}
.sec-cell .sec-num{font-family:'Black Han Sans',sans-serif;font-size:14px;margin-bottom:4px;}
.sec-cell .sec-score{font-size:13px;font-weight:800;}
.sec-cell .sec-wrong{font-size:11px;margin-top:2px;}
.sec-cell .sec-time{font-size:10px;color:var(--muted);margin-top:2px;}
.sec-cell.perfect{background:#e8f5e9;border-color:#a5d6a7;}
.sec-cell.perfect .sec-score{color:var(--green);}
.sec-cell.has-wrong{background:#fff3e0;border-color:#ffcc80;}
.sec-cell.has-wrong .sec-score{color:#e65100;}
.sec-cell.not-done{background:#f5f5f5;border-color:#e0e0e0;opacity:.6;}
.sec-cell.not-done .sec-score{color:var(--muted);}
.no-data-msg{text-align:center;padding:48px;color:var(--muted);}
.quiz-type-label{font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.5px;}
.access-block{margin-top:12px;padding-top:10px;border-top:1px solid #f0f2f8;}
.access-block-title{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;}
.access-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.acc-chip-enter{background:#e3f2fd;color:#1565c0;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:800;}
.acc-chip-quiz{background:#f3e5f5;color:#6a1b9a;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:800;}
.acc-chip-time{font-weight:400;opacity:.7;margin-left:2px;}
.hidden{display:none!important;}
.del-btn{background:none;border:1px solid #ffcdd2;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;color:#e53935;}
.del-btn:hover{background:#ffebee;border-color:#e53935;}
.btn-delete-all{background:#ffebee;color:#c62828;border:none;padding:8px 16px;border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.btn-delete-all:hover{background:#ffcdd2;}
@media(max-width:640px){
  .chart-grid{grid-template-columns:1fr;}
  .summary-grid{grid-template-columns:repeat(2,1fr);}
  th,td{padding:7px 9px;font-size:11px;}
  .tab-btn{padding:10px 12px;font-size:12px;}
}
/* 회차 이력 모달 */
.sec-cell[data-qt]{cursor:pointer;position:relative;}
.sec-cell[data-qt]:hover{outline:2px solid #1565c0;transform:translateY(-1px);}
.sec-cell[data-qt][data-rounds]:not([data-rounds="1"])::after{content:attr(data-rounds)"회";position:absolute;top:-6px;right:-6px;background:#e65100;color:white;font-size:9px;font-weight:900;padding:1px 5px;border-radius:8px;line-height:1.3;}
.hist-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.hist-modal{background:white;border-radius:16px;max-width:720px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.3);}
.hist-head{padding:16px 20px;background:linear-gradient(135deg,#1565c0,#0d47a1);color:white;display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
.hist-head-left{flex:1;min-width:0;}
.hist-head-name{font-size:17px;font-weight:900;}
.hist-head-qt{font-size:11px;opacity:.9;margin-top:4px;word-break:break-all;}
.hist-close{background:rgba(255,255,255,.2);border:none;color:white;font-size:18px;font-weight:900;cursor:pointer;width:30px;height:30px;border-radius:50%;flex-shrink:0;}
.hist-close:hover{background:rgba(255,255,255,.35);}
.hist-body{padding:14px 18px 18px;overflow-y:auto;}
.hist-row{padding:12px 14px;border-radius:10px;margin-bottom:8px;border:1px solid #e3f2fd;background:#fafdff;}
.hist-row.latest{border-color:#1565c0;background:linear-gradient(135deg,#e3f2fd,#fff);}
.hist-row.perfect{border-color:#43a047;background:linear-gradient(135deg,#e8f5e9,#fff);}
.hist-row-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
.hist-rank{font-size:11px;font-weight:900;color:#1565c0;background:#e3f2fd;padding:2px 8px;border-radius:8px;}
.hist-rank.latest{background:#1565c0;color:white;}
.hist-rank.perfect{background:#43a047;color:white;}
.hist-time{font-size:11px;color:#666;}
.hist-score{font-size:20px;font-weight:900;}
.hist-meta{font-size:11px;color:#555;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;}
.hist-meta b{color:#222;}
.hist-wrong-list{margin-top:6px;font-size:11px;color:#c62828;background:#ffebee;padding:6px 10px;border-radius:6px;line-height:1.5;word-break:break-all;}
.hist-empty{padding:30px;text-align:center;color:#999;}
</style>
</head>
<body>

<div id="loginWrap" class="login-wrap">
  <div class="login-card">
    <h1>🌸 봄날 English</h1>
    <p>통합 관리자 페이지입니다.<br>비밀번호를 입력해주세요.</p>
    <input type="password" class="pw-input" id="pwInput" placeholder="비밀번호"
           onkeydown="if(event.key==='Enter')doLogin()">
    <br>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%">로그인</button>
  </div>
</div>

<div id="dashboard" class="app hidden">
  <div class="header">
    <div>
      <div class="header-title">🌸 봄날 English · 통합 관리자</div>
      <div class="header-sub">퀴즈 결과 + 단어장·학생 관리</div>
    </div>
    <div class="header-right">
      <span class="refresh-info" id="lastRefresh"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('quiz')"    id="tab-quiz">📊 퀴즈 결과</button>
    <button class="tab-btn"        onclick="switchTab('section')" id="tab-section">📋 학생별 현황</button>
    <button class="tab-btn"        onclick="switchTab('access')"  id="tab-access">🔐 접속 기록</button>
    <button class="tab-btn"        onclick="switchTab('vaca')"    id="tab-vaca">📚 단어장 · 학생 관리</button>
  </div>
  <div class="panels">
    <div class="panel active" id="panel-quiz">
      <div class="quiz-inner">
        <div class="summary-grid">
          <div class="sum-card">  <div class="sum-n" id="sTotal">-</div>  <div class="sum-l">총 응시 횟수</div></div>
          <div class="sum-card">  <div class="sum-n" id="sStud">-</div>   <div class="sum-l">응시 학생 수</div></div>
          <div class="sum-card g"><div class="sum-n" id="sScore">-</div>  <div class="sum-l">평균 점수</div></div>
          <div class="sum-card r"><div class="sum-n" id="sWrong">-</div>  <div class="sum-l">평균 오답</div></div>
          <div class="sum-card o"><div class="sum-n" id="sTimeout">-</div><div class="sum-l">평균 시간초과</div></div>
        </div>
        <div class="chart-grid">
          <div class="chart-card"><h3>📊 점수 분포</h3><div id="scoreDist"></div></div>
          <div class="chart-card"><h3>❌ 자주 틀린 단어 TOP 10</h3><div id="wrongWords"></div></div>
        </div>
        <div class="controls">
          <span class="ctrl-label">학교</span>
          <select class="ctrl-sel" id="fSchool" onchange="applyFilter()">
            <option value="">전체</option>
            <optgroup label="종촌고"><option value="종촌고">종촌고 전체</option><option value="종촌고1">종촌고1</option><option value="종촌고2">종촌고2</option><option value="종촌고3">종촌고3</option></optgroup>
            <optgroup label="고운고"><option value="고운고">고운고 전체</option><option value="고운고1">고운고1</option><option value="고운고2">고운고2</option><option value="고운고3">고운고3</option></optgroup>
            <optgroup label="대성고"><option value="대성고">대성고 전체</option><option value="대성고1">대성고1</option><option value="대성고2">대성고2</option><option value="대성고3">대성고3</option></optgroup>
            <optgroup label="종촌중"><option value="종촌중">종촌중 전체</option><option value="종촌중1">종촌중1</option><option value="종촌중2">종촌중2</option><option value="종촌중3">종촌중3</option></optgroup>
            <optgroup label="어진중"><option value="어진중">어진중 전체</option><option value="어진중1">어진중1</option><option value="어진중2">어진중2</option><option value="어진중3">어진중3</option></optgroup>
            <optgroup label="고운중"><option value="고운중">고운중 전체</option><option value="고운중1">고운중1</option><option value="고운중2">고운중2</option><option value="고운중3">고운중3</option></optgroup>
          </select>
          <span class="ctrl-label">이름</span>
          <input type="text" class="ctrl-inp" id="fName" placeholder="검색..." oninput="applyFilter()">
          <span class="ctrl-label">정렬</span>
          <select class="ctrl-sel" id="fSort" onchange="applyFilter()">
            <option value="time_desc">최신순</option>
            <option value="time_asc">오래된순</option>
            <option value="score_desc">점수↓</option>
            <option value="score_asc">점수↑</option>
          </select>
          <div class="spacer"></div>
          <button class="btn-delete-all" onclick="confirmDeleteAll()">🗑️ 선택 삭제</button>
          <button class="btn-export" onclick="exportCSV()">📥 CSV</button>
          <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
        </div>
        <div class="tbl-wrap">
          <div class="tbl-head"><span class="tbl-title">응시 기록</span><span class="cnt-badge" id="cntBadge">0건</span></div>
          <div id="tblArea"><div class="loading-msg">데이터 불러오는 중...</div></div>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-section">
      <div class="section-dash">
        <div class="sec-controls">
          <span class="ctrl-label">학교</span>
          <select class="ctrl-sel" id="secSchool" onchange="renderSectionView()">
            <option value="">전체</option>
            <optgroup label="종촌고"><option value="종촌고">종촌고 전체</option><option value="종촌고1">종촌고1</option><option value="종촌고2">종촌고2</option><option value="종촌고3">종촌고3</option></optgroup>
            <optgroup label="고운고"><option value="고운고">고운고 전체</option><option value="고운고1">고운고1</option><option value="고운고2">고운고2</option><option value="고운고3">고운고3</option></optgroup>
            <optgroup label="대성고"><option value="대성고">대성고 전체</option><option value="대성고1">대성고1</option><option value="대성고2">대성고2</option><option value="대성고3">대성고3</option></optgroup>
            <optgroup label="종촌중"><option value="종촌중">종촌중 전체</option><option value="종촌중1">종촌중1</option><option value="종촌중2">종촌중2</option><option value="종촌중3">종촌중3</option></optgroup>
            <optgroup label="어진중"><option value="어진중">어진중 전체</option><option value="어진중1">어진중1</option><option value="어진중2">어진중2</option><option value="어진중3">어진중3</option></optgroup>
            <optgroup label="고운중"><option value="고운중">고운중 전체</option><option value="고운중1">고운중1</option><option value="고운중2">고운중2</option><option value="고운중3">고운중3</option></optgroup>
          </select>
          <span class="ctrl-label">이름</span>

let allData = [];
let allAccessData = [];  // ★ hub_access 데이터

async function loadData(){
  document.getElementById('tblArea').innerHTML='<div class="loading-msg">⏳ 전체 데이터 불러오는 중...<br><small style="color:#999">데이터가 많으면 잠시 걸릴 수 있어요</small></div>';
  try{
    let w=0;
    while(!window._fbReady&&w<15000){await new Promise(r=>setTimeout(r,200));w+=200;}
    if(!window._fbReady){throw new Error('Firebase 로드 시간 초과');}

    // quiz_results 로드
    const snap=await window._getDocs(window._col(window._db,'quiz_results'));
    allData=[];
    snap.forEach(doc=>{
      const d=doc.data();
      // per-문제 이벤트 레코드 숨김 (q 필드가 있거나, result가 ok/fail인 한 문제 단위 로그)
      if(d.q!==undefined || d.result==='ok' || d.result==='fail') return;
      allData.push({
        id:doc.id,
        name:d.studentName||d.name||'(이름없음)',
        school:d.school||'-',
        score:d.score||0,
        correct:d.correct||0,
        wrong:d.wrongCount||d.wrong||0,
        timedOut:d.timedOut||0,
        total:d.total||0,
        elapsed:d.elapsedMin||0,
        quizType:d.quizType||'-',
        round:d.round||1,
        part:d.part||0,
        wrongWords:d.wrongWords||[],
        wrongNumbers:d.wrongNumbers||'',
        wrongSentences:d.wrongSentences||'',
        tabSwitchCount:d.tabSwitchCount||0,
        attemptCount:d.attemptCount||1,
        passages:d.passages||[],
        details:d.details||[],
        submittedAt:d.submittedAt||null,
        time:d.timestamp
          ?(typeof d.timestamp.toDate==='function'?d.timestamp.toDate():new Date(d.timestamp))
          :(d.submittedAt?(typeof d.submittedAt.toDate==='function'?d.submittedAt.toDate():new Date(d.submittedAt)):null),
      });
    });
    allData.sort((a,b)=>(b.time||0)-(a.time||0));

    // ★ hub_access 동시 로드
    try{
      const accSnap=await window._getDocs(window._col(window._db,'hub_access'));
      allAccessData=[];
      accSnap.forEach(docA=>{
        const d=docA.data();
        allAccessData.push({
          id:docA.id,
          type:d.type||'-',
          name:d.name||'',
          school:d.school||'-',
          targetSchool:d.targetSchool||'',
          quiz:d.quiz||'',
          file:d.file||'',
          time:d.timestamp?(typeof d.timestamp.toDate==='function'?d.timestamp.toDate():new Date(d.timestamp)):null,
        });
      });
      allAccessData.sort((a,b)=>(b.time||0)-(a.time||0));
    }catch(e2){console.log('hub_access load fail',e2);}

    document.getElementById('lastRefresh').textContent=
      '갱신: '+new Date().toLocaleTimeString('ko-KR')+' (총 '+allData.length+'건)';
    buildHistoryMap();
    renderSummary();renderCharts();applyFilter();renderSectionView();
  }catch(e){
    document.getElementById('tblArea').innerHTML=
      `<div class="empty-msg">⚠️ 오류: ${e.message}<br><small>잠시 후 새로고침 해보세요</small></div>`;
  }
}

function renderSummary(){
  const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;
  const names=new Set(allData.map(d=>d.name+'|'+d.school));
  document.getElementById('sTotal').textContent=allData.length;
  document.getElementById('sStud').textContent=names.size;
  document.getElementById('sScore').textContent=avg(allData.map(d=>d.score))+'점';
  document.getElementById('sWrong').textContent=avg(allData.map(d=>d.wrong))+'개';
  document.getElementById('sTimeout').textContent=avg(allData.map(d=>d.timedOut))+'개';
}

function renderCharts(){
  const bands=[{l:'S(95↑)',min:95,max:101},{l:'A(85↑)',min:85,max:95},{l:'B(70↑)',min:70,max:85},{l:'C(55↑)',min:55,max:70},{l:'D(~54)',min:0,max:55}];
  const maxB=Math.max(...bands.map(b=>allData.filter(d=>d.score>=b.min&&d.score<b.max).length),1);
  document.getElementById('scoreDist').innerHTML=bands.map(b=>{
    const cnt=allData.filter(d=>d.score>=b.min&&d.score<b.max).length;
    return `<div class="bar-row"><span class="bar-lbl">${b.l}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxB*100)}%"></div></div><span class="bar-val">${cnt}명</span></div>`;
  }).join('');
  const wmap=new Map();
  allData.forEach(d=>d.wrongWords.forEach(w=>{const k=typeof w==='string'?w:(w.eng||w);if(k)wmap.set(k,(wmap.get(k)||0)+1);}));
  const top=[...wmap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxW=top.length?top[0][1]:1;
  document.getElementById('wrongWords').innerHTML=top.length
    ?top.map(([eng,cnt])=>`<div class="bar-row"><span class="bar-lbl">${eng}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxW*100)}%"></div></div><span class="bar-val">${cnt}회</span></div>`).join('')
    :'<div style="color:var(--muted);font-size:12px;padding:8px">데이터 없음</div>';
}

function applyFilter(){
  const sq=document.getElementById('fSchool').value;
  const nq=document.getElementById('fName').value.trim().toLowerCase();
  const so=document.getElementById('fSort').value;
  let data=[...allData];
  if(sq) data=data.filter(d=>d.school&&d.school.startsWith(sq));
  if(nq) data=data.filter(d=>d.name.toLowerCase().includes(nq));
  if(so==='time_asc') data.sort((a,b)=>(a.time||0)-(b.time||0));
  else if(so==='score_desc') data.sort((a,b)=>b.score-a.score);
  else if(so==='score_asc') data.sort((a,b)=>a.score-b.score);
  renderTable(data);
}

const gc=s=>s>=95?'sS':s>=85?'sA':s>=70?'sB':s>=55?'sC':'sD';
const gl=s=>s>=95?'S':s>=85?'A':s>=70?'B':s>=55?'C':'D';
const ft=t=>t?t.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-';

function passagesStr(d){
  if(!d || !d.passages || d.passages.length===0) return '';
  return [...d.passages].sort((a,b)=>parseInt(a)-parseInt(b)).join(',')+'번';
}
function nonSecLabel(qt, d){
  if(!qt) return '-';
  if(qt.includes('동반의어')){
    let lbl='';
    const lesson=qt.match(/교과서(\d+)과/);
    if(lesson) lbl=`교과서 ${lesson[1]}과`;
    else if(qt.includes('모의고사')){const yr=qt.match(/(\d{4})/);lbl=yr?`${yr[1]} 3월모고`:'3월모고';}
    else if(qt.includes('올림포스')) lbl='올림포스';
    else lbl='동반의어';
    const part=qt.match(/파트(\d)/);if(part) lbl+=` P${part[1]}`;
    const mode=qt.includes('A모드')?'A':qt.includes('B모드')?'B':'';if(mode) lbl+=` ${mode}`;
    const round=qt.match(/(\d+)라운드/);if(round&&parseInt(round[1])>1) lbl+=` R${round[1]}`;
    return lbl;
  }
  if(qt.includes('빈칸시험')||qt.includes('챕터')){const ch=qt.match(/(\d+)챕터/);return (ch?ch[1]+'챕터':'챕터')+' 빈칸시험';}
  if(qt.includes('함축의미')) return '함축의미';
  if(qt.includes('빈칸추론')){const kang=qt.match(/([\dT]+강|전체)/);return '빈칸추론'+(kang?' '+kang[1]:'');}
  if(qt.includes('어휘퀴즈')){const complete=qt.includes('오답완료');const label=qt.replace('_어휘퀴즈_오답완료','').replace('_어휘퀴즈','').replace(/_/g,' ');return label+(complete?' ✅':'');}
  // 모의고사 시리즈: "고2_24년6월_단어_1차뜻" → "고2 24-6 단어 1차"
  const mockM=qt.match(/^(고[123])_(\d{2})년(\d{1,2})월_(.+)$/);
  if(mockM){
    const grade=mockM[1], yr=mockM[2], mon=mockM[3], sub=mockM[4].replace(/_/g,' ');
    return `${grade} ${yr}-${mon} ${sub}`;
  }
  return qt.slice(0,16);
}

function renderTable(data){
  document.getElementById('cntBadge').textContent=data.length+'건';
  if(!data.length){document.getElementById('tblArea').innerHTML='<div class="empty-msg">📭 기록 없음</div>';return;}
  const rows=data.map((d,i)=>{
    const chips=d.wrongWords.slice(0,20).map(w=>{const eng=typeof w==='string'?w:(w.eng||w);const kor=typeof w==='object'?(w.kor||w.correct||''):'';return `<span class="wt-chip">${eng}${kor?`<span class="wa">→${kor}</span>`:''}</span>`;}).join('');
    const sl=nonSecLabel(d.quizType,d);
    const isSynanm=d.quizType&&d.quizType.includes('동반의어');
    const slStyle=isSynanm?'background:#e8f5e9;color:#2e7d32':sl==='전체'?'background:#e3f2fd;color:#1565c0':sl==='오답재시'?'background:#fff3e0;color:#e65100':sl==='오답완료'?'background:#e8f5e9;color:#2e7d32':sl==='어휘퀴즈'?'background:#f3e5f5;color:#6a1b9a':sl==='-'?'color:var(--muted);font-size:11px':'background:#e8eaf6;color:#3949ab';
    const slHtml=sl!=='-'?`<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800;white-space:nowrap;${slStyle}">${sl}</span>`:`<span style="color:var(--muted);font-size:11px">-</span>`;
    const roundBadge=d.round>1?`<span style="font-size:10px;color:#e65100;margin-left:4px">${d.round}라운드</span>`:'';
    const ps=passagesStr(d);
    const passageBadge=ps?`<span style="display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700;background:#fff3e0;color:#e65100;margin-left:4px;white-space:nowrap;">${ps}</span>`:'';
    return `<tbody><tr>
      <td><input type="checkbox" class="row-chk" data-id="${d.id}" style="cursor:pointer"></td>
      <td style="color:var(--muted)">${i+1}</td>
      <td class="nw"><strong>${d.name}</strong></td>
      <td class="nw">${d.school}</td>
      <td class="nw" style="text-align:center">${slHtml}${passageBadge}${roundBadge}</td>
      <td class="nw"><span class="sp ${gc(d.score)}">${d.score}점 (${gl(d.score)})</span></td>
      <td class="nw" style="color:var(--green);font-weight:800">${d.correct||'-'}</td>
      <td class="nw" style="color:${d.wrong>0?'var(--red)':'var(--green)'};font-weight:800">${d.wrong}</td>
      <td class="nw" style="color:${d.timedOut>0?'#e65100':'var(--green)'};font-weight:800">${d.timedOut}</td>
      <td class="nw">${d.total}</td>
      <td class="nw">${d.elapsed?d.elapsed+'분':'-'}</td>
      <td class="nw" style="font-size:11px">${ft(d.time)}</td>
      <td>${(d.wrongWords&&d.wrongWords.length>0)?`<button class="wt-btn" onclick="toggleW(this)">오답 ${d.wrongWords.length}개 ▼</button>`:d.wrongNumbers?`<button class="wt-btn" onclick="toggleW(this)">오답 ${(d.wrongNumbers.match(/번/g)||[]).length}개 ▼</button>`:d.wrongSentences?`<button class="wt-btn" onclick="toggleW(this)">오답 ${d.wrongSentences.split(' / ').length}개 ▼</button>`:'<span style="color:var(--green)">✅ 없음</span>'}</td>
      <td><button class="del-btn" onclick="deleteSingle('${d.id}')">🗑️</button></td>
    </tr>
    ${(d.wrongWords&&d.wrongWords.length>0)?`<tr><td colspan="14" style="padding:0"><div class="wt-detail"><div style="font-size:11px;font-weight:800;color:var(--red);margin-bottom:4px">오답:</div><div class="wt-chips">${chips}</div></div></td></tr>`:(d.wrongSentences?`<tr><td colspan="14" style="padding:0"><div class="wt-detail"><div style="font-size:11px;font-weight:800;color:var(--red);margin-bottom:4px">오답 상세:</div><div style="font-size:11px;color:var(--red);line-height:1.7">${d.wrongSentences.split(' / ').join('<br>')}</div></div></td></tr>`:(d.wrongNumbers?`<tr><td colspan="14" style="padding:0"><div class="wt-detail"><div style="font-size:11px;font-weight:800;color:var(--red);margin-bottom:4px">오답 번호:</div><div style="font-size:12px;color:var(--red);line-height:1.7;font-weight:700">${d.wrongNumbers}</div></div></td></tr>`:''))}
    </tbody>`;
  }).join('');
  document.getElementById('tblArea').innerHTML=`<div class="tbl-scroll"><table>
    <thead><tr><th><input type="checkbox" id="chkAll" onchange="toggleAllCheck(this)" style="cursor:pointer"></th><th>#</th><th>이름</th><th>학교</th><th style="text-align:center">유형</th><th>점수</th><th>정답</th><th>오답</th><th>시간초과</th><th>총문제</th><th>소요</th><th>제출시간</th><th>오답보기</th><th>삭제</th></tr></thead>
    ${rows}</table></div>`;
}

function toggleW(btn){
  const row=btn.closest('tr').nextElementSibling;if(!row) return;
  const d=row.querySelector('.wt-detail');if(!d) return;
  d.classList.toggle('open');
  const n=btn.textContent.replace(/[^0-9]/g,'');
  btn.textContent=d.classList.contains('open')?`오답 ${n}개 ▲`:`오답 ${n}개 ▼`;
}

function nameMatch(a,b){return a.trim()===b.trim()||a.replace(/\s/g,'')===b.replace(/\s/g,'');}

function parseSection(qt){const m=qt.match(/(\d+)섹션/);return m?parseInt(m[1]):0;}

function categorize(qt){
  if(!qt) return 'other';
  if(qt.includes('섹션')) return 'section';
  if(qt.includes('동반의어')||qt.includes('유의어·반의어')||/\d+강/.test(qt)) return 'synanm';
  if(qt.includes('함축의미')) return 'implication';
  if(qt.includes('빈칸추론')) return 'blank';
  if(qt.includes('어휘퀴즈')) return 'vocab';
  if(qt.includes('빈칸시험')||qt.includes('챕터')) return 'chapter';
  if(qt.includes('총정리')) return 'review';
  return 'other';
}

    btn.textContent='📋 상세보기';
  }
};

// 회차 이력 모달: 셀 클릭 시 그 학생의 그 시험 모든 회차 표시
// ============================================================
window._historyMap = {};
function _qtBase(qt){
  // '오답완료' suffix 제거하여 회차 통합
  return String(qt||'').replace(/_?오답완료/g, '');
}
function buildHistoryMap(){
  window._historyMap = {};
  allData.forEach(d=>{
    const stKey = (d.name||'') + '||' + (d.school||'');
    const base = _qtBase(d.quizType);
    const key = stKey + '|||' + base;
    if(!window._historyMap[key]) window._historyMap[key]=[];
    window._historyMap[key].push(d);
  });
  Object.keys(window._historyMap).forEach(k=>{
    window._historyMap[k].sort((a,b)=>(b.time||0)-(a.time||0));
  });
}
window.histCount = function(name, school, qt){
  const key = (name||'') + '||' + (school||'') + '|||' + _qtBase(qt);
  return (window._historyMap[key] || []).length;
};
window.showHistory = function(name, school, qt){
  const key = (name||'') + '||' + (school||'') + '|||' + _qtBase(qt);
  const records = window._historyMap[key] || [];
  const rowsHtml = records.length===0
    ? '<div class="hist-empty">📭 이력이 없습니다</div>'
    : records.map((r,i)=>{
        const isLatest = i===0;
        const isPerfect = r.wrong===0 && (r.timedOut||0)===0;
        const rowCls = isPerfect ? 'perfect' : (isLatest ? 'latest' : '');
        const rankCls = isPerfect ? 'perfect' : (isLatest ? 'latest' : '');
        const rankLbl = isLatest ? '🆕 최신' : (i+1)+'번째 최신';
        const timeStr = r.time ? r.time.toLocaleString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
        const scoreCol = r.score>=85?'#2e7d32':r.score>=70?'#1565c0':r.score>=50?'#e65100':'#c62828';
        let wrongTxt = '';
        if(r.wrongSentences) wrongTxt = r.wrongSentences;
        else if(r.wrongWords && r.wrongWords.length>0){
          wrongTxt = r.wrongWords.slice(0,15).map(w=>{
            if(typeof w==='string') return w;
            if(w.label) return w.label;
            if(w.eng) return w.eng+(w.kor?'('+w.kor+')':'');
            return JSON.stringify(w).slice(0,30);
          }).join(', ');
        } else if(r.wrongNumbers) wrongTxt = r.wrongNumbers;
        const wrongHtml = wrongTxt ? `<div class="hist-wrong-list">❌ 오답: ${wrongTxt}</div>` : '';
        const roundStr = (r.round||1)>1 ? `· ${r.round}라운드` : '';
        const tabExitStr = r.tabSwitchCount>0 ? `· ⚠️ 탭이탈 ${r.tabSwitchCount}회` : '';
        const elapsedStr = r.elapsed && r.elapsed>0 ? `· ⏱ ${r.elapsed}분` : '';
        return `<div class="hist-row ${rowCls}">
          <div class="hist-row-top">
            <span class="hist-rank ${rankCls}">${rankLbl}</span>
            <span class="hist-time">${timeStr}</span>
            <span class="hist-score" style="color:${scoreCol};">${r.score}점</span>
          </div>
          <div class="hist-meta">
            <span><b>정답</b> ${r.correct||0}/${r.total||0}</span>
            <span><b>오답</b> ${r.wrong||0}개</span>
            ${(r.timedOut||0)>0?`<span style="color:#c62828"><b>시간초과</b> ${r.timedOut}개</span>`:''}
            <span style="color:#888">${elapsedStr}${roundStr}${tabExitStr}</span>
          </div>
          ${wrongHtml}
        </div>`;
      }).join('');
  const overlay = document.createElement('div');
  overlay.className = 'hist-overlay';
  overlay.onclick = (e)=>{ if(e.target===overlay) closeHistory(); };
  overlay.innerHTML = `
    <div class="hist-modal">
      <div class="hist-head">
        <div class="hist-head-left">
          <div class="hist-head-name">${name} (${school}) · 총 ${records.length}회 응시</div>
          <div class="hist-head-qt">${_qtBase(qt)}</div>
        </div>
        <button class="hist-close" onclick="closeHistory()">✕</button>
      </div>
      <div class="hist-body">${rowsHtml}</div>
    </div>`;
  document.body.appendChild(overlay);
};
window.closeHistory = function(){
  document.querySelectorAll('.hist-overlay').forEach(el=>el.remove());
};
document.addEventListener('keydown',(e)=>{
  if(e.key==='Escape') window.closeHistory();
});

function _attrEsc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _cellAttrs(stName, stSchool, qt){
  if(!qt) return '';
  const rounds = window.histCount ? window.histCount(stName, stSchool, qt) : 1;
  return ` data-st="${_attrEsc(stName)}||${_attrEsc(stSchool)}" data-qt="${_attrEsc(qt)}" data-rounds="${rounds}" onclick="(function(el){var p=el.dataset.st.split('||');window.showHistory(p[0],p[1]||'',el.dataset.qt);})(this)"`;
}

    const readingLabHtml = Object.keys(rlByKang).length>0 ? Object.keys(rlByKang).sort((a,b)=>parseInt(a)-parseInt(b)).map(kang=>{

      const moreClick=quizClicks.length>6?`<span style="font-size:11px;color:var(--muted)">+${quizClicks.length-6}건 더</span>`:'';
      const openChips=quizOpens.slice(0,6).map(a=>
        `<span class="acc-chip-quiz" style="background:#fef3c7;color:#92400e">🔓 ${a.quiz||a.file||'-'} <span class="acc-chip-time">${ft(a.time)}</span></span>`
      ).join('');
      const moreOpen=quizOpens.length>6?`<span style="font-size:11px;color:var(--muted)">+${quizOpens.length-6}건 더</span>`:'';
      accessHtml=`<div class="access-block">
        <div class="access-block-title">🔐 접속·학습 기록 (총 ${myAccess.length}건 · 학교입장 ${schoolEnters.length} · 퀴즈클릭 ${quizClicks.length} · 페이지열기 ${quizOpens.length})</div>
        ${enterChips?`<div class="access-chips">${enterChips}</div>`:''}
        ${clickChips||moreClick?`<div class="access-chips">${clickChips}${moreClick}</div>`:''}
        ${openChips||moreOpen?`<div class="access-chips">${openChips}${moreOpen}</div>`:''}
      </div>`;
    }

    // 상세보기: 모든 응시 기록을 시간순(최신 우선) 테이블로
    const detailId = 'detail_'+st.name.replace(/[^가-힣a-zA-Z0-9]/g,'_')+'_'+st.school.replace(/[^가-힣a-zA-Z0-9]/g,'_');
    const allRecordsHtml = st.records.length > 0 ? `
      <div id="${detailId}" class="student-detail" style="display:none;margin-top:14px;border-top:2px dashed #bbdefb;padding-top:14px;">
        <div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;">📋 전체 응시 기록 (${st.records.length}건)</div>
        <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:11px;">
          <thead>
            <tr style="background:#e3f2fd;color:#1565c0;font-weight:800;">
              <th style="padding:6px 8px;text-align:left;">시작/종료 시각</th>
              <th style="padding:6px 8px;text-align:left;">퀴즈 유형</th>
              <th style="padding:6px 8px;text-align:left;">선택 지문</th>
              <th style="padding:6px 8px;text-align:center;">점수</th>
              <th style="padding:6px 8px;text-align:center;">정답/총</th>
              <th style="padding:6px 8px;text-align:center;">오답</th>
              <th style="padding:6px 8px;text-align:center;">소요 시간</th>
              <th style="padding:6px 8px;text-align:left;">오답 항목 (앞 5개)</th>
            </tr>
          </thead>
          <tbody>
            ${st.records.slice().sort((a,b)=>(b.time||0)-(a.time||0)).map(d=>{
              const wrongPreview = (d.wrongWords||[]).slice(0,5).map(w=>{
                if(typeof w==='string') return w;
                if(w.label) return w.label;
                if(w.eng) return w.eng+(w.kor?'('+w.kor+')':'');
                return JSON.stringify(w).slice(0,30);
              }).join(', ');
              const scoreCol = d.score>=85?'#2e7d32':d.score>=70?'#1565c0':d.score>=50?'#e65100':'#c62828';
              // 종료 시각: d.time (Firestore serverTimestamp) — 학생이 제출 완료 시점
              const endTime = d.time?d.time.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-';
              // 시작 시각 = 종료 - 소요(분)
              let startTime = '-';
              if(d.time && d.elapsed>=0){
                const startDate = new Date(d.time.getTime() - d.elapsed*60000);
                startTime = startDate.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
              }
              // 선택 지문 표시
              const passages = (d.passages||[]).map(p=>String(p)).sort((a,b)=>parseInt(a.split('-')[0])-parseInt(b.split('-')[0]));
              const passageStr = passages.length>0 ? passages.map(p=>p+'번').join(', ') : '-';
              // 소요시간 더 자세히
              let elapsedStr = '-';
              if(d.elapsed && d.elapsed>0){
                if(d.elapsed < 1) elapsedStr = '<1분';
                else elapsedStr = d.elapsed+'분';
              } else if(d.elapsed===0){ elapsedStr = '<1분'; }
              return `<tr style="border-bottom:1px solid #f0f4ff;">
                <td style="padding:6px 8px;color:var(--muted);white-space:nowrap;font-size:10px;">
                  <div>🏁 ${endTime}</div>
                  <div style="color:#aaa;">▶ ${startTime}</div>
                </td>
                <td style="padding:6px 8px;font-weight:700;max-width:200px;">${d.quizType||'-'}</td>
                <td style="padding:6px 8px;color:#1565c0;font-weight:700;max-width:160px;word-break:keep-all;">${passageStr}</td>
                <td style="padding:6px 8px;text-align:center;font-weight:800;color:${scoreCol};">${d.score}점</td>
                <td style="padding:6px 8px;text-align:center;">${d.correct||0}/${d.total||0}</td>
                <td style="padding:6px 8px;text-align:center;color:${d.wrong>0?'#c62828':'#2e7d32'};">${d.wrong||0}</td>
                <td style="padding:6px 8px;text-align:center;color:var(--muted);font-weight:700;">${elapsedStr}</td>
                <td style="padding:6px 8px;color:#c62828;font-size:10px;">${wrongPreview || '-'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        </div>
      </div>` : '';

    const isAccessOnly = st.records.length === 0;
    return `<div class="student-card" ${isAccessOnly?'style="background:#fffbeb;border:1.5px dashed #f59e0b"':''}>
      <div class="student-card-header">
        <div style="white-space:nowrap;font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--primary);line-height:1.2;">
          👤 <span style="font-size:11px;color:var(--muted);font-weight:700;">${st.school}</span> ${st.name}
          ${isAccessOnly?'<span style="margin-left:8px;padding:2px 8px;background:#fef3c7;color:#92400e;border-radius:10px;font-size:10px;font-weight:800">📡 접속만 함</span>':''}
        </div>
        <div class="student-summary">
          ${isAccessOnly
            ? `<span class="sum-pill" style="background:#fef3c7;color:#92400e;">퀴즈 결과 없음</span>`
            : `<span class="sum-pill done">📝 총 ${st.records.length}회 응시</span>
               <span class="sum-pill ${avgScore>=85?'done':'warn'}">평균 ${avgScore}점</span>`}
          ${myAccess.length>0?`<span class="sum-pill" style="background:#e3f2fd;color:#1565c0;">🔐 접속 ${myAccess.length}건</span>`:''}
          <button onclick="toggleStudentDetail('${detailId}',this)" style="padding:4px 12px;border-radius:14px;border:none;background:#1565c0;color:white;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;">📋 상세보기</button>
        </div>
      </div>
      ${secBlocksHtml}
      ${reviewHtml}
      ${readingLabHtml}
      ${synanmHtml}
      ${nonSecHtml}
      ${allRecordsHtml}
      ${accessHtml}
    </div>`;
  }).join('');

  area.innerHTML=`<div class="student-cards">${html}</div>`;
}

let accessData=[];
async function loadAccess(){
  document.getElementById('accArea').innerHTML='<div class="loading-msg">⏳ 접속 기록 불러오는 중...</div>';
  try{
    let w=0;
    while(!window._fbReady&&w<15000){await new Promise(r=>setTimeout(r,200));w+=200;}
    if(!window._fbReady){throw new Error('Firebase 로드 시간 초과');}
    const snap=await window._getDocs(window._col(window._db,'hub_access'));
    accessData=[];
    snap.forEach(doc=>{
      const d=doc.data();
      accessData.push({id:doc.id,type:d.type||'-',name:d.name||'(이름없음)',school:d.school||'-',targetSchool:d.targetSchool||'',quiz:d.quiz||'',file:d.file||'',attempt:d.attempt||'',
        time:d.timestamp?(typeof d.timestamp.toDate==='function'?d.timestamp.toDate():new Date(d.timestamp)):null,});
    });
    accessData.sort((a,b)=>(b.time||0)-(a.time||0));
    // allAccessData도 갱신
    allAccessData=[...accessData];
    renderAccess();
  }catch(e){document.getElementById('accArea').innerHTML=`<div class="empty-msg">⚠️ 오류: ${e.message}</div>`;}
}

function renderAccess(){
  const tq=document.getElementById('accType').value;
  const nq=document.getElementById('accName').value.trim().toLowerCase();
  let data=[...accessData];
  if(tq) data=data.filter(d=>d.type===tq);
  if(nq) data=data.filter(d=>d.name.toLowerCase().includes(nq));
  const logins=accessData.filter(d=>d.type==='login').length;
  const fails=accessData.filter(d=>d.type==='code_fail').length;
  const clicks=accessData.filter(d=>d.type==='quiz_click').length;
  const uniq=new Set(accessData.filter(d=>d.type==='login').map(d=>d.name+'|'+d.school)).size;
  document.getElementById('acc-summary').innerHTML=`
    <div class="sum-card"><div class="sum-n">${logins}</div><div class="sum-l">✅ 로그인 성공</div></div>
    <div class="sum-card g"><div class="sum-n">${uniq}</div><div class="sum-l">학생 수 (유니크)</div></div>
    <div class="sum-card r"><div class="sum-n">${fails}</div><div class="sum-l">❌ 코드 실패</div></div>
    <div class="sum-card o"><div class="sum-n">${clicks}</div><div class="sum-l">📝 퀴즈 클릭</div></div>`;
  document.getElementById('accBadge').textContent=data.length+'건';
  if(!data.length){document.getElementById('accArea').innerHTML='<div class="empty-msg">📭 기록 없음</div>';return;}
  const typeLabel=t=>t==='login'?'<span style="background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800">✅ 로그인</span>':t==='code_fail'?'<span style="background:#ffebee;color:#c62828;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800">❌ 코드실패</span>':t==='school_enter'?'<span style="background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800">🏫 학교입장</span>':t==='quiz_click'?'<span style="background:#f3e5f5;color:#6a1b9a;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800">📝 퀴즈클릭</span>':`<span style="color:var(--muted)">${t}</span>`;
  const rows=data.map((d,i)=>`<tr><td class="nw" style="color:var(--muted)">${i+1}</td><td class="nw"><strong>${d.name}</strong></td><td class="nw">${d.school}</td><td class="nw">${typeLabel(d.type)}</td><td class="nw" style="font-size:11px;color:var(--muted)">${d.targetSchool||d.quiz||d.attempt||'-'}</td><td class="nw" style="font-size:11px">${d.time?d.time.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-'}</td></tr>`).join('');
  document.getElementById('accArea').innerHTML=`<div class="tbl-scroll"><table><thead><tr><th>#</th><th>이름</th><th>학교</th><th>유형</th><th>상세</th><th>시간</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function toggleAllCheck(chk){document.querySelectorAll('.row-chk').forEach(c=>c.checked=chk.checked);}

async function deleteSingle(id){
  if(!confirm('이 기록을 삭제할까요?')) return;
  try{
    let w=0;while(!window._fbReady&&w<15000){await new Promise(r=>setTimeout(r,200));w+=200;}
    await window._deleteDoc(window._doc(window._db,'quiz_results',id));
    allData=allData.filter(d=>d.id!==id);applyFilter();renderSectionView();
    document.getElementById('lastRefresh').textContent='✅ 삭제 완료 · '+new Date().toLocaleTimeString('ko-KR');
  }catch(e){alert('삭제 실패: '+e.message);}
}

async function confirmDeleteAll(){
  const checked=[...document.querySelectorAll('.row-chk:checked')];
  if(!checked.length){alert('삭제할 항목을 체크해주세요!');return;}
  if(!confirm(`체크한 ${checked.length}개 기록을 삭제할까요?
이 작업은 되돌릴 수 없습니다.`)) return;
  let w=0;while(!window._fbReady&&w<15000){await new Promise(r=>setTimeout(r,200));w+=200;}
  const ids=checked.map(c=>c.dataset.id);let done=0,fail=0;
  for(const id of ids){try{await window._deleteDoc(window._doc(window._db,'quiz_results',id));done++;}catch(e){fail++;}}
  allData=allData.filter(d=>!ids.includes(d.id));applyFilter();renderSectionView();
  document.getElementById('lastRefresh').textContent=`✅ ${done}건 삭제 완료${fail>0?' ('+fail+'건 실패)':''} · `+new Date().toLocaleTimeString('ko-KR');
}

function exportCSV(){
  const hdr=['이름','학교','퀴즈유형','점수','정답','오답','시간초과','총문제','라운드','제출시간','오답단어'];
  const rows=allData.map(d=>[d.name,d.school,d.quizType,d.score,d.correct,d.wrong,d.timedOut,d.total,d.round||1,d.time?d.time.toLocaleString('ko-KR'):'-',d.wrongWords.map(w=>typeof w==='string'?w:(w.eng||w)).join('|')]);
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));a.download=`봄날퀴즈_결과_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
