<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날 English | 통합 관리자</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
:root{--primary:#1a237e;--accent:#ff6f00;--green:#2e7d32;--red:#c62828;--bg:#eef0f8;--card:#fff;--border:#c5cae9;--muted:#757575;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);color:#1a1a2e;min-height:100vh;overflow:hidden;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
.login-card{background:var(--card);border-radius:20px;padding:44px 36px;text-align:center;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(26,35,126,.13);}
.login-card h1{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--primary);margin-bottom:6px;}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.7;}
.pw-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:15px;outline:none;font-family:'Nanum Gothic',sans-serif;transition:border-color .2s;margin-bottom:14px;}
.pw-input:focus{border-color:var(--primary);}
.pw-input.err{border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.app{height:100vh;display:flex;flex-direction:column;}
.header{background:var(--primary);color:white;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.2);flex-shrink:0;}
.header-title{font-family:'Black Han Sans',sans-serif;font-size:18px;letter-spacing:1px;}
.header-sub{font-size:11px;opacity:.65;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.refresh-info{font-size:11px;opacity:.6;}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:white;padding:6px 14px;border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;cursor:pointer;font-weight:700;}
.logout-btn:hover{background:rgba(255,255,255,.25);}
.tab-bar{background:var(--primary);border-top:1px solid rgba(255,255,255,.1);display:flex;padding:0 20px;flex-shrink:0;}
.tab-btn{background:none;border:none;color:rgba(255,255,255,.55);padding:11px 22px;font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab-btn:hover{color:rgba(255,255,255,.9);}
.tab-btn.active{color:white;border-bottom-color:var(--accent);}
.panels{flex:1;overflow:hidden;position:relative;}
.panel{position:absolute;inset:0;display:none;overflow-y:auto;}
.panel.active{display:block;}
.panel-iframe{overflow:hidden;}
.panel-iframe iframe{width:100%;height:100%;border:none;display:block;}
.quiz-inner{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:24px;}
.sum-card{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:0 2px 10px rgba(26,35,126,.07);}
.sum-n{font-family:'Black Han Sans',sans-serif;font-size:30px;color:var(--primary);line-height:1;}
.sum-l{font-size:11px;color:var(--muted);margin-top:4px;}
.sum-card.g .sum-n{color:var(--green);}
.sum-card.r .sum-n{color:var(--red);}
.sum-card.o .sum-n{color:#e65100;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.chart-card{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:0 2px 10px rgba(26,35,126,.07);}
.chart-card h3{font-size:12px;font-weight:800;color:var(--primary);margin-bottom:12px;}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:7px;}
.bar-lbl{width:84px;color:var(--muted);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:#f0f2f8;border-radius:3px;height:18px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3949ab,#ff6f00);transition:width .5s;}
.bar-val{width:32px;font-weight:700;color:var(--primary);text-align:right;}
.controls{background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;box-shadow:0 2px 8px rgba(26,35,126,.06);}
.ctrl-label{font-size:11px;font-weight:800;color:var(--primary);}
.ctrl-sel,.ctrl-inp{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;outline:none;}
.ctrl-sel:focus,.ctrl-inp:focus{border-color:var(--primary);}
.spacer{flex:1;}
.btn-export{background:#e8eaf6;color:var(--primary);border:none;padding:8px 16px;border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.btn-refresh{background:var(--primary);color:white;border:none;padding:8px 16px;border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.btn-refresh:hover{opacity:.85;}
.tbl-wrap{background:var(--card);border-radius:14px;box-shadow:0 2px 10px rgba(26,35,126,.07);overflow:hidden;}
.tbl-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.tbl-title{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--primary);}
.cnt-badge{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:var(--muted);}
.tbl-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--primary);color:white;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid #f0f2f8;font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8f9ff;}
.sp{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800;}
.sS{background:#fff8e1;color:#f57f17;}.sA{background:#e8f5e9;color:#2e7d32;}
.sB{background:#e3f2fd;color:#1565c0;}.sC{background:#fff3e0;color:#e65100;}.sD{background:#ffebee;color:#c62828;}
.wt-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;color:var(--muted);}
.wt-btn:hover{border-color:var(--primary);color:var(--primary);}
.wt-detail{display:none;padding:8px 12px 12px;background:#fafbff;border-top:1px solid #f0f2f8;}
.wt-detail.open{display:block;}
.wt-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.wt-chip{background:#ffebee;color:var(--red);border-radius:5px;padding:2px 7px;font-size:10px;}
.wt-chip .wa{color:var(--green);margin-left:3px;}
.empty-msg{text-align:center;padding:40px;color:var(--muted);}
.loading-msg{text-align:center;padding:36px;color:var(--muted);}
.btn{display:inline-block;padding:12px 28px;border:none;border-radius:10px;font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.btn-primary{background:var(--primary);color:white;}
.section-dash{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
.sec-controls{background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;box-shadow:0 2px 8px rgba(26,35,126,.06);}
.student-cards{display:flex;flex-direction:column;gap:14px;}
.student-card{background:var(--card);border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(26,35,126,.07);}
.student-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.student-name{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--primary);}
.student-meta{font-size:12px;color:var(--muted);}
.student-summary{display:flex;gap:8px;flex-wrap:wrap;}
.sum-pill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
.sum-pill.done{background:#e8f5e9;color:var(--green);}
.sum-pill.todo{background:#ffebee;color:var(--red);}
.sum-pill.warn{background:#fff3e0;color:#e65100;}
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.sec-cell{border-radius:10px;padding:10px 12px;font-size:12px;text-align:center;border:2px solid transparent;}
.sec-cell .sec-num{font-family:'Black Han Sans',sans-serif;font-size:14px;margin-bottom:4px;}
.sec-cell .sec-score{font-size:13px;font-weight:800;}
.sec-cell .sec-wrong{font-size:11px;margin-top:2px;}
.sec-cell .sec-time{font-size:10px;color:var(--muted);margin-top:2px;}
.sec-cell.perfect{background:#e8f5e9;border-color:#a5d6a7;}
.sec-cell.perfect .sec-score{color:var(--green);}
.sec-cell.has-wrong{background:#fff3e0;border-color:#ffcc80;}
.sec-cell.has-wrong .sec-score{color:#e65100;}
.sec-cell.not-done{background:#f5f5f5;border-color:#e0e0e0;opacity:.6;}
.sec-cell.not-done .sec-score{color:var(--muted);}
.no-data-msg{text-align:center;padding:48px;color:var(--muted);}
.quiz-type-label{font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.5px;}
.load-progress{background:var(--card);border-radius:12px;padding:20px 24px;text-align:center;margin-bottom:16px;box-shadow:0 2px 8px rgba(26,35,126,.06);}
.load-progress .load-n{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--primary);}
.load-progress .load-l{font-size:12px;color:var(--muted);margin-top:4px;}
.hidden{display:none!important;}
@media(max-width:640px){
  .chart-grid{grid-template-columns:1fr;}
  .summary-grid{grid-template-columns:repeat(2,1fr);}
  th,td{padding:7px 9px;font-size:11px;}
  .tab-btn{padding:10px 12px;font-size:12px;}
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginWrap" class="login-wrap">
  <div class="login-card">
    <h1>🌸 봄날 English</h1>
    <p>통합 관리자 페이지입니다.<br>비밀번호를 입력해주세요.</p>
    <input type="password" class="pw-input" id="pwInput" placeholder="비밀번호"
           onkeydown="if(event.key==='Enter')doLogin()">
    <br>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%">로그인</button>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard" class="app hidden">
  <div class="header">
    <div>
      <div class="header-title">🌸 봄날 English · 통합 관리자</div>
      <div class="header-sub">퀴즈 결과 + 단어장·학생 관리</div>
    </div>

      <button class="logout-btn" onclick="doLogout()">로그아웃</button>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('quiz')" id="tab-quiz">📊 퀴즈 결과</button>
    <button class="tab-btn"        onclick="switchTab('section')" id="tab-section">📋 학생별 현황</button>

  </div>
  <div class="panels">

    <!-- 퀴즈 결과 -->
    <div class="panel active" id="panel-quiz">
      <div class="quiz-inner">

          <div class="sum-card">  <div class="sum-n" id="sTotal">-</div>  <div class="sum-l">총 응시 횟수</div></div>
          <div class="sum-card">  <div class="sum-n" id="sStud">-</div>   <div class="sum-l">응시 학생 수</div></div>
          <div class="sum-card g"><div class="sum-n" id="sScore">-</div>  <div class="sum-l">평균 점수</div></div>
          <div class="sum-card r"><div class="sum-n" id="sWrong">-</div>  <div class="sum-l">평균 오답</div></div>
          <div class="sum-card o"><div class="sum-n" id="sTimeout">-</div><div class="sum-l">평균 시간초과</div></div>
        </div>
        <div class="chart-grid">
          <div class="chart-card"><h3>📊 점수 분포</h3><div id="scoreDist"></div></div>
          <div class="chart-card"><h3>❌ 자주 틀린 단어 TOP 10</h3><div id="wrongWords"></div></div>
        </div>
        <div class="controls">
          <span class="ctrl-label">학교</span>
          <select class="ctrl-sel" id="fSchool" onchange="applyFilter()">
            <option value="">전체</option>
            <optgroup label="종촌고">
              <option value="종촌고">종촌고 전체</option>
              <option value="종촌고1">종촌고1</option>
              <option value="종촌고2">종촌고2</option>
              <option value="종촌고3">종촌고3</option>
            </optgroup>
            <optgroup label="고운고">
              <option value="고운고">고운고 전체</option>
              <option value="고운고1">고운고1</option>
              <option value="고운고2">고운고2</option>
              <option value="고운고3">고운고3</option>
            </optgroup>
            <optgroup label="대성고">
              <option value="대성고">대성고 전체</option>
              <option value="대성고1">대성고1</option>
              <option value="대성고2">대성고2</option>
              <option value="대성고3">대성고3</option>
            </optgroup>
            <optgroup label="종촌중">
              <option value="종촌중">종촌중 전체</option>
              <option value="종촌중1">종촌중1</option>
              <option value="종촌중2">종촌중2</option>

            </optgroup>
            <optgroup label="어진중">
              <option value="어진중">어진중 전체</option>
              <option value="어진중1">어진중1</option>
              <option value="어진중2">어진중2</option>
              <option value="어진중3">어진중3</option>
            </optgroup>
            <optgroup label="고운중">
              <option value="고운중">고운중 전체</option>
              <option value="고운중1">고운중1</option>
              <option value="고운중2">고운중2</option>
              <option value="고운중3">고운중3</option>
            </optgroup>
          </select>
          <span class="ctrl-label">이름</span>
          <input type="text" class="ctrl-inp" id="fName" placeholder="검색..." oninput="applyFilter()">
          <span class="ctrl-label">정렬</span>
          <select class="ctrl-sel" id="fSort" onchange="applyFilter()">
            <option value="time_desc">최신순</option>
            <option value="time_asc">오래된순</option>
            <option value="score_desc">점수↓</option>
            <option value="score_asc">점수↑</option>
          </select>
          <div class="spacer"></div>
          <button class="btn-export"  onclick="exportCSV()">📥 CSV</button>
          <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
        </div>
        <div class="tbl-wrap">
          <div class="tbl-head">
            <span class="tbl-title">응시 기록</span>
            <span class="cnt-badge" id="cntBadge">0건</span>

    <!-- 섹션 현황 -->
    <div class="panel" id="panel-section">
      <div class="section-dash">
        <div class="sec-controls">
          <span class="ctrl-label">학교</span>
          <select class="ctrl-sel" id="secSchool" onchange="renderSectionView()">
            <option value="">전체</option>

              <option value="대성고1">대성고1</option>

              <option value="대성고3">대성고3</option>

              <option value="종촌중1">종촌중1</option>
              <option value="종촌중2">종촌중2</option>
              <option value="종촌중3">종촌중3</option>
            </optgroup>
            <optgroup label="어진중">
              <option value="어진중">어진중 전체</option>
              <option value="어진중1">어진중1</option>
              <option value="어진중2">어진중2</option>
              <option value="어진중3">어진중3</option>
            </optgroup>
            <optgroup label="고운중">
              <option value="고운중">고운중 전체</option>
              <option value="고운중1">고운중1</option>
              <option value="고운중2">고운중2</option>
              <option value="고운중3">고운중3</option>
            </optgroup>
          </select>
          <span class="ctrl-label">이름</span>
          <input type="text" class="ctrl-inp" id="secName" placeholder="검색..." oninput="renderSectionView()">
          <div class="spacer"></div>
          <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>

    <!-- vaca iframe -->
    <div class="panel panel-iframe" id="panel-vaca">
      <iframe id="vacaFrame" src="" title="봄날 vaca 관리자" allowfullscreen></iframe>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,getDocs,query,orderBy}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const cfg={apiKey:"AIzaSyCxS524S8KAaF87DomPtl9sJdF-eqes404",authDomain:"bomnalvaca.firebaseapp.com",projectId:"bomnalvaca",storageBucket:"bomnalvaca.firebasestorage.app",messagingSenderId:"115868052300",appId:"1:115868052300:web:765c08867b6f1ce0987de9"};
const app=initializeApp(cfg);const db=getFirestore(app);
window._db=db;
window._col=collection;
window._getDocs=getDocs;

<script>
const ADMIN_PW = 'bomnalvaca2025';
const VACA_URL  = 'https://bomnalenglish.github.io/bomnalvaca/admin.html';

function doLogin(){
  const pw = document.getElementById('pwInput').value;
  if(pw === ADMIN_PW){
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    sessionStorage.setItem('bnadmin','1');
    loadData();
  } else {
    const el = document.getElementById('pwInput');
    el.classList.add('err'); el.value=''; el.placeholder='비밀번호가 틀렸습니다';
    setTimeout(()=>{ el.classList.remove('err'); el.placeholder='비밀번호'; }, 1500);
  }
}
function doLogout(){ sessionStorage.removeItem('bnadmin'); location.reload(); }

if(sessionStorage.getItem('bnadmin')==='1'){
  document.getElementById('loginWrap').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  loadData();
}

let vacaLoaded = false;
function switchTab(tab){
  ['quiz','section','vaca'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('panel-'+t).classList.toggle('active', t===tab);
  });
  if(tab==='vaca' && !vacaLoaded){
    document.getElementById('vacaFrame').src = VACA_URL;
    vacaLoaded = true;
  }
  if(tab==='section') renderSectionView();
}

let allData = [];

async function loadData(){
  document.getElementById('tblArea').innerHTML = '<div class="loading-msg">⏳ 전체 데이터 불러오는 중...<br><small style="color:#999">데이터가 많으면 잠시 걸릴 수 있어요</small></div>';
  try{
    let w=0;
    while(!window._fbReady && w<8000){ await new Promise(r=>setTimeout(r,200)); w+=200; }

    const q = window._col(window._db, 'quiz_results');
    const snap = await window._getDocs(q);

    allData = [];
    snap.forEach(doc=>{
      const d = doc.data();
      allData.push({
        id: doc.id,
        name: d.studentName||'(이름없음)',
        school: d.school||'-',
        score: d.score||0,
        correct: d.correct||0,
        wrong: d.wrongCount||d.wrong||0,
        timedOut: d.timedOut||0,
        total: d.total||0,
        elapsed: d.elapsedMin||0,
        wrongWords: d.wrongWords||[],
        quizType: d.quizType||'-',
        round: d.round||1,
        part: d.part||0,
        time: d.timestamp
          ? new Date(d.timestamp)
          : (d.submittedAt
            ? (typeof d.submittedAt.toDate==='function' ? d.submittedAt.toDate() : new Date(d.submittedAt))
            : null),
      });
    });

    allData.sort((a,b)=>(b.time||0)-(a.time||0));

    document.getElementById('lastRefresh').textContent =
      '갱신: '+new Date().toLocaleTimeString('ko-KR')+' (총 '+allData.length+'건)';
    renderSummary();
    renderCharts();
    applyFilter();
    renderSectionView();
  } catch(e){
    document.getElementById('tblArea').innerHTML =
      `<div class="empty-msg">⚠️ 오류: ${e.message}<br><small>잠시 후 새로고침 해보세요</small></div>`;
  }
}

function renderSummary(){
  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
  const names = new Set(allData.map(d=>d.name+'|'+d.school));
  document.getElementById('sTotal').textContent  = allData.length;
  document.getElementById('sStud').textContent   = names.size;
  document.getElementById('sScore').textContent  = avg(allData.map(d=>d.score))+'점';
  document.getElementById('sWrong').textContent  = avg(allData.map(d=>d.wrong))+'개';
  document.getElementById('sTimeout').textContent= avg(allData.map(d=>d.timedOut))+'개';
}

function renderCharts(){
  const bands=[
    {l:'S(95↑)',min:95,max:101},
    {l:'A(85↑)',min:85,max:95},
    {l:'B(70↑)',min:70,max:85},
    {l:'C(55↑)',min:55,max:70},
    {l:'D(~54)',min:0,max:55}
  ];
  const maxB = Math.max(...bands.map(b=>allData.filter(d=>d.score>=b.min&&d.score<b.max).length),1);
  document.getElementById('scoreDist').innerHTML = bands.map(b=>{
    const cnt = allData.filter(d=>d.score>=b.min&&d.score<b.max).length;
    return `<div class="bar-row"><span class="bar-lbl">${b.l}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxB*100)}%"></div></div><span class="bar-val">${cnt}명</span></div>`;
  }).join('');

  const wmap = new Map();
  allData.forEach(d=>d.wrongWords.forEach(w=>{
    const key = typeof w === 'string' ? w : (w.eng||w);
    if(key) wmap.set(key,(wmap.get(key)||0)+1);
  }));
  const top = [...wmap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxW = top.length ? top[0][1] : 1;
  document.getElementById('wrongWords').innerHTML = top.length
    ? top.map(([eng,cnt])=>`<div class="bar-row"><span class="bar-lbl">${eng}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxW*100)}%"></div></div><span class="bar-val">${cnt}회</span></div>`).join('')
    : '<div style="color:var(--muted);font-size:12px;padding:8px">데이터 없음</div>';
}

function applyFilter(){
  const sq = document.getElementById('fSchool').value;
  const nq = document.getElementById('fName').value.trim().toLowerCase();
  const so = document.getElementById('fSort').value;
  let data = [...allData];
  if(sq) data = data.filter(d => d.school && d.school.startsWith(sq));
  if(nq) data = data.filter(d=>d.name.toLowerCase().includes(nq));
  if(so==='time_asc')        data.sort((a,b)=>(a.time||0)-(b.time||0));
  else if(so==='score_desc') data.sort((a,b)=>b.score-a.score);
  else if(so==='score_asc')  data.sort((a,b)=>a.score-b.score);
  renderTable(data);
}

const gc = s => s>=95?'sS':s>=85?'sA':s>=70?'sB':s>=55?'sC':'sD';
const gl = s => s>=95?'S':s>=85?'A':s>=70?'B':s>=55?'C':'D';
const ft = t => t ? t.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';

// ===== 퀴즈 유형 라벨 =====
function nonSecLabel(qt){
  if(!qt) return '-';

  if(qt.includes('동반의어')){
    let lbl = '';
    // 교과서 과
    const lesson = qt.match(/교과서(\d+)과/);
    if(lesson) lbl = `교과서 ${lesson[1]}과`;
    // 모의고사
    else if(qt.includes('모의고사')){
      const yr = qt.match(/(\d{4})/);
      lbl = yr ? `${yr[1]} 3월모고` : '3월모고';
    }
    // 올림포스
    else if(qt.includes('올림포스')) lbl = '올림포스';
    else lbl = '동반의어';
    // 파트
    const part = qt.match(/파트(\d)/);
    if(part) lbl += ` P${part[1]}`;
    // 모드 A/B
    const mode = qt.includes('A모드')?'A':qt.includes('B모드')?'B':'';
    if(mode) lbl += ` ${mode}`;
    // 라운드 (1라운드는 생략)
    const round = qt.match(/(\d+)라운드/);
    if(round && parseInt(round[1])>1) lbl += ` R${round[1]}`;
    return lbl;
  }
  if(qt.includes('함축의미')) return '함축의미';
  if(qt.includes('빈칸추론')){
    const kang = qt.match(/([\dT]+강|전체)/);
    return '빈칸추론'+(kang?' '+kang[1]:'');
  }
  if(qt.includes('어휘퀴즈')) {
    const complete = qt.includes('오답완료');
    const label = qt.replace('_어휘퀴즈_오답완료','').replace('_어휘퀴즈','').replace(/_/g,' ');
    return label + (complete?' ✅':'');
  }
  return qt.slice(0,16);
}

function secLabel(qt){
  if(!qt) return '-';
  const m = qt.match(/(\d+)섹션/);
  if(m) return m[1]+'섹션';
  if(qt.includes('전체')) return '전체';
  if(qt.includes('오답완료')) return '오답완료';
  if(qt.includes('오답')) return '오답재시';
  if(qt.includes('동반의어')){
    return nonSecLabel(qt);
  }
  if(qt.includes('함축의미')) return '함축의미';
  if(qt.includes('빈칸추론')) return '빈칸추론';
  if(qt.includes('어휘퀴즈')) return '어휘퀴즈';
  return '-';
}

function renderTable(data){
  document.getElementById('cntBadge').textContent = data.length+'건';
  if(!data.length){
    document.getElementById('tblArea').innerHTML='<div class="empty-msg">📭 기록 없음</div>';
    return;
  }
  const rows = data.map((d,i)=>{
    const chips = d.wrongWords.slice(0,20).map(w=>{
      const eng = typeof w === 'string' ? w : (w.eng||w);
      const kor = typeof w === 'object' ? (w.kor||w.correct||'') : '';
      return `<span class="wt-chip">${eng}${kor?`<span class="wa">→${kor}</span>`:''}</span>`;
    }).join('');
    const sl = nonSecLabel(d.quizType);
    const isSynanm = d.quizType && d.quizType.includes('동반의어');
    const slStyle = isSynanm ? 'background:#e8f5e9;color:#2e7d32'
                  : sl==='전체'?'background:#e3f2fd;color:#1565c0'
                  : sl==='오답재시'?'background:#fff3e0;color:#e65100'
                  : sl==='오답완료'?'background:#e8f5e9;color:#2e7d32'
                  : sl==='어휘퀴즈'?'background:#f3e5f5;color:#6a1b9a'
                  : sl==='-'?'color:var(--muted);font-size:11px'
                  : 'background:#e8eaf6;color:#3949ab';
    const slHtml = sl!=='-'
      ? `<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800;${slStyle}">${sl}</span>`
      : `<span style="color:var(--muted);font-size:11px">-</span>`;
    const roundBadge = d.round > 1
      ? `<span style="font-size:10px;color:#e65100;margin-left:4px">${d.round}라운드</span>` : '';
    return `<tbody>
      <tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td><strong>${d.name}</strong></td>
        <td>${d.school}</td>
        <td style="text-align:center">${slHtml}${roundBadge}</td>
        <td><span class="sp ${gc(d.score)}">${d.score}점 (${gl(d.score)})</span></td>
        <td style="color:var(--green);font-weight:800">${d.correct||'-'}</td>
        <td style="color:${d.wrong>0?'var(--red)':'var(--green)'};font-weight:800">${d.wrong}</td>
        <td style="color:${d.timedOut>0?'#e65100':'var(--green)'};font-weight:800">${d.timedOut}</td>
        <td>${d.total}</td>
        <td>${d.elapsed?d.elapsed+'분':'-'}</td>
        <td style="font-size:11px">${ft(d.time)}</td>
        <td>${d.wrongWords.length>0?`<button class="wt-btn" onclick="toggleW(this)">오답 ${d.wrongWords.length}개 ▼</button>`:'<span style="color:var(--green)">✅ 없음</span>'}</td>
      </tr>
      ${d.wrongWords.length>0?`<tr><td colspan="12" style="padding:0"><div class="wt-detail"><div style="font-size:11px;font-weight:800;color:var(--red);margin-bottom:4px">오답:</div><div class="wt-chips">${chips}</div></div></td></tr>`:''}
    </tbody>`;
  }).join('');
  document.getElementById('tblArea').innerHTML = `<div class="tbl-scroll"><table>
    <thead><tr><th>#</th><th>이름</th><th>학교</th><th style="text-align:center">유형</th><th>점수</th><th>정답</th><th>오답</th><th>시간초과</th><th>총문제</th><th>소요</th><th>제출시간</th><th>오답보기</th></tr></thead>
    ${rows}</table></div>`;
}

function toggleW(btn){
  const row = btn.closest('tr').nextElementSibling;
  if(!row) return;
  const d = row.querySelector('.wt-detail');
  if(!d) return;
  d.classList.toggle('open');
  const n = btn.textContent.replace(/[^0-9]/g,'');
  btn.textContent = d.classList.contains('open') ? `오답 ${n}개 ▲` : `오답 ${n}개 ▼`;
}

function parseSection(quizType){
  const m = quizType.match(/(\d+)섹션/);
  return m ? parseInt(m[1]) : 0;
}

function categorize(qt){
  if(!qt) return 'other';
  if(qt.includes('섹션')) return 'section';
  if(qt.includes('동반의어')) return 'synanm';
  if(qt.includes('함축의미')) return 'implication';
  if(qt.includes('빈칸추론')) return 'blank';
  if(qt.includes('어휘퀴즈')) return 'vocab';
  return 'other';
}

function renderSectionView(){
  const sq = document.getElementById('secSchool')?.value || '';
  const nq = (document.getElementById('secName')?.value || '').trim().toLowerCase();
  const area = document.getElementById('sectionArea');
  if(!area) return;

  let data = [...allData];
  if(sq) data = data.filter(d => d.school && d.school.startsWith(sq));
  if(nq) data = data.filter(d => d.name.toLowerCase().includes(nq));

  if(!data.length){
    area.innerHTML = '<div class="no-data-msg">📭 기록이 없습니다<br><small>학생들이 퀴즈를 풀면 여기 나타나요</small></div>';
    return;
  }

  const students = {};
  data.forEach(d => {
    const key = `${d.name}||${d.school}`;
    if(!students[key]) students[key] = { name: d.name, school: d.school, records: [] };
    students[key].records.push(d);
  });

  // 학교별 섹션 최대값 (어휘퀴즈용)
  const KNOWN_MAX = {
    '종촌고1':7,'종촌고2':16,
    '고운고1':11,'고운고2':11,
    '종촌고3':0,'종촌중2':0,'어진중2':0,'고운중2':0,
    '대성고1':0  // 대성고1은 섹션 없음 (동반의어만)
  };

  const html = Object.values(students).map(st => {
    const secGroups = {};
    const nonSecRecords = [];

    st.records.forEach(d => {
      const cat = categorize(d.quizType);
      if(cat === 'section'){
        const base = d.quizType.replace(/_\d+섹션.*/, '').replace(/_어휘$/, '');
        if(!secGroups[base]) secGroups[base] = {};
        const sn = parseSection(d.quizType);
        if(sn > 0){
          if(!secGroups[base][sn] || (d.time && secGroups[base][sn].time && d.time > secGroups[base][sn].time)){
            secGroups[base][sn] = d;
          }
        }
      } else if(cat !== 'other'){
        nonSecRecords.push(d);
      }
    });

    const secBlocksHtml = Object.entries(secGroups).map(([base, secMap]) => {
      const knownMax = KNOWN_MAX[st.school] || Math.max(...Object.keys(secMap).map(Number), 1);
      const doneCount = Object.keys(secMap).length;
      const perfectCount = Object.values(secMap).filter(s=>s.wrong===0&&s.timedOut===0).length;
      const warnCount = doneCount - perfectCount;
      const cells = Array.from({length: knownMax}, (_, i) => {
        const sn = i + 1;
        const s = secMap[sn];
        if(!s) return `<div class="sec-cell not-done"><div class="sec-num">${sn}섹션</div><div class="sec-score" style="font-size:11px">미완료</div></div>`;
        const isPerfect = s.wrong === 0 && s.timedOut === 0;
        const wrongTxt = s.wrong + s.timedOut > 0 ? `<div class="sec-wrong">오답 ${s.wrong+s.timedOut}개</div>` : '';
        const timeStr = s.time ? s.time.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
        return `<div class="sec-cell ${isPerfect?'perfect':'has-wrong'}">
          <div class="sec-num">${sn}섹션</div>
          <div class="sec-score">${s.score}점</div>
          ${wrongTxt}<div class="sec-time">${timeStr}</div>
        </div>`;
      }).join('');
      return `
        <div style="margin-bottom:14px;">
          <div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;">
            📚 어휘퀴즈 &nbsp;·&nbsp; 완료 ${doneCount}/${knownMax}
            ${warnCount>0?`<span style="color:#e65100;margin-left:8px;">⚠️ 재도전 ${warnCount}개</span>`:''}
            ${doneCount===knownMax&&perfectCount===knownMax?'<span style="color:var(--green);margin-left:8px;">🏆 전 섹션 클리어!</span>':''}
          </div>
          <div class="sec-grid">${cells}</div>
        </div>`;
    }).join('');

    // 동반의어 퀴즈: 파트별로 묶어서 표시
    const synanmRecords = nonSecRecords.filter(d => d.quizType && d.quizType.includes('동반의어'));
    const otherRecords  = nonSecRecords.filter(d => !d.quizType || !d.quizType.includes('동반의어'));

    // 동반의어: 파트별 최고 라운드 기록만 표시
    const synanmMap = {};
    synanmRecords.forEach(d => {
      // key: 교과서1과_A모드 / 2026년3월모의고사_파트1_A모드 등
      const partMatch = d.quizType.match(/파트(\d)/);
      const modeMatch = d.quizType.includes('A모드')?'A':d.quizType.includes('B모드')?'B':'';
      const lessonMatch = d.quizType.match(/교과서(\d+)과/);
      const isOlym = d.quizType.includes('올림포스');
      const isMarch = d.quizType.includes('모의고사');
      let groupKey = '';
      if(lessonMatch) groupKey = `lesson${lessonMatch[1]}`;
      else if(isOlym) groupKey = 'olympos';
      else if(isMarch) groupKey = 'march';
      else groupKey = 'other';
      const partKey = partMatch ? `p${partMatch[1]}` : 'p0';
      const key = `${groupKey}_${partKey}_${modeMatch}`;
      if(!synanmMap[key] || (d.round||1) > (synanmMap[key].round||1)){
        synanmMap[key] = d;
      }
    });

    // 동반의어 그룹별 블록
    const synanmGroups = {};
    Object.values(synanmMap).forEach(d => {
      const lessonMatch = d.quizType.match(/교과서(\d+)과/);
      const isOlym = d.quizType.includes('올림포스');
      const isMarch = d.quizType.includes('모의고사');
      let gname = '';
      if(lessonMatch) gname = `📖 교과서 ${lessonMatch[1]}과 동반의어`;
      else if(isOlym) gname = '📚 올림포스 동반의어';
      else if(isMarch){
        const yr = d.quizType.match(/(\d{4})/);
        gname = `📝 ${yr?yr[1]+'년 ':''}3월 모의고사 동반의어`;
      } else gname = '🔤 동반의어';
      if(!synanmGroups[gname]) synanmGroups[gname] = [];
      synanmGroups[gname].push(d);
    });

    const synanmHtml = Object.entries(synanmGroups).map(([gname, records]) => {
      const cells = records.sort((a,b) => {
        const pa = (a.quizType.match(/파트(\d)/)||[,'0'])[1];
        const pb = (b.quizType.match(/파트(\d)/)||[,'0'])[1];
        return pa.localeCompare(pb) || (a.quizType.includes('A모드')?-1:1);
      }).map(d => {
        const isPerfect = d.wrong === 0 && (d.round||1) > 1;
        const cellClass = isPerfect ? 'perfect' : d.wrong > 0 ? 'has-wrong' : 'perfect';
        const partMatch = d.quizType.match(/파트(\d)/);
        const modeMatch = d.quizType.includes('A모드')?'A':d.quizType.includes('B모드')?'B':'';
        const partLabel = partMatch ? `파트${partMatch[1]}` : '';
        const timeStr = d.time ? d.time.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
        const roundStr = (d.round||1) > 1 ? `<div style="font-size:10px;color:#e65100">${d.round}라운드</div>` : '';
        const perfectBadge = d.wrong === 0 && (d.round||1) > 1
          ? '<div style="font-size:10px;color:#2e7d32;font-weight:900">🏆 완료!</div>' : '';
        return `<div class="sec-cell ${cellClass}" style="min-width:110px;text-align:left;">
          <div style="font-size:10px;font-weight:800;color:var(--muted);margin-bottom:3px;">${partLabel}${modeMatch?' '+modeMatch+'모드':''}</div>
          <div class="sec-score">${d.score}점</div>
          ${d.wrong>0?`<div class="sec-wrong">오답 ${d.wrong}개</div>`:''}
          ${roundStr}${perfectBadge}
          <div class="sec-time">${timeStr}</div>
        </div>`;
      }).join('');
      const allPerfect = records.every(d => d.wrong === 0);
      return `<div style="margin-bottom:14px;">
        <div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;">
          ${gname}
          ${allPerfect?'<span style="color:var(--green);margin-left:8px;">🏆 전 파트 완료!</span>':''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">${cells}</div>
      </div>`;
    }).join('');

    // 기타 기록 (함축의미, 빈칸추론 등)
    const nonSecMap = {};
    otherRecords.forEach(d => {
      const baseKey = d.quizType ? d.quizType.replace('_오답완료','') : d.quizType;
      if(!nonSecMap[baseKey] || (d.quizType && d.quizType.includes('오답완료'))){
        nonSecMap[baseKey] = d;
      } else if(d.time && nonSecMap[baseKey].time && d.time > nonSecMap[baseKey].time && !nonSecMap[baseKey].quizType?.includes('오답완료')){
        nonSecMap[baseKey] = d;
      }
    });

    const nonSecHtml = Object.values(nonSecMap).length > 0 ? `
      <div style="margin-bottom:10px;">
        <div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;">🔤 기타 퀴즈</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${Object.values(nonSecMap).sort((a,b)=>(b.time||0)-(a.time||0)).map(d => {
            const isPerfect = d.wrong === 0;
            const isVocabComplete = d.quizType && d.quizType.includes('오답완료');
            const timeStr = d.time ? d.time.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
            const cellClass = isVocabComplete ? 'perfect' : isPerfect ? 'perfect' : 'has-wrong';
            const badge = isVocabComplete ? '<div style="font-size:10px;color:#2e7d32;font-weight:900;margin-top:2px">🏆 오답 0개 완료!</div>' : '';
            return `<div class="sec-cell ${cellClass}" style="min-width:130px;text-align:left;">
              <div style="font-size:10px;font-weight:800;color:var(--muted);margin-bottom:4px;">${nonSecLabel(d.quizType)}</div>
              <div class="sec-score">${d.score}점</div>
              ${d.wrong>0?`<div class="sec-wrong">오답 ${d.wrong}개</div>`:''}
              ${badge}
              <div class="sec-time">${timeStr}</div>
            </div>`;
          }).join('')}
        </div>
      </div>` : '';

    const totalDone = st.records.filter(d=>categorize(d.quizType)!=='other').length;
    const avgScore = totalDone > 0 ? Math.round(st.records.reduce((a,b)=>a+b.score,0)/st.records.length) : 0;

    return `<div class="student-card">
      <div class="student-card-header">
        <div>
          <div class="quiz-type-label">${st.school}</div>
          <div class="student-name">👤 ${st.name}</div>
        </div>
        <div class="student-summary">
          <span class="sum-pill done">📝 총 ${st.records.length}회 응시</span>
          <span class="sum-pill ${avgScore>=85?'done':'warn'}">평균 ${avgScore}점</span>
        </div>
      </div>
      ${secBlocksHtml}
      ${synanmHtml}
      ${nonSecHtml}
    </div>`;
  }).join('');

  area.innerHTML = `<div class="student-cards">${html}</div>`;
}

function exportCSV(){
  const hdr = ['이름','학교','퀴즈유형','점수','정답','오답','시간초과','총문제','라운드','제출시간','오답단어'];
  const rows = allData.map(d=>[
    d.name, d.school, d.quizType, d.score, d.correct, d.wrong, d.timedOut,
    d.total, d.round||1,
    d.time ? d.time.toLocaleString('ko-KR') : '-',
    d.wrongWords.map(w=>typeof w==='string'?w:(w.eng||w)).join('|')
  ]);
  const csv = [hdr,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `봄날퀴즈_결과_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
