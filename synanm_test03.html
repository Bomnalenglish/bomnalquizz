const VALID = WORDS.filter(w => w.syn && w.syn.length >= 1);
let mode = 'A', name = '', school = '', qs = [], idx = 0;
let cor = 0, wrn = 0, wrongs = [], tid = null, answered = false, t0 = 0;

function selMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
}
function shuf(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}
function startQuiz() {
  // 허브에서 저장된 이름/학교 자동 로드
  const savedName = sessionStorage.getItem('bn_name') || localStorage.getItem('bn_name') || '';
  const savedSchool = sessionStorage.getItem('bn_school') || localStorage.getItem('bn_school') || '';
  if (savedName) {
    name = savedName;
    school = savedSchool;
  } else {
    // 직접 입력 모드
    school = document.getElementById('si') ? document.getElementById('si').value : '';
    name = document.getElementById('ni') ? document.getElementById('ni').value.trim() : '';
    if (!school) { alert('학교를 선택해주세요!'); return; }
    if (!name) { alert('이름을 입력해주세요!'); return; }
  }
  if (mode === 'A') {
    qs = shuf(VALID).slice(0, Math.min(VALID.length, 20)).flatMap(w => ([{type:'M',word:w},{type:'S',word:w}]));
  } else {
    const p = [];
    WORDS.forEach(w => {
      if (w.syn && w.syn.length > 0) p.push({type:'J',w1:w.eng,w2:w.syn[0],rel:'syn',kor:w.kor});
      if (w.ant && w.ant.length > 0) p.push({type:'J',w1:w.eng,w2:w.ant[0],rel:'ant',kor:w.kor});
    });
    qs = shuf(p).slice(0, Math.min(p.length, 20));
  }
  idx=0; cor=0; wrn=0; wrongs=[]; t0=Date.now();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent = name + ' · ' + (mode==='A' ? '유의어 찾기' : '관계 판별');
  showQ();
}
function showQ() {
  if (idx >= qs.length) { showResult(); return; }
  answered = false;
  const q = qs[idx];
  document.getElementById('pf').style.width = (idx/qs.length*100).toFixed(0) + '%';
  document.getElementById('hb').textContent = (idx+1) + '/' + qs.length;
  const area = document.getElementById('quizArea');
  if (q.type === 'M') {
    const ck = q.word.kor;
    const dis = shuf(WORDS.filter(w => w.kor !== ck && w.kor).map(w => w.kor)).slice(0,3);
    const ch = shuf([ck, ...dis]);
    area.innerHTML = '<div class="qc"><div class="qb s">1단계 · 뜻 찾기</div><div class="qstep">'+(idx+1)+' / '+qs.length+'</div><div class="qw">'+q.word.eng+'</div><div class="qp">이 단어의 뜻은?</div><div class="choices" id="qChoices"></div><div class="fb" id="fb"></div></div>';
    const cc = document.getElementById('qChoices');
    ch.forEach((c,i) => {
      const b = document.createElement('button'); b.className = 'cb';
      b.innerHTML = '<span class="cn">'+(i+1)+'</span>'+c;
      b.addEventListener('click', () => selM(b,c,ck));
      cc.appendChild(b);
    });
  } else if (q.type === 'S') {
    const syns = q.word.syn;
    const cs = syns[Math.floor(Math.random()*syns.length)];
    const allS = WORDS.flatMap(w => w.syn||[]).filter(s => !syns.includes(s));
    const dis = shuf(allS).slice(0,3);
    const ch = shuf([cs, ...dis]);
    area.innerHTML = '<div class="qc"><div class="qb s">2단계 · 유의어 찾기</div><div class="qstep">'+(idx+1)+' / '+qs.length+'</div><div class="qw">'+q.word.eng+'</div><div class="qk">'+q.word.kor+'</div><div class="qp">이 단어의 유의어는?</div><div class="choices" id="qChoices"></div><div class="fb" id="fb"></div></div>';
    const cc = document.getElementById('qChoices');
    ch.forEach((c,i) => {
      const b = document.createElement('button'); b.className = 'cb';
      b.innerHTML = '<span class="cn">'+(i+1)+'</span>'+c;
      b.addEventListener('click', () => selS(b,c,syns));
      cc.appendChild(b);
    });
  } else {
    area.innerHTML = '<div class="qc"><div class="qb j">관계 판별</div><div class="qstep">'+(idx+1)+' / '+qs.length+'</div><div style="display:flex;gap:14px;justify-content:center;align-items:center;margin:14px 0 6px;"><div class="qw" style="font-size:22px;">'+q.w1+'</div><div style="font-size:22px;color:#ce93d8;font-weight:800;">↔</div><div class="qw" style="font-size:22px;">'+q.w2+'</div></div><div class="qk" style="text-align:center;">('+q.kor+')</div><div class="qp" style="margin-top:14px;">두 단어의 관계는?</div><div class="jbtns"><button class="jb sb" id="jSyn">🟢 유의어</button><button class="jb ab" id="jAnt">🔴 반의어</button></div><div class="fb" id="fb"></div></div>';
    document.getElementById('jSyn').addEventListener('click', function() { selJ(this,'syn',q.rel); });
    document.getElementById('jAnt').addEventListener('click', function() { selJ(this,'ant',q.rel); });
  }
  clearTimeout(tid); tid = setTimeout(autoTO, 10000);
}
function selM(btn, sel, ans) {
  if (answered) return; answered=true; clearTimeout(tid);
  document.querySelectorAll('.cb').forEach(b => b.disabled=true);
  const fb = document.getElementById('fb');
  if (sel === ans) { btn.classList.add('correct'); fb.className='fb ok'; fb.textContent='✅ 정답!'; cor++; setTimeout(()=>{idx++;showQ();},800); }
  else { btn.classList.add('wrong'); document.querySelectorAll('.cb').forEach(b=>{if(b.textContent.trim()===ans||b.textContent.includes(ans))b.classList.add('reveal');}); fb.className='fb no'; fb.textContent='❌ 오답! 정답: '+ans; wrn++; wrongs.push({eng:qs[idx].word.eng,kor:ans,type:'뜻',my:sel,correct:ans}); setTimeout(()=>{idx+=2;showQ();},1500); }
}
function selS(btn, sel, syns) {
  if (answered) return; answered=true; clearTimeout(tid);
  document.querySelectorAll('.cb').forEach(b => b.disabled=true);
  const fb = document.getElementById('fb');
  if (syns.includes(sel)) { btn.classList.add('correct'); fb.className='fb ok'; fb.textContent='✅ 정답!'; cor++; }
  else { btn.classList.add('wrong'); fb.className='fb no'; fb.textContent='❌ 오답! 유의어: '+syns.join(', '); wrn++; wrongs.push({eng:qs[idx].word.eng,kor:qs[idx].word.kor,type:'유의어',my:sel,correct:syns[0]}); }
  setTimeout(()=>{idx++;showQ();},1500);
}
function selJ(btn, sel, ans) {
  if (answered) return; answered=true; clearTimeout(tid);
  document.querySelectorAll('.jb').forEach(b => b.disabled=true);
  const fb = document.getElementById('fb');
  const la = ans==='syn'?'유의어':'반의어'; const ls = sel==='syn'?'유의어':'반의어';
  if (sel === ans) { btn.classList.add('correct'); fb.className='fb ok'; fb.textContent='✅ 정답! '+la; cor++; }
  else { btn.classList.add('wrong'); fb.className='fb no'; fb.textContent='❌ 오답! 정답: '+la; wrn++; const q=qs[idx]; wrongs.push({eng:q.w1+' ↔ '+q.w2,kor:q.kor,type:'관계',my:ls,correct:la}); }
  setTimeout(()=>{idx++;showQ();},1500);
}
function autoTO() {
  if (answered) return; answered=true;
  document.querySelectorAll('.cb,.jb').forEach(b => b.disabled=true);
  const fb = document.getElementById('fb'); fb.className='fb no'; fb.textContent='⏱ 시간 초과!';
  wrn++; const q=qs[idx];
  if (q.type==='M') wrongs.push({eng:q.word.eng,kor:q.word.kor,type:'뜻',my:'(초과)',correct:q.word.kor});
  else if (q.type==='S') wrongs.push({eng:q.word.eng,kor:q.word.kor,type:'유의어',my:'(초과)',correct:q.word.syn[0]});
  setTimeout(()=>{idx++;showQ();},1500);
}
function showResult() {
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0, el=Math.round((Date.now()-t0)/60000);
  const wHTML = wrongs.length>0 ? '<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.eng+'</div><div class="wid">['+w.type+'] 내 답: '+w.my+' → 정답: '+w.correct+'</div></div>').join('')+'</div>' : '<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';
  const rs = document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML = '<div class="rc"><div style="font-size:12px;color:var(--muted);margin-bottom:4px;">'+KANG_LABEL+' · '+(mode==='A'?'유의어 찾기':'관계 판별')+'</div><div class="rs">'+pct+'점</div><div class="rsub">'+name+'의 결과</div><div class="sr"><div class="si"><div class="sn" style="color:#2e7d32;">'+cor+'</div><div class="sl">정답</div></div><div class="si"><div class="sn" style="color:#b71c1c;">'+wrn+'</div><div class="sl">오답</div></div><div class="si"><div class="sn" style="color:#7b1fa2;">'+total+'</div><div class="sl">총문제</div></div><div class="si"><div class="sn" style="color:#ff6f00;">'+el+'분</div><div class="sl">소요</div></div></div>'+wHTML+'<div class="rbtns"><button class="btn btn-p" onclick="location.reload()">다시하기 🔄</button></div></div>';
  if (window._fbSave) window._fbSave({submittedAt:new Date().toISOString(),studentName:name,school:school,score:pct,correct:cor,wrong:wrn,total:total,elapsedMin:el,quizType:KANG_LABEL+'_'+mode+'모드',wrongWords:wrongs.map(w=>({eng:w.eng||'',kor:w.kor||'',my:w.my||'',src:w.type||''}))});
}
</script>
