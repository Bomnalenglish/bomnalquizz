const _DAY_KEY=(function(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
const _PROG_KEY='bn_prog_'+QUIZ_ID;
function _saveProg(){try{localStorage.setItem(_PROG_KEY, JSON.stringify({day:_DAY_KEY,doneRefs:Array.from(doneRefs)}));}catch(e){}}
function _loadProg(){
  try{const raw=localStorage.getItem(_PROG_KEY);if(!raw) return;
    const data=JSON.parse(raw);
    if(data.day!==_DAY_KEY){localStorage.removeItem(_PROG_KEY);return;}
    if(Array.isArray(data.doneRefs)) doneRefs=new Set(data.doneRefs);
  }catch(e){}
}
function _cleanupOldProgress(){
  try{for(let i=localStorage.length-1;i>=0;i--){
    const k=localStorage.key(i);
    if(k && k.startsWith('bn_prog_')){
      try{const v=JSON.parse(localStorage.getItem(k));if(v.day!==_DAY_KEY) localStorage.removeItem(k);}
      catch(e){localStorage.removeItem(k);}
    }
  }}catch(e){}
}

function goPassageSelect(){
  userSchool=document.getElementById('si').value;
  userName=document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  try{localStorage.setItem('bomnal_name',userName);localStorage.setItem('bomnal_school',userSchool);}catch(e){}
  document.getElementById('loginScreen').classList.add('hidden');
  const info=userName+' · '+userSchool;
  ['userInfo1','userInfo2','userInfo3'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=info;});
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function renderPassageGrid(){
  const grid=document.getElementById('pGrid');
  grid.innerHTML='';
  PASSAGE_ORDER.forEach(ref=>{
    const wordCount = VOCA[ref] ? VOCA[ref].length : 0;
    const isDone = doneRefs.has(ref);
    if(filterMode==='done' && !isDone) return;
    if(filterMode==='todo' && isDone) return;
    const card=document.createElement('div');
    card.className='p-card'+(selectedRefs.has(ref)?' sel':'')+(isDone?' done':'');
    card.dataset.ref=ref;
    card.innerHTML=`
      <div class="p-num">${refLabel(ref)}</div>
      <div class="p-cnt">${wordCount}개</div>
      ${isDone?'<span class="p-badge done-badge">완료✓</span>':''}
      ${selectedRefs.has(ref)&&!isDone?'<span class="p-badge sel-badge">선택</span>':''}
    `;
    card.onclick=()=>togglePassage(ref);
    grid.appendChild(card);
  });
  updateSummary();
}

function togglePassage(ref){
  if(selectedRefs.has(ref)) selectedRefs.delete(ref);
  else selectedRefs.add(ref);
  renderPassageGrid();
}

function filterPassage(mode,btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb-btn').forEach(b=>b.classList.remove('active'));
  ['fbAll','fbTodo','fbDone'].forEach(id=>{const e=document.getElementById(id);if(e&&((id==='fbAll'&&mode==='all')||(id==='fbTodo'&&mode==='todo')||(id==='fbDone'&&mode==='done')))e.classList.add('active');});
  renderPassageGrid();
}

function selectAll(){PASSAGE_ORDER.forEach(ref=>{
  if(filterMode==='done' && !doneRefs.has(ref)) return;
  if(filterMode==='todo' && doneRefs.has(ref)) return;
  selectedRefs.add(ref);
});renderPassageGrid();}

function clearSelection(){selectedRefs.clear();renderPassageGrid();}

function updateSummary(){
  const total=PASSAGE_ORDER.length;
  const done=doneRefs.size;
  const sel=selectedRefs.size;
  let words=0;selectedRefs.forEach(ref=>{if(VOCA[ref])words+=VOCA[ref].length;});
  document.getElementById('summaryRow').innerHTML=
    `총 ${total}개 지문 · 완료 ${done}개 · 선택 ${sel}개 (${words}개 단어)`;
  document.getElementById('toModeBtn').disabled = sel===0;
}

function goModeSelect(){
  if(selectedRefs.size===0){alert('지문을 1개 이상 선택해주세요.');return;}
  const refs=Array.from(selectedRefs).sort((a,b)=>parseInt(a.split('-')[0])-parseInt(b.split('-')[0]));
  document.getElementById('modeSub').textContent='선택한 지문: '+refs.map(r=>refLabel(r)).join(', ');
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
}

function backToPassage(){
  document.getElementById('modeScreen').classList.add('hidden');
  document.getElementById('passageScreen').classList.remove('hidden');
}

function confirmExit(){
  if(idx>0 && !confirm('진행 중인 풀이를 중단하시겠습니까?')) return;
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
}

function shuffle(arr){const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function selectRound(r){
  round=r;
  // Build quiz pool
  const pool=[];
  Array.from(selectedRefs).forEach(ref=>{
    (VOCA[ref]||[]).forEach(w=>{
      pool.push({ref:ref,...w});
    });
  });

  let filtered=[];
  if(r==='meaning'){filtered = pool.filter(w=>w.meaning);}
  else if(r==='syn'){filtered = pool.filter(w=>w.syn);}
  else if(r==='def'){filtered = pool.filter(w=>w.def);}

  if(filtered.length<2){
    alert('이 모드에는 충분한 데이터가 없습니다. 다른 지문 또는 다른 모드를 선택해주세요.');
    return;
  }

  qs = shuffle(filtered);
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('modeScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  const modeLabel={'meaning':'📖 뜻 맞추기','syn':'🔄 유의어 찾기','def':'📕 영영풀이'}[r];
  document.getElementById('hudLabel').textContent=modeLabel;
  showQ();
}

function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  document.getElementById('hudProg').textContent=(idx+1)+' / '+qs.length;
  document.getElementById('pf').style.width=(idx/qs.length*100)+'%';
  document.getElementById('feedback').textContent='';
  const q=qs[idx];

  // Build options & prompt by round
  let prompt='', wordHTML='', ans='', opts=[];
  if(round==='meaning'){
    prompt='주어진 영어 단어의 뜻을 고르세요.';
    wordHTML=`<div class="label">영어 단어</div><div class="word">${escHTML(q.word)}</div>`;
    ans = q.meaning;
    const distractors = shuffle(qs.filter(x=>x.no!==q.no || x.ref!==q.ref).map(x=>x.meaning).filter(m=>m && m!==ans)).slice(0,3);
    opts = shuffle([ans, ...distractors]);
  } else if(round==='syn'){
    prompt='주어진 영어 단어의 유의어(synonym)를 고르세요.';
    wordHTML=`<div class="label">영어 단어</div><div class="word">${escHTML(q.word)}</div>`;
    ans = q.syn;
    const distractors = shuffle(qs.filter(x=>(x.no!==q.no||x.ref!==q.ref) && x.syn).map(x=>x.syn).filter(s=>s && s!==ans)).slice(0,3);
    opts = shuffle([ans, ...distractors]);
  } else { // def
    prompt='영영풀이에 알맞은 단어를 고르세요.';
    wordHTML=`<div class="label">English definition</div><div class="def-text">${escHTML(q.def)}</div>`;
    ans = q.word;
    const distractors = shuffle(qs.filter(x=>(x.no!==q.no||x.ref!==q.ref) && x.def).map(x=>x.word).filter(w=>w && w!==ans)).slice(0,3);
    opts = shuffle([ans, ...distractors]);
  }
  document.getElementById('qPrompt').textContent=prompt;
  document.getElementById('qWord').innerHTML=wordHTML;
  const grid=document.getElementById('optGrid');
  grid.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.textContent=o;
    b.onclick=()=>selChoice(b, o, ans);
    grid.appendChild(b);
  });
}

function selChoice(btn, sel, ans){
  if(answered) return;
  answered=true;
  const q=qs[idx];
  const ok = sel===ans;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===ans) b.classList.add('reveal');
  });
  btn.classList.add(ok?'correct':'wrong');
  if(ok){
    cor++;
    document.getElementById('feedback').textContent='✅ 정답!';
    document.getElementById('feedback').style.color='var(--correct)';
    allResults.push({ref:q.ref,no:q.no,word:q.word,meaning:q.meaning,syn:q.syn,def:q.def,my:sel,correct:true});
  } else {
    wrn++;
    document.getElementById('feedback').textContent='❌ 내 답: '+sel+' / 정답: '+ans;
    document.getElementById('feedback').style.color='var(--wrong)';
    wrongs.push({ref:q.ref,no:q.no,word:q.word,meaning:q.meaning,syn:q.syn,def:q.def,my:sel,correct:ans});
    allResults.push({ref:q.ref,no:q.no,word:q.word,meaning:q.meaning,syn:q.syn,def:q.def,my:sel,correct:false});
  }
  setTimeout(()=>{idx++;showQ();}, ok?550:1400);
}

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizScreen').classList.add('hidden');
  const total=qs.length, pct = total>0?Math.round(cor/total*100):0;
  const el = Math.round((Date.now()-t0)/60000);
  // Mark passages as done for this round
  selectedRefs.forEach(r=>doneRefs.add(r));
  _saveProg();

  const refs=Array.from(selectedRefs).sort((a,b)=>parseInt(a.split('-')[0])-parseInt(b.split('-')[0]));
  const roundLabel={'meaning':'뜻맞추기','syn':'유의어찾기','def':'영영풀이'}[round];
  const passageStr=refs.join(',');

  const wHTML = wrongs.length>0
    ? `<div class="wl"><h3>❌ 오답 (${wrongs.length}개)</h3>${wrongs.map(w=>{
        const mainDisplay = (round==='def') ? w.def : w.word;
        return `<div class="wi"><div class="wie">${escHTML(w.word)} (${escHTML(w.ref)}번 #${w.no})</div><div class="wid">내 답: ${escHTML(w.my)} → 정답: ${escHTML(w.correct)}</div></div>`;
      }).join('')}</div>`
    : '<div style="color:var(--correct);font-weight:700;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn rbtn-p" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const screen=document.getElementById('resultScreen');
  screen.classList.remove('hidden');
  screen.innerHTML=`<div class="rc">
    <div style="text-align:center;font-family:'Black Han Sans',sans-serif;font-size:1.04rem;color:var(--accent)">🎉 ${roundLabel} 완료!</div>
    <div style="font-size:.74rem;color:var(--muted);text-align:center;margin-top:3px">고1 24-6 모의 · 지문 ${passageStr}</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:var(--correct)">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:var(--wrong)">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:var(--accent)">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:var(--accent2)">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-s" onclick="goBack()">← 모드 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="goPassageBack()">← 지문 다시 선택</button>
    </div>
  </div>`;

  if(window._fbSave){
    window._fbSave({
      submittedAt: new Date().toISOString(),
      studentName: userName,
      school: userSchool,
      score: pct,
      correct: cor,
      wrong: wrn,
      total: total,
      elapsedMin: el,
      quizType: '올림포스기본1_U3_단어_'+roundLabel,
      passages: refs,
      details: allResults.map(r=>({
        지문: refLabel(r.ref),
        번호: r.no,
        단어: r.word,
        결과: r.correct ? '✅정답' : '❌오답',
        내답: r.my,
        정답: r.correct===false ? (round==='meaning'?r.meaning:round==='syn'?r.syn:r.word) : r.my,
      })),
      wrongWords: wrongs.map(w=>({
        eng: w.word,
        kor: w.meaning,
        my: w.my,
        correct: w.correct,
        ref: w.ref,
        no: w.no,
        mode: round,
      })),
    });
  }
}

let wrongQs=[];
function retryWrongs(){
  if(wrongs.length===0) return;
  wrongQs=qs.filter(q=>wrongs.some(w=>w.no===q.no && w.ref===q.ref));
  qs=wrongQs;
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('hudProg').textContent='';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
}
function goPassageBack(){
  selectedRefs.clear();
  document.getElementById('resultScreen').classList.add('hidden');
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

window.addEventListener('DOMContentLoaded',()=>{
  const n=localStorage.getItem('bomnal_name');
  const s=localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value=n;
  if(s){
    const sel=document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value && s.includes(sel.options[i].value)){sel.value=sel.options[i].value;break;}
    }
  }
  _cleanupOldProgress();
  _loadProg();
});

window.goPassageSelect=goPassageSelect;
window.filterPassage=filterPassage;
window.selectAll=selectAll;
window.clearSelection=clearSelection;
window.goModeSelect=goModeSelect;
window.backToPassage=backToPassage;
window.selectRound=selectRound;
window.confirmExit=confirmExit;
window.retryWrongs=retryWrongs;
window.goBack=goBack;
window.goPassageBack=goPassageBack;
</script>

<!-- === TTS 음성 지원 (Web Speech API) === -->
<style>
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;background:#e0e7ff;color:#3730a3;border-radius:50%;cursor:pointer;font-size:14px;padding:0;vertical-align:middle;margin-left:6px;transition:all .15s;flex-shrink:0;line-height:1;font-family:inherit;}
.tts-btn:hover{background:#c7d2fe;transform:scale(1.05);}
.tts-btn:active{transform:scale(0.95);}
.tts-btn.speaking{background:#fbbf24;color:white;animation:tts-pulse 1s ease-in-out infinite;}
@keyframes tts-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
</style>
<script>
(function(){
  if(window.__ttsInstalled) return; window.__ttsInstalled=true;
  function speakText(text, btn){
    if(!('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang='en-US';u.rate=0.85;u.pitch=1;
      const voices=window.speechSynthesis.getVoices();
      const en=voices.find(v=>v.lang && /^en/i.test(v.lang));
      if(en) u.voice=en;
      if(btn){
        btn.classList.add('speaking');
        u.onend=u.onerror=function(){btn.classList.remove('speaking');};
      }
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
  function ttsText(s){
    s=String(s||'').replace(/^["“”'\s]+|["“”'\s]+$/g,'');
    s=s.replace(/\s*🔊\s*$/,'');
    const idx=s.search(/[ㄱ-힝]/);
    if(idx!==-1) s=s.slice(0,idx);
    return s.replace(/[\s\(\)\[\];,~]+$/,'').trim();
  }
  const SEL='.q-word,.word-en,.word-box,.word-card .word-en';
  function inject(root){
    (root||document).querySelectorAll(SEL).forEach(w=>{
      // 이미 자식으로 TTS 버튼이 있으면 skip (innerHTML 교체로 버튼이 사라진 경우엔 재주입)
      if(w.querySelector(':scope > .tts-btn')) return;
      const raw=w.textContent.trim();
      const txt=ttsText(raw);
      if(!txt || !/[A-Za-z]/.test(txt)) return;
      const btn=document.createElement('button');
      btn.className='tts-btn';
      btn.type='button';
      btn.title='발음 듣기';
      btn.setAttribute('aria-label','발음 듣기');
      btn.textContent='🔊';
      btn.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();speakText(txt,btn);});
      w.appendChild(document.createTextNode(' '));
      w.appendChild(btn);
    });
  }
  const _obs=new MutationObserver(muts=>{
    let needs=false;
    muts.forEach(m=>m.addedNodes.forEach(n=>{if(n.nodeType===1) needs=true;}));
    if(needs) inject(document.body);
  });
  function start(){
    _obs.observe(document.body,{childList:true,subtree:true});
    inject(document.body);
    if(window.speechSynthesis && window.speechSynthesis.getVoices){
      window.speechSynthesis.getVoices();
      if(window.speechSynthesis.onvoiceschanged===null){
        window.speechSynthesis.onvoiceschanged=function(){};
      }
    }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
  else start();
})();
</script>
