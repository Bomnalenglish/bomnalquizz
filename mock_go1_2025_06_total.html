  {no:42,school:`청주고 – 청주시`,pref:`32`,type:`빈칸 추론`,stem:`다음 빈칸에 들어갈 말로 적절하지 않은 것은?`,body:`Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services and then make the mistake of overpricing them. They have created something they care deeply about, it's theirs, and [____________________________________________________] While many of them are quick to realize that their initial prices are too high, not all these people are happy or willing to drop their prices to make their products more attractive. And this can be a very costly mistake that may lead to the failure of their new business. When you launch a new product or service, your priority should be to get sufficient market adoption as soon as possible and you should be ready to sacrifice your initial prices and profits to achieve this aim. Once you have strong sales volumes, you can increase your prices to maximize your profits.`,choices:[`this powerful sense of ownership distorts their perception of value which causes them to overprice their products.`,`because they feel such strong ownership, they tend to see the value incorrectly and charge too much for their products.`,`a strong feeling of ownership affects how they see the product's value, so they set the prices too high for the products.`,`they think their product is very special because it belongs to them, making them overestimate the product's value and put a higher price on it.`,`their lack of personal attachment to the product helps them see the product more objectively, preventing them from asking too much for it.`],ans:5},
  {no:43,school:`세광고 - 청주시`,pref:`32`,type:`기타`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`And this can be a very costly mistake that may lead to the failure of their new business. Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services; they care deeply about what they've created because it's theirs. (A) This powerful sense of ownership distorts their perception of value which causes them to overprice their products and leads to a misstep. (B) Soon many of them are quick to realize that their initial prices are too high. Although all these people are not happy or willing to drop their prices to make their products more attractive, they adjust the first set prices. (C) When you launch a new product or service, your priority should be to get sufficient market adoption as soon as possible and you should be ready to sacrifice your initial prices and profits to achieve this aim. (D) Once you have strong sales volumes, you can increase your prices to maximize your profits. (E)`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:2},
  {no:44,school:``,pref:`32`,type:`제목`,stem:`윗글의 제목으로 가장 적절한 것은?`,body:`Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services and then make the mistake of overpricing them. They have created something they care deeply about, it's theirs, and this powerful sense of ownership distorts their perception of value which causes them to ⓐundervalue their products. While many of them are quick to realize that their initial prices are too high, not all these people are happy or willing to drop their prices to make their products more attractive. And this can be a very costly mistake that may lead to the failure of their new business. When you launch a new product or service, your priority should be to get ⓑsufficient market adoption as soon as possible and you should be ready to ⓒabandon your initial prices and profits to achieve this aim. Once you have strong sales volumes, you can ⓓincrease your prices to maximize your profits. However, failing to gain early traction in the market may ⓔthreaten the future of the product. - 1`,choices:[`Ways to Reduce Product Development Costs`,`Why Branding Often Matters More Than Pricing`,`The Dangers of Overpricing What You've Created`,`How Strong Ownership Can Mislead Entrepreneurs`,`Smart Strategies for Marketing Expensive Products`],ans:3},
  {no:45,school:``,pref:`32`,type:`어휘`,stem:`윗글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적절하 지 않은 것은?`,body:`Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services and then make the mistake of overpricing them. They have created something they care deeply about, it's theirs, and this powerful sense of ownership distorts their perception of value which causes them to ⓐundervalue their products. While many of them are quick to realize that their initial prices are too high, not all these people are happy or willing to drop their prices to make their products more attractive. And this can be a very costly mistake that may lead to the failure of their new business. When you launch a new product or service, your priority should be to get ⓑsufficient market adoption as soon as possible and you should be ready to ⓒabandon your initial prices and profits to achieve this aim. Once you have strong sales volumes, you can ⓓincrease your prices to maximize your profits. However, failing to gain early traction in the market may ⓔthreaten the future of the product. - 1`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:1},
  {no:46,school:`달서고 - 대구시`,pref:`32`,type:`빈칸 추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services and then make the mistake of overpricing them. They have created something they care deeply about, it's theirs, and this powerful sense of ownership distorts their perception of value which causes them to overprice their products. While many of them are quick to realize that their initial prices are too high, not all these people are happy or willing to drop their prices to make their products more attractive. And this can be a very costly mistake that may lead to the failure of their new business. When you launch a new product or service, your priority should be to get sufficient market adoption as soon as possible and you should be ready to sacrifice your initial prices and profits to achieve this aim. Once you have strong sales volumes, you can increase your prices to maximize your profits. ↓ Entrepreneurs may fail by overpricing their products due to (A)___________, and should be willing to (B)___________ (A) (B)`,choices:[`emotion advertise`,`ownership compromise`,`pride persist`,`ownership discount`,`confidence promote`],ans:4},
  {no:47,school:`서울대학교사범대학부설고 - 서울시`,pref:`33`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`In most respects, humans are one of a relatively small number of species that evolved a very different strategy of investing more energy to reproduce more ⓐslowly. Like apes and elephants, we mature at a leisurely pace, grow large bodies, and have a ⓑlimited number of babies but devote much time and energy to raising them well. This unusual strategy succeeds because while apes and elephants produce fewer babies than mice, a ⓒsmaller percentage of their offspring survive to then reproduce. A house mouse can become a mother when she is just five weeks old, has four to ten pups per litter, and can have a new litter every two months over the course of her approximately twelve-month life. However, the vast majority of her pups ⓓperish long before reaching adulthood. In contrast, a chimp or elephant mother does not reproduce until she is at least twelve years old, and she gives birth to only one infant every five or six years over the next thirty or so years. About half of these offspring make it to becoming ⓔparents.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:3},
  {no:49,school:`부용고 - 의정부시`,pref:`33`,type:`주제`,stem:`다음 글의 주제로 가장 적절한 것은?`,body:`In most respects, humans are one of a relatively small number of species that evolved a very different strategy of investing more energy to reproduce more slowly. Like apes and elephants, we mature at a leisurely pace, grow large bodies, and have few babies but devote much time and energy to raising them well. This unusual strategy succeeds because while apes and elephants produce fewer babies than mice, a larger percentage of their offspring survive to then reproduce. A house mouse can become a mother when she is just five weeks old, has four to ten pups per litter, and can have a new litter every two months over the course of her approximately twelve-month life. However, the vast majority of her pups die young. In contrast, a chimp or elephant mother does not reproduce until she is at least twelve years old, and she gives birth to only one infant every five or six years over the next thirty or so years. About half of these offspring make it to becoming parents.`,choices:[`the reason mice give birth to lots of offspring`,`the challenges of raising offspring in the wild`,`how humans evolved to become prolific like mice`,`a basic instinct of house mice and their short life span`,`a comparison of reproductive strategies across species`],ans:5},
  {no:50,school:`충북대학교사범대학부설고 - 청주시`,pref:`33`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`In most respects, humans are one of a relatively small number of species that evolved a very different strategy of investing more energy to reproduce more slowly. (A) In contrast, a chimp or elephant mother does not reproduce until she is at least twelve years old, and she gives birth to only one infant every five or six years over the next thirty or so years. About half of these offspring make it to becoming parents. (B) Like apes and elephants, we mature at a leisurely pace, grow large bodies, and have few babies but devote much time and energy to raising them well. This unusual strategy succeeds because while apes and elephants produce fewer babies than mice, a larger percentage of their offspring survive to then reproduce. (C) A house mouse can become a mother when she is just five weeks old, has four to ten pups per litter, and can have a new litter every two months over the course of her approximately twelve-month life. However, the vast majority of her pups die young.`,choices:[`(A) - (C) - (B)`,`(B) - (A) - (C)`,`(B) - (C) - (A)`,`(C) - (A) - (B)`,`(C) - (B) - (A)`],ans:3},
  {no:51,school:`문수고 - 울산시`,pref:`33`,type:`내용일치`,stem:`다음 글의 내용과 일치하지 않는 것은?`,body:`In most respects, humans are one of a relatively small number of species that evolved a very different strategy of investing more energy to reproduce more slowly. Like apes and elephants, we mature at a leisurely pace, grow large bodies, and have few babies but devote much time and energy to raising them well. This unusual strategy succeeds because while apes and elephants produce fewer babies than mice, a larger percentage of their offspring survive to then reproduce. A house mouse can become a mother when she is just five weeks old, has four to ten pups per litter, and can have a new litter every two months over the course of her approximately twelve-month life. However, the vast majority of her pups die young. In contrast, a chimp or elephant mother does not reproduce until she is at least twelve years old, and she gives birth to only one infant every five or six years over the next thirty or so years. About half of these offspring make it to becoming parents. - 1 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차`,choices:[`인간은 느린 번식을 위해 더 많은 에너지를 투자하는 특 이한 전략을 사용한다.`,`유인원은 쥐보다 새끼를 적게 낳으나 새끼 중 더 높은 비율이 살아남는다.`,`쥐는 침팬지보다 더 일찍 어미가 되며, 두 달마다 한 마 리씩 낳는다.`,`침팬지는 5~6년마다 새끼를 낳고, 한 번에 한 마리만 낳 는다.`,`침팬지가 낳은 새끼들 중 절반 정도가 부모가 되는 데 성공한다.`],ans:3},
  {no:52,school:`세광고 - 청주시`,pref:`33`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`In most respects, humans are one of a relatively small number of species that evolved a very different strategy of investing more energy to reproduce more slowly. Like apes and elephants, we mature at a leisurely pace, grow large bodies, and have few babies but devote much time and energy to raising them well. This unusual strategy succeeds because while apes and elephants produce fewer babies than mice, a larger percentage of their offspring survive to then reproduce. A house mouse can become a mother when she is just five weeks old, has four to ten pups per litter, and can have a new litter every two months over the course of her approximately twelve-month life. However, the vast majority of her pups die young. In contrast, a chimp or elephant mother does not reproduce until she is at least twelve years old, and she gives birth to only one infant every five or six years over the next thirty or so years. About half of these offspring make it to becoming parents.`,choices:[`Interbreeding among diverse human groups has played a key role in promoting genetic diversity.`,`Mice share similar reproductive strategies with other small mammals, prioritizing speed and quantity over care.`,`Despite differences in size and lifespan, all mammals are believed to follow a fundamentally similar reproductive pattern.`,`The slow reproduction of large mammals is primarily shaped by environmental factors rather than by parental strategies.`,`The slow reproductive strategy of humans and other large mammals ensures greater survival of their offspring through increased parental investment.`],ans:5},
  {no:53,school:`신흥고 - 청주시`,pref:`34`,type:`빈칸 추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`When scientists make an important new discovery or experimentally prove some hypothesis, they do not, in general, keep that information to themselves so that they alone can consider its meaning and derive additional theories from it. Instead, they publish their results and make their data available for inspection. This makes it possible for other scientists to reconsider their data and possibly refute their conclusions. More important, though, it makes it possible for other scientists to use that data to construct new hypotheses and perform new experiments. The assumption is that society as a whole will end up knowing more if information is spread as widely as possible, rather than being limited to a few people. In a strict sense, every scientist [___________________________________ __________________]. *derive: 도출하다 ** refute: 반박하다`,choices:[`focuses solely on making fresh findings`,`relies on findings shared by fellow researchers`,`is limited in access to specific information`,`disregards evidence that contradicts their beliefs`,`remains committed to personal research theories`],ans:2},
  {no:54,school:`봉명고 - 청주시`,pref:`34`,type:`빈칸 추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`When scientists make an important new discovery or experimentally prove some hypothesis, they do not, in general, keep that information to themselves so that they alone can consider its meaning and derive additional theories from it. Instead, they publish their results and make their data available for inspection. This makes it possible for other scientists to reconsider their data and possibly refute their conclusions. More important, though, it makes it possible for other scientists to use that data to construct new hypotheses and perform new experiments. In a strict sense, every scientist depends on the work of other scientists. - 1 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 ↓ Society – of course, including science – as a whole will end up (A)__________ if information is (B)__________ as widely as possible, rather than being limited to a few people. (A) (B)`,choices:[`distrusting each other understood`,`knowing more spread`,`being reformed modified`,`being isolated opened`,`alleviating suffering edited`],ans:2},
  {no:55,school:`영남고 - 대구시`,pref:`34`,type:`기타`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`Instead, they publish their results and make their data available for inspection. Scientists make an important new discovery or experimentally prove some hypothesis. (A) When they do, they generally do not keep that information to themselves so that they alone can consider its meaning and derive additional theories from it. (B) This makes it possible for other scientists to reconsider their data and possibly refute their conclusions. (C) More important, though, it makes it possible for other scientists to use that data to construct new hypotheses and perform new experiments. (D) The assumption is that society as a whole will end up knowing more if information is spread as widely as possible, rather than being limited to a few people. (E) In a strict sense, every scientist depends on the work of other scientists.`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:2},
  {no:56,school:`문수고 - 울산시`,pref:`34`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`When scientists make an important new discovery or experimentally prove some hypothesis, they do not, in general, keep that information to themselves so that they alone can consider its meaning and derive additional theories from it. Instead, they publish their results and make their data available for inspection. This makes it possible for other scientists to reconsider their data and possibly refute their conclusions. More important, though, it makes it possible for other scientists to use that data to construct new hypotheses and perform new experiments, which promotes the progress of science. The assumption is that society as a whole will end up knowing more if information is spread as widely as possible, rather than being limited to a few people. In a strict sense, every scientist depends on the work of other scientists.`,choices:[`과학자들은 새로운 발견이나 가설 증명을 대게 다른 과 학자들과 공유함으로써 과학의 발전을 이끈다.`,`과학자들은 연구하고 있는 내용에 대하여 독단적 태도를 가질 필요가 있다.`,`과학자들의 상호 협력만으로는 과학적 발전과 사회 전체 의 지식 확장을 이끌 수 없다.`,`과학적 이론의 확립은 다양한 정보를 수집하고 이를 검 증하고 반박하는 과정을 통해 가능하다.`,`가설은 순수한 학문적 호기심으로 시작해야 대중의 비판 에서 벗어날 수 있다.`],ans:1},
  {no:57,school:`옥천고 - 옥천군`,pref:`34`,type:`빈칸 추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`When scientists make an important new discovery or experimentally prove some hypothesis, they do not, in general, keep that information to themselves so that they alone can consider its meaning and derive additional theories from it. Instead, they publish their results and make their data available for inspection. This makes it possible for other scientists to reconsider their data and possibly refute their conclusions. More important, though, it makes it possible for other scientists to use that data to construct new hypotheses and perform new experiments. The assumption is that society as a whole will end up knowing more if information is spread as widely as possible, rather than being limited to a few people. In a strict sense, every scientist depends on the work of other scientists. - 1 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 Scientists openly (A)__________ their discoveries and data to allow others to verify, (B)__________, and build upon their work, fostering collective advancement in scientific knowledge. (A) (B)`,choices:[`add contest`,`construct oppose`,`release derive`,`distribute keep`,`share challenge`],ans:5},
  {no:58,school:``,pref:`34`,type:`어법`,stem:`윗글의 밑줄 친 ⓐ~ⓔ, 중 어법상 어색한 ?것은`,body:`When scientists make important new discoveries or experimentally prove some hypotheses, they do not, in general, keep that information to themselves so that they alone can consider (A)[its] meaning and derive additional theories from it. Instead, they publish their results and make their data ⓐavailable for inspection. This makes it possible for other scientists ⓑto reconsider their data and possibly refute their conclusions. More important, though, it makes it possible for other scientists to use that data to construct new hypotheses and ⓒperform new experiments. The assumption is that society as a whole will end up ⓓ knowing more. This will happen if information is spread as widely as possible, rather than being limited to ⓔa little people. In a strict sense, every scientists depends on the work of other scientists.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:60,school:`청주고 – 청주시`,pref:`35`,type:`빈칸 추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`In the 1930s, the British psychologist Sir Frederic Bartlett asked people to listen to folktales from other countries and then recall these stories at a later date. As you might guess, unfamiliar stories were not remembered as well as familiar stories. Surprisingly, however, errors in memory were not random. Rather, subjects often rewrote similar parts of the stories in their own minds ─ particularly the parts that made the least sense to them. Bartlett concluded that when facing problems, humans draw upon mental schemata, or shelves of stored knowledge in our brains, to fill in any minor gaps in our memories. Therefore, remembering is an imaginative process that involves building upon ______________________________.`,choices:[`new knowledge`,`fictional folktales`,`random memories`,`boundless creativity`,`previous experiences`],ans:5},
  {no:61,school:`원묵고 - 서울시`,pref:`35`,type:`빈칸 추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`In the 1930s, the British psychologist Sir Frederic Bartlett asked people to listen to folktales from other countries and then recall these stories at a later date. As you might guess, unfamiliar stories were not remembered as well as familiar stories. Surprisingly, however, errors in memory were not random. Rather, subjects often rewrote similar parts of the stories in their own minds – particularly the parts that made the least sense to them. Bartlett concluded that when facing problems, humans draw upon mental schemata, or shelves of stored knowledge in our brains, to fill in any minor gaps in our memories. Therefore, remembering is an imaginative process that involves building upon past experiences. That is, this reconstructive process is _________________________. *folktale: 민간 설화`,choices:[`shortly done`,`innately creative`,`quickly reversible`,`seemingly endless`,`actually very time-consuming`],ans:2},
  {no:62,school:`문수고 - 울산시`,pref:`35`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`In the 1930s, the British psychologist Sir Frederic Bartlett asked people to listen to folktales from other countries and then ⓐrecall these stories at a later date. As you might guess, unfamiliar stories were ⓑharder to remember than familiar stories. Surprisingly, however, errors in memory were not random. Rather, subjects often rewrote similar parts of the stories in their own minds - particularly the parts that made the ⓒleast sense to them. Bartlett concluded that when facing problems, humans ⓓ draw upon mental schemata, or shelves of stored knowledge in our brains, to fill in any minor gaps in our memories. Therefore, remembering is an imaginative process that develops from ⓔunknown knowledge.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:63,school:`신흥고 - 청주시`,pref:`35`,type:`내용일치`,stem:`다음 Edward O. Wilson에 관한 글의 내용과 일치하지 않는 것은?`,body:`Edward O. Wilson was born in Birmingham, Alabama, in 1929. In his early childhood, he became interested in nature and spent much time in the outdoors. At age seven, he was partially blinded in a fishing accident: his reduced sight led Wilson to the study of ants. He could not observe larger animals from a distance. Instead, he concentrated on smaller creatures he could study up close. After studying evolutionary biology at the University of Alabama, Wilson transferred to Harvard University, where he became a professor in 1956. He never received a Nobel Prize – the prize didn't recognize research in the field of evolutionary biology. However, he was awarded the Crafoord Prize in 1990. Wilson, known to some as the "modern day Darwin", died at the age of 92 in Massachusetts.`,choices:[`Birmingham에서 태어났나.`,`낚시 사고로 부분 실명이 되었다.`,`Alabama 대학에서 진화 생물학 교수가 되었다.`,`1990년에 Crafoord Prize를 받았다.`,`Massachusetts에서 92세에 사망했다.`],ans:3},
  {no:64,school:`호산고 - 대구시`,pref:`36`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`History, people often say, repeats itself. And looking at the historical records of the ancient civilizations, some things ⓐdo seem to happen again and again. Civilizations expand, get ⓑoverextended, and then collapse as in the cases of Rome, which went under in 476 AD, and the British Empire, which fell apart more than a thousand years later in the post-World War Ⅱ era. But is this always the case? If so, archaeology would be pretty boring; one thing would happen again and again. But that's not ⓒwhat archaeologists see. Some civilizations end suddenly, like the Aztec and Inca, ⓓconquering by invaders in the 1520s AD. Those empires never had the chance to collapse as a result of overexpansion. So in the case of civilizations, "history repeats itself" ⓔseems to be an oversimplification.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:4},
  {no:65,school:`심인고 - 대구시`,pref:`36`,type:`빈칸 추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`History, people often say, repeats itself. And looking at the historical records of the ancient civilizations, some things do seem to happen again and again. Civilizations expand, get overextended, and then collapse as in the cases of Rome, which went under in 476 AD, and the British Empire, which fell apart more than a thousand years later in the post-World War Ⅱ era. But is this always the case? If so, archaeology would be pretty boring; one thing would happen again and again. But that's not what archaeologists see. Some civilizations end suddenly, like the Aztec and Inca, conquered by invaders in the 1520s AD. Those empires never had the chance to collapse as a result of overexpansion. So in the case of civilizations, "history repeats itself" [__________________________]`,choices:[`seems to be an oversimplification`,`applies only to modern societies`,`explains most historical patterns`,`proves to be scientifically accurate`,`requires more archaeological evidence`],ans:1},
  {no:66,school:`문수고 - 울산시`,pref:`36`,type:`기타`,stem:`다음 글의 내용을 <보기>와 같이 정리하고자 한다. 빈 칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`History, people often say, repeats itself. And looking at the historical records of the ancient civilizations, some things do seem to happen again and again. Civilizations expand, get overextended, and then collapse as in the cases of Rome, which went under in 476 AD, and the British Empire, which fell apart more than a thousand years later in the post‐World War II era. But is this always the case? If so, archaeology would be pretty boring; one thing would happen again and again. But that's not what archaeologists see. Some civilizations end suddenly, like the Aztec and Inca, conquered by invaders in the 1520s AD. Those empires never had the chance to collapse as a result of overexpansion. So in the case of civilizations, "history repeats itself" seems to be an oversimplification. <보기> 일반적인 주장: "History repeats itself." 예시: Civilizations like Rome and the British Empire → expand → overexpand → (A)[__________] 반례: Civilizations like Aztec and Inca → a sudden end due to foreign invasion 결론: "History repeats itself," misses the (B)[__________] of history. (A) (B)`,choices:[`collapse dignity`,`collapse complexity`,`survive repetition`,`flourish variation`,`flourish consistency`],ans:2},
  {no:67,school:`자운고 - 서울시`,pref:`36`,type:`주제`,stem:`다음 글의 주제로 가장 적절한 것은?`,body:`People often claim that history repeats itself. When examining the records of ancient civilizations, it does appear that certain patterns happen again and again. Many civilizations expand, get overextended, and eventually fall apart – just like the Roman Empire, which collapsed in 476 AD, and the British Empire, which disintegrated over a thousand years later after World War Ⅱ. But does this pattern always hold true? If it did, archaeology would be rather boring, showing the same outcome time after time. However, that's not what archaeologists actually find. Some civilizations, such as the Aztec and Inca empires, came to end suddenly when they were conquered by invaders in the 1520s AD. These empires never reached the stage of collapse due to over-expansion. Therefore, when it comes to civilizations, the idea that "history repeats itself" seems to be an oversimplification.`,choices:[`the flawed belief that history always follows a repetitive pattern`,`the similarities between ancient and modern civilizations`,`the role of archaeology in studying ancient civilizations`,`the main causes of the Roman Empire's rapid expansion and collapse`,`the advantages from endless cycle of the rise and fall in the history of civilization`],ans:1},
  {no:68,school:`봉명고 - 청주시`,pref:`36`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`History, people often say, repeats itself. And looking at the historical records of the ancient civilizations, some things do seem to happen again and again. Civilizations expand, get overextended, and then collapse as in the cases of Rome, which went under in 476 AD, and the British Empire, which fell apart more than a thousand years later in the post-World War Ⅱ era. But is this always the case? If so, archaeology would be pretty boring; one thing would happen again and again. But that's not what archaeologists see. Some civilizations end suddenly, like the Aztec and Inca, conquered by invaders in the 1520s AD. Those empires never had the chance to collapse as a result of overexpansion. So in the case of civilizations, "history repeats itself seems to be an oversimplification. - 2 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차`,choices:[`Awareness of Planetary Time: A Must for Survival Skill`,`What Is the Future of a Society That Forgets Its History`,`The End of Self-portraits: How Self-perceiving Is Deteriorated`,`How Industrialization Is Changing Archaeological Development`,`History of Civilization: Counter Example of Repetition and Simplification`],ans:5},
  {no:71,school:`천안여고 - 천안시`,pref:`37`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`Stanford psychology professor Dr. Carol Dweck is the internationally recognized pioneer of the concept of "growth mindset" as a way to continually grow, learn, and persevere in our efforts. Dweck found that kids who are told they're "smart" actually ⓐunderperform in future tasks, by choosing easier tasks to avoid evidence that they are not smart, which Dweck calls having a "fixed mindset." In contrast, Dweck found, kids who are ⓑpraised not for their smarts but for their effort develop what Dweck calls a "growth mindset." They learn that their effort is what ⓒ caused their success, and if they continue to try, over time they'll improve and achieve more things. These kids eventually take on tougher things, and feel ⓓworse about themselves. "Emphasizing effort gives a child a variable that they can ⓔcontrol," Dweck has explained. *persevere: 인내하다 **variable: 변수`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:4},
  {no:73,school:`봉명고 - 청주시`,pref:`37`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`Stanford psychology professor Dr. Carol Dweck is the internationally recognized pioneer of the concept of "growth mindset" as a way to continually grow, learn, and persevere in our efforts. Dweck found that kids who are told they're "smart" actually underperform in future tasks, by choosing easier tasks to avoid evidence that they are not smart, which Dweck calls having a "fixed mindset." In contrast, Dweck found, kids who are praised not for their smarts but for their effort develop what Dweck calls a "growth mindset." They learn that their effort is what led to their success, and if they continue to try, over time they'll improve and achieve more things. These kids end up taking on tougher things, and feel better about themselves. "Emphasizing effort gives a child a variable that they can control," Dweck has explained.`,choices:[`사람들은 일반적으로 경험적 확률에 근거하여 미래를 예 측한다.`,`정보 해석에 개인의 감정이 개입되면 의미가 왜곡된다.`,`아이의 인지능력이 뛰어날수록 정서 지능도 높은 경향이 있다.`,`사회의 경제적 풍요로움이 구성원들의 자기계발을 촉진 할 수 있다.`,`아이의 똑똑함보다는 노력을 칭찬함으로써 장기적인 발 전을 독려할 수 있다.`],ans:5},
  {no:74,school:`신흥고 - 청주시`,pref:`37`,type:`기타`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`They learn that their effort is what led to their success, and if they continue to try, over time they'll improve and achieve more things. Stanford psychology professor Dr. Carol Dweck is the internationally recognized pioneer of the concept of "growth mindset" as a way to continually grow, learn, and persevere in our efforts. (A) Dweck found that kids who are told they're "smart" actually underperform in future tasks, by choosing easier tasks to avoid evidence that they are not smart, which Dweck calls having a "fixed mindset." (B) In contrast, Dweck found, kids who are praised not for their smarts but for their effort develop what Dweck calls a "growth mindset." (C) These kids end up taking on tougher things, and feel better about themselves. (D) "Emphasizing effort gives a child a variable that they can control," Dweck has explained. (E) *persevere: 인내하다 **variable: 변수`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:3},
  {no:76,school:`호산고 - 대구시`,pref:`37`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`Stanford psychology professor Dr. Carol Dweck is the internationally recognized pioneer of the concept of "growth mindset" as a way to continually grow, learn, and persevere in our efforts. Dweck found that kids who are told they're "smart" actually underperform in future tasks, by choosing easier tasks to avoid evidence that they are not smart, which Dweck calls having a "fixed mindset." In contrast, Dweck found, kids who are praised not for their smarts but for their effort develop what Dweck calls a "growth mindset." They learn that their effort is what led to their success, and if they continue to try, over time they'll improve and achieve more things. These kids end up taking on tougher things, and feel better about themselves. "Emphasizing effort gives a child a variable that they can control," Dweck has explained.`,choices:[`The Downside of "Trying Hard": When Effort Becomes a Burden`,`Fixed Mindset: The Power of Knowing Your Natural Talents`,`How to Identify Naturally Gifted Children`,`Making Whales Dance: The Beauty of Praise`,`Beyond "Smart": Developing Growth Through Effort-Based Praise`],ans:5},
  {no:77,school:`원묵고 - 서울시`,pref:`38`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`To monitor our surroundings is to focus on what's outside of ourselves: what we see, hear, smell, feel, and perhaps even taste. But sometimes ⓐwhat really marks a place is something less specific – a feeling within us. An interesting example emerged from a study of subway passenger behavior. Researchers trying to understand ⓑ why people sit where they sit or stand where they stand in subway and metro trains examined the factors that shape ⓒhow riders used and navigated that space in different situations. One of their findings involved ⓓwhere many riders like to plant themselves close to the train's doors. Partly this was the obvious convenience of being able to exit more quickly. But it was shaped partly by a more abstract sensation – the desire to avoid the sometimes uncomfortable feeling ⓔthat occurs when one accidentally makes eye contact with seated passengers. We can't see feelings – but they're very real, and they influence our experience of the world.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:4},
  {no:78,school:`서울대학교사범대학부설고 - 서울시`,pref:`38`,type:`빈칸 추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`To monitor our surroundings is to focus on what's outside of ourselves: what we see, hear, smell, feel, and perhaps even taste. But sometimes what really marks a place is something less specific ─ a feeling within us. An interesting example emerged from a study of subway passenger behavior. Researchers trying to understand why people sit where they sit or stand where they stand in subway and metro trains examined the factors that shape the way riders used and navigated that space in different situations. One of their findings involved the reasons many riders like to plant themselves close to the train's doors. Partly this was the obvious convenience of being able to exit more quickly. But it was shaped partly by a more abstract sensation ─ the desire to avoid the sometimes uncomfortable feeling of accidentally making eye contact with seated passengers. We can't see feelings ─ but they're very real, and they influence our experience of the world. - 2 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 ↓ Subway passengers' preference for standing near the doors is influenced not only by the (A)__________ of exiting quickly but also by an emotional desire to avoid eye contact. This illustrates how our (B)__________ of space is shaped by both external stimuli and internal feelings. (A) (B)`,choices:[`convenience perception`,`difficulty interpretation`,`convenience imagination`,`difficulty protection`,`habit reaction`],ans:1},
  {no:79,school:`심인고 - 대구시`,pref:`38`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`To monitor our surroundings is to focus on what's outside of ourselves: what we see, hear, smell, feel, and perhaps even taste. But sometimes what really marks a place is something less specific – a feeling within us. An interesting example emerged from a study of subway passenger behavior. Researchers trying to understand why people sit where they sit or stand where they stand in subway and metro trains examined the factors that shape the way riders used and navigated that space in different situations. One of their findings involved the reasons many riders like to plant themselves close to the train's doors. But it was shaped partly by a more abstract sensation – the desire to avoid the sometimes uncomfortable feeling of accidentally making eye contact with seated passengers. We can't see feelings – but they're very real, and they influence our experience of the world.`,choices:[`Why Personal Space Matters More in Crowded Places`,`The Power of Invisible Emotions in Shaping Our Behavior`,`The Science Behind Efficient Subway System Management`,`How Physical Design Affects Public Transportation Systems`,`Understanding Passenger Safety in Urban Transit Networks`],ans:2},
  {no:80,school:`봉명고 - 청주시`,pref:`38`,type:`빈칸 추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`To monitor our surroundings is to focus on what's outside of ourselves: what we see, hear, smell, feel, and perhaps even taste. But sometimes what really marks a place is something less specific – [_____________________ ______________________]. An interesting example emerged from a study of subway passenger behavior. Researchers trying to understand why people sit where they sit or stand where they stand in subway and metro trains examined the factors that shape the way riders used and navigated that space in different situations. One of their findings involved the reasons many riders like to plant themselves close to the train's doors. Partly this was the obvious convenience of being able to exit more quickly. But it was shaped partly by a more abstract sensation – the desire to avoid the sometimes uncomfortable feeling of accidentally making eye contact with seated passengers. We can't see feelings – but they're very real, and they influence our experience of the world.`,choices:[`a feeling within us`,`observation and deliberation`,`an innate talent granted to us`,`learnt misconception about hierarchy`,`early educational effects on personality`],ans:1},
  {no:81,school:`신흥고 - 청주시`,pref:`38`,type:`빈칸 추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 할 때, 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`To monitor our surroundings is to focus on what's outside of ourselves: what we see, hear, smell, feel, and perhaps even taste. But sometimes what really marks a place is something less specific – a feeling within us. An interesting example emerged from a study of subway passenger behavior. Researchers trying to understand why people sit where they sit or stand where they stand in subway and metro trains examined the factors that shape the way riders used and navigated that space in different situations. One of their findings involved the reasons many riders like to plant themselves close to the train's doors. Partly this was the obvious convenience of being able to exit more quickly. But it was shaped partly by a more abstract sensation – the desire to avoid the sometimes uncomfortable feeling of accidentally making eye contact with seated passengers. We can't see feelings – but they're very real, and they influence our experience of the world. - 2 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 ↓ How we connect to (A)____________ depends not only on what's around us but also on quiet (B)____________ within. (A) (B)`,choices:[`people reasons`,`space conscience`,`desire ethic`,`space emotions`,`people problems`],ans:4},
  {no:82,school:`영남고 - 대구시`,pref:`38`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`To monitor our surroundings is to focus on what's outside of ourselves: what we see, hear, smell, feel, and perhaps even taste. But sometimes what really marks a place is something less specific – a feeling within us. An interesting example emerged from a study of subway passenger behavior. Researchers trying to understand why people sit where they sit or stand where they stand in subway and metro trains examined the factors that shape the way riders used and navigated that space in different situations. One of their findings involved the reasons many riders like to plant themselves close to the train's doors. Partly this was the obvious convenience of being able to exit more quickly. But it was shaped partly by a more abstract sensation – the desire to avoid the sometimes uncomfortable feeling of accidentally making eye contact with seated passengers. We can't see feelings – but they're very real, and they influence our experience of the world.`,choices:[`How People Strategically Move Through Subway Spaces`,`The Role of Technology in Shaping Urban Travel Habits`,`The Reasons We Seek Personal Space in Crowded Environments`,`Beyond Senses: The Power of Inner Feelings on Spatial Behavior`,`Why We Choose Certain Seats: Unwritten Rules of Public Space Use`],ans:4},
  {no:83,school:`호산고 - 대구시`,pref:`39`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`We have a 'diving reflex', like other marine mammals. This means that special nerve endings on our faces, around the mouth and nose, trigger this reflex only when the facial region goes under the water. (A) It automatically closes down the airway, reducing the risk of swallowing water, and it narrows the small air-passages in the lungs. At the same time the heart rate is slowed down to half speed and blood is shunted to the vital organs, protecting them from the effects of the brief stop in breathing. (B) If we are in the water, with our head out in the air, there is no diving reflex. But if we sink just our face in a bowl of water, while the whole of the rest of our body in the dry air, the diving reflex is triggered. (C) By contrast, if a chimpanzee or a gorilla found itself in water with its face below the surface, it would panic, its heart would race and it would quickly drown. This striking difference highlights how humans have evolved unique adaptations for a short time under water.`,choices:[`(A) – (C) – (B)`,`(B) – (A) – (C)`,`(B) – (C) – (A)`,`(C) – (A) – (B)`,`(C) – (B) – (A)`],ans:2},

  {no:88,school:``,pref:`39`,type:`제목`,stem:`윗글의 제목으로 가장 적절한 것은?`,body:`We have a 'diving reflex', like other marine mammals. This means that special nerve endings on our faces, around the mouth and nose, ⓐtrigger this reflex only when the facial region goes under water. If we are in the water, with our head out in the air, there is ⓑno diving reflex. But if we sink just our face in a bowl of water, while the whole of the rest of our body is in the dry air, the diving reflex is triggered. It automatically closes down the airway, ⓒreducing the risk of swallowing water, and it narrows the small air-passages in the lungs. At the same time the heart rate is slowed down to half speed and blood is shunted to the vital organs, ⓓprotecting them from the effects of the brief stop in breathing. By contrast, if a chimpanzee or a gorilla found itself in water with its face below the surface, it would panic, its heart would ⓔ slow and it would quickly drown.`,choices:[`How Breathing Works During Exercise`,`Facial Nerves and Emotional Expression`,`Comparing Land and Sea Mammal Diets`,`Survival Mechanisms Triggered by Face-in-Water`,`The Role of Facial Skin in Temperature Regulation`],ans:4},

  {no:90,school:`호산고 - 대구시`,pref:`40`,type:`기타`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`This usually works out fine. There is a natural assumption of truth, or a truth bias when humans communicate with one another. In other words, when we're listening to others or reading their words, our automatic assumption is that the other person is telling the truth. (A) If you ask someone where the restroom is located or if it's raining outside, you can safely assume that most people will not lie in their responses. (B) Imagine how difficult it would be to converse with someone if you assumed that everything they were telling you was false! (C) Indeed, questioning the truth of a statement and then choosing not to believe it requires additional mental steps. (D) For the most part, humans are "cognitive misers," which means we typically don't expend more mental effort than seems necessary in a given situation. (E) It makes sense then, that when we see something online, even if it is fake, our default is to believe it, at least at first.`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:1},
  {no:92,school:`문수고 - 울산시`,pref:`40`,type:`기타`,stem:`다음 글의 내용으로 보아 밑줄 친 (A)의 이유를 가장 잘 설명한 것은?`,body:`There is a natural assumption of truth, or a truth bias when humans communicate with one another. In other words, when we're listening to others or reading their words, our automatic assumption is that the other person is telling the truth. This usually works out fine. If you ask someone where the restroom is located or if it's raining outside, you can safely assume that most people will not lie in their responses. Imagine how difficult it would be to converse with someone if you assumed that everything they were telling you was false! Indeed, questioning the truth of a statement and then choosing not to believe it requires additional mental steps. For the most part, humans are "cognitive misers," which means we typically don't expend more mental effort than seems necessary in a given situation. It makes sense then, that (A)[when we see something online, even if it is fake, our default is to believe it, at least at first].`,choices:[`People are naturally suspicious of what they read online.`,`Fake information online is usually very convincing.`,`Questioning information is automatic and effortless.`,`People tend to doubt until they see something with their own eyes.`,`People, by nature, assume information is true for cognitive ease.`],ans:5},
  {no:93,school:`청주고 – 청주시`,pref:`40`,type:`어법`,stem:`다음 밑줄 친 ⓐ~ⓔ, 중 어법상 쓰임이 다른 하나 는?`,body:`There is a natural assumption of truth, or a truth bias when humans communicate with one another. In other words, when we're listening to others or reading their words, our automatic assumption is ⓐthat the other person is telling the truth. This usually works out fine. If you ask someone where the restroom is located or if it's raining outside, you can safely assume ⓑthat most people will not lie in their responses. Imagine how difficult it would be to converse with someone if you believed ⓒthat everything they were telling you was false! Indeed, questioning the truth of a statement and then choosing not to believe it requires additional mental steps. For the most part, humans are 'cognitive misers,' a concept ⓓthat explains why we usually avoid spending more mental effort than required. It makes sense then, ⓔthat when we see something online, even if it is fake, our default is to believe it, at least at first.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:4},
  {no:94,school:`서울대학교사범대학부설고 - 서울시`,pref:`40`,type:`빈칸 추론`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`There is a natural assumption of truth, or a truth bias when humans communicate with one another. In other words, when we're listening to others or reading their words, our automatic assumption is that the other person is telling the truth. This usually works out fine. If you ask someone where the restroom is located or if it's raining outside, you can safely assume that most people will not lie in their responses. Imagine how difficult it would be to converse with someone if you assumed that everything they were telling you was false! Indeed, questioning the truth of a statement and then choosing not to believe it requires additional mental steps. For the most part, humans are "cognitive misers," which means we typically don't expend more mental effort than seems necessary in a given situation. It makes sense then, that when we see something online, even if it is fake, [__________________], at least at first.`,choices:[`our default is to believe it`,`our reaction is to criticize it`,`our habit is to reject it`,`our tendency is to doubt it`,`our instinct is to question it`],ans:1},

  {no:96,school:`불당고 – 천안시`,pref:`40`,type:`빈칸 추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`There is a natural assumption of truth, or a truth bias when humans communicate with one another. In other words, when we're listening to others or reading their words, our automatic assumption is that [___________________ ____________________]. This usually works out fine. If you ask someone where the restroom is located or if it's raining outside, you can safely assume that most people will not lie in their responses. Imagine how difficult it would be to converse with someone if you assumed that everything they were telling you was false! Indeed, questioning the truth of a statement and then choosing not to believe it requires additional mental steps. For the most part, humans are "cognitive misers," which means we typically don't expend more mental effort than seems necessary in a given situation. It makes sense then, that when we see something online, even if it is fake, our default is to believe it, at least at first.`,choices:[`the other is telling the truth`,`their information can be wrong`,`their understandings don't exceed ours`,`their words accurately reflect what we think`,`they share the message that expands our thoughts`],ans:1},
  {no:97,school:`부용고 - 의정부시`,pref:`41-42`,type:`빈칸 추론`,stem:`다음 글의 내용을 요약하고자 한다. 빈칸 (A), (B)에 들 어갈 말로 가장 적절한 것은?`,body:`Paying with plastic fundamentally changes the way we spend money, altering the calculus of our financial decisions. When you buy something with cash, the purchase involves an actual loss─your wallet is literally lighter. Credit cards, however, make the purchase abstract, so that you don't really feel the downside of spending money. Brain-imaging experiments suggest that paying with credit cards actually reduces activity in the insula, a brain region associated with negative feelings. As George Loewenstein, a neuroeconomist at Carnegie Mellon, says, "The nature of credit cards ensures that your brain is anesthetized against the pain of payment." Spending money doesn't feel bad, so you spend more money. Consider this experiment: Drazen Prelec and Duncan Simester, two business professors at MIT, organized a real-life, sealed-bid auction for tickets to a Boston Celtics game. Half the participants in the auction were informed that they had to pay with cash; the other half were told they had to pay with credit cards. Prelec and Simester then averaged the bids for the two different groups. It turns out that the average credit card bid was twice as high as the average cash bid. When people used their credit cards, their bids were much more reckless. They no longer felt the need to limit their expenses. ↓ Credit cards (A)___________ the pain of spending, leading people to (B)___________ more money than they would with cash. (A) (B)`,choices:[`reduce store`,`intensify keep`,`intensify spend`,`diminish save`,`diminish waste`],ans:5},
  {no:98,school:`서울대학교사범대학부설고 - 서울시`,pref:`41-42`,type:`내용일치`,stem:`다음 글의 내용과 일치하지 않는 것은?`,body:`Paying with plastic fundamentally changes the way we spend money, altering the calculus of our financial decisions. When you buy something with cash, the purchase involves an actual loss ─ your wallet is literally lighter. Credit cards, however, make the purchase abstract, so that you don't really feel the downside of spending money. Brain-imaging experiments suggest that paying with credit cards actually reduces activity in the insula, a brain region associated with negative feelings. As George Loewenstein, a neuroeconomist at Carnegie Mellon, says, "The nature of credit cards ensures that your brain is anesthetized against the pain of payment." Spending money doesn't feel bad, so you spend more money. Consider this experiment: Drazen Prelec and Duncan Simester, two business professors at MIT, organized a real-life, sealed-bid auction for tickets to a Boston Celtics game. Half the participants in the auction were informed that they had to pay with cash; the other half were told they had to pay with credit cards. Prelec and Simester then averaged the bids for the two different groups. It turns out that the average credit card bid was twice as high as the average cash bid. When people used their credit cards, their bids were much more careless. They no longer felt the need to limit their expenses.`,choices:[`현금을 사용할 때는 실제적인 손실이 생긴다.`,`뇌섬엽은 긍정적인 보상을 처리하는 뇌 영역으로, 신용 카드 사용 시 활발해진다.`,`신용카드는 지불에 따르는 고통을 무디게 하여 소비를 더 많이 하게 만든다.`,`Drazen Prelec과 Duncan Simester는 실제 경매 상황을 통해 소비자 행동을 실험했다.`,`실험에서 신용카드로 입찰한 사람들은 현금으로 입찰한 집단보다 평균적으로 두 배 높은 금액을 제시했다.`],ans:2},
  {no:99,school:``,pref:`43-45`,type:`심경/감정`,stem:`윗글의 Dana의 감정 변화로 가장 적절한 것은?`,body:`The sun shone in the cloudless sky as Becky, a retired teacher, walked to the fruit market. Across town, Dana was riding a bus towards the museum for a job interview. Just before reaching her stop, Dana noticed the sky had suddenly darkened. Her heart sank – she had no umbrella. As she stepped off the bus next to the market, where Becky had just finished shopping, raindrops began to fall. Dana felt panic. She didn't want to show up to her interview soaked. She looked around but couldn't find any stores nearby to buy an umbrella, and she didn't have time to search around. Just then, Becky approached her, holding an open umbrella in one hand and a closed one in the other. "Take this," she said with a smile. Dana's eyes widened. "Are you sure?" Becky nodded. "I always carry an extra on rainy days." Dana thanked her, took the umbrella, and opened it. She saw a small card tied to the handle. It read: "Cover each other." She was touched by the message. She hurried to the museum, arriving dry and comfortable, and performed well in her interview. The Museum CEO was impressed by Dana and offered her the Event Manager position, her dream job. Throughout the years ahead, she often thought back to Becky's kind gesture. Inspired by the memory, Dana created a museum event called "Cover Each Other" with paintings of people supporting others. She donated half of the money from ticket sales to families who lost their homes to natural disasters. Dana kept Becky's message framed in her office as a reminder that one kind gesture could change someone's life. The kindness of one stranger had shaped her path, and she made sure it continued to shape the world.`,choices:[`Joy → Confusion → Sadness → Anger`,`Excitement → Worry → Gratitude → Fulfillment`,`Nervousness → Satisfaction → Surprise → Reluctance`,`Expectation → Anger → Doubt → Indifference`,`Annoyance → Indifference → Sympathy → Joy`],ans:2},
  {no:100,school:``,pref:`43-45`,type:`주제`,stem:`윗글의 주제를 가장 잘 나타낸 것은?`,body:`The sun shone in the cloudless sky as Becky, a retired teacher, walked to the fruit market. Across town, Dana was riding a bus towards the museum for a job interview. Just before reaching her stop, Dana noticed the sky had suddenly darkened. Her heart sank – she had no umbrella. As she stepped off the bus next to the market, where Becky had just finished shopping, raindrops began to fall. Dana felt panic. She didn't want to show up to her interview soaked. She looked around but couldn't find any stores nearby to buy an umbrella, and she didn't have time to search around. Just then, Becky approached her, holding an open umbrella in one hand and a closed one in the other. "Take this," she said with a smile. Dana's eyes widened. "Are you sure?" Becky nodded. "I always carry an extra on rainy days." Dana thanked her, took the umbrella, and opened it. She saw a small card tied to the handle. It read: "Cover each other." She was touched by the message. She hurried to the museum, arriving dry and comfortable, and performed well in her interview. The Museum CEO was impressed by Dana and offered her the Event Manager position, her dream job. Throughout the years ahead, she often thought back to Becky's kind gesture. Inspired by the memory, Dana created a museum event called "Cover Each Other" with paintings of people supporting others. She donated half of the money from ticket sales to families who lost their homes to natural disasters. Dana kept Becky's message framed in her office as a reminder that one kind gesture could change someone's life. The kindness of one stranger had shaped her path, and she made sure it continued to shape the world.`,choices:[`We should develop independence without relying on others.`,`Opportunities in life come only to those who are prepared.`,`Time management is a key factor for a successful future.`,`A small act of kindness has the power to change someone's life.`,`W const _DAY_KEY=(function(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();

}

}

function refInRange(ref, mode){
  if(mode==='all') return true;
  if(mode==='long') return ref.includes('-');
  if(mode==='21-24'){const n=parseInt(ref);return n>=21&&n<=24;}
  if(mode==='29-40'){const n=parseInt(ref);return n>=29&&n<=40;}
  return true;
}

function renderPassageGrid(){

  grid.innerHTML='';
  PASSAGE_ORDER.forEach(ref=>{
    if(!refInRange(ref, filterMode)) return;
    if(!PASSAGES_BY_REF[ref]) return;
    const count = PASSAGES_BY_REF[ref].length;
    const d = document.createElement('div');
    d.className='p-card'+(selectedRefs.has(ref)?' sel':'')+(doneRefs.has(ref)?' done':'');
    d.onclick=()=>togglePassage(ref, d);
    d.innerHTML=`<div class="p-no">${ref}번</div><div class="p-count">${count}문제</div>`
      +(doneRefs.has(ref)?'<span class="p-badge done-badge">완료✓</span>':'')
      +(selectedRefs.has(ref)&&!doneRefs.has(ref)?'<span class="p-badge" style="background:#e3f2fd;color:#1565c0;">선택</span>':'');
    grid.appendChild(d);
  });
}

function togglePassage(ref, el){
  if(selectedRefs.has(ref)){selectedRefs.delete(ref);el.classList.remove('sel');}
  else{selectedRefs.add(ref);el.classList.add('sel');}
  renderPassageGrid();
}

function filterPassage(mode, btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPassageGrid();
}

function selectAll(){
  const visible = PASSAGE_ORDER.filter(r=>refInRange(r, filterMode) && PASSAGES_BY_REF[r]);
  const allSel = visible.every(r=>selectedRefs.has(r));
  visible.forEach(r=>{ if(allSel) selectedRefs.delete(r); else selectedRefs.add(r); });
  renderPassageGrid();
}

function startQuiz(){
  if(selectedRefs.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  qs=[];
  PASSAGE_ORDER.forEach(ref=>{
    if(selectedRefs.has(ref) && PASSAGES_BY_REF[ref]){
      PASSAGES_BY_REF[ref].forEach(q=>qs.push(q));
    }
  });
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · '+selectedRefs.size+'개 지문 · '+qs.length+'문제';
  showQ();
}

// ── QUIZ ──────────────────────────────────────────
function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');

  const choiceHTML = q.choices.map((c,i)=>{
    return `<button class="cb" data-idx="${i+1}"><span class="cn">${i+1}</span><span>${escHTML(c)}</span></button>`;
  }).join('');

  const schoolBadge = q.school ? `<span class="qsrc">${escHTML(q.school)}</span>` : '';
  const typeBadge = q.type ? `<span class="qtype">${escHTML(q.type)}</span>` : '';

  area.innerHTML=`
    <div class="qc">
      <div class="q-no-badge">
        <span class="qno">문제 ${q.no}번</span>
        ${typeBadge}
        <span class="passage-tag">지문 ${q.pref}번</span>
        ${schoolBadge}
      </div>
      <div class="passage-box">${escHTML(q.body)}</div>
      <div class="q-prompt">❓ ${escHTML(q.stem)}</div>
      <div class="choices" id="qChoices">${choiceHTML}</div>
      <div class="fb-msg" id="fb"></div>
    </div>`;

  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click',()=>selChoice(b, parseInt(b.dataset.idx), q.ans));
  });
}

function selChoice(btn, sel, ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const q=qs[idx];
  if(sel===ans){
    btn.classList.add('correct');
    fb.className='fb-msg ok';fb.textContent='✅ 정답!';
    cor++;
    allResults.push({no:q.no, pref:q.pref, type:q.type, correct:true, my:sel, ans:ans});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.cb').forEach(b=>{if(parseInt(b.dataset.idx)===ans)b.classList.add('reveal');});
    fb.className='fb-msg no';fb.textContent='❌ 내 답: '+sel+'번 — '+q.choices[sel-1]+' / 정답: '+ans+'번 — '+q.choices[ans-1];
    wrn++;
    wrongs.push({label:'문제 '+q.no+'번 ['+q.type+']', my:sel+'번', correct:ans+'번', body:q.choices[ans-1]});
    allResults.push({no:q.no, pref:q.pref, type:q.type, correct:false, my:sel, ans:ans});
  }
  setTimeout(()=>{idx++;showQ();},sel===ans?900:2200);
}

// ── RESULT ─────────────────────────────────────────
let wrongQs = [];

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selectedRefs.forEach(r=>doneRefs.add(r));
  _saveProg();
  // build wrongQs
  const wrongNos = new Set();
  allResults.forEach(r=>{if(!r.correct)wrongNos.add(r.no);});
  wrongQs = qs.filter(q=>wrongNos.has(q.no));

  const wHTML=wrongs.length>0
    ?'<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.label+'</div><div class="wid">내 답: '+w.my+' → 정답: '+w.correct+'</div></div>').join('')+'</div>'
    :'<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고1 25년 6월 총괄 · ${selectedRefs.size}개 지문 · ${total}문제</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave) window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: userName,
    school: userSchool,
    score: pct,
    correct: cor,
    wrong: wrn,
    total: total,
    elapsedMin: el,
    quizType: '고1_25년6월_총괄_학교기출100제',
    passages: [...selectedRefs].sort(),
    details: allResults.map(r=>({
      문제: r.no+'번',
      지문: r.pref+'번',
      유형: r.type,
      결과: r.correct ? '✅정답' : '❌오답',
      내답: r.my+'번',
      정답: r.ans+'번'
    })),
    wrongList: wrongs.map(w=>({label:w.label, my:w.my, correct:w.correct}))
  });
}

function retryWrongs(){
  if(wrongQs.length===0) return;
  qs=[...wrongQs];
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · 오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selectedRefs.clear();
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

window.addEventListener('DOMContentLoaded',()=>{
  const n=localStorage.getItem('bomnal_name');
  const s=localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value=n;
  if(s){
    const sel=document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value&&s.includes(sel.options[i].value)){sel.value=sel.options[i].value;break;}
    }
  }
  _cleanupOldProgress();
  _loadProg();
});
</script>
</body>
</html>
