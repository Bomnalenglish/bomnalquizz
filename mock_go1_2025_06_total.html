<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
:root{--pri:#1565c0;--acc:#f57f17;--bg:#e3f2fd;--card:#fff;--bdr:#90caf9;--muted:#757575;--green:#2e7d32;--red:#c62828;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;color:#1a1a2e;}
.hidden{display:none!important;}

/* START */
#startScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.s-card{background:var(--card);border-radius:24px;padding:36px 28px;text-align:center;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(21,101,192,.15);}

/* PASSAGE SELECT */
#passageScreen{padding:20px;max-width:680px;margin:0 auto;}
.ps-header{background:linear-gradient(135deg,#1565c0,#1976d2);color:white;border-radius:16px;padding:18px 22px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.ps-title{font-family:'Black Han Sans',sans-serif;font-size:16px;}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.fb{padding:7px 16px;border:2px solid var(--pri);border-radius:20px;background:white;color:var(--pri);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.fb.on{background:var(--pri);color:white;}
.passage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:20px;}
.p-card{background:white;border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;border:2.5px solid #e0e0e0;transition:all .18s;position:relative;}
.p-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 6px 18px rgba(21,101,192,.12);}

.p-badge{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;}

.sel-all-btn{width:100%;padding:12px;border-radius:12px;border:2px solid var(--pri);background:white;color:var(--pri);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.go-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1565c0,#f57f17);color:white;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* QUIZ HEADER */

.ht{font-family:'Black Han Sans',sans-serif;font-size:15px;}
.hs{font-size:10px;opacity:.7;margin-top:2px;}
.hb{background:rgba(255,255,255,.2);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:700;}
.pw{height:4px;background:#bbdefb;}.pf{height:100%;background:linear-gradient(90deg,#1565c0,#f57f17);transition:width .4s;}

/* QUIZ AREA */
#quizArea{padding:20px;max-width:720px;margin:0 auto;}
.qc{background:white;border-radius:18px;padding:22px 20px;margin-bottom:16px;box-shadow:0 3px 16px rgba(21,101,192,.08);}
.q-no-badge{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.qno{font-family:'Black Han Sans',sans-serif;font-size:13px;color:white;background:var(--pri);padding:3px 12px;border-radius:12px;}
.qtype{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;background:#fff3e0;color:#e65100;}

.passage-box{background:#f8faff;border-left:4px solid var(--pri);border-radius:0 10px 10px 0;padding:14px 16px;font-size:13px;line-height:1.85;margin-bottom:14px;color:#1a237e;white-space:pre-wrap;}
.q-prompt{font-size:13px;font-weight:700;color:#1565c0;margin-bottom:10px;padding:8px 12px;background:#e3f2fd;border-radius:8px;}
.choices{display:grid;gap:8px;}
.cb{background:#f5f5f5;border:2px solid #e0e0e0;border-radius:11px;padding:12px 15px;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:flex-start;gap:10px;line-height:1.5;}
.cb:hover:not(:disabled){border-color:var(--pri);background:#e3f2fd;}
.cb.correct{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;}
.cb.wrong{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.cb.reveal{background:#e8f5e9;border-color:#2e7d32;}
.cn{width:24px;height:24px;border-radius:50%;background:#90caf9;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.fb-msg{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:800;margin-top:10px;display:none;}
.fb-msg.ok{background:#e8f5e9;color:#1b5e20;display:block;}
.fb-msg.no{background:#ffebee;color:#b71c1c;display:block;}

/* RESULT */

.rc{background:white;border-radius:24px;padding:30px 22px;box-shadow:0 8px 32px rgba(21,101,192,.1);text-align:center;}
.rs{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--pri);line-height:1;}
.rsub{font-size:13px;color:var(--muted);margin-top:4px;}
.sr{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap;}
.si{text-align:center;}.sn{font-family:'Black Han Sans',sans-serif;font-size:24px;}.sl{font-size:11px;color:var(--muted);margin-top:2px;}
.wl{background:var(--bg);border-radius:14px;padding:14px;text-align:left;margin-top:14px;max-height:300px;overflow-y:auto;}
.wl h3{font-size:12px;font-weight:800;color:var(--red);margin-bottom:8px;}
.wi{background:white;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:11px;border-left:3px solid #e91e63;}
.wie{font-weight:800;color:var(--pri);}.wid{font-size:10px;color:var(--muted);margin-top:2px;}
.rbtns{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.rbtn{padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.rbtn-p{background:linear-gradient(135deg,#1565c0,#f57f17);color:white;}
.rbtn-s{background:#f5f5f5;color:#1565c0;border:2px solid #90caf9;}

<script>
// ── DATA ──────────────────────────────────────────
const QUESTIONS = [
  {no:3,school:`여양고 - 여수시`,pref:`21`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`It is common sense that people's inner beliefs may drive their external behavior. If you're attracted to a certain person, you should be more likely to socialize with that person. If you favor a brand of toothpaste, you're more likely to buy it. Of course, our internal thoughts don't always predict our public behavior, but, overall, what we do obviously reflects what we think. But beliefs and behaviors are also related in a more remarkable way. It turns out that the arrow is as likely to point in the reverse direction. As social psychologist David Myers observes, "If social psychology has taught us anything during the last 25 years, it is that we are likely not only to think ourselves into a way of acting but also to act ourselves into a way of thinking.`,choices:[`내면의 믿음과 외면의 행동은 서로 독립적으로 작용한 다.`,`행동은 생각을 반영할 뿐만 아니라, 행동이 생각을 형성 할 수도 있다.`,`자신의 생각을 행동으로 옮길 때, 사회적 기준에 따라 행동이 왜곡될 수 있다.`,`어떤 행동이 반복되면 그 행동이 자동화되어 생각과는 무관하게 나타난다.`,`사람의 행동은 오직 내면의 신념과 감정에 의해 결정된 다는 것이 사회심리학의 핵심이다.`],ans:2},
  {no:4,school:`심인고 - 대구시`,pref:`21`,type:`함축적 의미`,stem:`다음 글의 [밑줄 친 문장]의 의미를 가장 잘 보여주는 상 황으로 가장 적절한 것은?`,body:`It is common sense that people's inner beliefs may drive their external behavior. If you're attracted to a certain person, you should be more likely to socialize with that person. If you favor a brand of toothpaste, you're more likely to buy it. Of course, our internal thoughts don't always predict our public behavior, but, overall, what we do obviously reflects what we think. But beliefs and behaviors are also related in a more remarkable way. It turns out that the arrow is as likely to point in the reverse direction. As social psychologist David Myers observes, "If social psychology has taught us anything during the last 25 years, it is that we are likely not only to think ourselves into a way of acting [but also to act ourselves into a way of thinking]."`,choices:[`She recycles often but doesn't think it helps.`,`He eats junk food though he wants to stay fit.`,`She saves water because she cares about nature.`,`He joined a club and began to value teamwork.`,`She supports fairness, so she treats everyone equally.`],ans:4},
  {no:5,school:`신흥고 - 청주시`,pref:`21`,type:`빈칸 추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 할 때, 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`It is common sense that people's inner beliefs may drive their external behavior. If you're attracted to a certain person, you should be more likely to socialize with that person. If you favor a brand of toothpaste, you're more likely to buy it. Of course, our internal thoughts don't always predict our public behavior, but, overall, what we do obviously reflects what we think. But beliefs and behaviors are also related in a more remarkable way. It turns out that the arrow is as likely to point in the reverse direction. As social psychologist David Myers observes, "If social psychology has taught us anything during the last 25 years, it is that we are likely not only to think ourselves into a way of acting but also to act ourselves into a way of thinking. - 2 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 ↓ While our behaviors usually reflect our (A)____________, research in social psychology reveals that we can also change the way we think through our (B)____________. (A) (B)`,choices:[`mind beliefs`,`favor relation`,`prediction behaviors`,`thoughts actions`,`observation psychology`],ans:4},
  {no:6,school:`청주고 – 청주시`,pref:`21`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`It is common sense that people's inner beliefs may drive their external behavior. (A) Of course, our internal thoughts don't predict our public behavior, but, overall, what we do obviously reflects what we think. But beliefs and behaviors are also related in a more remarkable way. (B) It turns out that the arrow is as likely to point in the reverse direction. As social psychologist David Myers observes, "If social psychology has taught us anything during the last 25 years, it is that we are likely not only to think ourselves into a way of acting but also to act ourselves into a way of thinking.“ (C) If you're attracted to a certain person, you should be more likely to socialize with that person. If you favor a brand of toothpaste, you're more likely to buy it.`,choices:[`(A) – (C) – (B)`,`(B) – (A) – (C)`,`(B) – (C) – (A)`,`(C) – (A) – (B)`,`(C) – (B) – (A)`],ans:4},
  {no:7,school:`호산고 - 대구시`,pref:`22`,type:`빈칸 추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`Imagine following the spirit of a silence vow into daily life. Challenge yourself to spend an entire day saying only what you absolutely must say. It's been widely observed by behavioral psychology experts ─ and anyone who's ever been on a first date ─ that we too often tend to treat "conversation" as a game of waiting for our own turn to speak. We miss what's being said because we're mentally rehearsing our next utterance. What if you could eliminate the idea that the next available minisilence is your next opening to express whatever is in your head? What if you were limited to, say, fifty spoken words tomorrow? I think you'd listen quite differently. You'd attend quite carefully to every word you heard. You'd be attuned to what you must respond to. In short, ___________________________________.`,choices:[`body language can aid in effective conversation`,`silence can hinder the efficiency of communication`,`speaking less allows you to listen attentively to others`,`reducing unnecessary conversations can decrease stress`,`practicing speaking is necessary for smooth conversation`],ans:3},
  {no:8,school:`심인고 - 대구시`,pref:`22`,type:`기타`,stem:`다음 글이 가장 도움이 될 상황에 있는 학생은?`,body:`Imagine following the spirit of a silence vow into daily life. Challenge yourself to spend an entire day saying only what you absolutely must say. It's been widely observed by behavioral psychology experts – and anyone who's ever been on a first date – that we too often tend to treat "conversation" as a game of waiting for our own turn to speak. We miss what's being said because we're mentally rehearsing our next utterance. What if you could eliminate the idea that the next available mini-silence is your next opening to express whatever is in your head? What if you were limited to, say, fifty spoken words tomorrow? I think you'd listen quite differently. You'd attend quite carefully to every word you heard. You'd be attuned to what you must respond to. You might discover that the less you say, the more you hear. - 3 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 A student who _________________________________________.`,choices:[`prefers texting over talking in real life`,`talks a lot in class but often misses what others say`,`believes speaking more can improve thinking skills`,`feels nervous whenever they have to speak in public`,`is trying to improve their public English speaking skills`],ans:2},
  {no:9,school:`불당고 – 천안시`,pref:`22`,type:`기타`,stem:`다음 글에서 밑줄 친 [Challenge yourself to spend an entire day saying only what you absolutely must say] 가 의미하는 바로 가장 적절한 것은?`,body:`Imagine following the spirit of a silence vow into daily life. [Challenge yourself to spend an entire day saying only what you absolutely must say]. It's been widely observed by behavioral psychology experts – and anyone who's ever been on a first date – that we too often tend to treat "conversation" as a game of waiting for our own turn to speak. We miss what's being said because we're mentally rehearsing our next utterance. What if you could eliminate the idea that the next available minisilence is your next opening to express whatever is in your head? What if you were limited to, say, fifty spoken words tomorrow? I think you'd listen quite differently. You'd attend quite carefully to every word you heard. You'd be attuned to what you must respond to. You might discover that as you say less, you can hear more.`,choices:[`The less you speak, the better you can deliver your message.`,`The more silent you are, the less you can miss what others speak.`,`The stronger topics you talk about, the more intense feeling you can lead to.`,`The faster you can get points of conversation, the better relationship you can make with others.`,`The quieter you are when having conversations with others, the worse your speech style becomes.`],ans:2},
  {no:10,school:`한국교원대학교부설고 – 청주시`,pref:`23`,type:`빈칸 추론`,stem:`다음 [빈칸]에 들어갈 말로 가장 적절한 것은?`,body:`Science is concerned with accumulating and understanding observations of the physical world. That understanding alone solves no problems. Individual people have to act on that understanding for it to help solve problems. For instance, science has found that regular exercise can lower your risk of heart disease. Knowing this fact is interesting, but it will do nothing for your personal health unless you act on it and actually exercise. And that's the hard part. Reading an article about exercise is easy. Getting into a [______________________________] is harder. In this sense, science really solves no problems at all. Problems are only solved when people take the knowledge provided by science and use it. In fact, many of humanity's biggest problems are caused by lack of action, and not lack of knowledge.`,choices:[`steady habit of physical activity`,`mindset of sustainable movement`,`balanced schedule of work and exercise`,`daily routine of meeting nutritional goals`,`fitness-related group discussion on social media`],ans:1},
  {no:12,school:``,pref:`23`,type:`어법`,stem:`윗글의 밑줄 친 ⓐ~ⓔ, 중 어법상 어색한 ?것은`,body:`Science is ⓐconcerned with accumulating and understanding observations of the physical world. That understanding alone solves no problems. Individual people have to act on that understanding for it to help ⓑsolve problems. For instance, science has found that regular exercise can ⓒlower your risk of heart disease. Knowing this fact is interesting, but it will do nothing for your personal health unless you act on it and actually exercise. And that's the hard part. Reading an article about exercise ⓓis easy. Getting into an actual routine of regular exercise is harder. In this sense, science really solves no problems at all. Problems are only ⓔsolving when people take the knowledge provided by science and use it. In fact, many of humanity's biggest problems are caused by lack of action, and not lack of knowledge.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:14,school:`봉명고 - 청주시`,pref:`24`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`We think we're being logical, objective, and rational – and therefore accurate in our analysis, judgment, and decisions. (A) When two nations play each other in the World Cup, the fans of each country criticize the referees for missing all the infractions that the other team commits. Without fail, each fan base believes that the referees are biased and against their team. (B) Everyone's desires and knowledge are different. You might think you're being realistic – that is, that your ideas match reality, but that's impossible. It's only your interpretation of reality, which will always be different from someone else's. (C) So we think that if other people are logical, objective, and rational, they will agree with us and see what we see. But the opposite is the case. Every human brain is different. Everyone's life experience is different.`,choices:[`(A) - (B) - (C)`,`(A) - (C) - (B)`,`(B) - (A) - (C)`,`(B) - (C) - (A)`,`(C) - (B) - (A)`],ans:5},
  {no:16,school:`심인고 - 대구시`,pref:`24`,type:`기타`,stem:`다음 글에서 필자가 주장하는 바로 가장 적절한 것 은?`,body:`We think we're being logical, objective, and rational – and therefore accurate in our analysis, judgment, and decisions. So we think that if other people are logical, objective, and rational, they will agree with us and see what we see. But the opposite is the case. Every human brain is different. Everyone's life experience is different. Everyone's desires and knowledge are different. You might think you're being realistic – that is, that your ideas match reality, but that's impossible. It's only your interpretation of reality, which will always be different from someone else's. When two nations play each other in the World Cup, the fans of each country criticize the referees for missing all the infractions that the other team commits. Without fail, each fan base believes that the referees are biased against their team. *infraction: 위반`,choices:[`논리적 사고를 통해 객관성을 확보하라.`,`현실에 대한 정확한 이해를 위해 학습하라.`,`타인과의 의견 차이를 줄이기 위해 노력하라.`,`자신의 판단이 주관적일 수 있음을 인정하라.`,`집단의 편견에서 벗어나 독립적으로 사고하라.`],ans:4},
  {no:17,school:`문수고 - 울산시`,pref:`29`,type:`어법`,stem:`다음 글의 밑줄 친 ⓐ~ⓔ에 대한 영영풀이로 어색한 것은?`,body:`Studies of experts provide insight into what it means to have deep and flexible understanding. Experts in a particular domain are people who have deep, richly interconnected ideas about the world. They are not just good thinkers or people who are exceptionally smart. Rather, experts have knowledge in a ⓐspecific domain - such as chess, chemistry, or tennis - and are not ⓑ generalists. However, experts do not just know "a bunch of facts." In fact, having ⓒexpertise in a topic means that knowledge is organized into ⓓcoherent frameworks, and the expert understands the interrelationship between facts and can distinguish which ideas are most central. This kind of deep but organized understanding allows for greater flexibility in learning and facilitates ⓔapplication across multiple contexts.`,choices:[`ⓐspecial or particular`,`ⓑa person who knows something about a lot of subjects`,`ⓒthe skill or knowledge an expert has`,`ⓓspread over a wide area in a scattered way`,`ⓔthe action of putting something into to use or into practice`],ans:4},
  {no:18,school:`여양고 - 여수시`,pref:`29`,type:`빈칸 추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 할 때, 빈칸 (A)~(C)에 들어갈 말로 가장 적절한 것은?`,body:`Studies of experts provide insight into what it means to have deep and flexible understanding. Experts in a particular domain are people who have deep, richly interconnected ideas about the world. They are not just good thinkers or people who are exceptionally smart. Rather, experts have knowledge in a specific domain – such as chess, chemistry, or tennis – and are not generalists. However, experts do not just know "a bunch of facts." In fact, having expertise in a topic means that knowledge is organized into coherent frameworks, and the expert understands the interrelationship between facts and can distinguish which ideas are most central. This kind of deep but organized understanding allows for greater flexibility in learning and facilitates across multiple contexts. - 6 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 ↓ An expert is not someone who knows the (A)___________ of knowledge, but someone who can organize (B)___________ in a particular field within a (C)___________ framework. (A) (B) (C)`,choices:[`connection specific relevant`,`connection interrelated general`,`fragments specific relevant`,`fragments interrelated consistent`,`fragments interrelated inconsistent`],ans:4},
  {no:19,school:`달서고 - 대구시`,pref:`29`,type:`주제`,stem:`다음 글의 주제로 가장 적절한 것은?`,body:`Studies of experts provide insight into what it means to have deep and flexible understanding. Experts in a particular domain are people who have deep, richly interconnected ideas about the world. They are not just good thinkers or people who are exceptionally smart. Rather, experts have knowledge in a specific domain ─ such as chess, chemistry, or tennis ─ and are not generalists. However, experts do not just know "a bunch of facts." In fact, having expertise in a topic means that knowledge is organized into coherent frameworks, and the expert understands the interrelationship between facts and can distinguish which ideas are most central. This kind of deep but organized understanding allows for greater flexibility in learning and facilitates application across multiple contexts.`,choices:[`전문가들은 일반인보다 더 많은 사실을 암기하고 있다.`,`전문성은 특정 분야에 대한 깊고 조직적인 이해를 의미 한다.`,`창의적인 사고는 다양한 분야를 넘나드는 지식으로부터 나온다.`,`전문가가 되기 위해서는 다양한 분야의 지식을 폭넓게 습득해야 한다.`,`전문가들은 항상 새로운 사실을 배우려는 태도와 마음가 짐을 가지고 있다.`],ans:2},
  {no:20,school:`한국교원대학교부설고 – 청주시`,pref:`30`,type:`주제`,stem:`다음 글의 주제로 가장 적절한 것은?`,body:`It is natural for people to observe happenings and then seek explanations for why those happenings occurred. But sometimes the reasoning is wrong because of one or more misconceptions. One of these is the ecological fallacy, where an argument claims that there is a causal relationship between two things merely because they occur together. For example, in the 1950s it was found that crime rates were the highest in neighborhoods where immigrants were most numerous. Some people used this "co-occurrence" to argue that immigrants were a cause of crime. But a careful analysis of this situation revealed that immigrants were forced to live in neighborhoods where crime rates were already high; they could not afford more expensive housing in safer neighborhoods. Immigrants themselves committed very few of the crimes. Unless you analyze the claim carefully, you would misinterpret the relationship and thereby construct a faulty belief.`,choices:[`the common reasoning error in interpreting data`,`the connection between housing prices and crime`,`the impact of immigrants on neighborhood safety`,`the explanation for immigrant-related crime patterns`,`the reason why people construct beliefs based on details`],ans:1},
  {no:21,school:`성주여고 - 성주군`,pref:`30`,type:`빈칸 추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 할 때, 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`It is natural for people to observe happenings and then seek explanations for why those happenings occurred. But sometimes the reasoning is wrong because of one or more misconceptions. One of these is the ecological fallacy, where an argument claims that there is a causal relationship between two things merely because they occur together. For example, in the 1950s it was found that crime rates were the highest in neighborhoods where immigrants were most numerous. Some people used this "co-occurrence" to argue that immigrants were a cause of crime. But a careful analysis of this situation revealed that immigrants were forced to live in neighborhoods where crime rates were already high; they could not afford more expensive housing in safer neighborhoods. Immigrants themselves committed very few of the crimes. Unless you analyze the claim carefully, you would misinterpret the relationship and thereby construct a faulty belief. - 7 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 ↓ (A)____________ like the ecological fallacy can lead to (B)____________ conclusions about events, such as wrongly linking high crime rates to immigrants. (A) (B)`,choices:[`Behaviors logical`,`Stereotypes acceptable`,`Misconceptions Incorrect`,`Observations accurate`,`Traditions objective`],ans:3},
  {no:22,school:`자운고 - 서울시`,pref:`30`,type:`빈칸 추론`,stem:`다음 [빈칸]에 들어갈 말로 가장 적절한 것은?`,body:`It is natural for people to observe events around them and try to understand why those events happen. Humans often look for reasons and patterns to make sense of the world. However, their reasoning can sometimes be incorrect because of certain misunderstandings. One common mistake is known as the ecological fallacy, This happens when someone believes there is a direct cause-and-effect relationship between two factors simply because they appear almost or completely simultaneously. For example, in the 1950s, researchers noticed that crime rates were highest in neighborhoods where many immigrants lived. Some people were too quick to assume that immigrants were responsible for the high crime rates. But a more careful and detailed study showed that the real reason was different. Immigrants were often poor and had no choice but to [_______________________________________]. In fact, the immigrants committed only a small number of the crimes. Without careful thinking and analysis, people may form wrong beliefs based on incorrect conclusions.`,choices:[`live in cheaper neighborhoods that already had high crime rates`,`commit crimes in order to pay for expensive housing in other neighborhoods`,`prove right the prevalent misconception regarding the link between immigrants and crime rates`,`maintain positive relationships within the community of immigrants`,`leave their hometown due to natural or man-made disasters`],ans:1},
  {no:23,school:`충북대학교사범대학부설고 - 청주시`,pref:`30`,type:`빈칸 추론`,stem:`다음 [빈칸]에 들어갈 말로 가장 적절한 것은?`,body:`It is natural for people to observe happenings and then seek explanations for why those happenings occurred. But sometimes the reasoning is wrong because of one or more misconceptions. One of these is the ecological fallacy, where an argument claims that there is a causal relationship between two things merely because they occur together. For example, in the 1950s it was found that crime rates were the highest in neighborhoods where immigrants were most numerous. Some people used this [______________] to argue that immigrants were a cause of crime. But a careful analysis of this situation revealed that immigrants were forced to live in neighborhoods where crime rates were already high; they could not afford more expensive housing in safer neighborhoods. Immigrants themselves committed very few of the crimes. Unless you analyze the claim carefully, you would misinterpret the relationship and thereby construct a faulty belief.`,choices:[`brutality`,`assumption`,`recurrence`,`coincidence`,`competition`],ans:4},
  {no:24,school:`원묵고 - 서울시`,pref:`30`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`It is natural for people to observe happenings and then seek explanations for why those happenings occurred. But sometimes the reasoning is wrong because of one or more misconceptions. (A) One of these is the ecological fallacy, where an argument claims that there is a causal relationship between two things merely because they occur together. For example, in the 1950s it was found that crime rates were the highest in neighborhoods where immigrants were most numerous. (B) In fact, they could not afford more expensive housing in safer neighborhoods. Immigrants themselves committed very few of the crimes. Unless you analyze the claim carefully, you would misinterpret the relationship and thereby construct a faulty belief. (C) Some people used this "co-occurrence" to argue that immigrants were a cause of crime. But a careful analysis of this situation revealed that immigrants were forced to live in neighborhoods where crime rates were already high.`,choices:[`(A) - (C) - (B)`,`(B) - (A) - (C)`,`(B) - (C) - (A)`,`(C) - (A) - (B)`,`(C) - (B) - (A)`],ans:1},
  {no:25,school:``,pref:`30`,type:`주제`,stem:`윗글의 주제로 가장 적절한 것은?`,body:`It is natural for people ⓐ[to observe] happenings and then seek explanations for why those happenings occurred. However, sometimes they make mistakes in their reasoning. One of these mistakes ⓑ[is] called the ecological fallacy. It is a well-known concept, ⓒ[in which] an argument claims that there is a causal relationship between two things merely because they occur together. For instance, imagine a study in the past ⓓ[had shown] that cities with more bicycle lanes also had higher accident rates. Even today, some people might argue that bike lanes cause accidents. But a deeper analysis might show that these cities already had high traffic volumes, ⓔ[that] led to both more accidents and the need for bike lanes. Such reasoning patterns, if left unchallenged, can last a long time and affect how we understand things today. If people (A)[다른 원인들을 더 신중하게 분석했더라면] back then, we (B)[그 인과 관계를 오해하지 않을 것이다] today. Failing to examine the claim closely could lead you to misinterpret the relationship and construct a faulty belief.`,choices:[`the risk of misjudging cause and effect relationships`,`problems that arise from population growth in cities`,`why people wrongly blame bike lanes for accidents`,`ways to recognize and prevent logical fallacies`,`how high traffic areas influence public safety`],ans:1},
  {no:27,school:``,pref:`30`,type:`어법`,stem:`윗글의 밑줄 친 부분 중, 어법상 옳지 않은 것은?`,body:`It is natural for people ⓐ[to observe] happenings and then seek explanations for why those happenings occurred. However, sometimes they make mistakes in their reasoning. One of these mistakes ⓑ[is] called the ecological fallacy. It is a well-known concept, ⓒ[in which] an argument claims that there is a causal relationship between two things merely because they occur together. For instance, imagine a study in the past ⓓ[had shown] that cities with more bicycle lanes also had higher accident rates. Even today, some people might argue that bike lanes cause accidents. But a deeper analysis might show that these cities already had high traffic volumes, ⓔ[that] led to both more accidents and the need for bike lanes. Such reasoning patterns, if left unchallenged, can last a long time and affect how we understand things today. If people (A)[다른 원인들을 더 신중하게 분석했더라면] back then, we (B)[그 인과 관계를 오해하지 않을 것이다] today. Failing to examine the claim closely could lead you to misinterpret the relationship and construct a faulty belief.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:28,school:`달서고 - 대구시`,pref:`30`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`It is natural for people to observe happenings and then seek explanations for why those happenings occurred. But sometimes the reasoning is wrong because of one or more misconceptions. One of these is the ecological fallacy, where an argument claims that there is a causal relationship between two things merely because they occur together. For example, in the 1950s it was found that crime rates were the highest in neighborhoods where immigrants were most numerous. Some people used this "co-occurrence" to argue that immigrants were a cause of crime. But a careful analysis of this situation revealed that immigrants were forced to live in neighborhoods where crime rates were already high; they could not afford more expensive housing in safer neighborhoods. Immigrants themselves committed very few of the crimes. Unless you analyze the claim carefully, you would misinterpret the relationship and thereby construct a faulty belief.`,choices:[`How to Collect Accurate Crime Statistics`,`The Role of Housing Costs in Urban Crime`,`Why Immigrants Are Often Blamed for Crime`,`The Importance of Reducing Crime in Poor Neighborhoods`,`Misinterpreting Correlation as Causation: The Ecological Fallacy`],ans:5},
  {no:29,school:`문수고 - 울산시`,pref:`30`,type:`빈칸 추론`,stem:`다음 글의 빈칸 (A)에 들어갈 말로 가장 적절한 것 은?`,body:`It is natural for people to observe happenings and then seek explanations for why those happenings occurred. But sometimes the reasoning is wrong because of one or more misconceptions. One of these is the ecological fallacy, where an argument claims that there is a causal relationship between two things only due to their (A)[____________________]. For example, in the 1950s it was found that crime rates were the highest in neighborhoods where immigrants were most numerous. Some people used this "co-occurrence" to argue that immigrants were a cause of crime. But a careful analysis of this situation revealed that immigrants were forced to live in neighborhoods where crime rates were already high; they could not afford more expensive housing in safer neighborhoods. Immigrants themselves committed very few of the crimes. Unless you analyze the claim carefully, you would misinterpret the relationship and thereby construct a faulty belief. - 9 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차`,choices:[`scientific proof`,`logical sequence`,`simultaneous occurrence`,`biases, ignoring other factors`,`living in the same neighborhood`],ans:3},
  {no:30,school:`세광고 - 청주시`,pref:`30`,type:`내용일치`,stem:`After reading this paragraph, which is the right example of the ecological fallacy?`,body:`It is natural for people to observe happenings and then seek explanations for why those happenings occurred. But sometimes the reasoning is wrong because of one or more misconceptions. One of these is the ecological fallacy, where an argument claims that there is a causal relationship between two things merely because they occur together in the same place. For example, in the 1950s it was found that crime rates were the highest in neighborhoods where immigrants were most numerous. Some people used this "co-occurrence" to argue that immigrants were a cause of crime. But a careful analysis of this situation revealed that immigrants were forced to live in neighborhoods where crime rates were already high; they could not afford more expensive housing in safer neighborhoods. Immigrants themselves committed very few of the crimes. Unless you analyze the claim carefully, you would misinterpret the relationship and thereby construct a faulty belief.`,choices:[`Person A and his friends are all good at math, so they feel confident in the subject.`,`Person B and his daughter both like sweet fruits, so they often eat them together.`,`Person C lives in a big city where most residents are highly educated, so he is assumed to be well-educated too.`,`Person D's family seems to live longer than average. His parents lived past 100. So people think longevity may run in his family.`,`Person E's grandmother had cancer, and his father has it too. So people believe there may be a genetic factor in their family.`],ans:3},
  {no:31,school:`부용고 - 의정부시`,pref:`31`,type:`글의 순서`,stem:`주어진 글에 이어질 글의 순서로 가장 적절한 것은?`,body:`In everyday life, we use previous experience to predict where we should pay attention Different environments create different expectations. This was profoundly illustrated by the scientist Jared Diamond in his book Guns, Germs, and Steel. (A) However, they are far from being stupid. They can detect the most subtle changes in the jungle, good for following the tracks of a predator or for finding the way back home. They know which insects to leave alone, know where food exists, can build and tear down shelters with ease. (B) He describes an adventure wandering through the New Guinea jungle with native New Guineans. He relates that these natives tend to perform poorly at tasks Westerners have been trained to do since childhood. (C) Diamond, who had never spent time in such places, has no ability to pay attention to these things. Were he to be tested on such tasks, he also would perform poorly.`,choices:[`(A) – (C) – (B)`,`(B) – (A) – (C)`,`(B) – (C) – (A)`,`(C) – (A) – (B)`,`(C) – (B) – (A)`],ans:2},
  {no:33,school:`신흥고 - 청주시`,pref:`31`,type:`기타`,stem:`다음 글에서 필자가 주장하는 바로 가장 적절한 것 은?`,body:`In everyday life, we use previous experience to predict where we should pay attention. Different environments create different expectations. This was profoundly illustrated by the scientist Jared Diamond in his book Guns, Germs, and Steel. He describes an adventure wandering through the New Guinea jungle with native New Guineans. He relates that these natives tend to perform poorly at tasks Westerners have been trained to do since childhood. But they are hardly stupid. They can detect the most subtle changes in the jungle, good for following the tracks of a predator or for finding the way back home. They know which insects to leave alone, know where food exists, can build and tear down shelters with ease. Diamond, who had never spent time in such places, has no ability to pay attention to these things. Were he to be tested on such tasks, he also would perform poorly.`,choices:[`사람의 지능은 유전적 요인에 따라 결정된다.`,`생존 기술은 교육보다는 본능에 의해 습득된다.`,`익숙한 경험이 주의력과 인지 능력에 영향을 미친다.`,`원주민들은 현대 사회에 적응하지 못해 낮은 평가를 받 는다.`,`문화적 차이는 개인의 능력보다는 언어의 차이에서 기인 한다.`],ans:3},
  {no:34,school:`서울대학교사범대학부설고 - 서울시`,pref:`31`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`In everyday life, we use previous experience to predict ⓐ where we should pay attention. Different environments create different expectations. This was profoundly illustrated by the scientist Jared Diamond in his book Guns, Germs, and Steel. He describes an adventure ⓑwandering through the New Guinea jungle with native New Guineans. He relates that these natives tend to perform ⓒpoorly at tasks Westerners have been trained to do since childhood. But they are hardly stupid. They can detect the most subtle changes in the jungle, good for following the tracks of a predator or for finding the way back home. They know which insects to leave alone, know where food exists, can build and ⓓto tear down shelters with ease. Diamond, who had never spent time in such places, has no ability to pay attention to these things. ⓔWere he to be tested on such tasks, he also would perform poorly.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:4},
  {no:35,school:`옥천고 - 옥천군`,pref:`31`,type:`요약문`,stem:`다음 글 (A)를 (B)와 같이 요약할 때 가장 적절하지 않 은 것은?`,body:`(A) In everyday life, we use previous experience to predict where we should pay attention. Different environments create different expectations. This was profoundly illustrated by the scientist Jared Diamond in his book Guns, Germs, and Steel. He describes an adventure wandering through the New Guinea jungle with native New Guineans. He relates that these natives tend to perform poorly at tasks Westerners have been trained to do since childhood. But they are hardly stupid. They can detect the most subtle changes in the jungle, good for following the tracks of a predator or for finding the way back home. They know which insects to leave alone, know where food exists, can build and tear down shelters with ease. Diamond, who had never spent time in such places, has no ability to pay attention to these things. Were he to be tested on such tasks, he also would perform poorly. What counts as intelligence can shift dramatically depending on the demands of a particular setting. This shows that intelligence is not a fixed trait but something deeply tied to cultural experience. It suggests that judgments about cognitive ability should be made based on appropriate context. - 1 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 (B) ⓐ[In Guns, Germs, and Steel, Jared Diamond shares his experience in the New Guinea jungle with native inhabitants]. ⓑ[Although these natives struggle with tasks typical in Western contexts, such as map reading or logical reasoning, they demonstrate remarkable environmental intelligence]. ⓒ[Their ability to detect subtle cues in nature and adapt to complex jungle conditions reflects deep, context-independent cognitive competence]. ⓓ[In contrast, Diamond himself was unable to function effectively in that unfamiliar environment]. ⓔ[This illustrates that intelligence is not a fixed, universal attribute but one shaped by cultural and environmental circumstances].`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:3},
  {no:36,school:`원묵고 - 서울시`,pref:`31`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`In everyday life, we use previous experience to predict where we should pay attention. Different environments create different expectations. This was profoundly illustrated by the scientist Jared Diamond in his book Guns, Germs, and Steel. He describes an adventure wandering through the New Guinea jungle with native New Guineans. He relates that these natives tend to perform poorly at tasks Westerners have been trained to do since childhood. But they are hardly stupid. They can detect the most subtle changes in the jungle, good for following the tracks of a predator or for finding the way back home. They know which insects to leave alone, know where food exists, can build and tear down shelters with ease. Diamond, who had never spent time in such places, has no ability to pay attention to these things. Were he to be tested on such tasks, he also would perform poorly.`,choices:[`We must be aware of something for it to grab our attention.`,`The messages that do grab your attention are connected to feeling.`,`What we pay attention to is often profoundly influenced by memory.`,`Sight is only one stimulus to which the brain is capable of paying attention.`,`The more attention the brain pays to a given stimulus, the more elaborately the information will be retained.`],ans:3},
  {no:37,school:`와룡고 - 대구시`,pref:`32`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services and then make the mistake of overpricing them. They have created something they care deeply about, its theirs, and this powerful sense of ownership ⓐclarifies their perception of value which causes them to overprice their products. While many of them are quick to realize that their initial prices are too high, not all these people are happy or willing to drop their prices to make their products more ⓑappealing. And this can be a very costly mistake that may lead to the ⓒloss of their new business. When you launch a new product or service, your priority should be to get sufficient market adoption as soon as possible and you should be ready to ⓓsacrifice your initial prices and profits to achieve this aim. Once you have strong sales volumes, you can increase your prices to ⓔ boost your profits.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:1},
  {no:38,school:`부용고 - 의정부시`,pref:`32`,type:`빈칸 추론`,stem:`다음 글의 내용을 요약하고자 한다. 빈칸 (A), (B)에 들 어갈 말로 가장 적절한 것은?`,body:`Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services and then make the mistake of overpricing them. They have created something they care deeply about, it's theirs, and this powerful sense of ownership distorts their perception of value which causes them to overprice their products. While many of them are quick to realize that their initial prices are too high, not all these people are happy or willing to drop their prices to make their products more attractive. And this can be a very costly mistake that may lead to the failure of their new business. When you launch a new product or service, your priority should be to get sufficient market adoption as soon as possible and you should be ready to sacrifice your initial prices and profits to achieve this aim. Once you have strong sales volumes, you can increase your prices to maximize your profits. - 1 [COLUMN_BREAK] 지문별 학교기출 100제 - 1차 ↓ Entrepreneurs often overprice their new products due to emotional attachment, which distorts their perception of value and can (A)[___________] market acceptance. To succeed long-term, it's crucial to prioritize early market adoption─even if it means (B)[___________] initial prices and profits─before setting higher prices later for greater profitability. (A) (B)`,choices:[`facilitate sacrificing`,`obstruct reducing`,`facilitate lowering`,`obstruct enhancing`,`hinder promoting`],ans:2},
  {no:39,school:`한국교원대학교부설고 – 청주시`,pref:`32`,type:`기타`,stem:`다음 글에서 필자가 주장하는 바로 가장 적절한 것 은?`,body:`Most entrepreneurs put in tremendous amounts of time and effort in creating and launching new products and services and then make the mistake of overpricing them. They have created something they care deeply about, it's theirs, and this powerful sense of ownership distorts their perception of value which causes them to overprice their products. While many of them are quick to realize that their initial prices are too high, not all these people are happy or willing to drop their prices to make their products more attractive. And this can be a very costly mistake that may lead to the failure of their new business. When you launch a new product or service, your priority should be to get sufficient market adoption as soon as possible and you should be ready to sacrifice your initial prices and profits to achieve this aim. Once you have strong sales volumes, you can increase your prices to maximize your profits.`,choices:[`제품에 대한 강한 소유 의식은 가격 책정에 긍정적으로 작용한다.`,`높은 초기 가격은 시장의 빠른 반응 유도와 제품 성공을 보장한다.`,`처음에는 비싸게 팔아도 시간이 지나면 수익은 자연스럽 게 따라온다.`,`신제품의 가격을 인하하는 것은 장기적으로는 비효율적 인 전략이다.`,`초기에는 시장 점유율 확보를 위해 손해를 감수할 필요 가 있다.`],ans:5},
