function show(id){
  ['loginScreen','selectScreen','roundScreen','resultScreen','doneScreen'].forEach(x=>{
    const el=document.getElementById(x); if(el) el.classList.toggle('hidden', x!==id);
  });
  window.scrollTo(0,0);
}

function goSelect(){
  studentName = document.getElementById('nameInput').value.trim();
  studentSchool = document.getElementById('schoolSel').value;
  if(!studentSchool){alert('학교를 선택해주세요!');return;}
  if(!studentName){alert('이름을 입력해주세요!');return;}
  renderNoGrid();
  const nos = Object.keys(POOL).sort((a,b)=>+a-+b);

function renderNoGrid(){
  const g = document.getElementById('noGrid');
  g.innerHTML = '';
  Object.keys(POOL).sort((a,b)=>+a-+b).forEach(n=>{

    div.onclick = ()=>toggleNo(n);
    g.appendChild(div);

function toggleNo(n){
  if(selectedNos.has(n)) selectedNos.delete(n); else selectedNos.add(n);
  document.querySelectorAll('.no-card').forEach(c=>{ c.classList.toggle('sel', selectedNos.has(c.dataset.no)); });
  document.getElementById('startBtn').disabled = selectedNos.size===0;
}

function selectAllNos(){
  Object.keys(POOL).forEach(n=>selectedNos.add(n));

}

function startRound1(){
  currentRound = 1;
  activeNos = Array.from(selectedNos).sort((a,b)=>+a-+b);
  usedQs = {}; perNoHistory = {};
  activeNos.forEach(n=>{ usedQs[n] = new Set(); perNoHistory[n] = []; });
  buildRound();
}
window.startRound1 = startRound1;

function buildRound(){
  roundQuestions = {}; userAnswers = {};
  activeNos.forEach(n=>{
    const pool = POOL[n] || [];
    let pickIdx = -1;
    // pick random unused
    const unused = [];
    for(let i=0;i<pool.length;i++){ if(!usedQs[n].has(i)) unused.push(i); }
    if(unused.length > 0){
      pickIdx = unused[Math.floor(Math.random()*unused.length)];
      usedQs[n].add(pickIdx);
      roundQuestions[n] = { ...pool[pickIdx], _idx: pickIdx };
    } else {
      pickIdx = 0;
      roundQuestions[n] = { ...pool[pickIdx], _exhausted: true, _idx: pickIdx };
    }
  });
  renderRoundQuestions();
  document.getElementById('roundLabel').textContent = `⏰ ${currentRound}차 세트 — 풀이`;
  document.getElementById('roundInfo').textContent = `번호 ${activeNos.length}개 · 각 1문제씩`;
  updateHudProgress();
  show('roundScreen');
}

function escHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// 빈칸 시각화 보강 — body 텍스트에서 빈칸 누락 위치 추정해 시각화
function reviveBlanks(body, type, stem){
  let t = body;
  const isBlank = /빈칸|cloze|함축|문장 위치|순서/.test((type||'') + ' ' + (stem||''));
  // 1) underscores (already-visible blanks)
  t = t.replace(/_{3,}/g, '<span class="blk"></span>');
  // 2) empty parens or single space inside () → 빈칸
  t = t.replace(/\(\s*\)/g, '(<span class="blk"></span>)');
  t = t.replace(/\(\s{2,}\)/g, '(<span class="blk"></span>)');
  if(isBlank){
    // 3) " . " 또는 trailing " ." 패턴 (콤마/마침표 직전 공백 큰) → 빈칸
    t = t.replace(/\s{2,}\./g, ' <span class="blk"></span>.');
    t = t.replace(/(\s)\.(\s)/g, '$1<span class="blk"></span>.$2');
    t = t.replace(/\s{4,}/g, ' <span class="blk"></span> ');
  }
  return t;
}

function renderRoundQuestions(){

    const schoolBadge = q.school ? `<span class="q-school">${escHtml(q.school)}</span>` : '';
    const bodyHtml = reviveBlanks(escHtml(q.body), q.type||'', q.stem||'');
    card.innerHTML = `
      <div class="q-meta">
        <span class="q-no-badge">${n}번 · ${currentRound}차</span>
        ${typeBadge}
        ${schoolBadge}
        ${exhaustedNote}
      </div>
      <div class="q-stem">${escHtml(q.stem)}</div>
      <div class="q-body">${bodyHtml}</div>
      <div class="choices" id="ch-${n}">
        ${q.choices.map((opt,i)=>`<button class="opt-btn" data-pick="${i+1}" onclick="pickAnswer('${n}',${i+1})">
          <span class="opt-num">${i+1}</span>
          <span>${escHtml(opt)}</span>
        </button>`).join('')}
      </div>
      <div class="fb-line" id="fb-${n}"></div>
    `;
    c.appendChild(card);
  });
}

function pickAnswer(n, idx){
  if(userAnswers[n] !== undefined) return;
  userAnswers[n] = idx;
  const card = document.querySelector(`.q-card[data-no="${n}"]`);
  card.querySelectorAll('.opt-btn').forEach(b=>{
    if(parseInt(b.dataset.pick) === idx) b.classList.add('sel');
  });
  updateHudProgress();
}
window.pickAnswer = pickAnswer;

function updateHudProgress(){
  const answered = Object.keys(userAnswers).length;
  document.getElementById('hudProgress').textContent = `${answered} / ${activeNos.length} 답함`;
  document.getElementById('submitBtn').disabled = answered < activeNos.length;
}

function submitRound(){
  if(Object.keys(userAnswers).length < activeNos.length){ alert('모든 번호의 답을 선택해주세요!'); return; }
  const stillWrong = [];
  const roundResults = [];
  activeNos.forEach(n=>{
    const q = roundQuestions[n];
    const picked = userAnswers[n];
    const correct = picked === q.ans;
    const exhausted = !!q._exhausted;
    const finalCorrect = correct || exhausted;
    perNoHistory[n].push({ round: currentRound, qInternal: q.internal, school: q.school||'', type:q.type||'', picked, ans: q.ans, correct, exhausted });
    if(!finalCorrect) stillWrong.push(n);
    const card = document.querySelector(`.q-card[data-no="${n}"]`);
    card.classList.add('answered', correct ? 'ok' : 'bad');
    card.querySelectorAll('.opt-btn').forEach(b=>{
      const i = parseInt(b.dataset.pick);
      b.disabled = true;
      if(i === q.ans) b.classList.add('correct');
      if(i === picked && !correct) b.classList.add('wrong');
    });
    const fb = document.getElementById('fb-'+n);
    if(correct){ fb.className='fb-line show ok'; fb.textContent='✅ 정답!'; }
    else if(exhausted){ fb.className='fb-line show ok'; fb.textContent=`⚠️ 더 이상 변형 없음 → 통과 (정답: ${q.ans}번)`; }
    else { fb.className='fb-line show bad'; fb.textContent=`❌ 오답 (정답: ${q.ans}번)`; }
    roundResults.push({ no:n, picked, ans:q.ans, correct, exhausted, school:q.school||'', type:q.type||'' });
  });
  if(window._fbSave){
    const elapsedMin = Math.round((Date.now()-t0)/60000);
    window._fbSave({
      submittedAt: new Date().toISOString(),
      studentName, school: studentSchool,
      score: Math.round((activeNos.length-stillWrong.length)/activeNos.length*100),
      correct: activeNos.length-stillWrong.length, wrong: stillWrong.length, total: activeNos.length,
      elapsedMin, quizType: QUIZ_TYPE_PREFIX + '_' + currentRound + '차',
      round: currentRound, activeNos: [...activeNos], wrongNos: stillWrong, details: roundResults,
    });
  }
  showResult(stillWrong);
}
window.submitRound = submitRound;

function showResult(stillWrong){
  document.getElementById('resultTitle').textContent = `📊 ${currentRound}차 세트 결과`;
  const passedCount = activeNos.length - stillWrong.length;
  document.getElementById('resultSummary').innerHTML = `통과 <strong>${passedCount} / ${activeNos.length}</strong> 번호 · 누적 라운드 <strong>${currentRound}</strong> · 다음 차시 풀 번호 <strong>${stillWrong.length}</strong>개`;
  const board = document.getElementById('resultBoard');
  board.innerHTML = '';
  activeNos.forEach(n=>{
    const hist = perNoHistory[n];
    const last = hist[hist.length-1];
    const passed = last.correct || last.exhausted;
    const div = document.createElement('div');
    div.className = 'no-result ' + (passed ? 'pass' : 'again');
    const attempts = hist.map(h=> h.correct?'✅':(h.exhausted?'⚪':'❌')).join('');
    div.innerHTML = `<div class="big">${n}번</div><div class="attempt-list">${attempts}</div><div class="lbl">${passed ? '통과!' : '다음 차시'}</div>`;
    board.appendChild(div);
  });
  const nextBtn = document.getElementById('nextRoundBtn');
  const finishBtn = document.getElementById('finishBtn');
  if(stillWrong.length === 0){
    nextBtn.style.display = 'none';
    finishBtn.style.display = 'block';
    finishBtn.textContent = '🏆 모든 번호 통과! 결과 보기 →';
    finishBtn.style.background = '';
  } else {
    nextBtn.style.display = 'block';
    nextBtn.textContent = `▶️ ${stillWrong.length}개 번호 다시 도전 (${currentRound+1}차)`;
    finishBtn.style.display = 'block';
    finishBtn.textContent = '중단하고 결과 보기';
  }
  window._pendingNext = stillWrong;
  show('resultScreen');
}

function startNextRound(){
  const stillWrong = window._pendingNext || [];
  if(stillWrong.length === 0){ finishAll(); return; }
  activeNos = stillWrong.slice();
  currentRound++;
  buildRound();
}
window.startNextRound = startNextRound;

function finishAll(){
  const board = document.getElementById('finalBoard');
  board.innerHTML = '';
  Array.from(selectedNos).sort((a,b)=>+a-+b).forEach(n=>{
    const hist = perNoHistory[n] || [];
    if(hist.length === 0) return;
    const last = hist[hist.length-1];
    const passed = last.correct || last.exhausted;
    const attempts = hist.map(h=> h.correct?'✅':(h.exhausted?'⚪':'❌')).join('');
    const div = document.createElement('div');
    div.className = 'no-result ' + (passed ? 'pass' : 'again');
    div.innerHTML = `<div class="big">${n}번</div><div class="attempt-list">${attempts}</div><div class="lbl">${passed ? '통과!' : `${hist.length}회 시도`}</div>`;
    board.appendChild(div);
  });
  if(window._fbSave){
    const elapsedMin = Math.round((Date.now()-t0)/60000);
    const passed = Array.from(selectedNos).filter(n=>{
      const h = perNoHistory[n] || [];
      const last = h[h.length-1];
      return last && (last.correct || last.exhausted);
    }).length;
    window._fbSave({
      submittedAt: new Date().toISOString(),
      studentName, school: studentSchool,
      score: Math.round(passed/selectedNos.size*100),
      correct: passed, wrong: selectedNos.size - passed, total: selectedNos.size,
      elapsedMin, quizType: QUIZ_TYPE_PREFIX + '_최종',
      totalRounds: currentRound, history: perNoHistory,
    });
  }
  show('doneScreen');
}
window.finishAll = finishAll;
</script>

</body>
