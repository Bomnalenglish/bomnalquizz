<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#6366f1;--good:#10b981;--bad:#ef4444;--ink:#1e293b;--muted:#64748b;--soft:#cbd5e1;--bg:#f1f5f9;--border:#e2e8f0;--accent:#f59e0b;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);padding:16px;}
.hidden{display:none!important}
header{text-align:center;padding:12px 8px 4px;max-width:760px;margin:0 auto;}
header h1{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:var(--pri);letter-spacing:.3px;}
header .sub{font-size:.78rem;color:var(--muted);margin-top:4px;}
.card{background:white;border-radius:16px;padding:18px;margin:12px auto;max-width:760px;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.03);}
h2{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:var(--ink);margin-bottom:10px;}
.ni{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px;}
.ni:focus{border-color:var(--pri);outline:none}
.btn{padding:11px 22px;background:var(--pri);color:white;border:none;border-radius:10px;font-weight:800;font-size:.92rem;cursor:pointer;font-family:inherit;transition:transform .1s;}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{background:var(--soft);cursor:not-allowed;transform:none;}
.btn-s{background:linear-gradient(135deg,var(--accent),#d97706);}
.btn-good{background:linear-gradient(135deg,var(--good),#059669);}
.btn-row{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
/* 번호 선택 그리드 */
.no-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px;margin-top:8px;}
.no-card{background:#fff;border:2px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;font-weight:800;font-size:.92rem;color:var(--ink);transition:all .12s;}
.no-card:not(.disabled):hover{border-color:var(--pri);background:#eef2ff;transform:translateY(-1px);}
.no-card.sel{background:var(--pri);color:white;border-color:var(--pri);}
.no-card.disabled{opacity:.25;cursor:not-allowed;background:#f8fafc;}
.no-card .cnt{font-size:.6rem;color:var(--muted);font-weight:700;margin-top:2px;}
.no-card.sel .cnt{color:#e0e7ff;}
.summary{display:flex;flex-wrap:wrap;gap:12px;font-size:.82rem;color:var(--muted);margin:8px 0;}
.summary strong{color:var(--ink);}
/* 라운드 진행 */
.round-hud{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:linear-gradient(135deg,#fff7e0,#fef3c7);border:2px solid #fcd34d;border-radius:12px;margin-bottom:12px;}
.round-hud .lbl{font-family:'Black Han Sans',sans-serif;font-size:.95rem;color:#92400e;}
.round-hud .info{font-size:.78rem;color:#a16207;}
.q-card{background:white;border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.q-card.answered.ok{border-color:var(--good);background:linear-gradient(135deg,#f0fdf4,#fff);}
.q-card.answered.bad{border-color:var(--bad);background:linear-gradient(135deg,#fef2f2,#fff);}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap;}
.q-no-badge{background:var(--pri);color:white;padding:3px 10px;border-radius:14px;font-size:.74rem;font-weight:800;}
.q-school{background:#f1f5f9;color:#475569;padding:2px 8px;border-radius:10px;font-size:.66rem;font-weight:700;}
.q-stem{font-size:.86rem;font-weight:700;color:var(--ink);margin-bottom:8px;line-height:1.5;}
.q-body{font-size:.84rem;line-height:1.65;color:#334155;background:#f8fafc;border-radius:10px;padding:10px 12px;margin-bottom:10px;white-space:pre-wrap;}
.choices{display:flex;flex-direction:column;gap:6px;}
.opt-btn{display:flex;align-items:flex-start;gap:8px;background:white;border:2px solid var(--border);border-radius:10px;padding:9px 11px;cursor:pointer;font-family:inherit;text-align:left;font-size:.82rem;color:var(--ink);line-height:1.5;}
.opt-btn:hover:not(:disabled){border-color:var(--pri);background:#f5f7ff;}
.opt-btn.sel{border-color:var(--pri);background:#eef2ff;}
.opt-btn.correct{background:#dcfce7;border-color:var(--good);color:#15803d;}
.opt-btn.wrong{background:#fee2e2;border-color:var(--bad);color:#b91c1c;}
.opt-btn:disabled{cursor:default;}
.opt-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:#e2e8f0;color:#475569;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:.72rem;}
.opt-btn.sel .opt-num,.opt-btn.correct .opt-num{background:var(--pri);color:white;}
.opt-btn.correct .opt-num{background:var(--good);}
.opt-btn.wrong .opt-num{background:var(--bad);color:white;}
.fb-line{margin-top:8px;font-size:.8rem;font-weight:700;padding:6px 10px;border-radius:8px;display:none;}
.fb-line.show{display:block;}
.fb-line.ok{background:#d1fae5;color:#065f46;}
.fb-line.bad{background:#fee2e2;color:#991b1b;}
/* 결과 보드 */
.no-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin:10px 0;}
.no-result{background:white;border:2px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.no-result.pass{background:#dcfce7;border-color:var(--good);color:#15803d;}
.no-result.again{background:#fef3c7;border-color:var(--accent);color:#92400e;}
.no-result .big{font-family:'Black Han Sans',sans-serif;font-size:1rem;}
.no-result .lbl{font-size:.66rem;margin-top:3px;font-weight:700;}
.attempt-list{font-size:.7rem;color:var(--muted);margin-top:2px;}
.celebrate{text-align:center;padding:28px 14px;}
.celebrate .emoji{font-size:48px;}
.celebrate h2{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;color:var(--pri);margin:6px 0;}
@media(max-width:520px){header h1{font-size:1.1rem}}
</style>

<!-- 4) 라운드 결과 -->
<div id="resultScreen" class="card hidden">

; they remove unwanted plants that begin to grow and perhaps spray insecticides and fence off the patch to stop insects and other animals from consuming the vegetables. Since maximizing vegetable growth is an inherently unstable state for the ecosystem, the grower is effectively keeping the ball on a slope. If the grower stops intervening, even for a day, the ecosystem, that small patch of ground, will naturally begin to shift to a more stable state. Vegetables may still grow, but yield will almost certainly be lower as other plants crowd out the vegetables and wildlife consume the produce.","choices":["Ecosystems can maintain productivity with minimal human intervention.","Ecosystems tend to become more productive as they reach a stable state.","Human intervention helps maintain the high-yield but unstable state of ecosystems.","Ecological stability is the primary goal for growers seeking to maximize crop yields.","Human intervention primarily increases short-term productivity without affecting ecosystem stability."],"ans":3},{"school":"청주중앙여고","internal":4,"stem":"다음 글의 요지로 가장 적절한 것은?","body":"A first step toward establishing a respectful classroom learning community is acceptance of all ideas and answers – regardless of any obvious errors. Rich mathematical discussions cannot occur if this expectation is not in place. We must remember that wrong answers are often rooted in misconceptions, and unless these ideas are allowed to be brought to the forefront, we cannot help students confront their thinking. Students who are in safe learning environments are willing to risk sharing an incorrect answer with their peers in order to grow mathematically. It is important to model and expect the acceptance of all ideas without derogatory comments. As educators we can model this by recording all answers to be considered without giving any verbal or physical expressions that indicate agreement or disagreement with any answer. The teacher may need to practice having a \"blank f ifference between learning and showing: Self-experiments are better for discovery but worse for convincing others that the solution is helpful or the answer is correct. Of course, most scientists want to do both – discover something and convince others of their discovery. Thus, psychologists should consider doing both self-experiments and conventional ones. The best use of resources may often be self-experiments followed by conventional ones. The researcher begins with self-experiments that, if all goes well, find large effects and / or generate and eliminate many hypotheses. This exploratory and theory-building phase lasts until a convenient solution or large effect is found. Then the researcher uses self-experiments to find the procedural parameters (e.g., duration, time of day, intensity) that optimize the solution or maximize the effect. Only then would the researcher begin conventional experiments, using the optimized parameters.","choices":["연구에서는 가설의 탐색보다 결과의 신뢰성 확보 가 우선되어야 한다.","연구 효과의 극대화를 위해서는 초기 단계부터 엄 격한 검증 절차를 적용해야 한다.","실험 과정은 발견과 검증의 구분 없이 하나의 연 속된 단계로 진행되는 것이 이상적이다.","실험 조건의 조정은 연구의 마지막 단계가 아니라 처음부터 철저한 계획하에 이루어져야 한다.","새로운 효과나 해결 방법을 찾고 검증할 때, 먼저 자기 실험을 하고 그 이후 일반 실험을 하는 것이 효과적이다."],"ans":5},{"school":"함월고등학교","internal":1,"stem":"다음 ⓐ~ⓔ 중, 전체 흐름과 관계없는 문장은?","body":"When self-experimentation and conventional experiments are both possible, the difference between them often resembles the difference between learning and showing: Self-experiments are better for discovery but worse for convincing others that the solution is helpful or the answer is correct. Of course, most scientists want to do both – discover something and convince others of their discovery. ⓐThus, psychologists should consider doing both self-experiments and conventional ones. ⓑThe best use of resources may often be self-experiments followed by conventional ones. ⓒ The researcher begins with self-experiments that, if all goes well, find large effects and / or generate and eliminate many hypotheses. This exploratory and theory-building phase lasts until a convenient solution or large effect is found. ⓓIn contrast, self-experiments are never useful for generating hypotheses or discovering new effects. ⓔThen the researcher uses self-experiments to find the procedural parameters (e.g., duration, time of day, intensity) that optimize the solution or maximize the effect. Only then would the researcher begin conventional experiments, using the optimized parameters.","choices":["ⓐ","ⓑ","ⓒ","ⓓ","ⓔ"],"ans":4}],"24":[{"school":"한국교원대부","internal":8,"stem":"다음 글에서 전체 흐름과 관계없는 문장은?","body":"The Industrial Revolution did more than just invent new materials or machines. It invented a new process for manufacturing: the modern factory. Prior to around 1850, most piano shops used an apprentice system in which a master builder taught younger workers the skills of the trade, usually over the course of many years. ⓐThe larger piano shops did have specialists – for example, one person who specialized in soundboards, another who made hammers, and so on. ⓑBut even the largest piano makers of that time produced no more than 5-10 pianos per year per worker, as pianos were still made essentially one at a time. ⓒDue to such scarcity, pianos were regarded as luxury items that defined the owner's wealth and class. ⓓThe development of a true piano factory occurred first in the United States, led by Jonas Chickering in Boston and later the Steinway family in New York City. ⓔ These factories improved efficiency and quality; for instance, one facility produced its own superior metal plates using an internal iron casting process.","choices":["ⓐ","ⓑ","ⓒ","ⓓ","ⓔ - 4 - 2026년 고2 영어l 1학기 중간기출 한 고 NE능률(오선영)"],"ans":3},{"school":"호산고등학교","internal":9,"stem":"다음 글의 흐름으로 보아, 주어진 문장이 들어가기 에 가장 적절한 곳은?","body":"But sound such as music from a loudspeaker will sound different in every acoustical environment. Rooms have their own \"sound\" because they impose their own characteristics on audio und different as the instrument or the microphone is moved. <보기> ⓐ This article is about how space itself is a key factor in shaping sound. ⓑ Headphones produce different sounds because they are affected by various acoustical environments. ⓒ The difference in loudspeaker sound across rooms is due to the room being included in the signal path. ⓓ In the same room, a loudspeaker will sound identical wherever it is located, as long as the listener does not move. ⓔ During recording, the location of the instrument and the microphone can affect the captured sound.","choices":["ⓐ, ⓑ","ⓐ, ⓒ","ⓐ, ⓑ, ⓓ","ⓐ, ⓒ, ⓔ","ⓒ, ⓓ, ⓔ - 1 - 2026년 고2 영어l 1학기 중간기출 심 미래엔(김성연)"],"ans":4}],"32":[{"school":"호산고등학교","internal":8,"stem":"주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?","body":"Perhaps the best-known development to emerge from the liberation and expansion of aesthetic experience is the aesthetics of everyday life. (A) He located the aesthetic, not in an internalized awareness of sensation and feeling but in \"a complete interpenetration of self and the world of objects and events.\" Further, Dewey maintained that \"the aesthetic is the clarified and intensified development of traits that belong to every normally complete experience.“ (B) Although there is presently a flowering of work on everyday aesthetics, the possibility of aesthetic gratification in ordinary objects and events has long been recognized, even if degraded and dismissed by prevalent philosophical theory. Widely valued by poets, especially Romantic poets and those in Asian traditions, the aesthetic in everyday situations has also been recognized by novelists. (C) It may be most convenient, though, to locate its contemporary intellectual origins in John Dewey's Art as Experience. In that book Dewey argued against the separation of art from life by basing aesthetic experience on the biological and cultural conditions of human life.","choices":["(A) - (B) - (C)","(A) - (C) - (B)","(B) - (A) - (C)","(B) - (C) - (A)","(C) - (A) - (B) - // === 화면 전환 ===
function show(id){
  ['loginScreen','selectScreen','roundScreen','resultScreen','doneScreen'].forEach(x=>{
    const el=document.getElementById(x); if(el) el.classList.toggle('hidden', x!==id);
  });
  window.scrollTo(0,0);
}

function goSelect(){
  studentName = document.getElementById('nameInput').value.trim();
  studentSchool = document.getElementById('schoolSel').value;
  if(!studentSchool){alert('학교를 선택해주세요!');return;}
  if(!studentName){alert('이름을 입력해주세요!');return;}
  renderNoGrid();
  // 풀 통계
  const nos = Object.keys(POOL).sort((a,b)=>+a-+b);
  const totalQ = nos.reduce((s,n)=>s+POOL[n].length,0);
  document.getElementById('poolTotal').textContent = totalQ;
  document.getElementById('poolNos').textContent = nos.length;
  show('selectScreen');
  t0 = Date.now();
}

function renderNoGrid(){
  const g = document.getElementById('noGrid');
  g.innerHTML = '';
  const nos = Object.keys(POOL).sort((a,b)=>+a-+b);
  nos.forEach(n=>{
    const cnt = POOL[n].length;
    const div = document.createElement('div');
    div.className = 'no-card';
    div.dataset.no = n;
    div.innerHTML = `<div>${n}</div><div class="cnt">${cnt}문제</div>`;
    div.onclick = ()=>toggleNo(n);
    g.appendChild(div);
  });
}

function toggleNo(n){
  if(selectedNos.has(n)) selectedNos.delete(n); else selectedNos.add(n);
  document.querySelectorAll('.no-card').forEach(c=>{
    c.classList.toggle('sel', selectedNos.has(c.dataset.no));
  });
  document.getElementById('startBtn').disabled = selectedNos.size===0;
}
window.toggleNo = toggleNo;

function selectAllNos(){
  Object.keys(POOL).forEach(n=>selectedNos.add(n));
  renderNoGrid();
  document.querySelectorAll('.no-card').forEach(c=>c.classList.add('sel'));
  document.getElementById('startBtn').disabled = false;
}
window.selectAllNos = selectAllNos;

// === 라운드 시작 ===
function startRound1(){
  currentRound = 1;
  activeNos = Array.from(selectedNos).sort((a,b)=>+a-+b);
  usedQs = {};
  perNoHistory = {};
  activeNos.forEach(n=>{ usedQs[n] = new Set(); perNoHistory[n] = []; });
  buildRound();
}
window.startRound1 = startRound1;

function buildRound(){
  // 각 활성 번호에서 미사용 문제 1개씩 출제
  roundQuestions = {};
  userAnswers = {};
  activeNos.forEach(n=>{
    const pool = POOL[n] || [];
    let pickIdx = -1;
    for(let i=0;i<pool.length;i++){
      if(!usedQs[n].has(i)){ pickIdx = i; break; }
    }
    if(pickIdx === -1){
      // 풀 소진: 가장 처음 문제 재사용 (단, 통과 처리)
      pickIdx = 0;
      roundQuestions[n] = { ...pool[pickIdx], _exhausted: true, _idx: pickIdx };
    } else {
      usedQs[n].add(pickIdx);
      roundQuestions[n] = { ...pool[pickIdx], _idx: pickIdx };
    }
  });
  renderRoundQuestions();
  document.getElementById('roundLabel').textContent = `⏰ ${currentRound}차 세트 — 풀이`;
  document.getElementById('roundInfo').textContent = `번호 ${activeNos.length}개 · 각 1문제씩`;
  updateHudProgress();
  show('roundScreen');
}

function renderRoundQuestions(){
  const c = document.getElementById('questionsContainer');
  c.innerHTML = '';
  activeNos.forEach(n=>{
    const q = roundQuestions[n];
    const card = document.createElement('div');
    card.className = 'q-card';
    card.dataset.no = n;
    const exhaustedNote = q._exhausted ? '<span class="q-school" style="background:#fff7e0;color:#92400e;">⚠ 추가 변형 없음</span>' : '';
    card.innerHTML = `
      <div class="q-meta">
        <span class="q-no-badge">${n}번 · ${currentRound}차</span>
        <span class="q-school">${escHtml(q.school)}</span>
        ${exhaustedNote}
      </div>
      <div class="q-stem">${escHtml(q.stem)}</div>
      <div class="q-body">${escHtml(q.body)}</div>
      <div class="choices" id="ch-${n}">
        ${q.choices.map((opt,i)=>`<button class="opt-btn" data-pick="${i+1}" onclick="pickAnswer('${n}',${i+1})">
          <span class="opt-num">${i+1}</span>
          <span>${escHtml(opt)}</span>
        </button>`).join('')}
      </div>
      <div class="fb-line" id="fb-${n}"></div>
    `;
    c.appendChild(card);
  });
}

function escHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function pickAnswer(n, idx){
  if(userAnswers[n] !== undefined) return;
  userAnswers[n] = idx;
  const card = document.querySelector(`.q-card[data-no="${n}"]`);
  card.querySelectorAll('.opt-btn').forEach(b=>{
    if(parseInt(b.dataset.pick) === idx) b.classList.add('sel');
  });
  updateHudProgress();
}
window.pickAnswer = pickAnswer;

function updateHudProgress(){
  const answered = Object.keys(userAnswers).length;
  document.getElementById('hudProgress').textContent = `${answered} / ${activeNos.length} 답함`;
  document.getElementById('submitBtn').disabled = answered < activeNos.length;
}

// === 채점 ===
function submitRound(){
  if(Object.keys(userAnswers).length < activeNos.length){
    alert('모든 번호의 답을 선택해주세요!');
    return;
  }
  // grade
  const stillWrong = [];
  const roundResults = []; // for save
  activeNos.forEach(n=>{
    const q = roundQuestions[n];
    const picked = userAnswers[n];
    const correct = picked === q.ans;
    // 풀 소진 케이스: 자동 통과 처리 (재출제 불가)
    const exhausted = !!q._exhausted;
    const finalCorrect = correct || exhausted;
    perNoHistory[n].push({ round: currentRound, qInternal: q.internal, school: q.school, picked, ans: q.ans, correct, exhausted });
    if(!finalCorrect) stillWrong.push(n);
    // mark UI
    const card = document.querySelector(`.q-card[data-no="${n}"]`);
    card.classList.add('answered', correct ? 'ok' : 'bad');
    card.querySelectorAll('.opt-btn').forEach(b=>{
      const i = parseInt(b.dataset.pick);
      b.disabled = true;
      if(i === q.ans) b.classList.add('correct');
      if(i === picked && !correct) b.classList.add('wrong');
    });
    const fb = document.getElementById('fb-'+n);
    if(correct){ fb.className='fb-line show ok'; fb.textContent='✅ 정답!'; }
    else if(exhausted){ fb.className='fb-line show ok'; fb.textContent=`⚠️ 더 이상 변형 문제가 없어 통과 처리됩니다 (정답: ${q.ans}번)`; }
    else { fb.className='fb-line show bad'; fb.textContent=`❌ 오답 (정답: ${q.ans}번)`; }
    roundResults.push({ no:n, picked, ans:q.ans, correct, exhausted, school:q.school });
  });
  // save round result
  if(window._fbSave){
    const elapsedMin = Math.round((Date.now()-t0)/60000);
    window._fbSave({
      submittedAt: new Date().toISOString(),
      studentName: studentName,
      school: studentSchool,
      score: Math.round((activeNos.length-stillWrong.length)/activeNos.length*100),
      correct: activeNos.length-stillWrong.length,
      wrong: stillWrong.length,
      total: activeNos.length,
      elapsedMin: elapsedMin,
      quizType: '고2_26년6월_총괄_번호반복_'+currentRound+'차',
      round: currentRound,
      activeNos: [...activeNos],
      wrongNos: stillWrong,
      details: roundResults,
    });
  }
  showResult(stillWrong);
}
window.submitRound = submitRound;

function showResult(stillWrong){
  document.getElementById('resultTitle').textContent = `📊 ${currentRound}차 세트 결과`;
  const passedCount = activeNos.length - stillWrong.length;
  const summary = document.getElementById('resultSummary');
  summary.innerHTML = `통과 <strong>${passedCount} / ${activeNos.length}</strong> 번호 · 누적 라운드 <strong>${currentRound}</strong> · 다음 차시 풀 번호 <strong>${stillWrong.length}</strong>개`;
  const board = document.getElementById('resultBoard');
  board.innerHTML = '';
  activeNos.forEach(n=>{
    const hist = perNoHistory[n];
    const last = hist[hist.length-1];
    const passed = last.correct || last.exhausted;
    const div = document.createElement('div');
    div.className = 'no-result ' + (passed ? 'pass' : 'again');
    const attempts = hist.map(h=> h.correct?'✅':(h.exhausted?'⚪':'❌')).join('');
    div.innerHTML = `
      <div class="big">${n}번</div>
      <div class="attempt-list">${attempts}</div>
      <div class="lbl">${passed ? '통과!' : '다음 차시'}</div>
    `;
    board.appendChild(div);
  });
  // setup buttons
  const nextBtn = document.getElementById('nextRoundBtn');
  const finishBtn = document.getElementById('finishBtn');
  if(stillWrong.length === 0){
    nextBtn.style.display = 'none';
    finishBtn.style.display = 'block';
    finishBtn.textContent = '🏆 모든 번호 통과! 결과 보기 →';
    finishBtn.classList.remove('btn');
    finishBtn.classList.add('btn','btn-good');
    finishBtn.style.background = '';
  } else {
    nextBtn.style.display = 'block';
    nextBtn.textContent = `▶️ ${stillWrong.length}개 번호 다시 도전 (${currentRound+1}차)`;
    finishBtn.style.display = 'block';
    finishBtn.textContent = '중단하고 결과 보기';
  }
  // store for next round
  window._pendingNext = stillWrong;
  show('resultScreen');
}

function startNextRound(){
  const stillWrong = window._pendingNext || [];
  if(stillWrong.length === 0){ finishAll(); return; }
  activeNos = stillWrong.slice();
  currentRound++;
  buildRound();
}
window.startNextRound = startNextRound;

function finishAll(){
  // build final board
  const board = document.getElementById('finalBoard');
  board.innerHTML = '';
  // include all originally selected numbers, not just last activeNos
  Array.from(selectedNos).sort((a,b)=>+a-+b).forEach(n=>{
    const hist = perNoHistory[n] || [];
    if(hist.length === 0) return;
    const last = hist[hist.length-1];
    const passed = last.correct || last.exhausted;
    const attempts = hist.map(h=> h.correct?'✅':(h.exhausted?'⚪':'❌')).join('');
    const div = document.createElement('div');
    div.className = 'no-result ' + (passed ? 'pass' : 'again');
    div.innerHTML = `
      <div class="big">${n}번</div>
      <div class="attempt-list">${attempts}</div>
      <div class="lbl">${passed ? '통과!' : `${hist.length}회 시도`}</div>
    `;
    board.appendChild(div);
  });
  // final firebase save
  if(window._fbSave){
    const elapsedMin = Math.round((Date.now()-t0)/60000);
    const passed = Array.from(selectedNos).filter(n=>{
      const h = perNoHistory[n] || [];
      const last = h[h.length-1];
      return last && (last.correct || last.exhausted);
    }).length;
    window._fbSave({
      submittedAt: new Date().toISOString(),
      studentName: studentName,
      school: studentSchool,
      score: Math.round(passed/selectedNos.size*100),
      correct: passed,
      wrong: selectedNos.size - passed,
      total: selectedNos.size,
      elapsedMin: elapsedMin,
      quizType: '고2_26년6월_총괄_번호반복_최종',
      totalRounds: currentRound,
      history: perNoHistory,
    });
  }
  show('doneScreen');
}
window.finishAll = finishAll;
</script>
