<script>
// =================================================================
// PASSAGES: 21강·22강·Test02
// 각 지문: q1 = 어휘 추론 (5지선다), q2 = 어법·어휘 brackets (다수)
// =================================================================
const PASSAGES = {
  '21-Lead': {
    lesson: '21', title: '21강 ▶ 빈칸추론 (2026 6월 평가 34번) - Geography',
    fullKo: `지리학과 떼려야 뗄 수 없게 연관된 한 단어가 있다: 어디. 그것은 지리학이 지구 표면에서 무언가가 어디서 일어나는지가 중요하다는 전제에서 시작하기 때문이다. 그러나 핵심 질문은 단순히 "어디서"라는 질문만이 아니다; 그것은 "왜 거기서"와 "그래서 어쩌라고"라는 질문들이다. 그러한 질문에 도달하는 것은 공간적 배열, 차이, 그리고 상호 연결을 진지하게 받아들이는 것을 의미한다. 가장 단순한 일상 활동에 참여하는 것조차도 공간적 상황 — 음식과 서비스를 어디에서 찾을지, 일터에 어떻게 갈지 등 — 에 대한 어느 정도의 이해를 요구한다. 규모를 더 크게 하면, 현상들이 지구 표면에서 어떻게 배열되어 있는지에 대한 어느 정도의 인식이 없이는, 합리적인 사업 또는 정책 판단을 내리는 것, 사건을 이해하는 것, 또는 행성에서의 삶을 형성하는 기본적인 힘들 일부를 파악하는 것이 어렵다. 새로운 상점이나 공공 서비스의 위치를 정하는 것은 인구 분포, 도로와 공공시설의 위치, 사회 경제적 양상 등을 고려하는 것을 요구한다. 왜 그리고 어디에서 이주가 일어나는지를 이해하는 것은 영토의 정치적 조직, 차별의 공간적 결과, 사회 경제적 양상, 그리고 물리적 환경의 배치를 고려하는 것을 요구한다.`,
    fullEn: `One word is inextricably associated with geography: where. That is because geography starts from the premise that it matters where something takes place on Earth's surface. The key questions are not simply "where" questions, though; they are "why there" and "so what" questions. Getting to such questions means taking spatial arrangements, variations, and interconnections seriously. Engaging in even the simplest day-to-day activity requires some appreciation of spatial circumstances ― where to find food and services, how to get to work places, and the like. Moving up in scale, without some awareness of how phenomena are arranged on Earth's surface, it is difficult to make reasoned business or policy judgments, make sense of events, or grasp some of the basic forces shaping life on the planet. Locating a new store or public service requires taking into consideration population distributions, the location of roads and utilities, socio-economic patterns, and more. Understanding why and where migration happens requires consideration of the political organization of territory, the spatial consequences of discrimination, socio-economic patterns, and the layout of the physical environment.`,
    q1: [{
      options: [
        {letter:'a', text:'inextricably'},
        {letter:'b', text:'premise'},
        {letter:'c', text:'reasoned'},
        {letter:'d', text:'easy', correct:'difficult', isWrong:true},
        {letter:'e', text:'discrimination'}
      ]
    }],
    q2: [
      {s:`One word [is / are] inextricably associated with geography: where.`, correctIdx:0, point:'주어-동사 수일치 (One word = 단수)'},
      {s:`That is because geography [start / starts] from the premise that it matters where something takes place on Earth's surface.`, correctIdx:1, point:'3인칭 단수 (geography starts)'},
      {s:`Getting to such questions [mean / means] taking spatial arrangements, variations, and interconnections seriously.`, correctIdx:1, point:'동명사 주어 + 단수 동사'},
      {s:`Engaging in even the simplest day-to-day activity requires some [appreciation / depreciation] of spatial circumstances.`, correctIdx:0, point:'어휘 (이해/감상 vs 평가절하)'},
      {s:`Moving up in scale, without some awareness of how phenomena [arrange / are arranged] on Earth's surface, it is difficult to make reasoned business or policy judgments.`, correctIdx:1, point:'수동태 (phenomena are arranged)'},
      {s:`Moving up in scale, ..., it is difficult [make / to make] reasoned business or policy judgments.`, correctIdx:1, point:'가주어 it + to부정사'},
      {s:`Locating a new store or public service [require / requires] taking into consideration population distributions.`, correctIdx:1, point:'동명사 주어 + 단수 동사'},
      {s:`Understanding why and where migration happens requires consideration of the political organization of territory, the spatial consequences of [discrimination / appreciation], socio-economic patterns, and the layout of the physical environment.`, correctIdx:0, point:'어휘 (차별의 공간적 결과)'}
    ]
  },
  '21-01': {
    lesson:'21', title:'21강 ▶ 01 주제 추론 - Spatially Explicit Methods',
    fullEn:`Perhaps nothing has revolutionized the study of human-environment interactions more than the development of spatially explicit methods for collecting and analyzing data. Just a few decades ago, most natural and social scientists collected their data without precise spatial referents. References were made to watersheds, to communities, to villages, to cities, to proximity to rivers, and so on. In some cases (in anthropology mostly), there was even the custom of changing the name of the community and even its location, "to protect the informants." While confidentiality remains an important concern when working with human subjects, the extreme to which this was done was largely unjustified. Everyone knew more or less where these studied communities were, and anyone interested could have found out. Be that as it may, there was very little interest, except in geography, to precisely locate a study area on a map with coordinates. Geography persisted, and finally convinced the rest of us, that place was fundamentally important to understand human-environment dynamics.`,
    q1:[{options:[
      {letter:'a', text:'revolutionized'},
      {letter:'b', text:'precise'},
      {letter:'c', text:'confidentiality'},
      {letter:'d', text:'justified', correct:'unjustified', isWrong:true},

      {s:`Just a few decades ago, most natural and social scientists [collect / collected] their data without precise spatial referents.`, correctIdx:1, point:'과거시제 (a few decades ago)'},

      {s:`In some cases, there was even the custom of [change / changing] the name of the community.`, correctIdx:1, point:'전치사 of + 동명사'},
      {s:`the extreme [which / to which] this was done was largely unjustified.`, correctIdx:1, point:'전치사 + 관계대명사'},
      {s:`Everyone [know / knew] more or less where these studied communities were.`, correctIdx:1, point:'과거시제'},
      {s:`there was very little interest, except in geography, [to precisely locate / precisely locating] a study area on a map.`, correctIdx:0, point:'interest + to부정사'},
      {s:`Geography persisted, and finally convinced the rest of us, [that / what] place was fundamentally important to understand human-environment dynamics.`, correctIdx:0, point:'접속사 that'}
    ]
  },

    fullEn:`What is soft-path river engineering? One way to visualize its spirit is to liken it to a footpath in the forest. Suppose a tree falls across a footpath. A soft-path response would be simply to redirect the trail around the fallen tree. A more interventionist response would be to remove the tree and restore the original route. A still more interventionist response might be to straighten and pave the path to insert it more permanently in the landscape. The true high-modernist step would, of course, be to create a superhighway that removes the landscape and bulldozes straight through all obstacles in the topography. Soft-path engineering has the unique advantage of intellectual modesty with respect to what we actually know about river movement and its environmental effects. In contrast to hard-path engineering, soft-path engineering accepts variability in the river's movement as significant until proven otherwise. Backwaters, short-lived wetlands, braids and channels, swamps — all undesirable to hard-path engineering — are presumed by soft-path engineers to be ecologically important.`,

    fullEn:`Connectivity, the capacity of a landscape to support movement by any given species across the landscape, is of increasing concern for conservation biologists. As the connectivity of a landscape increases from the human perspective (generally through increases in road networks), connectivity decreases for many other species. Although we may see many species of animals moving across human landscapes (e.g. deer, wolves, and turtles crossing roads or wandering through our backyards), landscapes substantially altered for human use act as barriers to movement of both animal and plant species. In some cases, these barriers are incomplete — many turtles die on roads, but some make it across. In other cases, passage is essentially impossible — cities along landscape corridors such as river valleys can effectively eliminate genetic exchange between previously connected plant and animal populations; dams can permanently halt spawning of fish by blocking travel to their breeding grounds. Thus, lack of connectivity can decrease the conservation value of remaining habitat below what its mapped area might suggest, increasing the impact of fragmentation.`,

const PASSAGE_ORDER = Object.keys(PASSAGES);

let userName='', userSchool='';
let selectedRefs = new Set();
let selectedTypes = new Set([1,2]);
let doneRefs = new Set();
let filterMode = 'all';
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], allResults=[], answered=false, t0=0;

const QUIZ_ID = 'jongchonko_3grade_suteuk_21_22_test2';
const _DAY_KEY = (function(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
const _PROG_KEY = 'bn_prog_'+QUIZ_ID;
function _saveProg(){try{localStorage.setItem(_PROG_KEY, JSON.stringify({day:_DAY_KEY, doneRefs:Array.from(doneRefs)}));}catch(e){}}
function _loadProg(){
  try{
    const raw = localStorage.getItem(_PROG_KEY); if(!raw) return;
    const data = JSON.parse(raw);
    if(data.day !== _DAY_KEY){localStorage.removeItem(_PROG_KEY); return;}
    if(Array.isArray(data.doneRefs)) doneRefs = new Set(data.doneRefs);
  }catch(e){}
}

function goPassageSelect(){
  userSchool = document.getElementById('si').value;
  userName = document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!'); return;}
  if(!userName){alert('이름을 입력해주세요!'); return;}
  try{localStorage.setItem('bomnal_name',userName); localStorage.setItem('bomnal_school',userSchool);}catch(e){}
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('userInfo').textContent = userName+' · '+userSchool;
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function toggleType(t, btn){
  if(selectedTypes.has(t)) selectedTypes.delete(t);
  else selectedTypes.add(t);
  btn.classList.toggle('on');
  renderPassageGrid();
}

function filterLesson(mode, btn){
  filterMode = mode;
  document.querySelectorAll('.lesson-tabs .lt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPassageGrid();
}

function refInLesson(ref){
  if(filterMode === 'all') return true;
  return PASSAGES[ref].lesson === filterMode;
}

function renderPassageGrid(){
  const grid = document.getElementById('passageGrid');
  grid.innerHTML = '';
  PASSAGE_ORDER.forEach(ref=>{
    if(!refInLesson(ref)) return;
    const p = PASSAGES[ref];
    let count = 0;
    [1,2].forEach(t=>{ if(selectedTypes.has(t) && p['q'+t]) count += p['q'+t].length; });
    const d = document.createElement('div');
    d.className = 'p-card'+(selectedRefs.has(ref)?' sel':'')+(doneRefs.has(ref)?' done':'');
    d.onclick = ()=>togglePassage(ref);
    d.innerHTML = `<div class="p-no">${ref}</div><div class="p-type">${p.title.split('▶')[1]?.trim().split('-')[0]?.trim()||''}</div><div class="p-count">${count}문항</div>`
      +(doneRefs.has(ref)?'<span class="p-badge done-badge">완료✓</span>':'')
      +(selectedRefs.has(ref)&&!doneRefs.has(ref)?'<span class="p-badge" style="background:#ede7f6;color:#5e35b1;">선택</span>':'');
    grid.appendChild(d);
  });
}

function togglePassage(ref){
  if(selectedRefs.has(ref)) selectedRefs.delete(ref);
  else selectedRefs.add(ref);
  renderPassageGrid();
}

function selectAll(){
  const visible = PASSAGE_ORDER.filter(r=>refInLesson(r));
  const allSel = visible.every(r=>selectedRefs.has(r));
  visible.forEach(r=>{ if(allSel) selectedRefs.delete(r); else selectedRefs.add(r); });
  renderPassageGrid();
}

function shuffle(arr){const b=[...arr]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b;}

function startQuiz(){
  if(selectedRefs.size === 0){alert('지문을 하나 이상 선택하세요!'); return;}
  if(selectedTypes.size === 0){alert('문제 유형을 하나 이상 선택하세요!'); return;}
  qs = [];
  PASSAGE_ORDER.forEach(ref=>{
    if(!selectedRefs.has(ref)) return;
    const p = PASSAGES[ref];
    [1,2].forEach(t=>{
      if(!selectedTypes.has(t)) return;
      const arr = p['q'+t] || [];
      arr.forEach((q,qi)=>{
        qs.push({...q, type:t, pno:ref, qi:qi+1, passageTitle:p.title, fullKo:p.fullKo, fullEn:p.fullEn});
      });
    });
  });
  qs = shuffle(qs);
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent = userName+' · '+selectedRefs.size+'개 지문 · '+qs.length+'문항';
  showQ();
}

function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showQ(){
  if(idx >= qs.length){showResult(); return;}
  answered = false;
  const q = qs[idx];
  document.getElementById('pf').style.width = (idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent = (idx+1)+'/'+qs.length;
  const area = document.getElementById('quizArea');
  if(q.type === 1) renderType1(area, q);
  else if(q.type === 2) renderType2(area, q);
}

// ====== Type 1: 어휘 추론 5지선다 (5 underlined, pick the wrong one) ======
function renderType1(area, q){
  let displayEn = escHTML(q.fullEn);
  q.options.forEach(opt=>{
    const findText = opt.correct || opt.text;
    const escapedFind = escHTML(findText);
    const escapedDisplay = escHTML(opt.text);
    const replacement = '<span class="ulopt"><span class="ulopt-label">'+opt.letter+'</span><span class="ulopt-text">'+escapedDisplay+'</span></span>';
    const idx2 = displayEn.indexOf(escapedFind);
    if(idx2 === -1){
      displayEn += ' <span style="color:#c62828;font-size:10px;">[⚠️ '+escapedFind+' not found]</span>';
    } else {
      displayEn = displayEn.substring(0, idx2) + replacement + displayEn.substring(idx2 + escapedFind.length);
    }
  });
  const correctIdx = q.options.findIndex(o=>o.isWrong);
  const wrongOpt = q.options[correctIdx];
  const correctMsg = '('+wrongOpt.letter+') '+wrongOpt.text+' → '+wrongOpt.correct;
  const choiceHTML = q.options.map((opt,i)=>
    '<button class="cb" data-idx="'+i+'"><span class="cn">'+opt.letter+'</span><span>('+opt.letter+') '+escHTML(opt.text)+'</span></button>'
  ).join('');
  area.innerHTML = '<div class="qc">' +
    '<div class="q-no-badge">' +
      '<span class="qno">'+q.pno+'</span>' +
      '<span class="qtype qtype-1">🔍 어휘 추론</span>' +
    '</div>' +
    '<div class="en-box"><div class="en-label">📖 PASSAGE</div>'+displayEn+'</div>' +
    '<div class="q-prompt">⬛ 다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적절하지 않은 것은?</div>' +
    '<div class="choices" id="qChoices">'+choiceHTML+'</div>' +
    '<div class="fb-msg" id="fb"></div>' +
  '</div>';
  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click', ()=>checkChoice(b, parseInt(b.dataset.idx), correctIdx, correctMsg));
  });
}

// ====== Type 2: 어법·어휘 2지선다 (괄호 안 옳은 것 고르기) ======
function renderType2(area, q){
  // q.s contains "[opt1 / opt2]"
  const match = q.s.match(/\[(.+?) \/ (.+?)\]/);
  if(!match){
    area.innerHTML = '<div class="qc">⚠️ 데이터 오류: 괄호 형식이 잘못되었습니다.</div>';
    return;
  }
  const optA = match[1].trim();
  const optB = match[2].trim();
  const correctVal = q.correctIdx === 0 ? optA : optB;
  // 버튼 순서 랜덤
  const shouldSwap = Math.random() < 0.5;
  const buttonOrder = shouldSwap ? [optB, optA] : [optA, optB];
  const correctBtnIdx = buttonOrder.indexOf(correctVal);

  // 본문에서 [opt1 / opt2] 부분을 시각적 강조
  const sentenceHTML = escHTML(q.s).replace(/\[(.+?) \/ (.+?)\]/,
    '<span class="binary-pair">[$1 / $2]</span>');

  const choiceHTML = buttonOrder.map((opt,i)=>
    '<button class="cb" data-idx="'+i+'"><span class="cn">'+String.fromCharCode(65+i)+'</span><span>'+escHTML(opt)+'</span></button>'
  ).join('');
  area.innerHTML = '<div class="qc">' +
    '<div class="q-no-badge">' +
      '<span class="qno">'+q.pno+'</span>' +
      '<span class="qtype qtype-2">⚖️ 어법·어휘</span>' +
    '</div>' +
    '<div class="en-box"><div class="en-label">📖 SENTENCE</div>'+sentenceHTML+'</div>' +
    '<div class="q-prompt">⬛ 괄호 안에서 어법·어휘에 맞는 것을 고르세요</div>' +
    '<div class="choices" id="qChoices">'+choiceHTML+'</div>' +
    '<div class="fb-msg" id="fb"></div>' +
  '</div>';
  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click', ()=>{
      const msg = correctVal + (q.point ? ' (포인트: '+q.point+')' : '');
      checkChoice(b, parseInt(b.dataset.idx), correctBtnIdx, msg);
    });
  });
}

// 공통 채점
function checkChoice(btn, sel, correctIdx, correctMsg){
  if(answered) return;
  answered = true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled = true);
  const fb = document.getElementById('fb');
  const q = qs[idx];
  const myAns = btn.querySelector('span:last-child').textContent;
  if(sel === correctIdx){
    btn.classList.add('correct');
    fb.className = 'fb-msg ok'; fb.textContent = '✅ 정답! '+correctMsg;
    cor++;
    allResults.push({pno:q.pno, type:q.type, qi:q.qi, correct:true, my:myAns, ans:correctMsg});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.cb').forEach(b=>{ if(parseInt(b.dataset.idx) === correctIdx) b.classList.add('reveal'); });
    fb.className = 'fb-msg no'; fb.textContent = '❌ 오답! 정답: '+correctMsg;
    wrn++;
    const typeLabel = {1:'어휘추론',2:'어법어휘'}[q.type];
    wrongs.push({label:q.pno+' · '+typeLabel, my:myAns, correct:correctMsg});
    allResults.push({pno:q.pno, type:q.type, qi:q.qi, correct:false, my:myAns, ans:correctMsg});
  }
  setTimeout(()=>{idx++; showQ();}, sel===correctIdx?1000:2400);
}

let wrongQs = [];

function showResult(){
  document.getElementById('pf').style.width = '100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total = idx, pct = total>0?Math.round(cor/total*100):0;
  const el = Math.round((Date.now()-t0)/60000);
  selectedRefs.forEach(r=>doneRefs.add(r));
  _saveProg();
  const wrongSet = new Set(allResults.filter(r=>!r.correct).map(r=>r.pno+'_'+r.type+'_'+r.qi));
  wrongQs = qs.filter(q=>wrongSet.has(q.pno+'_'+q.type+'_'+q.qi));

  const wHTML = wrongs.length>0
    ? '<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.label+'</div><div class="wid">내 답: '+w.my+' → 정답: '+w.correct+'</div></div>').join('')+'</div>'
    : '<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';
  const retryBtn = wrongs.length>0
    ? `<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';
  const rs = document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML = `<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">종촌고 수특 · ${selectedRefs.size}개 지문 · ${total}문항</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#5e35b1;">${total}</div><div class="sl">총문항</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;
  if(window._fbSave) window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: userName, school: userSchool,
    score: pct, correct: cor, wrong: wrn, total: total, elapsedMin: el,
    quizType: '종촌고_수특_21_22_Test02',
    passages: [...selectedRefs].sort(),
    types: [...selectedTypes].sort(),
    details: allResults.map(r=>({
      지문: r.pno, 유형: {1:'어휘추론',2:'어법어휘'}[r.type], 번호: r.qi,
      결과: r.correct?'✅정답':'❌오답', 내답: r.my, 정답: r.ans
    })),
    wrongWords: wrongs.map(w=>({label:w.label, my:w.my, correct:w.correct}))
  });
}

function retryWrongs(){
  if(wrongQs.length === 0) return;
  qs = [...wrongQs];
  idx=0; cor=0; wrn=0; wrongs=[]; allResults=[]; answered=false; t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('hs').textContent = userName+' · 오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selectedRefs.clear();
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

window.goPassageSelect = goPassageSelect;
window.toggleType = toggleType;
window.filterLesson = filterLesson;
window.selectAll = selectAll;
window.startQuiz = startQuiz;
window.retryWrongs = retryWrongs;
window.goBack = goBack;

window.addEventListener('DOMContentLoaded', ()=>{
  const n = localStorage.getItem('bomnal_name');
  const s = localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value = n;
  if(s){
    const sel = document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value && s.includes(sel.options[i].value)){sel.value = sel.options[i].value; break;}
    }
  }
  _loadProg();
});
</script>
</body>
</html>
