*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;color:#1a1a2e;}
.hidden{display:none!important;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lcard{background:#fff;border-radius:24px;padding:40px 32px;text-align:center;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(21,101,192,.13);}
.lcard h1{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--pri);margin-bottom:4px;}
.lcard .sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
.ni{width:100%;padding:12px 14px;border:2px solid var(--bdr);border-radius:12px;font-size:14px;font-family:'Nanum Gothic',sans-serif;outline:none;margin-bottom:10px;}
.ni:focus{border-color:var(--pri);}
.btn-p{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1565c0,#f57f17);color:#fff;font-family:'Nanum Gothic',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.btn-p:hover{opacity:.9;}

/* HUB */
/* hubScreen은 아래 sel-bar 블록에서 재정의 */
.hub-hdr{background:#1565c0;color:#fff;border-radius:16px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.hub-hdr h2{font-family:'Black Han Sans',sans-serif;font-size:16px;}
.hub-hdr .badge{background:rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;}
.full-btn{display:flex;align-items:center;gap:14px;background:#fff;border:2px solid var(--pri);border-radius:16px;padding:18px 20px;width:100%;cursor:pointer;margin-bottom:20px;transition:all .15s;font-family:'Nanum Gothic',sans-serif;}
.full-btn:hover{background:#e3f2fd;transform:translateY(-2px);box-shadow:0 6px 20px rgba(21,101,192,.15);}
.full-icon{font-size:30px;}
.full-info{flex:1;text-align:left;}
.full-info h3{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--pri);}
.full-info p{font-size:11px;color:var(--muted);margin-top:3px;}
.full-badge{background:var(--pri);color:#fff;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:800;white-space:nowrap;}
.sec-title{font-family:'Black Han Sans',sans-serif;font-size:13px;color:#888;margin-bottom:10px;padding-left:2px;}
.num-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:28px;}
.num-card{background:#fff;border:2px solid var(--bdr);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s;text-align:left;}
.num-card:hover{border-color:var(--pri);background:#e3f2fd;transform:translateY(-2px);box-shadow:0 4px 14px rgba(21,101,192,.12);}
.num-card.chk{border-color:var(--pri);background:#bbdefb;box-shadow:0 0 0 3px #90caf9;}
.num-card.chk .num-no{color:#0d47a1;}
.num-no{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--pri);}
.num-cnt{font-size:11px;color:var(--muted);margin-top:1px;}
.num-preview{font-size:9px;color:#aaa;margin-top:4px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.num-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--bdr);background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;float:right;margin:-2px -2px 4px 4px;flex-shrink:0;transition:all .15s;}
.num-card.chk .num-chk{background:var(--pri);border-color:var(--pri);color:#fff;}
/* 하단 고정 선택학습 바 */
.sel-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;gap:10px;z-index:200;box-shadow:0 -4px 16px rgba(21,101,192,.12);transform:translateY(100%);transition:transform .25s;}
.sel-bar.show{transform:translateY(0);}
.sel-bar-info{flex:1;font-size:13px;font-weight:800;color:var(--pri);}
.sel-bar-info span{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px;}
.sel-bar-btns{display:flex;gap:8px;}
.sbb{padding:9px 16px;border:none;border-radius:9px;font-family:'Nanum Gothic',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.sbb-p{background:linear-gradient(135deg,#1565c0,#f57f17);color:#fff;}
.sbb-g{background:#e3f2fd;color:var(--pri);border:1.5px solid var(--bdr);}
#hubScreen{padding:20px 20px 80px;max-width:680px;margin:0 auto;}

/* MODE */

.mcard .msub{font-size:12px;color:var(--muted);margin-bottom:18px;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.mc{background:var(--bg);border:2px solid var(--bdr);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;text-align:left;}

.mc.sel{box-shadow:0 0 0 3px #90caf9;}
.mc .mi{font-size:22px;margin-bottom:5px;}
.mc .mt{font-size:12px;font-weight:800;color:var(--pri);}
.mc .md{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4;}
.back-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px;}

.hs{font-size:10px;opacity:.7;margin-top:1px;}
.hb{background:rgba(255,255,255,.2);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;}
.pw{height:4px;background:#bbdefb;}.pf{height:100%;background:linear-gradient(90deg,#1565c0,#f57f17);transition:width .4s;}

/* QUIZ */

.qc{background:#fff;border-radius:18px;padding:22px 18px;margin-bottom:12px;box-shadow:0 4px 18px rgba(21,101,192,.07);}
.qb{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:800;margin-bottom:7px;}
.qb.s{background:#e8f5e9;color:#2e7d32;}.qb.j{background:#e3f2fd;color:#0d47a1;}
.qstep{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:700;}
.timer-row{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
.timer-bar{flex:1;height:5px;background:#e3f2fd;border-radius:3px;overflow:hidden;}
.timer-fill{height:100%;background:linear-gradient(90deg,#1565c0,#f57f17);transition:width .1s linear;}
.timer-num{font-size:11px;font-weight:800;color:var(--pri);min-width:18px;text-align:right;}
.qw{font-size:24px;font-weight:800;color:var(--pri);margin-bottom:3px;font-family:'Black Han Sans',sans-serif;}
.qk{font-size:12px;color:var(--muted);margin-bottom:10px;}
.qp{font-size:13px;color:#1a3a5c;background:#e3f2fd;padding:8px 11px;border-radius:8px;margin-bottom:11px;font-weight:700;}
.choices{display:grid;gap:7px;}
.cb{background:var(--bg);border:2px solid var(--bdr);border-radius:9px;padding:10px 13px;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:8px;}

.cb.correct{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;}
.cb.wrong{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.cn{width:20px;height:20px;border-radius:50%;background:#90caf9;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.jbtns{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.jb{padding:16px;border:2px solid var(--bdr);border-radius:11px;background:var(--bg);font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;}

.jb.sb{border-color:#4caf50;color:#2e7d32;}.jb.ab{border-color:#e91e63;color:#880e4f;}
.jb.correct{background:#e8f5e9;}.jb.wrong{background:#ffebee;}

// Firestore REST API 방식 — CDN 없이 직접 저장
const _FB_PROJECT = 'bomnalvaca';
const _FB_KEY     = 'AIzaSyCxS524S8KAaF87DomPtl9sJdF-eqes404';
const _FB_URL     = `https://firestore.googleapis.com/v1/projects/${_FB_PROJECT}/databases/(default)/documents/quiz_results`;

const _save = async d => {
  try {
    const toVal = v => {
      if(v===null||v===undefined) return {nullValue:null};
      if(typeof v==='number')  return Number.isInteger(v)?{integerValue:v}:{doubleValue:v};
      if(typeof v==='boolean') return {booleanValue:v};
      if(Array.isArray(v))     return {arrayValue:{values:v.map(toVal)}};
      if(typeof v==='object')  return {mapValue:{fields:Object.fromEntries(Object.entries(v).map(([k,val])=>[k,toVal(val)]))}};
      return {stringValue:String(v)};
    };
    const fields = Object.fromEntries(Object.entries(d).map(([k,v])=>[k,toVal(v)]));
    await fetch(`${_FB_URL}?key=${_FB_KEY}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({fields})
    });
  } catch(e){ console.warn('저장 오류:',e); }
};
</script>

const VALID=ALL_WORDS.filter(w=>w.syn.length>=1);
const NUMS=[...new Set(ALL_WORDS.map(w=>w.no))].sort((a,b)=>a-b);
const NUM_LABEL={41:"41~42번",43:"43~45번"};

let studentName='',studentSchool='',mode='A',selectedNos=null,checkedNos=new Set();
let qs=[],idx=0,cor=0,wrn=0,wrongs=[],t0=0;
let timerInterval=null,timerLeft=10;
let _answered=false;
let doneNos=new Set(); // 오늘 완료한 번호_모드 (예: "41_A")

// === 오늘 진행 기록 저장 ===
const QUIZ_ID='mock_go1_2025_06_voca';
const _DAY_KEY=(function(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
const _PROG_KEY='bn_prog_'+QUIZ_ID;
function _saveProg(){
  try{localStorage.setItem(_PROG_KEY, JSON.stringify({day:_DAY_KEY, doneNos:Array.from(doneNos)}));}catch(e){}
}
function _loadProg(){
  try{
    const raw=localStorage.getItem(_PROG_KEY); if(!raw) return;
    const data=JSON.parse(raw);
    if(data.day!==_DAY_KEY){localStorage.removeItem(_PROG_KEY); return;}
    if(Array.isArray(data.doneNos)) doneNos=new Set(data.doneNos);
  }catch(e){}
}
function _cleanupOldProgress(){
  try{
    for(let i=localStorage.length-1;i>=0;i--){
      const k=localStorage.key(i);
      if(k && k.startsWith('bn_prog_')){
        try{const v=JSON.parse(localStorage.getItem(k)); if(v.day!==_DAY_KEY) localStorage.removeItem(k);}
        catch(e){localStorage.removeItem(k);}
      }
    }
  }catch(e){}
}

function doLogin(){
  const s=document.getElementById('si').value,n=document.getElementById('ni').value.trim();
  if(!s){alert('학교를 선택해주세요!');return;}
  if(!n){alert('이름을 입력해주세요!');return;}
  studentSchool=s;studentName=n;
  _cleanupOldProgress();
  _loadProg();
  document.getElementById('loginScreen').classList.add('hidden');
  renderHub();document.getElementById('hubScreen').classList.remove('hidden');
}

function renderHub(){
  const total=VALID.length;
  document.getElementById('hubUser').textContent=studentName+' · '+studentSchool;
  document.getElementById('hubBadge').textContent='총 '+total+'개 단어';
  document.getElementById('fullDesc').textContent='18~45번 전체 '+total+'개 단어 랜덤 퀴즈';
  const grid=document.getElementById('numGrid');grid.innerHTML='';
  checkedNos=new Set();
  NUMS.forEach(no=>{
    const words=VALID.filter(w=>w.no===no);if(!words.length)return;
    const label=(NUM_LABEL[no]||(no+'번'));
    const preview=words.slice(0,3).map(w=>w.eng).join(', ')+(words.length>3?'...':'');
    const card=document.createElement('div');card.className='num-card';
    card.dataset.no=no;
    const doneA=doneNos.has(no+'_A'), doneB=doneNos.has(no+'_B');
    const doneBadges=(doneA||doneB)?`<div style="margin-top:6px;font-size:10px;font-weight:800;">${doneA?'<span style="background:#e8f5e9;color:#2e7d32;padding:1px 6px;border-radius:8px;margin-right:3px;">✓ A 완료</span>':''}${doneB?'<span style="background:#e3f2fd;color:#1565c0;padding:1px 6px;border-radius:8px;">✓ B 완료</span>':''}</div>`:'';
    card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;"><div class="num-no">${label}</div><div class="num-chk" id="chk${no}"></div></div><div class="num-cnt">${words.length}개 단어</div><div class="num-preview">${preview}</div>${doneBadges}`;
    card.onclick=()=>toggleCard(no,card);
    // 길게 누르면 바로 단독 학습
    card.ondblclick=(e)=>{e.stopPropagation();openMode([no],label);};
    grid.appendChild(card);
  });
  updateSelBar();
}
function toggleCard(no,card){
  if(checkedNos.has(no)){checkedNos.delete(no);card.classList.remove('chk');document.getElementById('chk'+no).textContent='';}
  else{checkedNos.add(no);card.classList.add('chk');document.getElementById('chk'+no).textContent='✓';}
  updateSelBar();
}
function updateSelBar(){
  const bar=document.getElementById('selBar');
  const info=document.getElementById('selBarInfo');
  if(checkedNos.size===0){
    bar.classList.remove('show');
    info.textContent='번호를 선택하세요';
  }else{
    bar.classList.add('show');
    const totalWords=VALID.filter(w=>checkedNos.has(w.no)).length;
    const nos=[...checkedNos].sort((a,b)=>a-b).map(n=>NUM_LABEL[n]||(n+'번')).join(', ');
    info.innerHTML=`<strong>${checkedNos.size}개 번호</strong> <span>· ${totalWords}개 단어 · ${nos}</span>`;
  }
}
function clearSel(){
  checkedNos=new Set();
  document.querySelectorAll('.num-card').forEach(c=>{c.classList.remove('chk');});
  document.querySelectorAll('[id^="chk"]').forEach(c=>{c.textContent='';});
  updateSelBar();
}
function openSelMode(){
  if(checkedNos.size===0)return;
  const nos=[...checkedNos].sort((a,b)=>a-b);
  const label=nos.map(n=>NUM_LABEL[n]||(n+'번')).join('+');
  openMode(nos,label);
}
function goHub(){
  ['modeScreen','hdr','pw','quizArea','resultScreen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('hubScreen').classList.remove('hidden');
  updateSelBar();
}
function openMode(nos,label){
  selectedNos=nos;
  document.getElementById('modeTitle').textContent=(nos?label+' 학습':'전체 단어 학습');
  const cnt=nos?VALID.filter(w=>nos.includes(w.no)).length:VALID.length;
  document.getElementById('modeSub').textContent=cnt+'개 단어 · 모드를 선택하세요';
  document.getElementById('selBar').classList.remove('show');
  document.getElementById('hubScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
  mode='A';document.querySelectorAll('.mc').forEach(c=>c.classList.remove('sel'));
  document.querySelectorAll('.mc')[0].classList.add('sel');
}
function selMode(m,el){mode=m;document.querySelectorAll('.mc').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}


function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startQuiz(){
  document.getElementById('modeScreen').classList.add('hidden');
  const pool=selectedNos?VALID.filter(w=>selectedNos.includes(w.no)):VALID;
  const label=selectedNos?selectedNos.map(n=>NUM_LABEL[n]||(n+'번')).join('+'):'전체';
  if(mode==='A'){
    const sample=shuf(pool).slice(0,Math.min(pool.length,20));
    qs=sample.flatMap(w=>([{type:'M',word:w},{type:'S',word:w}]));
  }else{
    const p=[];
    pool.forEach(w=>{
      if(w.syn.length>0)p.push({type:'J',w1:w.eng,w2:w.syn[0],rel:'syn',kor:w.kor,no:w.no});
      if(w.ant.length>0)p.push({type:'J',w1:w.eng,w2:w.ant[0],rel:'ant',kor:w.kor,no:w.no});
    });
    qs=shuf(p).slice(0,Math.min(p.length,30));
  }
  idx=0;cor=0;wrn=0;wrongs=[];t0=Date.now();
  document.getElementById('hdrTitle').textContent='📝 고1 25년 6월 · '+label;
  document.getElementById('hs').textContent=studentName+' · '+(mode==='A'?'유의어 찾기':'관계 판별');
  ['hdr','pw','quizArea'].forEach(id=>document.getElementById(id).classList.remove('hidden'));
  document.getElementById('resultScreen').classList.add('hidden');
  showQ();
}

function startTimer(){
  clearInterval(timerInterval);timerLeft=10;
  timerInterval=setInterval(()=>{
    timerLeft-=0.1;
    const pct=Math.max(0,timerLeft/10*100);
    const f=document.getElementById('timerFill'),n=document.getElementById('timerNum');
    if(f)f.style.width=pct+'%';if(n)n.textContent=Math.max(0,Math.ceil(timerLeft));
    if(timerLeft<=0){clearInterval(timerInterval);autoTO();}
  },100);
}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  _answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');

  const timerHtml=`<div class="timer-row"><div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div><div class="timer-num" id="timerNum">10</div></div>`;

  if(q.type==='M'){
    const ck=q.word.kor;
    const dis=shuf(VALID.filter(w=>w.kor!==ck).map(w=>w.kor)).slice(0,3);
    const ch=shuf([ck,...dis]);
    area.innerHTML=`<div class="qc"><div class="qb s">1단계 · 뜻 찾기</div><div class="qstep">${idx+1} / ${qs.length}</div>${timerHtml}<div class="qw">${q.word.eng}</div><div class="qp">이 단어의 뜻은?</div><div class="choices" id="ch"></div><div class="fb" id="fb"></div></div>`;
    ch.forEach((c,i)=>{
      const b=document.createElement('button');b.className='cb';
      b.innerHTML=`<span class="cn">${i+1}</span>${c}`;
      b.onclick=()=>{
        if(_answered)return;_answered=true;clearInterval(timerInterval);
        document.querySelectorAll('.cb').forEach(x=>x.disabled=true);
        const fb=document.getElementById('fb');
        if(c===ck){b.classList.add('correct');fb.className='fb ok';fb.textContent='✅ 정답!';cor++;setTimeout(()=>{idx++;showQ();},800);}
        else{b.classList.add('wrong');fb.className='fb no';fb.textContent='❌ 오답! 정답: '+ck;wrn++;wrongs.push({eng:q.word.eng,kor:ck,type:'뜻',my:c,correct:ck});setTimeout(()=>{idx+=2;showQ();},1500);}
      };
      document.getElementById('ch').appendChild(b);
    });
    startTimer();
  }else if(q.type==='S'){
    const syns=q.word.syn;
    const allS=VALID.flatMap(w=>w.syn).filter(s=>!syns.includes(s));
    const dis=shuf(allS).slice(0,3);
    const ch=shuf([syns[0],...dis]);
    area.innerHTML=`<div class="qc"><div class="qb s">2단계 · 유의어 찾기</div><div class="qstep">${idx+1} / ${qs.length}</div>${timerHtml}<div class="qw">${q.word.eng}</div><div class="qk">${q.word.kor}</div><div class="qp">이 단어의 유의어는?</div><div class="choices" id="ch"></div><div class="fb" id="fb"></div></div>`;
    ch.forEach((c,i)=>{
      const b=document.createElement('button');b.className='cb';
      b.innerHTML=`<span class="cn">${i+1}</span>${c}`;
      b.onclick=()=>{
        if(_answered)return;_answered=true;clearInterval(timerInterval);
        document.querySelectorAll('.cb').forEach(x=>x.disabled=true);
        const fb=document.getElementById('fb');const ok=syns.includes(c);
        if(ok){b.classList.add('correct');fb.className='fb ok';fb.textContent='✅ 정답!';cor++;}
        else{b.classList.add('wrong');fb.className='fb no';fb.textContent='❌ 오답! 유의어: '+syns.join(', ');wrn++;wrongs.push({eng:q.word.eng,kor:q.word.kor,type:'유의어',my:c,correct:syns[0]});}
        setTimeout(()=>{idx++;showQ();},1500);
      };
      document.getElementById('ch').appendChild(b);
    });
    startTimer();
  }else{
    area.innerHTML=`<div class="qc"><div class="qb j">관계 판별</div><div class="qstep">${idx+1} / ${qs.length}</div>${timerHtml}
      <div style="display:flex;gap:12px;justify-content:center;align-items:center;margin:10px 0 4px;">
        <div class="qw" style="font-size:17px;">${q.w1}</div>
        <div style="font-size:18px;color:#90caf9;font-weight:800;">↔</div>
        <div class="qw" style="font-size:17px;">${q.w2}</div>
      </div>
      <div class="qk" style="text-align:center;">(${q.kor})</div>
      <div class="qp" style="margin-top:10px;">두 단어의 관계는?</div>
      <div class="jbtns"><button class="jb sb" id="jSyn">🟢 유의어</button><button class="jb ab" id="jAnt">🔴 반의어</button></div>
      <div class="fb" id="fb"></div></div>`;
    ['jSyn','jAnt'].forEach(id=>{
      document.getElementById(id).onclick=function(){
        if(_answered)return;_answered=true;clearInterval(timerInterval);
        document.querySelectorAll('.jb').forEach(x=>x.disabled=true);
        const sel=id==='jSyn'?'syn':'ant';
        const fb=document.getElementById('fb');const la=q.rel==='syn'?'유의어':'반의어';
        if(sel===q.rel){this.classList.add('correct');fb.className='fb ok';fb.textContent='✅ 정답! '+la;cor++;}
        else{this.classList.add('wrong');fb.className='fb no';fb.textContent='❌ 오답! 정답: '+la;wrn++;wrongs.push({eng:q.w1+' ↔ '+q.w2,kor:q.kor,type:'관계',my:(sel==='syn'?'유의어':'반의어'),correct:la});}
        setTimeout(()=>{idx++;showQ();},1500);
      };
    });
    startTimer();
  }
}

function autoTO(){
  document.querySelectorAll('.cb,.jb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');if(fb){fb.className='fb no';fb.textContent='⏱ 시간 초과!';}
  wrn++;const q=qs[idx];
  if(q.type==='M')wrongs.push({eng:q.word.eng,kor:q.word.kor,type:'뜻',my:'(초과)',correct:q.word.kor});
  else if(q.type==='S')wrongs.push({eng:q.word.eng,kor:q.word.kor,type:'유의어',my:'(초과)',correct:q.word.syn[0]});
  else wrongs.push({eng:q.w1+' ↔ '+q.w2,kor:q.kor,type:'관계',my:'(초과)',correct:(q.rel==='syn'?'유의어':'반의어')});
  setTimeout(()=>{idx++;showQ();},1500);
}

function showResult(){
  clearInterval(timerInterval);
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=cor+wrn,pct=total>0?Math.round(cor/total*100):0,el=Math.round((Date.now()-t0)/60000);
  const label=selectedNos?selectedNos.map(n=>NUM_LABEL[n]||(n+'번')).join('+'):'전체';
  const wHTML=wrongs.length?`<div class="wl"><h3>❌ 오답 (${wrongs.length}개)</h3>${wrongs.map(w=>`<div class="wi"><div class="wie">${w.eng}</div><div class="wid">[${w.type}] 내 답: ${w.my} → 정답: ${w.correct}</div></div>`).join('')}</div>`:'<div style="color:#2e7d32;font-weight:800;padding:12px;text-align:center;">🎉 전부 정답!</div>';
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('resultScreen').innerHTML=`<div class="rc">
    <div style="font-size:10px;color:var(--muted);margin-bottom:3px;">고1 25년 6월 · ${label} · ${mode==='A'?'유의어 찾기':'관계 판별'}</div>
    <div class="rs">${pct}점</div><div class="rsub">${studentName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#b71c1c;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:var(--pri);">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:var(--acc);">${el}분</div><div class="sl">소요</div></div>
    </div>${wHTML}
    <div class="rbtns">
      <button class="rbtn rbtn-p" onclick="startQuiz()">다시하기 🔄</button>
      <button class="rbtn rbtn-s" onclick="goHub()">허브로 ←</button>
    </div></div>`;
  // Mark current selection as done for today
  if(selectedNos && selectedNos.length){
    selectedNos.forEach(no=>doneNos.add(no+'_'+mode));
    _saveProg();
  }
  _save({submittedAt:new Date().toISOString(),studentName,school:studentSchool,score:pct,correct:cor,wrong:wrn,total,elapsedMin:el,quizType:'고1_25년6월_동반의어_'+label+'_'+mode+'모드',wrongWords:wrongs.map(w=>({eng:w.eng,kor:w.kor,my:w.my,src:w.type}))});
}
</script>

<!-- === TTS 음성 지원 (Web Speech API) === -->
<style>
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;background:#e0e7ff;color:#3730a3;border-radius:50%;cursor:pointer;font-size:14px;padding:0;vertical-align:middle;margin-left:6px;transition:all .15s;flex-shrink:0;line-height:1;font-family:inherit;}
.tts-btn:hover{background:#c7d2fe;transform:scale(1.05);}
.tts-btn:active{transform:scale(0.95);}
.tts-btn.speaking{background:#fbbf24;color:white;animation:tts-pulse 1s ease-in-out infinite;}
@keyframes tts-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
</style>
<script>
(function(){
  if(window.__ttsInstalled) return; window.__ttsInstalled=true;
  function speakText(text, btn){
    if(!('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang='en-US';u.rate=0.85;u.pitch=1;
      const voices=window.speechSynthesis.getVoices();
      const en=voices.find(v=>v.lang && /^en/i.test(v.lang));
      if(en) u.voice=en;
      if(btn){
        btn.classList.add('speaking');
        u.onend=u.onerror=function(){btn.classList.remove('speaking');};
      }
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
  function ttsText(s){
    s=String(s||'').replace(/^["“”'\s]+|["“”'\s]+$/g,'');
    s=s.replace(/\s*🔊\s*$/,'');
    const idx=s.search(/[ㄱ-힝]/);
    if(idx!==-1) s=s.slice(0,idx);
    return s.replace(/[\s\(\)\[\];,~]+$/,'').trim();
  }
  const SEL='.q-word,.word-en,.word-box,.word-card .word-en';
  function inject(root){
    (root||document).querySelectorAll(SEL).forEach(w=>{
      if(w.dataset.tts==='1') return;
      const raw=w.textContent.trim();
      const txt=ttsText(raw);
      if(!txt || !/[A-Za-z]/.test(txt)) return;
      const btn=document.createElement('button');
      btn.className='tts-btn';
      btn.type='button';
      btn.title='발음 듣기';
      btn.setAttribute('aria-label','발음 듣기');
      btn.textContent='🔊';
      btn.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();speakText(txt,btn);});
      w.appendChild(document.createTextNode(' '));
      w.appendChild(btn);
      w.dataset.tts='1';
    });
  }
  const _obs=new MutationObserver(muts=>{
    let needs=false;
    muts.forEach(m=>m.addedNodes.forEach(n=>{if(n.nodeType===1) needs=true;}));
    if(needs) inject(document.body);
  });
  function start(){
    _obs.observe(document.body,{childList:true,subtree:true});
    inject(document.body);
    if(window.speechSynthesis && window.speechSynthesis.getVoices){
      window.speechSynthesis.getVoices();
      if(window.speechSynthesis.onvoiceschanged===null){
        window.speechSynthesis.onvoiceschanged=function(){};
      }
    }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
  else start();
})();
</script>
