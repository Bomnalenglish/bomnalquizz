*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f6f2;--card:#fff;--ink:#2a2a2a;--muted:#7a7570;--accent:#5c3d1e;--accent2:#a0724a;--correct:#2e7d32;--wrong:#c62828;--border:#e0d8ce}

.wrap{max-width:760px;margin:0 auto}

.logo-circle{width:42px;height:42px;border-radius:50%;background:#f0ebe3;border:2px solid var(--border);overflow:hidden}
.logo-circle img{width:100%;height:100%;object-fit:cover}
.logo-title{font-family:"Black Han Sans",sans-serif;font-size:.96rem;color:var(--accent)}
.quiz-meta{font-family:"Gowun Dodum",serif;font-size:.74rem;color:var(--muted);margin-top:2px}

.screen{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px 18px;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.04)}
.hidden{display:none!important}
.screen h2{font-family:"Black Han Sans",sans-serif;font-size:1.06rem;color:var(--accent);margin-bottom:6px}
.screen .sub{font-family:"Gowun Dodum",serif;font-size:.78rem;color:var(--muted);margin-bottom:14px;line-height:1.7}
label{display:block;font-size:.78rem;color:var(--muted);margin:8px 0 4px;font-family:"Gowun Dodum",serif}
input,select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.86rem;font-family:inherit;background:#fff}
.btn{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn-sec{background:#fff;color:var(--accent);border:1.5px solid var(--accent)}
.btn-sec:hover{background:#f5efe6}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px;margin:12px 0}
.p-card{position:relative;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:11px 9px;cursor:pointer;text-align:center;transition:all .15s}
.p-card:hover{border-color:var(--accent);background:#faf7f1}
.p-card.sel{border-color:var(--accent);background:#f0e6d6;box-shadow:0 0 0 2px rgba(92,61,30,.18)}
.p-card.done{border-color:#a5d6a7;background:#e8f5e9}
.p-num{font-family:"Black Han Sans",sans-serif;font-size:.96rem;color:var(--accent)}
.p-cnt{font-size:.68rem;color:var(--muted);margin-top:3px;font-family:"Gowun Dodum",serif}
.p-badge{position:absolute;top:4px;right:5px;font-size:.62rem;font-weight:700;border-radius:8px;padding:1px 5px}
.p-badge.done-badge{background:#e8f5e9;color:var(--correct)}
.p-badge.sel-badge{background:#fff3e0;color:#bf5e00}
.filter-bar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px;align-items:center}
.fb-btn{padding:5px 11px;border:1.5px solid var(--border);background:#fff;border-radius:18px;font-size:.74rem;cursor:pointer;font-family:inherit;font-weight:700;color:var(--muted)}
.fb-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.mode-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:14px}
.mode-btn{padding:14px 8px;background:#fff;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.mode-btn:hover{border-color:var(--accent)}
.mode-btn .mb-emoji{font-size:1.4rem;display:block;margin-bottom:4px}
.mode-btn .mb-label{font-family:"Black Han Sans",sans-serif;font-size:.84rem;color:var(--accent);display:block}
.mode-btn .mb-desc{font-size:.66rem;color:var(--muted);margin-top:3px;font-family:"Gowun Dodum",serif}
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.78rem;color:var(--muted);font-family:"Gowun Dodum",serif}
.pf-bg{height:5px;background:#e0d8ce;border-radius:5px;overflow:hidden;margin-bottom:14px}
.pf-fill{height:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;transition:width .3s}
.q-prompt{font-family:"Black Han Sans",sans-serif;font-size:1rem;color:var(--accent);margin-bottom:6px}
.q-word{background:#f5efe6;border-radius:10px;padding:13px;margin-bottom:14px;text-align:center}
.q-word .label{font-size:.7rem;color:var(--muted);font-family:"Gowun Dodum",serif;margin-bottom:3px}
.q-word .word{font-family:"Black Han Sans",sans-serif;font-size:1.5rem;color:var(--ink);line-height:1.3}
.q-word .def-text{font-family:"Gowun Dodum",serif;font-size:.94rem;line-height:1.6;color:var(--ink);margin-top:5px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.opt-grid{grid-template-columns:1fr}}
.opt-btn{padding:11px 12px;background:#fff;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-family:inherit;font-size:.86rem;color:var(--ink);text-align:left;transition:all .15s}
.opt-btn:hover{border-color:var(--accent);background:#faf7f1}
.opt-btn:disabled{cursor:not-allowed}
.opt-btn.correct{background:#e8f5e9;border-color:var(--correct);color:var(--correct);font-weight:700}
.opt-btn.wrong{background:#ffebee;border-color:var(--wrong);color:var(--wrong);font-weight:700}
.opt-btn.reveal{background:#e8f5e9;border-color:var(--correct);color:var(--correct);font-weight:700}
.feedback{margin-top:10px;font-size:.8rem;font-family:"Gowun Dodum",serif;text-align:center;color:var(--muted)}
.rc{padding:12px}
.rs{font-family:"Black Han Sans",sans-serif;font-size:2.6rem;color:var(--accent);text-align:center;margin:8px 0}
.rsub{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:14px}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
.si{background:#f5efe6;border-radius:10px;padding:11px 6px;text-align:center}
.sn{font-family:"Black Han Sans",sans-serif;font-size:1.4rem}
.sl{font-size:.7rem;color:var(--muted);margin-top:2px;font-family:"Gowun Dodum",serif}
.wl{background:#fff8f0;border:1.5px solid #f0c4a0;border-radius:10px;padding:12px;margin:14px 0}
.wl h3{font-size:.84rem;color:#bf5e00;margin-bottom:9px;font-family:"Black Han Sans",sans-serif}
.wi{padding:7px 9px;background:#fff;border-radius:8px;margin-bottom:6px;font-size:.78rem}
.wie{font-weight:700;color:var(--ink)}
.wid{color:var(--muted);font-size:.74rem;margin-top:2px}
.rbtns{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.rbtn{padding:11px 14px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.84rem;font-weight:700}
.rbtn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.rbtn-s{background:#fff;color:var(--accent);border:1.5px solid var(--accent)}
.back-link{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:6px 12px;font-size:.74rem;color:var(--muted);text-decoration:none;cursor:pointer;font-family:inherit;margin-bottom:12px}
.back-link:hover{border-color:var(--accent);color:var(--accent)}
.summary-row{font-size:.76rem;color:var(--muted);margin-top:6px;font-family:"Gowun Dodum",serif}

  if(typeof selectedRefs!=='undefined') selectedRefs = new Set(s.selectedRefs||[]);
  if(typeof doneRefs!=='undefined' && Array.isArray(s.doneRefs)) doneRefs = new Set(s.doneRefs);
  if(typeof selectedNos!=='undefined') selectedNos = new Set(s.selectedNos||[]);
  if(typeof doneNos!=='undefined' && Array.isArray(s.doneNos)) doneNos = new Set(s.doneNos);
  if(typeof quizMode!=='undefined' && s.quizMode) quizMode = s.quizMode;
  if(typeof filterMode!=='undefined' && s.filterMode) filterMode = s.filterMode;
  if(typeof mode!=='undefined' && s.mode) mode = s.mode;
  if(typeof round!=='undefined' && s.round) round = s.round;
  if(typeof t0!=='undefined') t0 = Date.now() - (s.elapsedMs||0);
  if(typeof answered!=='undefined') answered = false;
}
function _enterQuizScreen(){
  const start=document.getElementById('startScreen');     if(start) start.classList.add('hidden');
  const pass=document.getElementById('passageScreen');    if(pass) pass.classList.add('hidden');
  const ls=document.getElementById('loginScreen');        if(ls) ls.classList.add('hidden');
  ['hdr','pw','quizArea','quizScreen','quizWrap'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.remove('hidden');
  });
}
function resumeSession(){
  const s = _loadSession(); if(!s){ const rb=document.getElementById('resumeBox'); if(rb) rb.style.display='none'; return; }
  _restoreSessionState(s);
  _enterQuizScreen();
  if(typeof showQ==='function') showQ();
  else if(typeof renderQuestion==='function') renderQuestion();
  else if(typeof drawQ==='function') drawQ();
}
function discardSession(){ _clearSession(); const rb=document.getElementById('resumeBox'); if(rb) rb.style.display='none'; }
function checkResumePrompt(){
  const s = _loadSession(); if(!s) return;
  const rb = document.getElementById('resumeBox'); if(!rb) return;
  const remain = s.qs.length - s.idx;
  const elapsedMin = Math.round((s.elapsedMs||0)/60000);
  const info = document.getElementById('resumeInfo');
  if(info) info.innerHTML =
    '<strong>'+(s.userName||'학생')+'</strong>님 · '+s.qs.length+'문제 중 <strong>'+s.idx+'번째</strong>까지 풀었어요 ('+remain+'문제 남음)<br>'+
    '진행한 시간: '+elapsedMin+'분 · 정답 '+(s.cor||0)+' / 오답 '+(s.wrn||0);
  rb.style.display='block';
}
window.resumeSession = resumeSession;
window.discardSession = discardSession;


function goPassageSelect(){
  userSchool=document.getElementById('si').value;
  userName=document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  try{localStorage.setItem('bomnal_name',userName);localStorage.setItem('bomnal_school',userSchool);}catch(e){}
  document.getElementById('loginScreen').classList.add('hidden');
  const info=userName+' · '+userSchool;
  ['userInfo1','userInfo2','userInfo3'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=info;});
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function renderPassageGrid(){
  const grid=document.getElementById('pGrid');
  grid.innerHTML='';
  PASSAGE_ORDER.forEach(ref=>{
    const wordCount = VOCA[ref] ? VOCA[ref].length : 0;
    const isDone = doneRefs.has(ref);
    if(filterMode==='done' && !isDone) return;
    if(filterMode==='todo' && isDone) return;
    const card=document.createElement('div');
    card.className='p-card'+(selectedRefs.has(ref)?' sel':'')+(isDone?' done':'');
    card.dataset.ref=ref;
    card.innerHTML=`
      <div class="p-num">${ref}번</div>
      <div class="p-cnt">${wordCount}개</div>
      ${isDone?'<span class="p-badge done-badge">완료✓</span>':''}
      ${selectedRefs.has(ref)&&!isDone?'<span class="p-badge sel-badge">선택</span>':''}
    `;
    card.onclick=()=>togglePassage(ref);
    grid.appendChild(card);
  });
  updateSummary();
}

function togglePassage(ref){
  if(selectedRefs.has(ref)) selectedRefs.delete(ref);
  else selectedRefs.add(ref);
  renderPassageGrid();
}

function filterPassage(mode,btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb-btn').forEach(b=>b.classList.remove('active'));
  ['fbAll','fbTodo','fbDone'].forEach(id=>{const e=document.getElementById(id);if(e&&((id==='fbAll'&&mode==='all')||(id==='fbTodo'&&mode==='todo')||(id==='fbDone'&&mode==='done')))e.classList.add('active');});
  renderPassageGrid();
}

function selectAll(){PASSAGE_ORDER.forEach(ref=>{
  if(filterMode==='done' && !doneRefs.has(ref)) return;
  if(filterMode==='todo' && doneRefs.has(ref)) return;
  selectedRefs.add(ref);
});renderPassageGrid();}

function clearSelection(){selectedRefs.clear();renderPassageGrid();}

function updateSummary(){
  const total=PASSAGE_ORDER.length;
  const done=doneRefs.size;
  const sel=selectedRefs.size;
  let words=0;selectedRefs.forEach(ref=>{if(VOCA[ref])words+=VOCA[ref].length;});
  document.getElementById('summaryRow').innerHTML=
    `총 ${total}개 지문 · 완료 ${done}개 · 선택 ${sel}개 (${words}개 단어)`;
  document.getElementById('toModeBtn').disabled = sel===0;
}

function goModeSelect(){
  if(selectedRefs.size===0){alert('지문을 1개 이상 선택해주세요.');return;}
  const refs=Array.from(selectedRefs).sort((a,b)=>parseInt(a.split('-')[0])-parseInt(b.split('-')[0]));
  document.getElementById('modeSub').textContent='선택한 지문: '+refs.join('번, ')+'번';
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
}

function backToPassage(){
  document.getElementById('modeScreen').classList.add('hidden');
  document.getElementById('passageScreen').classList.remove('hidden');
}

function confirmExit(){
  if(idx>0 && !confirm('진행 중인 풀이를 중단하시겠습니까?')) return;
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
}

function shuffle(arr){const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function selectRound(r){
  round=r;
  // Build quiz pool
  const pool=[];
  Array.from(selectedRefs).forEach(ref=>{
    (VOCA[ref]||[]).forEach(w=>{
      pool.push({ref:ref,...w});
    });
  });

  let filtered=[];
  if(r==='meaning'){filtered = pool.filter(w=>w.ko);}
  else if(r==='syn'){filtered = pool.filter(w=>w.syn);}
  else if(r==='ant'){filtered = pool.filter(w=>w.ant);}

  if(filtered.length<2){
    alert('이 모드에는 충분한 데이터가 없습니다. 다른 지문 또는 다른 모드를 선택해주세요.');
    return;
  }

  qs = shuffle(filtered);
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('modeScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  const modeLabel={'meaning':'📖 뜻 맞추기','syn':'🔄 유의어 찾기','ant':'↔️ 반의어'}[r];
  document.getElementById('hudLabel').textContent=modeLabel;
  showQ();
}

function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  document.getElementById('hudProg').textContent=(idx+1)+' / '+qs.length;
  document.getElementById('pf').style.width=(idx/qs.length*100)+'%';
  document.getElementById('feedback').textContent='';
  const q=qs[idx];

  // Build options & prompt by round
  let prompt='', wordHTML='', ans='', opts=[];
  if(round==='meaning'){
    prompt='주어진 영어 단어의 뜻을 고르세요.';
    wordHTML=`<div class="label">영어 단어</div><div class="word">${escHTML(q.en)}</div>`;
    ans = q.ko;
    const distractors = shuffle(qs.filter(x=>x.no!==q.no || x.ref!==q.ref).map(x=>x.ko).filter(m=>m && m!==ans)).slice(0,3);
    opts = shuffle([ans, ...distractors]);
  } else if(round==='syn'){
    prompt='주어진 영어 단어의 유의어(synonym)를 고르세요.';
    wordHTML=`<div class="label">영어 단어</div><div class="word">${escHTML(q.en)}</div>`;
    ans = q.syn;
    const distractors = shuffle(qs.filter(x=>(x.no!==q.no||x.ref!==q.ref) && x.syn).map(x=>x.syn).filter(s=>s && s!==ans)).slice(0,3);
    opts = shuffle([ans, ...distractors]);
  } else { // ant
    prompt='주어진 영어 단어의 반의어(antonym)를 고르세요.';
    wordHTML=`<div class="label">영어 단어</div><div class="word">${escHTML(q.en)}</div>`;
    ans = q.ant;
    const distractors = shuffle(qs.filter(x=>(x.no!==q.no||x.ref!==q.ref) && x.ant).map(x=>x.ant).filter(a=>a && a!==ans)).slice(0,3);
    opts = shuffle([ans, ...distractors]);
  }
  document.getElementById('qPrompt').textContent=prompt;
  document.getElementById('qWord').innerHTML=wordHTML;
  const grid=document.getElementById('optGrid');
  grid.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.textContent=o;
    b.onclick=()=>selChoice(b, o, ans);
    grid.appendChild(b);
  });
}

function selChoice(btn, sel, ans){
  if(answered) return;
  answered=true;
  const q=qs[idx];
  const ok = sel===ans;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===ans) b.classList.add('reveal');
  });
  btn.classList.add(ok?'correct':'wrong');
  if(ok){
    cor++;
    document.getElementById('feedback').textContent='✅ 정답!';
    document.getElementById('feedback').style.color='var(--correct)';
    allResults.push({ref:q.ref,no:q.no,en:q.en,ko:q.ko,syn:q.syn,ant:q.ant,my:sel,correct:true});
  } else {
    wrn++;
    document.getElementById('feedback').textContent='❌ 내 답: '+sel+' / 정답: '+ans;
    document.getElementById('feedback').style.color='var(--wrong)';
    wrongs.push({ref:q.ref,no:q.no,en:q.en,ko:q.ko,syn:q.syn,ant:q.ant,my:sel,correct:ans});
    allResults.push({ref:q.ref,no:q.no,en:q.en,ko:q.ko,syn:q.syn,ant:q.ant,my:sel,correct:false});
  }
  setTimeout(()=>{idx++;_saveSession();showQ();}, ok?550:1400);
}

function showResult(){
  _clearSession();
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizScreen').classList.add('hidden');
  const total=qs.length, pct = total>0?Math.round(cor/total*100):0;
  const el = Math.round((Date.now()-t0)/60000);
  // Mark passages as done for this round
  selectedRefs.forEach(r=>doneRefs.add(r));
  _saveProg();

  const refs=Array.from(selectedRefs).sort((a,b)=>parseInt(a.split('-')[0])-parseInt(b.split('-')[0]));
  const roundLabel={'meaning':'뜻맞추기','syn':'유의어찾기','ant':'반의어'}[round];
  const passageStr=refs.join(',');

  const wHTML = wrongs.length>0
    ? `<div class="wl"><h3>❌ 오답 (${wrongs.length}개)</h3>${wrongs.map(w=>{
        const mainDisplay = (round==='ant') ? w.ant : w.en;
        return `<div class="wi"><div class="wie">${escHTML(w.en)} (${escHTML(w.ref)}번 #${w.no})</div><div class="wid">내 답: ${escHTML(w.my)} → 정답: ${escHTML(w.correct)}</div></div>`;
      }).join('')}</div>`
    : '<div style="color:var(--correct);font-weight:700;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn rbtn-p" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const screen=document.getElementById('resultScreen');
  screen.classList.remove('hidden');
  screen.innerHTML=`<div class="rc">
    <div style="text-align:center;font-family:'Black Han Sans',sans-serif;font-size:1.04rem;color:var(--accent)">🎉 ${roundLabel} 완료!</div>
    <div style="font-size:.74rem;color:var(--muted);text-align:center;margin-top:3px">고1 26-6 모의 · 지문 ${passageStr}번</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:var(--correct)">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:var(--wrong)">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:var(--accent)">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:var(--accent2)">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-s" onclick="goBack()">← 모드 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="goPassageBack()">← 지문 다시 선택</button>
    </div>
  </div>`;

  if(window._fbSave){
    window._fbSave({
      submittedAt: new Date().toISOString(),
      studentName: userName,
      school: userSchool,
      score: pct,
      correct: cor,
      wrong: wrn,
      total: total,
      elapsedMin: el,
      quizType: '고1_26년6월_단어_'+roundLabel,
      passages: refs,
      details: allResults.map(r=>({
        지문: r.ref+'번',
        번호: r.no,
        단어: r.word,
        결과: r.correct ? '✅정답' : '❌오답',
        내답: r.my,
        정답: r.correct===false ? (round==='meaning'?r.meaning:round==='syn'?r.syn:r.word) : r.my,
      })),
      wrongWords: wrongs.map(w=>({
        eng: w.en,
        kor: w.ko,
        my: w.my,
        correct: w.correct,
        ref: w.ref,
        no: w.no,
        mode: round,
      })),
    });
  }
}

let wrongQs=[];
function retryWrongs(){
  if(wrongs.length===0) return;
  wrongQs=qs.filter(q=>wrongs.some(w=>w.no===q.no && w.ref===q.ref));
  qs=wrongQs;
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('hudProg').textContent='';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
}
function goPassageBack(){
  selectedRefs.clear();
  document.getElementById('resultScreen').classList.add('hidden');
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

window.addEventListener('DOMContentLoaded',()=>{
  const n=localStorage.getItem('bomnal_name');
  const s=localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value=n;
  if(s){
    const sel=document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value && s.includes(sel.options[i].value)){sel.value=sel.options[i].value;break;}
    }
  }
  _cleanupOldProgress();
  _loadProg();
  checkResumePrompt();
});

window.goPassageSelect=goPassageSelect;
window.filterPassage=filterPassage;
window.selectAll=selectAll;
window.clearSelection=clearSelection;
window.goModeSelect=goModeSelect;
window.backToPassage=backToPassage;
window.selectRound=selectRound;
window.confirmExit=confirmExit;
window.retryWrongs=retryWrongs;
window.goBack=goBack;
window.goPassageBack=goPassageBack;
</script>

<!-- === TTS 음성 지원 (Web Speech API) === -->
<style>
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;background:#e0e7ff;color:#3730a3;border-radius:50%;cursor:pointer;font-size:14px;padding:0;vertical-align:middle;margin-left:6px;transition:all .15s;flex-shrink:0;line-height:1;font-family:inherit;}
.tts-btn:hover{background:#c7d2fe;transform:scale(1.05);}
.tts-btn:active{transform:scale(0.95);}
.tts-btn.speaking{background:#fbbf24;color:white;animation:tts-pulse 1s ease-in-out infinite;}
@keyframes tts-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
</style>
<script>
(function(){
  if(window.__ttsInstalled) return; window.__ttsInstalled=true;
  function speakText(text, btn){
    if(!('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang='en-US';u.rate=0.85;u.pitch=1;
      const voices=window.speechSynthesis.getVoices();
      const en=voices.find(v=>v.lang && /^en/i.test(v.lang));
      if(en) u.voice=en;
      if(btn){
        btn.classList.add('speaking');
        u.onend=u.onerror=function(){btn.classList.remove('speaking');};
      }
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
  function ttsText(s){
    s=String(s||'').replace(/^["“”'\s]+|["“”'\s]+$/g,'');
    s=s.replace(/\s*🔊\s*$/,'');
    const idx=s.search(/[ㄱ-힝]/);
    if(idx!==-1) s=s.slice(0,idx);
    return s.replace(/[\s\(\)\[\];,~]+$/,'').trim();
  }
  const SEL='.q-word,.word-en,.word-box,.word-card .word-en';
  function inject(root){
    (root||document).querySelectorAll(SEL).forEach(w=>{
      // 이미 자식으로 TTS 버튼이 있으면 skip (innerHTML 교체로 버튼이 사라진 경우엔 재주입)
      if(w.querySelector(':scope > .tts-btn')) return;
      const raw=w.textContent.trim();
      const txt=ttsText(raw);
      if(!txt || !/[A-Za-z]/.test(txt)) return;
      const btn=document.createElement('button');
      btn.className='tts-btn';
      btn.type='button';
      btn.title='발음 듣기';
      btn.setAttribute('aria-label','발음 듣기');
      btn.textContent='🔊';
      btn.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();speakText(txt,btn);});
      w.appendChild(document.createTextNode(' '));
      w.appendChild(btn);
    });
  }
  const _obs=new MutationObserver(muts=>{
    let needs=false;
    muts.forEach(m=>m.addedNodes.forEach(n=>{if(n.nodeType===1) needs=true;}));
    if(needs) inject(document.body);
  });
  function start(){
    _obs.observe(document.body,{childList:true,subtree:true});
    inject(document.body);
    if(window.speechSynthesis && window.speechSynthesis.getVoices){
      window.speechSynthesis.getVoices();
      if(window.speechSynthesis.onvoiceschanged===null){
        window.speechSynthesis.onvoiceschanged=function(){};
      }
    }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
  else start();
})();
</script>
