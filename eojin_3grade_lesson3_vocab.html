<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>봄날 퀴즈 | 어진중 3학년 3과 단어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:linear-gradient(135deg,#fff4e6,#ffe4cc);min-height:100vh;padding:14px;color:#333;}
.wrap{max-width:640px;margin:0 auto;}
.hdr{background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;padding:18px;border-radius:14px;text-align:center;margin-bottom:16px;box-shadow:0 4px 12px rgba(255,107,53,.3);}
.hdr h1{font-size:1.3rem;font-weight:900;}
.hdr .sub{font-size:.85rem;opacity:.95;margin-top:4px;}
.card{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:14px;}
.card h2{font-size:1.05rem;font-weight:900;color:#f57c00;margin-bottom:12px;}
.ni{width:100%;padding:11px 14px;font-size:.95rem;border:2px solid #ffcc80;border-radius:10px;margin-bottom:10px;font-family:inherit;}
.ni:focus{outline:none;border-color:#f57c00;}
.btn{display:inline-block;width:100%;padding:13px;font-size:1rem;font-weight:800;background:linear-gradient(135deg,#ff6b35,#f7931e);color:white;border:none;border-radius:10px;cursor:pointer;font-family:inherit;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn:hover:not(:disabled){filter:brightness(1.05);}
.hud{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;font-weight:700;color:#666;margin-bottom:10px;}
.hud .name{color:#f57c00;font-weight:800;}
.pb{height:8px;background:#fff;border-radius:4px;overflow:hidden;margin-bottom:14px;border:1px solid #ffcc80;}
.pf{height:100%;background:linear-gradient(90deg,#ff6b35,#f7931e);transition:width .3s;width:0%;}
.word-box{background:linear-gradient(135deg,#fff4e6,#ffe4cc);border:3px solid #ff6b35;border-radius:14px;padding:24px 16px;text-align:center;margin-bottom:14px;}
.word{font-size:1.8rem;font-weight:900;color:#bf360c;letter-spacing:.5px;font-family:'Black Han Sans',sans-serif;}
.prompt{font-size:.95rem;font-weight:800;color:#666;text-align:center;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{background:#fff;border:2px solid #ffe4cc;border-radius:10px;padding:13px 15px;font-size:1rem;font-weight:700;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:11px;transition:all .15s;color:#333;}
.opt:hover:not(:disabled){background:#fff4e6;border-color:#ff9966;}
.opt:disabled{cursor:not-allowed;}
.opt .cn{width:24px;height:24px;border-radius:50%;background:#ff9966;color:white;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0;}
.opt.correct{background:#e8f5e9;border-color:#43a047;color:#1b5e20;}
.opt.correct .cn{background:#43a047;}
.opt.wrong{background:#ffebee;border-color:#e53935;color:#b71c1c;}
.opt.wrong .cn{background:#e53935;}
.opt.reveal{background:#e8f5e9;border-color:#43a047;color:#1b5e20;}
.fb{margin-top:12px;padding:10px;border-radius:8px;font-weight:800;text-align:center;font-size:.95rem;display:none;}
.fb.show{display:block;}
.fb.ok{background:#e8f5e9;color:#1b5e20;}
.fb.no{background:#ffebee;color:#b71c1c;}
.hidden{display:none;}
.rs-score{font-size:3rem;font-weight:900;color:#f57c00;text-align:center;margin:10px 0;font-family:'Black Han Sans',sans-serif;}
.rs-sub{text-align:center;color:#666;font-size:.9rem;margin-bottom:14px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat{background:#fff4e6;border-radius:10px;padding:12px;text-align:center;}
.stat-n{font-size:1.4rem;font-weight:900;}
.stat-l{font-size:.75rem;color:#666;margin-top:2px;}
.ans-list{margin-top:14px;}
.ans-list h3{font-size:.95rem;color:#f57c00;margin-bottom:8px;}
.ans-item{background:#fafafa;border-left:4px solid #ccc;padding:10px 12px;margin-bottom:6px;border-radius:0 8px 8px 0;font-size:.85rem;}
.ans-item.ok{border-left-color:#43a047;}
.ans-item.no{border-left-color:#e53935;}
.ans-item .en{font-weight:800;color:#bf360c;}
.ans-item .ko-correct{color:#1b5e20;font-weight:700;}
.ans-item .ko-my{color:#b71c1c;text-decoration:line-through;font-size:.78rem;margin-left:4px;}
.ans-item .badge{display:inline-block;padding:1px 7px;border-radius:5px;font-size:.7rem;font-weight:800;color:white;margin-right:5px;}
.ans-item.ok .badge{background:#43a047;}
.ans-item.no .badge{background:#e53935;}
.btn-row{display:flex;gap:8px;margin-top:14px;}
.btn-row .btn{flex:1;}
.btn-s{background:linear-gradient(135deg,#90a4ae,#607d8b);}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr"><h1>🎯 어진중 3학년 3과 단어</h1><div class="sub">천재(이재영) 1학기 기말 · 영어 → 한국어 5지선다</div></div>

<div id="loginScreen" class="card">
  <h2>📚 학생 정보</h2>
  <select class="ni" id="schoolSel">
    <option value="">학교 선택</option>
    <option>어진중1</option><option>어진중2</option><option>어진중3</option>
    <option>기타</option>
  </select>
  <input type="text" class="ni" id="nameInput" placeholder="이름을 입력하세요" maxlength="10">
  <button class="btn" onclick="startQuiz()">시작하기 →</button>
</div>

<div id="quizScreen" class="card hidden">
  <div class="hud">
    <span class="name" id="hudName"></span>
    <span id="hudNo">1/0</span>
  </div>
  <div class="pb"><div class="pf" id="pf"></div></div>
  <div class="word-box"><div class="word" id="wordEn"></div></div>
  <div class="prompt">📖 알맞은 뜻을 고르세요</div>
  <div class="opts" id="opts"></div>
  <div class="fb" id="fb"></div>
</div>

<div id="resultScreen" class="card hidden">
  <h2 style="text-align:center;">🎉 결과</h2>
  <div class="rs-score" id="rsScore"></div>
  <div class="rs-sub" id="rsSub"></div>
  <div class="stats">
    <div class="stat"><div class="stat-n" style="color:#43a047;" id="rsOk"></div><div class="stat-l">정답</div></div>
    <div class="stat"><div class="stat-n" style="color:#e53935;" id="rsNo"></div><div class="stat-l">오답</div></div>
    <div class="stat"><div class="stat-n" style="color:#1976d2;" id="rsTotal"></div><div class="stat-l">총문제</div></div>
  </div>
  <div class="ans-list">
    <h3>📋 전체 정답 확인</h3>
    <div id="ansList"></div>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="location.reload()">🔄 다시 풀기</button>
  </div>
</div>
</div>

<script>
const VOCAB = [{en:"common",ko:"흔한"},{en:"cause",ko:"원인; 야기하다"},{en:"appearance",ko:"외모, 생김새"},{en:"grade",ko:"성적"},{en:"understand",ko:"이해하다"},{en:"helpful",ko:"도움이 되는"},{en:"exam",ko:"시험"},{en:"improve",ko:"개선하다, 향상하다"},{en:"memory",ko:"기억, 기억력"},{en:"design",ko:"디자인"},{en:"screen",ko:"화면"},{en:"choose",ko:"선택하다, 고르다"},{en:"sleeve",ko:"소매"},{en:"wear",ko:"입다"},{en:"Sports Day",ko:"체육대회"},{en:"bee",ko:"벌"},{en:"expensive",ko:"비싼"},{en:"spend",ko:"(돈, 시간을) 쓰다"},{en:"low",ko:"기운이 없는; 낮은"},{en:"special",ko:"특별한"},{en:"simply",ko:"그냥, 그저"},{en:"stress",ko:"스트레스; 스트레스를 주다"},{en:"suggest",ko:"제안하다"},{en:"break",ko:"어기다; 깨다, 부수다; 쉬다"},{en:"promise",ko:"약속; 약속하다"},{en:"argue",ko:"논쟁하다, 다투다"},{en:"happen",ko:"일어나다, 발생하다"},{en:"horror",ko:"공포물(책·영화); 공포(감)"},{en:"scary",ko:"무서운"},{en:"scream",ko:"비명을 지르다"},{en:"guess",ko:"추측하다, 생각하다"},{en:"lung",ko:"폐"},{en:"scene",ko:"장면"},{en:"sound effect",ko:"음향 효과"},{en:"effect",ko:"효과"},{en:"bother",ko:"괴롭히다"},{en:"method",ko:"방법, 방식"},{en:"past",ko:"지난"},{en:"several",ko:"몇몇의"},{en:"work",ko:"효과가 있다; 일, 직장"},{en:"college",ko:"대학"},{en:"stressed",ko:"스트레스를 느끼는"},{en:"positive",ko:"긍정적인, 낙관적인"},{en:"fish",ko:"낚시하다; 물고기"},{en:"upset",ko:"속상한, 화가 난"},{en:"catch",ko:"잡다"},{en:"while",ko:"~하는 동안; 잠깐"},{en:"focused",ko:"집중한"},{en:"worry",ko:"고민, 걱정"},{en:"besides",ko:"게다가"},{en:"patient",ko:"참을성 있는, 인내하는"},{en:"else",ko:"그 밖의"},{en:"wonderful",ko:"훌륭한"},{en:"schoolwork",ko:"학업"},{en:"seem",ko:"~처럼 보이다"},{en:"situation",ko:"상황"},{en:"clean",ko:"청소하다"},{en:"number-one",ko:"최우선의, 최고의"},{en:"life",ko:"삶"},{en:"gloomy",ko:"침울한, 음울한"},{en:"relieve",ko:"덜다, 완화하다"},{en:"tidy",ko:"깔끔한, 단정한"},{en:"bright",ko:"밝은"},{en:"write",ko:"~을 적다, 쓰다"},{en:"me time",ko:"나만의 시간"},{en:"calendar",ko:"달력"},{en:"mean",ko:"의미하다"},{en:"matter",ko:"중요하다, 문제가 되다"},{en:"idea",ko:"아이디어"},{en:"would like to",ko:"~하고 싶다"},{en:"take ~ place",ko:"~등[순위]을 차지하다"},{en:"used to",ko:"~하곤 했다"},{en:"at the same time",ko:"동시에"},{en:"decide on",ko:"~을 결정하다"},{en:"make sense",ko:"일리가 있다, 타당하다"},{en:"have difficulty ~ing",ko:"~하는 데 어려움을 겪다"},{en:"for a while",ko:"잠시, 잠깐 동안"},{en:"deal with",ko:"~을 다루다, 처리하다"},{en:"argue over",ko:"~을 두고 논쟁하다"},{en:"at the top of one's lungs",ko:"목청껏, 큰 소리로"},{en:"thanks to",ko:"~ 덕분에"},{en:"forget about",ko:"~에 대해 잊다"},{en:"graduate from",ko:"~을 졸업하다"},{en:"look for",ko:"~을 찾다"},{en:"for some time",ko:"얼마 전부터, 아까부터"},{en:"go ~ing",ko:"~하러 가다"},{en:"leave ~ behind",ko:"~을 남겨 두고 잊다"},{en:"focus on",ko:"~에 집중하다"},{en:"stay free from",ko:"~으로부터 벗어나다"},{en:"for a good reason",ko:"합당한 이유로"},{en:"feel like",ko:"~한 느낌이 들다"},{en:"under stress",ko:"스트레스를 받는"},{en:"take time out",ko:"(하던 일을 멈추고) 시간을 내다"},{en:"as long as",ko:"~하는 한, ~이기만 하다면"},{en:"say goodbye to",ko:"~에게 작별을 고하다"}];
let userName='', userSchool='';
let qs=[], idx=0, cor=0, wrn=0, answered=false;
const results=[];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz(){
  userSchool=document.getElementById('schoolSel').value;
  userName=document.getElementById('nameInput').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  qs = shuffle(VOCAB).map(w=>{
    const dist = shuffle(VOCAB.filter(o=>o.ko!==w.ko)).slice(0,4);
    const opts = shuffle([w.ko, ...dist.map(d=>d.ko)]);
    return {en:w.en, ko:w.ko, opts:opts};
  });
  idx=0; cor=0; wrn=0; results.length=0; answered=false;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('hudName').textContent = userSchool+' · '+userName;
  showQ();
}

function escHTML(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showQ(){
  if(idx>=qs.length){ showResult(); return; }
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hudNo').textContent=(idx+1)+'/'+qs.length;
  document.getElementById('wordEn').textContent=q.en;
  const oc=document.getElementById('opts');
  oc.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="cn">'+(i+1)+'</span><span>'+escHTML(opt)+'</span>';
    b.addEventListener('click',()=>selOpt(b, opt, q.ko));
    oc.appendChild(b);
  });
  const fb=document.getElementById('fb');
  fb.classList.remove('show','ok','no');
  fb.textContent='';
}

function selOpt(btn, sel, ans){
  if(answered) return;
  answered=true;
  const buttons=document.querySelectorAll('.opt');
  buttons.forEach(b=>b.disabled=true);
  const q=qs[idx];
  const isCorrect = String(sel).trim() === String(ans).trim();
  const fb=document.getElementById('fb');
  if(isCorrect){
    btn.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent='✅ 정답!';
    cor++;
    results.push({en:q.en, ko:ans, my:sel, correct:true});
  } else {
    btn.classList.add('wrong');
    buttons.forEach(b=>{
      const txt=b.querySelector('span:last-child');
      if(txt && txt.textContent.trim()===String(ans).trim()) b.classList.add('reveal');
    });
    fb.className='fb show no';
    fb.innerHTML='❌ 정답: <strong>'+escHTML(ans)+'</strong>';
    wrn++;
    results.push({en:q.en, ko:ans, my:sel, correct:false});
  }
  setTimeout(()=>{ idx++; showQ(); }, isCorrect?700:1500);
}

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const total=qs.length;
  const pct=total>0?Math.round(cor/total*100):0;
  document.getElementById('rsScore').textContent=pct+'점';
  document.getElementById('rsSub').textContent=userSchool+' · '+userName;
  document.getElementById('rsOk').textContent=cor;
  document.getElementById('rsNo').textContent=wrn;
  document.getElementById('rsTotal').textContent=total;
  const list=document.getElementById('ansList');
  list.innerHTML = results.map(r=>{
    const cls = r.correct?'ok':'no';
    const badge = r.correct?'O':'X';
    const myPart = r.correct?'':' <span class="ko-my">내 답: '+escHTML(r.my)+'</span>';
    return '<div class="ans-item '+cls+'"><span class="badge">'+badge+'</span><span class="en">'+escHTML(r.en)+'</span> → <span class="ko-correct">'+escHTML(r.ko)+'</span>'+myPart+'</div>';
  }).join('');
}
</script>
</body>
</html>
