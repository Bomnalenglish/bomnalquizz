<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날 퀴즈 | 고2 24년 6월 문맥 학습</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
:root{--pri:#6a1b9a;--acc:#f57f17;--bg:#f3e5f5;--card:#fff;--muted:#757575;--ok:#2e7d32;--ng:#c62828;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;color:#1a1a2e;}
.hidden{display:none!important;}

/* 시작화면 */
#startScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.s-card{background:#fff;border-radius:24px;padding:36px 28px;text-align:center;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(106,27,154,.15);}
.s-card h1{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--pri);margin-bottom:6px;}
.s-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;}
.info-item{background:var(--bg);border-radius:10px;padding:10px;text-align:center;font-size:12px;color:var(--pri);font-weight:700;}
.start-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6a1b9a,#f57f17);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* 지문 선택 */
#passageScreen{padding:20px;max-width:700px;margin:0 auto;}
.ps-header{background:linear-gradient(135deg,#6a1b9a,#8e24aa);color:#fff;border-radius:16px;padding:18px 22px;margin-bottom:20px;}
.ps-title{font-family:'Black Han Sans',sans-serif;font-size:16px;}
.ps-sub{font-size:11px;opacity:.8;margin-top:3px;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.fb{padding:7px 16px;border:2px solid var(--pri);border-radius:20px;background:#fff;color:var(--pri);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.fb.on{background:var(--pri);color:#fff;}
.passage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
.p-card{background:#fff;border-radius:14px;padding:14px 12px;text-align:center;cursor:pointer;border:2.5px solid #e0e0e0;transition:all .18s;position:relative;}
.p-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 6px 18px rgba(106,27,154,.12);}
.p-card.sel{border-color:var(--pri);background:#f3e5f5;}
.p-card.done{border-color:#4caf50;background:#e8f5e9;}
.p-no{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--pri);margin-bottom:4px;}
.p-topic{font-size:10px;color:var(--muted);line-height:1.4;}
.p-qcount{font-size:10px;color:#8e24aa;font-weight:700;margin-top:3px;}
.p-badge{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;}
.sel-all-btn{width:100%;padding:12px;border-radius:12px;border:2px solid var(--pri);background:#fff;color:var(--pri);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px;}
.go-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6a1b9a,#f57f17);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* 헤더 */
.hdr{background:#6a1b9a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.ht{font-family:'Black Han Sans',sans-serif;font-size:15px;}
.hs{font-size:10px;opacity:.7;margin-top:2px;}
.hb{background:rgba(255,255,255,.2);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:700;}
.pw{height:4px;background:#ce93d8;}
.pf{height:100%;background:linear-gradient(90deg,#6a1b9a,#f57f17);transition:width .4s;}

/* 퀴즈 */
#quizArea{padding:20px;max-width:720px;margin:0 auto;}
.qc{background:#fff;border-radius:18px;padding:22px 20px;margin-bottom:16px;box-shadow:0 3px 16px rgba(106,27,154,.08);}
.q-no-badge{display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;}
.qno{font-family:'Black Han Sans',sans-serif;font-size:13px;color:#fff;background:var(--pri);padding:3px 12px;border-radius:12px;}
.qtype-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;}
.qtype-abc{background:#ede7f6;color:#4a148c;}
.qtype-ul{background:#fff3e0;color:#e65100;}

/* 지문 박스 */
.passage-box{background:#fafafa;border-left:4px solid var(--pri);border-radius:0 10px 10px 0;padding:14px 16px;font-size:14px;line-height:2;margin-bottom:16px;color:#1a1a2e;}

/* (A)(B)(C) 문제 스타일 */
.abc-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.abc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.abc-label{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--pri);min-width:28px;}
.abc-btns{display:flex;gap:8px;flex-wrap:wrap;}
.abc-btn{padding:6px 16px;border:2px solid #ce93d8;border-radius:20px;background:#fff;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#4a148c;transition:all .15s;}
.abc-btn:hover:not(:disabled){border-color:var(--pri);background:#f3e5f5;}
.abc-btn.selected{border-color:var(--pri);background:var(--pri);color:#fff;}
.abc-btn.c-ok{border-color:var(--ok);background:var(--ok);color:#fff;}
.abc-btn.c-ng{border-color:var(--ng);background:var(--ng);color:#fff;}
.abc-btn:disabled{cursor:default;}

/* 5지선다 문제 스타일 */
.choices{display:grid;gap:8px;margin-bottom:12px;}
.cb{background:#f5f5f5;border:2px solid #e0e0e0;border-radius:11px;padding:11px 15px;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:flex-start;gap:10px;}
.cb:hover:not(:disabled){border-color:var(--pri);background:#f3e5f5;}
.cb.c-ok{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;}
.cb.c-ng{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.cb.reveal{background:#e8f5e9;border-color:#2e7d32;}
.cb:disabled{cursor:default;}
.cn{min-width:22px;height:22px;border-radius:50%;background:#ce93d8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px;}

/* 제출 / 피드백 */
.submit-wrap{text-align:center;margin:12px 0 4px;}
.submit-btn{background:linear-gradient(135deg,#6a1b9a,#f57f17);color:#fff;border:none;border-radius:12px;padding:12px 40px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.submit-btn:hover{opacity:.88;}
.submit-btn:disabled{opacity:.4;cursor:default;}
.fb-box{padding:12px 16px;border-radius:12px;font-size:13px;font-weight:700;margin-top:10px;display:none;line-height:1.6;}
.fb-box.ok{background:#e8f5e9;color:#1b5e20;border:1.5px solid #a5d6a7;display:block;}
.fb-box.no{background:#ffebee;color:#b71c1c;border:1.5px solid #ef9a9a;display:block;}
.next-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#8e24aa;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px;display:none;}

/* 결과 */
#resultScreen{padding:20px;max-width:600px;margin:0 auto;}
.rc{background:#fff;border-radius:24px;padding:30px 22px;box-shadow:0 8px 32px rgba(106,27,154,.1);text-align:center;}
.rs{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--pri);line-height:1;}
.rsub{font-size:13px;color:var(--muted);margin-top:4px;}
.sr{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap;}
.si{text-align:center;}.sn{font-family:'Black Han Sans',sans-serif;font-size:24px;}.sl{font-size:11px;color:var(--muted);margin-top:2px;}
.wl{background:var(--bg);border-radius:14px;padding:14px;text-align:left;margin-top:14px;max-height:300px;overflow-y:auto;}
.wl h3{font-size:12px;font-weight:800;color:var(--ng);margin-bottom:8px;}
.wi{background:#fff;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:11px;border-left:3px solid #ce93d8;}
.wie{font-weight:800;color:var(--pri);margin-bottom:2px;}
.wid{font-size:10px;color:var(--muted);}
.rbtns{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.rbtn{padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.rbtn-p{background:linear-gradient(135deg,#6a1b9a,#f57f17);color:#fff;}
.rbtn-s{background:#f5f5f5;color:#6a1b9a;border:2px solid #ce93d8;}

/* 밑줄 강조 */
.ul-word{text-decoration:underline;text-underline-offset:3px;font-weight:800;}
.ul-wrong-target{text-decoration:underline;text-underline-offset:3px;font-weight:800;color:#b71c1c;}
.ul-marker{background:#ede7f6;border-radius:3px;padding:0 3px;font-weight:800;}

@media(max-width:480px){.passage-grid{grid-template-columns:repeat(2,1fr)}.abc-row{gap:6px}}

/* 오답노트 탭 */
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-radius:12px;overflow:hidden;border:2px solid var(--pri);}
.tab-btn{flex:1;padding:10px;border:none;background:#fff;color:var(--pri);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;}
.tab-btn.on{background:var(--pri);color:#fff;}
.wn-card{background:#fff;border-radius:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(106,27,154,.08);overflow:hidden;}
.wn-header{background:linear-gradient(135deg,#6a1b9a,#8e24aa);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.wn-title{font-family:'Black Han Sans',sans-serif;font-size:14px;}
.wn-badge{font-size:10px;background:rgba(255,255,255,.25);border-radius:8px;padding:2px 8px;}
.wn-body{padding:14px 16px;}
.wn-passage{font-size:13px;line-height:1.9;color:#1a1a2e;background:#faf5ff;border-left:3px solid #ce93d8;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:10px;}
.wn-ans-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.wn-my{background:#ffebee;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:800;color:#b71c1c;}
.wn-ok{background:#e8f5e9;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:800;color:#1b5e20;}
.wn-exp{font-size:12px;color:#555;line-height:1.6;border-top:1px solid #f0e6ff;padding-top:8px;margin-top:4px;}
.wn-empty{text-align:center;padding:32px;color:var(--muted);font-size:14px;font-weight:700;}
.wn-clear-btn{width:100%;padding:10px;border-radius:10px;border:2px solid #ef9a9a;background:#fff;color:#c62828;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:14px;}
</style>
</head>

<!-- 시작 화면 -->
<div id="startScreen">

</div>

<script>
// ============================================================
// 문제 데이터
// type: 'abc' = (A)(B)(C) 낱말 고르기 / 'ul' = 밑줄 낱말 적절성
// abc형: choices = [{label:'(A)', opts:['A','B'], ans:'A'}, ...]
//        answer = 번호(①②③④⑤), ansIdx = 0-based
// ul형: passage에 ①~⑤ 번호 달린 밑줄 단어, ansIdx = 틀린 번호(0-based)
// ============================================================
const QLISTS = [
  // ── (A)(B)(C) 형 ─────────────────────────────
  {
    no:"30-1", passageNo:30, topic:"적응과 즐거움 ①", qtype:"abc",
    passage:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment more enjoyable. <mark>(A)</mark> the opposite is true. Shows are actually more enjoyable when they're broken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. Interspersing positive experiences with less positive ones, however, can <mark>(B)</mark> adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows <mark>(C)</mark> the process. The less positive moment makes the following positive one new again and thus more enjoyable.`,
    choices:[
      {label:"(A)", opts:["However","Moreover"], ans:"However"},
      {label:"(B)", opts:["accelerate","decelerate"], ans:"decelerate"},
      {label:"(C)", opts:["arranges","disrupts"], ans:"disrupts"},
    ],
    options:["① Moreover - accelerate - disrupts","② However - decelerate - arranges","③ Moreover - decelerate - arranges","④ However - accelerate - disrupts","⑤ However - decelerate - disrupts"],
    ans:"⑤ However - decelerate - disrupts",
    exp:"(A) 광고 제거가 더 즐겁게 해줄 것 같지만 반전이므로 However. (B) 부정적 경험 삽입이 적응을 '늦추므로' decelerate. (C) 과정을 '방해하므로' disrupts."
  },
  {
    no:"30-2", passageNo:30, topic:"적응과 즐거움 ②", qtype:"abc",
    passage:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows more entertaining. But the opposite is true. Shows may seem a little more <mark>(A)</mark> when they're not broken up by annoying commercials. Because these less amusing moments impede adaptation to the positive experience of the show. Now, let's think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable because of adaptation. <mark>(B)</mark> positive experiences with less positive ones, however, can deter this phenomenon. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows <mark>(C)</mark> the process. The less positive moment makes the following positive one new again and thus more delightful.`,
    choices:[
      {label:"(A)", opts:["tedious","enjoyable"], ans:"enjoyable"},
      {label:"(B)", opts:["Sprinkling","Substituting"], ans:"Sprinkling"},
      {label:"(C)", opts:["hinders","stimulates"], ans:"hinders"},
    ],
    options:["① tedious - Sprinkling - stimulates","② enjoyable - Sprinkling - hinders","③ tedious - Sprinkling - hinders","④ enjoyable - Substituting - stimulates","⑤ tedious - Substituting - hinders"],
    ans:"② enjoyable - Sprinkling - hinders",
    exp:"(A) 광고 없을 때 적응으로 더 enjoyable하게 느껴질 것 같지만 실제는 반대. (B) 부정적 경험을 '뿌리듯 삽입'하는 Sprinkling. (C) 적응 과정을 '방해하므로' hinders."
  },
  {
    no:"34-1", passageNo:34, topic:"금융 시장과 소비", qtype:"abc",
    passage:`Financial markets do more than take capital from the rich and lend it to everyone else. They enable each of us to <mark>(A)</mark> consumption over our lifetimes, which is a fancy way of saying that we don't have to spend income at the same time we earn it. Shakespeare may have admonished us to be neither borrowers nor lenders; the fact is that most of us will be both at some point. If we lived in an agrarian society, we would have to eat our crops reasonably soon after the harvest or find some way to store them. Financial markets are a more <mark>(B)</mark> way of managing the harvest. We can spend income now that we have not yet earned ― as by borrowing for college or a home ― or we can earn income now and spend it later, as by saving for retirement. The important point is that earning income has been <mark>(C)</mark> from spending it, allowing us much more flexibility in life.`,
    choices:[
      {label:"(A)", opts:["smooth","aggravate"], ans:"smooth"},
      {label:"(B)", opts:["sophisticated","unsophisticated"], ans:"sophisticated"},
      {label:"(C)", opts:["divorced","combined"], ans:"divorced"},
    ],
    options:["① aggravate - sophisticated - divorced","② smooth - sophisticated - divorced","③ aggravate - sophisticated - combined","④ smooth - unsophisticated - combined","⑤ aggravate - unsophisticated - divorced"],
    ans:"② smooth - sophisticated - divorced",
    exp:"(A) 소비를 '원활하게' smooth. (B) 더 '정교한' sophisticated. (C) 소득 획득과 소비가 '분리되었으므로' divorced."
  },
  {
    no:"35-1", passageNo:35, topic:"무료 코드와 DNA", qtype:"abc",
    passage:`As the old joke goes: "Software, free. User manual, $10,000." But it's no joke. A couple of high-profile companies make their living selling instruction and paid support for free software. The copy of code, being mere bits, is free. The lines of free code become <mark>(A)</mark> to you only through support and guidance. A lot of medical and genetic information will go this route in the coming decades. Right now getting a full copy of all your DNA is very expensive ($10,000), but soon it won't be. The price is dropping so fast, it will be $100 soon, and then the next year insurance companies will offer you <mark>(B)</mark> sequencing. When a copy of your sequence costs nothing, the interpretation of what it means, what you can do about it, and how to use it ― the manual for your genes ― will be <mark>(C)</mark>.`,
    choices:[
      {label:"(A)", opts:["valueless","priceless"], ans:"priceless"},
      {label:"(B)", opts:["charged","free"], ans:"free"},
      {label:"(C)", opts:["reasonable","expensive"], ans:"expensive"},
    ],
    options:["① valueless - charged - expensive","② valueless - free - expensive","③ valueless - free - reasonable","④ priceless - charged - reasonable","⑤ priceless - free - expensive"],
    ans:"⑤ priceless - free - expensive",
    exp:"(A) 지원과 안내로 '가치 있게' 되므로 priceless. (B) 보험사가 '무료로' 제공하므로 free. (C) DNA 사본이 무료가 되면 해석 설명서는 '비싸지므로' expensive."
  },
  {
    no:"39-1", passageNo:39, topic:"산업혁명과 자동화", qtype:"abc",
    passage:`Imagine that seven out of ten working Americans got fired tomorrow. What would they all do? It's hard to believe you'd have an economy at all if you gave pink slips to more than half the labor force. But that is what the industrial revolution did to the workforce of the early 19th century. Two hundred years ago, 70 percent of American workers lived on the farm. Today automation has <mark>(A)</mark> all but 1 percent of their jobs, replacing them with machines. But the <mark>(B)</mark> workers did not sit idle. Instead, automation created hundreds of millions of jobs in entirely new fields. Those who once farmed were now manning the factories that manufactured farm equipment, cars, and other industrial products. Since then, wave upon wave of new occupations have <mark>(C)</mark> — appliance repair person, food chemist, photographer, web designer — each building on previous automation.`,
    choices:[
      {label:"(A)", opts:["removed","provided"], ans:"removed"},
      {label:"(B)", opts:["displaced","employed"], ans:"displaced"},
      {label:"(C)", opts:["appeared","disappeared"], ans:"appeared"},
    ],
    options:["① removed - displaced - appeared","② removed - displaced - disappeared","③ removed - employed - appeared","④ provided - displaced - disappeared","⑤ provided - employed - appeared"],
    ans:"① removed - displaced - appeared",
    exp:"(A) 1%를 제외한 일자리를 '제거했으므로' removed. (B) 일자리를 잃은 '밀려난' displaced. (C) 새 직업들이 계속 '등장했으므로' appeared."
  },

    passage:`The built-in capacity for smiling is ①<u>proven</u> by the remarkable observation that babies who are congenitally both deaf and blind, who have never seen a human face, also start to smile at around 2 months. However, smiling in blind babies eventually disappears if nothing is done to ②<u>restore</u> it. Without the right feedback, smiling dies out. But here's a fascinating fact: blind babies will ③<u>continue</u> to smile if they are cuddled, bounced, nudged, and tickled by an adult — anything to let them know that they are not alone and that someone cares about them. This social feedback ④<u>encourages</u> the baby to continue smiling. In this way, early experience operates with our biology to establish social behaviors. In fact, you don't need the cases of blind babies to make the point. Babies with sight smile ⑤<u>more</u> at you when you look at them or, better still, smile back at them.`,

    no:"30-3", passageNo:30, topic:"적응과 즐거움 ③", qtype:"ul",
    passage:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment ①<u>less enjoyable</u>. But the opposite is true. Shows are actually more enjoyable when they're broken up by annoying commercials. Because these less enjoyable moments break up ②<u>adaptation</u> to the positive experience of the show. Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip ③<u>in a row</u>, the goodness is no longer as pleasurable. We adapt. Interspersing positive experiences with less positive ones, however, can ④<u>decelerate</u> adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows disrupts the process. The less positive moment makes the ⑤<u>following</u> positive one new again and thus more enjoyable.`,

    passage:`The scarcity error is as old as mankind. People collect stamps, coins, vintage cars even when they serve no ①<u>decorative</u> purpose. The post office doesn't ②<u>accept</u> the old stamps, the banks don't take old coins, and the vintage cars are no longer allowed on the road. These are all side issues; the attraction is that they are in ③<u>deficient</u> supply. In one study, students were asked to arrange ten posters in order of attractiveness — with the agreement that afterward they could keep one poster as a reward for their participation. Five minutes later, they were told that the poster with the third highest rating was no longer ④<u>available</u>. Then they were asked to judge all ten from scratch. The poster that was no longer available was suddenly classified as the most beautiful. In psychology, this phenomenon is called reactance: when we are ⑤<u>deprived</u> of an option, we suddenly deem it more attractive.`,

    passage:`If we've invested in something that hasn't repaid us — be it money in a failing venture, or time in an unhappy relationship — we find it very difficult to walk away. This is the sunk cost fallacy. Our instinct is to continue investing money or time as we hope that our investment will prove to be ①<u>worthwhile</u> in the end. Giving up would mean acknowledging that we've ②<u>wasted</u> something we can't get back, and that thought is so painful that we prefer to avoid it if we can. The problem, of course, is that if something really is a bad bet, then staying with it simply ③<u>escalates</u> the amount we lose. Rather than walk away from a bad five-year relationship, for example, we turn it into a bad 10-year relationship; rather than accept that we've lost a thousand dollars, we ④<u>invest</u> another thousand and lose that too. In the end, by ⑤<u>hastening</u> the pain of admitting our problem, we only add to it.`,

// 지문 단위로 그루핑
const PASSAGES = [];
const pMap = {};
QLISTS.forEach(q => {
  if(!pMap[q.passageNo]){
    pMap[q.passageNo] = {no:q.passageNo, topic:q.topic.replace(/ [①-⑩]/g,'').replace(/ 밑줄형/,'').trim(), qs:[]};
    PASSAGES.push(pMap[q.passageNo]);
  }
  pMap[q.passageNo].qs.push(q);
});
PASSAGES.sort((a,b)=>a.no-b.no);

// 상태
let selected=new Set(), doneSet=new Set(), filterMode='all';
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], answered=false, t0=0;
let abcState={}, wrongQs=[];

function goSel(){
  document.getElementById('startScreen').classList.add('hidden');
  renderGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function renderGrid(){
  const g=document.getElementById('passageGrid'); g.innerHTML='';
  PASSAGES.forEach(p=>{
    const no=p.no;
    if(filterMode==='abc'&&!p.qs.some(q=>q.qtype==='abc'))return;
    if(filterMode==='ul'&&!p.qs.some(q=>q.qtype==='ul'))return;
    const cnt=p.qs.length;
    const d=document.createElement('div');
    d.className='p-card'+(selected.has(no)?' sel':'')+(doneSet.has(no)?' done':'');
    d.onclick=()=>{selected.has(no)?selected.delete(no):selected.add(no);d.classList.toggle('sel',selected.has(no));};
    d.innerHTML=`<div class="p-no">${no}번</div><div class="p-topic">${p.topic}</div><div class="p-qcount">${cnt}문제</div>`
      +(doneSet.has(no)?'<span class="p-badge" style="background:#e8f5e9;color:#2e7d32;">완료✓</span>':'')
      +(selected.has(no)&&!doneSet.has(no)?'<span class="p-badge" style="background:#ede7f6;color:#6a1b9a;">선택</span>':'');
    g.appendChild(d);
  });
}

function doFilter(mode,btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); renderGrid();
}

function selAll(){
  const vis=PASSAGES.filter(p=>{
    if(filterMode==='abc')return p.qs.some(q=>q.qtype==='abc');
    if(filterMode==='ul')return p.qs.some(q=>q.qtype==='ul');
    return true;
  });
  const all=vis.every(p=>selected.has(p.no));
  vis.forEach(p=>{if(all)selected.delete(p.no);else selected.add(p.no);});
  renderGrid();
}

function startQuiz(){
  if(selected.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  qs=[];
  PASSAGES.filter(p=>selected.has(p.no)).forEach(p=>{
    p.qs.forEach(q=>qs.push(q));
  });
  idx=0;cor=0;wrn=0;wrongs=[];answered=false;t0=Date.now();abcState={};wrongQs=[];
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=selected.size+'개 지문 · '+qs.length+'문제';
  showQ();
}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false; abcState={};
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');

  if(q.qtype==='abc'){
    // (A)(B)(C) 형
    const passHTML=q.passage
      .replace(/\n/g,' ')
      .replace(/<mark>\(A\)<\/mark>/g,'<span style="background:#ede7f6;border-radius:4px;padding:0 4px;font-weight:800;color:#4a148c;">(A)</span>')
      .replace(/<mark>\(B\)<\/mark>/g,'<span style="background:#fff3e0;border-radius:4px;padding:0 4px;font-weight:800;color:#e65100;">(B)</span>')
      .replace(/<mark>\(C\)<\/mark>/g,'<span style="background:#e8f5e9;border-radius:4px;padding:0 4px;font-weight:800;color:#1b5e20;">(C)</span>');

    let abcRows='';
    q.choices.forEach((c,i)=>{
      const colors=['#4a148c','#e65100','#1b5e20'];
      abcRows+=`<div class="abc-row">
        <span class="abc-label" style="color:${colors[i]}">${c.label}</span>
        <div class="abc-btns" id="abcbtns_${i}">
          ${c.opts.map(o=>`<button class="abc-btn" data-ci="${i}" data-opt="${o}" onclick="pickABC(this,${i},'${o}','${c.ans}')">${o}</button>`).join('')}
        </div>
      </div>`;
    });

    // 5지선다
    let optHTML='';
    q.options.forEach((o,i)=>{
      optHTML+=`<button class="cb" id="opt_${i}" onclick="pickFinal(this,'${o.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}')">`
        +`<span class="cn">${['①','②','③','④','⑤'][i]}</span>${o}</button>`;
    });

    area.innerHTML=`<div class="qc">
      <div class="q-no-badge"><span class="qno">${q.passageNo}번</span><span class="qtype-tag qtype-abc">(A)(B)(C) 낱말 고르기</span></div>
      <div style="font-size:11px;font-weight:700;color:var(--pri);margin-bottom:8px;">📄 지문 (${q.topic})</div>
      <div class="passage-box">${passHTML}</div>
      <div class="abc-wrap">${abcRows}</div>
      <div style="font-size:12px;font-weight:700;color:#555;margin:6px 0 8px;">🔢 조합을 고르세요</div>
      <div class="choices">${optHTML}</div>
      <div class="fb-box" id="fb"></div>
      <button class="next-btn" id="nextBtn" onclick="goNext()">다음 문제 →</button>
    </div>`;

  } else {
    // 밑줄 낱말 적절성 형
    const passHTML=q.passage
      .replace(/①<u>/g,'<span class="ul-word" id="ul0">①')
      .replace(/②<u>/g,'<span class="ul-word" id="ul1">②')
      .replace(/③<u>/g,'<span class="ul-word" id="ul2">③')
      .replace(/④<u>/g,'<span class="ul-word" id="ul3">④')
      .replace(/⑤<u>/g,'<span class="ul-word" id="ul4">⑤')
      .replace(/<\/u>/g,'</span>');

    let optHTML='';
    q.options.forEach((o,i)=>{
      optHTML+=`<button class="cb" id="ulopt_${i}" onclick="pickUL(this,'${o}','${q.ans}')">`
        +`<span class="cn">${o}</span>${o}</button>`;
    });

    area.innerHTML=`<div class="qc">
      <div class="q-no-badge"><span class="qno">${q.passageNo}번</span><span class="qtype-tag qtype-ul">밑줄 낱말 적절성</span></div>
      <div style="font-size:11px;font-weight:700;color:var(--pri);margin-bottom:8px;">📄 지문 (${q.topic}) — 문맥상 쓰임이 <b>적절하지 않은</b> 것은?</div>
      <div class="passage-box">${passHTML}</div>
      <div class="choices">${optHTML}</div>
      <div class="fb-box" id="fb"></div>
      <button class="next-btn" id="nextBtn" onclick="goNext()">다음 문제 →</button>
    </div>`;
  }
}

// (A)(B)(C) 개별 선택
function pickABC(btn,ci,opt,ans){
  if(answered)return;
  const wrap=document.getElementById('abcbtns_'+ci);
  wrap.querySelectorAll('.abc-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  abcState[ci]=opt;
}

// (A)(B)(C) 최종 번호 선택
function pickFinal(btn,sel,ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>{b.disabled=true;});
  document.querySelectorAll('.abc-btn').forEach(b=>{b.disabled=true;});
  const q=qs[idx];
  const correct=(sel===ans);
  if(correct){
    btn.classList.add('c-ok');
    document.getElementById('fb').className='fb-box ok';
    document.getElementById('fb').textContent='✅ 정답! '+q.exp;
    cor++;
  } else {
    btn.classList.add('c-ng');
    document.querySelectorAll('.cb').forEach(b=>{
      if(b.textContent.includes(ans.substring(0,4)))b.classList.add('reveal');
    });
    document.getElementById('fb').className='fb-box no';
    document.getElementById('fb').textContent='❌ 오답! 정답: '+ans+' | '+q.exp;
    wrn++;
    wrongs.push({label:q.passageNo+'번 (A)(B)(C)',my:sel,correct:ans,exp:q.exp});
    wrongQs.push(q);
  }
  document.getElementById('nextBtn').style.display='block';
}

// 밑줄형 선택
function pickUL(btn,sel,ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const q=qs[idx];
  const correct=(sel===ans);
  const ansIdx=['①','②','③','④','⑤'].indexOf(ans);
  if(correct){
    btn.classList.add('c-ok');
    if(ansIdx>=0){const el=document.getElementById('ul'+ansIdx);if(el)el.style.color='#1b5e20';}
    document.getElementById('fb').className='fb-box ok';
    document.getElementById('fb').textContent='✅ 정답! '+q.exp;
    cor++;
  } else {
    btn.classList.add('c-ng');
    if(ansIdx>=0){
      const el=document.getElementById('ul'+ansIdx);
      if(el){el.style.color='#c62828';el.style.textDecoration='underline';}
      const rb=document.getElementById('ulopt_'+ansIdx);
      if(rb)rb.classList.add('reveal');
    }
    document.getElementById('fb').className='fb-box no';
    document.getElementById('fb').textContent='❌ 오답! 정답: '+ans+' | '+q.exp;
    wrn++;
    wrongs.push({label:q.passageNo+'번 밑줄형',my:sel,correct:ans,exp:q.exp});
    wrongQs.push(q);
  }
  document.getElementById('nextBtn').style.display='block';
}

function goNext(){idx++;showQ();}

// ── localStorage 오답 저장 키 ──────────────────────────
const LS_KEY = 'bomnal_context_wrongs';

function loadStoredWrongs(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }
  catch(e){ return []; }
}

function saveWrongsToLS(newWrongs){
  const stored = loadStoredWrongs();
  // no 기준으로 중복 제거 후 최신 추가
  newWrongs.forEach(w=>{
    const exists = stored.findIndex(s=>s.no===w.no);
    if(exists>=0) stored[exists]=w; else stored.push(w);
  });
  localStorage.setItem(LS_KEY, JSON.stringify(stored));
}

function clearStoredWrongs(){
  localStorage.removeItem(LS_KEY);
  renderWrongNote();
}

// ── 결과 화면 ──────────────────────────────────────────
function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selected.forEach(n=>doneSet.add(n));

  // localStorage에 오답 저장
  if(wrongQs.length>0){
    const toSave = wrongQs.map(q=>({
      no: q.no,
      passageNo: q.passageNo,
      topic: q.topic,
      qtype: q.qtype,
      passage: q.passage,
      options: q.options,
      ans: q.ans,
      exp: q.exp,
      choices: q.choices||null,
      savedAt: new Date().toLocaleDateString('ko-KR')
    }));
    saveWrongsToLS(toSave);
  }

  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고2 24년 6월 문맥 학습 · ${selected.size}개 지문</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">나의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#6a1b9a;">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    <div class="rbtns">
      ${wrongQs.length>0?`<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:#fff;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongQs.length}개)</button>`:''}
      <button class="rbtn" style="background:linear-gradient(135deg,#6a1b9a,#8e24aa);color:#fff;" onclick="showWrongNote()">📒 오답 노트 보기</button>
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;
}

function retryWrongs(){
  if(wrongQs.length===0)return;
  qs=[...wrongQs];
  idx=0;cor=0;wrn=0;wrongs=[];answered=false;t0=Date.now();abcState={};wrongQs=[];
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent='오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selected.clear(); renderGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

// ── 오답 노트 화면 ──────────────────────────────────────
function showWrongNote(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('wrongNoteScreen').classList.remove('hidden');
  renderWrongNote();
}

function renderWrongNote(tab){
  const stored = loadStoredWrongs();
  const activeTab = tab || 'note';
  const ws = document.getElementById('wrongNoteScreen');

  let tabContent = '';
  if(activeTab==='note'){
    if(stored.length===0){
      tabContent=`<div class="wn-empty">📭 저장된 오답이 없어요!</div>`;
    } else {
      tabContent = stored.map(q=>{
        // passage 렌더 (mark 태그 → 색깔 span)
        let passHTML = (q.passage||'')
          .replace(/<mark>\(A\)<\/mark>/g,'<span style="background:#ede7f6;border-radius:4px;padding:0 2px;font-weight:800;color:#4a148c;">(A)</span>')
          .replace(/<mark>\(B\)<\/mark>/g,'<span style="background:#fff3e0;border-radius:4px;padding:0 2px;font-weight:800;color:#e65100;">(B)</span>')
          .replace(/<mark>\(C\)<\/mark>/g,'<span style="background:#e8f5e9;border-radius:4px;padding:0 2px;font-weight:800;color:#1b5e20;">(C)</span>')
          .replace(/①<u>/g,'<span style="text-decoration:underline;font-weight:800;">①')
          .replace(/②<u>/g,'<span style="text-decoration:underline;font-weight:800;">②')
          .replace(/③<u>/g,'<span style="text-decoration:underline;font-weight:800;">③')
          .replace(/④<u>/g,'<span style="text-decoration:underline;font-weight:800;">④')
          .replace(/⑤<u>/g,'<span style="text-decoration:underline;font-weight:800;">⑤')
          .replace(/<\/u>/g,'</span>');
        const typeLabel = q.qtype==='abc'?'(A)(B)(C) 고르기':'밑줄 낱말 적절성';
        return `<div class="wn-card">
          <div class="wn-header">
            <span class="wn-title">${q.passageNo}번 · ${q.topic}</span>
            <span class="wn-badge">${typeLabel} · ${q.savedAt||''}</span>
          </div>
          <div class="wn-body">
            <div class="wn-passage">${passHTML}</div>
            <div class="wn-ans-row">
              <span style="font-size:12px;color:#555;font-weight:700;align-self:center;">정답:</span>
              <span class="wn-ok">✅ ${q.ans}</span>
            </div>
            <div class="wn-exp">💡 ${q.exp}</div>
          </div>
        </div>`;
      }).join('');
    }
  } else {
    // 다시풀기 탭 — 저장된 오답으로 퀴즈 시작 버튼
    if(stored.length===0){
      tabContent=`<div class="wn-empty">📭 저장된 오답이 없어요!</div>`;
    } else {
      tabContent=`<div style="text-align:center;padding:16px 0;">
        <div style="font-size:14px;font-weight:800;color:var(--pri);margin-bottom:6px;">저장된 오답 ${stored.length}문제</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:20px;">localStorage에 누적된 모든 오답입니다.</div>
        <button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:#fff;margin-bottom:10px;width:100%;padding:14px;" onclick="startStoredRetry()">❌ 오답 전체 다시풀기 (${stored.length}문제)</button>
      </div>`;
    }
  }

  ws.innerHTML=`
    <div style="padding:20px;max-width:700px;margin:0 auto;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <button onclick="closeWrongNote()" style="border:none;background:none;font-size:20px;cursor:pointer;">←</button>
        <span style="font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--pri);">📒 오답 노트</span>
        <span style="font-size:12px;color:var(--muted);margin-left:4px;">총 ${stored.length}문제 누적</span>
      </div>
      <div class="tab-bar">
        <button class="tab-btn ${activeTab==='note'?'on':''}" onclick="renderWrongNote('note')">📖 오답 읽기</button>
        <button class="tab-btn ${activeTab==='retry'?'on':''}" onclick="renderWrongNote('retry')">🔁 다시 풀기</button>
      </div>
      ${stored.length>0?`<button class="wn-clear-btn" onclick="if(confirm('오답 노트를 전부 초기화할까요?'))clearStoredWrongs()">🗑️ 오답 노트 초기화</button>`:''}
      ${tabContent}
    </div>`;
}

function startStoredRetry(){
  const stored = loadStoredWrongs();
  if(stored.length===0)return;
  // stored 데이터를 QLISTS 형식으로 복원
  qs = stored.map(q=>({...q}));
  idx=0;cor=0;wrn=0;wrongs=[];answered=false;t0=Date.now();abcState={};wrongQs=[];
  document.getElementById('wrongNoteScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent='오답 노트 다시풀기';
  showQ();
}

function closeWrongNote(){
  document.getElementById('wrongNoteScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
}
</script>
</body>
</html>
