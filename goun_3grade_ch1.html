/* ─── 상태 변수 ─── */
let currentBlanks = [];   // [{ word, blankId, length }, ...]
let startDateTime = null;
let tabSwitchCount = 0;
let attemptCount = 0;

/* ─── 날짜/시간 표시 ─── */
function formatDT(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} `
       + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

/* ─── 문장 토큰화 (단어 + 뒤에 붙는 구두점 분리) ─── */
function tokenize(sentence) {
  return sentence.trim().split(/\s+/).map(function(tok) {
    // 끝에 붙은 구두점(.,!? 등)을 분리
    var word = tok.replace(/[^A-Za-z]+$/, '');
    var punct = tok.slice(word.length);
    if (!word) { return { word: tok, punct: '' }; }
    return { word: word, punct: punct };
  });
}

/* ─── 빈칸 위치 랜덤 선택 (단어 3글자 이상 중 2개) ─── */
function pickBlanks(tokens) {
  const eligible = tokens
    .map((t, i) => i)
    .filter(i => tokens[i].word.length >= 3);

  // Fisher–Yates shuffle
  for (let i = eligible.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [eligible[i], eligible[j]] = [eligible[j], eligible[i]];
  }
  return new Set(eligible.slice(0, Math.min(2, eligible.length)));
}

/* ─── 글자 박스 HTML 생성 ─── */
function buildLetterBoxes(blankId, word) {
  let html = `<span class="blank-group" data-blank="${blankId}">`;
  let inputIdx = 0;
  for (let c = 0; c < word.length; c++) {
    const ch = word[c];
    if (/[^A-Za-z0-9]/.test(ch)) {
      html += `<span style="display:inline-flex;align-items:center;justify-content:center;width:10px;font-size:16px;font-weight:700;color:#3B82F6;">${ch}</span>`;
    } else {
      html += `<input
        class="letter-box"
        type="text" maxlength="2"
        id="${blankId}_${inputIdx}"
        data-blank="${blankId}"
        data-idx="${inputIdx}"
        data-charpos="${c}"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
        inputmode="text"
        aria-label="글자 ${inputIdx+1}"
      />`;
      inputIdx++;
    }
  }
  html += `</span>`;
  return html;
}

/* ─── 문제 렌더링 ─── */
function renderQuestions() {
  currentBlanks = [];
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  SENTENCES.forEach((sent, si) => {
    const tokens = tokenize(sent.en);
    const blankSet = pickBlanks(tokens);

    let engHtml = '';
    tokens.forEach((tok, ti) => {
      if (blankSet.has(ti)) {
        const blankId = `q${si}_b${currentBlanks.length}`;
        currentBlanks.push({ blankId, word: tok.word, sentIdx: si });
        if (tok.leadPunct) engHtml += `<span>${tok.leadPunct}</span>`;
        engHtml += buildLetterBoxes(blankId, tok.word);
        if (tok.punct) engHtml += `<span>${tok.punct}</span>`;
        engHtml += ' ';
      } else {
        engHtml += `<span>${tok.leadPunct||''}${tok.word}${tok.punct}</span> `;
      }
    });

    const card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = `
      <div class="q-num">문제 ${si + 1}</div>
      <div class="english-line">${engHtml}</div>
      <div class="korean-line">🇰🇷 ${sent.ko}</div>
    `;
    container.appendChild(card);
  });

  /* 이벤트 등록 */
  container.querySelectorAll('.letter-box').forEach(box => {
    box.addEventListener('input', onLetterInput);
    box.addEventListener('keydown', onLetterKeydown);
    box.addEventListener('paste', e => e.preventDefault());   // 붙여넣기 차단
  });
}

/* ─── 글자 입력 핸들러 ─── */
function onLetterInput(e) {
  const box = e.target;
  let val = box.value;

  /* 붙여넣기나 예측입력으로 2글자 이상 들어오면 첫 글자만 허용 */
  if (val.length > 1) val = val[0];

  /* 영문자만 허용 */
  val = val.replace(/[^A-Za-z0-9']/g, '');
  box.value = val;

  if (val.length === 1) {
    box.classList.add('filled');
    /* 다음 칸으로 자동 이동 */
    const blankId = box.dataset.blank;
    const idx     = parseInt(box.dataset.idx);
    const next    = document.getElementById(`${blankId}_${idx + 1}`);
    if (next) next.focus();
  } else {
    box.classList.remove('filled');
  }
}

/* ─── 백스페이스: 이전 칸으로 이동 ─── */
function onLetterKeydown(e) {
  const box = e.target;
  if (e.key === 'Backspace' && box.value === '') {
    const blankId = box.dataset.blank;
    const idx     = parseInt(box.dataset.idx);
    const prev    = document.getElementById(`${blankId}_${idx - 1}`);
    if (prev) { prev.value = ''; prev.focus(); }
  }
}

/* ─── 빈칸에서 학생 답 수집 ─── */
function collectAnswer(blankInfo) {
  let ans = '';
  let inputIdx = 0;
  for (let c = 0; c < blankInfo.word.length; c++) {
    const ch = blankInfo.word[c];
    if (/[^A-Za-z0-9]/.test(ch)) {
      ans += ch;
    } else {
      const box = document.getElementById(`${blankInfo.blankId}_${inputIdx}`);
      ans += box ? (box.value || ' ') : ' ';
      inputIdx++;
    }
  }
  return ans.trim();
}

/* ─── 채점 ─── */
function submitTest(auto) {
  const name = document.getElementById('student-name').value.trim() || (auto ? '(자동제출)' : '');
  if (!name) { alert('이름을 먼저 입력해 주세요!'); return; }

  const incomplete = currentBlanks.some(b => {
    const ans = collectAnswer(b);
    const inputLen = b.word.split('').filter(ch => !(/[^A-Za-z0-9]/.test(ch))).length;
    return ans.replace(/[\s\-\.']/g, '').length < inputLen;
  });
  if (!auto && incomplete) {
    if (!confirm('아직 채우지 않은 칸이 있습니다. 그래도 제출할까요?')) return;
  }

  const endDT = new Date();
  let correct = 0;

  /* 결과 카드 생성 */
  let detailsHtml = '';
  const sentResults = {};  // sentIdx → [{blankId, word, userAns, ok}]

  currentBlanks.forEach(b => {
    const userAns = collectAnswer(b);
    const ok = userAns.toLowerCase() === b.word.toLowerCase();
    if (ok) correct++;
    if (!sentResults[b.sentIdx]) sentResults[b.sentIdx] = [];
    sentResults[b.sentIdx].push({ word: b.word, blankId: b.blankId, userAns, ok });
  });

  SENTENCES.forEach((sent, si) => {
    if (!sentResults[si]) return;

    /* 결과 영문장 재구성 */
    const tokens = tokenize(sent.en);
    const blankIds = sentResults[si].map(r => r.blankId);
    let blankPtr = 0;

    let engResult = '';
    let usedBlanks = {};
    // 어느 토큰이 어느 blankId에 매핑됐는지 역추적
    const blankMap = {};
    currentBlanks.forEach(b => {
      if (b.sentIdx === si) blankMap[b.blankId] = b;
    });

    // 빈칸 위치를 다시 알아내기
    tokens.forEach((tok, ti) => {
      // sentResults[si] 중 tok.word와 매칭되는 것 찾기
      const match = sentResults[si].find(r => !usedBlanks[r.blankId] && r.word === tok.word);
      if (match) {
        usedBlanks[match.blankId] = true;
        const cls  = match.ok ? 'ok' : 'bad';
        const mark = match.ok ? '✅' : '❌';
        engResult += `<span class="${cls}"><u>${tok.word}</u>${tok.punct}</span> `;
      } else {
        engResult += `${tok.word}${tok.punct} `;
      }
    });

    let answerRows = sentResults[si].map(r =>
      r.ok
        ? `<span class="ok">✅ "${r.word}" 정답!</span>`
        : `<span class="bad">❌ 정답: <b>${r.word}</b> / 내 답: <b>${r.userAns || '(공백)'}</b></span>`
    ).join('<br>');

    detailsHtml += `
      <div class="result-card">
        <div class="q-num">문제 ${si + 1}</div>
        <div class="result-eng">${engResult}</div>
        <div class="result-kor">🇰🇷 ${sent.ko}</div>
        <div class="answer-row">${answerRows}</div>
      </div>`;
  });

  /* 점수 헤더 */
  const total = currentBlanks.length;
  const pct   = Math.round(correct / total * 100);
  const emoji = pct === 100 ? '🏆' : pct >= 70 ? '😊' : '😢';
  const isPass = pct >= 70;

  document.getElementById('result-header-block').innerHTML = `
    <div class="result-header ${isPass ? '' : 'fail-header'}">
      <div style="font-size:36px;">${emoji}</div>
      <div class="score-big">${correct} / ${total}</div>
      <div class="score-label">${pct}점 &nbsp;·&nbsp; ${isPass ? '통과 🎉' : '다시 도전!'}</div>
      <div class="result-meta">
        👤 ${name} &nbsp;|&nbsp; 📅 ${formatDT(endDT)}
        &nbsp;|&nbsp; 📝 ${attemptCount}회차 응시
        &nbsp;|&nbsp; ${tabSwitchCount > 0 ? '⚠️ 탭 이탈 ' + tabSwitchCount + '회' : '✅ 탭 이탈 없음'}
      </div>
    </div>`;

  document.getElementById('result-details').innerHTML = detailsHtml;


  /* 구글 시트에 결과 전송 */
  var wrongList = [];
  Object.keys(sentResults).forEach(function(si) {
    var hasWrong = sentResults[si].some(function(r) { return !r.ok; });
    if (hasWrong) {
      wrongList.push({ num: parseInt(si) + 1, en: SENTENCES[parseInt(si)].en });
    }
  });
  submitToSheet(name, correct, total, wrongList);

  /* 화면 전환 */
  document.getElementById('test-screen').style.display   = 'none';
  document.getElementById('result-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

/* ─── 다시 시작 ─── */
function restartTest() {
  document.getElementById('test-screen').style.display   = 'block';
  document.getElementById('result-screen').style.display = 'none';
  renderQuestions();
  window.scrollTo(0, 0);
}

/* ─── 초기화 ─── */
(function init() {
  startDateTime = new Date();
  document.getElementById('test-datetime').textContent = '시험 시작: ' + formatDT(startDateTime);
  renderQuestions();

  var storageKey = 'attemptCount_고운중_3학년_1챕터';
  attemptCount = parseInt(localStorage.getItem(storageKey) || '0') + 1;
  localStorage.setItem(storageKey, attemptCount);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      tabSwitchCount++;
      if (document.getElementById('test-screen').style.display !== 'none') {
        if (tabSwitchCount >= 3) {
          setTimeout(function() {
            alert('🚨 탭 이탈 3회 초과!\n\n부정행위 방지를 위해 시험이 자동 제출됩니다.');
            submitTest(true);
          }, 100);
        } else {
          setTimeout(function() {
            alert('⚠️ 다른 탭/창으로 이동이 감지되었습니다!\n\n이탈 횟수: ' + tabSwitchCount + '회 / 3회\n3회 초과 시 자동 제출됩니다.');
          }, 100);
        }
      }
    }
  });

  document.addEventListener('copy',  function(e) { e.preventDefault(); });
  document.addEventListener('cut',   function(e) { e.preventDefault(); });
  document.addEventListener('paste', function(e) { e.preventDefault(); });
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && ['c','v','x','a'].includes(e.key.toLowerCase())) { e.preventDefault(); }
    if (e.metaKey && ['c','v','x','a'].includes(e.key.toLowerCase())) { e.preventDefault(); }
  });
})();

/* ─── 구글 시트 전송 ─── */
var SCRIPT_URL = 'SCRIPT_URL_HERE'; // ← 나중에 URL로 교체

function submitToSheet(name, correct, total, wrongList) {
  if (!SCRIPT_URL || SCRIPT_URL === 'SCRIPT_URL_HERE') return;
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var dateStr = now.getFullYear() + '.' + pad(now.getMonth()+1) + '.' + pad(now.getDate());
  var timeStr = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  var wrongNumbers = wrongList.length > 0 ? wrongList.map(function(w){ return w.num + '번'; }).join(', ') : '';
  var wrongSentences = wrongList.length > 0
    ? wrongList.map(function(w){ return w.num + '번: ' + w.en; }).join(' / ')
    : '';
  var payload = {
    date: dateStr,
    time: timeStr,
    name: name,
    school: QUIZ_INFO.school,
    grade: QUIZ_INFO.grade,
    chapter: QUIZ_INFO.chapter,
    correct: correct,
    total: total,
    percent: Math.round(correct / total * 100),
    wrongNumbers: wrongNumbers,
    wrongSentences: wrongSentences
  };
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(function(err) { console.log('전송 오류:', err); });
}
