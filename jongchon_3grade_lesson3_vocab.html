<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>봄날 퀴즈 | 종촌중 3학년 3과 단어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);min-height:100vh;padding:14px;color:#333;}
.wrap{max-width:640px;margin:0 auto;}
.hdr{background:linear-gradient(135deg,#2e7d32,#43a047);color:white;padding:18px;border-radius:14px;text-align:center;margin-bottom:16px;box-shadow:0 4px 12px rgba(46,125,50,.3);}
.hdr h1{font-size:1.3rem;font-weight:900;}
.hdr .sub{font-size:.85rem;opacity:.95;margin-top:4px;}
.card{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:14px;}
.card h2{font-size:1.05rem;font-weight:900;color:#2e7d32;margin-bottom:12px;}
.ni{width:100%;padding:11px 14px;font-size:.95rem;border:2px solid #a5d6a7;border-radius:10px;margin-bottom:10px;font-family:inherit;}
.ni:focus{outline:none;border-color:#2e7d32;}
.btn{display:inline-block;width:100%;padding:13px;font-size:1rem;font-weight:800;background:linear-gradient(135deg,#2e7d32,#43a047);color:white;border:none;border-radius:10px;cursor:pointer;font-family:inherit;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn:hover:not(:disabled){filter:brightness(1.05);}
.hud{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;font-weight:700;color:#666;margin-bottom:10px;}
.hud .name{color:#2e7d32;font-weight:800;}
.pb{height:8px;background:#fff;border-radius:4px;overflow:hidden;margin-bottom:14px;border:1px solid #a5d6a7;}
.pf{height:100%;background:linear-gradient(90deg,#2e7d32,#43a047);transition:width .3s;width:0%;}
.word-box{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border:3px solid #2e7d32;border-radius:14px;padding:24px 16px;text-align:center;margin-bottom:14px;}
.word{font-size:1.8rem;font-weight:900;color:#1b5e20;letter-spacing:.5px;font-family:'Black Han Sans',sans-serif;}
.prompt{font-size:.95rem;font-weight:800;color:#666;text-align:center;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{background:#fff;border:2px solid #c8e6c9;border-radius:10px;padding:13px 15px;font-size:1rem;font-weight:700;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:11px;transition:all .15s;color:#333;}
.opt:hover:not(:disabled){background:#e8f5e9;border-color:#66bb6a;}
.opt:disabled{cursor:not-allowed;}
.opt .cn{width:24px;height:24px;border-radius:50%;background:#66bb6a;color:white;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0;}
.opt.correct{background:#e8f5e9;border-color:#43a047;color:#1b5e20;}
.opt.correct .cn{background:#43a047;}
.opt.wrong{background:#ffebee;border-color:#e53935;color:#b71c1c;}
.opt.wrong .cn{background:#e53935;}
.opt.reveal{background:#e8f5e9;border-color:#43a047;color:#1b5e20;}
.fb{margin-top:12px;padding:10px;border-radius:8px;font-weight:800;text-align:center;font-size:.95rem;display:none;}
.fb.show{display:block;}
.fb.ok{background:#e8f5e9;color:#1b5e20;}
.fb.no{background:#ffebee;color:#b71c1c;}
.hidden{display:none;}
.rs-score{font-size:3rem;font-weight:900;color:#2e7d32;text-align:center;margin:10px 0;font-family:'Black Han Sans',sans-serif;}
.rs-sub{text-align:center;color:#666;font-size:.9rem;margin-bottom:14px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat{background:#e8f5e9;border-radius:10px;padding:12px;text-align:center;}
.stat-n{font-size:1.4rem;font-weight:900;}
.stat-l{font-size:.75rem;color:#666;margin-top:2px;}
.ans-list{margin-top:14px;}
.ans-list h3{font-size:.95rem;color:#2e7d32;margin-bottom:8px;}
.ans-item{background:#fafafa;border-left:4px solid #ccc;padding:10px 12px;margin-bottom:6px;border-radius:0 8px 8px 0;font-size:.85rem;}
.ans-item.ok{border-left-color:#43a047;}
.ans-item.no{border-left-color:#e53935;}
.ans-item .en{font-weight:800;color:#1b5e20;}
.ans-item .ko-correct{color:#1b5e20;font-weight:700;}
.ans-item .ko-my{color:#b71c1c;text-decoration:line-through;font-size:.78rem;margin-left:4px;}
.ans-item .badge{display:inline-block;padding:1px 7px;border-radius:5px;font-size:.7rem;font-weight:800;color:white;margin-right:5px;}
.ans-item.ok .badge{background:#43a047;}
.ans-item.no .badge{background:#e53935;}
.btn-row{display:flex;gap:8px;margin-top:14px;}
.btn-row .btn{flex:1;}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr"><h1>🌱 종촌중 3학년 3과 단어</h1><div class="sub">동아(윤정미) 1학기 기말 · 영어 → 한국어 5지선다</div></div>

<div id="loginScreen" class="card">
  <h2>📚 학생 정보</h2>
  <select class="ni" id="schoolSel">
    <option value="">학교 선택</option>
    <option>종촌중1</option><option>종촌중2</option><option>종촌중3</option>
    <option>기타</option>
  </select>
  <input type="text" class="ni" id="nameInput" placeholder="이름을 입력하세요" maxlength="10">
  <button class="btn" onclick="startQuiz()">시작하기 →</button>
</div>

<div id="quizScreen" class="card hidden">
  <div class="hud">
    <span class="name" id="hudName"></span>
    <span id="hudNo">1/0</span>
  </div>
  <div class="pb"><div class="pf" id="pf"></div></div>
  <div class="word-box"><div class="word" id="wordEn"></div></div>
  <div class="prompt">📖 알맞은 뜻을 고르세요</div>
  <div class="opts" id="opts"></div>
  <div class="fb" id="fb"></div>
</div>

<div id="resultScreen" class="card hidden">
  <h2 style="text-align:center;">🎉 결과</h2>
  <div class="rs-score" id="rsScore"></div>
  <div class="rs-sub" id="rsSub"></div>
  <div class="stats">
    <div class="stat"><div class="stat-n" style="color:#43a047;" id="rsOk"></div><div class="stat-l">정답</div></div>
    <div class="stat"><div class="stat-n" style="color:#e53935;" id="rsNo"></div><div class="stat-l">오답</div></div>
    <div class="stat"><div class="stat-n" style="color:#1976d2;" id="rsTotal"></div><div class="stat-l">총문제</div></div>
  </div>
  <div class="ans-list">
    <h3>📋 전체 정답 확인</h3>
    <div id="ansList"></div>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="location.reload()">🔄 다시 풀기</button>
  </div>
</div>
</div>

<script>
const VOCAB = [{en:"mean",ko:"의미하다"},{en:"medicine",ko:"약"},{en:"pleasure",ko:"기쁨, 즐거움"},{en:"anyway",ko:"그런데, 그건 그렇고"},{en:"cross",ko:"교차하다, 서로 겹치게 놓다"},{en:"expression",ko:"(동작, 그림 등에 의한) 표현"},{en:"foreign",ko:"외국의"},{en:"origin",ko:"기원, 근원"},{en:"borrow",ko:"빌리다"},{en:"culture",ko:"문화"},{en:"language",ko:"언어"},{en:"example",ko:"예, 사례"},{en:"shampoo",ko:"샴푸"},{en:"Hindi",ko:"힌디어"},{en:"press",ko:"누르다"},{en:"massage",ko:"마사지, 안마"},{en:"British",ko:"영국의, 영국인의"},{en:"trader",ko:"무역상, 상인"},{en:"India",ko:"인도"},{en:"introduce",ko:"소개하다"},{en:"Britain",ko:"영국"},{en:"century",ko:"세기, 100년"},{en:"meaning",ko:"의미"},{en:"enter",ko:"들어오다"},{en:"around",ko:"~경에, ~무렵에"},{en:"present",ko:"현재의; 현재, 선물"},{en:"shortly",ko:"곧, 얼마 안 되어"},{en:"soap",ko:"비누"},{en:"robot",ko:"로봇"},{en:"play",ko:"연극, 희곡"},{en:"human",ko:"인간, 사람"},{en:"design",ko:"~을 설계하다, 디자인하다"},{en:"produce",ko:"생산하다"},{en:"factory",ko:"공장"},{en:"originally",ko:"원래, 본래"},{en:"machine",ko:"기계"},{en:"Latin",ko:"라틴어의; 라틴어"},{en:"however",ko:"그러나"},{en:"suggest",ko:"제안하다"},{en:"slave",ko:"노예"},{en:"Czech",ko:"체코의, 체코인의; 체코어, 체코인"},{en:"decide",ko:"결정하다, 결심하다"},{en:"science fiction",ko:"공상과학 소설"},{en:"hurricane",ko:"허리케인"},{en:"Spanish",ko:"스페인의; 스페인어"},{en:"originate",ko:"비롯되다, 유래하다"},{en:"Mayan",ko:"마야인[어]의"},{en:"creation",ko:"창조"},{en:"myth",ko:"신화"},{en:"anger",ko:"화나게 하다; 화, 분노"},{en:"cause",ko:"일으키다, ~의 원인이 되다"},{en:"flood",ko:"홍수"},{en:"contact",ko:"접촉, 연락"},{en:"civilization",ko:"문명"},{en:"explorer",ko:"탐험가"},{en:"experience",ko:"경험하다; 경험"},{en:"area",ko:"지역"},{en:"early",ko:"초기의; 일찍, 빨리"},{en:"use",ko:"사용, 이용; 사용하다, 쓰다"},{en:"clear",ko:"명확한, 분명한"},{en:"believe",ko:"믿다"},{en:"invent",ko:"발명하다"},{en:"sometime",ko:"(과거의) 어떤 때, 언젠가"},{en:"place",ko:"놓다, 두다"},{en:"slice",ko:"(음식을 얇게 썬) 조각"},{en:"such",ko:"그런, 그와 같은"},{en:"pay for",ko:"~ 값을 지불하다"},{en:"get on",ko:"~에 타다"},{en:"keep in touch",ko:"연락하다, 연락하고 지내다"},{en:"introduce A to B",ko:"A를 B에게 소개하다"},{en:"look like",ko:"~처럼 보이다"},{en:"on television",ko:"텔레비전에(방송되는)"},{en:"originate from",ko:"~에서 유래하다, 비롯하다"},{en:"pass through",ko:"~을 통과하다, 지나가다"},{en:"pick up",ko:"(정보를) 듣게 되다, 익히다"},{en:"come from",ko:"~에서 유래하다"},{en:"between A and B",ko:"A와 B 사이에"}];
let userName='', userSchool='';
let qs=[], idx=0, cor=0, wrn=0, answered=false;
const results=[];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz(){
  userSchool=document.getElementById('schoolSel').value;
  userName=document.getElementById('nameInput').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  qs = shuffle(VOCAB).map(w=>{
    const dist = shuffle(VOCAB.filter(o=>o.ko!==w.ko)).slice(0,4);
    const opts = shuffle([w.ko, ...dist.map(d=>d.ko)]);
    return {en:w.en, ko:w.ko, opts:opts};
  });
  idx=0; cor=0; wrn=0; results.length=0; answered=false;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('hudName').textContent = userSchool+' · '+userName;
  showQ();
}

function escHTML(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showQ(){
  if(idx>=qs.length){ showResult(); return; }
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hudNo').textContent=(idx+1)+'/'+qs.length;
  document.getElementById('wordEn').textContent=q.en;
  const oc=document.getElementById('opts');
  oc.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="cn">'+(i+1)+'</span><span>'+escHTML(opt)+'</span>';
    b.addEventListener('click',()=>selOpt(b, opt, q.ko));
    oc.appendChild(b);
  });
  const fb=document.getElementById('fb');
  fb.classList.remove('show','ok','no');
  fb.textContent='';
}

function selOpt(btn, sel, ans){
  if(answered) return;
  answered=true;
  const buttons=document.querySelectorAll('.opt');
  buttons.forEach(b=>b.disabled=true);
  const q=qs[idx];
  const isCorrect = String(sel).trim() === String(ans).trim();
  const fb=document.getElementById('fb');
  if(isCorrect){
    btn.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent='✅ 정답!';
    cor++;
    results.push({en:q.en, ko:ans, my:sel, correct:true});
  } else {
    btn.classList.add('wrong');
    buttons.forEach(b=>{
      const txt=b.querySelector('span:last-child');
      if(txt && txt.textContent.trim()===String(ans).trim()) b.classList.add('reveal');
    });
    fb.className='fb show no';
    fb.innerHTML='❌ 정답: <strong>'+escHTML(ans)+'</strong>';
    wrn++;
    results.push({en:q.en, ko:ans, my:sel, correct:false});
  }
  setTimeout(()=>{ idx++; showQ(); }, isCorrect?700:1500);
}

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const total=qs.length;
  const pct=total>0?Math.round(cor/total*100):0;
  document.getElementById('rsScore').textContent=pct+'점';
  document.getElementById('rsSub').textContent=userSchool+' · '+userName;
  document.getElementById('rsOk').textContent=cor;
  document.getElementById('rsNo').textContent=wrn;
  document.getElementById('rsTotal').textContent=total;
  const list=document.getElementById('ansList');
  list.innerHTML = results.map(r=>{
    const cls = r.correct?'ok':'no';
    const badge = r.correct?'O':'X';
    const myPart = r.correct?'':' <span class="ko-my">내 답: '+escHTML(r.my)+'</span>';
    return '<div class="ans-item '+cls+'"><span class="badge">'+badge+'</span><span class="en">'+escHTML(r.en)+'</span> → <span class="ko-correct">'+escHTML(r.ko)+'</span>'+myPart+'</div>';
  }).join('');
}
</script>
</body>
</html>
