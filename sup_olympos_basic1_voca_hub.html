<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>봄날 ENGLISH | 올림포스 독해 기본 1 · 어휘퀴즈</title>
<script type="module" src="bn_tracker.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#f0f4f8,#e3edf5);min-height:100vh;color:#1a1a2e;}
header{padding:24px 20px 14px;text-align:center;background:white;border-bottom:1px solid #cbdde9;}
.book-tag{display:inline-block;background:#5e7791;color:white;border-radius:14px;padding:2px 10px;font-size:.65rem;font-weight:700;margin-bottom:6px;}
.type-title{font-family:'Black Han Sans',sans-serif;font-size:1.4rem;color:#1565c0;}
.subtitle{font-size:.78rem;color:#5e7791;margin-top:3px;}
main{max-width:820px;margin:24px auto;padding:0 16px 60px;}
.back-nav{display:inline-flex;align-items:center;gap:6px;background:white;border:1.5px solid #b0c4de;border-radius:10px;padding:7px 14px;font-size:.78rem;color:#5e7791;cursor:pointer;text-decoration:none;margin-bottom:18px;}
.back-nav:hover{border-color:#1565c0;color:#1565c0;}
.intro-box{background:white;border:1px solid #cbdde9;border-radius:12px;padding:14px 16px;margin-bottom:18px;font-size:.82rem;line-height:1.65;color:#1565c0;}
.unit-block{background:white;border:2px solid #cbdde9;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:all .15s;cursor:pointer;}
.unit-block:hover{border-color:#1565c0;background:#f0f7ff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(21,101,192,.12);}
.unit-num-box{flex-shrink:0;width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,#1565c0,#1976d2);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;}
.unit-num-box .u{font-size:.6rem;opacity:.85;letter-spacing:.5px;}
.unit-num-box .n{font-size:1.5rem;line-height:1;margin-top:1px;}
.unit-info{flex:1;min-width:0;}
.unit-theme{font-family:'Black Han Sans',sans-serif;font-size:1.05rem;color:#1a1a2e;letter-spacing:.3px;}
.unit-meta{font-size:.74rem;color:#5e7791;margin-top:3px;}
.section-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.chip{display:inline-flex;align-items:center;background:#e3f2fd;color:#1565c0;padding:3px 9px;border-radius:11px;font-size:.7rem;font-weight:700;}
.chip.sn{background:#fff8e1;color:#f57c00;}
.chip.po{background:#e8f5e9;color:#2e7d32;}
.chip.sl{background:#fce4ec;color:#c2185b;}
.chip.np{background:#ede7f6;color:#5e35b1;}
.cnt-badge{flex-shrink:0;background:#1565c0;color:white;border-radius:14px;padding:5px 11px;font-size:.72rem;font-weight:800;}
.arrow{flex-shrink:0;color:#90caf9;font-size:1.3rem;font-weight:bold;}
</style>
</head>
<body>
<header>
  <div class="book-tag">📘 올림포스 독해 기본 1</div>
  <div class="type-title">🔤 어휘퀴즈 (강별)</div>
  <div class="subtitle">Unit을 선택해 그 강의 어휘 학습을 시작하세요</div>
</header>
<main>
  <a class="back-nav" href="sup_olympos_basic1_hub.html">← 올림포스 메인으로</a>
  <div class="intro-box">
    <strong>각 Unit(강)별로 어휘퀴즈가 모여 있습니다.</strong><br>
    Unit을 클릭하면 그 강의 섹션(수능 / Practice 01·02·03 / 서술 / 논술 등)을 골라 풀 수 있습니다.
    모드: 뜻 맞추기 · 유의어 찾기. 채점 즉시 한국어 뜻 표시.
  </div>
  <div id="unit-list"></div>
</main>
<script>
// 18 Units with section labels + counts (from parsed PDF)
const UNITS = [
  {no:1, theme:'글의 목적',         sections:[{l:'수능',c:15},{l:'01',c:15},{l:'02',c:10},{l:'03',c:14}]},
  {no:2, theme:'심경 · 분위기',     sections:[{l:'수능',c:16},{l:'01',c:19},{l:'02',c:9},{l:'03',c:13}]},
  {no:3, theme:'주장 · 요지',       sections:[{l:'수능',c:13},{l:'01',c:13},{l:'02',c:9},{l:'03',c:11}]},
  {no:4, theme:'함축적 의미',       sections:[{l:'수능',c:14},{l:'01',c:18},{l:'02',c:15},{l:'03',c:15}]},
  {no:5, theme:'주제 · 제목',       sections:[{l:'수능',c:13},{l:'01',c:12},{l:'02',c:20},{l:'03',c:11},{l:'서술',c:8},{l:'논술',c:12}]},
  {no:6, theme:'도표 · 실용문',     sections:[{l:'수능',c:6},{l:'01',c:8},{l:'02',c:9},{l:'03',c:6}]},
  {no:7, theme:'학술문 불일치',     sections:[{l:'수능',c:18},{l:'01',c:11},{l:'02',c:15},{l:'03',c:10},{l:'서술',c:10},{l:'논술',c:2}]},
  {no:8, theme:'어법 정확성',       sections:[{l:'수능',c:17},{l:'01',c:17},{l:'02',c:7},{l:'03',c:12}]},
  {no:9, theme:'어휘 적절성',       sections:[{l:'수능',c:14},{l:'01',c:5},{l:'02',c:16},{l:'03',c:9},{l:'서술',c:3},{l:'논술',c:8}]},
  {no:10,theme:'단어 빈칸 추론',    sections:[{l:'수능',c:9},{l:'01',c:9},{l:'02',c:15},{l:'03',c:13}]},
  {no:11,theme:'짧은 어구 빈칸',    sections:[{l:'수능',c:11},{l:'01',c:13},{l:'02',c:9},{l:'03',c:15}]},
  {no:12,theme:'긴 어구 빈칸',      sections:[{l:'수능',c:16},{l:'01',c:12},{l:'02',c:9},{l:'03',c:11},{l:'서술',c:11},{l:'논술',c:10}]},
  {no:13,theme:'무관한 문장',       sections:[{l:'수능',c:12},{l:'01',c:16},{l:'02',c:10},{l:'03',c:14}]},
  {no:14,theme:'글의 순서',         sections:[{l:'수능',c:10},{l:'01',c:12},{l:'02',c:12},{l:'03',c:14}]},
  {no:15,theme:'문장 삽입',         sections:[{l:'수능',c:13},{l:'01',c:9},{l:'02',c:12},{l:'03',c:16}]},
  {no:16,theme:'요약문 완성',       sections:[{l:'수능',c:10},{l:'01',c:14},{l:'02',c:9},{l:'03',c:11},{l:'서술',c:14},{l:'논술',c:14}]},
  {no:17,theme:'장문 Ⅰ (1지문 2문항)', sections:[{l:'수능',c:19},{l:'01',c:1},{l:'02',c:17},{l:'03',c:1},{l:'04',c:21}]},
  {no:18,theme:'장문 Ⅱ (1지문 3문항)', sections:[{l:'수능',c:30},{l:'01~03',c:23},{l:'04~06',c:12},{l:'서술',c:21},{l:'논술',c:19}]}
];

function chipClass(label){
  if (label==='수능') return 'sn';
  if (/^0\d/.test(label) || /\d~\d/.test(label)) return 'po';
  if (label==='서술') return 'sl';
  if (label==='논술') return 'np';
  return '';
}

const list = document.getElementById('unit-list');
UNITS.forEach(u => {
  const totalCount = u.sections.reduce((a,b)=>a+b.c,0);
  const a = document.createElement('a');
  a.href = `sup_olympos_basic1_u${u.no}_voca.html`;
  a.className = 'unit-block';
  const chips = u.sections.map(s => `<span class="chip ${chipClass(s.l)}">${s.l} · ${s.c}</span>`).join('');
  a.innerHTML = `
    <div class="unit-num-box"><span class="u">UNIT</span><span class="n">${u.no}</span></div>
    <div class="unit-info">
      <div class="unit-theme">${u.theme}</div>
      <div class="unit-meta">섹션 ${u.sections.length}개 · 총 ${totalCount}개 어휘</div>
      <div class="section-chips">${chips}</div>
    </div>
    <div class="cnt-badge">${totalCount}</div>
    <div class="arrow">›</div>
  `;
  list.appendChild(a);
});
</script>
</body>
</html>
