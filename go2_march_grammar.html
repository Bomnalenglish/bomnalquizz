<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f0e8;
  --card:#fff;
  --ink:#1c1a16;
  --soft:#6b6456;
  --accent:#c8522a;
  --accent2:#3a7d6e;
  --correct:#2e7d52;
  --wrong:#c0392b;
  --correct-bg:#e8f5ee;
  --wrong-bg:#fdecea;
  --border:#e0d8cc;
  --num-bg:#1c1a16;
}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
}

/* HEADER */
header{
  background:var(--ink);
  color:#fff;
  padding:48px 24px 40px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
header::before{
  content:'';
  position:absolute;
  top:-80px;left:-80px;
  width:300px;height:300px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.08);
}
header::after{
  content:'';
  position:absolute;
  bottom:-60px;right:-60px;
  width:240px;height:240px;
  border-radius:50%;
  border:2px solid rgba(200,82,42,0.3);
}
.header-tag{
  display:inline-block;
  font-size:0.72rem;
  font-weight:500;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--accent);
  border:1px solid var(--accent);
  border-radius:2px;
  padding:4px 12px;
  margin-bottom:16px;
}
header h1{
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(1.6rem,5vw,2.6rem);
  letter-spacing:-0.5px;
  line-height:1.2;
  color:#fff;
}
header h1 span{color:var(--accent);}
.header-sub{
  font-family:'Noto Serif KR',serif;
  font-size:0.9rem;
  color:rgba(255,255,255,0.5);
  margin-top:10px;
  letter-spacing:1px;
}

/* PROGRESS BAR */
.progress-wrap{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  position:sticky;
  top:0;
  z-index:100;
}
.progress-bar-outer{
  flex:1;
  height:6px;
  background:var(--border);
  border-radius:3px;
  overflow:hidden;
}
.progress-bar-inner{
  height:100%;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:3px;
  width:0%;
  transition:width 0.4s ease;
}
.progress-text{
  font-size:0.78rem;
  font-weight:700;
  color:var(--soft);
  white-space:nowrap;
  min-width:60px;
  text-align:right;
}
.score-badge{
  font-size:0.78rem;
  font-weight:700;
  background:var(--ink);
  color:#fff;
  border-radius:20px;
  padding:4px 12px;
  white-space:nowrap;
}

/* MAIN */
main{
  max-width:820px;
  margin:0 auto;
  padding:40px 20px 80px;
}

/* QUESTION CARD */
.q-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:32px 28px 28px;
  margin-bottom:24px;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
  animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.q-num{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:36px;height:36px;
  background:var(--num-bg);
  color:#fff;
  border-radius:8px;
  font-family:'Black Han Sans',sans-serif;
  font-size:1rem;
  margin-bottom:16px;
  flex-shrink:0;
}
.q-header{
  display:flex;
  align-items:flex-start;
  gap:12px;
  margin-bottom:20px;
}
.q-status{
  margin-left:auto;
  font-size:0.72rem;
  font-weight:700;
  padding:3px 10px;
  border-radius:20px;
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.3s;
}
.q-status.show{opacity:1;}
.q-status.done-all{background:#e8f5ee;color:var(--correct);}
.q-status.has-wrong{background:#fdecea;color:var(--wrong);}

/* PASSAGE */
.passage{
  font-family:'Noto Serif KR',serif;
  font-size:0.92rem;
  line-height:2.0;
  color:var(--ink);
  word-break:keep-all;
  margin-bottom:24px;
}

/* INLINE CHOICE */
.choice-group{
  display:inline-flex;
  align-items:center;
  gap:2px;
  vertical-align:middle;
  border:1.5px solid var(--border);
  border-radius:6px;
  overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;
  font-size:0.82rem;
  font-weight:500;
  margin:0 2px;
  transition:border-color 0.2s;
}
.choice-group.answered{border-color:transparent;}

.choice-btn{
  background:none;
  border:none;
  padding:3px 8px;
  cursor:pointer;
  font-family:inherit;
  font-size:inherit;
  font-weight:600;
  color:var(--ink);
  transition:background 0.15s,color 0.15s;
  line-height:1.4;
}
.choice-btn:hover:not(:disabled){
  background:var(--ink);
  color:#fff;
}
.choice-btn.correct{
  background:var(--correct);
  color:#fff;
  cursor:default;
}
.choice-btn.wrong{
  background:var(--wrong);
  color:#fff;
  cursor:default;
  text-decoration:line-through;
  opacity:0.7;
}
.choice-btn.reveal-correct{
  background:var(--correct);
  color:#fff;
  cursor:default;
}
.choice-btn:disabled{cursor:default;}

.sep{
  font-size:0.75rem;
  color:#bbb;
  padding:0 1px;
  pointer-events:none;
  font-weight:400;
}

/* SCORE SUMMARY */
.summary{
  background:var(--ink);
  color:#fff;
  border-radius:16px;
  padding:40px 32px;
  text-align:center;
  margin-top:16px;
  display:none;
  animation:fadeUp 0.5s ease both;
}
.summary.show{display:block;}
.summary-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:1.8rem;
  margin-bottom:8px;
}
.summary-title span{color:var(--accent);}
.summary-score{
  font-size:3.5rem;
  font-weight:700;
  color:var(--accent);
  font-family:'Black Han Sans',sans-serif;
  margin:20px 0 8px;
}
.summary-sub{
  font-size:0.9rem;
  color:rgba(255,255,255,0.55);
  margin-bottom:28px;
  font-family:'Noto Serif KR',serif;
}
.summary-msg{
  font-size:1.05rem;
  color:rgba(255,255,255,0.8);
  margin-bottom:32px;
}
.btn-retry{
  display:inline-block;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:12px 36px;
  font-family:'Black Han Sans',sans-serif;
  font-size:1rem;
  cursor:pointer;
  letter-spacing:1px;
  transition:opacity 0.2s;
}
.btn-retry:hover{opacity:0.85;}

/* CAPTURE NOTE */
.capture-note{
  margin-top:16px;
  text-align:center;
  font-size:0.85rem;
  color:var(--soft);
  font-family:'Noto Serif KR',serif;
}

/* DELAY ANIMATION */
.q-card:nth-child(1){animation-delay:0.03s;}
.q-card:nth-child(2){animation-delay:0.07s;}
.q-card:nth-child(3){animation-delay:0.11s;}
.q-card:nth-child(4){animation-delay:0.15s;}

.q-card:nth-child(6){animation-delay:0.23s;}

.q-card:nth-child(12){animation-delay:0.47s;}
.q-card:nth-child(13){animation-delay:0.51s;}
</style>

function buildPassage(q) {
  // Build a map: itemNo -> itemIdx
  const noToIdx = {};
  q.items.forEach((item, idx) => { noToIdx[item.no] = idx; });

  // Track which choice-group index we're on as we walk through parts
  let cgCounter = 0;
  let html = '<div class="passage">';

  q.parts.forEach(part => {
    if (typeof part === 'string') {
      html += escapeHtml(part);
    } else {
      // It's a [opt0, opt1] array
      const itemIdx = cgCounter;
      const item = q.items[itemIdx];
      const qIdx = questions.indexOf(q);
      html += `<span class="choice-group" id="cg-${qIdx}-${itemIdx}">`;
      html += `<span class="sep">(${item.no})</span>`;
      item.opts.forEach((opt, optIdx) => {
        html += `<button class="choice-btn" onclick="handleClick(${qIdx},${itemIdx},${optIdx})" id="cb-${qIdx}-${itemIdx}-${optIdx}">${escapeHtml(opt)}</button>`;
        if (optIdx < item.opts.length - 1) {
          html += `<span class="sep">/</span>`;
        }
      });
      html += `</span>`;
      cgCounter++;
    }
  });

  html += '</div>';
  return html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  questions.forEach((q, qIdx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `qcard-${qIdx}`;

    const header = document.createElement('div');
    header.className = 'q-header';
    header.innerHTML = `<div class="q-num">${q.num}</div><div class="q-status" id="qstatus-${qIdx}"></div>`;
    card.appendChild(header);

    card.insertAdjacentHTML('beforeend', buildPassage(q));
    main.appendChild(card);
  });

  updateProgress();
}

    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button style="flex:1;min-width:120px;padding:11px 14px;font-size:.88rem;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;border-radius:10px;font-weight:800;cursor:pointer;" onclick="_resumeFromSession();this.closest('#resumeBox').remove();">▶️ 이어서 풀기</button>
      <button style="flex:1;min-width:120px;padding:11px 14px;font-size:.88rem;background:linear-gradient(135deg,#94a3b8,#64748b);color:white;border:none;border-radius:10px;font-weight:800;cursor:pointer;" onclick="_clearSession();this.closest('#resumeBox').remove();">🔄 새로 시작</button>
    </div>`;
  const main=document.getElementById('main');
  if(main && main.parentNode) main.parentNode.insertBefore(box, main);
}
window._resumeFromSession=_resumeFromSession;
window._clearSession=_clearSession;
window.addEventListener('DOMContentLoaded',function(){ _cleanupOldSessions(); setTimeout(_checkResumePrompt, 150); });

function handleClick(qIdx, itemIdx, optIdx) {
  // Already answered?
  if (state[qIdx][itemIdx] !== null) return;
  _picks[qIdx][itemIdx] = optIdx;

  const q = questions[qIdx];
  const item = q.items[itemIdx];
  const isCorrect = optIdx === item.ans;

  state[qIdx][itemIdx] = isCorrect ? 'correct' : 'wrong';
  answeredCount++;
  if (isCorrect) correctCount++;

  // Update buttons
  const btn = document.getElementById(`cb-${qIdx}-${itemIdx}-${optIdx}`);
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  btn.disabled = true;

  if (!isCorrect) {
    // Reveal correct answer
    const correctBtn = document.getElementById(`cb-${qIdx}-${itemIdx}-${item.ans}`);
    correctBtn.classList.add('reveal-correct');
    correctBtn.disabled = true;
  } else {
    // Disable other button too
    item.opts.forEach((_, oi) => {
      if (oi !== optIdx) {
        const ob = document.getElementById(`cb-${qIdx}-${itemIdx}-${oi}`);
        ob.disabled = true;
      }
    });
  }

  // Disable wrong button's sibling too
  const cg = document.getElementById(`cg-${qIdx}-${itemIdx}`);
  cg.classList.add('answered');

  // Update question status
  updateQStatus(qIdx);
  updateProgress();

  _saveSession();
  // Check if all done
  if (answeredCount === totalItems) {
    _clearSession();
    showSummary();
  }
}

function updateQStatus(qIdx) {
  const q = questions[qIdx];
  const s = state[qIdx];
  const answered = s.filter(x => x !== null).length;
  const total = q.items.length;
  const wrongs = s.filter(x => x === 'wrong').length;
  const statusEl = document.getElementById(`qstatus-${qIdx}`);

  if (answered === 0) {
    statusEl.className = 'q-status';
    statusEl.textContent = '';
    return;
  }
  statusEl.classList.add('show');
  if (wrongs > 0) {
    statusEl.className = 'q-status show has-wrong';
    statusEl.textContent = `${answered}/${total} · 오답 ${wrongs}개`;
  } else if (answered === total) {
    statusEl.className = 'q-status show done-all';
    statusEl.textContent = `✓ 완료 · 전체정답!`;
  } else {
    statusEl.className = 'q-status show done-all';
    statusEl.textContent = `${answered}/${total} · 정답 중`;
  }
}

function updateProgress() {
  const pct = totalItems > 0 ? (answeredCount / totalItems * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answeredCount} / ${totalItems}`;
  document.getElementById('scoreBadge').textContent = `✓ ${correctCount}`;
}

// ============================================================
// SUMMARY
// ============================================================
function showSummary() {
  const pct = Math.round(correctCount / totalItems * 100);
  let msg = '';
  if (pct === 100) msg = '🎉 완벽합니다! 모든 문항을 맞혔어요!';
  else if (pct >= 80) msg = '👍 훌륭해요! 조금만 더 다듬어 보세요.';
  else if (pct >= 60) msg = '📖 잘 했어요! 틀린 문항을 다시 확인해 보세요.';
  else msg = '💪 다시 한 번 도전해 보세요!';

  const summary = document.createElement('div');
  summary.className = 'summary show';
  summary.innerHTML = `
    <div class="summary-title">결과 <span>확인</span></div>
    <div class="summary-score">${correctCount}<span style="font-size:1.6rem;color:rgba(255,255,255,0.4)"> / ${totalItems}</span></div>
    <div class="summary-sub">정답률 ${pct}%</div>
    <div class="summary-msg">${msg}</div>
    <button class="btn-retry" onclick="location.reload()">🔄 다시 풀기</button>
  `;
  document.getElementById('main').appendChild(summary);
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
