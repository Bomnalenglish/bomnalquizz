<style>
  :root {
    --primary: #4a90d9;
    --primary-dark: #2c6fad;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --neutral: #7f8c8d;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #2c3e50;
    --sub: #636e72;
    --border: #dfe6e9;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    color: #fff;
    padding: 24px 20px 20px;
    text-align: center;
  }
  header .school { font-size: 12px; opacity: .75; letter-spacing: 1px; margin-bottom: 4px; }
  header h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  header .subtitle { font-size: 13px; opacity: .85; }

  /* ── Progress bar ── */
  #progress-wrap {
    background: #fff;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #progress-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #74b9ff);
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
  }
  #progress-text { font-size: 12px; color: var(--sub); white-space: nowrap; }

  /* ── Section labels ── */
  .section-label {
    text-align: center;
    padding: 20px 20px 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--primary-dark);
    text-transform: uppercase;
  }

  /* ── Question cards ── */
  .quiz-container { padding: 8px 16px; }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: border-color .25s;
  }
  .question-card.answered-correct { border-color: var(--correct); }
  .question-card.answered-wrong   { border-color: var(--wrong); }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .q-num {
    background: var(--primary);
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .q-korean {
    font-size: 12px;
    color: var(--sub);
    line-height: 1.5;
  }

  .q-sentence {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 14px;
    word-break: keep-all;
  }

  /* Inline blanks within sentence */
  .blank-slot {
    display: inline-flex;
    gap: 4px;
    vertical-align: middle;
    flex-wrap: wrap;
  }

  /* ── Choice buttons ── */
  .choices {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .choice-btn {
    padding: 7px 16px;
    border-radius: 99px;
    border: 2px solid var(--border);
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--primary);
    color: var(--primary);
    background: #eef5fd;
  }
  .choice-btn.selected-correct {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }
  .choice-btn.selected-wrong {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }
  .choice-btn.reveal-correct {
    border-color: var(--correct);
    color: var(--correct);
    background: #eafaf1;
  }
  .choice-btn:disabled { cursor: default; }

  /* Multi-blank row */
  .multi-blank {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .blank-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .blank-label {
    font-size: 11px;
    color: var(--sub);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  /* ── Result feedback ── */
  .feedback {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .feedback.correct { background: #eafaf1; color: #1e8449; display: block; }
  .feedback.wrong   { background: #fdedec; color: #c0392b; display: block; }

  /* ── Score summary ── */
  #summary {
    display: none;
    background: var(--card);
    margin: 20px 16px;
    border-radius: var(--radius);
    padding: 28px 20px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  #summary h2 { font-size: 22px; margin-bottom: 8px; }
  #summary .score-big { font-size: 48px; font-weight: 700; color: var(--primary); line-height: 1.1; }
  #summary .score-detail { font-size: 14px; color: var(--sub); margin-top: 6px; margin-bottom: 20px; }
  #summary .grade-msg { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

  /* ── Floating submit ── */
  #submit-wrap {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
  }
  #submit-btn {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: #fff;
    border: none;
    border-radius: 99px;
    padding: 14px 36px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(44,111,173,.35);
    transition: transform .15s, box-shadow .15s;
    font-family: inherit;
  }
  #submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(44,111,173,.45); }
  #submit-btn:active { transform: translateY(0); }

  #retry-btn {
    background: var(--neutral);
    color: #fff;
    border: none;
    border-radius: 99px;
    padding: 12px 32px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-top: 12px;
  }

  /* Warning overlay */
  #warn-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #warn-overlay.show { display: flex; }
  #warn-box {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
  }
  #warn-box .warn-icon { font-size: 40px; margin-bottom: 12px; }
  #warn-box h3 { font-size: 17px; margin-bottom: 8px; color: var(--wrong); }
  #warn-box p { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 16px; }
  #warn-close {
    background: var(--wrong); color: #fff;
    border: none; border-radius: 99px;
    padding: 10px 28px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }

  .attempt-info {
    text-align: center;
    font-size: 12px;
    color: var(--sub);
    padding: 8px 0 0;
  }
  .mode-selector{background:linear-gradient(135deg,#f0e8d8,#e8ddc4);border:2px solid #c4a78a;border-radius:14px;padding:14px 18px;margin:14px auto 4px;text-align:center;max-width:760px;}
  .mode-selector .mode-title{font-weight:700;font-size:.92rem;color:#5c3d1e;margin-bottom:10px;letter-spacing:.4px;}
  .mode-btn{padding:8px 16px;border-radius:10px;border:2px solid #5c3d1e;background:#fff;color:#5c3d1e;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;margin:0 3px;}
  .mode-btn.active{background:#5c3d1e;color:#fff;}
  .back-nav{display:inline-flex;align-items:center;gap:6px;background:white;border:1.5px solid #d0c8bc;border-radius:10px;padding:7px 14px;font-family:inherit;font-size:.85rem;color:#5c3d1e;cursor:pointer;margin:14px 20px 4px;transition:border-color .15s;text-decoration:none}
  .back-nav:hover{border-color:#5c3d1e;color:#5c3d1e}
</style>

let userAnswers = {}; // key: "m_q_b" or "e_q_b", value: chosen string

function totalBlanks() {
  let n = 0;
  QUESTIONS_MAIN.forEach(q => n += q.blanks.length);
  QUESTIONS_EXT.forEach(q => n += q.blanks.length);
  return n;
}
const TOTAL_ALL = totalBlanks();
let _currentMode = '본문';
const _t0 = Date.now();
let _saved = false;
function _modeTotal(){
  if(_currentMode==='본문') return QUESTIONS_MAIN.reduce((s,q)=>s+q.blanks.length, 0);
  if(_currentMode==='본문외') return QUESTIONS_EXT.reduce((s,q)=>s+q.blanks.length, 0);
  return TOTAL_ALL;
}
function _isMainKey(key){ return key.startsWith('m_'); }
function _inMode(section){
  if(_currentMode==='본문') return section==='m';
  if(_currentMode==='본문외') return section==='e';
  return true;
}
function _modeAnswered(){
  return Object.keys(userAnswers).filter(k => _inMode(k[0])).length;
}
function _modeWrongNumbers(){
  const wrongNums = new Set();
  const allQ = [...QUESTIONS_MAIN.map(q=>({...q,section:'m'})), ...QUESTIONS_EXT.map(q=>({...q,section:'e'}))];
  allQ.forEach(q => {
    if(!_inMode(q.section)) return;
    q.blanks.forEach((pair, bidx) => {
      const key = `${q.section}_${q.num}_${bidx}`;
      const userVal = userAnswers[key];
      if(userVal !== undefined && userVal !== q.answers[bidx]) wrongNums.add(q.num+'번');
    });
  });
  return [...wrongNums].join(', ');
}
function _modeCorrect(){
  let c = 0;
  const allQ = [...QUESTIONS_MAIN.map(q=>({...q,section:'m'})), ...QUESTIONS_EXT.map(q=>({...q,section:'e'}))];
  allQ.forEach(q => {
    if(!_inMode(q.section)) return;
    q.blanks.forEach((pair, bidx) => {
      const key = `${q.section}_${q.num}_${bidx}`;
      if(userAnswers[key] === q.answers[bidx]) c++;
    });
  });
  return c;
}
async function _saveProgress(){
  if(_saved) return;
  const done = _modeAnswered();
  if(done === 0) return;
  _saved = true;
  const correct = _modeCorrect();
  const total = _modeTotal();
  const pct = done > 0 ? Math.round(correct/done*100) : 0;
  const NAME = sessionStorage.getItem('bn_name')||localStorage.getItem('bn_name')||'익명';
  const SCHOOL = sessionStorage.getItem('bn_school')||localStorage.getItem('bn_school')||'고운고';
  const elapsedMin = Math.round((Date.now()-_t0)/60000);
  if(window._fbSave) await window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: NAME, school: SCHOOL,
    score: pct, correct: correct, wrong: done-correct, total: done,
    elapsedMin: elapsedMin,
    quizType: '고운고2 Lesson2 어법 ('+_currentMode+')',
    completed: done >= total,
    wrongNumbers: _modeWrongNumbers()
  });
}
window.addEventListener('beforeunload', _saveProgress);
function switchMode(newMode){
  if(newMode === _currentMode) return;
  if(Object.keys(userAnswers).length > 0){
    if(!confirm('현재 모드의 풀이가 진행 중입니다. 모드를 바꾸면 처음부터 다시 풀어야 합니다. 변경하시겠습니까?')) return;
    _saveProgress();
    location.reload();
    return;
  }
  _currentMode = newMode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === newMode));
  buildQuiz();
  updateProgress();
}

// ── SHUFFLE ───────────────────────────────────────────────────────────
// Pre-shuffle all blanks once per session so order is consistent during retry
let shuffledBlanks = {}; // key: "section_qnum_bidx" → shuffled pair array

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initShuffles() {
  shuffledBlanks = {};
  const allQ = [...QUESTIONS_MAIN.map(q=>({...q,section:'m'})), ...QUESTIONS_EXT.map(q=>({...q,section:'e'}))];
  allQ.forEach(q => {
    q.blanks.forEach((pair, bidx) => {
      const key = `${q.section}_${q.num}_${bidx}`;
      shuffledBlanks[key] = shuffleArray(pair);
    });
  });
}

  initShuffles();

function buildQuiz() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';

  if(_inMode('m')){
    area.insertAdjacentHTML('beforeend', '<div class="section-label">📖 본문 (1–52)</div>');
    const mainDiv = document.createElement('div');
    mainDiv.className = 'quiz-container';
    QUESTIONS_MAIN.forEach(q => mainDiv.appendChild(makeCard(q, 'm')));
    area.appendChild(mainDiv);
  }
  if(_inMode('e')){
    area.insertAdjacentHTML('beforeend', '<div class="section-label">📄 본문 외 지문 (1–10)</div>');
    const extDiv = document.createElement('div');
    extDiv.className = 'quiz-container';
    QUESTIONS_EXT.forEach(q => extDiv.appendChild(makeCard(q, 'e')));
    area.appendChild(extDiv);
  }
}

function makeSentenceHTML(q, section) {
  // Parse sentence: replace [___] with blank slot placeholders
  let parts = q.sentence.split('[___]');
  let html = '';
  parts.forEach((part, i) => {
    html += `<span>${part}</span>`;
    if (i < q.blanks.length) {
      const key = `${section}_${q.num}_${i}`;
      const pair = shuffledBlanks[key] || q.blanks[i];
      html += `<span class="blank-slot" data-section="${section}" data-qnum="${q.num}" data-bidx="${i}">`;
      pair.forEach(opt => {
        html += `<button class="choice-btn" onclick="pick(this,'${section}',${q.num},${i},'${opt}')">${opt}</button>`;
      });
      html += `</span>`;
    }
  });
  return html;
}

function makeCard(q, section) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = `card_${section}_${q.num}`;

  const numColor = section === 'm' ? 'var(--primary)' : '#8e44ad';
  card.innerHTML = `
    <div class="q-meta">
      <div class="q-num" style="background:${numColor}">${q.num}</div>
      <div class="q-korean">${q.ko}</div>
    </div>
    <div class="q-sentence">${makeSentenceHTML(q, section)}</div>
    <div class="feedback" id="fb_${section}_${q.num}"></div>
  `;
  return card;
}

// ── PICK ──────────────────────────────────────────────────────────────
function pick(btn, section, qnum, bidx, val) {
  if (submitted) return;
  const key = `${section}_${qnum}_${bidx}`;
  userAnswers[key] = val;

  // Update button visual in this blank slot
  const slot = btn.closest('.blank-slot');
  slot.querySelectorAll('.choice-btn').forEach(b => {
    b.classList.remove('selected-correct','selected-wrong');
    if (b.textContent === val) b.style.borderColor = 'var(--primary)';
    else b.style.borderColor = '';
  });
  btn.style.borderColor = 'var(--primary)';
  btn.style.color = 'var(--primary)';
  btn.style.background = '#eef5fd';

  updateProgress();
}

// ── PROGRESS ─────────────────────────────────────────────────────────
function updateProgress() {
  const answered = _modeAnswered();
  const total = _modeTotal();
  const pct = total > 0 ? (answered / total) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
}

function submitQuiz() {
  if (submitted) return;

  // Check all answered (within current mode)
  const answered = _modeAnswered();
  const total = _modeTotal();
  if (answered < total) {
    const remaining = total - answered;
    showWarn(`아직 ${remaining}개의 빈칸이 남아있어요.<br>모두 선택한 후 채점해주세요!`);
    return;
  }

  submitted = true;
  document.getElementById('submit-btn').style.display = 'none';

  let correct = 0;
  const allQ = [...QUESTIONS_MAIN.map(q=>({...q,section:'m'})), ...QUESTIONS_EXT.map(q=>({...q,section:'e'}))];

  allQ.forEach(q => {
    const section = q.section;
    if(!_inMode(section)) return;
    let qCorrect = true;
    q.blanks.forEach((pair, bidx) => {
      const key = `${section}_${q.num}_${bidx}`;
      const userVal = userAnswers[key];
      const correctVal = q.answers[bidx];
      const isCorrect = userVal === correctVal;
      if (!isCorrect) qCorrect = false;

      // Style buttons
      const slot = document.querySelector(`[data-section="${section}"][data-qnum="${q.num}"][data-bidx="${bidx}"]`);
      if (slot) {
        slot.querySelectorAll('.choice-btn').forEach(b => {
          b.disabled = true;
          b.style.borderColor = '';
          b.style.color = '';
          b.style.background = '';
          if (b.textContent === userVal && isCorrect) b.classList.add('selected-correct');
          else if (b.textContent === userVal && !isCorrect) b.classList.add('selected-wrong');
          else if (b.textContent === correctVal && !isCorrect) b.classList.add('reveal-correct');
        });
      }
      if (isCorrect) correct++;
    });

    const card = document.getElementById(`card_${section}_${q.num}`);
    const fb = document.getElementById(`fb_${section}_${q.num}`);
    if (qCorrect) {
      card.classList.add('answered-correct');
      fb.className = 'feedback correct';
      fb.textContent = '✓ 정답입니다!';
    } else {
      card.classList.add('answered-wrong');
      fb.className = 'feedback wrong';
      const wrongs = q.blanks.map((p,i) => {
        const k = `${section}_${q.num}_${i}`;
        return userAnswers[k] !== q.answers[i] ? `정답: ${q.answers[i]}` : null;
      }).filter(Boolean);
      fb.textContent = '✗ 오답 | ' + wrongs.join(' / ');
    }
  });

  // Score (mode-aware)
  const total = _modeTotal();
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-detail').textContent = `${correct} / ${total} 정답 (${_currentMode})`;
  // Save to Firebase
  _saveProgress();
  let msg = pct >= 90 ? '🌟 훌륭해요! 완벽에 가깝습니다!' :
            pct >= 70 ? '👍 잘했어요! 조금만 더 연습하면 완벽!' :
            pct >= 50 ? '🙂 절반 이상 맞았어요. 틀린 문항을 다시 확인해보세요.' :
                        '📚 틀린 문항을 꼼꼼히 복습해봐요!';
  document.getElementById('grade-msg').textContent = msg;
  document.getElementById('summary').style.display = 'block';
  document.getElementById('summary').scrollIntoView({behavior:'smooth'});
}

// ── RETRY ─────────────────────────────────────────────────────────────
function retryQuiz() {
  submitted = false;
  userAnswers = {};
  document.getElementById('submit-btn').style.display = '';
  document.getElementById('summary').style.display = 'none';
  initShuffles();
  buildQuiz();
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── WARN / CHEAT DETECT ───────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden && !submitted) {
    warnCount++;
    showWarn(`다른 탭으로 이동했습니다. (${warnCount}회)<br>성실하게 풀어주세요! 선생님께 제출 시 확인됩니다.`);
  }
});
document.addEventListener('copy', e => { if (!submitted) e.preventDefault(); });
document.addEventListener('contextmenu', e => { if (!submitted) e.preventDefault(); });

function showWarn(msg) {
  document.getElementById('warn-msg').innerHTML = msg;
  document.getElementById('warn-overlay').classList.add('show');
}
function closeWarn() {
  document.getElementById('warn-overlay').classList.remove('show');
}

// ── START ─────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
