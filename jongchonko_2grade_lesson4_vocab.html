<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>종촌고 2학년 4과 어휘 퀴즈</title>
<script type="module" src="bn_tracker.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f1ec;--card:#fff;--ink:#1c1a16;--soft:#6b6456;
  --border:#e0d8cc;--correct:#2e7d52;--wrong:#c0392b;
  --s1:#2a7ab8;--s2:#b85c2a;--s3:#2e7d52;--s4:#7b3fa0;--s5:#c0680a;
}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
header{background:var(--ink);color:#fff;padding:32px 24px 24px;text-align:center;}
.header-tag{display:inline-block;font-size:.72rem;font-weight:500;letter-spacing:3px;color:#7ab8e8;border:1px solid #7ab8e8;border-radius:2px;padding:4px 12px;margin-bottom:10px;}
header h1{font-family:"Black Han Sans",sans-serif;font-size:clamp(1.4rem,5vw,2.2rem);color:#fff;}
header h1 span{color:#e8a07a;}
.header-sub{font-size:.82rem;color:rgba(255,255,255,.5);margin-top:6px;}

.tab-wrap{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:11px 16px;font-family:"Black Han Sans",sans-serif;font-size:.8rem;color:var(--soft);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab-btn.s1.active{color:var(--s1);border-bottom-color:var(--s1);}
.tab-btn.s2.active{color:var(--s2);border-bottom-color:var(--s2);}
.tab-btn.s3.active{color:var(--s3);border-bottom-color:var(--s3);}
.tab-btn.s4.active{color:var(--s4);border-bottom-color:var(--s4);}
.tab-btn.s5.active{color:var(--s5);border-bottom-color:var(--s5);}
.tab-info{display:flex;justify-content:space-between;padding:6px 20px;font-size:.75rem;color:var(--soft);border-top:1px solid var(--border);background:#faf8f5;}

.panel{display:none;padding:18px 16px 80px;max-width:700px;margin:0 auto;}
.panel.active{display:block;}

.step-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:12px 16px;border-radius:10px;}
.step-header.s1{background:#dbeeff;} .step-header.s2{background:#fde8d8;}
.step-header.s3{background:#d8f0e0;} .step-header.s4{background:#ede0f5;}
.step-header.s5{background:#fdecd8;}
.step-badge{font-family:"Black Han Sans",sans-serif;font-size:.8rem;padding:4px 12px;border-radius:20px;}
.step-badge.s1{background:var(--s1);color:#fff;} .step-badge.s2{background:var(--s2);color:#fff;}
.step-badge.s3{background:var(--s3);color:#fff;} .step-badge.s4{background:var(--s4);color:#fff;}
.step-badge.s5{background:var(--s5);color:#fff;}
.step-desc{font-size:.8rem;color:var(--soft);}

/* STEP1: 뜻 맞추기 */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 18px;margin-bottom:13px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.word-display{text-align:center;margin:8px 0 6px;}
.word-en{font-family:"Black Han Sans",sans-serif;font-size:1.8rem;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.speaker{font-size:.95rem;opacity:.45;transition:opacity .2s;}
.word-en:hover .speaker{opacity:1;}
.q-prompt{font-size:.85rem;color:var(--soft);margin-bottom:12px;text-align:center;}

/* STEP2: 빈칸 */
.sent-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:13px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.sent-text{font-size:.92rem;line-height:1.9;margin-bottom:12px;color:var(--ink);}
.sent-blank{display:inline-block;border-bottom:2.5px solid var(--s2);min-width:80px;padding:0 4px;color:var(--ink);font-weight:700;vertical-align:middle;}

/* STEP3: 영영풀이 */
.def-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:13px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.def-text{font-size:.85rem;color:#444;background:#f8f6f2;border-radius:8px;padding:11px 14px;margin-bottom:14px;line-height:1.7;font-style:italic;text-align:center;}

/* STEP4: 다의어 */
.poly-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:13px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.poly-word{font-family:"Black Han Sans",sans-serif;font-size:1.5rem;color:var(--s4);margin-bottom:12px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.poly-prompt{font-size:.85rem;color:var(--soft);margin-bottom:10px;}
.poly-sentence{font-size:.88rem;color:#333;background:#f8f6f2;border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.7;}
.poly-sentence .blank{border-bottom:2px solid var(--s4);padding:0 3px;min-width:60px;display:inline-block;font-weight:700;}

/* STEP5: 유의어/반의어 */
.syn-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:13px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.syn-word{font-family:"Black Han Sans",sans-serif;font-size:1.6rem;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:8px;margin-bottom:4px;}
.syn-kor{font-size:.8rem;color:var(--soft);margin-bottom:10px;}
.syn-type{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.syn-type.syn{background:#dbeeff;color:var(--s1);}
.syn-type.ant{background:#fde8d8;color:var(--s2);}

/* 공통 options */
.options{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.opt-btn{background:#f8f6f2;border:2px solid var(--border);border-radius:10px;padding:11px 12px;font-family:"Noto Sans KR",sans-serif;font-size:.88rem;color:var(--ink);cursor:pointer;text-align:center;transition:all .15s;width:100%;}
.opt-btn:hover:not(:disabled){background:#eee8df;border-color:#c0b8aa;}
.opt-btn.selected{background:#eee8df;border-color:#8a7a65;font-weight:700;}
.opt-btn.correct{background:#e8f5ee;border-color:var(--correct);color:var(--correct);font-weight:700;}
.opt-btn.wrong{background:#fdecea;border-color:var(--wrong);color:var(--wrong);opacity:.7;}
.opt-btn:disabled{cursor:default;}

.check-btn{margin-top:10px;width:100%;color:#fff;border:none;border-radius:9px;padding:11px;font-family:"Black Han Sans",sans-serif;font-size:.9rem;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;}
.check-btn.s1{background:var(--s1);} .check-btn.s2{background:var(--s2);}
.check-btn.s3{background:var(--s3);} .check-btn.s4{background:var(--s4);}
.check-btn.s5{background:var(--s5);}
.check-btn:disabled{opacity:.35;cursor:default;}
.check-btn:not(:disabled):hover{opacity:.85;}

.feedback{margin-top:9px;font-size:.82rem;padding:8px 12px;border-radius:7px;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#e8f5ee;color:var(--correct);}
.feedback.bad{background:#fdecea;color:var(--wrong);}

.step-done{text-align:center;padding:18px;font-family:"Black Han Sans",sans-serif;font-size:1rem;border-radius:12px;display:none;margin-top:8px;}
.step-done.show{display:block;}
.step-done.s1{background:#dbeeff;color:var(--s1);}
.step-done.s2{background:#fde8d8;color:var(--s2);}
.step-done.s3{background:#d8f0e0;color:var(--s3);}
.step-done.s4{background:#ede0f5;color:var(--s4);}
.step-done.s5{background:#fdecd8;color:var(--s5);}

.summary{background:var(--ink);color:#fff;border-radius:14px;padding:32px 24px;text-align:center;display:none;margin-top:16px;}
.summary.show{display:block;}
.summary-title{font-family:"Black Han Sans",sans-serif;font-size:1.4rem;margin-bottom:10px;}
.summary-title span{color:#e8a07a;}
.step-scores{display:flex;justify-content:center;gap:16px;margin:12px 0 6px;flex-wrap:wrap;}
.ss-item .label{font-size:.68rem;color:rgba(255,255,255,.5);margin-bottom:3px;}
.ss-item .val{font-family:"Black Han Sans",sans-serif;font-size:1.5rem;}
.total-score{font-size:2.2rem;font-weight:700;color:#e8a07a;font-family:"Black Han Sans",sans-serif;margin:8px 0 4px;}
.summary-sub{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:12px;}
.summary-msg{font-size:.9rem;color:rgba(255,255,255,.8);margin-bottom:20px;}
.btn-retry{background:var(--s2);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-family:"Black Han Sans",sans-serif;font-size:.95rem;cursor:pointer;letter-spacing:.5px;}
</style>
</head>
<body>
<header>
  <div class="header-tag">종촌고 2학년 · YBM 박준언</div>
  <h1>Lesson <span>4</span> 어휘 퀴즈</h1>
  <p class="header-sub">뜻 · 빈칸 · 영영풀이 · 다의어 · 유의어/반의어 5단계</p>
</header>
<div class="tab-wrap">
  <div class="tabs">
    <button class="tab-btn s1 active" onclick="switchTab(0)">① 뜻 맞추기</button>
    <button class="tab-btn s2" onclick="switchTab(1)">② 빈칸 채우기</button>
    <button class="tab-btn s3" onclick="switchTab(2)">③ 영영풀이</button>
    <button class="tab-btn s4" onclick="switchTab(3)">④ 다의어</button>
    <button class="tab-btn s5" onclick="switchTab(4)">⑤ 유의어/반의어</button>
  </div>
  <div class="tab-info">
    <span id="tabInfo">0 / 0 완료</span>
    <span id="tabScore">점수: 0</span>
  </div>
</div>

<div class="panel active" id="panel0">
  <div class="step-header s1"><span class="step-badge s1">STEP 1</span><span class="step-desc">단어를 보고 알맞은 뜻을 고르세요.</span></div>
  <div id="s1cards"></div>
  <div class="step-done s1" id="done0">🎉 STEP 1 완료!</div>
</div>
<div class="panel" id="panel1">
  <div class="step-header s2"><span class="step-badge s2">STEP 2</span><span class="step-desc">문장의 빈칸에 알맞은 단어를 고르세요.</span></div>
  <div id="s2cards"></div>
  <div class="step-done s2" id="done1">🎉 STEP 2 완료!</div>
</div>
<div class="panel" id="panel2">
  <div class="step-header s3"><span class="step-badge s3">STEP 3</span><span class="step-desc">영영풀이를 읽고 알맞은 단어를 고르세요.</span></div>
  <div id="s3cards"></div>
  <div class="step-done s3" id="done2">🎉 STEP 3 완료!</div>
</div>
<div class="panel" id="panel3">
  <div class="step-header s4"><span class="step-badge s4">STEP 4</span><span class="step-desc">문장의 빈칸에 알맞은 단어를 고르세요. (다의어)</span></div>
  <div id="s4cards"></div>
  <div class="step-done s4" id="done3">🎉 STEP 4 완료!</div>
</div>
<div class="panel" id="panel4">
  <div class="step-header s5"><span class="step-badge s5">STEP 5</span><span class="step-desc">단어의 유의어 또는 반의어를 고르세요.</span></div>
  <div id="s5cards"></div>
  <div class="step-done s5" id="done4">🎉 STEP 5 완료!</div>
</div>

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    const [word, meaning] = item;
    const wrong3 = shuffle(S1.filter(x=>x[1]!==meaning)).slice(0,3).map(x=>x[1]);

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 's1_'+qi;
    card.innerHTML = `
      <div class="word-display"><span class="word-en" onclick="speak('${esc(word)}')"><span>${esc(word)}</span><span class="speaker">🔊</span></span></div>
      <div class="q-prompt">위 단어의 뜻은?</div>
      <div class="options">${opts.map(o=>`<button class="opt-btn" onclick="ansQ(0,${qi},'${o.replace(/'/g,"\'")}',this)" data-v="${esc(o)}">${esc(o)}</button>`).join('')}</div>
      <div class="feedback" id="fb_s1_${qi}"></div>
      <button class="check-btn s1" id="cb_s1_${qi}" onclick="submitQ(0,${qi},'${meaning.replace(/'/g,"\'")}',this)" disabled>확인</button>

  });

function buildS2() {
  const sw = shuffle([...S2]);
  const el = document.getElementById('s2cards');
  sw.forEach((item, qi) => {
    const [before, blank, after] = item;
    const wrong3 = shuffle(S2.filter(x=>x[1]!==blank)).slice(0,3).map(x=>x[1]);
    const opts = shuffle([blank, ...wrong3]);
    const card = document.createElement('div');
    card.className = 'sent-card';
    card.id = 's2_'+qi;
    card.innerHTML = `
      <div class="sent-text">${esc(before)} <span class="sent-blank" id="blank_${qi}">_____</span> ${esc(after)}</div>
      <div class="options">${opts.map(o=>`<button class="opt-btn" onclick="selSent(${qi},'${o.replace(/'/g,"\'")}',this)" data-v="${esc(o)}">${esc(o)}</button>`).join('')}</div>
      <div class="feedback" id="fb_s2_${qi}"></div>
      <button class="check-btn s2" id="cb_s2_${qi}" onclick="submitSent(${qi},'${blank.replace(/'/g,"\'")}',this)" disabled>확인</button>
    `;
    el.appendChild(card);
  });
  window._s2_shuffled = sw;
}
function selSent(qi, val, btn) {
  const card = document.getElementById('s2_'+qi);
  card.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('blank_'+qi).textContent = val;
  document.getElementById('cb_s2_'+qi).disabled = false;
}
function submitSent(qi, answer, btn) {
  if(btn.disabled) return;
  const card = document.getElementById('s2_'+qi);
  const sel = card.querySelector('.opt-btn.selected');
  if(!sel) return;
  btn.style.display = 'none';
  card.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ok = sel.dataset.v === answer;
  sel.classList.add(ok?'correct':'wrong');
  if(!ok) card.querySelectorAll('.opt-btn').forEach(b=>{if(b.dataset.v===answer)b.classList.add('correct');});
  scores[1][qi] = ok;
  answered[1]++;
  if(ok) correct_cnt[1]++;
  const fb = document.getElementById('fb_s2_'+qi);
  fb.className = 'feedback show '+(ok?'ok':'bad');
  fb.textContent = ok?'✅ 정답!':'❌ 내 답: '+sel.dataset.v+' / 정답: '+answer;
  document.getElementById('blank_'+qi).textContent = answer;
  document.getElementById('blank_'+qi).style.color = ok?'var(--correct)':'var(--wrong)';
  updateTabInfo();
  if(answered[1]===S2.length) { setTimeout(()=>document.getElementById('done1').classList.add('show'),400); saveFirebase('빈칸채우기',correct_cnt[1],S2.length); }
}

    const opts = shuffle([word, ...wrong3]);
    const card = document.createElement('div');
    card.className = 'def-card';
    card.id = 's3_'+qi;
    card.innerHTML = `
      <div class="def-text">"${esc(def)}"</div>
      <div class="q-prompt">위 영영풀이에 알맞은 단어는?</div>
      <div class="options">${opts.map(o=>`<button class="opt-btn" onclick="ansQ(2,${qi},'${o.replace(/'/g,"\'")}',this)" data-v="${esc(o)}">${esc(o)}</button>`).join('')}</div>
      <div class="feedback" id="fb_s3_${qi}"></div>
      <button class="check-btn s3" id="cb_s3_${qi}" onclick="submitQ(2,${qi},'${word.replace(/'/g,"\'")}',this)" disabled>확인</button>
    `;
    el.appendChild(card);
  });
  window._s3_shuffled = sw;
}

// ── STEP 4: 다의어 ──
function buildS4() {
  const el = document.getElementById('s4cards');
  // flatten: each meaning of each word = one question
  const questions = [];
  S4.forEach(([word, meanings]) => {
    meanings.forEach(([num, meaning_ko, example_en, example_ko]) => {
      questions.push({word, num, meaning_ko, example_en, example_ko});
    });
  });
  const sw = shuffle(questions);
  window._s4_questions = sw;
  sw.forEach((q, qi) => {
    // blank out the word in example
    const re = new RegExp(q.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    const blanked = q.example_en.replace(re, `<span class="blank" id="poly_blank_${qi}">_____</span>`);
    const wrong3 = shuffle(S4.filter(x=>x[0]!==q.word)).slice(0,3).map(x=>x[0]);
    const opts = shuffle([q.word, ...wrong3]);
    const card = document.createElement('div');
    card.className = 'poly-card';
    card.id = 's4_'+qi;
    card.innerHTML = `
      <div style="margin-bottom:6px;"><span class="poly-word" onclick="speak('${esc(q.word)}')"><span>${esc(q.word)}</span><span class="speaker" style="font-size:.9rem;opacity:.4;">🔊</span></span></div>
      <div class="syn-kor" style="margin-bottom:10px;">뜻 ${q.num}: <strong>${esc(q.meaning_ko)}</strong></div>
      <div class="poly-sentence">${blanked}</div>
      <div class="poly-prompt">빈칸에 알맞은 단어는?</div>
      <div class="options">${opts.map(o=>`<button class="opt-btn" onclick="ansQ(3,${qi},'${o.replace(/'/g,"\'")}',this)" data-v="${esc(o)}">${esc(o)}</button>`).join('')}</div>
      <div class="feedback" id="fb_s4_${qi}"></div>
      <button class="check-btn s4" id="cb_s4_${qi}" onclick="submitQ(3,${qi},'${q.word.replace(/'/g,"\'")}',this)" disabled>확인</button>
    `;
    el.appendChild(card);
  });
}

// ── STEP 5: 유의어/반의어 ──
function buildS5() {
  const sw = shuffle([...S5]);
  const el = document.getElementById('s5cards');
  sw.forEach((item, qi) => {
    const [word, meaning_ko, type, answer] = item;
    // answer may have commas → use first token
    const ans_first = answer.split(',')[0].trim();
    // build wrong options from other answers
    const allAnswers = S5.map(x=>x[3].split(',')[0].trim()).filter(x=>x!==ans_first);
    const wrong3 = shuffle(allAnswers).slice(0,3);
    const opts = shuffle([ans_first, ...wrong3]);
    const typeLabel = type==='유의어'?'유의어':'반의어';
    const typeClass = type==='유의어'?'syn':'ant';
    const card = document.createElement('div');
    card.className = 'syn-card';
    card.id = 's5_'+qi;
    card.innerHTML = `
      <div><span class="syn-word" onclick="speak('${esc(word)}')"><span>${esc(word)}</span><span class="speaker" style="font-size:.9rem;opacity:.4;">🔊</span></span></div>
      <div class="syn-kor">${esc(meaning_ko)}</div>
      <span class="syn-type ${typeClass}">${typeLabel}는?</span>
      <div class="options">${opts.map(o=>`<button class="opt-btn" onclick="ansQ(4,${qi},'${o.replace(/'/g,"\'")}',this)" data-v="${esc(o)}">${esc(o)}</button>`).join('')}</div>
      <div class="feedback" id="fb_s5_${qi}"></div>
      <button class="check-btn s5" id="cb_s5_${qi}" onclick="submitQ(4,${qi},'${ans_first.replace(/'/g,"\'")}',this)" disabled>확인</button>
    `;
    el.appendChild(card);
  });
  window._s5_shuffled = sw;
}

// ── 공통 answer/select ──
function ansQ(tab, qi, val, btn) {
  const pfx = ['s1','s2','s3','s4','s5'][tab];
  const card = document.getElementById(pfx+'_'+qi);
  card.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const cbId = 'cb_'+pfx+'_'+qi;
  const cb = document.getElementById(cbId);
  if(cb) cb.disabled = false;
}
function submitQ(tab, qi, answer, btn) {
  if(btn.disabled) return;
  const pfx = ['s1','s2','s3','s4','s5'][tab];
  const card = document.getElementById(pfx+'_'+qi);
  const sel = card.querySelector('.opt-btn.selected');
  if(!sel) return;
  btn.style.display = 'none';
  card.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ok = sel.dataset.v === answer;
  sel.classList.add(ok?'correct':'wrong');
  if(!ok) card.querySelectorAll('.opt-btn').forEach(b=>{if(b.dataset.v===answer)b.classList.add('correct');});
  scores[tab][qi] = ok;
  answered[tab]++;
  if(ok) correct_cnt[tab]++;
  const fb = document.getElementById('fb_'+pfx+'_'+qi);
  fb.className = 'feedback show '+(ok?'ok':'bad');
  fb.textContent = ok?'✅ 정답!':'❌ 내 답: '+sel.dataset.v+' / 정답: '+answer;
  if(tab===0){const nx=document.getElementById('s1_'+(qi+1));if(nx){const w=nx.querySelector('.word-en span:first-child');if(w)setTimeout(()=>speak(w.textContent),500);}}
  updateTabInfo();
  // check done
  const totals = [S1.length, S2.length, S3.length, window._s4_questions?.length||0, S5.length];
  if(answered[tab] === totals[tab]) {
    const labels = ['뜻맞추기','빈칸채우기','영영풀이','다의어','유의어반의어'];
    setTimeout(()=>document.getElementById('done'+tab).classList.add('show'),400);
    saveFirebase(labels[tab], correct_cnt[tab], totals[tab]);
    if([0,1,2,3,4].every(t=>answered[t]===totals[t])) setTimeout(showSummary,800);
  }
}

function updateTabInfo() {
  const totals = [S1.length, S2.length, S3.length, window._s4_questions?.length||0, S5.length];
  const t = curTab;
  document.getElementById('tabInfo').textContent = answered[t]+' / '+totals[t]+' 완료';
  document.getElementById('tabScore').textContent = '점수: '+correct_cnt[t];
}

function switchTab(t) {
  curTab = t;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===t));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===t));
  updateTabInfo();
}

function showSummary() {
  const totals = [S1.length, S2.length, S3.length, window._s4_questions?.length||0, S5.length];
  const totalAll = totals.reduce((a,b)=>a+b,0);
  const correctAll = correct_cnt.reduce((a,b)=>a+b,0);
  const pct = Math.round(correctAll/totalAll*100);
  const msg = pct===100?'🎉 완벽합니다!':pct>=80?'👍 훌륭해요!':pct>=60?'📖 잘 했어요!':'💪 다시 도전해봐요!';
  const colors = ['s1','s2','s3','s4','s5'];
  const labels = ['① 뜻','② 빈칸','③ 영영','④ 다의어','⑤ 유반의'];
  const s = document.getElementById('s1cards').closest('.panel').parentElement.querySelector('.summary') ||
    (() => { const d = document.createElement('div'); d.className='summary'; document.querySelector('main, body').appendChild(d); return d; })();
  // append summary to last panel
  const lastPanel = document.getElementById('panel4');
  const sum = document.createElement('div');
  sum.className = 'summary show';
  sum.innerHTML = `
    <div class="summary-title">최종 결과 <span>확인</span></div>
    <div class="step-scores">${labels.map((l,i)=>`<div class="ss-item"><div class="label">${l}</div><div class="val" style="color:var(--${colors[i]})">${correct_cnt[i]}/${totals[i]}</div></div>`).join('')}</div>
    <div class="total-score">${correctAll}<span style="font-size:1.1rem;opacity:.4">/${totalAll}</span></div>
    <div class="summary-sub">전체 정답률 ${pct}%</div>
    <div class="summary-msg">${msg}</div>
    <button class="btn-retry" onclick="location.reload()">🔄 다시 풀기</button>
  `;
  lastPanel.appendChild(sum);
}

// INIT
buildS1(); buildS2(); buildS3(); buildS4(); buildS5();
updateTabInfo();
</script>

<!-- === TTS 음성 지원 (Web Speech API) === -->
<style>
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;background:#e0e7ff;color:#3730a3;border-radius:50%;cursor:pointer;font-size:14px;padding:0;vertical-align:middle;margin-left:6px;transition:all .15s;flex-shrink:0;line-height:1;font-family:inherit;}
.tts-btn:hover{background:#c7d2fe;transform:scale(1.05);}
.tts-btn:active{transform:scale(0.95);}
.tts-btn.speaking{background:#fbbf24;color:white;animation:tts-pulse 1s ease-in-out infinite;}
@keyframes tts-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
</style>
<script>
(function(){
  if(window.__ttsInstalled) return; window.__ttsInstalled=true;
  function speakText(text, btn){
    if(!('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang='en-US';u.rate=0.85;u.pitch=1;
      const voices=window.speechSynthesis.getVoices();
      const en=voices.find(v=>v.lang && /^en/i.test(v.lang));
      if(en) u.voice=en;
      if(btn){
        btn.classList.add('speaking');
        u.onend=u.onerror=function(){btn.classList.remove('speaking');};
      }
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
  function ttsText(s){
    s=String(s||'').replace(/^["“”'\s]+|["“”'\s]+$/g,'');
    s=s.replace(/\s*🔊\s*$/,'');
    const idx=s.search(/[ㄱ-힝]/);
    if(idx!==-1) s=s.slice(0,idx);
    return s.replace(/[\s\(\)\[\];,~]+$/,'').trim();
  }
  const SEL='.q-word,.word-en,.word-box,.word-card .word-en';
  function inject(root){
    (root||document).querySelectorAll(SEL).forEach(w=>{
      if(w.dataset.tts==='1') return;
      const raw=w.textContent.trim();
      const txt=ttsText(raw);
      if(!txt || !/[A-Za-z]/.test(txt)) return;
      const btn=document.createElement('button');
      btn.className='tts-btn';
      btn.type='button';
      btn.title='발음 듣기';
      btn.setAttribute('aria-label','발음 듣기');
      btn.textContent='🔊';
      btn.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();speakText(txt,btn);});
      w.appendChild(document.createTextNode(' '));
      w.appendChild(btn);
      w.dataset.tts='1';
    });
  }
  const _obs=new MutationObserver(muts=>{
    let needs=false;
    muts.forEach(m=>m.addedNodes.forEach(n=>{if(n.nodeType===1) needs=true;}));
    if(needs) inject(document.body);
  });
  function start(){
    _obs.observe(document.body,{childList:true,subtree:true});
    inject(document.body);
    if(window.speechSynthesis && window.speechSynthesis.getVoices){
      window.speechSynthesis.getVoices();
      if(window.speechSynthesis.onvoiceschanged===null){
        window.speechSynthesis.onvoiceschanged=function(){};
      }
    }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
  else start();
})();
</script>
