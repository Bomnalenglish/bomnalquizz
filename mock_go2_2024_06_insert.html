    id:"36-1", passageNo:36, topic:"뇌의 에너지 효율 ①",

    insert:`This is an example of something known as moral hazard — when government support alters the decisions firms take.`,

    insert:`The solution is that there should be far greater diversity in the practice of science: in gender, ethnicity, and social and cultural backgrounds.`,
    body:`If there is little or no diversity of views, and all scientists see, think, and question the world in a similar way, then they will not, as a community, be as objective as they maintain they are, or at least aspire to be. <slot>①</slot> Science works because it is carried out by people who pursue their curiosity about the natural world and test their and each other's ideas from as many varied perspectives and angles as possible. <slot>②</slot> When science is done by a diverse group of people, and if consensus builds up about a particular area of scientific knowledge, then we can have more confidence in its objectivity and truth. <slot>③</slot>`,

    insert:`Without the right feedback, smiling dies out.`,

    insert:`But the opposite is true.`,
    body:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment more enjoyable. <slot>①</slot> Shows are actually more enjoyable when they're broken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. <slot>②</slot> Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. <slot>③</slot> But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. <slot>④</slot> Interspersing positive experiences with less positive ones, however, can decelerate adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows disrupts the process. <slot>⑤</slot>`,

    insert:`These are all side issues; the attraction is that they are in short supply.`,

// 지문 그루핑
const PASSAGES = [];
const pMap = {};
QLISTS.forEach(q=>{
  if(!pMap[q.passageNo]){
    pMap[q.passageNo]={no:q.passageNo,topic:q.topic.replace(/ [①-⑨]/,'').replace(/ \(.*\)/,'').trim(),qs:[]};
    PASSAGES.push(pMap[q.passageNo]);
  }
  pMap[q.passageNo].qs.push(q);
});
PASSAGES.sort((a,b)=>a.no-b.no);

// 상태
let selected=new Set(), doneSet=new Set();
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], answered=false, t0=0, wrongQs=[];

function goSel(){
  document.getElementById('startScreen').classList.add('hidden');
  renderGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function renderGrid(){
  const g=document.getElementById('passageGrid'); g.innerHTML='';
  PASSAGES.forEach(p=>{
    const no=p.no, cnt=p.qs.length;
    const d=document.createElement('div');
    d.className='p-card'+(selected.has(no)?' sel':'')+(doneSet.has(no)?' done':'');
    d.onclick=()=>{selected.has(no)?selected.delete(no):selected.add(no);d.classList.toggle('sel',selected.has(no));};
    d.innerHTML=`<div class="p-no">${no}번</div><div class="p-topic">${p.topic}</div><div class="p-qcount">${cnt}문제</div>`
      +(doneSet.has(no)?'<span class="p-badge" style="background:#e8f5e9;color:#2e7d32;">완료✓</span>':'')
      +(selected.has(no)&&!doneSet.has(no)?'<span class="p-badge" style="background:#e8eaf6;color:#1565c0;">선택</span>':'');
    g.appendChild(d);
  });
}

function selAll(){
  const all=PASSAGES.every(p=>selected.has(p.no));
  PASSAGES.forEach(p=>{if(all)selected.delete(p.no);else selected.add(p.no);});
  renderGrid();
}

function startQuiz(){
  if(selected.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  qs=[];
  PASSAGES.filter(p=>selected.has(p.no)).forEach(p=>p.qs.forEach(q=>qs.push(q)));
  idx=0;cor=0;wrn=0;wrongs=[];answered=false;t0=Date.now();wrongQs=[];
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=selected.size+'개 지문 · '+qs.length+'문제';
  showQ();
}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');

  // body에서 <slot>①</slot> → 파란 번호 뱃지로 변환
  const bodyHTML = q.body.replace(/<slot>(①|②|③|④|⑤)<\/slot>/g,
    (_,n)=>`<span class="slot">${n}</span>`);

  const opts = ['①','②','③','④','⑤'];
  let optHTML='';
  opts.forEach(o=>{
    optHTML+=`<button class="cb" onclick="pickAns(this,'${o}','${q.ans}')">${o}</button>`;
  });

  area.innerHTML=`<div class="qc">
    <div class="q-no-badge"><span class="qno">${q.passageNo}번</span><span class="qtype-tag">문장 삽입</span></div>
    <div style="font-size:11px;font-weight:700;color:var(--pri);margin-bottom:8px;">📌 주어진 문장이 들어가기에 가장 적절한 곳은? (${q.topic})</div>
    <div class="insert-label">삽입할 문장</div>
    <div class="insert-box">${q.insert}</div>
    <div class="body-box">${bodyHTML}</div>
    <div class="choices" style="grid-template-columns:repeat(5,1fr);">${optHTML}</div>
    <div class="fb-box" id="fb"></div>
    <button class="next-btn" id="nextBtn" onclick="goNext()">다음 문제 →</button>
  </div>`;
}

function pickAns(btn,sel,ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const q=qs[idx];
  const correct=(sel===ans);
  if(correct){
    btn.classList.add('c-ok');
    document.getElementById('fb').className='fb-box ok';
    document.getElementById('fb').textContent='✅ 정답! '+q.exp;
    cor++;
  } else {
    btn.classList.add('c-ng');
    document.querySelectorAll('.cb').forEach(b=>{if(b.textContent===ans)b.classList.add('reveal');});
    document.getElementById('fb').className='fb-box no';
    document.getElementById('fb').textContent='❌ 오답! 정답: '+ans+' | '+q.exp;
    wrn++;
    wrongs.push({label:q.passageNo+'번 삽입',my:sel,correct:ans,exp:q.exp});
    wrongQs.push(q);
  }
  document.getElementById('nextBtn').style.display='block';
}

function goNext(){idx++;showQ();}

// ── localStorage 오답 저장 ──────────────────────────────
const LS_KEY='bomnal_insert_wrongs';

function loadStoredWrongs(){
  try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return [];}
}

function saveWrongsToLS(newWrongs){
  const stored=loadStoredWrongs();
  newWrongs.forEach(w=>{
    const i=stored.findIndex(s=>s.id===w.id);
    if(i>=0)stored[i]=w;else stored.push(w);
  });
  localStorage.setItem(LS_KEY,JSON.stringify(stored));
}

function clearStoredWrongs(){
  localStorage.removeItem(LS_KEY);
  renderWrongNote();
}

// ── 결과 화면 ──────────────────────────────────────────
function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selected.forEach(n=>doneSet.add(n));

  if(wrongQs.length>0){
    const toSave=wrongQs.map(q=>({
      id:q.id, passageNo:q.passageNo, topic:q.topic,
      insert:q.insert, body:q.body,
      ans:q.ans, exp:q.exp,
      savedAt:new Date().toLocaleDateString('ko-KR')
    }));
    saveWrongsToLS(toSave);
  }

  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고2 24년 6월 삽입 학습 · ${selected.size}개 지문</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">나의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    <div class="rbtns">
      ${wrongQs.length>0?`<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:#fff;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongQs.length}개)</button>`:''}
      <button class="rbtn" style="background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;" onclick="showWrongNote()">📒 오답 노트 보기</button>
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave){
    const _bn = sessionStorage.getItem('bn_name')||localStorage.getItem('bn_name')||'';
    const _bs = sessionStorage.getItem('bn_school')||localStorage.getItem('bn_school')||'';
    window._fbSave({
      submittedAt:new Date().toISOString(),
      studentName:_bn, school:_bs,
      score:pct, correct:cor, wrong:wrn, total:total, elapsedMin:el,
      quizType:'고2_24년6월_삽입학습',
      passages:[...selected].sort((a,b)=>a-b),
      wrongWords:wrongs.map(w=>({label:w.label, my:w.my, correct:w.correct, exp:w.exp||''}))
    });
  }
}

function retryWrongs(){
  if(wrongQs.length===0)return;
  qs=[...wrongQs];
  idx=0;cor=0;wrn=0;wrongs=[];answered=false;t0=Date.now();wrongQs=[];
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent='오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selected.clear();renderGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

// ── 오답 노트 ──────────────────────────────────────────
function showWrongNote(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('wrongNoteScreen').classList.remove('hidden');
  renderWrongNote();
}

function renderWrongNote(tab){
  const stored=loadStoredWrongs();
  const activeTab=tab||'note';
  const ws=document.getElementById('wrongNoteScreen');

  let tabContent='';
  if(activeTab==='note'){
    if(stored.length===0){
      tabContent=`<div class="wn-empty">📭 저장된 오답이 없어요!</div>`;
    } else {
      tabContent=stored.map(q=>{
        const bodyHTML=(q.body||'').replace(/<slot>(①|②|③|④|⑤)<\/slot>/g,
          (_,n)=>`<span style="display:inline-block;background:#1565c0;color:#fff;border-radius:5px;padding:1px 8px;font-family:'Black Han Sans',sans-serif;font-size:12px;margin:0 2px;">${n}</span>`);
        return `<div class="wn-card">
          <div class="wn-header">
            <span class="wn-title">${q.passageNo}번 · ${q.topic}</span>
            <span class="wn-badge">문장 삽입 · ${q.savedAt||''}</span>
          </div>
          <div class="wn-body">
            <div class="wn-insert-label">📌 삽입할 문장</div>
            <div class="wn-insert">${q.insert}</div>
            <div class="wn-body-txt">${bodyHTML}</div>
            <div class="wn-ok">✅ 정답: ${q.ans}</div>
            <div class="wn-exp">💡 ${q.exp}</div>
          </div>
        </div>`;
      }).join('');
    }
  } else {
    if(stored.length===0){
      tabContent=`<div class="wn-empty">📭 저장된 오답이 없어요!</div>`;
    } else {
      tabContent=`<div style="text-align:center;padding:16px 0;">
        <div style="font-size:14px;font-weight:800;color:var(--pri);margin-bottom:6px;">저장된 오답 ${stored.length}문제</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:20px;">localStorage에 누적된 모든 오답입니다.</div>
        <button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:#fff;width:100%;padding:14px;" onclick="startStoredRetry()">❌ 오답 전체 다시풀기 (${stored.length}문제)</button>
      </div>`;
    }
  }

  ws.innerHTML=`
    <div style="padding:20px;max-width:700px;margin:0 auto;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <button onclick="closeWrongNote()" style="border:none;background:none;font-size:20px;cursor:pointer;">←</button>
        <span style="font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--pri);">📒 오답 노트</span>
        <span style="font-size:12px;color:var(--muted);margin-left:4px;">총 ${stored.length}문제 누적</span>
      </div>
      <div class="tab-bar">
        <button class="tab-btn ${activeTab==='note'?'on':''}" onclick="renderWrongNote('note')">📖 오답 읽기</button>
        <button class="tab-btn ${activeTab==='retry'?'on':''}" onclick="renderWrongNote('retry')">🔁 다시 풀기</button>
      </div>
      ${stored.length>0?`<button class="wn-clear-btn" onclick="if(confirm('오답 노트를 전부 초기화할까요?'))clearStoredWrongs()">🗑️ 오답 노트 초기화</button>`:''}
      ${tabContent}
    </div>`;
}

function startStoredRetry(){
  const stored=loadStoredWrongs();
  if(stored.length===0)return;
  qs=stored.map(q=>({...q}));
  idx=0;cor=0;wrn=0;wrongs=[];answered=false;t0=Date.now();wrongQs=[];
  document.getElementById('wrongNoteScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent='오답 노트 다시풀기';
  showQ();
}

function closeWrongNote(){
  document.getElementById('wrongNoteScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
}
</script>
</body>
</html>
