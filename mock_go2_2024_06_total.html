<head>

<title>봄날 퀴즈 | 고2 24년 6월 총괄퀴즈</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:linear-gradient(135deg,#e8eaf6 0%,#e0f2f1 50%,#fff3e0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{max-width:480px;width:100%;text-align:center;}
.logo{font-family:'Black Han Sans',sans-serif;font-size:15px;color:#888;margin-bottom:8px;letter-spacing:2px;}
h1{font-family:'Black Han Sans',sans-serif;font-size:26px;color:#1a1a2e;margin-bottom:6px;}
.sub{font-size:13px;color:#888;margin-bottom:36px;}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.mode-card{background:#fff;border-radius:20px;padding:28px 16px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.08);transition:all .18s;border:3px solid transparent;text-decoration:none;display:block;}
.mode-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,.14);}
.mode-card.context{border-color:#6a1b9a;}
.mode-card.context:hover{background:#faf5ff;}
.mode-card.order{border-color:#00695c;}
.mode-card.order:hover{background:#f0faf8;}
.mode-card.insert{border-color:#1565c0;}
.mode-card.insert:hover{background:#f0f4ff;}
.mode-card.writing{border-color:#e65100;}
.mode-card.writing:hover{background:#fff8f0;}
.mode-emoji{font-size:36px;margin-bottom:10px;}
.mode-title{font-family:'Black Han Sans',sans-serif;font-size:16px;color:#1a1a2e;margin-bottom:5px;}
.mode-desc{font-size:11px;color:#888;line-height:1.5;}
.mode-badge{display:inline-block;font-size:10px;font-weight:800;border-radius:8px;padding:2px 8px;margin-top:6px;}
.b-purple{background:#ede7f6;color:#6a1b9a;}
.b-green{background:#e0f2f1;color:#00695c;}
.b-blue{background:#e8eaf6;color:#1565c0;}
.b-orange{background:#fff3e0;color:#e65100;}

.back-btn{background:#f5f5f5;border:none;border-radius:12px;padding:12px 28px;font-size:13px;font-weight:800;color:#555;cursor:pointer;font-family:inherit;}
.back-btn:hover{background:#eee;}
</style>
</head>
<body>

    <a class="mode-card context" href="mock_go2_2024_06_context.html">
