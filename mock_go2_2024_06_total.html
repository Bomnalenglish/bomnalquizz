<script>
// ── DATA ──────────────────────────────────────────
const QUESTIONS = [
  {no:1,school:``,pref:`20`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적절 하지 않은 것은?`,body:`Most people resist the idea of a true self-estimate, probably because they fear it might mean ⓐ underestimating some of their beliefs about who they are and what they’re capable of. As Goethe’s maxim goes, it is a great failing “to see yourself as more than you are.” How could you really be considered self-aware if you refuse to consider your weaknesses? Don’t fear self-assessment because you’re worried you might have to admit some things about yourself. The second half of Goethe’s maxim is important too. He states that it is equally ⓑbeneficial to “value yourself at less than your true worth.” We downgrade our capabilities just as much and just as dangerously as we ⓒovervalue other abilities. Cultivate the ability to judge yourself ⓓwith accuracy. Look inward to ⓔfigure out what you’re capable of and what it will take to unlock that potential. *maxim: 격언`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:2},
  {no:2,school:``,pref:`20`,type:`빈칸추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 할 때, 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`Most people resist the idea of a true self-estimate, probably because they fear it might mean downgrading some of their beliefs about who they are and what they’re capable of. As Goethe’s maxim goes, it is a great failing “to see yourself as more than you are.” How could you really be considered self-aware if you refuse to consider your weaknesses? Don’t fear self-assessment because you’re worried you might have to admit some things about yourself. The second half of Goethe’s maxim is important too. He states that it is equally damaging to “value yourself at less than your true worth.” We underestimate our capabilities just as much and just as dangerously as we overestimate other abilities. Cultivate the ability to judge yourself accurately and honestly. Look inward to discern what you’re capable of and what it will take to unlock that potential. *maxim 격언 - 1 지문별 학교기출 100제 - 1차 ↓ Most people are afraid to confront their limitations and thus (A)____________ genuine self-assessment. However, it is crucial to (B)____________ evaluate yourself in order to discover your capabilities and potential. (A) (B)`,choices:[`reject precisely`,`reject broadly`,`adopt critically`,`embrace truthfully`,`embrace objectively`],ans:1},
  {no:3,school:``,pref:`20`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`Most people resist the idea of a true self estimate, probably because they fear it might mean downgrading some of their beliefs about who they are and what they’re capable of. (A) The second half of Goethe’s maxim is important too. He states that it is equally damaging to “value yourself at less than your true worth.” (B) We underestimate our capabilities just as much and just as dangerously as we overestimate other abilities. Cultivate the ability to judge yourself accurately and honestly. Look inward to discern what you’re capable of and what it will take to unlock that potential. (C) As Goethe’s maxim goes, it is a great failing “to see yourself as more than you are.” How could you really be considered self aware if you refuse to consider your weaknesses? Don’t fear self assessment because you’re worried you might have to admit some things about yourself. *maxim: 격언`,choices:[`(A) - (C) - (B)`,`(B) - (A) - (C)`,`(B) - (C) - (A)`,`(C) - (A) - (B)`,`(C) - (B) - (A) 1 - 06월`],ans:4},
  {no:4,school:``,pref:`21`,type:`빈칸추론`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`Take a look at some of the most powerful, rich, and famous people in the world. Ignore the trappings of their success and what they're able to buy. Look instead at what they're forced to trade in return ― look at what success has cost them. Mostly? Freedom. Their work demands they wear a suit. Their success depends on attending certain parties, kissing up to people they don't like. It will require ― inevitably ― realizing they are unable to say what they actually think. Worse, it demands that they become a different type of person or do bad things. Sure, it might pay well ― but they haven't truly examined _________________. As Seneca put it, "Slavery resides under marble and gold." Too many successful people are prisoners in jails of their own making. Is that what you want? Is that what you're working hard toward? Let's hope not.`,choices:[`the virtue`,`their privilege`,`the transaction`,`their limitation`,`their potentiality`],ans:3},
  {no:6,school:``,pref:`21`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`Take a look at some of the most powerful, rich, and famous people in the world. Ignore the trappings of their success and what they’re able to buy. Look instead at what they’re forced to trade in return – look at what success has cost them. Mostly? Freedom. Their work demands they wear a suit. Their success depends on attending certain parties, kissing up to people they don’t like. It will require – inevitably – realizing they are unable to say what they actually think. Worse, it demands that they become a different type of person or do bad things. Sure, it might pay well – but they haven’t truly examined the transaction. As Seneca put it, “Slavery resides under marble and gold.” Too many successful people are prisoners in jails of their own making. Is that what you want? Is that what you’re working hard toward? Let’s hope not. *trappings: 장식`,choices:[`성공한 사람들은 항상 자유를 유지할 수 있다.`,`자유는 성공과는 별개의 것이며, 서로 상충되지 않는다.`,`성공한 사람들은 자유를 포기하지 않고도 모든 것을 얻 을 수 있다.`,`성공을 위해서 자신이 가진 것들을 포기하지 않는 자세 가 필요하다.`,`성공한 사람들은 종종 자신의 자유를 희생해야 하고, 그 대가를 충분히 고려하지 않는 경우가 있다. 2 - 06월`],ans:5},
  {no:7,school:``,pref:`21`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`Take a look at some of the most powerful, rich, and famous people in the world. Ignore the trappings of their success and what they’re able to buy. Look instead at what they’re forced to trade in return – look at what success has cost them. Mostly? Freedom. Their work demands they wear a suit. Their success depends on attending certain parties, kissing up to people they don’t like. It will require – inevitably – realizing they are unable to say what they actually think. Worse, it demands that they become a different type of person or do bad things. Sure, it might pay well – but they haven’t truly examined the transaction. As Seneca put it, “Slavery resides under marble and gold.” Too many successful people are prisoners in jails of their own making. Is that what you want? Is that what you’re working hard toward? Let’s hope not.`,choices:[`Celebrities in the Glittering Prison`,`The Fast Track to Success: To Be Yourself`,`High Risk High Return: Aggressive Investment`,`Luxury and Achievement: The Rewards of Success`,`How to Deal with Relationships with Business Partners`],ans:1},
  {no:10,school:``,pref:`22`,type:`빈칸추론`,stem:`다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`If a firm is going to be saved by the government, it might be easier to concentrate on lobbying the government for more money rather than taking the harder decision of restructuring the company to be able to be profitable and viable in the long term. This is an example of something known as moral hazard ― when government support alters the decisions firms take. For example, if governments rescue banks who get into difficulty, as they did during the credit crisis of 2007-08, this could encourage banks to take greater risks in the future because they know there is a possibility that _______ _____________________________. Although the government rescue may be well intended, it can negatively affect the behavior of banks, encouraging risky and poor decision making.`,choices:[`there comes another moral crisis`,`they will go bankrupt in the near future`,`governments will intervene if they lose money`,`they will turn this crisis into a new opportunity`,`governments will strongly ban them from borrowing money`],ans:3},
  {no:11,school:``,pref:`22`,type:`무관문장`,stem:`다음 글에서 전체 흐름과 관계없는 문장은?`,body:`ⓐIf a firm is going to be saved by the government, it might be easier to concentrate on lobbying the government for more money rather than taking the harder decision of restructuring the company to be able to be profitable and viable in the long term. ⓑThis is an example of something known as moral hazard – when government support alters the decisions firms take. ⓒFor example, if governments rescue banks who get into difficulty, as they did during the credit crisis of 2007-08, this could encourage banks to take greater risks in the future because they know there is a possibility that governments will intervene if they lose money. ⓓThis is why the banks will grow further with the cooperation of the government and the banks. ⓔAlthough the government rescue may be well intended, it can negatively affect the behavior of banks, encouraging risky and poor decision making.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ - 4 지문별 학교기출 100제 - 1차`],ans:4},
  {no:14,school:``,pref:`23`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`If there is little or no diversity of views, and all scientists see, think, and question the world in a similar way, then they will not, as a community, be as objective as they maintain they are, or at least aspire to be. The solution is that there should be far greater diversity in the practice of science: in gender, ethnicity, and social and cultural backgrounds. Science works because it is carried out by people who pursue their curiosity about the natural world and test their and each other's ideas from as many varied perspectives and angles as possible. When science is done by a diverse group of people, and if consensus builds up about a particular area of scientific knowledge. then we can have more confidence in its objectivity and truth.`,choices:[`Diversity : the Key to Objectivity in Science`,`Empowered Scientists : Pursue Your Own Curiosity!`,`Enhancing Scientific Objectivity through Dedication`,`What Makes Scientific Research Resource Abundant`,`Collaboration : Efforts to Reach Consensus in Science`],ans:1},
  {no:15,school:``,pref:`23`,type:`빈칸추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`If there is little or no diversity of views, and all scientists see, think, and question the world in a similar way, then they will not, as a community, be as objective as they maintain they are, or at least aspire to be. The solution is that there should be far greater diversity in the practice of science: in gender, ethnicity, and social and cultural backgrounds. Science works because it is carried out by people who pursue their curiosity about the natural world and test their and each other's ideas from as many varied perspectives and angles as possible. When science is done by a diverse group of people, and if consensus builds up about a particular area of scientific knowledge, then we can have more confidence in its objectivity and truth. *consensus: 일치 - 5 지문별 학교기출 100제 - 1차 ↓ Increased (A)___________ in the practice of science, including differences in gender, ethnicity, and social and cultural backgrounds, enhances the (B)___________ and truth of scientific knowledge by allowing a broader range of perspectives and ideas to be tested and evaluated. (A) (B)`,choices:[`variety objectivity`,`funding innovation`,`technology efficiency`,`collaboration understanding`,`specialization precision`],ans:1},
  {no:16,school:``,pref:`23`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`If there is little or no diversity of views, and all scientists see, think, and question the world in a similar way, then they will not, as a community, be as objective as they maintain they are, or at least aspire to be. The solution is that there should be far greater diversity in the practice of science: in gender, ethnicity, and social and cultural backgrounds. Science works because it is carried out by people who pursue their curiosity about the natural world and test their and each other’s ideas from as many varied perspectives and angles as possible. When science is done by a diverse group of people, and if consensus builds up about a particular area of scientific knowledge, then we can have more confidence in its truth.`,choices:[`과학자들이 동일한 방법으로 세계를 바라보고 질문하면 객관성을 잃게 된다.`,`과학의 객관성을 유지하기 위해서는 과학자들 사이의 다 양성이 필수적이다.`,`과학적 합의가 이루어지면 그 지식의 진실성에 대해 더 큰 신뢰를 가질 수 있다.`,`과학의 발전을 위해서는 다양한 배경을 가진 사람들의 참여가 필요하다.`,`과학자들은 자연 세계에 대한 호기심을 가지고 서로의 아이디어를 테스트한다. 5 - 06월`],ans:2},
  {no:17,school:``,pref:`24`,type:`빈칸추론`,stem:`다음 빈칸에 들어갈 말로 적절한 것은?(정답2개)`,body:`We tend to break up time into units, such as weeks, months, and seasons; in a series of studies among farmers in India and students in North America, psychologists found that if a deadline is one the other side of a “break” – such as in the New Year – we’re more likely to see it as remote, and, as a result, be less ready to jump into action. What you need to do in that situation is find another way to think about the timeframe. For example, if it’s November and the deadline is in January, it’s better ________________________________. The best approach is to view deadlines as a challenge that you have to meet within a period that’s imminent. That way the stress is more manageable, and you have a better chance of starting – and therefore finishing – in good time.`,choices:[`to start “in November”`,`to deal with your tasks after winter`,`not to get stressed and work until February`,`not to be conscious of the deadline and not to be hurry`,`to reframe deadlines to stay motivated and take timely action`],ans:1},
  {no:18,school:``,pref:`24`,type:`기타`,stem:`다음 주어진 글을 읽고, 필자가 생각하는 가장 이상적 인 상황은?`,body:`We tend to break up time into units, such as weeks, months, and seasons; in a series of studies among farmers in India and students in North America, psychologists found that if a deadline is on the other side of a "break" ― such as in the New Year ― we're more likely to see it as remote, and, as a result, be less ready to jump into action. What you need to do in that situation is find another way to think about the timeframe. For example, if it's November and the deadline is in January, it's better to tell yourself you have to get it done "this winter" rather than "next year." The best approach is to view deadlines as a challenge that you have to meet within a period that's imminent. That way the stress is more manageable, and you have a better chance of starting ― and therefore finishing ― in good time. - 6 지문별 학교기출 100제 - 1차`,choices:[`A week before the upcoming exam, Dae-wook went to the ballpark comfortably because he had a week left.`,`Mi-rim always smiles. The reason is that she thinks everything can be done in an hour, if she starts someday.`,`Hey-ryeong has a belief that today should be postponed until tomorrow, so she is always living happily today.`,`Jung-hwan is always relaxed. This is because Jung-hwan always have excellent ability to do things the day before submitting.`,`In order to pursue perfection, Ji-eun always writes in advance two weeks before submitting the performance evaluation and reviews it several times.`],ans:5},
  {no:19,school:``,pref:`24`,type:`무관문장`,stem:`다음 글에서 전체 흐름과 관계없는 문장은?`,body:`We tend to break up time into units, such as weeks, months, and seasons; in a series of studies among farmers in India and students in North America, psychologists found that if a deadline is on the other side of a "break" ― such as in the New Year ― we're more likely to see it as remote, and, as a result, be less ready to jump into action. ⓐWhat you need to do in that situation is find another way to think about the timeframe. ⓑFor example, if it's November and the deadline is in January, it's better to tell yourself you have to get it done "this winter" rather than "next year." ⓒWinter is generally a season when many people feel less motivated, so many people have a hard time completing their work on time. ⓓThe best approach is to view deadlines as a challenge that you have to meet within a period that's imminent. ⓔThat way the stress is more manageable, and you have a better chance of starting ― and therefore finishing ― in good time. *imminent: 임박한`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ 6 - 06월`],ans:3},
  {no:20,school:``,pref:`26`,type:`어법`,stem:`다음 글에서 문법상 어색한 부분의 개수는?`,body:`Henry David Thoreau is born in Concord, Massachusetts in 1817. When he was 16, he entered Harvard College. After graduate, Thoreau worked as a schoolteacher but he quit after two weeks. In June of 1838 he set up a school with his brother John. However, he has hopes of becoming a nature poet. In 1845, he moved into a small self-built house near Walden Pond. At Walden, Thoreau did an incredible amount of reading. The journal he wrote there became the source of his most famous book, Walden. In his later life, Thoreau traveled to the Maine woods, to Cape Cod, and to Canada. At the age of 43, he ended his travels and returns to Concord. Although his works were not widely read during his lifetime, he never stopped writing, and his works fill 20 volumes.`,choices:[`4개`,`3개`,`2개`,`1개`,`없음`],ans:1},
  {no:21,school:``,pref:`26`,type:`내용일치X`,stem:`다음 글의 내용과 일치하지 않는 것은?`,body:`Henry David Thoreau was born in Concord, Massachusetts in 1817. When he was 16, he entered Harvard College. After graduating, Thoreau worked as a schoolteacher but he quit after two weeks. In June of 1838 he set up a school with his brother John. However, he had hopes of becoming a nature poet. In 1845, he moved into a small self-built house near Walden Pond. At Walden, Thoreau did an incredible amount of reading. The journal he wrote there became the source of his most famous book, Walden. In his later life, Thoreau traveled to the Maine woods, to Cape Cod, and to Canada. At the age of 43, he ended his travels and returned to Concord. Although his works were not widely read during his lifetime, he never stopped writing, and his works fill 20 volumes. - 7 지문별 학교기출 100제 - 1차`,choices:[`Born in 1817, Thoreau entered Harvard College in his mid-teens.`,`After graduating from college, Thoreau worked as a teacher for a while and then went into a house he built himself near Walden Pond.`,`Thoreau founded the school with his brother John at the early age of 20.`,`Thoreau traveled to some places, including Canada, and returned to his hometown in his 40s.`,`Many of the books written by Thoreau, including Walden, were very popular at his time.`],ans:5},
  {no:22,school:``,pref:`26`,type:`기타`,stem:`다음 글의 Henry David Thoreau에 관한 내용과 일치 하는 것은?`,body:`Henry David Thoreau was born in Concord, Massachusetts in 1817. When he was 16, he entered Harvard College. After graduating, Thoreau worked as a schoolteacher but he quit after two weeks. In June of 1838 he set up a school with his brother John. However, he had hopes of becoming a nature poet. In 1845, he moved into a small self-built house near Walden Pond. At Walden, Thoreau did an incredible amount of reading. The journal he wrote there became the source of his most famous book, Walden. In his later life, Thoreau traveled to the Maine woods, to Cape Cod, and to Canada. At the age of 43, he ended his travels and returned to Concord. Although his works were not widely read during his lifetime, he never stopped writing, and his works fill 20 volumes.`,choices:[`He entered Harvard University at a young age but dropped out.`,`He used to be a schoolteacher, a school founder, and an agricultural engineer.`,`He built a small house with his brother in nature.`,`After finishing his travels, he returned to the place where he was born.`,`His works became very popular in his later life. 7 - 06월`],ans:4},
  {no:23,school:``,pref:`29`,type:`문장 위치`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`This social feedback encourages the baby to continue smiling. The built-in capacity for smiling is proven by the remarkable observation that babies who are congenitally both deaf and blind, who have never seen a human face, also start to smile at around 2 months. However, smiling in blind babies eventually disappears if nothing is done to reinforce it. (A) Without the right feedback, smiling dies out. (B) But here’s a fascinating fact: blind babies will continue to smile if they are cuddled, bounced, nudged, and tickled by an adult – anything to let them know that they are not alone and that someone cares about them. (C) In this way, early experience operates with our biology to establish social behaviors. (D) In fact, you don’t need the cases of blind babies to make the point. (E) Babies with sight smile more at you when you look at them or, better still, smile back at them.`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:3},
  {no:25,school:``,pref:`29`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`The built-in capacity for smiling is proven by the remarkable observation that babies who are congenitally both deaf and blind, who have never seen a human face, also start to smile at around 2 months. (A) But here’s a fascinating fact: blind babies will continue to smile if they are cuddled, bounced, nudged, and tickled by an adult – anything to let them know that they are not alone and that someone cares about them. (B) However, smiling in blind babies eventually disappears if nothing is done to reinforce it. Without the right feedback, smiling dies out. (C) This social feedback encourages the baby to continue smiling. In this way, early experience operates with our biology to establish social behaviors. In fact, you don’t need the cases of blind babies to make the point. Babies with sight smile more at you when you look at them or, better still, smile back at them.`,choices:[`(A) - (B) - (C)`,`(B) - (A) - (C)`,`(B) - (C) - (A)`,`(C) - (A) - (B)`,`(C) - (B) - (A) 8 - 06월`],ans:2},
  {no:26,school:``,pref:`29`,type:`기타`,stem:`다음 글의 밑줄 친 부분이 가리키는 대상이 나머지 넷 과 다른 것은?`,body:`The built-in capacity for smiling is proven by the remarkable observation that babies who are congenitally both deaf and blind, who have never seen a human face, also start to smile at around 2 months. However, smiling in blind babies eventually disappears if nothing is done to reinforce it. Without the right feedback, smiling dies out. But here’s a fascinating fact: blind babies will continue to smile if ⓐthey are cuddled, bounced, nudged, and tickled by an adult – anything to let ⓑthem know that ⓒthey are not alone and that someone cares about ⓓthem. This social feedback encourages the baby to continue smiling. In this way, early experience operates with our biology to establish social behaviors. In fact, you don’t need the cases of blind babies to make the point. Babies with sight smile more at you when you look at ⓔthem or, better still, smile back at them.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},

  {no:28,school:``,pref:`29`,type:`문장 위치`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`But here's a fascinating fact: blind babies will continue to smile if they are cuddled, bounced, nudged, and tickled by an adult ― anything to let them know that they are not alone and that someone cares about them. The built-in capacity for smiling is proven by the remarkable observation that babies who are congenitally both deaf and blind, who have never seen a human face, also start to smile at around 2 months. (A) However, smiling in blind babies eventually disappears if nothing is done to reinforce it. Without the right feedback, smiling dies out. (B) This social feedback encourages the baby to continue smiling. (C) In this way, early experience operates with our biology to establish social behaviors. (D) In fact, you don't need the cases of blind babies to make the point. (E) Babies with sight smile more at you when you look at them or, better still, smile back at them.`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:2},
  {no:29,school:``,pref:`29`,type:`무관문장`,stem:`다음 글에서 전체 흐름과 관계없는 문장은?`,body:`The built-in capacity for smiling is proven by the remarkable observation that babies who are congenitally both deaf and blind, who have never seen a human face, also start to smile at around 2 months. However, smiling in blind babies eventually disappears without the right feedback. But blind babies will continue to smile of they are cuddled, bounced, nudged, and tickled by an adult – anything to let them know that they are not alone and that someone cares about them. This social feedback encourages the baby to continue smiling. ⓐIn fact, you don't need the cases of blind babies to make the point. ⓑBabies with sight smile more at you when you look at them or, better still, smile at them. ⓒFor blind babies, different tactile experiences can help their sense grow and develop their fine motor skills. ⓓResearch shows that smiling is one of the first social behaviors that babies develop and is crucial for their emotional and social growth. ⓔConsequently, the reinforcement of smiling through social interactions is vital for a baby's development.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ 9 - 06월`],ans:3},
  {no:30,school:``,pref:`30`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment more ⓐ enjoyable. But the opposite is true. Shows are actually more enjoyable when they're ⓑbroken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. Think about ⓒeat chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. ⓓInterspersing positive experiences with less positive ones, however, can slow down adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows disrupts the process. The less positive moment ⓔmakes the following positive one new again and thus more enjoyable.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:3},
  {no:31,school:``,pref:`30`,type:`빈칸추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment more enjoyable. But the opposite is true. Shows are actually more enjoyable when they're broken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. Interspersing positive experiences with less positive ones, however, can decelerate adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows disrupts the process. The less positive moment makes the following positive one new again and thus more enjoyable. - 1 지문별 학교기출 100제 - 1차 ↓ Interrupting positive experiences with negative ones can enhance overall enjoyment by (A)___________ adaptation and keeping the positive moments feeling (B)___________. (A) (B)`,choices:[`preventing fresh`,`facilitating fresh`,`accelerating tedious`,`hindering tedious`,`boosting invigorating`],ans:1},
  {no:32,school:``,pref:`30`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. (A) Interspersing positive experiences with less positive ones, however, can slow down adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows disrupts the process. The less positive moment makes the following positive one new again and thus more enjoyable. (B) Since a majority of people hate them, eliminating them should make shows or other entertainment more enjoyable. But the opposite is true. Shows are actually more enjoyable when they're broken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. (C) Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt.`,choices:[`(A) – (C) – (B)`,`(B) – (A) – (C)`,`(B) – (C) – (A)`,`(C) – (A) – (B)`,`(C) – (B) – (A) 10 - 06월`],ans:3},
  {no:33,school:``,pref:`30`,type:`문장 위치`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`Interspersing positive experiences with less positive ones, however, can delay adaptation. Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. (A) Most people hate them, so removing them should make shows or other entertainment more enjoyable. But the opposite is true. (B) Shows are actually more enjoyable when they’re broken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. (C) Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. (D) But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. (E) Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows disrupts the process. The less positive moment makes the following positive one new again and thus more enjoyable.`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:5},
  {no:34,school:``,pref:`30`,type:`빈칸추론`,stem:`다음 빈칸 (A)~(C)에 들어갈 단어로 가장 적절한 것 은?`,body:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment (A)__________ enjoyable. But the opposite is true. Shows are actually more enjoyable when they’re broken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. Interspersing positive experiences with (B)__________ positive ones, however, can hinder adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows (C)__________ the process. The less positive moment makes the following positive one new again and thus more enjoyable. (A) (B) (C)`,choices:[`less less halts`,`less more stimulates`,`more less slows`,`more less stimulates`,`more more halts - 1 지문별 학교기출 100제 - 1차`],ans:3},
  {no:35,school:``,pref:`30`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`Because people tend to adapt, ⓐto interrupt positive things with negative things can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment more amusing. But the opposite is true. Shows are actually more enjoyable when they’re broken up by annoying commercials. Because these less enjoyable moments ⓑ break up adaptation to the positive experience of the show. Think about eating chocolate chips. The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. Interspersing positive experiences with less positive ⓒones, however, can delay adaptation. Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows ⓓhinder the process. The less positive moment makes the following positive moment new again and thus more ⓔenjoyable. *intersperse: 흩뿌리다 **Brussels sprout: 방울양배추`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:4},
  {no:36,school:``,pref:`30`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`Because people tend to adapt, interrupting positive things with negative ones can actually increase enjoyment. Take commercials. Most people hate them, so removing them should make shows or other entertainment more enjoyable. (A) The first chip is delicious: sweet, melt-in-your-mouth goodness. The second chip is also pretty good. But by the fourth, fifth, or tenth chip in a row, the goodness is no longer as pleasurable. We adapt. Interspersing positive experiences with less positive ones, however, can decelerate adaptation. (B) But the opposite is true. Shows are actually more enjoyable when they're broken up by annoying commercials. Because these less enjoyable moments break up adaptation to the positive experience of the show. Think about eating chocolate chips. (C) Eating a Brussels sprout between chocolate chips or viewing commercials between parts of TV shows disrupts the process. The less positive moment makes the following positive one new again and thus more enjoyable.`,choices:[`(A)-(C)-(B)`,`(B)-(A)-(C)`,`(B)-(C)-(A)`,`(C)-(A)-(B)`,`(C)-(B)-(A) 11 - 06월`],ans:2},
  {no:37,school:``,pref:`31`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`We collect stamps, coins, vintage cars even when they serve no practical purpose. The post office doesn’t accept the old stamps, the banks don’t take old coins, and the vintage cars are no longer allowed on the road. These are all side issues; the attraction is that they are in short supply. In one study, students were asked to arrange ten posters in order of attractiveness – with the agreement that afterward they could keep one poster as a reward for their participation. Five minutes later, they were told that the poster with the third highest rating was no longer available. Then they were asked to judge all ten from scratch. The poster that was no longer available was suddenly classified as the most beautiful. In psychology, this phenomenon is called reactance: when we are deprived of an option, we suddenly deem it more attractive.`,choices:[`Balancing Usefulness and Desire`,`Nostalgia’s Pull: Scarcity of the Past`,`Appeal of Scarcity: Rare Items Attract`,`Urgency of Collecting: Why We Accumulate`,`An Effective Way to Make Choices When Scarcity Strikes`],ans:3},
  {no:39,school:``,pref:`31`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`We collect stamps, coins, vintage cars even when they serve no practical purpose. The post office doesn’t accept the old stamps, the banks don’t take old coins, and the vintage cars are no longer allowed on the road. These are all side issues; the attraction is that they are in short supply. In one study, students were asked to arrange ten posters in order of attractiveness – with the agreement that afterward they could keep one poster as a reward for their participation. Five minutes later, they were told that the poster with the third highest rating was no longer available. Then they were asked to judge all ten from scratch. The poster that was no longer available was suddenly classified as the most beautiful.`,choices:[`People tend to be attracted to things that are limited or unavailable.`,`There are a growing number of people who like to collect old items.`,`Poster collection is the best among collecting old items.`,`Organizing posters is attractive and valuable to many people.`,`It’s attractive to collect old stamps that the post office doesn’t accept. 12 - 06월`],ans:1},

  {no:42,school:``,pref:`31`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`We collect stamps, coins, vintage cars even when they serve no practical purpose. The post office doesn’t accept the old stamps, the banks don’t take old coins, and the vintage cars are no longer allowed on the road. (A) In psychology, this phenomenon is called reactance: when we are deprived of an option, we suddenly deem it more attractive. (B) These are all side issues; the attraction is that they are in short supply. In one study, students were asked to arrange ten posters in order of attractiveness – with the agreement that afterward they could keep one poster as a reward for their participation. (C) Five minutes later, they were told that the poster with the third highest rating was no longer available. Then they were asked to judge all ten from scratch. The poster that was no longer available was suddenly classified as the most beautiful.`,choices:[`(A) - (C) - (B)`,`(B) - (A) - (C)`,`(B) - (C) - (A)`,`(C) - (A) - (B)`,`(C) - (B) - (A)`],ans:3},
  {no:43,school:``,pref:`31`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`We collect stamps, coins, vintage cars even when they serve no practical purpose. The post office doesn’t accept the old stamps, the banks don’t take old coins, and the vintage cars are no longer allowed on the road. These are all side issues; the attraction is that they are in short supply. In one study, students were asked to arrange ten posters in order of attractiveness – with the agreement that afterward they could keep one poster as a reward for their participation. Five minutes later, they were told that the poster with the third highest rating was no longer available. Then they were asked to judge all ten from scratch. The poster that was no longer available was suddenly classified as the most beautiful. In psychology, this phenomenon is called reactance: when we are deprived of an option, we suddenly deem it more attractive.`,choices:[`꾸준한 저축을 통해 많은 자산을 모을 수 있다.`,`적절한 보상과 제재를 통해 사회 질서를 유지해야 한다.`,`타인과의 상대적인 비교를 통해 발전을 위한 동기부여를 얻는다.`,`선택의 기로에서 희소한 것에 더 큰 가치를 부여하는 경 향이 있다.`,`그림, 영상과 같은 다양한 표현 양식을 통해 의미를 수 월하게 전달할 수 있다. 13 - 06월`],ans:4},
  {no:44,school:``,pref:`32`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`If we’ve invested in something that hasn’t repaid us – be it money in a failing venture, or time in an unhappy relationship – we find it very ⓐdifficult to walk away. This is the sunk cost fallacy. Our instinct is to continue investing money or time as we hope that our investment will prove to be ⓑworthwhile in the end. Giving up would mean acknowledging that we’ve ⓒwasted something we can’t get back, and that thought is so painful that we prefer to avoid it if we can. The problem, of course, is that if something really is a bad bet, then staying with it simply ⓓdecreases the amount we lose. Rather than walk away from a bad five-year relationship, for example, we turn it into a bad 10-year relationship; rather than ⓔ accept that we’ve lost a thousand dollars, we lay down another thousand and lose that too. In the end, by delaying the pain of admitting our problem, we only add to it. Sometimes we just have to cut our losses.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:4},
  {no:45,school:``,pref:`32`,type:`빈칸추론`,stem:`다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?`,body:`If we've invested in something that hasn't repaid us ─ be it money in a failing venture, or time in an unhappy relationship ─ we find it very difficult to walk away. This is the sunk cost fallacy. Our instinct is to continue investing money or time as we hope that our investment will prove to be worthwhile in the end. Giving up would mean acknowledging that we've wasted something we can't get back, and that thought is so painful that we prefer to avoid it if we can. The problem, of course, is that if something really is a bad bet, then staying with it simply increases the amount we lose. Rather than walk away from a bad five-year relationship, for example, we turn it into a bad 10-year relationship: rather than accept that we've lost a thousand dollars, we lay down another thousand and lose that too. - 1 지문별 학교기출 100제 - 1차 ↓ Though we tend to (A)____________ the pain of admitting our problem, sometimes it is wise to abandon what we hold not to become (B)____________. (A) (B)`,choices:[`embrace depressed`,`impede worse`,`avoid distracted`,`impede assimilated`,`embrace familiar`],ans:2},

  {no:51,school:``,pref:`32`,type:`문장 위치`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`The problem, of course, is that if something really is a bad bet, then staying with it simply increases the amount we lose. If we've invested in something that hasn't repaid us ― be it money in a failing venture, or time in an unhappy relationship ― we find it very difficult to walk away. (A) This is the sunk cost fallacy. (B) Our instinct is to continue investing money or time as we hope that our investment will prove to be worthwhile in the end. (C) Giving up would mean acknowledging that we've wasted something we can't get back, and that thought is so painful that we prefer to avoid it if we can. (D) Rather than walk away from a bad five-year relationship, for example, we turn it into a bad 10-year relationship; rather than accept that we've lost a thousand dollars, we lay down another thousand and lose that too. (E) In the end, by delaying the pain of admitting our problem, we only add to it. Sometimes we just have to cut our losses.`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E) 15 - 06월`],ans:4},

  {no:53,school:``,pref:`32`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`If we've invested in something that hasn't repaid us ― be it money in a failing venture, or time in an unhappy relationship ― we find it very difficult to walk away. This is the sunk cost fallacy. Our instinct is to continue investing money or time as we hope that our investment will prove to be worthwhile in the end. Giving up would mean acknowledging that we've wasted something we can't get back, and that thought is so painful that we prefer to avoid it if we can. The problem, of course, is that if something really is a bad bet, then staying with it simply increases the amount we lose. Rather than walk away from a bad five-year relationship, for example, we turn it into a bad 10-year relationship; rather than accept that we've lost a thousand dollars, we lay down another thousand and lose that too. In the end, by delaying the pain of admitting our problem, we only add to it. Sometimes we just have to cut our losses.`,choices:[`The Prerequisites for Time Management`,`How to Get Back Our Losses from a Fraud`,`Move Forward: Don't Let Sink Costs Hold You Back`,`Stick to the Plan: The Best Way to Avoid Losses`,`Sunk Costs: A Necessary Condition for Investment - 1 지문별 학교기출 100제 - 1차`],ans:3},
  {no:54,school:``,pref:`32`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`If we’ve invested in something that hasn't repaid us – be it money in a failing venture, or time in an unhappy relationship – we find it very difficult to walk away. This is the sunk cost fallacy. Our instinct is to continue investing money or time as we hope that our investment will prove to be ⓐworthwhile in the end. Giving up would mean ⓑ acknowledging that we’ve wasted something we can’t get back, and that thought is so painful that we prefer to avoid it if we can. The problem, of course, is that if something really is a bad bet, then staying with it simply ⓒincreases the amount we lose. Rather than walk away from a bad five-year relationship, for example, we turn it into a bad 10-year relationship; rather than accept that we’ve lost a thousand dollars, we ⓓlay down another thousand and lose that too. In the end, by ⓔembracing the pain of admitting our problem, we only add to it. Sometimes we just have to cut our losses.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:55,school:``,pref:`32`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`If we've invested in something that hasn't repaid us ― be it money in a failing venture, or time in an unhappy relationship ― we find it very difficult to walk away. This is the sunk cost fallacy. Our instinct is to continue investing money or time as we hope that our investment will prove to be ⓐprofitable in the end. Giving up would mean acknowledging that we've wasted something we can't get back, and that thought is so painful that we prefer to ⓑescape it if we can. The problem, of course, is that if something really is a bad bet, then staying with it simply ⓒescalates the amount we lose. Rather than walk away from a bad five-year relationship, for example, we turn it into a bad 10-year relationship; rather than ⓓdeny that we've lost a thousand dollars, we lay down another thousand and lose that too. In the end, by delaying the pain of admitting our problem, we only add to it. Sometimes we just have to cut our ⓔdamages.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ 16 - 06월`],ans:4},
  {no:56,school:``,pref:`33`,type:`문장 위치`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`The very notion seems nonsensical. On our little world, light travels, for all practical purposes, instantaneously. If a lightbulb is glowing, then of course it’s physically where we see it, shining away. (A) We reach out our hand and touch it: It’s there all right, and unpleasantly hot. If the filament fails, then the light goes out. (B) We don’t see it in the same place, glowing, illuminating the room years after the bulb breaks and it’s removed from its socket. (C) But if we’re far enough away, an entire sun can go out and we’ll continue to see it shining brightly; (D) we won’t learn of its death, it may be, for ages to come – in fact, for how long it takes light, which travels fast but not infinitely fast, to cross the intervening vastness. (E) The immense distances to the stars and the galaxies mean that we see everything in space in the past. *instantaneously: 순간적으로 **intervene: 사이에 들다`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:3},
  {no:57,school:``,pref:`33`,type:`내용일치X`,stem:`다음 글의 내용과 일치하지 않는 것은?`,body:`On our little world, light travels, for all practical purposes, instantaneously. If a lightbulb is glowing, then of course it's physically where we see it, shining away. We reach out our hand and touch it: It's there all right, and unpleasantly hot. If the filament fails, then the light goes out. We don't see it in the same place, glowing, illuminating the room years after the bulb breaks and it's removed from its socket. The very notion seems nonsensical. But if we're far enough away, an entire sun can go out and we'll continue to see it shining brightly; we won't learn of its death, it may be, for ages to come ― in fact, for how long it takes light, which travels fast but not infinitely fast, to cross the intervening vastness. The immense distances to the stars and the galaxies mean that we see everything in space in the past. - 1 지문별 학교기출 100제 - 1차`,choices:[`We can see a distant sun shining long after it has gone out.`,`Light on Earth appears to travel almost instantaneously.`,`Light from a broken lightbulb can illuminate the room for years.`,`When a lightbulb's filament fails, the light immediately goes out.`,`The immense distances to stars and galaxies mean we see them as they were in the past.`],ans:3},
  {no:58,school:``,pref:`33`,type:`기타`,stem:`다음 글의 내용으로 유추할 수 없는 것은?`,body:`On our little world, light travels, for all practical purposes, very immediately. If a lightbulb is glowing, then of course it’s physically where we see it, shining away. We reach out our hand and touch it: It’s there all right, and unpleasantly hot. If the filament fails, then the light goes out. We don’t see it in the same place, glowing, illuminating the room years after the bulb breaks and it’s removed from its socket. The very notion seems to make no sense. But if we’re far enough away, an entire sun can go out and we’ll continue to see it shining brightly; we won’t learn of its death, it may be, for ages to come – in fact, for how long it takes light, which travels fast but not infinitely fast, to cross the intervening vastness. The enormous distances to the stars and the galaxies mean that we see everything in space in the past.`,choices:[`We can see the light when we are far away even if it’s dead.`,`When the light is on in our room, we can see it right away.`,`Even the stars we see today might have been dead for a long time.`,`It is impossible to see the light no matter how many years after the light goes dead.`,`Things in the sky such as stars may exist at the same time we see them if it’s close enough. 17 - 06월`],ans:4},
  {no:59,school:``,pref:`34`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`Financial markets do more than take capital from the rich and lend it to everyone else. They enable each of us to ⓐsmooth consumption over our lifetimes, which is a ⓑ fancy way of saying that we don’t have to spend income at the same time we earn it. Shakespeare may have admonished us to be neither borrowers nor lenders; the fact is that most of us will be both at some point. If we lived in an agrarian society, we would have to eat our crops ⓒreasonably soon after the harvest or find some way to store them. Financial markets are a ⓓmore sophisticated way of managing the harvest. We can spend income now that we have not yet earned – as by borrowing for college or a home – or we can earn income now and spend it later, as by saving for retirement. The important point is that earning income has been divorced from spending it, allowing us much ⓔless flexibility in life.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:60,school:``,pref:`34`,type:`제목`,stem:`다음 글의 제목으로 가장 적절한 것은?`,body:`Financial markets do more than take capital from the rich and lend it to everyone else. They enable each of us to smooth consumption over our lifetimes, which is a fancy way of saying that we don't have to spend income at the same time we earn it. Shakespeare may have admonished us to be neither borrowers nor lenders; the fact is that most of us will be both at some point. If we lived in an agrarian society, we would have to eat our crops reasonably soon after the harvest or find some way to store them. Financial markets are a more sophisticated way of managing the harvest. We can spend income now that we have not yet earned ─as by borrowing for college or a home ─or we can earn income now and spend it later, as by saving for retirement. The important point is that earning income has been divorced from spending it, allowing us much more flexibility in life.`,choices:[`Keep Your Income and Expense Balanced!`,`Reboot Your Finances with Financial Experts`,`In Bear Markets: Make Money through Investing`,`Capital Markets Make Flexible Consumption Possible`,`Become a Wise Consumer in the Era of Consumption - 1 지문별 학교기출 100제 - 1차`],ans:4},
  {no:63,school:``,pref:`34`,type:`무관문장`,stem:`다음 글에서 전체 흐름과 관계없는 문장은?`,body:`Financial markets do more than take capital from the rich and lend it to everyone else. They enable each of us to smooth consumption over our lifetimes, which is a fancy way of saying that we don't have to spend income at the same time we earn it. Shakespeare may have admonished us to be neither borrowers nor lenders; the fact is that most of us will be both at some point. ⓐIf we lived in an agrarian society, we would have to eat our crops reasonably soon after the harvest or find some way to store them. ⓑDuring the transition from an agrarian to a pre-industrial society, countless great literary works and writers, such as Shakespeare, emerged. ⓒFinancial markets are a more sophisticated way of managing the harvest. ⓓ We can spend income now that we have not yet earned ― as by borrowing for college or a home ― or we can earn income now and spend it later, as by saving for retirement. ⓔThe important point is that earning income has been divorced from spending it, allowing us much more flexibility in life.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:2},
  {no:64,school:``,pref:`34`,type:`함축`,stem:`다음 글의 밑줄 친 “earning income has been divorced from spending it”이 의미하는 바로 가장 적 절한 것은?`,body:`Financial markets do more than take capital from the rich and lend it to everyone else. They enable each of us to smooth consumption over our lifetimes, which is a fancy way of saying that we don’t have to spend income at the same time we earn it. Shakespeare may have admonished us to be neither borrowers nor lenders; the fact is that most of us will be both at some point. If we lived in an agrarian society, we would have to eat our crops reasonably soon after the harvest or find some way to store them. Financial markets are a more sophisticated way of managing the harvest. We can spend income now that we have not yet earned – as by borrowing for college or a home – or we can earn income now and spend it later, as by saving for retirement. The important point is that earning income has been divorced from spending it, allowing us much more flexibility in life. *admonish: 권고하다 **agrarian: 농업(농민)의 - 1 지문별 학교기출 100제 - 1차`,choices:[`Financial markets eliminate the need for individuals to work in order to earn money.`,`Financial markets allow us to separate the timing of when we earn money from when we spend it.`,`Financial markets only benefit the rich by allowing them to accumulate wealth without spending it.`,`Financial markets ensure that everyone has equal access to income regardless of their job of financial status.`,`Financial markets guarantee that we will always have more income than expenses, preventing financial difficulties.`],ans:2},

  {no:66,school:``,pref:`35`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`As the old joke goes: "Software, free. User manual, $10,000." But it's no joke. A couple of high-profile companies make their living selling instruction and ⓐpaid support for free software. The copy of code, being mere bits, is free. The lines of free code become ⓑvaluable to you only through support and guidance. A lot of medical and genetic information will ⓒgo this route in the coming decades. Right now getting a full copy of all your DNA is very expensive ($10,000), but soon it won't be. The price is dropping so fast, it will be $100 soon, and then the next year insurance companies will offer to sequence you ⓓfor free. When a copy of your sequence costs nothing, the interpretation of what it means, what you can do about it, and how to use it ― the manual for your genes ― will be ⓔless expensive.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:67,school:``,pref:`35`,type:`내용일치O`,stem:`다음 글의 내용과 일치하는 것은?`,body:`As the old joke goes: “Software, free. User manual, $10,000.” But it’s no joke. A couple of high-profile companies make their living selling instruction and paid support for free software. The copy of code, being mere bits, is free. The lines of free code become valuable to you only through support and guidance. A lot of medical and genetic information will go this route in the coming decades. Right now getting a full copy of all your DNA is very expensive ($10,000), but soon it won’t be. The price is dropping so fast, it will be $100 soon, and then the next year insurance companies will offer to sequence you for free. When a copy of your sequence costs nothing, the interpretation of what it means, what you can do about it, and how to use it – the manual for your genes – will be expensive. *sequence: (유전자) 배열 순서를 밝히다 - 2 지문별 학교기출 100제 - 1차`,choices:[`Currently, the price of the software manual is similar to that of the software usually supplied by the company.`,`In the future, companies will sell individual genetic manuals more expensively than individual genetic information.`,`The companies make money by selling complex softwares to people.`,`Currently, the cost of obtaining personal DNA information is low, so anyone can use it.`,`Even in the future, obtaining personal genetic information will be expensive and difficult to obtain.`],ans:2},
  {no:68,school:``,pref:`35`,type:`빈칸추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`As the old joke goes: “Software, free. User manual, $10,000.” But it’s no joke. A couple of high-profile companies make their living selling instruction and paid support for free software. The copy of code, being mere bits, is free. The lines of free code become valuable to you only through support and guidance. A lot of medical and genetic information will go this route in the coming decades. Right now getting a full copy of all your DNA is very expensive ($10,000), but soon it won’t be. The price is dropping so fast, it will be $100 soon, and then the next year insurance companies will offer to sequence you for free. When a copy of your sequence costs nothing, the interpretation of what it means, what you can do about it, and how to use it – the manual for your genes – will be expensive. _________________________________________________.`,choices:[`This can be applied to many other complex services`,`That is why we shouldn’t pay for what we don’t need`,`This is because companies have no intention to make a profit`,`We should try to make our own manuals with support from companies`,`It is better for us to extend our professional area in order not to be scammed 20 - 06월`],ans:1},
  {no:69,school:``,pref:`36`,type:`문장 위치`,stem:`다음 글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?`,body:`Neuroscientists weren’t the first to discover that fixing your gaze on something is no guarantee of seeing it. (A) Brains are expensive in terms of energy. Twenty percent of the calories we consume are used to power the brain. (B) So brains try to operate in the most energy-efficient way possible, and that means processing only the minimum amount of information from our senses that we need to navigate the world. (C) Magicians figured this out long ago. (D) By directing your attention, they perform tricks with their hands in full view. Their actions should give away the game, but they can rest assured that your brain processes only small bits of the visual scene. (E) This all helps to explain the prevalence of traffic accidents in which drivers hit pedestrians in plain view, or collide with cars directly in front of them. In many of these cases, the eyes are pointed in the right direction, but the brain isn’t seeing what’s really out there.`,choices:[`(A)`,`(B)`,`(C)`,`(D)`,`(E)`],ans:3},
  {no:70,school:``,pref:`36`,type:`빈칸추론`,stem:`다음 글의 흐름으로 보아, 빈칸 (A)와 (B)에 들어갈 가 장 적절한 말로 짝지어진 것은?`,body:`Brains are expensive in terms of energy. Twenty percent of the calories we consume are used to power the brain. So brains try to operate in the most energy-efficient way possible, and that means processing only the minimum amount of information from our senses that we need to navigate the world. Neuroscientists weren’t the first to discover that fixing your gaze on something is no (A)__________ of seeing it. Magicians figured this out long ago. By directing your attention, they perform tricks with their hands in full view. Their actions should give away the game, but they can rest assured that your brain processes only small bits of the visual scene. This all helps to explain the (B)__________ of traffic accidents in which drivers hit pedestrians in plain view, or collide with cars directly in front of them. In many of these cases, the eyes are pointed in the right direction, but the brain isn’t seeing what’s really out there. *prevalence: 널리 행하여짐 **pedestrian: 보행자 **collide: 충돌하다 - 2 지문별 학교기출 100제 - 1차 (A) (B)`,choices:[`conviction frequency`,`abandonment frequency`,`assurance reduction`,`conviction reduction`,`abandonment decrease`],ans:1},
  {no:71,school:``,pref:`36`,type:`요지`,stem:`다음 글의 요지로 가장 적절한 것은?`,body:`Brains are expensive in terms of energy. Twenty percent of the calories we consume are used to power the brain. So brains try to operate in the most energy-efficient way possible, and that means processing only the minimum amount of information from our senses that we need to navigate the world. Neuroscientists weren't the first to discover that fixing your gaze on something is no guarantee of seeing it. Magicians figured this out long ago. By directing your attention, they perform tricks with their hands in full view. Their actions should give away the game, but they can rest assured that your brain processes only small bits of the visual scene. This all helps to explain the prevalence of traffic accidents in which drivers hit pedestrians in plain view, or collide with cars directly in front of them. In many of these cases, the eyes are pointed in the right direction, but the brain isn't seeing what's really out there.`,choices:[`Brains tend to process less information due to their energy-efficient characteristic.`,`The functions of brains are the key to identifying the causes and effects of traffic accidents.`,`Brains are the most cost-efficient organ in our bodies demanding the minimum energy.`,`Brains can process only the information earned from the visual sense, not the other senses.`,`Magicians in the past used to play a role of neuroscientists in the field of brain science. 21 - 06월`],ans:1},
  {no:72,school:``,pref:`36`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`Brains are expensive in terms of energy. Twenty percent of calories we consume are used to ⓐpower the brain. So brains try to operate in the most energy-efficient way possible, and that means processing only the ⓑmaximum amount of information from our senses that we need to navigate the world. Neuroscientists weren’t the first to discover that ⓒfixing your gaze on something is no guarantee of seeing it. Magicians figured this out long ago. By directing your attention, they perform ⓓtricks with their hands in full view. Their actions should give away the game, but they can rest assured that your brain processes only small bits of the visual scene. This all helps to explain the ⓔprevalence of traffic accidents in which drivers hit pedestrians in plain view, or collide with cars directly in front of them.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:2},
  {no:73,school:``,pref:`36`,type:`주제`,stem:`다음 글의 주제로 가장 적절한 것은?`,body:`Brains are expensive in terms of energy. Twenty percent of the calories we consume are used to power the brain. So brains try to operate in the most energy-efficient way possible, and that means processing only the minimum amount of information from our senses that we need to navigate the world. Neuroscientists weren’t the first to discover that fixing your gaze on something is no guarantee of seeing it. Magicians figured this out long ago. By directing your attention, they perform tricks with their hands in full view. Their actions should give away the game, but they can rest assured that your brain processes only small bits of the visual scene. This all helps to explain the prevalence of traffic accidents in which drivers hit pedestrians in plain view, or collide with cars directly in front of them. In many of these cases, the eyes are pointed in the right direction, but the brain isn’t seeing what’s really out there.`,choices:[`errors in visual information due to energy efficiency`,`strategies for improving workplace productivity`,`visual communication strategies in advertising`,`visual identity and branding for businesses`,`the tricks of magic and famous magicians - 2 지문별 학교기출 100제 - 1차`],ans:1},
  {no:74,school:``,pref:`36`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`Brains are expensive in terms of energy. Twenty percent of the calories we consume ⓐare used to power the brain. So brains try to operate in the most energy-efficient way possible, and that means processing only the minimum amount of information from our senses ⓑthat we need to navigate the world. Neuroscientists weren't the first to discover that fixing your gaze on something is no guarantee of seeing ⓒit. Magicians figured this out long ago. By directing your attention, they perform tricks with their hands in full view. Their actions should give away the game, but they can rest ⓓassured that your brain processes only small bits of the visual scene. This all helps to explain the prevalence of traffic accidents ⓔwhich drivers hit pedestrians in plain view, or collide with cars directly in front of them. In many of these cases, the eyes are pointed in the right direction, but the brain isn't seeing what's really out there.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:75,school:``,pref:`36`,type:`빈칸추론`,stem:`다음 빈칸에 들어갈 말로 가장 적절한 것은?`,body:`Brains are expensive in terms of energy. Twenty percent of the calories we consume are used to power the brain. So brains try to operate in the most energy-efficient way possible, and that means processing only the minimum amount of information from our senses that we need to navigate the world. Neuroscientists weren’t the first to discover that fixing your gaze on something _______________ _____________. Magicians figured this out long ago. By directing your attention, they perform tricks with their hands in full view. Their actions should give away the game, but they can rest assured that your brain processes only small bits of the visual scene. This all helps to explain the prevalence of traffic accidents in which drivers hit pedestrians in plain view, or collide with cars directly in front of them. In many of these cases, the eyes are pointed in the right direction, but the brain isn’t seeing what’s really out there.`,choices:[`does not need much energy`,`is no guarantee of seeing it`,`gets as much information as possible`,`was more likely to lead to traffic accidents`,`is the way we know what is happening out there 22 - 06월`],ans:2},
  {no:76,school:``,pref:`37`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`Buying a television is current consumption. It makes us happy today but does nothing to make us richer tomorrow. Yes, money ⓐspending on a television keeps workers employed at the television factory. But if the same money ⓑwere invested, it would create jobs somewhere else, say for scientists in a laboratory or workers on a construction site, ⓒwhile also making us richer in the long run. Think about college as an example. Sending students to college creates jobs for professors. Using the same money ⓓto buy fancy sports cars for high school graduates would create jobs for auto workers. The crucial difference between these scenarios ⓔis that a college education makes a young person more productive for the rest of his or her life; a sports car does not. Thus, college tuition is an investment; buying a sports car is consumption.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:1},
  {no:77,school:``,pref:`37`,type:`주제`,stem:`다음 글의 주제로 가장 적절한 것은?`,body:`Buying a television is current consumption. It makes us happy today but does nothing to make ur richer tomorrow. Yes, money spent on a television keeps workers employed at the television factory. But if the same money were invested, it would create jobs somewhere else, say for scientists in a laboratory or workers on a construction site, while also making us richer in the long run. Think about college as an example. Sending students to college creates jobs for professors. Using the same money to buy fancy sports cars for high school graduates would create jobs for auto workers. The crucial difference between these scenarios is that a college education makes a young person more productive for the rest of his or her life; a sports car does not. Thus, college tuition is an investment; buying a sports car is consumption.`,choices:[`specific examples of investing wisely`,`various reasons for higher college tuition`,`difference between investment and consumption`,`right time to start economic education for kids`,`importance of creating jobs in sustainable economic growth - 2 지문별 학교기출 100제 - 1차`],ans:3},
  {no:81,school:``,pref:`37`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`Buying a television is current consumption. It makes us happy today but does nothing to make our richer tomorrow. Yes, money spent on a television keeps workers ⓐemployed at the television factory. But if the same money ⓑwere invested, it would create jobs somewhere else. Say for scientists in a laboratory or workers on a construction site, while it also ⓒmakes us richer in the long run. Think about college as an example. Sending students to college creates jobs for professors. Using the same money ⓓto buy fancy sports cars for high school graduates would create jobs for auto workers. The crucial difference between these scenarios is that a college education makes a young person more productive for the rest of his or her life; a sports car ⓔis not. Thus, college tuition is an investment; buying a sports car is consumption.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:5},
  {no:82,school:``,pref:`37`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`Buying a television is current consumption. It makes us happy today but does nothing to make us richer tomorrow. Yes, money spent on a television keeps workers ⓐemployed at the television factory. But if the same money ⓑwere invested, it would create jobs somewhere else, say for scientists in a laboratory or workers on a construction site, while also making us richer in the long run. Think about college as an example. ⓒSend students to college creates jobs for professors. Using the same money to buy fancy sports cars for high school graduates would create jobs for auto workers. The crucial difference between these scenarios ⓓis that a college education makes a young person more productive for the rest of his or her life; a sports car ⓔdoes not. Thus, college tuition is an investment; buying a sports car is consumption.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ - 2 지문별 학교기출 100제 - 1차`],ans:3},
  {no:83,school:``,pref:`37`,type:`어법`,stem:`다음 글의 밑줄 친 부분 중, 어법상 어색한 것은?`,body:`Buying a television is current consumption. It makes us happy today but does nothing to make our richer tomorrow. Yes, personnel ⓐhiring at the television factory rely on funds spent on a television. But if the same money ⓑwere invested, it would create jobs somewhere else. For example, it could be used to employ scientists in a laboratory or workers on a construction site, while also ⓒmaking us richer in the long run. Think about college as an example. Sending students to college creates jobs for professors. Using the same money to buy fancy sports cars for high school graduates would create jobs for auto workers. The crucial difference between these scenarios is ⓓthat a college education makes a young person more productive for the rest of his or her life; a sports car ⓔ does not. Thus, college tuition is an investment; buying a sports car is consumption.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:1},
  {no:84,school:``,pref:`37`,type:`어휘`,stem:`다음 글의 밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적 절하지 않은 것은?`,body:`Buying a television is current consumption. It makes us happy today but does nothing to ⓐenhance our future wealth. Yes, money spent on a television ⓑmaintains job opportunities for the workers at the television factory. But if the same money were invested, it would create jobs somewhere else, say for scientists in a laboratory or workers on a construction site, while also ⓒimproving our long-term financial prospects. Think about college as an example. Sending students to college creates jobs for professors. Using the same money to buy fancy sports cars for high school graduates would ⓓgenerate jobs for auto workers. The crucial difference between these scenarios is that a college education ⓔimpedes a young person’s lifelong productivity; a sports car does not. Thus, college tuition is an investment; buying a sports car is consumption.`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ 24 - 06월`],ans:5},
  {no:85,school:``,pref:`38`,type:`무관문장`,stem:`다음 글에서 전체 흐름과 관계없는 문장은?`,body:`The Net differs from most of the mass media it replaces in an obvious and very important way: it's bidirectional. We can send messages through the network as well as receive them, which has made the system all the more useful. The ability to exchange information online, to upload as well as download, has turned the Net into a thoroughfare for business and commerce. ⓐWith a few clicks, people can search virtual catalogues, place orders, track shipments, and update information in corporate databases. ⓑExcessive use of the Net, particularly social media, has been linked to increased rates of anxiety, depression, and other mental health disorders. ⓒBut the Net doesn't just connect us with businesses; it connects us with one another. ⓓIt's a personal broadcasting medium as well as a commercial one. ⓔMillions of people use it to distribute their own digital creations, in the form of blogs, videos, photos, songs, and podcasts, as well as to critique, edit, or otherwise modify the creations of others. *bidirectional: 두 방향으로 작용하는 **thoroughfare: 통로`,choices:[`ⓐ`,`ⓑ`,`ⓒ`,`ⓓ`,`ⓔ`],ans:2},
  {no:86,school:``,pref:`38`,type:`주제`,stem:`다음 글의 주제로 가장 적절한 것은?`,body:`The Net differs from most of the mass media it replaces in an obvious and very important way: it's bidirectional. We can send messages through the network as well as receive them, which has made the system all the more useful. The ability to exchange information online, to upload as well as download, has turned the Net into a thoroughfare for business and commerce. With a few clicks, people can search virtual cataloguess, place orders, track shipments, and update information in corporate databases. But the Net doesn't just connect us with businesses: it connects us with one another. It's a personal broadcasting medium as well as a commercial one. Millions of people use it to distribute their own digital creations, in the form of blogs, videos, photos, songs, and podcasts, as well as to critique, edit, or otherwise modify the creations of others. - 2 지문별 학교기출 100제 - 1차`,choices:[`development and evolution of the Net`,`importance of the Net in personal broadcasting`,`disadvantages and limitation of the mass media`,`differences between the Net and the mass media in terms of their effects on e-commerce`,`bidirectional nature of the Net and its impacts on business and personal communication`],ans:5},
  {no:87,school:``,pref:`38`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`The Net differs from most of the mass media it replaces in an obvious and very important way: it’s bidirectional. (A) With a few clicks, people can search virtual catalogues, place orders, track shipments, and update information in corporate databases. But the Net doesn’t just connect us with businesses; it connects us with one another. (B) It’s a personal broadcasting medium as well as a commercial one. Millions of people use it to distribute their own digital creations, in the form of blogs, videos, photos, songs, and podcasts, as well as to critique, edit, or otherwise modify the creations of others. (C) We can send messages through the network as well as receive them, which has made the system all the more useful. The ability to exchange information online, to upload as well as download, has turned the Net into a thoroughfare for business and commerce.`,choices:[`(A) - (C) - (B)`,`(B) - (A) - (C)`,`(B) - (C) - (A)`,`(C) - (A) - (B)`,`(C) - (B) - (A) 25 - 06월`],ans:4},
  {no:88,school:``,pref:`39`,type:`글의 순서`,stem:`주어진 글 다음에 이어질 글의 순서로 가장 적절한 것 은?`,body:`Imagine that seven out of ten working Americans got fired tomorrow. What would they all do? It's hard to believe you'd have an economy at all if you gave pink slips to more than half the labor force. (A) Since then, wave upon wave of new occupations have arrived ─ appliance repair person, food chemist, photographer, web designer ─ each building on previous automation. Today, the vast majority of us are doing jobs that no farmer from the 1800s could have imagined. (B) But that is what the industrial revolution did to the workforce of the early 19th century. Two hundred years ago, 70 percent of American workers lived on the farm. Today automation has eliminated all but 1 percent of their jobs, replacing them with machines. (C) But the displaced workers did not sit idle. Instead, automation created hundreds of millions of jobs in entirely new fields. Those who once farmed were now manning the factories that manufactured farm equipment, cars, and other industrial products.`,choices:[`(A)-(C)-(B)`,`(B)-(A)-(C)`,`(B)-(C)-(A)`,`(C)-(A)-(B)`,`(C)-(B)-(A)`],ans:3},
