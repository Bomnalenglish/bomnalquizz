<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고운고 2학년 3월 모의고사 어법선택 | 봄날 English</title>

<style>
  :root {
    --primary: #6c5ce7;
    --primary-dark: #4a3ab5;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --neutral: #7f8c8d;
    --bg: #f3f0ff;
    --card: #ffffff;
    --text: #2c3e50;
    --sub: #636e72;
    --border: #dfe6e9;
    --shadow: 0 2px 12px rgba(108,92,231,0.10);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    color: #fff;
    padding: 24px 20px 20px;
    text-align: center;
  }
  header .school { font-size: 12px; opacity: .75; letter-spacing: 1px; margin-bottom: 4px; }
  header h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  header .subtitle { font-size: 13px; opacity: .85; }
  header .range-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 12px;
    margin-top: 8px;
  }

  #progress-wrap {
    background: #fff;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #progress-bar-bg {
    flex: 1; height: 8px;
    background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #a29bfe);
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
  }
  #progress-text { font-size: 12px; color: var(--sub); white-space: nowrap; }

  .section-label {
    text-align: center;
    padding: 20px 20px 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--primary-dark);
    text-transform: uppercase;
  }

  .quiz-container { padding: 8px 16px; }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: border-color .25s;
  }
  .question-card.answered-correct { border-color: var(--correct); }
  .question-card.answered-wrong   { border-color: var(--wrong); }

  .q-meta {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }
  .q-num {
    background: var(--primary);
    color: #fff;
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .q-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--primary-dark);
  }

  .q-sentence {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    margin-bottom: 14px;
    word-break: keep-all;
  }

  .blank-slot {
    display: inline-flex;
    gap: 4px;
    vertical-align: middle;
    flex-wrap: wrap;
  }

  .choice-btn {
    padding: 5px 14px;
    border-radius: 99px;
    border: 2px solid var(--border);
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--primary);
    color: var(--primary);
    background: #f0eeff;
  }
  .choice-btn.selected-correct { background: var(--correct); border-color: var(--correct); color: #fff; }
  .choice-btn.selected-wrong   { background: var(--wrong);   border-color: var(--wrong);   color: #fff; }
  .choice-btn.reveal-correct   { border-color: var(--correct); color: var(--correct); background: #eafaf1; }
  .choice-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    line-height: 1.6;
  }
  .feedback.correct { background: #eafaf1; color: #1e8449; display: block; }
  .feedback.wrong   { background: #fdedec; color: #c0392b; display: block; }

  #summary {
    display: none;
    background: var(--card);
    margin: 20px 16px;
    border-radius: var(--radius);
    padding: 28px 20px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  #summary h2 { font-size: 22px; margin-bottom: 8px; }
  #summary .score-big { font-size: 48px; font-weight: 700; color: var(--primary); line-height: 1.1; }
  #summary .score-detail { font-size: 14px; color: var(--sub); margin-top: 6px; margin-bottom: 20px; }
  #summary .grade-msg { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

  #submit-wrap {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
  }
  #submit-btn {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: #fff;
    border: none;
    border-radius: 99px;
    padding: 14px 36px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(108,92,231,.4);
    transition: transform .15s, box-shadow .15s;
    font-family: inherit;
  }
  #submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(108,92,231,.5); }

  #retry-btn {
    background: var(--neutral); color: #fff;
    border: none; border-radius: 99px;
    padding: 12px 32px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 12px;
  }

  #warn-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #warn-overlay.show { display: flex; }
  #warn-box {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
  }
  #warn-box .warn-icon { font-size: 40px; margin-bottom: 12px; }
  #warn-box h3 { font-size: 17px; margin-bottom: 8px; color: var(--wrong); }
  #warn-box p { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 16px; }
  #warn-close {
    background: var(--wrong); color: #fff;
    border: none; border-radius: 99px;
    padding: 10px 28px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }

  .attempt-info {
    text-align: center;
    font-size: 12px;
    color: var(--sub);
    padding: 8px 0 0;
  }
</style>

<script>
// 봄날 허브에서 전달된 학생 이름 자동 적용
(function(){
  var saved = sessionStorage.getItem('bn_name') || localStorage.getItem('bn_name');
  if(saved){
    window._hubStudentName = saved;
    // 이름 입력란이 있으면 자동 입력
    window.addEventListener('DOMContentLoaded', function(){
      var inputs = document.querySelectorAll('input#student-name, input#nameInput, .name-input');
      inputs.forEach(function(el){ if(!el.value) el.value = saved; });
    });
  }
})();
</script>

<div id="submit-wrap">

// ── SHUFFLE ───────────────────────────────────────────────────────────
let shuffledBlanks = {};

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initShuffles() {
  shuffledBlanks = {};
  QUESTIONS.forEach(q => {
    q.blanks.forEach((pair, bidx) => {
      const key = `q${q.num}_${bidx}`;
      shuffledBlanks[key] = shuffleArray(pair);
    });
  });
}

// ── STATE ─────────────────────────────────────────────────────────────
let userAnswers = {};
let submitted = false;
let warnCount = 0;
let attemptNum = 1;

function totalBlanks() {
  return QUESTIONS.reduce((n, q) => n + q.blanks.length, 0);
}
const TOTAL = totalBlanks();

// ── INIT ──────────────────────────────────────────────────────────────
function init() {
  try {
    const saved = localStorage.getItem('gounko_mock_attempt');
    if (saved) attemptNum = parseInt(saved) + 1;
    localStorage.setItem('gounko_mock_attempt', attemptNum);
  } catch(e) {}
  document.getElementById('attempt-display').textContent = `도전 횟수: ${attemptNum}회`;
  initShuffles();
  buildQuiz();
  updateProgress();
}

function buildQuiz() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'quiz-container';
  QUESTIONS.forEach(q => div.appendChild(makeCard(q)));
  area.appendChild(div);
}

function makeSentenceHTML(q) {
  let parts = q.sentence.split('[___]');
  let html = '';
  parts.forEach((part, i) => {
    html += `<span>${part}</span>`;
    if (i < q.blanks.length) {
      const key = `q${q.num}_${i}`;
      const pair = shuffledBlanks[key] || q.blanks[i];
      html += `<span class="blank-slot" data-qnum="${q.num}" data-bidx="${i}">`;
      pair.forEach(opt => {
        const safeOpt = opt.replace(/'/g, "\\'");
        html += `<button class="choice-btn" onclick="pick(this,${q.num},${i},'${safeOpt}')">${opt}</button>`;
      });
      html += `</span>`;
    }
  });
  return html;
}

function makeCard(q) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = `card_${q.num}`;
  card.innerHTML = `
    <div class="q-meta">
      <div class="q-num">${q.num}번</div>
      <div class="q-title">${q.title}</div>
    </div>
    <div class="q-sentence">${makeSentenceHTML(q)}</div>
    <div class="feedback" id="fb_${q.num}"></div>
  `;
  return card;
}

// ── PICK ──────────────────────────────────────────────────────────────
function pick(btn, qnum, bidx, val) {
  if (submitted) return;
  const key = `q${qnum}_${bidx}`;
  userAnswers[key] = val;

  const slot = btn.closest('.blank-slot');
  slot.querySelectorAll('.choice-btn').forEach(b => {
    b.style.borderColor = '';
    b.style.color = '';
    b.style.background = '';
  });
  btn.style.borderColor = 'var(--primary)';
  btn.style.color = 'var(--primary)';
  btn.style.background = '#f0eeff';

  updateProgress();
}

// ── PROGRESS ──────────────────────────────────────────────────────────
function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  const pct = (answered / TOTAL) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${answered} / ${TOTAL}`;
}

// ── SUBMIT ────────────────────────────────────────────────────────────
function submitQuiz() {
  if (submitted) return;
  const answered = Object.keys(userAnswers).length;
  if (answered < TOTAL) {
    showWarn(`아직 ${TOTAL - answered}개의 빈칸이 남아있어요.<br>모두 선택한 후 채점해주세요!`);
    return;
  }

  submitted = true;
  document.getElementById('submit-btn').style.display = 'none';

  let correct = 0;

  QUESTIONS.forEach(q => {
    let qCorrect = true;
    q.blanks.forEach((pair, bidx) => {
      const key = `q${q.num}_${bidx}`;
      const userVal = userAnswers[key];
      const correctVal = q.answers[bidx];
      const isCorrect = userVal === correctVal;
      if (!isCorrect) qCorrect = false;

      const slot = document.querySelector(`[data-qnum="${q.num}"][data-bidx="${bidx}"]`);
      if (slot) {
        slot.querySelectorAll('.choice-btn').forEach(b => {
          b.disabled = true;
          b.style.borderColor = '';
          b.style.color = '';
          b.style.background = '';
          if (b.textContent === userVal && isCorrect) b.classList.add('selected-correct');
          else if (b.textContent === userVal && !isCorrect) b.classList.add('selected-wrong');
          else if (b.textContent === correctVal && !isCorrect) b.classList.add('reveal-correct');
        });
      }
      if (isCorrect) correct++;
    });

    const card = document.getElementById(`card_${q.num}`);
    const fb = document.getElementById(`fb_${q.num}`);
    if (qCorrect) {
      card.classList.add('answered-correct');
      fb.className = 'feedback correct';
      fb.textContent = '✓ 모두 정답입니다!';
    } else {
      card.classList.add('answered-wrong');
      fb.className = 'feedback wrong';
      const wrongs = q.blanks.map((p, i) => {
        const k = `q${q.num}_${i}`;
        return userAnswers[k] !== q.answers[i]
          ? `(${i+1}) 정답: ${q.answers[i]}`
          : null;
      }).filter(Boolean);
      fb.textContent = '✗ 오답 | ' + wrongs.join('  /  ');
    }
  });

  const pct = Math.round((correct / TOTAL) * 100);
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-detail').textContent = `${correct} / ${TOTAL} 정답`;
  const msg = pct >= 90 ? '🌟 훌륭해요! 완벽에 가깝습니다!' :
              pct >= 70 ? '👍 잘했어요! 조금만 더 연습하면 완벽!' :
              pct >= 50 ? '🙂 절반 이상 맞았어요. 틀린 문항을 다시 확인해보세요.' :
                          '📚 틀린 문항을 꼼꼼히 복습해봐요!';
  document.getElementById('grade-msg').textContent = msg;
  document.getElementById('summary').style.display = 'block';
  document.getElementById('summary').scrollIntoView({behavior:'smooth'});
}

// ── RETRY ─────────────────────────────────────────────────────────────
function retryQuiz() {
  submitted = false;
  userAnswers = {};
  document.getElementById('submit-btn').style.display = '';
  document.getElementById('summary').style.display = 'none';
  initShuffles();
  buildQuiz();
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── WARN / CHEAT DETECT ───────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden && !submitted) {
    warnCount++;
    showWarn(`다른 탭으로 이동했습니다. (${warnCount}회)<br>성실하게 풀어주세요!`);
  }
});
document.addEventListener('copy', e => { if (!submitted) e.preventDefault(); });
document.addEventListener('contextmenu', e => { if (!submitted) e.preventDefault(); });

function showWarn(msg) {
  document.getElementById('warn-msg').innerHTML = msg;
  document.getElementById('warn-overlay').classList.add('show');
}
function closeWarn() {
  document.getElementById('warn-overlay').classList.remove('show');
}

init();
</script>
