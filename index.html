<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>봄날 English Quiz Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink: #1a2a3a; --soft: #5a7080; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f0f6fb; min-height: 100vh; color: var(--ink); overflow-x: hidden; }
header { background: linear-gradient(135deg, #d4edff 0%, #c8edd9 50%, #fde8d8 100%); padding: 60px 24px 48px; text-align: center; position: relative; overflow: hidden; }
header::before { content: ''; position: absolute; top: -60px; left: -60px; width: 220px; height: 220px; background: radial-gradient(circle, #fff8 40%, transparent 70%); border-radius: 50%; }
.logo { font-family: 'Black Han Sans', sans-serif; font-size: clamp(2rem, 6vw, 3.4rem); color: var(--ink); letter-spacing: -1px; }
.logo span { color: #3b9ed8; }
.flower { font-size: 1.6rem; margin: 0 6px; display: inline-block; animation: sway 3s ease-in-out infinite; }
@keyframes sway { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
.subtitle { font-family: 'Gowun Dodum', serif; font-size: 1.05rem; color: var(--soft); margin-top: 10px; letter-spacing: 1px; }
main { max-width: 960px; margin: 0 auto; padding: 48px 20px 80px; }
.section { margin-bottom: 44px; opacity: 0; transform: translateY(20px); animation: fadeUp 0.5s ease forwards; }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
.section-title { font-family: 'Black Han Sans', sans-serif; font-size: 1.15rem; color: var(--ink); margin-bottom: 16px; padding-left: 14px; border-left: 5px solid var(--ink); }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
.card { display: block; text-decoration: none; border-radius: 20px; padding: 22px 18px 20px; transition: transform 0.18s ease, box-shadow 0.18s ease; position: relative; overflow: hidden; cursor: pointer; }
.card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.35); transition: transform 0.3s ease; }
.card:hover::before { transform: scale(1.5); }
.card:hover { transform: translateY(-5px); box-shadow: 0 14px 32px rgba(0,0,0,0.13); }
.card:active { transform: translateY(-2px); }
.card-emoji { font-size: 1.8rem; margin-bottom: 10px; display: block; }
.card-title { font-family: 'Black Han Sans', sans-serif; font-size: 1rem; color: var(--ink); line-height: 1.4; }
.card-sub { font-size: 0.78rem; color: var(--soft); margin-top: 5px; font-family: 'Gowun Dodum', serif; }
.badge { display: inline-block; font-size: 0.68rem; background: var(--ink); color: #fff; border-radius: 30px; padding: 2px 10px; margin-top: 8px; }
.c-0 { background: #daf0ff; } .c-1 { background: #cef0dc; } .c-2 { background: #fde4cc; }
.c-3 { background: #e8deff; } .c-4 { background: #fdf5c0; } .c-5 { background: #ffd8d0; }
.c-6 { background: #c8f0ea; } .c-7 { background: #f0d8ff; }
footer { text-align: center; padding: 30px; color: #aabbc8; font-size: 0.82rem; font-family: 'Gowun Dodum', serif; }
@media (max-width: 480px) { .cards { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<header>
  <div class="logo"><span class="flower">🌸</span>봄날 <span>English</span> Quiz<span class="flower">✨</span></div>
  <p class="subtitle">시험을 선택하여 시작하세요</p>
</header>
<main id="main"></main>
<footer>🌸 봄날 English &nbsp;·&nbsp; 모든 시험은 새 탭에서 열립니다</footer>
<script>
const SECTIONS = [
  { title: '🏫 종촌중 1학년', items: [
      { file: 'jongchon_1grade_ch1', title: 'Chapter 1', sub: '종촌중 1학년', emoji: '📘' },
      { file: 'jongchon_1grade_ch2', title: 'Chapter 2', sub: '종촌중 1학년', emoji: '📗' },
      { file: 'jongchon_1grade_ch3', title: 'Chapter 3', sub: '종촌중 1학년', emoji: '📙' },
  ]},
  { title: '📚 비상 2학년', items: [
      { file: 'bisang_2grade_ch1', title: 'Chapter 1', sub: '비상 2학년', emoji: '📘' },
      { file: 'bisang_2grade_ch2', title: 'Chapter 2', sub: '비상 2학년', emoji: '📗' },
  ]},
  { title: '🎓 종촌중 3학년', items: [
      { file: 'jongchon_3grade_ch1', title: 'Chapter 1', sub: '종촌중 3학년', emoji: '📘' },
      { file: 'jongchon_3grade_ch2', title: 'Chapter 2', sub: '종촌중 3학년', emoji: '📗' },
  ]},
  { title: '🎓 어진중 3학년', items: [
      { file: 'eojin_3grade_ch1', title: 'Chapter 1', sub: '어진중 3학년', emoji: '📘' },
      { file: 'eojin_3grade_ch2', title: 'Chapter 2', sub: '어진중 3학년', emoji: '📗' },
  ]},
  { title: '🎓 고운중 3학년', items: [
      { file: 'goun_3grade_ch1', title: 'Chapter 1', sub: '고운중 3학년', emoji: '📘' },
      { file: 'goun_3grade_ch2', title: 'Chapter 2', sub: '고운중 3학년', emoji: '📗' },
  ]},
  { title: '🏛️ 종촌고 1학년', items: [
      { file: 'jongchonko_1grade_lesson1',          title: '교과서 1과',      sub: 'YBM 김은형 · 어법선택형',  emoji: '📘' },
      { file: 'jongchonko_1grade_lesson1_autograde', title: '1과 어법 자동채점', sub: 'YBM 김은형 · 기출 25문제', emoji: '✅', badge: 'NEW' },
      { file: 'jongchonko_1grade_lesson2',          title: '교과서 2과',      sub: 'YBM 김은형 · 어법선택형',  emoji: '📗' },
      { file: 'jongchonko_1grade_mock23', title: '23년 3월 모의', sub: '21·22·29번 선택+빈칸', emoji: '📝', badge: '2023' },
      { file: 'jongchonko_1grade_mock24', title: '24년 3월 모의', sub: '20·22·23·30·31·36번',  emoji: '📝', badge: '2024' },
      { file: 'jongchonko_1grade_mock25', title: '25년 3월 모의', sub: '21·30번 선택형',       emoji: '📝', badge: '2025' },
  ]},{ file: 'bomnalquizz_jongchon1_mc', title: '어휘 퀴즈 (4지선다)', sub: '교과서1·2과 + 수능기출 · 318개', emoji: '🔊', badge: '⏱10초' },{ file: 'jongchonko_1grade_mock25', title: '25년 3월 모의', sub: '21·30번 선택형', emoji: '📝', badge: '2025' },
{ file: 'bomnalquizz_jongchon1_mc', title: '어휘 퀴즈 (4지선다)', sub: '교과서1·2과 + 수능기출 · 318개', emoji: '🔊', badge: '⏱10초' },  // ← 이거 추가
  { title: '🏛️ 고운고 2학년', items: [
      { file: 'gounko_2grade_lesson1',    title: '교과서 1과',   sub: 'YBM 박준언 · 어법선택형', emoji: '📘' },
      { file: 'gounko_2grade_lesson2',    title: '교과서 2과',   sub: 'YBM 박준언 · 어법선택형', emoji: '📗' },
      { file: 'gounko_2grade_march_mock', title: '26년 3월 모의', sub: '21~24 · 29~40번 선택형', emoji: '📝', badge: '2026' },
  ]},
  { title: '⭐ 특별 시험', items: [
      { file: 'go2_march_test',    title: '고2 3월 모의고사',  sub: '모의고사 대비', emoji: '📝', badge: '모의고사' },
      { file: 'go2_march_grammar', title: '고2 3월 어법·어휘', sub: '21~24 · 29~40번', emoji: '✏️', badge: '본문선택' },
      { file: 'companion_test_v2', title: '2027 수능 동반의어', sub: '심화 학습', emoji: '🤝', badge: 'v2' },
  ]},
];
const BASE = 'https://bomnalenglish.github.io/bomnalquizz/';
const COLORS = ['c-0','c-1','c-2','c-3','c-4','c-5','c-6','c-7'];
let ci = 0;
const nextColor = () => COLORS[(ci++) % COLORS.length];
function render() {
  const main = document.getElementById('main');
  SECTIONS.filter(s => s.items.length > 0).forEach((sec, gi) => {
    const div = document.createElement('div');
    div.className = 'section';
    div.style.animationDelay = gi * 0.08 + 's';
    div.innerHTML = '<div class="section-title">' + sec.title + '</div>';
    const grid = document.createElement('div');
    grid.className = 'cards';
    sec.items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'card ' + nextColor();
      a.href = BASE + item.file + '.html';
      a.target = '_blank';
      a.innerHTML = '<span class="card-emoji">' + item.emoji + '</span><div class="card-title">' + item.title + '</div>' + (item.sub ? '<div class="card-sub">' + item.sub + '</div>' : '') + (item.badge ? '<span class="badge">' + item.badge + '</span>' : '');
      grid.appendChild(a);
    });
    div.appendChild(grid);
    main.appendChild(div);
  });
}
render();
</script>
</body>
</html>
