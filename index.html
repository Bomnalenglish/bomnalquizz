<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink: #2a2a2a; --soft: #7a7570; --bg: #f5efe6; --primary: #4a6741; --red: #c0392b; }
body { font-family: "Noto Sans KR", sans-serif; background: var(--bg); min-height: 100vh; color: var(--ink); overflow-x: hidden; }

header { background: linear-gradient(135deg, #f7efe4 0%, #f0e6d8 50%, #ece0d2 100%); padding: 52px 24px 40px; text-align: center; position: relative; overflow: hidden; }
header::before { content: ""; position: absolute; top: -60px; left: -60px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(255,255,255,.5) 40%, transparent 70%); border-radius: 50%; }
.logo-wrap { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
.logo-circle { width: 80px; height: 80px; border-radius: 50%; background: #f0ebe3; border: 2px solid #e0d8ce; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
.logo-img { width: 100%; height: 100%; object-fit: cover; }
.logo-text { font-family: "Black Han Sans", sans-serif; font-size: clamp(1.2rem, 4vw, 1.8rem); color: #5c3d1e; letter-spacing: -0.5px; text-align: left; }
.logo-text .hl { color: #7a4e28; }
.logo-sub { font-family: "Gowun Dodum", serif; font-size: .82rem; color: var(--soft); letter-spacing: 2px; margin-top: 2px; text-align: left; }
.subtitle { font-family: "Gowun Dodum", serif; font-size: .88rem; color: var(--soft); margin-top: 6px; letter-spacing: 1px; text-align: left; }
@media(max-width:480px){ .logo-wrap{flex-direction:column;text-align:center} .logo-text,.logo-sub,.subtitle{text-align:center} }

.screen { display: none; }
.screen.active { display: block; }
main { max-width: 960px; margin: 0 auto; padding: 36px 20px 80px; }

/* ── LOGIN / NAME / CODE SCREENS ── */
.auth-wrap { min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-card { background: #fdf8f2; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center; border: 1px solid #e8e3dd; }
.auth-card h2 { font-family: "Black Han Sans", sans-serif; font-size: 1.3rem; color: var(--ink); margin-bottom: 8px; }
.auth-card p { font-size: .85rem; color: var(--soft); margin-bottom: 24px; line-height: 1.7; font-family: "Gowun Dodum", serif; }
.auth-input { width: 100%; padding: 14px 18px; border: 2px solid #d0dde8; border-radius: 12px; font-size: 1rem; font-family: inherit; outline: none; text-align: center; margin-bottom: 12px; transition: border-color .2s; }
.auth-input:focus { border-color: #3d3d3d; }
.auth-input.err { border-color: var(--red); animation: shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.err-msg { color: var(--red); font-size: .8rem; margin-bottom: 10px; min-height: 1.2em; font-family: "Gowun Dodum", serif; }
.auth-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #3d3d3d; color: #fff; font-size: 1rem; font-weight: 800; cursor: pointer; font-family: inherit; transition: opacity .2s; letter-spacing: .5px; }
.auth-btn:hover { opacity: .88; }
.auth-back { background: none; border: none; color: var(--soft); font-size: .82rem; cursor: pointer; margin-top: 14px; font-family: inherit; text-decoration: underline; }
.school-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; text-align: left; }
.sp-btn { border-radius: 12px; padding: 12px 14px; border: 2px solid #d0dde8; background: white; cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; text-align: left; }
.sp-btn:hover { border-color: #888; background: #f5f2ee; }
.sp-btn.selected { border-color: #3d3d3d; background: #f0ede8; font-weight: 700; }
.sp-btn .sp-e { font-size: 1.4rem; display: block; margin-bottom: 4px; }
.sp-btn .sp-n { font-size: .82rem; font-weight: 700; color: var(--ink); }
.sp-btn .sp-s { font-size: .7rem; color: var(--soft); }

/* ── SCHOOL GRID ── */
.school-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 14px; }
.school-card { border-radius: 22px; padding: 28px 16px 22px; text-align: center; cursor: pointer; transition: transform .18s, box-shadow .18s; position: relative; overflow: hidden; border: none; font-family: inherit; width: 100%; }
.school-card::before { content: ""; position: absolute; top: -28px; right: -28px; width: 84px; height: 84px; border-radius: 50%; background: rgba(255,255,255,.38); transition: transform .3s; }
.school-card:hover::before { transform: scale(1.6); }
.school-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,.10); }
.school-card:active { transform: translateY(-2px); }
.s-emoji { font-size: 2.2rem; margin-bottom: 10px; display: block; }
.s-name { font-family: "Black Han Sans", sans-serif; font-size: 1rem; color: var(--ink); }
.s-sub { font-size: .73rem; color: var(--soft); margin-top: 4px; font-family: "Gowun Dodum", serif; }
.s-count { display: inline-block; font-size: .63rem; background: rgba(42,42,42,.6); color: #fff; border-radius: 30px; padding: 2px 10px; margin-top: 8px; letter-spacing: .3px; }
.sc-blue{background:#f2ede5}.sc-green{background:#ede8e0}.sc-yellow{background:#f0e9de}
.sc-purple{background:#ece5d8}.sc-pink{background:#f3ede4}.sc-orange{background:#ede7dc}

/* ── QUIZ LIST ── */
.back-btn { display: inline-flex; align-items: center; gap: 6px; background: white; border: 1.5px solid #d0dde8; border-radius: 10px; padding: 8px 16px; font-family: inherit; font-size: .84rem; color: var(--soft); cursor: pointer; margin-bottom: 22px; transition: border-color .15s, color .15s; }
.back-btn:hover { border-color: #3d3d3d; color: #3d3d3d; }
.school-banner { background: #fdf8f2; border-radius: 16px; padding: 18px 22px; margin-bottom: 26px; box-shadow: 0 2px 8px rgba(0,0,0,.05); display: flex; align-items: center; gap: 14px; border: 1px solid #e8e3dd; }
.banner-emoji { font-size: 2.4rem; }
.banner-name { font-family: "Black Han Sans", sans-serif; font-size: 1.25rem; color: var(--ink); }
.banner-sub { font-size: .78rem; color: var(--soft); margin-top: 3px; font-family: "Gowun Dodum", serif; }
.user-badge { background: #ede9e4; border-radius: 20px; padding: 3px 12px; font-size: .75rem; color: #5a5550; font-weight: 700; margin-left: 8px; }

.section { margin-bottom: 34px; opacity: 0; transform: translateY(14px); animation: fadeUp .4s ease forwards; }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
.section-title { font-family: "Black Han Sans", sans-serif; font-size: 1.05rem; color: var(--ink); margin-bottom: 12px; padding-left: 12px; border-left: 4px solid #a09890; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 12px; }
.card { display: block; text-decoration: none; border-radius: 18px; padding: 18px 15px 16px; transition: transform .18s, box-shadow .18s; position: relative; overflow: hidden; }
.card::before { content: ""; position: absolute; top: -26px; right: -26px; width: 76px; height: 76px; border-radius: 50%; background: rgba(255,255,255,.38); transition: transform .3s; }
.card:hover::before { transform: scale(1.6); }
.card:hover { transform: translateY(-4px); box-shadow: 0 12px 26px rgba(0,0,0,.12); }
.card-emoji { font-size: 1.65rem; margin-bottom: 8px; display: block; }
.card-title { font-family: "Black Han Sans", sans-serif; font-size: .93rem; color: var(--ink); line-height: 1.4; }
.card-sub { font-size: .72rem; color: var(--soft); margin-top: 4px; font-family: "Gowun Dodum", serif; }
.badge { display: inline-block; font-size: .63rem; background: #3d3d3d; color: #f0ede8; border-radius: 30px; padding: 2px 9px; margin-top: 6px; letter-spacing: .3px; }

.c-6{background:#eae6df}.c-7{background:#f0ebe2}

footer { text-align: center; padding: 28px; color: #aabbc8; font-size: .8rem; font-family: "Gowun Dodum", serif; }
@media(max-width:480px){ .school-grid{grid-template-columns:1fr 1fr} .cards{grid-template-columns:1fr 1fr} .school-picker{grid-template-columns:1fr 1fr} }
</style>

<div id="screen-code" class="screen">

<div id="screen-school" class="screen">

</div>

// ─── 화면 전환 ───
function goStep(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

// ─── STEP 1: 이름 입력 ───
function submitName() {
  const val = document.getElementById("nameInput").value.trim();
  if (!val) {
    const el = document.getElementById("nameInput");
    el.classList.add("err");
    document.getElementById("nameErr").textContent = "이름을 입력해주세요!";
    setTimeout(() => { el.classList.remove("err"); document.getElementById("nameErr").textContent = ""; }, 1500);
    return;
  }
  studentName = val;
  renderSchoolPicker();
  goStep("screen-pick");
}

// ─── STEP 2: 학교 선택 ───
function renderSchoolPicker() {
  const picker = document.getElementById("school-picker");
  picker.innerHTML = "";
  selectedSchoolId = null;
  SCHOOL_LIST.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "sp-btn";
    btn.dataset.id = s.id;
    btn.innerHTML = `<div class="sp-n">${s.name}</div>`;
    btn.onclick = () => {
      document.querySelectorAll(".sp-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedSchoolId = s.id;
      document.getElementById("pickErr").textContent = "";
    };
    picker.appendChild(btn);
  });
}

function submitSchool() {
  if (!selectedSchoolId) {
    document.getElementById("pickErr").textContent = "학교를 선택해주세요!";
    return;
  }
  const s = SCHOOL_LIST.find(x => x.id === selectedSchoolId);
  studentSchool = s ? s.name : selectedSchoolId;
  document.getElementById("code-hint").innerHTML =
    `<strong>${studentName}</strong> 학생, 선생님께 받은<br>입장 코드를 입력해주세요.`;
  document.getElementById("codeInput").value = "";
  document.getElementById("codeErr").textContent = "";
  goStep("screen-code");
}

// ─── STEP 3: 코드 입력 ───
function submitCode() {
  const val = document.getElementById("codeInput").value.trim();
  const errEl = document.getElementById("codeErr");
  const inp = document.getElementById("codeInput");
  if (val !== ACCESS_CODE) {
    inp.classList.add("err");
    errEl.textContent = "입장 코드가 틀렸습니다. 선생님께 확인해주세요.";
    inp.value = "";
    setTimeout(() => { inp.classList.remove("err"); }, 1000);
    // 실패 로그
    if (window._logAccess) window._logAccess({
      type: "code_fail",
      name: studentName,
      school: studentSchool,
      attempt: val
    });
    return;
  }
  // 성공 — 세션 저장
  sessionStorage.setItem("bn_name", studentName);
  sessionStorage.setItem("bn_school", studentSchool);
  sessionStorage.setItem("bn_auth", "1");
  // 접속 로그
  if (window._logAccess) window._logAccess({
    type: "login",
    name: studentName,
    school: studentSchool
  });
  openHub();
}

// ─── 허브 열기 ───
function openHub() {
  renderSchoolGrid();
  document.getElementById("home-user-badge").textContent = `👤 ${studentName} (${studentSchool})`;
  document.getElementById("subtitle").textContent = "학교를 선택하세요";
  goStep("screen-home");
}

function renderSchoolGrid() {
  ci = 0;
  const grid = document.getElementById("school-grid");
  grid.innerHTML = "";
  SCHOOLS.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "school-card " + s.color;
    btn.innerHTML =
      `<span class="s-emoji">${s.emoji}</span>` +
      `<div class="s-name">${s.name}</div>` +
      `<div class="s-sub">${s.sub}</div>` +
      `<span class="s-count">${s.count}</span>`;
    btn.onclick = () => openSchool(s);
    grid.appendChild(btn);
  });
}

function openSchool(s) {
  ci = 0;
  document.getElementById("banner-emoji").textContent = s.emoji;
  document.getElementById("banner-name").textContent  = s.name;
  document.getElementById("banner-sub").textContent   = s.count;
  document.getElementById("banner-user").textContent  = `👤 ${studentName}`;
  document.getElementById("subtitle").textContent     = s.name + " 퀴즈 목록";

  // 학교 입장 로그
  if (window._logAccess) window._logAccess({
    type: "school_enter",
    name: studentName,
    school: studentSchool,
    targetSchool: s.name
  });

  const container = document.getElementById("quiz-sections");
  container.innerHTML = "";
  s.sections.forEach((sec, gi) => {
    const div = document.createElement("div");
    div.className = "section";
    div.style.animationDelay = gi * 0.07 + "s";
    div.innerHTML = `<div class="section-title">${sec.title}</div>`;
    const grid = document.createElement("div");
    grid.className = "cards";
    sec.items.forEach(item => {
      const a = document.createElement("a");
      a.className = "card " + nc();
      a.href = BASE + item.file + ".html";
      a.target = "_blank";
      a.rel = "noopener";
      a.innerHTML =
        `<span class="card-emoji">${item.emoji}</span>` +
        `<div class="card-title">${item.title}</div>` +
        (item.sub   ? `<div class="card-sub">${item.sub}</div>` : "") +
        (item.badge ? `<span class="badge">${item.badge}</span>` : "");
      // 퀴즈 클릭 로그
      a.addEventListener("click", () => {
        if (window._logAccess) window._logAccess({
          type: "quiz_click",
          name: studentName,
          school: studentSchool,
          quiz: item.title,
          file: item.file
        });
      });
      grid.appendChild(a);
    });
    div.appendChild(grid);
    container.appendChild(div);
  });

  goStep("screen-school");
}

function doLogout() {
  sessionStorage.removeItem("bn_name");
  sessionStorage.removeItem("bn_school");
  sessionStorage.removeItem("bn_auth");
  studentName = "";
  studentSchool = "";
  document.getElementById("nameInput").value = "";
  document.getElementById("subtitle").textContent = "봄날 영어 학원 전용 퀴즈";
  goStep("screen-name");
}

// ─── 자동 로그인 (세션 유지) ───
window.addEventListener("load", () => {
  const auth = sessionStorage.getItem("bn_auth");
  const name = sessionStorage.getItem("bn_name");
  const school = sessionStorage.getItem("bn_school");
  if (auth === "1" && name) {
    studentName = name;
    studentSchool = school || "";
    openHub();
  }
});
</script>
