<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>봄날 퀴즈 | 고운중 3학년 3과 단어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:linear-gradient(135deg,#e3f2fd,#bbdefb);min-height:100vh;padding:14px;color:#333;}
.wrap{max-width:640px;margin:0 auto;}
.hdr{background:linear-gradient(135deg,#1565c0,#1976d2);color:white;padding:18px;border-radius:14px;text-align:center;margin-bottom:16px;box-shadow:0 4px 12px rgba(21,101,192,.3);}
.hdr h1{font-size:1.3rem;font-weight:900;}
.hdr .sub{font-size:.85rem;opacity:.95;margin-top:4px;}
.card{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:14px;}
.card h2{font-size:1.05rem;font-weight:900;color:#1565c0;margin-bottom:12px;}
.ni{width:100%;padding:11px 14px;font-size:.95rem;border:2px solid #90caf9;border-radius:10px;margin-bottom:10px;font-family:inherit;}
.ni:focus{outline:none;border-color:#1565c0;}
.btn{display:inline-block;width:100%;padding:13px;font-size:1rem;font-weight:800;background:linear-gradient(135deg,#1565c0,#1976d2);color:white;border:none;border-radius:10px;cursor:pointer;font-family:inherit;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn:hover:not(:disabled){filter:brightness(1.05);}
.hud{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;font-weight:700;color:#666;margin-bottom:10px;}
.hud .name{color:#1565c0;font-weight:800;}
.pb{height:8px;background:#fff;border-radius:4px;overflow:hidden;margin-bottom:14px;border:1px solid #90caf9;}
.pf{height:100%;background:linear-gradient(90deg,#1565c0,#1976d2);transition:width .3s;width:0%;}
.word-box{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border:3px solid #1565c0;border-radius:14px;padding:24px 16px;text-align:center;margin-bottom:14px;}
.word{font-size:1.8rem;font-weight:900;color:#0d47a1;letter-spacing:.5px;font-family:'Black Han Sans',sans-serif;}
.prompt{font-size:.95rem;font-weight:800;color:#666;text-align:center;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{background:#fff;border:2px solid #bbdefb;border-radius:10px;padding:13px 15px;font-size:1rem;font-weight:700;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:11px;transition:all .15s;color:#333;}
.opt:hover:not(:disabled){background:#e3f2fd;border-color:#64b5f6;}
.opt:disabled{cursor:not-allowed;}
.opt .cn{width:24px;height:24px;border-radius:50%;background:#64b5f6;color:white;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0;}
.opt.correct{background:#e8f5e9;border-color:#43a047;color:#1b5e20;}
.opt.correct .cn{background:#43a047;}
.opt.wrong{background:#ffebee;border-color:#e53935;color:#b71c1c;}
.opt.wrong .cn{background:#e53935;}
.opt.reveal{background:#e8f5e9;border-color:#43a047;color:#1b5e20;}
.fb{margin-top:12px;padding:10px;border-radius:8px;font-weight:800;text-align:center;font-size:.95rem;display:none;}
.fb.show{display:block;}
.fb.ok{background:#e8f5e9;color:#1b5e20;}
.fb.no{background:#ffebee;color:#b71c1c;}
.hidden{display:none;}
.rs-score{font-size:3rem;font-weight:900;color:#1565c0;text-align:center;margin:10px 0;font-family:'Black Han Sans',sans-serif;}
.rs-sub{text-align:center;color:#666;font-size:.9rem;margin-bottom:14px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat{background:#e3f2fd;border-radius:10px;padding:12px;text-align:center;}
.stat-n{font-size:1.4rem;font-weight:900;}
.stat-l{font-size:.75rem;color:#666;margin-top:2px;}
.ans-list{margin-top:14px;}
.ans-list h3{font-size:.95rem;color:#1565c0;margin-bottom:8px;}
.ans-item{background:#fafafa;border-left:4px solid #ccc;padding:10px 12px;margin-bottom:6px;border-radius:0 8px 8px 0;font-size:.85rem;}
.ans-item.ok{border-left-color:#43a047;}
.ans-item.no{border-left-color:#e53935;}
.ans-item .en{font-weight:800;color:#0d47a1;}
.ans-item .ko-correct{color:#1b5e20;font-weight:700;}
.ans-item .ko-my{color:#b71c1c;text-decoration:line-through;font-size:.78rem;margin-left:4px;}
.ans-item .badge{display:inline-block;padding:1px 7px;border-radius:5px;font-size:.7rem;font-weight:800;color:white;margin-right:5px;}
.ans-item.ok .badge{background:#43a047;}
.ans-item.no .badge{background:#e53935;}
.btn-row{display:flex;gap:8px;margin-top:14px;}
.btn-row .btn{flex:1;}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr"><h1>💙 고운중 3학년 3과 단어</h1><div class="sub">천재(정사열) 1학기 기말 · 영어 → 한국어 5지선다</div></div>

<div id="loginScreen" class="card">
  <h2>📚 학생 정보</h2>
  <select class="ni" id="schoolSel">
    <option value="">학교 선택</option>
    <option>고운중1</option><option>고운중2</option><option>고운중3</option>
    <option>기타</option>
  </select>
  <input type="text" class="ni" id="nameInput" placeholder="이름을 입력하세요" maxlength="10">
  <button class="btn" onclick="startQuiz()">시작하기 →</button>
</div>

<div id="quizScreen" class="card hidden">
  <div class="hud">
    <span class="name" id="hudName"></span>
    <span id="hudNo">1/0</span>
  </div>
  <div class="pb"><div class="pf" id="pf"></div></div>
  <div class="word-box"><div class="word" id="wordEn"></div></div>
  <div class="prompt">📖 알맞은 뜻을 고르세요</div>
  <div class="opts" id="opts"></div>
  <div class="fb" id="fb"></div>
</div>

<div id="resultScreen" class="card hidden">
  <h2 style="text-align:center;">🎉 결과</h2>
  <div class="rs-score" id="rsScore"></div>
  <div class="rs-sub" id="rsSub"></div>
  <div class="stats">
    <div class="stat"><div class="stat-n" style="color:#43a047;" id="rsOk"></div><div class="stat-l">정답</div></div>
    <div class="stat"><div class="stat-n" style="color:#e53935;" id="rsNo"></div><div class="stat-l">오답</div></div>
    <div class="stat"><div class="stat-n" style="color:#1976d2;" id="rsTotal"></div><div class="stat-l">총문제</div></div>
  </div>
  <div class="ans-list">
    <h3>📋 전체 정답 확인</h3>
    <div id="ansList"></div>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="location.reload()">🔄 다시 풀기</button>
  </div>
</div>
</div>

<script>
const VOCAB = [{en:"practice",ko:"연습하다; 연습"},{en:"actually",ko:"실제로, 사실은"},{en:"race",ko:"경주, 달리기"},{en:"sports day",ko:"체육 대회"},{en:"perform",ko:"공연하다"},{en:"stage",ko:"무대"},{en:"field trip",ko:"현장 학습, 수학여행"},{en:"talent show",ko:"장기 자랑"},{en:"like",ko:"~처럼, ~대로; 좋아하다"},{en:"joke",ko:"농담"},{en:"sure",ko:"확신하는"},{en:"worry",ko:"걱정하다"},{en:"finger",ko:"손가락"},{en:"part",ko:"부분"},{en:"act",ko:"연기, 행동; 행동하다, 연기하다"},{en:"guess",ko:"알아맞히다, 추측하다"},{en:"happen",ko:"발생하다, 일어나다"},{en:"backward",ko:"뒤쪽에[으로], 뒤를 향해"},{en:"while",ko:"~하면서, ~하는 동안"},{en:"carry",ko:"운반하다, 가지고 가다"},{en:"research",ko:"연구, 조사"},{en:"topic",ko:"주제"},{en:"project",ko:"프로젝트, 과제"},{en:"enough",ko:"충분히; 충분한"},{en:"Nobel Prize",ko:"노벨상"},{en:"Ig Nobel Prize",ko:"이그노벨상"},{en:"prize",ko:"상"},{en:"fun",ko:"재미있는"},{en:"discovery",ko:"발견"},{en:"laugh",ko:"웃다"},{en:"think",ko:"생각하다"},{en:"magazine",ko:"잡지"},{en:"increase",ko:"증가시키다, 늘리다"},{en:"interest",ko:"흥미; 흥미를 갖게 하다"},{en:"science",ko:"과학"},{en:"unusual",ko:"특이한, 색다른"},{en:"imaginative",ko:"창의적인, 상상력이 풍부한"},{en:"real",ko:"진짜의"},{en:"winner",ko:"수상자"},{en:"theater",ko:"극장"},{en:"university",ko:"대학교"},{en:"room",ko:"방, -실"},{en:"eager",ko:"열렬한, 간절히 바라는"},{en:"cheer",ko:"환호하다, 격려하다"},{en:"brave",ko:"용감한"},{en:"scientist",ko:"과학자"},{en:"laughable",ko:"웃기는, 터무니없는"},{en:"navy",ko:"해군"},{en:"peace",ko:"평화"},{en:"sailor",ko:"선원"},{en:"shout",ko:"소리치다"},{en:"bomb",ko:"폭탄"},{en:"funny",ko:"우스운, 웃긴"},{en:"succeed",ko:"성공하다"},{en:"float",ko:"띄우다"},{en:"live",ko:"살아있는; 살다"},{en:"frog",ko:"개구리"},{en:"air",ko:"공기, 공중"},{en:"magnet",ko:"자석"},{en:"experience",ko:"경험; 경험하다"},{en:"sense",ko:"감각"},{en:"humor",ko:"유머, 익살"},{en:"accept",ko:"받아들이다"},{en:"bring",ko:"가지고 오다"},{en:"smile",ko:"미소; 미소 짓다"},{en:"economics",ko:"경제학"},{en:"invent",ko:"발명하다"},{en:"until",ko:"~할 때까지"},{en:"sleeper",ko:"잠을 자는 사람"},{en:"study",ko:"연구, 공부; 공부하다"},{en:"ceremony",ko:"의식, 식"},{en:"interesting",ko:"흥미로운, 재미있는"},{en:"bored",ko:"지루해하는"},{en:"speech",ko:"연설, 담화"},{en:"word",ko:"단어, (말, 글의) 마디"},{en:"Miss",ko:"-양(孃), -씨"},{en:"repeatedly",ko:"반복적으로"},{en:"receive",ko:"받다"},{en:"trillion",ko:"1조"},{en:"Zimbabwean",ko:"짐바브웨의"},{en:"worth",ko:"~의 가치가 있는"},{en:"throw",ko:"던지다"},{en:"paper plane",ko:"종이비행기"},{en:"tradition",ko:"전통"},{en:"end",ko:"끝; 끝나다"},{en:"luck",ko:"운"},{en:"money",ko:"돈"},{en:"can't wait for",ko:"~을 몹시 기다리다"},{en:"a few",ko:"(셀 수 있는 명사 앞에서) 몇몇의"},{en:"make a mistake",ko:"실수하다"},{en:"take part in",ko:"~에 참여하다"},{en:"do one's best",ko:"최선을 다하다"},{en:"look forward to",ko:"~을 기대하다"},{en:"laugh out loud",ko:"큰 소리로 웃다"},{en:"be filled with",ko:"~으로 가득 차다"},{en:"be eager to",ko:"~을 열렬히 하고 싶어 하다"},{en:"instead of",ko:"~ 대신에"},{en:"run away",ko:"도망가다"},{en:"get out of",ko:"~에서 떠나다, 나가다"},{en:"not only ~ but also …",ko:"~ 뿐만 아니라 …도"},{en:"a number of",ko:"얼마간의, 다수의"},{en:"keep ~ from …",ko:"~가 …하지 못하게 하다"},{en:"less than",ko:"~보다 적은"}];
let userName='', userSchool='';
let qs=[], idx=0, cor=0, wrn=0, answered=false;
const results=[];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz(){
  userSchool=document.getElementById('schoolSel').value;
  userName=document.getElementById('nameInput').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  qs = shuffle(VOCAB).map(w=>{
    const dist = shuffle(VOCAB.filter(o=>o.ko!==w.ko)).slice(0,4);
    const opts = shuffle([w.ko, ...dist.map(d=>d.ko)]);
    return {en:w.en, ko:w.ko, opts:opts};
  });
  idx=0; cor=0; wrn=0; results.length=0; answered=false;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('hudName').textContent = userSchool+' · '+userName;
  showQ();
}

function escHTML(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showQ(){
  if(idx>=qs.length){ showResult(); return; }
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hudNo').textContent=(idx+1)+'/'+qs.length;
  document.getElementById('wordEn').textContent=q.en;
  const oc=document.getElementById('opts');
  oc.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="cn">'+(i+1)+'</span><span>'+escHTML(opt)+'</span>';
    b.addEventListener('click',()=>selOpt(b, opt, q.ko));
    oc.appendChild(b);
  });
  const fb=document.getElementById('fb');
  fb.classList.remove('show','ok','no');
  fb.textContent='';
}

function selOpt(btn, sel, ans){
  if(answered) return;
  answered=true;
  const buttons=document.querySelectorAll('.opt');
  buttons.forEach(b=>b.disabled=true);
  const q=qs[idx];
  const isCorrect = String(sel).trim() === String(ans).trim();
  const fb=document.getElementById('fb');
  if(isCorrect){
    btn.classList.add('correct');
    fb.className='fb show ok';
    fb.textContent='✅ 정답!';
    cor++;
    results.push({en:q.en, ko:ans, my:sel, correct:true});
  } else {
    btn.classList.add('wrong');
    buttons.forEach(b=>{
      const txt=b.querySelector('span:last-child');
      if(txt && txt.textContent.trim()===String(ans).trim()) b.classList.add('reveal');
    });
    fb.className='fb show no';
    fb.innerHTML='❌ 정답: <strong>'+escHTML(ans)+'</strong>';
    wrn++;
    results.push({en:q.en, ko:ans, my:sel, correct:false});
  }
  setTimeout(()=>{ idx++; showQ(); }, isCorrect?700:1500);
}

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const total=qs.length;
  const pct=total>0?Math.round(cor/total*100):0;
  document.getElementById('rsScore').textContent=pct+'점';
  document.getElementById('rsSub').textContent=userSchool+' · '+userName;
  document.getElementById('rsOk').textContent=cor;
  document.getElementById('rsNo').textContent=wrn;
  document.getElementById('rsTotal').textContent=total;
  const list=document.getElementById('ansList');
  list.innerHTML = results.map(r=>{
    const cls = r.correct?'ok':'no';
    const badge = r.correct?'O':'X';
    const myPart = r.correct?'':' <span class="ko-my">내 답: '+escHTML(r.my)+'</span>';
    return '<div class="ans-item '+cls+'"><span class="badge">'+badge+'</span><span class="en">'+escHTML(r.en)+'</span> → <span class="ko-correct">'+escHTML(r.ko)+'</span>'+myPart+'</div>';
  }).join('');
}
</script>
</body>
</html>
