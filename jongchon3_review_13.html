<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>13강 Review | 봄날 English</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f0e8;--surface:#fdfaf4;--border:#d8d0bc;--ink:#2d2a22;--soft:#7a7060;--dim:#b0a890;--accent:#4a7cf0;--green:#2a9d6f;--red:#d95f5f;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);}

/* HEADER */
.site-header{border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:14px;background:var(--surface);position:sticky;top:0;z-index:100;}
.logo{font-family:"Space Mono",monospace;font-size:13px;color:var(--accent);letter-spacing:2px;}
.subtitle{font-size:11px;color:var(--soft);}
.back-link{margin-left:auto;padding:6px 14px;border-radius:20px;font-size:12px;font-family:"Space Mono",monospace;border:1px solid var(--border);background:transparent;color:var(--soft);text-decoration:none;transition:all .2s;}
.back-link:hover{border-color:var(--accent);color:var(--accent);}

/* MAIN */
.wrap{max-width:720px;margin:0 auto;padding:48px 24px 80px;}

/* LESSON BANNER */
.lesson-banner{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 28px 22px;margin-bottom:36px;text-align:center;}
.lesson-tag{font-family:"Space Mono",monospace;font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.lesson-title{font-family:"Black Han Sans",sans-serif;font-size:1.8rem;color:var(--ink);margin-bottom:6px;}
.lesson-sub{font-size:13px;color:var(--soft);font-family:"Gowun Dodum",serif;line-height:1.7;}

/* GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}

/* CARD */
.lesson-card{display:block;text-decoration:none;border-radius:16px;padding:24px 18px 20px;transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden;cursor:pointer;border:none;font-family:inherit;width:100%;text-align:left;}
.lesson-card::before{content:"";position:absolute;top:-22px;right:-22px;width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.4);transition:transform .3s;}
.lesson-card:hover::before{transform:scale(1.7);}
.lesson-card:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,.12);}
.lesson-card:active{transform:translateY(-2px);}
.lesson-card.coming{opacity:.42;cursor:not-allowed;pointer-events:none;filter:grayscale(.4);}
.card-icon{font-size:2rem;margin-bottom:10px;display:block;}
.card-name{font-family:"Black Han Sans",sans-serif;font-size:1.05rem;color:var(--ink);margin-bottom:4px;}
.card-desc{font-size:.75rem;color:var(--soft);font-family:"Gowun Dodum",serif;line-height:1.6;}
.card-badge{display:inline-block;font-size:.62rem;border-radius:20px;padding:2px 10px;margin-top:8px;letter-spacing:.3px;}
.badge-ready{background:#2d2a22;color:#f5f0e8;}
.badge-coming{background:#d8d0bc;color:#7a7060;}

/* COLORS */
.c-gw{background:#e8f0fe;}
.c-1{background:#f2ede5;}
.c-2{background:#ede8e0;}
.c-3{background:#f0e9de;}
.c-4{background:#ece5d8;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.cards-grid{animation:fadeUp .35s ease;}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="logo">Reading Lab</div>
    <div class="subtitle">2027 EBS 수능특강 영어 · 13강</div>
  </div>
  <a class="back-link" href="javascript:history.back()">← 뒤로</a>
</header>

<div class="wrap">
  <div class="lesson-banner">
    <div class="lesson-tag">2027 EBS 수능특강 · Lesson 13</div>
    <div class="lesson-title">13강 Review</div>
    <div class="lesson-sub">학습할 파트를 선택하세요.<br>Gateway → 지문 순서대로 풀면 더 효과적이에요!</div>
  </div>

  <div class="cards-grid">

    <!-- Gateway -->
    <div class="lesson-card c-gw coming">
      <span class="card-icon">🚪</span>
      <div class="card-name">Gateway</div>
      <div class="card-desc">13강 입문<br>핵심 개념 정리</div>
      <span class="card-badge badge-coming">준비중</span>
    </div>

    <!-- 13-1 -->
    <a class="lesson-card c-1" href="jongchon3_review_13_1.html" target="_blank" rel="noopener">
      <span class="card-icon">📖</span>
      <div class="card-name">13 - 1</div>
      <div class="card-desc">Deep Work<br>vs Shallow Work</div>
      <span class="card-badge badge-ready">학습 가능</span>
    </a>

    <!-- 13-2 -->
    <a class="lesson-card c-2" href="jongchon3_review_13_2.html" target="_blank" rel="noopener">
      <span class="card-icon">📖</span>
      <div class="card-name">13 - 2</div>
      <div class="card-desc">Symbols &amp;<br>Subjective Reality</div>
      <span class="card-badge badge-ready">학습 가능</span>
    </a>

    <!-- 13-3 -->
    <div class="lesson-card c-3 coming">
      <span class="card-icon">📖</span>
      <div class="card-name">13 - 3</div>
      <div class="card-desc">준비중</div>
      <span class="card-badge badge-coming">준비중</span>
    </div>

    <!-- 13-4 -->
    <div class="lesson-card c-4 coming">
      <span class="card-icon">📖</span>
      <div class="card-name">13 - 4</div>
      <div class="card-desc">준비중</div>
      <span class="card-badge badge-coming">준비중</span>
    </div>

  </div>
</div>

</body>
</html>
