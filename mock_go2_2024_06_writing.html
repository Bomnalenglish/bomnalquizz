  {
    id:"34-1", passageNo:34, topic:"금융 시장 — 요약문 빈칸",

  {
    id:"39-2", passageNo:39, topic:"산업혁명과 자동화 — 영영풀이 단어",
    passage:`Imagine that seven out of ten working Americans got fired tomorrow. What would they all do? It's hard to believe you'd have an economy at all if you gave pink slips to more than half the labor force. But that is what the industrial revolution did to the workforce of the early 19th century. Two hundred years ago, 70 percent of American workers lived on the farm. Today automation has eliminated all but 1 percent of their jobs, replacing them with machines. But the displaced workers did not sit idle. Instead, automation created hundreds of millions of jobs in entirely new fields. Those who once farmed were now manning the factories that manufactured farm equipment, cars, and other industrial products. Since then, wave upon wave of new occupations have arrived — appliance repair person, food chemist, photographer, web designer — each building on previous automation. Today, the vast majority of us are doing jobs that no farmer from the 1800s could have imagined.`,

  // ── 41~42번 ─────────────────────────────────────────
  {
    id:"41-1", passageNo:41, topic:"확증 편향 — 제목 완성",
    passage:`We have biases that support our biases! If we're partial to one option — perhaps because it's more memorable, or framed to minimize loss, or seemingly consistent with a promising pattern — we tend to search for information that will justify choosing that option. On the one hand, it's sensible to make choices that we can defend with data and a list of reasons. On the other hand, if we're not careful, we're likely to conduct an imbalanced analysis, falling prey to a cluster of errors collectively known as "confirmation biases." For example, nearly all companies include classic "tell me about yourself" job interviews as part of the hiring process, and many rely on these interviews alone to evaluate applicants. But it turns out that traditional interviews are actually one of the least useful tools for predicting an employee's future success. This is because interviewers often subconsciously make up their minds about interviewees based on their first few moments of interaction and spend the rest of the interview cherry-picking evidence and phrasing their questions to confirm that initial impression. More structured approaches, like obtaining samples of a candidate's work or asking how he would respond to difficult hypothetical situations, are dramatically better at assessing future success, with a nearly threefold advantage over traditional interviews.`,
    qtype:"영작",
    question:`보기의 단어를 이용하여 글의 제목을 완성하시오.\n\n제목: "Confirmation Biases: _____________"`,
    condition:`[조건] ① 보기의 단어를 모두 포함하여 영작\n[보기] have / for / decided / for / already / we / justifications / searching / what`,
    ans:`Searching for Justifications for What We Have Already Decided`,
    exp:`'우리가 이미 결정한 것에 대한 정당성을 찾는 것' — 확증 편향의 핵심. have → Have (완료 시제).`
  },
];

// 지문 그루핑
const PASSAGES=[], pMap={};
QLISTS.forEach(q=>{
  if(!pMap[q.passageNo]){
    pMap[q.passageNo]={no:q.passageNo,topic:q.topic.split(' — ')[0].trim(),qs:[]};
    PASSAGES.push(pMap[q.passageNo]);
  }
  pMap[q.passageNo].qs.push(q);
});
PASSAGES.sort((a,b)=>a.no-b.no);

// 상태
let selected=new Set(), doneSet=new Set();
let qs=[], idx=0, cor=0, wrn=0, half=0, answered=false, t0=0, wrongQs=[];

function goSel(){
  document.getElementById('startScreen').classList.add('hidden');
  renderGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function renderGrid(){
  const g=document.getElementById('passageGrid');g.innerHTML='';
  PASSAGES.forEach(p=>{
    const no=p.no,cnt=p.qs.length;
    const d=document.createElement('div');
    d.className='p-card'+(selected.has(no)?' sel':'')+(doneSet.has(no)?' done':'');
    d.onclick=()=>{selected.has(no)?selected.delete(no):selected.add(no);d.classList.toggle('sel',selected.has(no));};
    d.innerHTML=`<div class="p-no">${no}번</div><div class="p-topic">${p.topic}</div><div class="p-qcount">${cnt}문제</div>`
      +(doneSet.has(no)?'<span class="p-badge" style="background:#e8f5e9;color:#2e7d32;">완료✓</span>':'')
      +(selected.has(no)&&!doneSet.has(no)?'<span class="p-badge" style="background:#fff3e0;color:#e65100;">선택</span>':'');
    g.appendChild(d);
  });
}

function selAll(){
  const all=PASSAGES.every(p=>selected.has(p.no));
  PASSAGES.forEach(p=>{if(all)selected.delete(p.no);else selected.add(p.no);});
  renderGrid();
}

function startQuiz(){
  if(selected.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  qs=[];
  PASSAGES.filter(p=>selected.has(p.no)).forEach(p=>p.qs.forEach(q=>qs.push(q)));
  idx=0;cor=0;wrn=0;half=0;answered=false;t0=Date.now();wrongQs=[];
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=selected.size+'개 지문 · '+qs.length+'문제';
  showQ();
}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');

  const qTypeBadge = q.qtype==='단어찾기'?'단어 찾기':q.qtype==='서술'?'우리말 서술':'영작';

  area.innerHTML=`<div class="qc">
    <div class="q-no-badge">
      <span class="qno">${q.passageNo}번</span>
      <span class="qtype-tag">${qTypeBadge}</span>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--pri);margin-bottom:8px;">📄 지문 (${q.topic})</div>
    <div class="passage-box">${q.passage.replace(/\n/g,'<br>')}</div>
    <div style="font-size:13px;font-weight:800;color:#1a1a2e;margin-bottom:10px;line-height:1.7;">${q.question.replace(/\n/g,'<br>')}</div>
    <div class="condition-box">${q.condition.replace(/\n/g,'<br>')}</div>
    <textarea class="answer-area" id="myAnswer" placeholder="여기에 답을 입력하세요..." rows="3"></textarea>
    <button class="check-btn" id="checkBtn" onclick="checkAnswer()">✅ 정답 확인하기</button>
    <div class="ans-reveal" id="ansReveal">
      <div class="ans-label">📌 모범 정답</div>
      <div class="ans-text" id="ansText"></div>
      <div class="exp-text" id="expText"></div>
      <div class="self-grade">
        <button class="sg-btn sg-ok" id="sg-ok" onclick="grade('ok')">⭕ 맞았어요</button>
        <button class="sg-btn sg-half" id="sg-half" onclick="grade('half')">△ 부분 정답</button>
        <button class="sg-btn sg-ng" id="sg-ng" onclick="grade('ng')">❌ 틀렸어요</button>
      </div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="goNext()">다음 문제 →</button>
  </div>`;
}

function checkAnswer(){
  if(answered)return;
  const q=qs[idx];
  const ta=document.getElementById('myAnswer');
  ta.classList.add('submitted');
  ta.readOnly=true;
  document.getElementById('checkBtn').disabled=true;
  document.getElementById('ansText').innerHTML=q.ans.replace(/\n/g,'<br>');
  document.getElementById('expText').textContent='💡 '+q.exp;
  document.getElementById('ansReveal').classList.add('show');
  answered=true;
}

function grade(result){
  const q=qs[idx];
  document.querySelectorAll('.sg-btn').forEach(b=>{b.disabled=true;b.classList.remove('active');});
  document.getElementById('sg-'+result).classList.add('active');
  if(result==='ok'){cor++;} 
  else if(result==='half'){half++;}
  else{wrn++;wrongQs.push(q);saveWrongsToLS([{...q,savedAt:new Date().toLocaleDateString('ko-KR')}]);}
  document.getElementById('nextBtn').style.display='block';
}

function goNext(){idx++;showQ();}

// ── localStorage ───────────────────────────────────────
const LS_KEY='bomnal_writing_wrongs';
function loadStoredWrongs(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return[];}}
function saveWrongsToLS(newWrongs){
  const stored=loadStoredWrongs();
  newWrongs.forEach(w=>{const i=stored.findIndex(s=>s.id===w.id);if(i>=0)stored[i]=w;else stored.push(w);});
  localStorage.setItem(LS_KEY,JSON.stringify(stored));
}
function clearStoredWrongs(){localStorage.removeItem(LS_KEY);renderWrongNote();}

// ── 결과 화면 ──────────────────────────────────────────
function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=cor+half+wrn, pct=total>0?Math.round((cor+half*0.5)/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selected.forEach(n=>doneSet.add(n));

  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고2 24년 6월 서술형 · ${selected.size}개 지문</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">자기채점 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${half}</div><div class="sl">부분</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#e65100;">${total}</div><div class="sl">총문제</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${el}분</div><div class="sl">소요</div></div>
    </div>
    <div class="rbtns">
      ${wrongQs.length>0?`<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:#fff;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongQs.length}개)</button>`:''}
      <button class="rbtn" style="background:linear-gradient(135deg,#e65100,#bf360c);color:#fff;" onclick="showWrongNote()">📒 오답 노트 보기</button>
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave){
    const _bn = sessionStorage.getItem('bn_name')||localStorage.getItem('bn_name')||'';
    const _bs = sessionStorage.getItem('bn_school')||localStorage.getItem('bn_school')||'';
    window._fbSave({
      submittedAt:new Date().toISOString(),
      studentName:_bn, school:_bs,
      score:pct, correct:cor, partial:half, wrong:wrn, total:total, elapsedMin:el,
      quizType:'고2_24년6월_서술형',
      passages:[...selected].sort((a,b)=>a-b)
    });
  }
}

function retryWrongs(){
  if(wrongQs.length===0)return;
  qs=[...wrongQs];
  idx=0;cor=0;wrn=0;half=0;answered=false;t0=Date.now();wrongQs=[];
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent='오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selected.clear();renderGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

// ── 오답 노트 ──────────────────────────────────────────
function showWrongNote(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('wrongNoteScreen').classList.remove('hidden');
  renderWrongNote();
}

function renderWrongNote(tab){
  const stored=loadStoredWrongs(), activeTab=tab||'note';
  const ws=document.getElementById('wrongNoteScreen');
  let tabContent='';
  if(activeTab==='note'){
    tabContent=stored.length===0?`<div class="wn-empty">📭 저장된 오답이 없어요!</div>`
      :stored.map(q=>`<div class="wn-card">
        <div class="wn-header">
          <span class="wn-title">${q.passageNo}번 · ${q.topic}</span>
          <span class="wn-badge">${q.qtype} · ${q.savedAt||''}</span>
        </div>
        <div class="wn-body">
          <div style="font-size:12px;font-weight:800;color:#e65100;margin-bottom:6px;">📝 문제</div>
          <div style="font-size:13px;color:#333;margin-bottom:8px;line-height:1.7;">${q.question.replace(/\n/g,'<br>')}</div>
          <div class="wn-cond">${q.condition.replace(/\n/g,'<br>')}</div>
          <div class="ans-label" style="font-size:11px;font-weight:800;color:#e65100;margin-bottom:6px;">📌 모범 정답</div>
          <div class="wn-ok">${q.ans.replace(/\n/g,'<br>')}</div>
          <div class="wn-exp">💡 ${q.exp}</div>
        </div>
      </div>`).join('');
  } else {
    tabContent=stored.length===0?`<div class="wn-empty">📭 저장된 오답이 없어요!</div>`
      :`<div style="text-align:center;padding:16px 0;">
        <div style="font-size:14px;font-weight:800;color:var(--pri);margin-bottom:6px;">저장된 오답 ${stored.length}문제</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:20px;">localStorage에 누적된 모든 오답입니다.</div>
        <button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:#fff;width:100%;padding:14px;" onclick="startStoredRetry()">❌ 오답 전체 다시풀기 (${stored.length}문제)</button>
      </div>`;
  }
  ws.innerHTML=`<div style="padding:20px;max-width:700px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button onclick="closeWrongNote()" style="border:none;background:none;font-size:20px;cursor:pointer;">←</button>
      <span style="font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--pri);">📒 오답 노트</span>
      <span style="font-size:12px;color:var(--muted);margin-left:4px;">총 ${stored.length}문제 누적</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn ${activeTab==='note'?'on':''}" onclick="renderWrongNote('note')">📖 오답 읽기</button>
      <button class="tab-btn ${activeTab==='retry'?'on':''}" onclick="renderWrongNote('retry')">🔁 다시 풀기</button>
    </div>
    ${stored.length>0?`<button class="wn-clear-btn" onclick="if(confirm('오답 노트를 전부 초기화할까요?'))clearStoredWrongs()">🗑️ 오답 노트 초기화</button>`:''}
    ${tabContent}
  </div>`;
}

function startStoredRetry(){
  const stored=loadStoredWrongs();
  if(!stored.length)return;
  qs=stored.map(q=>({...q}));
  idx=0;cor=0;wrn=0;half=0;answered=false;t0=Date.now();wrongQs=[];
  document.getElementById('wrongNoteScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent='오답 노트 다시풀기';
  showQ();
}

function closeWrongNote(){
  document.getElementById('wrongNoteScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
}
</script>
</body>
</html>
