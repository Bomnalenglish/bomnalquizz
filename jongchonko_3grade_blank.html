<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#00695c;--teal-mid:#00897b;--teal-light:#e0f2f1;--teal-pale:#f1fafa;
  --orange:#e65100;--green:#1b5e20;--red:#b71c1c;--ink:#1a1a2e;--soft:#666;
}
@media print{
  body{background:#fff!important;}
  #pg-start,#pg-quiz,#pg-result{display:none!important;}
  #pg-print{display:block!important;}
  .print-page{page-break-after:always;padding:18px;}
  .print-page:last-child{page-break-after:auto;}
}
body{font-family:'Nanum Gothic',sans-serif;background:#e0f2f1;min-height:100vh;color:var(--ink);}

/* ── START ── */
#pg-start{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#e0f2f1,#e8f5e9,#f3e5f5);}
.start-box{background:#fff;border-radius:28px;padding:44px 36px;max-width:500px;width:100%;box-shadow:0 12px 48px rgba(0,105,92,.15);text-align:center;}
.start-box h1{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--teal);margin-bottom:6px;}
.start-box .sub{font-size:12px;color:var(--soft);margin-bottom:24px;line-height:1.7;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;}
.info-chip{background:var(--teal-light);border-radius:12px;padding:10px;font-size:12px;color:var(--teal-mid);font-weight:700;}
.inp{width:100%;padding:13px 16px;border:2px solid #80cbc4;border-radius:14px;font-size:14px;font-family:'Nanum Gothic',sans-serif;outline:none;margin-bottom:12px;background:#fff;}
.inp:focus{border-color:var(--teal);}
select.inp{color:var(--teal);font-weight:700;cursor:pointer;}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.filter-btn{border:2px solid #80cbc4;border-radius:12px;padding:11px 8px;background:var(--teal-light);cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:12px;font-weight:800;color:var(--teal);transition:.15s;text-align:center;}
.filter-btn.on{border-color:var(--teal);background:var(--teal-mid);color:#fff;box-shadow:0 0 0 3px #80cbc4;}
.filter-label{font-size:12px;font-weight:800;color:var(--soft);text-align:left;margin-bottom:8px;}
.btn-start{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--teal),var(--orange));color:#fff;font-size:16px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:opacity .2s;margin-bottom:10px;}
.btn-start:hover{opacity:.9;}
.btn-print-start{width:100%;padding:13px;border:2px solid #80cbc4;border-radius:14px;background:var(--teal-light);color:var(--teal);font-size:14px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:all .2s;}
.btn-print-start:hover{background:#b2dfdb;}

/* ── QUIZ ── */
#pg-quiz{display:none;}
.top-bar{background:var(--teal);color:#fff;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.top-title{font-family:'Black Han Sans',sans-serif;font-size:15px;}
.top-sub{font-size:11px;opacity:.6;margin-top:2px;}
.top-badge{background:rgba(255,255,255,.18);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:800;}
.prog-bar{height:5px;background:#b2dfdb;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal-mid),var(--orange));transition:width .35s ease;}
.q-wrap{padding:20px 18px;max-width:660px;margin:0 auto;}
.q-card{background:#fff;border-radius:22px;padding:26px 22px;box-shadow:0 5px 22px rgba(0,105,92,.09);}
.q-label{display:inline-flex;align-items:center;gap:6px;background:var(--teal-light);color:var(--teal-mid);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:800;margin-bottom:12px;}
.q-num-big{font-size:12px;color:var(--soft);margin-bottom:8px;font-weight:700;}
.source-tag{display:inline-block;background:#f5f5f5;border-radius:8px;padding:3px 10px;font-size:11px;color:#888;margin-bottom:12px;}

/* passage */
.passage-box{background:#fafafa;border:1.5px solid #e0e0e0;border-radius:14px;padding:16px 18px;font-size:13px;line-height:1.9;color:#333;font-family:'Nanum Myeongjo',serif;margin-bottom:16px;max-height:240px;overflow-y:auto;}
.blank-mark{display:inline-block;background:#fff9c4;border:2px dashed #f9a825;border-radius:8px;padding:2px 16px;font-weight:800;color:#e65100;font-size:13px;letter-spacing:1px;vertical-align:middle;}

/* task */
.task-prompt{background:var(--teal-light);border-left:4px solid var(--teal-mid);border-radius:0 12px 12px 0;padding:11px 16px;font-size:13px;font-weight:700;color:var(--teal);margin-bottom:16px;line-height:1.6;}

/* hint chip */
.hint-chip{display:inline-block;background:#fff8e1;border:1.5px solid #ffe082;border-radius:10px;padding:5px 12px;font-size:12px;color:#e65100;font-weight:700;margin-bottom:14px;}

/* word bank */
.bank-label{font-size:11px;font-weight:800;color:var(--soft);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;background:#f5fffe;border:2px dashed #80cbc4;border-radius:14px;padding:12px;margin-bottom:18px;}
.word-chip{background:#fff;border:2px solid #80cbc4;border-radius:10px;padding:7px 13px;font-size:13px;font-weight:700;color:var(--teal);cursor:pointer;transition:all .12s;user-select:none;font-family:'Nanum Gothic',sans-serif;}
.word-chip:hover{background:var(--teal-light);border-color:var(--teal);transform:translateY(-1px);}
.word-chip.used{opacity:0;pointer-events:none;}

/* answer area */
.answer-area{min-height:52px;background:#fff;border:2px solid #80cbc4;border-radius:14px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;transition:border-color .2s;}
.answer-area.correct-state{border-color:var(--green);background:#f1f8f1;}
.answer-area.wrong-state{border-color:var(--red);background:#fff5f5;}
.ans-chip{background:var(--teal-mid);color:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;font-family:'Nanum Gothic',sans-serif;}
.ans-chip:hover:not(.locked){background:#00695c;transform:translateY(-1px);}
.ans-chip.locked{cursor:default;}
.ans-chip.ok{background:var(--green);}
.ans-chip.no{background:var(--red);}
.ans-placeholder{color:#bbb;font-size:13px;font-style:italic;}

/* feedback */
.fb-box{border-radius:12px;padding:13px 16px;font-size:13px;font-weight:700;display:none;line-height:1.6;margin-bottom:14px;}
.fb-box.ok{background:#e8f5e9;color:#1b5e20;display:block;}
.fb-box.no{background:#ffebee;color:var(--red);display:block;}
.correct-ans-box{background:#e8f5e9;border-radius:10px;padding:10px 14px;font-size:12px;color:#1b5e20;margin-top:6px;display:none;}
.correct-ans-box.show{display:block;}

/* buttons */
.btn-row{display:flex;gap:10px;}
.btn-check{flex:1;padding:14px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--teal-mid),var(--orange));color:#fff;font-size:15px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:opacity .2s;}
.btn-check:hover{opacity:.9;}
.btn-check:disabled{opacity:.5;cursor:default;}
.btn-next{padding:14px 22px;border:2px solid #80cbc4;border-radius:13px;background:var(--teal-light);color:var(--teal);font-size:14px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;display:none;transition:all .15s;}
.btn-next.show{display:block;}
.btn-next:hover{background:#b2dfdb;}
.btn-clear{padding:14px 18px;border:2px solid #e0e0e0;border-radius:13px;background:#f5f5f5;color:#888;font-size:13px;font-weight:700;font-family:'Nanum Gothic',sans-serif;cursor:pointer;}
.btn-clear:hover{background:#eee;}

/* ── RESULT ── */
#pg-result{display:none;padding:24px 18px 60px;max-width:660px;margin:0 auto;}
.r-card{background:#fff;border-radius:24px;padding:32px 24px;box-shadow:0 8px 30px rgba(0,105,92,.11);text-align:center;margin-bottom:16px;}
.r-score{font-family:'Black Han Sans',sans-serif;font-size:64px;color:var(--teal);line-height:1;}
.r-name{font-size:13px;color:var(--soft);margin-top:6px;}
.r-stats{display:flex;justify-content:center;gap:28px;margin-top:20px;}
.r-stat .n{font-family:'Black Han Sans',sans-serif;font-size:28px;}
.r-stat .l{font-size:11px;color:var(--soft);margin-top:3px;}
.wrong-review{background:var(--teal-light);border-radius:16px;padding:16px;text-align:left;margin-top:16px;}
.wrong-review h3{font-size:13px;font-weight:800;color:var(--red);margin-bottom:12px;}
.wr-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid #e91e63;font-size:12px;}
.wr-q{font-weight:800;color:var(--teal);margin-bottom:4px;font-size:11px;}
.wr-my{color:var(--red);margin-bottom:3px;}
.wr-ans{color:var(--green);}
.r-btns{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.r-btn{padding:13px 26px;border:none;border-radius:13px;font-size:14px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:opacity .2s;}
.r-btn:hover{opacity:.85;}
.r-btn.primary{background:linear-gradient(135deg,var(--teal-mid),var(--orange));color:#fff;}
.r-btn.ghost{background:var(--teal-light);color:var(--teal);border:2px solid #80cbc4;}

/* ── PRINT ── */
#pg-print{display:none;}
.print-header{text-align:center;border-bottom:2.5px solid #333;padding-bottom:12px;margin-bottom:18px;}
.print-header h1{font-size:17px;font-weight:800;}
.print-header p{font-size:11px;color:#555;margin-top:4px;}
.print-info-row{display:flex;gap:24px;margin-bottom:14px;font-size:13px;}
.print-info-row span{border-bottom:1px solid #333;padding-bottom:2px;min-width:80px;display:inline-block;}
.print-conditions{font-size:11px;border:1px solid #999;padding:8px 12px;border-radius:6px;margin-bottom:16px;line-height:1.8;}
.print-q{margin-bottom:22px;page-break-inside:avoid;}
.print-q-num{font-weight:800;font-size:13px;background:#333;color:#fff;display:inline-block;padding:2px 10px;border-radius:4px;margin-bottom:6px;}
.print-source{font-size:10px;color:#666;margin-bottom:5px;font-style:italic;}
.print-passage{font-size:11.5px;line-height:1.8;color:#333;border:1px solid #ddd;border-radius:6px;padding:10px 12px;margin-bottom:8px;font-family:'Nanum Myeongjo',serif;background:#fafafa;}
.print-blank{display:inline-block;background:#fffde7;border:1.5px dashed #f9a825;border-radius:5px;padding:1px 14px;font-weight:800;color:#e65100;font-size:12px;}
.print-task{font-size:11px;font-weight:700;border-left:3px solid #333;padding-left:8px;margin-bottom:8px;color:#333;}
.print-bank{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.print-word{border:1.5px solid #888;border-radius:5px;padding:3px 9px;font-size:11px;font-weight:700;}
.print-lines{margin-top:6px;}
.print-line{border-bottom:1px solid #999;margin-bottom:9px;height:22px;}
.print-ans-section{margin-top:36px;border-top:2.5px solid #333;padding-top:14px;}
.print-ans-section h2{font-size:14px;font-weight:800;margin-bottom:12px;}
.print-ans-item{display:flex;gap:8px;margin-bottom:5px;font-size:11px;line-height:1.5;}
.print-ans-num{font-weight:800;width:28px;flex-shrink:0;color:#00695c;}
.print-ans-text{color:#333;}
@media(max-width:480px){.q-card{padding:18px 14px;}.passage-box{font-size:12px;}.filter-row{grid-template-columns:1fr;}}
</style>
</head>

// ══════════════════════════════════════════════════════
// GLOBAL STATE
// ══════════════════════════════════════════════════════
var selectedRange = 'all';
var activeQ = [];
var studentName = '', school = '';
var qIdx = 0, numCorrect = 0, numWrong = 0, wrongList = [], startTime = 0;
var answered = false, bankWords = [], ansWords = [];

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function pickRange(btn, range){
  selectedRange = range;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
}

function getActiveQ(){
  if(selectedRange==='all') return ALL_Q;
  return ALL_Q.filter(function(q){return q.kang===selectedRange;});
}

function renderPassage(text){
  return text.replace(/<BLANK>/g,'<span class="blank-mark">　　　　　</span>');
}

// ══════════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════════
function startQuiz(){
  school=document.getElementById('schoolSel').value;
  studentName=document.getElementById('nameInp').value.trim();
  if(!school){alert('학교를 선택해주세요!');return;}
  if(!studentName){alert('이름을 입력해주세요!');return;}
  activeQ=shuffle(getActiveQ());
  if(activeQ.length===0){alert('선택한 범위에 문제가 없습니다.');return;}
  qIdx=0;numCorrect=0;numWrong=0;wrongList=[];startTime=Date.now();answered=false;
  document.getElementById('pg-start').style.display='none';
  document.getElementById('pg-quiz').style.display='block';
  document.getElementById('pg-result').style.display='none';
  var label=selectedRange==='all'?'전체':selectedRange+'강';
  document.getElementById('topSub').textContent=studentName+' · EBS 빈칸추론 ('+label+')';
  renderQ();
}

// ══════════════════════════════════════════════════════
// RENDER QUESTION
// ══════════════════════════════════════════════════════
function renderQ(){
  if(qIdx>=activeQ.length){showResult();return;}
  var q=activeQ[qIdx];
  var pct=Math.round(qIdx/activeQ.length*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('topBadge').textContent=(qIdx+1)+'/'+activeQ.length;
  answered=false;
  bankWords=shuffle(q.words).map(function(w){return{word:w,used:false};});
  ansWords=[];
  var card=document.getElementById('qCard');
  card.innerHTML=buildQHTML(q);
  card.querySelectorAll('.word-chip').forEach(function(chip,i){
    chip.addEventListener('click',function(){addToAns(i);});
  });
  refreshAns();
}

function buildQHTML(q){
  var chips=bankWords.map(function(w,i){return '<div class="word-chip" id="chip-'+i+'">'+w.word+'</div>';}).join('');
  return '<div class="q-label">📖 빈칸추론</div>'+
    '<div class="q-num-big">문제 '+(qIdx+1)+' / '+activeQ.length+' &nbsp;·&nbsp; '+q.kang+'강</div>'+
    '<div class="source-tag">📚 '+q.src+'</div>'+
    '<div class="passage-box">'+renderPassage(q.passage)+'</div>'+
    '<div class="task-prompt">✏️ 빈칸에 들어갈 말을 주어진 단어를 모두 사용하여 완성하시오.</div>'+
    '<div class="hint-chip">💡 한국어 의미: '+q.hint+'</div>'+
    '<div class="bank-label">📦 단어 뱅크 — 탭해서 순서대로 배열하세요</div>'+
    '<div class="word-bank" id="wordBank">'+chips+'</div>'+
    '<div class="bank-label">✍️ 내 답안</div>'+
    '<div class="answer-area" id="ansArea"><span class="ans-placeholder">단어를 탭해서 여기에 배열하세요...</span></div>'+
    '<div class="fb-box" id="fbBox"></div>'+
    '<div class="correct-ans-box" id="correctAnsBox"></div>'+
    '<div class="btn-row">'+
      '<button class="btn-clear" onclick="clearAns()">↩ 초기화</button>'+
      '<button class="btn-check" id="btnCheck" onclick="checkAns()">채점하기 ✓</button>'+
      '<button class="btn-next" id="btnNext" style="display:none" onclick="nextQ()">다음 →</button>'+
    '</div>';
}

function addToAns(idx){
  if(answered||bankWords[idx].used)return;
  bankWords[idx].used=true;
  ansWords.push({word:bankWords[idx].word,bankIdx:idx});
  document.getElementById('chip-'+idx).classList.add('used');
  refreshAns();
}

function removeFromAns(i){
  if(answered)return;
  var item=ansWords[i];
  bankWords[item.bankIdx].used=false;
  document.getElementById('chip-'+item.bankIdx).classList.remove('used');
  ansWords.splice(i,1);
  refreshAns();
}

function refreshAns(){
  var area=document.getElementById('ansArea');
  if(!area)return;
  if(ansWords.length===0){area.innerHTML='<span class="ans-placeholder">단어를 탭해서 여기에 배열하세요...</span>';return;}
  area.innerHTML=ansWords.map(function(item,i){return '<div class="ans-chip" onclick="removeFromAns('+i+')">'+item.word+'</div>';}).join('');
}

function clearAns(){
  if(answered)return;
  bankWords.forEach(function(w,i){w.used=false;var c=document.getElementById('chip-'+i);if(c)c.classList.remove('used');});
  ansWords=[];
  refreshAns();
}

// ══════════════════════════════════════════════════════
// CHECK
// ══════════════════════════════════════════════════════
function checkAns(){
  if(answered)return;
  if(ansWords.length===0){alert('단어를 배열해주세요!');return;}
  answered=true;
  var q=activeQ[qIdx];
  var myAns=ansWords.map(function(i){return i.word;}).join(' ');
  var norm=function(s){return s.toLowerCase().replace(/["""''',\.]/g,'').replace(/\s+/g,' ').trim();};
  var isOk=norm(myAns)===norm(q.answer);
  document.querySelectorAll('.ans-chip').forEach(function(c){c.classList.add('locked');});
  document.getElementById('btnCheck').disabled=true;
  var area=document.getElementById('ansArea');
  var fb=document.getElementById('fbBox');
  var cb=document.getElementById('correctAnsBox');
  if(isOk){
    area.classList.add('correct-state');
    document.querySelectorAll('.ans-chip').forEach(function(c){c.classList.add('ok');});
    fb.className='fb-box ok';fb.textContent='✅ 정답입니다!';
    numCorrect++;
  } else {
    area.classList.add('wrong-state');
    document.querySelectorAll('.ans-chip').forEach(function(c){c.classList.add('no');});
    fb.className='fb-box no';fb.textContent='❌ 오답입니다.';
    cb.className='correct-ans-box show';cb.innerHTML='✅ 정답: <strong>'+q.answer+'</strong>';
    numWrong++;
    wrongList.push({kang:q.kang,hint:q.hint,my:myAns,correct:q.answer});
  }
  var nb=document.getElementById('btnNext');
  nb.textContent=(qIdx+1>=activeQ.length)?'결과 보기 →':'다음 →';
  nb.style.display='block';
}

function nextQ(){qIdx++;renderQ();}

// ══════════════════════════════════════════════════════
// RESULT
// ══════════════════════════════════════════════════════
function showResult(){
  document.getElementById('pg-quiz').style.display='none';
  var total=activeQ.length;
  var pct=total>0?Math.round(numCorrect/total*100):0;
  var elapsed=Math.round((Date.now()-startTime)/60000);
  var wHTML='';
  if(wrongList.length>0){
    wHTML='<div class="wrong-review"><h3>❌ 오답 ('+wrongList.length+'개)</h3>';
    wrongList.forEach(function(w){
      wHTML+='<div class="wr-item"><div class="wr-q">['+w.kang+'강] '+w.hint+'</div><div class="wr-my">내 답: '+w.my+'</div><div class="wr-ans">정답: '+w.correct+'</div></div>';
    });
    wHTML+='</div>';
  } else {
    wHTML='<div style="color:#1b5e20;font-weight:800;padding:20px;text-align:center;font-size:17px;">🎉 전부 정답! 완벽해요!</div>';
  }
  var res=document.getElementById('pg-result');
  res.style.display='block';
  res.innerHTML='<div class="r-card">'+
    '<div style="font-size:12px;color:#888;margin-bottom:6px;">EBS 수능특강 빈칸추론 언스크램블</div>'+
    '<div class="r-score">'+pct+'점</div>'+
    '<div class="r-name">'+studentName+' ('+school+')의 결과</div>'+
    '<div class="r-stats">'+
      '<div class="r-stat"><div class="n" style="color:#1b5e20;">'+numCorrect+'</div><div class="l">정답</div></div>'+
      '<div class="r-stat"><div class="n" style="color:#b71c1c;">'+numWrong+'</div><div class="l">오답</div></div>'+
      '<div class="r-stat"><div class="n" style="color:#00695c;">'+total+'</div><div class="l">총문제</div></div>'+
      '<div class="r-stat"><div class="n" style="color:#e65100;">'+elapsed+'분</div><div class="l">소요</div></div>'+
    '</div>'+wHTML+
    '<div class="r-btns">'+
      '<button class="r-btn ghost" onclick="openPrint()">🖨️ 시험지 출력</button>'+
      '<button class="r-btn primary" onclick="location.reload()">처음부터 🔄</button>'+
    '</div></div>';
  saveFirebase(pct,numCorrect,numWrong,total,elapsed);
}

// ══════════════════════════════════════════════════════
// PRINT
// ══════════════════════════════════════════════════════
function openPrint(){
  var pg=document.getElementById('pg-print');
  var qs=getActiveQ();
  var qHTML='';
  qs.forEach(function(q,i){
    var shuffled=shuffle(q.words);
    var chips=shuffled.map(function(w){return '<span class="print-word">'+w+'</span>';}).join('');
    qHTML+='<div class="print-q">'+
      '<div class="print-q-num">문제 '+(i+1)+'</div>'+
      '<div class="print-source">'+q.src+'</div>'+
      '<div class="print-passage">'+q.passage.replace(/<BLANK>/g,'<span class="print-blank">　　　　　　　</span>')+'</div>'+
      '<div class="print-task">빈칸에 들어갈 말을 주어진 단어를 모두 사용하여 완성하시오. (💡 '+q.hint+')</div>'+
      '<div class="print-bank">'+chips+'</div>'+
      '<div class="print-lines"><div class="print-line"></div><div class="print-line"></div></div>'+
    '</div>';
  });
  var ansHTML='';
  qs.forEach(function(q,i){
    ansHTML+='<div class="print-ans-item"><div class="print-ans-num">'+(i+1)+'번</div><div class="print-ans-text">'+q.answer+'<br><small style="color:#555">→ '+q.hint+'</small></div></div>';
  });
  var rangeLabel=selectedRange==='all'?'전체 62문제':selectedRange+'강';
  pg.innerHTML='<div class="print-page">'+
    '<div class="print-header"><h1>🌿 종촌고 3학년 영어 — 빈칸추론 언스크램블</h1><p>EBS 수능특강 연계 | '+rangeLabel+' | 주어진 단어를 모두 사용하여 빈칸을 완성하시오.</p></div>'+
    '<div class="print-info-row">학년: <span>3학년</span> &nbsp;&nbsp; 이름: <span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> &nbsp;&nbsp; 점수: <span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>'+
    '<div class="print-conditions"><strong>〈조건〉</strong><br>○ 주어진 단어(구)를 모두 한 번씩 사용할 것 &nbsp; ○ 단어 형태 변형 없음 &nbsp; ○ 단어 추가 없음 &nbsp; ○ 대·소문자 구별 없음 &nbsp; ○ 철자 오류 시 감점</div>'+
    qHTML+
    '<div class="print-ans-section"><h2>※ 정답지 (학생에게 배부 금지)</h2>'+ansHTML+'</div>'+
  '</div>';
  ['pg-start','pg-quiz','pg-result'].forEach(function(id){document.getElementById(id).style.display='none';});
  pg.style.display='block';
  setTimeout(function(){
    window.print();
    setTimeout(function(){pg.style.display='none';document.getElementById('pg-start').style.display='flex';},500);
  },300);
}
