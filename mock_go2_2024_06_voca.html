const PASSAGE_ORDER = Object.keys(VOCA).sort((a,b)=>parseInt(a.split('-')[0])-parseInt(b.split('-')[0]));

let userName='', userSchool='', selectedRefs=new Set(), doneRefs=new Set();
let qs=[], idx=0, cor=0, wrn=0, wrongs=[], allResults=[], answered=false, t0=0;
let filterMode='all', quizDir='en', round='1';

function goModeSelect(){
  userSchool = document.getElementById('si').value;
  userName = document.getElementById('ni').value.trim();
  if(!userSchool){alert('학교를 선택해주세요!');return;}
  if(!userName){alert('이름을 입력해주세요!');return;}
  try{localStorage.setItem('bomnal_name',userName);localStorage.setItem('bomnal_school',userSchool);}catch(e){}
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('userInfo1').textContent = userName + ' · ' + userSchool;
  document.getElementById('userInfo2').textContent = userName + ' · ' + userSchool;
  document.getElementById('modeScreen').classList.remove('hidden');
}

function selectRound(r){
  round = r;
  const lbl = r==='1' ? '🥇 1차 뜻 묻기' : '🥈 2차 유의·반의어';
  document.getElementById('roundLabel').textContent = lbl;
  document.getElementById('roundLabel2').textContent = lbl;
  // For 2차, hide direction bar (always 단어 → syn/ant)
  document.getElementById('dirBar').style.display = (r==='2') ? 'none' : 'flex';
  document.getElementById('modeScreen').classList.add('hidden');
  selectedRefs.clear();
  renderPassageGrid();
  document.getElementById('passageScreen').classList.remove('hidden');
}

function backToMode(){
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('modeScreen').classList.remove('hidden');
}

function setDir(d){
  quizDir = d;
  document.querySelectorAll('.dir-bar .dbb').forEach(b=>b.classList.remove('on'));
  document.getElementById('dir-'+d).classList.add('on');
}

function refInRange(ref, mode){
  if(mode==='all') return true;
  if(mode==='long') return parseInt(ref)>=41;
  const n = parseInt(ref);
  if(mode==='18-24') return n>=18&&n<=24;
  if(mode==='25-30') return n>=25&&n<=30;
  if(mode==='31-40') return n>=31&&n<=40;
  return true;
}

function countWordsForRound(ref){
  const words = VOCA[ref] || [];
  if(round==='1') return words.length;
  // round 2: count words with syn or ant
  return words.filter(w=>w.syn || w.ant).length;
}

function renderPassageGrid(){
  const grid = document.getElementById('passageGrid');
  grid.innerHTML='';
  PASSAGE_ORDER.forEach(ref=>{
    if(!refInRange(ref, filterMode)) return;
    const count = countWordsForRound(ref);
    if(count===0) return;
    const d = document.createElement('div');
    d.className='p-card'+(selectedRefs.has(ref)?' sel':'')+(doneRefs.has(ref+'_'+round)?' done':'');
    d.onclick=()=>togglePassage(ref);
    const unit = round==='1' ? '단어' : '문항';
    d.innerHTML=`<div class="p-no">${ref}번</div><div class="p-count">${count}${unit}</div>`
      +(doneRefs.has(ref+'_'+round)?'<span class="p-badge done-badge">완료✓</span>':'')
      +(selectedRefs.has(ref)&&!doneRefs.has(ref+'_'+round)?'<span class="p-badge" style="background:#e3f2fd;color:#1565c0;">선택</span>':'');
    grid.appendChild(d);
  });
}

function togglePassage(ref){
  if(selectedRefs.has(ref))selectedRefs.delete(ref);
  else selectedRefs.add(ref);
  renderPassageGrid();
}

function filterPassage(mode, btn){
  filterMode=mode;
  document.querySelectorAll('.filter-bar .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPassageGrid();
}

function selectAll(){
  const visible = PASSAGE_ORDER.filter(r=>refInRange(r, filterMode) && countWordsForRound(r)>0);
  const allSel = visible.every(r=>selectedRefs.has(r));
  visible.forEach(r=>{ if(allSel) selectedRefs.delete(r); else selectedRefs.add(r); });
  renderPassageGrid();
}

function shuffle(arr){const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function splitTerms(s){
  // Splits "demand, necessitate, push, release" into individual terms
  if(!s) return [];
  return s.split(/[,;]/).map(t=>t.trim()).filter(t=>t && !t.startsWith('('));
}

function startQuiz(){
  if(selectedRefs.size===0){alert('지문을 하나 이상 선택하세요!');return;}
  // Collect words
  const selWords = [];
  PASSAGE_ORDER.forEach(ref=>{
    if(selectedRefs.has(ref)){
      (VOCA[ref]||[]).forEach(w=>selWords.push({...w, pref:ref}));
    }
  });
  // All words pool for distractor generation
  const allWords = [];
  PASSAGE_ORDER.forEach(ref=>(VOCA[ref]||[]).forEach(w=>allWords.push(w)));

  qs = [];
  if(round==='1'){
    // 1차: 뜻 묻기 - one question per word
    shuffle(selWords).forEach(w=>{
      const mode = quizDir==='mix' ? (Math.random()<0.5?'en':'ko') : quizDir;
      const ansField = mode==='en' ? 'ko' : 'en';
      const showField = mode==='en' ? 'en' : 'ko';
      const distractors = [];
      const seen = new Set([w[ansField]]);
      for(const cand of shuffle(allWords)){
        if(distractors.length>=3) break;
        if(!cand[ansField] || seen.has(cand[ansField])) continue;
        distractors.push(cand[ansField]);
        seen.add(cand[ansField]);
      }
      if(distractors.length<3) return;
      qs.push({
        pref:w.pref, mode:'1-'+mode, show:w[showField], ans:w[ansField],
        options:shuffle([w[ansField], ...distractors]),
        en:w.en, ko:w.ko, hint:''
      });
    });
  } else {
    // 2차: 유의어 또는 반의어 묻기
    shuffle(selWords).forEach(w=>{
      const synTerms = splitTerms(w.syn);
      const antTerms = splitTerms(w.ant);
      // Build syn question if available
      if(synTerms.length > 0){
        const correctSyn = synTerms[0]; // primary synonym
        // Distractors: from other words' antonyms / non-matching syns
        const distractors = [];
        const seen = new Set(synTerms.map(t=>t.toLowerCase()));
        seen.add(w.en.toLowerCase());
        for(const cand of shuffle(allWords)){
          if(distractors.length>=3) break;
          const candSyns = splitTerms(cand.syn);
          const candAnts = splitTerms(cand.ant);
          const candidates = [...candSyns, ...candAnts];
          for(const c of shuffle(candidates)){
            if(!c || seen.has(c.toLowerCase())) continue;
            distractors.push(c);
            seen.add(c.toLowerCase());
            break;
          }
        }
        if(distractors.length===3){
          qs.push({
            pref:w.pref, mode:'2-syn', show:w.en, ans:correctSyn,
            options:shuffle([correctSyn, ...distractors]),
            en:w.en, ko:w.ko, hint:'('+w.ko+')',
            allValid:synTerms.map(t=>t.toLowerCase())  // multiple valid answers
          });
        }
      }
      // Build ant question if available
      if(antTerms.length > 0){
        const correctAnt = antTerms[0];
        const distractors = [];
        const seen = new Set(antTerms.map(t=>t.toLowerCase()));
        seen.add(w.en.toLowerCase());
        // For antonym distractors, include synonyms of same word (they're INCORRECT for antonym)
        splitTerms(w.syn).forEach(s=>distractors.length<3 && !seen.has(s.toLowerCase()) && (distractors.push(s), seen.add(s.toLowerCase())));
        for(const cand of shuffle(allWords)){
          if(distractors.length>=3) break;
          const candidates = [...splitTerms(cand.syn), ...splitTerms(cand.ant)];
          for(const c of shuffle(candidates)){
            if(!c || seen.has(c.toLowerCase())) continue;
            distractors.push(c);
            seen.add(c.toLowerCase());
            break;
          }
        }
        if(distractors.length===3){
          qs.push({
            pref:w.pref, mode:'2-ant', show:w.en, ans:correctAnt,
            options:shuffle([correctAnt, ...distractors]),
            en:w.en, ko:w.ko, hint:'('+w.ko+')',
            allValid:antTerms.map(t=>t.toLowerCase())
          });
        }
      }
    });
  }

  qs = shuffle(qs);
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('passageScreen').classList.add('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · '+selectedRefs.size+'개 지문 · '+qs.length+'문항';
  showQ();
}

function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showQ(){
  if(idx>=qs.length){showResult();return;}
  answered=false;
  const q=qs[idx];
  document.getElementById('pf').style.width=(idx/qs.length*100).toFixed(0)+'%';
  document.getElementById('hb').textContent=(idx+1)+'/'+qs.length;
  const area=document.getElementById('quizArea');

  let typeBadge, prompt, wordClass;
  if(q.mode==='1-en'){
    typeBadge='1차 영→한'; prompt='다음 영어 단어의 뜻으로 알맞은 것은?'; wordClass='word-en';
  } else if(q.mode==='1-ko'){
    typeBadge='1차 한→영'; prompt='다음 한국어 뜻에 해당하는 영어 단어는?'; wordClass='word-ko';
  } else if(q.mode==='2-syn'){
    typeBadge='2차 유의어'; prompt='다음 단어와 의미가 가장 가까운 것은?'; wordClass='word-en';
  } else {
    typeBadge='2차 반의어'; prompt='다음 단어와 의미가 가장 반대되는 것은?'; wordClass='word-en';
  }

  const hintHtml = q.hint ? `<div style="font-size:14px;color:#5d4037;margin-top:6px;">${escHTML(q.hint)}</div>` : '';
  const choiceHTML = q.options.map((opt,i)=>`<button class="cb" data-idx="${i}"><span class="cn">${i+1}</span><span>${escHTML(opt)}</span></button>`).join('');
  area.innerHTML=`
    <div class="qc">
      <div class="q-no-badge">
        <span class="qno">지문 ${q.pref}번</span>
        <span class="qtype">${typeBadge}</span>
      </div>
      <div class="word-box"><div class="${wordClass}">${escHTML(q.show)}</div>${hintHtml}</div>
      <div class="q-prompt">${prompt}</div>
      <div class="choices" id="qChoices">${choiceHTML}</div>
      <div class="fb-msg" id="fb"></div>
    </div>`;
  document.querySelectorAll('#qChoices .cb').forEach(b=>{
    b.addEventListener('click',()=>selChoice(b, q.options[parseInt(b.dataset.idx)], q.ans, q.allValid));
  });
}

function selChoice(btn, sel, ans, allValid){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const q=qs[idx];
  const selLower = sel.toLowerCase();
  const isValid = allValid ? allValid.includes(selLower) : (sel===ans);
  if(isValid){
    btn.classList.add('correct');
    fb.className='fb-msg ok';fb.textContent='✅ 정답!';
    cor++;
    allResults.push({pref:q.pref, mode:q.mode, correct:true, my:sel, ans:ans, en:q.en, ko:q.ko});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.cb').forEach(b=>{const i=parseInt(b.dataset.idx);if(q.options[i]===ans)b.classList.add('reveal');});
    fb.className='fb-msg no';fb.textContent='❌ 오답! 정답: '+ans+'  ('+q.en+' = '+q.ko+')';
    wrn++;
    wrongs.push({label:q.en+' / '+q.ko, my:sel, correct:ans, pref:q.pref, mode:q.mode});
    allResults.push({pref:q.pref, mode:q.mode, correct:false, my:sel, ans:ans, en:q.en, ko:q.ko});
  }
  setTimeout(()=>{idx++;showQ();},isValid?700:1800);
}

let wrongQs = [];

function showResult(){
  document.getElementById('pf').style.width='100%';
  document.getElementById('quizArea').classList.add('hidden');
  const total=idx, pct=total>0?Math.round(cor/total*100):0;
  const el=Math.round((Date.now()-t0)/60000);
  selectedRefs.forEach(r=>doneRefs.add(r+'_'+round));
  const wrongKeys = new Set(wrongs.map(w=>w.en+'_'+w.mode));
  wrongQs = qs.filter(q=>wrongKeys.has(q.en+'_'+q.mode));

  const wHTML=wrongs.length>0
    ?'<div class="wl"><h3>❌ 오답 ('+wrongs.length+'개)</h3>'+wrongs.map(w=>'<div class="wi"><div class="wie">'+w.label+' [지문 '+w.pref+'번]</div><div class="wid">내 답: '+w.my+' → 정답: '+w.correct+'</div></div>').join('')+'</div>'
    :'<div style="color:#2e7d32;font-weight:800;padding:14px;text-align:center;">🎉 전부 정답!</div>';

  const retryBtn = wrongs.length>0
    ? `<button class="rbtn" style="background:linear-gradient(135deg,#c62828,#e91e63);color:white;" onclick="retryWrongs()">❌ 오답 다시풀기 (${wrongs.length}개)</button>`
    : '';

  const roundLbl = round==='1' ? '1차 뜻' : '2차 유의·반의어';
  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  rs.innerHTML=`<div class="rc">
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">고2 24년 6월 단어 ${roundLbl} · ${selectedRefs.size}개 지문 · ${total}문항</div>
    <div class="rs">${pct}점</div>
    <div class="rsub">${userName}의 결과</div>
    <div class="sr">
      <div class="si"><div class="sn" style="color:#2e7d32;">${cor}</div><div class="sl">정답</div></div>
      <div class="si"><div class="sn" style="color:#c62828;">${wrn}</div><div class="sl">오답</div></div>
      <div class="si"><div class="sn" style="color:#1565c0;">${total}</div><div class="sl">총문항</div></div>
      <div class="si"><div class="sn" style="color:#f57f17;">${el}분</div><div class="sl">소요</div></div>
    </div>
    ${wHTML}
    <div class="rbtns">
      ${retryBtn}
      <button class="rbtn rbtn-p" onclick="goBack()">← 지문 다시 선택</button>
      <button class="rbtn rbtn-s" onclick="location.reload()">처음부터 🔄</button>
    </div>
  </div>`;

  if(window._fbSave) window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: userName,
    school: userSchool,
    score: pct,
    correct: cor,
    wrong: wrn,
    total: total,
    elapsedMin: el,
    quizType: '고2_24년6월_단어_'+roundLbl.replace(/\s/g,''),
    passages: [...selectedRefs].sort(),
    details: allResults.map(r=>({
      지문: r.pref+'번',
      유형: r.mode,
      결과: r.correct?'✅정답':'❌오답',
      영어: r.en,
      한국어: r.ko,
      내답: r.my,
      정답: r.ans
    })),
    wrongWords: wrongs.map(w=>({eng:w.en, kor:w.ko, my:w.my, correct:w.correct, mode:w.mode}))
  });
}

function retryWrongs(){
  if(wrongQs.length===0) return;
  qs=[...wrongQs];
  idx=0;cor=0;wrn=0;wrongs=[];allResults=[];answered=false;t0=Date.now();
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hidden');
  document.getElementById('pw').classList.remove('hidden');
  document.getElementById('hs').textContent=userName+' · 오답 다시풀기';
  showQ();
}

function goBack(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('pw').classList.add('hidden');
  selectedRefs.clear();
  document.getElementById('passageScreen').classList.remove('hidden');
  renderPassageGrid();
}

window.addEventListener('DOMContentLoaded',()=>{
  const n=localStorage.getItem('bomnal_name');
  const s=localStorage.getItem('bomnal_school');
  if(n) document.getElementById('ni').value=n;
  if(s){
    const sel=document.getElementById('si');
    for(let i=0;i<sel.options.length;i++){
      if(sel.options[i].value&&s.includes(sel.options[i].value)){sel.value=sel.options[i].value;break;}
    }
  }
});
</script>
