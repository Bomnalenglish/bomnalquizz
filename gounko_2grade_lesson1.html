.progress-bar-outer{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-bar-inner{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;width:0%;transition:width 0.4s ease;}
.progress-text{font-size:0.78rem;font-weight:700;color:var(--soft);white-space:nowrap;}

.sep{font-size:0.72rem;color:#bbb;padding:0 1px;pointer-events:none;font-weight:400;}

// ============================================================
// STATE
// ============================================================
let totalItems = 0, answeredCount = 0, correctCount = 0;
const allItems = [];
const itemSection = []; // each item's section index (0=본문, 1=본문외)
SECTIONS.forEach((sec, si) => sec.qs.forEach(q => {
  q.items = [];
  q.parts.forEach(p => { if(Array.isArray(p)) { q.items.push({opts:p, ans:q.ans[q.items.length]}); totalItems++; } });
  q._sec = si;
  allItems.push(q);
}));
const state = allItems.map(q => q.items.map(() => null));
const _t0 = Date.now();
let _currentMode = '본문';
let _saved = false;
function _inMode(secIdx){
  if(_currentMode==='본문') return secIdx===0;
  if(_currentMode==='본문외') return secIdx===1;
  return true;
}
function _modeStats(){
  let total=0, done=0, correct=0, wrongNos=[];
  allItems.forEach((q, qi) => {
    if(!_inMode(q._sec)) return;
    q.items.forEach((it, ii) => {
      total++;
      const s = state[qi][ii];
      if(s !== null) done++;
      if(s === 'correct') correct++;
    });
    // record wrong question numbers
    const qWrongs = state[qi].filter(x => x === 'wrong').length;
    if(qWrongs > 0) wrongNos.push(q.no + '번');
  });
  return {total, done, correct, wrong: done - correct, wrongNos: wrongNos.join(', ')};
}
async function _saveProgress(){
  if(_saved) return;
  const st = _modeStats();
  if(st.done === 0) return;
  _saved = true;
  const pct = st.done > 0 ? Math.round(st.correct/st.done*100) : 0;
  const NAME = sessionStorage.getItem('bn_name') || localStorage.getItem('bn_name') || '익명';
  const SCHOOL = sessionStorage.getItem('bn_school') || localStorage.getItem('bn_school') || '고운고';
  const elapsedMin = Math.round((Date.now()-_t0)/60000);
  if(window._fbSave) await window._fbSave({
    submittedAt: new Date().toISOString(),
    studentName: NAME, school: SCHOOL,
    score: pct, correct: st.correct, wrong: st.done - st.correct, total: st.done,
    elapsedMin: elapsedMin,
    quizType: '고운고2 Lesson1 어법 ('+_currentMode+')',
    completed: st.done >= st.total,
    wrongNumbers: st.wrongNos
  });
}
window.addEventListener('beforeunload', _saveProgress);
function switchMode(newMode){
  if(newMode === _currentMode) return;
  if(answeredCount > 0){
    if(!confirm('현재 모드의 풀이가 진행 중입니다. 모드를 바꾸면 처음부터 다시 풀어야 합니다. 변경하시겠습니까?')) return;
    // Save current progress before switching
    _saveProgress();
    location.reload();
    return;
  }
  _currentMode = newMode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === newMode));
  // Re-render with new mode filter
  document.getElementById('main').innerHTML = '';
  totalItems = 0;
  allItems.forEach(q => { if(_inMode(q._sec)) q.items.forEach(() => totalItems++); });
  render();
}

// ============================================================
// RENDER
// ============================================================
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildPassage(q, qIdx) {
  let html = '<div class="passage">', ii = 0;
  q.parts.forEach(part => {
    if(typeof part === 'string') { html += esc(part); }
    else {
      const iIdx = ii++;
      html += `<span class="choice-group" id="cg-${qIdx}-${iIdx}">`;
      part.forEach((opt, oIdx) => {
        html += `<button class="choice-btn" onclick="pick(${qIdx},${iIdx},${oIdx})" id="cb-${qIdx}-${iIdx}-${oIdx}">${esc(opt)}</button>`;
        if(oIdx < part.length-1) html += `<span class="sep">/</span>`;
      });
      html += '</span>';
    }
  });
  return html + '</div>';
}

function render() {
  const main = document.getElementById('main');
  let qIdx = 0;
  let sectionShown = {};
  SECTIONS.forEach((sec, si) => {
    if(!_inMode(si)){ qIdx += sec.qs.length; return; }
    main.insertAdjacentHTML('beforeend', `<div class="section-label">${sec.label}</div>`);
    sec.qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `qcard-${qIdx}`;
      card.style.animationDelay = `${qIdx * 0.025}s`;
      card.innerHTML = `
        <div class="q-header">
          <div class="q-num">${q.no}</div>
          <div class="q-ko">${esc(q.ko)}</div>
          <div class="q-status" id="qst-${qIdx}"></div>
        </div>
        ${buildPassage(q, qIdx)}
      `;
      main.appendChild(card);
      qIdx++;
    });
  });
  updateProgress();
}

function pick(qIdx, iIdx, oIdx) {
  if(state[qIdx][iIdx] !== null) return;
  const item = allItems[qIdx].items[iIdx];
  const ok = oIdx === item.ans;
  state[qIdx][iIdx] = ok ? 'correct' : 'wrong';
  answeredCount++; if(ok) correctCount++;

  const btn = document.getElementById(`cb-${qIdx}-${iIdx}-${oIdx}`);
  btn.classList.add(ok ? 'correct' : 'wrong'); btn.disabled = true;
  if(!ok) { const cb = document.getElementById(`cb-${qIdx}-${iIdx}-${item.ans}`); cb.classList.add('reveal-correct'); cb.disabled = true; }
  item.opts.forEach((_,oi) => document.getElementById(`cb-${qIdx}-${iIdx}-${oi}`).disabled = true);
  document.getElementById(`cg-${qIdx}-${iIdx}`).classList.add('answered');

  updateQStatus(qIdx);
  updateProgress();
  const st = _modeStats();
  if(st.done === st.total) showSummary();
}

function updateQStatus(qIdx) {
  const s = state[qIdx];
  const done = s.filter(x=>x!==null).length;
  const total = allItems[qIdx].items.length;
  const wrongs = s.filter(x=>x==='wrong').length;
  const el = document.getElementById(`qst-${qIdx}`);
  if(!done){ el.className='q-status'; el.textContent=''; return; }
  el.classList.add('show');
  if(wrongs > 0){ el.className='q-status show has-err'; el.textContent=`${done}/${total} · 오답 ${wrongs}개`; }
  else if(done===total){ el.className='q-status show all-ok'; el.textContent='✓ 전체 정답!'; }
  else{ el.className='q-status show all-ok'; el.textContent=`${done}/${total} 진행 중`; }
}

function updateProgress() {
  const st = _modeStats();
  const pct = st.total > 0 ? Math.round(st.done/st.total*100) : 0;
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${st.done} / ${st.total}`;
  document.getElementById('scoreBadge').textContent = `✓ ${st.correct}`;
}

function showSummary() {
  _saveProgress();
  const st = _modeStats();
  const pct = st.total > 0 ? Math.round(st.correct/st.total*100) : 0;
  const msg = pct===100?'🎉 완벽합니다!':pct>=80?'👍 훌륭해요!':pct>=60?'📖 틀린 것을 다시 확인해 보세요.':'💪 다시 도전해 보세요!';
  const s = document.createElement('div'); s.className='summary show';
  s.innerHTML=`<div class="summary-title">결과 <span>확인</span> (${_currentMode})</div>
    <div class="summary-score">${st.correct}<span style="font-size:1.5rem;color:rgba(255,255,255,0.4)"> / ${st.total}</span></div>
    <div class="summary-sub">정답률 ${pct}%</div>
    <div class="summary-msg">${msg}</div>
    <button class="btn-retry" onclick="location.reload()">🔄 다시 풀기</button>`;
  document.getElementById('main').appendChild(s);
}

render();
</script>
